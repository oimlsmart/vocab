  definition:
  - content: succession d'{{étalons,5.1}} et d'{{étalonnages,2.39}} qui est utilisée
      pour relier un {{résultat de mesure,2.9}} à une référence
  examples: []
  id: 2.42-fra
  language_code: fra
  notes:
  - content: Une chaîne de traçabilité métrologique est définie par l'intermédiaire
      d'une {{hiérarchie d'étalonnage,2.40}}.
  - content: La chaîne de traçabilité métrologique est utilisée pour établir la {{traçabilité
      métrologique,2.41}} du résultat de mesure.
  - content: Une comparaison entre deux étalons peut être considérée comme un étalonnage
      si elle sert à vérifier et, si nécessaire, à corriger la {{valeur,1.19}} et
      l'{{incertitude de mesure,2.26}} attribuées à l'un des étalons.
