data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: ensemble d'un nombre et d'une référence constituant l'expression quantitative
      d'une {{grandeur,1.1}}
  examples:
  - content: |-
      EXEMPLE 1 Longueur d'une tige donnée:
      5,34 m ou 534 cm
      EXEMPLE 2 Masse d'un corps donné:
      0,152 kg ou 152 g
      EXEMPLE 3 Courbure d'un arc donné:
      112 m−1
      EXEMPLE 4 Température Celsius d'un spécimen donné:
      −5 °C
      EXEMPLE 5 Impédance électrique d'un élément de circuit donné à une fréquence donnée, où j est l'unité imaginaire:
      (7 + 3j) Ω
      EXEMPLE 6 Indice de réfraction d'un spécimen donné de verre:
      1,32
      EXEMPLE 7 Dureté C de Rockwell d'un spécimen donné:
      43,5 HRC
      EXEMPLE 8 Fraction massique de cadmium dans un spécimen donné de cuivre:
      3 µg/kg ou 3 ·10−9
      EXEMPLE 9 Molalité de Pb2+ dans un spécimen donné d'eau:
      1,76 µmol/kg
      EXEMPLE 10 Concentration arbitraire en quantité de matière de lutropine dans un spécimen donné de plasma sanguin humain en utilisant l'étalon international 80/552 de l'OMS:
      5,0 UI/l, où «UI» signifie «unité internationale de l'OMS»
  id: 1.19-fra
  language_code: fra
  notes:
  - content: |-
      Selon le type de référence, la valeur d'une grandeur est
      - soit le produit d'un nombre et d'une {{unité de mesure,1.9}} (voir les Exemples 1, 2, 3, 4, 5, 8 et 9); l'unité un est généralement omise pour les {{grandeurs sans dimension,1.8}} (voir Exemples 6 et 8);
      - soit un nombre et la référence à une {{procédure de mesure,2.6}} (voir Exemple 7);
      - soit un nombre et un {{matériau de référence,5.13}} (voir Exemple 10).
  - content: Le nombre peut être complexe (voir Exemple 5).
  - content: La valeur d'une grandeur peut être représentée de plus d'une façon (voir
      Exemples 1, 2 et 8).
  - content: |-
      Dans le cas de grandeurs vectorielles ou tensorielles, chaque composante a une valeur.
      EXEMPLE Force agissant sur une particule donnée, par exemple en coordonnées cartésiennes (Fx; Fy; Fz) = (−31,5; 43,2; 17,0) N.
  sources:
  - origin:
      ref:
        source: JCGM 200:2012
      locality:
        type: clause
        reference_from: '1.19'
    type: authoritative
  terms:
  - type: expression
    normative_status: preferred
    designation: valeur d'une grandeur
  - type: expression
    normative_status: admitted
    designation: valeur, f
