data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: number and reference together expressing magnitude of a {{quantity,1.1}}
  examples:
  - content: |-
      Length of a given rod:
      5.34 m or 534 cm
  - content: |-
      Mass of a given body:
      0.152 kg or 152 g
  - content: |-
      Curvature of a given arc:
      112 m−1
  - content: |-
      Celsius temperature of a given sample:
      −5 °C
  - content: |-
      Electric impedance of a given circuit element at a given frequency, where j is the imaginary unit:
      (7 + 3j) Ω
  - content: |-
      Refractive index of a given sample of glass:
      1.32
  - content: |-
      Rockwell C hardness of a given sample:
      43.5 HRC
  - content: |-
      Mass fraction of cadmium in a given sample of copper:
      3 µg/kg or 3 ·10−9
  - content: |-
      Molality of Pb2+ in a given sample of water:
      1.76 µmol/kg
  - content: |-
      Arbitrary amount-of-substance concentration of lutropin in a given sample of human blood plasma (WHO International Standard 80/552 used as a calibrator):
      5.0 IU/l, where “IU” stands for “WHO International Unit"
  id: 1.19-eng
  language_code: eng
  notes:
  - content: |-
      According to the type of reference, a quantity value is either
      - a product of a number and a {{measurement unit,1.9}} (see Examples 1, 2, 3, 4, 5, 8 and 9); the measurement unit one is generally not indicated for {{quantities of dimension one,1.8}} (see Examples 6 and 8), or
      - a number and a reference to a {{measurement procedure,2.6}} (see Example 7), or
      - a number and a {{reference material,5.13}} (see Example 10).
  - content: The number can be complex (see Example 5).
  - content: A quantity value can be presented in more than one way (see Examples
      1, 2 and 8).
  - content: |-
      In the case of vector or tensor quantities, each component has a quantity value.

      EXAMPLE Force acting on a given particle, e.g. in Cartesian components (Fx; Fy; Fz) = (−31.5; 43.2; 17.0) N.
  - content: '[Annotation] The term "quantity value" was chosen as the first (preferred)
      term in order to take advantage of the adjectival use of a noun in the English
      language. However, it is recognized that the more commonly used expression is
      the second term, "value of a quantity", or even the third term, "value" (when
      there is no possible ambiguity or confusion; for example, it is not necessary
      to write "quantity value of a measurand").'
  sources:
  - origin:
      ref:
        source: JCGM 200:2012
      locality:
        type: clause
        reference_from: '1.19'
    type: authoritative
  terms:
  - type: expression
    normative_status: preferred
    designation: quantity value
  - type: expression
    normative_status: admitted
    designation: value of a quantity
  - type: expression
    normative_status: admitted
    designation: value
