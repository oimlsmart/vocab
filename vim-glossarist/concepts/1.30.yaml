data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: property of a phenomenon, body, or substance, where the property has
      no magnitude
  examples:
  - content: Sex of a human being.
  - content: Colour of a paint sample.
  - content: Colour of a spot test in chemistry.
  - content: ISO two-letter country code.
  - content: Sequence of amino acids in a polypeptide.
  id: 1.30-eng
  language_code: eng
  notes:
  - content: A nominal property has a value, which can be expressed in words, by alphanumerical
      codes, or by other means.
  - content: "'Nominal property value' is not to be confused with {{nominal quantity
      value,4.6}}."
  - content: "[Annotation] Nominal properties are distinguished from quantities, which
      are properties that have a magnitude, that is, they can be compared in terms
      of greater or lesser."
  - content: "[Annotation] ANNOTATION (for Examples 2 and 3) (informative) [3 December
      2013] While colour of a paint sample is sometimes considered to be a nominal
      property, it is also recognized that a pure colour can be characterized by the
      wavelength of electromagnetic radiation, which is a quantity that can be measured."
  sources:
  - origin:
      ref:
        source: JCGM 200:2012
      locality:
        type: clause
        reference_from: '1.30'
    type: authoritative
  terms:
  - type: expression
    normative_status: preferred
    designation: nominal property
date_accepted: '2012-01-01T00:00:00+00:00'
