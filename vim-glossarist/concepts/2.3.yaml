data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{grandeur,1.1}} que l'on veut mesurer"
  examples: []
  id: 2.3-fra
  language_code: fra
  notes:
  - content: La spécification d'un mesurande nécessite la connaissance de la {{nature
      de grandeur,1.2}} et la description de l'état du phénomène, du corps ou de la
      substance dont la grandeur est une propriété, incluant tout constituant pertinent,
      et les entités chimiques en jeu.
  - content: Dans la deuxième édition du VIM et dans la CEI 60050-300:2001, le mesurande
      est défini comme la «grandeur particulière soumise à mesurage».
  - content: |-
      Il se peut que le {{mesurage,2.1}}, incluant le {{système de mesure,3.2}} et les conditions sous lesquelles le mesurage est effectué, modifie le phénomène, le corps ou la substance de sorte que la grandeur mesurée peut différer du mesurande. Dans ce cas, une {{correction,2.53}} appropriée est nécessaire.
      EXEMPLE 1 La différence de potentiel entre les bornes d'une batterie peut diminuer lorsqu'on la mesure en employant un voltmètre ayant une conductance interne importante. La différence de potentiel en circuit ouvert peut alors être calculée à partir des résistances internes de la batterie et du voltmètre.
      EXEMPLE 2 La longueur d'une tige en équilibre avec la température ambiante de 23 °C sera différente de la longueur à la température spécifiée de 20 °C, qui est le mesurande. Dans ce cas, une correction est nécessaire.
  - content: En chimie, l'expression «substance à analyser», ou le nom d'une substance
      ou d'un composé, sont quelquefois utilisés à la place de «mesurande». Cet usage
      est erroné puisque ces termes ne désignent pas des grandeurs.
  - content: "[Annotation] Comme indiqué dans la Note 2, cette définition diffère
      de celle du VIM2. La grandeur qui est mesurée peut ne pas être effectivement
      la grandeur que l'on veut mesurer. En faisant cette distinction, il est souvent
      possible d'inclure dans le modèle de mesure des corrections qui permettent de
      calculer la valeur de la grandeur que l'on veut mesurer à partir de la valeur
      de la grandeur effectivement mesurée."
  sources:
  - origin:
      ref:
        source: JCGM 200:2012
      locality:
        type: clause
        reference_from: '2.3'
    type: authoritative
  terms:
  - type: expression
    normative_status: preferred
    designation: mesurande
