data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{quantity,1.1}} intended to be measured"
  examples:
  - content: The potential difference between the terminals of a battery may decrease
      when using a voltmeter with a significant internal conductance to perform the
      measurement. The open-circuit potential difference can be calculated from the
      internal resistances of the battery and the voltmeter.
  - content: The length of a steel rod in equilibrium with the ambient Celsius temperature
      of 23 °C will be different from the length at the specified temperature of 20
      °C, which is the measurand. In this case, a correction is necessary.
  id: 2.3-eng
  language_code: eng
  notes:
  - content: The specification of a measurand requires knowledge of the {{kind of
      quantity,1.2}}, description of the state of the phenomenon, body, or substance
      carrying the quantity, including any relevant component, and the chemical entities
      involved.
  - content: In the second edition of the VIM and in IEC 60050-300:2001, the measurand
      is defined as the 'particular quantity subject to measurement'.
  - content: The {{measurement,2.1}}, including the {{measuring system,3.2}} and the
      conditions under which the measurement is carried out, might change the phenomenon,
      body, or substance such that the quantity being measured may differ from the
      measurand as defined. In this case, adequate {{correction,2.53}} is necessary.
  - content: In chemistry, “analyte”, or the name of a substance or compound, are
      terms sometimes used for 'measurand'. This usage is erroneous because these
      terms do not refer to quantities.
  - content: "[Annotation] As Note 2 says, this definition differs from the definition
      in VIM2. The quantity that is being measured may not actually be the quantity
      that is intended to be measured. By making this distinction, it is often possible
      to include corrections in the measurement model such that the value of the quantity
      that is intended to be measured can be calculated on the basis of the value
      of the quantity that is actually measured."
  sources:
  - origin:
      ref:
        source: JCGM 200:2012
      locality:
        type: clause
        reference_from: '2.3'
    type: authoritative
  terms:
  - type: expression
    normative_status: preferred
    designation: measurand
