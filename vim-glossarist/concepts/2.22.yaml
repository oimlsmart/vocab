data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: condition de {{mesurage,2.1}} dans un ensemble de conditions qui comprennent
      la même {{procédure de mesure,2.6}}, le même lieu et des mesurages répétés sur
      le même objet ou des objets similaires pendant une période de temps étendue,
      mais peuvent comprendre d'autres conditions que l'on fait varier
  examples: []
  id: 2.22-fra
  language_code: fra
  notes:
  - content: Les conditions que l'on fait varier peuvent comprendre de nouveaux {{étalonnages,2.39}},
      {{étalons,5.1}}, opérateurs et {{systèmes de mesure,3.2}}.
  - content: Il convient qu'une spécification relative aux conditions contienne, dans
      la mesure du possible, les conditions que l'on fait varier et celles qui restent
      inchangées.
  - content: En chimie, on utilise quelquefois le terme «condition de fidélité inter-série»
      pour désigner ce concept.
  sources:
