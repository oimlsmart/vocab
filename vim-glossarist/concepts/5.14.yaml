data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{matériau de référence,5.13}}, accompagné d'une documentation délivrée
      par un organisme faisant autorité et fournissant une ou plusieurs valeurs de
      propriétés spécifiées avec les incertitudes et les traçabilités associées, en
      utilisant des procédures valables"
  examples: []
  id: 5.14-fra
  language_code: fra
  notes:
  - content: EXEMPLE Sérum humain dont la {{valeur,1.19}} assignée à la concentration
      de cholestérol et l'{{incertitude de mesure,2.26}} associée sont indiquées dans
      un certificat et qui sert d'{{étalon,5.1}} dans un {{étalonnage,2.39}} ou de
      matériau de contrôle de la {{justesse de mesure,2.14}}.
  - content: La documentation mentionnée est délivrée sous la forme d'un «certificat»
      (voir le Guide ISO 31:2000).
  - content: Des procédures pour la production et la certification de matériaux de
      référence certifiés sont données, par exemple, dans les Guide ISO 34 et Guide
      ISO 35.
  - content: Dans la définition, le terme «incertitude» peut désigner soit une incertitude
      de mesure, soit l'incertitude associée à la valeur d'une {{propriété qualitative,1.30}},
      telle que l'identité ou la séquence. Le terme «traçabilité» peut désigner soit
      la {{traçabilité métrologique,2.41}} de la valeur d'une grandeur, soit la traçabilité
      de la valeur d'une propriété qualitative.
  - content: Les valeurs de grandeurs spécifiées des matériaux de référence certifiés
      exigent une traçabilité métrologique avec une incertitude de mesure associée
      (voir Accred. Qual. Assur.:2006) [45].
  - content: La définition de l'ISO/REMCO est analogue (Accred. Qual. Assur.:2006)
      [45], mais utilise «métrologique» à la fois pour une grandeur et pour une propriété
      qualitative.
  sources:
