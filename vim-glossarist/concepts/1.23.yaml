data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: relation d'égalité entre des {{unités de base,1.10}}, des {{unités dérivées
      cohérentes,1.12}} ou d'autres {{unités de mesure,1.9}}
  examples: []
  id: 1.23-fra
  language_code: fra
  notes:
  - content: |-
      EXEMPLE 1 Pour les {{grandeurs,1.1}} données dans l'Exemple 1 de 1.22, [Q1] = [Q2] [Q3] où [Q1], [Q2] et [Q3] représentent respectivement les unités de Q1, Q2 et Q3, pourvu que ces unités soient dans un {{système cohérent d'unités,1.14}}.
      EXEMPLE 2 J := kg m2/s2, où J, kg, m et s sont respectivement les symboles du joule, du kilogramme, du mètre et de la seconde. (Le symbole := signifie «est par définition égal à», comme indiqué dans les séries ISO 80000 et CEI 80000.)
      EXEMPLE 3 1 km/h = (1/3,6) m/s.
  sources:
  - origin:
      ref:
        source: JCGM 200:2012
      locality:
        type: clause
        reference_from: '1.23'
    type: authoritative
  terms:
  - type: expression
    normative_status: preferred
    designation: équation aux unités
