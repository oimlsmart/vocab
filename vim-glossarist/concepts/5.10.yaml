data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{étalon,5.1}} fondé sur une propriété intrinsèque et reproductible
      d'un phénomène ou d'une substance"
  examples: []
  id: 5.10-fra
  language_code: fra
  notes:
  - content: |-
      EXEMPLE 1 Étalon intrinsèque de température thermodynamique constitué d'une cellule à point triple de l'eau.
      EXEMPLE 2 Étalon intrinsèque de différence de potentiel électrique fondé sur l'effet Josephson.
      EXEMPLE 3 Étalon intrinsèque de résistance électrique fondé sur l'effet Hall quantique.
      EXEMPLE 4 Étalon intrinsèque de conductivité électrique constitué d'un spécimen de cuivre.
  - content: La {{valeur,1.19}} d'un étalon intrinsèque est assignée par consensus
      et n'a pas besoin d'être établie en le reliant à un autre étalon de même type.
      Son {{incertitude de mesure,2.26}} est déterminée en prenant en compte deux
      composantes, l'une associée à la valeur de consensus et l'autre associée à la
      construction, la mise en oeuvre et la maintenance.
  - content: Un étalon intrinsèque consiste généralement en un système fabriqué conformément
      aux exigences d'une procédure de consensus et il est soumis à une {{vérification,2.44}}
      périodique. La procédure de consensus peut comprendre des dispositions pour
      appliquer les {{corrections,2.53}} nécessaires à la mise en oeuvre.
  - content: Les étalons intrinsèques fondés sur des phénomènes quantiques ont généralement
      une {{stabilité,4.19}} exceptionnelle.
  - content: L'adjectif «intrinsèque» ne signifie pas que l'étalon peut être mis en
      oeuvre et utilisé sans précautions particulières ou qu'il est protégé d'influences
      internes et externes.
  sources:
