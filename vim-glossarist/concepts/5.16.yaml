data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: data related to a property of a phenomenon, body, or substance, or to
      a system of components of known composition or structure, obtained from an identified
      source, critically evaluated, and verified for accuracy
  examples:
  - content: Reference data for solubility of chemical compounds as published by the
      IUPAC.
  id: 5.16-eng
  language_code: eng
  notes:
  - content: In this definition, 'accuracy' covers, for example, {{measurement accuracy,2.13}}
      and 'accuracy of a nominal property value'.
  - content: "“Data” is a plural form, “datum” is the singular. “Data” is commonly
      used in the singular sense, instead of “datum”."
  sources:
  - origin:
      ref:
        source: JCGM 200:2012
      locality:
        type: clause
        reference_from: '5.16'
    type: authoritative
  terms:
  - type: expression
    normative_status: preferred
    designation: reference data
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
