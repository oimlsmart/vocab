data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: ensemble de {{valeurs,1.19}} attribuées à un {{mesurande,2.3}}, complété
      par toute autre information pertinente disponible
  examples: []
  id: 2.9-fra
  language_code: fra
  notes:
  - content: Un résultat de mesure contient généralement des informations pertinentes
      sur l'ensemble de valeurs, certaines pouvant être plus représentatives du mesurande
      que d'autres. Cela peut s'exprimer sous la forme d'une fonction de densité de
      probabilité.
  - content: Le résultat de mesure est généralement exprimé par une {{valeur mesurée,2.10}}
      unique et une {{incertitude de mesure,2.26}}. Si l'on considère l'incertitude
      de mesure comme négligeable dans un certain but, le résultat de mesure peut
      être exprimé par une seule valeur mesurée. Dans de nombreux domaines, c'est
      la manière la plus usuelle d'exprimer un résultat de mesure.
  - content: Dans la littérature traditionnelle et dans l'édition précédente du VIM,
      le résultat de mesure était défini comme une valeur attribuée à un mesurande
      et pouvait se référer à une {{indication,4.1}}, un résultat brut ou un résultat
      corrigé, selon le contexte.
  - content: "[Annotation] Cette définition diffère de celle de la deuxième édition
      du VIM (VIM2) («valeur attribuée à un mesurande, obtenue par mesurage») pour
      tenir compte de 3.1.2 dans le GUM («En général, le résultat d'un mesurage est
      seulement une approximation ou estimation de la valeur du mesurande et, de ce
      fait, est seulement complet lorsqu'il est accompagné par une expression de l'incertitude
      de cette estimation»)."
