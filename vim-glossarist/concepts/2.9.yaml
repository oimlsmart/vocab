data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: set of {{quantity values,1.19}} being attributed to a {{measurand,2.3}}
      together with any other available relevant information
  examples: []
  id: 2.9-eng
  language_code: eng
  notes:
  - content: A measurement result generally contains “relevant information” about
      the set of quantity values, such that some may be more representative of the
      measurand than others. This may be expressed in the form of a probability density
      function (PDF).
  - content: A measurement result is generally expressed as a single {{measured quantity
      value,2.10}} and a {{measurement uncertainty,2.26}}. If the measurement uncertainty
      is considered to be negligible for some purpose, the measurement result may
      be expressed as a single measured quantity value. In many fields, this is the
      common way of expressing a measurement result.
  - content: In the traditional literature and in the previous edition of the VIM,
      measurement result was defined as a value attributed to a measurand and explained
      to mean an {{indication,4.1}}, or an uncorrected result, or a corrected result,
      according to the context.
  - content: '[Annotation] Here "quantity value" can be replaced with "value" without
      ambiguity: "set of values being attributed to a measurand together with any
      other available relevant information."'
  - content: '[Annotation] This definition differs from the definition in the second
      edition of the VIM (VIM2) ("value attributed to a measurand, obtained by measurement")
      in recognition of 3.1.2 in the GUM ("In general, the result of a measurement
      is only an approximation or estimate of the value of the measurand and thus
      is complete only when accompanied by a statement of the uncertainty of that
      estimate.")'
  sources:
