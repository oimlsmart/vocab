    type: accepted
  definition:
  - content: extreme operating condition that a {{measuring instrument,3.1}} or {{measuring
      system,3.2}} is required to withstand without damage, and without degradation
      of specified metrological properties, when it is subsequently operated under
      its {{rated operating conditions,4.9}}
  examples: []
  id: 4.10-eng
  language_code: eng
  notes:
  - content: Limiting conditions for storage, transport or operation can differ.
  - content: Limiting conditions can include limiting {{values,1.19}} of a {{quantity,1.1}}
      being measured and of any {{influence quantity,2.52}}.
  sources:
  - origin:
      ref:
        source: JCGM 200:2012
      locality:
        type: clause
        reference_from: '4.10'
    type: authoritative
  terms:
  - type: expression
    normative_status: preferred
    designation: limiting operating condition
