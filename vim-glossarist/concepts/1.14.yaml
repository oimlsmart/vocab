data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{system of units,1.13}}, based on a given {{system of quantities,1.3}},
      in which the {{measurement unit,1.9}} for each {{derived quantity,1.5}} is a
      {{coherent derived unit,1.12}}"
  examples:
  - content: Set of coherent SI units and relations between them.
  id: 1.14-eng
  language_code: eng
  notes:
  - content: A system of units can be coherent only with respect to a system of quantities
      and the adopted {{base units,1.10}}.
  - content: For a coherent system of units, {{numerical value equations,1.25}} have
      the same form, including numerical factors, as the corresponding {{quantity
      equations,1.22}}.
  sources:
  - origin:
      ref:
        source: JCGM 200:2012
      locality:
        type: clause
        reference_from: '1.14'
    type: authoritative
  terms:
  - type: expression
    normative_status: preferred
    designation: coherent system of units
