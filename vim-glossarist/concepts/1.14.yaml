  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{système d'unités,1.13}}, fondé sur un {{système de grandeurs,1.3}}
      donné, dans lequel l'{{unité de mesure,1.9}} de chaque {{grandeur dérivée,1.5}}
      est une {{unité dérivée cohérente,1.12}}"
  examples: []
  id: 1.14-fra
  language_code: fra
  notes:
  - content: EXEMPLE L'ensemble des unités SI cohérentes et les relations entre elles.
  - content: Un système d'unités ne peut être cohérent que par rapport à un système
      de grandeurs et aux {{unités de base,1.10}} adoptées.
  - content: Pour un système cohérent d'unités, les {{équations aux valeurs numériques,1.25}}
      ont la même forme, y compris les facteurs numériques, que les {{équations aux
      grandeurs,1.22}} correspondantes.
