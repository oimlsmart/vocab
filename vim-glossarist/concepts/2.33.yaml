    type: accepted
  definition:
  - content: formulation d'une {{incertitude de mesure,2.26}} et des composantes de
      cette incertitude, ainsi que de leur calcul et de leur combinaison
  examples: []
  id: 2.33-fra
  language_code: fra
  notes:
  - content: Un bilan d'incertitude devrait comprendre le {{modèle de mesure,2.48}},
      les estimations et incertitudes associées aux {{grandeurs,1.1}} qui interviennent
      dans ce modèle, les covariances, le type des fonctions de densité de probabilité
      utilisées, les degrés de liberté, le type d'évaluation de l'incertitude, ainsi
      que tout {{facteur d'élargissement,2.38}}.
  sources:
