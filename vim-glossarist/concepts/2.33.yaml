  definition:
  - content: statement of a {{measurement uncertainty,2.26}}, of the components of
      that measurement uncertainty, and of their calculation and combination
  examples: []
  id: 2.33-eng
  language_code: eng
  notes:
  - content: An uncertainty budget should include the {{measurement model,2.48}},
      estimates and measurement uncertainties associated with the {{quantities,1.1}}
      in the measurement model, covariances, type of applied probability density functions,
      degrees of freedom, type of evaluation of measurement uncertainty, and any {{coverage
      factor,2.38}}.
