data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: paramètre non négatif qui caractérise la dispersion des {{valeurs,1.19}}
      attribuées à un {{mesurande,2.3}}, à partir des informations utilisées
  examples: []
  id: 2.26-fra
  language_code: fra
  notes:
  - content: L'incertitude de mesure comprend des composantes provenant d'effets systématiques,
      telles que les composantes associées aux {{corrections,2.53}} et aux valeurs
      assignées des {{étalons,5.1}}, ainsi que l'{{incertitude définitionnelle,2.27}}.
      Parfois, on ne corrige pas des effets systématiques estimés, mais on insère
      plutôt des composantes associées de l'incertitude.
  - content: Le paramètre peut être, par exemple, un écarttype appelé {{incertitude-type,2.30}}
      (ou un de ses multiples) ou la demi-étendue d'un intervalle ayant une {{probabilité
      de couverture,2.37}} déterminée.
  - content: L'incertitude de mesure comprend en général de nombreuses composantes.
      Certaines peuvent être évaluées par une {{évaluation de type A de l'incertitude,2.28}}
      à partir de la distribution statistique des valeurs provenant de séries de {{mesurages,2.1}}
      et peuvent être caractérisées par des écarts-types. Les autres composantes,
      qui peuvent être évaluées par une {{évaluation de type B de l'incertitude,2.29}},
      peuvent aussi être caractérisées par des écartstypes, évalués à partir de fonctions
      de densité de probabilité fondées sur l'expérience ou d'autres informations.
  - content: En général, pour des informations données, on sous-entend que l'incertitude
      de mesure est associée à une valeur déterminée attribuée au mesurande. Une modification
      de cette valeur entraîne une modification de l'incertitude associée.
  - content: "[Annotation] Une incertitude de mesure fait partie d'un résultat de
      mesure, qui est le résultat d'un mesurage. Le qualificatif «non négatif» signifie
      «positif ou nul». Les «informations utilisées» dans la définition sont les informations
      obtenues en effectuant le mesurage."
