    type: accepted
  definition:
  - content: "{{incertitude de mesure,2.26}} lorsque la {{valeur mesurée,2.10}} spécifiée
      est nulle"
  examples: []
  id: 4.29-fra
  language_code: fra
  notes:
  - content: L'incertitude de mesure à zéro est associée à une {{indication,4.1}}
      nulle ou presque nulle et correspond à l'intervalle dans lequel on ne sait pas
      si le {{mesurande,2.3}} est trop petit pour être détecté ou si l'indication
      de l'{{instrument de mesure,3.1}} est due seulement au bruit.
  - content: Le concept d'incertitude de mesure à zéro s'applique aussi lorsqu'une
      différence est obtenue entre le {{mesurage,2.1}} d'un spécimen et un blanc.
  sources:
  - origin:
