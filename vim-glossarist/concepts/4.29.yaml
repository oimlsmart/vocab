data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{measurement uncertainty,2.26}} where the specified {{measured quantity
      value,2.10}} is zero"
  examples: []
  id: 4.29-eng
  language_code: eng
  notes:
  - content: Null measurement uncertainty is associated with a null or near zero {{indication,4.1}}
      and covers an interval where one does not know whether the {{measurand,2.3}}
      is too small to be detected or the indication of the {{measuring instrument,3.1}}
      is due only to noise.
  - content: The concept of 'null measurement uncertainty' also applies when a difference
      is obtained between {{measurement,2.1}} of a sample and a blank.
  - content: '[Annotation] Here "measured quantity value" can be replaced by "measured
      value" without ambiguity: "measurement uncertainty where the specified measured
      value is zero".'
  sources:
  - origin:
      ref:
        source: JCGM 200:2012
      locality:
        type: clause
        reference_from: '4.29'
    type: authoritative
  terms:
  - type: expression
    normative_status: preferred
    designation: null measurement uncertainty
