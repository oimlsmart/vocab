    type: accepted
  definition:
  - content: ensemble des {{valeurs,1.19}} de {{grandeurs,1.1}} d'une même {{nature,1.2}}
      qu'un {{instrument de mesure,3.1}} ou un {{système de mesure,3.2}} donné peut
      mesurer avec une {{incertitude instrumentale,4.24}} spécifiée, dans des conditions
      déterminées
  examples: []
  id: 4.7-fra
  language_code: fra
  notes:
  - content: Dans certains domaines, le terme anglais est «measuring range» ou «measurement
      range». En français, le terme «étendue de mesure» est parfois improprement employé.
  - content: Il convient de ne pas confondre la limite inférieure d'un intervalle
      de mesure avec la {{limite de détection,4.18}}.
