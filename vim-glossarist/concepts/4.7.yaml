  definition:
  - content: set of {{values,1.19}} of {{quantities,1.1}} of the same {{kind,1.2}}
      that can be measured by a given {{measuring instrument,3.1}} or {{measuring
      system,3.2}} with specified {{instrumental measurement uncertainty,4.24}}, under
      defined conditions
  examples: []
  id: 4.7-eng
  language_code: eng
  notes:
  - content: In some fields, the term is “measuring range” or “measurement range”.
  - content: The lower limit of a measuring interval should not be confused with {{detection
      limit,4.18}}.
