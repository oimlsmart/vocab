data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: property of a {{reference material,5.13}}, demonstrated by the closeness
      of agreement between the relation among the {{measurement results,2.9}} for
      a stated {{quantity,1.1}} in this material, obtained according to two given
      {{measurement procedures,2.6}}, and the relation obtained among the measurement
      results for other specified materials
  examples: []
  id: 5.15-eng
  language_code: eng
  notes:
  - content: The reference material in question is usually a {{calibrator,5.12}} and
      the other specified materials are usually routine samples.
  - content: The measurement procedures referred to in the definition are the one
      preceding and the one following the reference material (calibrator) in question
      in a {{calibration hierarchy,2.40}} (see ISO 17511).
  - content: The stability of commutable reference materials should be monitored regularly.
  sources:
  - origin:
      ref:
        source: JCGM 200:2012
      locality:
        type: clause
        reference_from: '5.15'
    type: authoritative
  terms:
  - type: expression
    normative_status: preferred
    designation: commutability of a reference material
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
