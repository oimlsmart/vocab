data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: propriété d'un {{matériau de référence,5.13}}, exprimée par l'étroitesse
      de l'accord entre, d'une part, la relation entre les {{résultats de mesure,2.9}}
      obtenus pour une {{grandeur,1.1}} déterminée de ce matériau en utilisant deux
      {{procédures de mesure,2.6}} données et, d'autre part, la relation entre les
      résultats de mesure pour d'autres matériaux spécifiés
  examples: []
  id: 5.15-fra
  language_code: fra
  notes:
  - content: Le matériau de référence en question est généralement un {{étalon,5.1}}
      et les autres matériaux spécifiés sont généralement des spécimens courants.
  - content: Les procédures de mesure mentionnées dans la définition sont celle qui
      précède et celle qui suit le matériau de référence utilisé comme étalon dans
      une {{hiérarchie d'étalonnage,2.40}} (voir l'ISO 17511).
  - content: Il convient de vérifier régulièrement la stabilité des matériaux de référence
      commutables.
  sources:
  - origin:
      ref:
        source: JCGM 200:2012
      locality:
        type: clause
        reference_from: '5.15'
    type: authoritative
  terms:
  - type: expression
    normative_status: preferred
    designation: commutabilité d'un matériau de référence
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
