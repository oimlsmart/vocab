data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: comparabilité de {{résultats de mesure,2.9}}, pour des {{grandeurs,1.1}}
      d'une {{nature,1.2}} donnée, qui sont métrologiquement traçables à une même
      référence
  examples:
  - content: EXEMPLE Des résultats de mesure pour les distances entre la Terre et
      la Lune et entre Paris et Londres sont métrologiquement comparables s'ils sont
      métrologiquement traçables à la même {{unité de mesure,1.9}}, par exemple le
      mètre.
  id: 2.46-fra
  language_code: fra
  notes:
  - content: Voir la Note 1 de 2.41, {{traçabilité métrologique,2.41}}.
  - content: La comparabilité métrologique ne nécessite pas que les {{valeurs mesurées,2.10}}
      et les {{incertitudes de mesure,2.26}} associées soient du même ordre de grandeur.
  sources:
