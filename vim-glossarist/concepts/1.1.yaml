data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: property of a phenomenon, body, or substance, where the property has
      a magnitude that can be expressed as a number and a reference
  examples: []
  id: 1.1-eng
  language_code: eng
  notes:
  - content: |-
      The generic concept 'quantity' can be divided into several levels of specific concepts, as shown in the following table. The left hand side of the table shows specific concepts under 'quantity'. These are generic concepts for the individual quantities in the right hand.

      | length, l longueur, l | radius, r rayon, r | radius of circle A, rA or r(A) rayon du cercle A, rA ou r(A) |
      | wavelength, λ longueur d'onde, λ | wavelength of the sodium D radiation, λD or λ(D; Na) longueur d'onde de la radiation D du sodium, λD ou λ(D; Na) |
      | energy, E énergie, E | kinetic energy, T énergie cinétique, T | kinetic energy of particle i in a given system, Ti énergie cinétique de la particule i dans un système donné, Ti |
      | heat, Q chaleur, Q | heat of vaporization of sample i of water, Qichaleur de vaporisation du spécimen i d'eau, Qi |
      | electric charge, Qcharge électrique, Q | electric charge of the proton, e charge électrique du proton, e |
      | electric resistance, R résistance électrique, R | electric resistance of resistor i in a given circuit, Ri résistance électrique de la résistance i dans un circuit donné, Ri |
      | amount-of-substance concentration of entity B, cBconcentration en quantité de matière du constituant B, cB | amount-of-substance concentration of ethanol in wine sample i, ci(C2H5OH) concentration en quantité de matière d'éthanol dans le spécimen i de vin, ci(C2H5OH) |
      | number concentration of entity B, CB nombre volumique du constituant B, CB | number concentration of erythrocytes in blood sample i, C(Erys; Bi) nombre volumique d'érythrocytes dans le spécimen i de sang, C(Erc; Sgi) |
      | Rockwell C hardness, HRC dureté C de Rockwell, HRC | Rockwell C hardness of steel sample i, HRCi dureté C de Rockwell du spécimen i d'acier, HRCi |
  - content: A reference can be a {{measurement unit,1.9}}, a {{measurement procedure,2.6}},
      a {{reference material,5.13}}, or a combination of such.
  - content: Symbols for quantities are given in the ISO 80000 and IEC 80000 series
      Quantities and units. The symbols for quantities are written in italics. A given
      symbol can indicate different quantities.
  - content: |-
      The preferred IUPAC-IFCC format for designations of quantities in laboratory medicine is “System—Component; kind-of-quantity”.

      EXAMPLE “Plasma (Blood)-Sodium ion; amount-of-substance concentration equal to 143 mmol/l in a given person at a given time”.
  - content: A quantity as defined here is a scalar. However, a vector or a tensor,
      the components of which are quantities, is also considered to be a quantity.
  - content: The concept 'quantity' may be generically divided into, e.g. 'physical
      quantity', 'chemical quantity', and 'biological quantity', or {{base quantity,1.4}}
      and {{derived quantity,1.5}}.
  sources:
  - origin:
      ref:
        source: JCGM 200:2012
      locality:
        type: clause
        reference_from: '1.1'
    type: authoritative
  terms:
  - type: expression
    normative_status: preferred
    designation: quantity
