data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: nombre dans l'expression de la {{valeur d'une grandeur,1.19}}, autre
      qu'un nombre utilisé comme référence
  examples: []
  id: 1.20-fra
  language_code: fra
  notes:
  - content: |-
      Pour les {{grandeurs sans dimension,1.8}}, la référence est une {{unité de mesure,1.9}} qui est un nombre, et ce nombre n'est pas considéré comme faisant partie de la valeur numérique.
      EXEMPLE Pour une fraction molaire égale à 3 mmol/mol, la valeur numérique est 3 et l'unité est mmol/mol. L'unité mmol/mol est numériquement égale à 0,001, mais ce nombre 0,001 ne fait pas partie de la valeur numérique qui reste 3.
  - content: |-
      Pour les {{grandeurs,1.1}} qui ont une unité de mesure (c'est-à-dire autres que les {{grandeurs ordinales,1.26}}), la valeur numérique {Q} d'une grandeur Qest fréquemment notée {Q} = Q/[Q], où [Q] est le symbole de l'unité de mesure.
      EXEMPLE Pour une valeur de 5,7 kg, la valeur numérique est {m} = (5,7 kg)/kg = 5,7. La même valeur peut être exprimée comme 5 700 g et la valeur numérique est alors {m} = (5 700 g)/g = 5 700.
