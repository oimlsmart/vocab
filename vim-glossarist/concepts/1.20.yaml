data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: number in the expression of a {{quantity value,1.19}}, other than any
      number serving as the reference
  examples: []
  id: 1.20-eng
  language_code: eng
  notes:
  - content: |-
      For {{quantities of dimension one,1.8}}, the reference is a {{measurement unit,1.9}} which is a number and this is not considered as a part of the numerical quantity value.

      EXAMPLE In an amount-of-substance fraction equal to 3 mmol/mol, the numerical quantity value is 3 and the unit is mmol/mol. The unit mmol/mol is numerically equal to 0.001, but this number 0.001 is not part of the numerical quantity value, which remains 3.
  - content: |-
      For {{quantities,1.1}} that have a measurement unit (i.e. those other than {{ordinal quantities,1.26}}), the numerical value {Q} of a quantity Qis frequently denoted {Q} = Q/[Q], where [Q] denotes the measurement unit.

      EXAMPLE For a quantity value of 5.7 kg, the numerical quantity value is {m} = (5.7 kg)/kg = 5.7. The same quantity value can be expressed as 5 700 g in which case the numerical quantity value {m} = (5 700 g)/g = 5 700.
  sources:
  - origin:
