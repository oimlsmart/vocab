data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: ensemble d'opérations réalisées sur un {{système de mesure,3.2}} pour
      qu'il fournisse des {{indications,4.1}} prescrites correspondant à des {{valeurs,1.19}}
      données des {{grandeurs,1.1}} à mesurer
  examples: []
  id: 3.11-fra
  language_code: fra
  notes:
  - content: Divers types d'ajustage d'un système de mesure sont le {{réglage de zéro,3.12}},
      le réglage de décalage, le réglage d'étendue (appelé aussi réglage de gain).
  - content: Il convient de ne pas confondre l'ajustage d'un système de mesure avec
      son {{étalonnage,2.39}}, qui est un préalable à l'ajustage.
  - content: Après un ajustage d'un système de mesure, le système demande généralement
      à être réétalonné.
