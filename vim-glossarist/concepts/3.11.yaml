data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: set of operations carried out on a {{measuring system,3.2}} so that it
      provides prescribed {{indications,4.1}} corresponding to given {{values,1.19}}
      of a {{quantity,1.1}} to be measured
  examples: []
  id: 3.11-eng
  language_code: eng
  notes:
  - content: Types of adjustment of a measuring system include {{zero adjustment of
      a measuring system,3.12}}, offset adjustment, and span adjustment (sometimes
      called gain adjustment).
  - content: Adjustment of a measuring system should not be confused with {{calibration,2.39}},
      which is a prerequisite for adjustment.
  - content: After an adjustment of a measuring system, the measuring system must
      usually be recalibrated.
  sources:
