    type: accepted
  definition:
  - content: rapport de deux {{unités de mesure,1.9}} correspondant à des {{grandeurs,1.1}}
      de même {{nature,1.2}}
  examples: []
  id: 1.24-fra
  language_code: fra
  notes:
  - content: EXEMPLE km/m = 1 000 et par conséquent 1 km = 1 000 m.
  - content: |-
      Les unités de mesure peuvent appartenir à des {{systèmes d'unités,1.13}} différents.
      EXEMPLE 1 h/s = 3 600 et par conséquent 1 h = 3 600 s.
      EXEMPLE 2 (km/h)/(m/s) = (1/3,6) et par conséquent 1 km/h = (1/3,6) m/s.
