data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{measurement unit,1.9}} that is adopted by convention for a {{base
      quantity,1.4}}"
  examples: []
  id: 1.10-eng
  language_code: eng
  notes:
  - content: |-
      In each {{coherent system of units,1.14}}, there is only one base unit for each base quantity.

      EXAMPLE In the {{SI,1.16}}, the metre is the base unit of length. In the CGS systems, the centimetre is the base unit of length.
  - content: |-
      A base unit may also serve for a {{derived quantity,1.5}} of the same {{quantity dimension,1.7}}.

      EXAMPLE Rainfall, when defined as areic volume (volume per area), has the metre as a {{coherent derived unit,1.12}} in the SI.
  - content: For number of entities, the number one, symbol 1, can be regarded as
      a base unit in any {{system of units,1.13}}.
  sources:
  - origin:
      ref:
        source: JCGM 200:2012
      locality:
        type: clause
        reference_from: '1.10'
    type: authoritative
  terms:
  - type: expression
    normative_status: preferred
    designation: base unit
