data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{unité de mesure,1.9}} adoptée par convention pour une {{grandeur de
      base,1.4}}"
  examples: []
  id: 1.10-fra
  language_code: fra
  notes:
  - content: |-
      Dans chaque {{système cohérent d'unités,1.14}}, il y a une seule unité de base pour chaque grandeur de base.
      EXEMPLE Dans le {{SI,1.16}}, le mètre est l'unité de base de longueur. Dans les systèmes CGS, le centimètre est l'unité de base de longueur.
  - content: |-
      Une unité de base peut aussi servir pour une {{grandeur dérivée,1.5}} de même {{dimension,1.7}}.
      EXEMPLE La hauteur de pluie, définie comme un volume surfacique (volume par aire) a le mètre comme {{unité dérivée cohérente,1.12}} dans le SI.
  - content: Pour un nombre d'entités, on peut considérer le nombre un, de symbole
      1, comme une unité de base dans tout {{système d'unités,1.13}}.
  sources:
  - origin:
      ref:
        source: JCGM 200:2012
      locality:
        type: clause
        reference_from: '1.10'
    type: authoritative
  terms:
  - type: expression
    normative_status: preferred
    designation: unité de base
date_accepted: '2012-01-01T00:00:00+00:00'
