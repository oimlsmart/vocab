data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: aspect common to mutually comparable {{quantities,1.1}}
  examples:
  - content: The quantities diameter, circumference, and wavelength are generally
      considered to be quantities of the same kind, namely of the kind of quantity
      called length.
  - content: The quantities heat, kinetic energy, and potential energy are generally
      considered to be quantities of the same kind, namely of the kind of quantity
      called energy.
  - content: The quantities moment of force and energy are, by convention, not regarded
      as being of the same kind, although they have the same dimension. Similarly
      for heat capacity and entropy, as well as for number of entities, relative permeability,
      and mass fraction.
  id: 1.2-eng
  language_code: eng
  notes:
  - content: The division of 'quantity' according to 'kind of quantity' is to some
      extent arbitrary.
  - content: Quantities of the same kind within a given {{system of quantities,1.3}}
      have the same {{quantity dimension,1.7}}. However, quantities of the same dimension
      are not necessarily of the same kind.
  - content: In English, the terms for quantities in the left half of the table in
      1.1, Note 1, are often used for the corresponding 'kinds of quantity'. In French,
      the term “nature” is only used in expressions such as “grandeurs de même nature”
      (in English, “quantities of the same kind”).
  - content: '[Annotation] The term "kind" is mainly used in expressions such as "quantities
      of the same kind." Two quantities of the same kind are mutually comparable,
      so that they can be placed in order of magnitude. Length and mass are quantities
      of different kinds because they are not mutually comparable.'
  sources:
