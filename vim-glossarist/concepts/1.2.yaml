data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: aspect commun à des {{grandeurs,1.1}} mutuellement comparables
  examples: []
  id: 1.2-fra
  language_code: fra
  notes:
  - content: |-
      La répartition des grandeurs selon leur nature est dans une certaine mesure arbitraire.
      EXEMPLE 1 Les grandeurs diamètre, circonférence et longueur d'onde sont généralement considérées comme des grandeurs de même nature, à savoir la nature de la longueur.
      EXEMPLE 2 Les grandeurs chaleur, énergie cinétique et énergie potentielle sont généralement considérées comme des grandeurs de même nature, à savoir la nature de l'énergie.
  - content: |-
      Les grandeurs de même nature dans un {{système de grandeurs,1.3}} donné ont la même {{dimension,1.7}}. Cependant des grandeurs de même dimension ne sont pas nécessairement de même nature.
      EXEMPLE On ne considère pas, par convention, les grandeurs moment d'une force et énergie comme étant de même nature, bien que ces grandeurs aient la même dimension. Il en est de même pour la capacité thermique et l'entropie, ainsi que pour un nombre d'entités, la perméabilité relative et la fraction massique.
  - content: En français, le terme «nature» n'est employé que dans des expressions
      telles que «grandeurs de même nature» (en anglais «quantities of the same kind»).
      En anglais, les termes désignant les grandeurs de la moitié gauche du tableau
      en 1.1, Note 1, sont souvent employés pour désigner les «natures» correspondantes.
  - content: "[Annotation] Comme indiqué dans la NOTE 3, le terme «nature» n'est employé
      que dans des expressions telles que «grandeurs de même nature». Des grandeurs
      de même nature sont mutuellement comparables et peuvent donc être classées selon
      l'ordre croissant ou décroissant de leurs expressions quantitatives. La longueur
      et la masse sont des grandeurs de natures différentes parce qu'elles ne sont
      pas mutuellement comparables."
