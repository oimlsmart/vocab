  definition:
  - content: ordered set of {{quantity values,1.19}} of {{quantities,1.1}} of a given
      {{kind of quantity,1.2}} used in ranking, according to magnitude, quantities
      of that kind
  examples:
  - content: Celsius temperature scale.
  - content: Time scale.
  - content: Rockwell C hardness scale.
  id: 1.27-eng
  language_code: eng
