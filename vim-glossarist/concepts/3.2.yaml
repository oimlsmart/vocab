    type: accepted
  definition:
  - content: set of one or more {{measuring instruments,3.1}} and often other devices,
      including any reagent and supply, assembled and adapted to give information
      used to generate {{measured quantity values,2.10}} within specified intervals
      for {{quantities,1.1}} of specified {{kinds,1.2}}
  examples: []
  id: 3.2-eng
  language_code: eng
  notes:
  - content: A measuring system may consist of only one measuring instrument.
  - content: '[Annotation] Here "measured quantity values" can be replaced by "measured
      values" without ambiguity: "set of one or more measuring instruments and often
      other devices, including any reagent and supply, assembled and adapted to give
      information used to generate measured values within specified intervals for
      quantities of specified kinds".'
  sources:
