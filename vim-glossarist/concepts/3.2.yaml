  definition:
  - content: ensemble d'un ou plusieurs {{instruments de mesure,3.1}} et souvent d'autres
      dispositifs, comprenant si nécessaire réactifs et alimentations, assemblés et
      adaptés pour fournir des informations destinées à obtenir des {{valeurs mesurées,2.10}}
      dans des intervalles spécifiés pour des {{grandeurs,1.1}} de {{natures,1.2}}
      spécifiées
  examples: []
  id: 3.2-fra
  language_code: fra
  notes:
