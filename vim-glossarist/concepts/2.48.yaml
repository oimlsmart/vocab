  definition:
  - content: mathematical relation among all {{quantities,1.1}} known to be involved
      in a {{measurement,2.1}}
  examples: []
  id: 2.48-eng
  language_code: eng
  notes:
  - content: A general form of a measurement model is the equation h(Y, X1, …, Xn)
      = 0, where Y, the {{output quantity in the measurement model,2.51}}, is the
      {{measurand,2.3}}, the {{quantity value,1.19}} of which is to be inferred from
      information about {{input quantities in the measurement model,2.50}}X1, …, Xn.
  - content: In more complex cases where there are two or more output quantities in
      a measurement model, the measurement model consists of more than one equation.
