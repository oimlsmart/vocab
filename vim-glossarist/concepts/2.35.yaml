data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: produit d'une {{incertitude-type composée,2.31}} et d'un facteur supérieur
      au nombre un
  examples: []
  id: 2.35-fra
  language_code: fra
  notes:
  - content: Le facteur dépend du type de la loi de probabilité de la {{grandeur de
      sortie dans un modèle de mesure,2.51}} et de la {{probabilité de couverture,2.37}}
      choisie.
  - content: Le facteur qui intervient dans la définition est un {{facteur d'élargissement,2.38}}.
  - content: L'incertitude élargie est appelée «incertitude globale» au paragraphe
      5 de la Recommandation INC-1 (1980) (voir le GUM) et simplement «incertitude»
      dans les documents de la CEI.
