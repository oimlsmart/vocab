data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: product of a {{combined standard measurement uncertainty,2.31}} and a
      factor larger than the number one
  examples: []
  id: 2.35-eng
  language_code: eng
  notes:
  - content: The factor depends upon the type of probability distribution of the {{output
      quantity in a measurement model,2.51}} and on the selected {{coverage probability,2.37}}.
  - content: The term “factor” in this definition refers to a {{coverage factor,2.38}}.
  - content: Expanded measurement uncertainty is termed “overall uncertainty” in paragraph
      5 of Recommendation INC-1 (1980) (see the GUM) and simply “uncertainty” in IEC
      documents.
  - content: '[Annotation] Here "combined standard measurement uncertainty" can be
      replaced with "combined standard uncertainty" without ambiguity: "product of
      a combined standard uncertainty and a factor larger than the number one".'
  sources:
  - origin:
      ref:
        source: JCGM 200:2012
      locality:
        type: clause
        reference_from: '2.35'
    type: authoritative
  terms:
  - type: expression
    normative_status: preferred
    designation: expanded measurement uncertainty
  - type: expression
    normative_status: admitted
    designation: expanded uncertainty
