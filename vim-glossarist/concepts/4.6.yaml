data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{valeur,1.19}} arrondie ou approximative d'une {{grandeur,1.1}} caractéristique
      d'un {{instrument de mesure,3.1}} ou d'un {{système de mesure,3.2}}, qui sert
      de guide pour son utilisation appropriée"
  examples:
  - content: |-
      EXEMPLE 1 La valeur 100 Ω marquée sur une résistance étalon.
      EXEMPLE 2 La valeur 1 000 ml marquée sur une fiole jaugée à un trait.
      EXEMPLE 3 La valeur 0,1 mol/l de la concentration en quantité de matière d'une solution d'acide chlorhydrique, HCl.
      EXEMPLE 4 La valeur –20 °C d'une température Celsius maximale de stockage.
  id: 4.6-fra
  language_code: fra
  notes:
  - content: En anglais, il convient de ne pas utilizer «nominal quantity value» et
      «nominal value» pour la valeur d'une {{propriété qualitative,1.30}} (en anglais
      «nominal property value»).
