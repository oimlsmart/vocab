  definition:
  - content: set of {{quantity values,1.19}} bounded by extreme possible {{indications,4.1}}
  examples: []
  id: 4.3-eng
  language_code: eng
  notes:
  - content: An indication interval is usually stated in terms of its smallest and
      greatest quantity values, for example “99 V to 201 V”.
  - content: In some fields, the term is “range of indications”.
  - content: '[Annotation] Here "quantity values" can be replaced by "values" without
      ambiguity: "set of values bounded by extreme possible indications".'
