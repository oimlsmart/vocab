  definition:
  - content: ensemble de règles et opérations mathématiques appliquées aux {{grandeurs,1.1}}
      autres que les {{grandeurs ordinales,1.26}}
  examples: []
  id: 1.21-fra
  language_code: fra
  notes:
  - content: En algèbre des grandeurs, les {{équations aux grandeurs,1.22}} sont préférées
      aux {{équations aux valeurs numériques,1.25}} car les premières, contrairement
      aux secondes, sont indépendantes du choix des {{unités de mesure,1.9}} (voir
      l'ISO 31-0:1992, 2.2.2).
