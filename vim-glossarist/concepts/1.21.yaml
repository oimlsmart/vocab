  definition:
  - content: set of mathematical rules and operations applied to {{quantities,1.1}}
      other than {{ordinal quantities,1.26}}
  examples: []
  id: 1.21-eng
  language_code: eng
  notes:
  - content: In quantity calculus, {{quantity equations,1.22}} are preferred to {{numerical
      value equations,1.25}} because quantity equations are independent of the choice
      of {{measurement units,1.9}}, whereas numerical value equations are not (see
      ISO 31-0:1992, 2.2.2).
