data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{quantity,1.1}} that must be measured, or a quantity, the {{value,1.19}}
      of which can be otherwise obtained, in order to calculate a {{measured quantity
      value,2.10}} of a {{measurand,2.3}}"
  examples:
  - content: When the length of a steel rod at a specified temperature is the measurand,
      the actual temperature, the length at that actual temperature, and the linear
      thermal expansion coefficient of the rod are input quantities in a measurement
      model.
  id: 2.50-eng
  language_code: eng
  notes:
  - content: An input quantity in a measurement model is often an output quantity
      of a {{measuring system,3.2}}.
  - content: "{{Indications,4.1}}, {{corrections,2.53}} and {{influence quantities,2.52}}
      can be input quantities in a measurement model."
  - content: '[Annotation] Here "measured quantity value" can be replaced by "measured
      value" without ambiguity: "quantity that must be measured, or a quantity, the
      value of which can be otherwise obtained, in order to calculate a measured value
      of a measurand".'
  sources:
  - origin:
      ref:
        source: JCGM 200:2012
      locality:
        type: clause
        reference_from: '2.50'
    type: authoritative
  terms:
  - type: expression
    normative_status: preferred
    designation: input quantity in a measurement model
  - type: expression
    normative_status: admitted
    designation: input quantity
