data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{grandeur,1.1}} qui doit être mesurée, ou grandeur dont la {{valeur,1.19}}
      peut être obtenue autrement, pour calculer une {{valeur mesurée,2.10}} d'un
      {{mesurande,2.3}}"
  examples:
  - content: EXEMPLE Lorsque le mesurande est la longueur d'une tige d'acier à une
      température spécifiée, la température réelle, la longueur à la température réelle
      et le coefficient de dilatation thermique linéique de la tige sont des grandeurs
      d'entrée dans un modèle de mesure.
  id: 2.50-fra
  language_code: fra
  notes:
  - content: Une grandeur d'entrée dans un modèle de mesure est souvent une grandeur
      de sortie d'un {{système de mesure,3.2}}.
  - content: Les {{indications,4.1}}, les {{corrections,2.53}} et les {{grandeurs
      d'influence,2.52}} sont des grandeurs d'entrée dans un modèle de mesure.
  sources:
