data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{valeur,1.19}} fournie par un {{instrument de mesure,3.1}} ou un {{système
      de mesure,3.2}}"
  examples: []
  id: 4.1-fra
  language_code: fra
  notes:
  - content: Une indication peut être présentée sous forme visuelle ou acoustique
      ou peut être transférée à un autre dispositif. Elle est souvent donnée par la
      position d'un pointeur sur un affichage pour les sorties analogiques, par un
      nombre affiché ou imprimé pour les sorties numériques, par une configuration
      codée pour les sorties codées, ou par la valeur assignée pour les {{mesures
      matérialisées,3.6}}.
  - content: Une indication et la valeur de la {{grandeur,1.1}} mesurée correspondante
      ne sont pas nécessairement des valeurs de grandeurs de même {{nature,1.2}}.
  - content: "[Annotation] Une indication est quelquefois considérée comme une grandeur
      ayant une valeur plutôt que comme une valeur d'une grandeur."
  sources:
  - origin:
      ref:
        source: JCGM 200:2012
