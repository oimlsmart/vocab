data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: property of a set of {{measurement results,2.9}} for a specified {{measurand,2.3}},
      such that the absolute value of the difference of any pair of {{measured quantity
      values,2.10}} from two different measurement results is smaller than some chosen
      multiple of the {{standard measurement uncertainty,2.30}} of that difference
  examples: []
  id: 2.47-eng
  language_code: eng
  notes:
  - content: Metrological compatibility of measurement results replaces the traditional
      concept of 'staying within the error', as it represents the criterion for deciding
      whether two measurement results refer to the same measurand or not. If in a
      set of {{measurements,2.1}} of a measurand, thought to be constant, a measurement
      result is not compatible with the others, either the measurement was not correct
      (e.g. its {{measurement uncertainty,2.26}} was assessed as being too small)
      or the measured {{quantity,1.1}} changed between measurements.
  - content: Correlation between the measurements influences metrological compatibility
      of measurement results. If the measurements are completely uncorrelated, the
      standard measurement uncertainty of their difference is equal to the root mean
      square sum of their standard measurement uncertainties, while it is lower for
      positive covariance or higher for negative covariance.
  - content: '[Annotation] Here "measured quantity values" can be replaced by "measured
      values" and "standard measurement uncertainty" can be replaced by "standard
      uncertainty" without ambiguity: "property of a set of measurement results for
      a specified measurand, such that the absolute value of the difference of any
      pair of measured values from two different measurement results is smaller than
      some chosen multiple of the standard uncertainty of that difference".'
  sources:
