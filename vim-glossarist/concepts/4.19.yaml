data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: propriété d'un {{instrument de mesure,3.1}} selon laquelle celui-ci conserve
      ses propriétés métrologiques constantes au cours du temps
  examples: []
  id: 4.19-fra
  language_code: fra
  notes:
  - content: |-
      La stabilité d'un instrument de mesure peut être exprimée quantitativement de plusieurs façons.
      EXEMPLE 1 Par la durée d'un intervalle de temps au cours duquel une propriété métrologique évolue d'une quantité donnée.
      EXEMPLE 2 Par la variation d'une propriété au cours d'un intervalle de temps déterminé.
  sources:
  - origin:
      ref:
        source: JCGM 200:2012
      locality:
        type: clause
        reference_from: '4.19'
    type: authoritative
  terms:
  - type: expression
    normative_status: preferred
    designation: stabilité
  - type: expression
    normative_status: admitted
    designation: constance, f
