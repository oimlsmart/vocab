data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: element of a {{measuring system,3.2}} that is directly affected by a
      phenomenon, body, or substance carrying a {{quantity,1.1}} to be measured
  examples:
  - content: Sensing coil of a platinum resistance thermometer, rotor of a turbine
      flow meter, Bourdon tube of a pressure gauge, float of a level-measuring instrument,
      photocell of a spectrometer, thermotropic liquid crystal which changes colour
      as a function of temperature.
  id: 3.8-eng
  language_code: eng
  notes:
  - content: In some fields, the term “detector” is used for this concept.
  sources:
  - origin:
      ref:
        source: JCGM 200:2012
      locality:
        type: clause
        reference_from: '3.8'
    type: authoritative
  terms:
  - type: expression
    normative_status: preferred
    designation: sensor
