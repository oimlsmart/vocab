  definition:
  - content: suite d'éléments d'un {{système de mesure,3.2}} qui constitue un seul
      chemin du signal depuis le {{capteur,3.8}} jusqu'à l'élément de sortie
  examples:
  - content: |-
      EXEMPLE 1 Chaîne de mesure électroacoustique comprenant un microphone, un atténuateur, un filtre, un amplificateur et un voltmètre.
