  definition:
  - content: series of elements of a {{measuring system,3.2}} constituting a single
      path of the signal from a {{sensor,3.8}} to an output element
  examples:
  - content: Electro-acoustic measuring chain comprising a microphone, attenuator,
      filter, amplifier, and voltmeter.
  - content: Mechanical measuring chain comprising a Bourdon tube, system of levers,
      two gears, and a mechanical dial.
