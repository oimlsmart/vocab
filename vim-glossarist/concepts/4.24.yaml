data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: composante de l'{{incertitude de mesure,2.26}} qui provient de l'{{instrument
      de mesure,3.1}} ou du {{système de mesure,3.2}} utilisé
  examples: []
  id: 4.24-fra
  language_code: fra
  notes:
  - content: L'incertitude instrumentale est obtenue par {{étalonnage,2.39}} de l'instrument
      de mesure ou du système de mesure, sauf pour un {{étalon primaire,5.4}}, pour
      lequel on utilise d'autres moyens.
  - content: L'incertitude instrumentale est utilisée dans une {{évaluation de type
      B de l'incertitude,2.29}}.
  - content: Les informations relatives à l'incertitude instrumentale peuvent être
      données dans les spécifications de l'instrument.
  sources:
