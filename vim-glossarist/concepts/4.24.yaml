data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: component of {{measurement uncertainty,2.26}} arising from a {{measuring
      instrument,3.1}} or {{measuring system,3.2}} in use
  examples: []
  id: 4.24-eng
  language_code: eng
  notes:
  - content: Instrumental measurement uncertainty is obtained through {{calibration,2.39}}
      of a measuring instrument or measuring system, except for a {{primary measurement
      standard,5.4}} for which other means are used.
  - content: Instrumental measurement uncertainty is used in a {{Type B evaluation
      of measurement uncertainty,2.29}}.
  - content: Information relevant to instrumental measurement uncertainty may be given
      in the instrument specifications.
  sources:
