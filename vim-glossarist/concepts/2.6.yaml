data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: detailed description of a {{measurement,2.1}} according to one or more
      {{measurement principles,2.4}} and to a given {{measurement method,2.5}}, based
      on a {{measurement model,2.48}} and including any calculation to obtain a {{measurement
      result,2.9}}
  examples: []
  id: 2.6-eng
  language_code: eng
  notes:
  - content: A measurement procedure is usually documented in sufficient detail to
      enable an operator to perform a measurement.
  - content: A measurement procedure can include a statement concerning a {{target
      measurement uncertainty,2.34}}.
  - content: A measurement procedure is sometimes called a standard operating procedure,
      abbreviated SOP.
  - content: '[Annotation] The use of the terms "measurement method" and "measurement
      procedure" differs, for historical reasons, between different areas of metrology.
      In general, a measurement method delimits a broader category of operations than
      does a measurement procedure, which requires a detailed set of instructions.'
  sources:
  - origin:
      ref:
        source: JCGM 200:2012
      locality:
        type: clause
        reference_from: '2.6'
    type: authoritative
  terms:
  - type: expression
    normative_status: preferred
    designation: measurement procedure
