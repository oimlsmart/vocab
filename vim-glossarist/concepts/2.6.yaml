data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: description détaillée d'un {{mesurage,2.1}} conformément à un ou plusieurs
      {{principes de mesure,2.4}} et à une {{méthode de mesure,2.5}} donnée, fondée
      sur un {{modèle de mesure,2.48}} et incluant tout calcul destiné à obtenir un
      {{résultat de mesure,2.9}}
  examples: []
  id: 2.6-fra
  language_code: fra
  notes:
  - content: Une procédure de mesure est habituellement documentée avec assez de détails
      pour permettre à un opérateur d'effectuer un mesurage.
  - content: Une procédure de mesure peut inclure une assertion concernant une {{incertitude
      cible,2.34}}.
  - content: Une procédure de mesure est quelquefois appelée en anglais standard operating
      procedure, abrégé en SOP. Le terme «mode opératoire de mesure» était employé
      en français dans la deuxième édition du VIM.
  - content: "[Annotation] L'emploi des termes «méthode de mesure» et «procédure de
      mesure» diffère, pour des raisons historiques, d'un domaine à l'autre de la
      métrologie. En général, une méthode de mesure recouvre une plus grande catégorie
      d'opérations qu'une procédure de mesure, qui nécessite un ensemble détaillé
      d'instructions."
  sources:
  - origin:
      ref:
        source: JCGM 200:2012
      locality:
        type: clause
        reference_from: '2.6'
    type: authoritative
  terms:
  - type: expression
    normative_status: preferred
    designation: procédure de mesure
  - type: expression
    normative_status: admitted
    designation: procédure opératoire, f
