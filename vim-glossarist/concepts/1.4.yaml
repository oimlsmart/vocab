data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{quantity,1.1}} in a conventionally chosen subset of a given {{system
      of quantities,1.3}}, where no subset quantity can be expressed in terms of the
      others"
  examples:
  - content: The set of base quantities in the {{International System of Quantities,1.6}}
      (ISQ) is given in 1.6.
  id: 1.4-eng
  language_code: eng
  notes:
  - content: The subset mentioned in the definition is termed the “set of base quantities”.
  - content: Base quantities are referred to as being mutually independent since a
      base quantity cannot be expressed as a product of powers of the other base quantities.
  - content: "'Number of entities' can be regarded as a base quantity in any system
      of quantities."
  sources:
  - origin:
      ref:
        source: JCGM 200:2012
      locality:
        type: clause
        reference_from: '1.4'
    type: authoritative
  terms:
  - type: expression
    normative_status: preferred
    designation: base quantity
