data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{étalon,5.1}} établi par l'intermédiaire d'un {{étalonnage,2.39}} par
      rapport à un {{étalon primaire,5.4}} d'une {{grandeur,1.1}} de même {{nature,1.2}}"
  examples: []
  id: 5.5-fra
  language_code: fra
  notes:
  - content: On peut obtenir directement la relation entre l'étalon primaire et l'étalon
      secondaire ou mettre en oeuvre un {{système de mesure,3.2}} intermédiaire étalonné
      par l'étalon primaire, qui assigne un {{résultat de mesure,2.9}} à l'étalon
      secondaire.
  - content: Un étalon dont la {{valeur,1.19}} est assignée par une {{procédure de
      mesure primaire,2.8}} de mesure de rapport est un étalon secondaire.
  sources:
  - origin:
      ref:
        source: JCGM 200:2012
      locality:
        type: clause
        reference_from: '5.5'
    type: authoritative
  terms:
  - type: expression
    normative_status: preferred
    designation: étalon secondaire
