data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: composante de l'{{erreur de mesure,2.16}} qui, dans des {{mesurages,2.1}}
      répétés, varie de façon imprévisible
  examples: []
  id: 2.19-fra
  language_code: fra
  notes:
  - content: La {{valeur de référence,5.18}} pour une erreur aléatoire est la moyenne
      qui résulterait d'un nombre infini de mesurages répétés du même {{mesurande,2.3}}.
  - content: Les erreurs aléatoires d'un ensemble de mesurages répétés forment une
      distribution qui peut être résumée par son espérance mathématique, généralement
      supposée nulle, et par sa variance.
  - content: L'erreur aléatoire est égale à la différence entre l'erreur de mesure
      et l'{{erreur systématique,2.17}}.
  sources:
  - origin:
      ref:
        source: JCGM 200:2012
      locality:
