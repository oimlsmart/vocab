  definition:
  - content: number larger than one by which a {{combined standard measurement uncertainty,2.31}}
      is multiplied to obtain an {{expanded measurement uncertainty,2.35}}
  examples: []
  id: 2.38-eng
  language_code: eng
  notes:
  - content: A coverage factor is usually symbolized k (see also ISO/IEC Guide 98-3:2008,
      2.3.6).
  - content: '[Annotation] Here "combined standard measurement uncertainty" can be
      replaced with "combined standard uncertainty" and "expanded measurement uncertainty"
      can be replaced with "expanded uncertainty" without ambiguity: "number larger
      than one by which a combined standard uncertainty is multiplied to obtain an
      expanded uncertainty".'
