data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: condition de {{mesurage,2.1}} dans un ensemble de conditions qui comprennent
      des lieux, des opérateurs et des {{systèmes de mesure,3.2}} différents, ainsi
      que des mesurages répétés sur le même objet ou des objets similaires
  examples: []
  id: 2.24-fra
  language_code: fra
  notes:
  - content: Les différents systèmes de mesure peuvent utiliser des {{procédures de
      mesure,2.6}} différentes.
  - content: Il convient qu'une spécification relative aux conditions contienne, dans
      la mesure du possible, les conditions que l'on fait varier et celles qui restent
      inchangées.
  sources:
  - origin:
      ref:
        source: JCGM 200:2012
      locality:
