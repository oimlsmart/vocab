data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: différence entre la {{valeur mesurée,2.10}} d'une {{grandeur,1.1}} et
      une {{valeur de référence,5.18}}
  examples: []
  id: 2.16-fra
  language_code: fra
  notes:
  - content: Le concept d'erreur peut être utilisé a) lorsqu'il existe une valeur
      de référence unique à laquelle se rapporter, ce qui a lieu si on effectue un
      {{étalonnage,2.39}} au moyen d'un {{étalon,5.1}} dont la {{valeur mesurée,2.10}}
      a une {{incertitude de mesure,2.26}} négligeable ou si on prend une {{valeur
      conventionnelle,2.12}}, l'erreur étant alors connue, b) si on suppose le {{mesurande,2.3}}
      représenté par une {{valeur vraie,2.11}} unique ou un ensemble de valeurs vraies
      d'étendue négligeable, l'erreur étant alors inconnue.
  - content: Il convient de ne pas confondre l'erreur de mesure avec une erreur de
      production ou une erreur humaine.
  - content: "[Annotation] Une erreur de mesure est quelquefois considérée comme une
      grandeur ayant une valeur plutôt que comme une valeur d'une grandeur."
  - content: "[Annotation] ANNOTATION (pour la Note 1) (informative) [5 juin 2014]
      Le concept d'erreur de mesure peut être utilisé dans le cas a) ou dans le cas
      b), mais pas dans les deux cas à la fois."
  sources:
  - origin:
      ref:
        source: JCGM 200:2012
      locality:
