data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{measured quantity value,2.10}} minus a {{reference quantity value,5.18}}"
  examples: []
  id: 2.16-eng
  language_code: eng
  notes:
  - content: The concept of 'measurement error' can be used both a) when there is
      a single reference quantity value to refer to, which occurs if a {{calibration,2.39}}
      is made by means of a {{measurement standard,5.1}} with a {{measured quantity
      value,2.10}} having a negligible {{measurement uncertainty,2.26}} or if a {{conventional
      quantity value,2.12}} is given, in which case the measurement error is known,
      and b) if a {{measurand,2.3}} is supposed to be represented by a unique {{true
      quantity value,2.11}} or a set of true quantity values of negligible range,
      in which case the measurement error is not known.
  - content: Measurement error should not be confused with production error or mistake.
  - content: "[Annotation] Measurement error is sometimes understood as a quantity,
      which has a value, rather than as a value of a quantity."
  - content: "[Annotation] ANNOTATION (for Note 1) (informative) [5 June 2014] The
      concept of 'measurement error' can be used either for a) or for b), but not
      for both a) and b) simultaneously."
  sources:
  - origin:
      ref:
        source: JCGM 200:2012
      locality:
        type: clause
        reference_from: '2.16'
    type: authoritative
  terms:
  - type: expression
    normative_status: preferred
    designation: measurement error
  - type: expression
    normative_status: admitted
    designation: error of measurement
  - type: expression
    normative_status: admitted
    designation: error
