    type: accepted
  definition:
  - content: "{{incertitude-type,2.30}} obtenue en utilisant les {{incertitudes-types,2.30}}
      individuelles associées aux {{grandeurs d'entrée dans un modèle de mesure,2.50}}"
  examples: []
  id: 2.31-fra
  language_code: fra
  notes:
  - content: Lorsqu'il existe des corrélations entre les grandeurs d'entrée dans un
      modèle de mesure, il faut aussi prendre en compte des covariances dans le calcul
      de l'incertitude-type composée; voir aussi le Guide ISO/CEI 98-3:2008, 2.3.4.
