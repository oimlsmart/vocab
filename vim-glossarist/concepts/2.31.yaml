data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{standard measurement uncertainty,2.30}} that is obtained using the
      individual {{standard measurement uncertainties,2.30}} associated with the {{input
      quantities in a measurement model,2.50}}"
  examples: []
  id: 2.31-eng
  language_code: eng
  notes:
  - content: In case of correlations of input quantities in a measurement model, covariances
      must also be taken into account when calculating the combined standard measurement
      uncertainty; see also ISO/IEC Guide 98-3:2008, 2.3.4.
  - content: '[Annotation] Here "standard measurement uncertainty" can be replaced
      by "standard uncertainty" in both occurrences without ambiguity: "standard uncertainty
      that is obtained using the individual standard uncertainties associated with
      the input quantities in a measurement model".'
  sources:
  - origin:
      ref:
        source: JCGM 200:2012
      locality:
        type: clause
        reference_from: '2.31'
    type: authoritative
  terms:
  - type: expression
    normative_status: preferred
    designation: combined standard measurement uncertainty
  - type: expression
    normative_status: admitted
    designation: combined standard uncertainty
