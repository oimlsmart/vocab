  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{measurement standard,5.1}} that is used routinely to calibrate or
      verify {{measuring instruments,3.1}} or {{measuring systems,3.2}}"
  examples: []
  id: 5.7-eng
  language_code: eng
  notes:
  - content: A working measurement standard is usually calibrated with respect to
      a {{reference measurement standard,5.6}}.
  - content: In relation to {{verification,2.44}}, the terms “check standard” or “control
      standard” are also sometimes used.
  sources:
  - origin:
      ref:
        source: JCGM 200:2012
      locality:
        type: clause
        reference_from: '5.7'
    type: authoritative
  terms:
  - type: expression
    normative_status: preferred
    designation: working measurement standard
  - type: expression
    normative_status: admitted
    designation: working standard
