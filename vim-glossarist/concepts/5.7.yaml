  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{étalon,5.1}} qui est utilisé couramment pour étalonner ou contrôler
      des {{instruments de mesure,3.1}} ou des {{systèmes de mesure,3.2}}"
  examples: []
  id: 5.7-fra
  language_code: fra
  notes:
  - content: Un étalon de travail est habituellement étalonné par rapport à un {{étalon
      de référence,5.6}}.
  - content: Un étalon de travail servant à la {{vérification,2.44}} est aussi désigné
      comme «étalon de vérification» ou «étalon de contrôle».
