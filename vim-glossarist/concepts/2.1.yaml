data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: process of experimentally obtaining one or more {{quantity values,1.19}}
      that can reasonably be attributed to a {{quantity,1.1}}
  examples: []
  id: 2.1-eng
  language_code: eng
  notes:
  - content: Measurement does not apply to {{nominal properties,1.30}}.
  - content: Measurement implies comparison of quantities or counting of entities.
  - content: Measurement presupposes a description of the quantity commensurate with
      the intended use of a {{measurement result,2.9}}, a {{measurement procedure,2.6}},
      and a calibrated {{measuring system,3.2}} operating according to the specified
      measurement procedure, including the measurement conditions.
  - content: '[Annotation] "experimentally obtaining" in the definition is to be interpreted
      in a broad sense of including not only direct physical comparison, but also
      of using models and calculations that are based on theoretical considerations.'
  - content: '[Annotation] Here "quantity value" can be replaced with "value" without
      ambiguity: "process of experimentally obtaining one or more values that can
      reasonably be attributed to a quantity".'
  - content: "[Annotation] ANNOTATION (for Note 3) (informative) [3 December 2013]
      This Note is intended to explain what is needed in order to carry out a measurement.
      It is first necessary to choose a target measurement uncertainty, and then choose
      an appropriate procedure and measuring system for performing the measurement
      in order not to exceed the target uncertainty."
  sources:
  - origin:
      ref:
        source: JCGM 200:2012
      locality:
        type: clause
        reference_from: '2.1'
    type: authoritative
  terms:
  - type: expression
    normative_status: preferred
    designation: measurement
