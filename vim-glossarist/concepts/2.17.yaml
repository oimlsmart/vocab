data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: composante de l'{{erreur de mesure,2.16}} qui, dans des {{mesurages,2.1}}
      répétés, demeure constante ou varie de façon prévisible
  examples: []
  id: 2.17-fra
  language_code: fra
  notes:
  - content: La {{valeur de référence,5.18}} pour une erreur systématique est une
      {{valeur vraie,2.11}}, une {{valeur mesurée,2.10}} d'un {{étalon,5.1}} dont
      l'{{incertitude de mesure,2.26}} est négligeable, ou une {{valeur conventionnelle,2.12}}.
  - content: L'erreur systématique et ses causes peuvent être connues ou inconnues.
      On peut appliquer une {{correction,2.53}} pour compenser une erreur systématique
      connue.
  - content: L'erreur systématique est égale à la différence entre l'erreur de mesure
      et l'{{erreur aléatoire,2.19}}.
