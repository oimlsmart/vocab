data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: component of {{measurement error,2.16}} that in replicate {{measurements,2.1}}
      remains constant or varies in a predictable manner
  examples: []
  id: 2.17-eng
  language_code: eng
  notes:
  - content: A {{reference quantity value,5.18}} for a systematic measurement error
      is a {{true quantity value,2.11}}, or a {{measured quantity value,2.10}} of
      a {{measurement standard,5.1}} of negligible {{measurement uncertainty,2.26}},
      or a {{conventional quantity value,2.12}}.
  - content: Systematic measurement error, and its causes, can be known or unknown.
      A {{correction,2.53}} can be applied to compensate for a known systematic measurement
      error.
  - content: Systematic measurement error equals measurement error minus {{random
      measurement error,2.19}}.
  sources:
  - origin:
      ref:
        source: JCGM 200:2012
      locality:
        type: clause
        reference_from: '2.17'
    type: authoritative
  terms:
  - type: expression
    normative_status: preferred
    designation: systematic measurement error
  - type: expression
    normative_status: admitted
    designation: systematic error of measurement
  - type: expression
    normative_status: admitted
    designation: systematic error
