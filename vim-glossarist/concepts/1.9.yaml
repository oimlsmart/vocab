data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{grandeur,1.1}} scalaire réelle, définie et adoptée par convention,
      à laquelle on peut comparer toute autre grandeur de même {{nature,1.2}} pour
      exprimer le rapport des deux grandeurs sous la forme d'un nombre"
  examples: []
  id: 1.9-fra
  language_code: fra
  notes:
  - content: On désigne les unités de mesure par des noms et des symboles attribués
      par convention.
  - content: Les unités des grandeurs de même {{dimension,1.7}} peuvent être désignées
      par le même nom et le même symbole même si ces grandeurs ne sont pas de même
      nature. On emploie, par exemple, le nom «joule par kelvin» et le symbole J/K
      pour désigner à la fois une unité de capacité thermique et une unité d'entropie,
      bien que ces grandeurs ne soient généralement pas considérées comme étant de
      même nature. Toutefois, dans certains cas, des noms spéciaux sont utilisés exclusivement
      pour des grandeurs d'une nature spécifiée. C'est ainsi que l'unité seconde à
      la puissance moins un (1/s) est appelée hertz (Hz) pour les fréquences et becquerel
      (Bq) pour les activités de radionucléides.
  - content: Les unités des {{grandeurs sans dimension,1.8}} sont des nombres. Dans
      certains cas, on leur donne des noms spéciaux, par exemple radian, stéradian
      et décibel, ou on les exprime par des quotients comme la millimole par mole
      égale à 10–3, et le microgramme par kilogramme égal à 10–9.
  - content: Pour une grandeur donnée, le nom abrégé «unité» est souvent combiné avec
      le nom de la grandeur, par exemple «unité de masse».
