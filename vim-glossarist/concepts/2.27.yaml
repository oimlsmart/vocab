data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: composante de l'{{incertitude de mesure,2.26}} qui résulte de la quantité
      finie de détails dans la définition d'un {{mesurande,2.3}}
  examples: []
  id: 2.27-fra
  language_code: fra
  notes:
  - content: L'incertitude définitionnelle est l'incertitude minimale que l'on peut
      obtenir en pratique par tout {{mesurage,2.1}} d'un mesurande donné.
  - content: Toute modification des détails descriptifs conduit à une autre incertitude
      définitionnelle.
  - content: Dans le Guide ISO/CEI 98-3:2008, D.3.4, et dans la CEI 60359, le concept
      d'incertitude définitionnelle est appelé «incertitude intrinsèque».
  sources:
  - origin:
      ref:
        source: JCGM 200:2012
      locality:
        type: clause
        reference_from: '2.27'
    type: authoritative
  terms:
  - type: expression
    normative_status: preferred
    designation: incertitude définitionnelle
