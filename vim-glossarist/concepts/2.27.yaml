data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: component of {{measurement uncertainty,2.26}} resulting from the finite
      amount of detail in the definition of a {{measurand,2.3}}
  examples: []
  id: 2.27-eng
  language_code: eng
  notes:
  - content: Definitional uncertainty is the practical minimum measurement uncertainty
      achievable in any {{measurement,2.1}} of a given measurand.
  - content: Any change in the descriptive detail leads to another definitional uncertainty.
  - content: In the ISO/IEC Guide 98-3:2008, D.3.4, and in IEC 60359, the concept
      'definitional uncertainty' is termed “intrinsic uncertainty”.
  sources:
  - origin:
      ref:
        source: JCGM 200:2012
      locality:
        type: clause
        reference_from: '2.27'
    type: authoritative
  terms:
  - type: expression
    normative_status: preferred
    designation: definitional uncertainty
