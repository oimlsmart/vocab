data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: étroitesse de l'accord entre les {{indications,4.1}} ou les {{valeurs
      mesurées,2.10}} obtenues par des {{mesurages,2.1}} répétés du même objet ou
      d'objets similaires dans des conditions spécifiées
  examples: []
  id: 2.15-fra
  language_code: fra
  notes:
  - content: La fidélité est en général exprimée numériquement par des caractéristiques
      telles que l'écart-type, la variance ou le coefficient de variation dans les
      conditions spécifiées.
  - content: Les conditions spécifiées peuvent être, par exemple, des {{conditions
      de répétabilité,2.20}}, des {{conditions de fidélité intermédiaire,2.22}} ou
      des {{conditions de reproductibilité,2.24}} (voir l'ISO 5725-1:1994).
  - content: La fidélité sert à définir la {{répétabilité de mesure,2.21}}, la {{fidélité
      intermédiaire de mesure,2.23}} et la {{reproductibilité de mesure,2.25}}.
  - content: Le terme «fidélité de mesure» est quelquefois utilisé improprement pour
      désigner l'{{exactitude de mesure,2.13}}.
  sources:
