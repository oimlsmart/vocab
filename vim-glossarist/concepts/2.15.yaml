data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: closeness of agreement between {{indications,4.1}} or {{measured quantity
      values,2.10}} obtained by replicate {{measurements,2.1}} on the same or similar
      objects under specified conditions
  examples: []
  id: 2.15-eng
  language_code: eng
  notes:
  - content: Measurement precision is usually expressed numerically by measures of
      imprecision, such as standard deviation, variance, or coefficient of variation
      under the specified conditions of measurement.
  - content: The 'specified conditions' can be, for example, {{repeatability conditions
      of measurement,2.20}}, {{intermediate precision conditions of measurement,2.22}},
      or {{reproducibility conditions of measurement,2.24}} (see ISO 5725-1:1994).
  - content: Measurement precision is used to define {{measurement repeatability,2.21}},
      {{intermediate measurement precision,2.23}}, and {{measurement reproducibility,2.25}}.
  - content: Sometimes “measurement precision” is erroneously used to mean {{measurement
      accuracy,2.13}}.
  - content: '[Annotation] Here "quantity value" can be replaced with "value" without
      ambiguity: "closeness of agreement between indications or measured values obtained
      by replicate measurements on the same or similar objects under specified conditions".'
  sources:
  - origin:
      ref:
        source: JCGM 200:2012
      locality:
        type: clause
        reference_from: '2.15'
    type: authoritative
  terms:
  - type: expression
    normative_status: preferred
    designation: measurement precision
  - type: expression
    normative_status: admitted
    designation: precision
