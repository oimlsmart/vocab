data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: mathematical relation between {{numerical quantity values,1.20}}, based
      on a given {{quantity equation,1.22}} and specified {{measurement units,1.9}}
  examples:
  - content: For the {{quantities,1.1}} in Example 1 in item 1.22, {Q1} = ζ{Q2} {Q3}
      where {Q1}, {Q2}, and {Q3} denote the numerical values of Q1, Q2, and Q3, respectively,
      provided that they are expressed in either {{base units,1.10}} or {{coherent
      derived units,1.12}} or both.
  - content: In the quantity equation for kinetic energy of a particle, T= (1/2) mv2,
      if m= 2 kg and v= 3 m/s, then {T} = (1/2) ·2 ·32 is a numerical value equation
      giving the numerical value 9 of Tin joules.
  id: 1.25-eng
  language_code: eng
  notes:
  - content: '[Annotation] Here "numerical quantity value" can be replaced with "numerical
      value" in the definition without ambiguity: "mathematical relation between numerical
      values, based on a given quantity equation and specified measurement units".'
  sources:
  - origin:
      ref:
        source: JCGM 200:2012
      locality:
        type: clause
        reference_from: '1.25'
    type: authoritative
  terms:
  - type: expression
    normative_status: preferred
    designation: numerical value equation
  - type: expression
    normative_status: admitted
    designation: numerical quantity value equation
