data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: relation d'égalité entre des {{valeurs numériques,1.20}}, fondée sur
      une {{équation aux grandeurs,1.22}} donnée et des {{unités de mesure,1.9}} spécifiées
  examples:
  - content: |-
      EXEMPLE 1 Pour les {{grandeurs,1.1}} données dans l'Exemple 1 de 1.22, {Q1} = ζ {Q2} {Q3}, où {Q1}, {Q2} et {Q3} représentent respectivement les valeurs numériques de Q1, Q2 et Q3 lorsqu'elles sont exprimées en {{unités de base,1.10}} ou en {{unités dérivées cohérentes,1.12}} ou les deux.
      EXEMPLE 2 Pour l'équation de l'énergie cinétique d'une particule, T= (1/2) mv2, si m= 2 kg et v= 3 m/s, alors {T} = (1/2) ·2 · 32 est une équation aux valeurs numériques donnant la valeur numérique 9 pour Ten joules.
  id: 1.25-fra
  language_code: fra
  notes: []
  sources:
  - origin:
      ref:
        source: JCGM 200:2012
      locality:
        type: clause
        reference_from: '1.25'
    type: authoritative
  terms:
  - type: expression
    normative_status: preferred
    designation: équation aux valeurs numériques
