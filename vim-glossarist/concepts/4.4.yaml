data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: ensemble des {{valeurs,1.19}} comprises entre deux {{indications,4.1}}
      extrêmes arrondies ou approximatives, que l'on obtient pour une position particulière
      des commandes d'un {{instrument de mesure,3.1}} ou d'un {{système de mesure,3.2}}
      et qui sert à désigner cette position
  examples: []
  id: 4.4-fra
  language_code: fra
  notes:
  - content: Un intervalle nominal des indications est généralement exprimé en donnant
      la plus petite et la plus grande valeur, par exemple «100 V à 200 V».
  - content: Dans certains domaines, le terme anglais est «nominal range».
  sources:
