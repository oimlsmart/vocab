    type: accepted
  definition:
  - content: set of {{quantity values,1.19}}, bounded by rounded or approximate extreme
      {{indications,4.1}}, obtainable with a particular setting of the controls of
      a {{measuring instrument,3.1}} or {{measuring system,3.2}} and used to designate
      that setting
  examples: []
  id: 4.4-eng
  language_code: eng
  notes:
  - content: A nominal indication interval is usually stated as its smallest and greatest
      quantity values, for example “100 V to 200 V”.
  - content: In some fields, the term is “nominal range”.
  sources:
  - origin:
      ref:
        source: JCGM 200:2012
      locality:
        type: clause
        reference_from: '4.4'
    type: authoritative
  terms:
  - type: expression
    normative_status: preferred
    designation: nominal indication interval
  - type: expression
    normative_status: admitted
    designation: nominal interval
