data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{reference measurement procedure,2.7}} used to obtain a {{measurement
      result,2.9}} without relation to a {{measurement standard,5.1}} for a {{quantity,1.1}}
      of the same {{kind,1.2}}"
  examples:
  - content: The volume of water delivered by a 50 ml pipette at 20 °C is measured
      by weighing the water delivered by the pipette into a beaker, taking the mass
      of beaker plus water minus the mass of the initially empty beaker, and correcting
      the mass difference for the actual water temperature using the volumic mass
      (mass density).
  id: 2.8-eng
  language_code: eng
  notes:
  - content: The Consultative Committee for Amount of Substance – Metrology in Chemistry
      (CCQM) uses the term “primary method of measurement” for this concept.
  - content: Definitions of two subordinate concepts, which could be termed “direct
      primary reference measurement procedure” and “ratio primary reference measurement
      procedure”, are given by the CCQM (5th Meeting, 1999) [43].
  - content: '[Annotation] ANNOTATION (for Note 1) (informative) [9 June 2016] The
      terms "primary method", "primary method of measurement", and "primary measurement
      method" are more generally used for a method adopted to obtain a measurement
      result without relation to a measurement standard for a quantity of the same
      kind.'
  sources:
  - origin:
      ref:
        source: JCGM 200:2012
      locality:
        type: clause
        reference_from: '2.8'
    type: authoritative
  terms:
  - type: expression
    normative_status: preferred
    designation: primary reference measurement procedure
  - type: expression
    normative_status: admitted
    designation: primary reference procedure
