data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{procédure de mesure de référence,2.7}} utilisée pour obtenir un {{résultat
      de mesure,2.9}} sans relation avec un {{étalon,5.1}} d'une {{grandeur,1.1}}
      de même {{nature,1.2}}"
  examples:
  - content: EXEMPLE Le volume d'eau délivré par une pipette de 5 ml à 20 °C est mesuré
      en pesant l'eau délivrée par la pipette dans un bécher, en prenant la différence
      entre la masse du bécher contenant l'eau et la masse du bécher initialement
      vide, puis en corrigeant la différence de masse pour la température réelle de
      l'eau par l'intermédiaire de la masse volumique.
  id: 2.8-fra
  language_code: fra
  notes:
  - content: Le Comité consultatif pour la quantité de matière – Métrologie en chimie
      (CCQM) utilise pour ce concept le terme «méthode de mesure primaire».
  - content: Le CCQM a donné (5e réunion, 1999) [43] les définitions de deux concepts
      subordonnés, que l'on pourrait dénommer «procédure de mesure primaire directe»
      et «procédure primaire de mesure de rapports».
  - content: "[Annotation] ANNOTATION (pour la Note 1) (informative) [9 juin 2016]
      Les termes «méthode primaire», «méthode primaire de mesure» et «méthode de mesure
      primaire» sont généralement utilisés pour une méthode servant à obtenir un résultat
      de mesure sans relation avec un étalon d'une grandeur de même nature."
  sources:
