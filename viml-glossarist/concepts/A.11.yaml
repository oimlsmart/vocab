    type: accepted
  definition:
  - content: examen d’un objet de l’évaluation de la conformité et détermination de
      sa conformité à des exigences détaillées ou, sur la base d’un jugement professionnel,
      à des exigences générales
  examples: []
  id: A.11-fra
  notes:
  - content: 'à l’article: L’examen peut inclure des observations directes ou indirectes,
      qui peuvent comprendre des mesurages ou des données de sortie d’instruments.'
  - content: 'à l’article: Les systèmes particuliers d’évaluation de la conformité
      ou contrats peuvent définir l’inspection comme étant un simple examen.'
  - content: 'à l’article: Des informations supplémentaires sur les concepts d’essai
      et d’inspection sont données en A.3.4 [ISO/CEI 17000:2020, Annexe A].'
