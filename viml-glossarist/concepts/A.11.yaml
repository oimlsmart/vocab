    type: accepted
  definition:
  - content: examination of an object of conformity assessment and determination of
      its conformity with detailed requirements or, on the basis of professional judgement,
      with general requirements
  examples: []
  id: A.11-eng
  notes:
  - content: Examination can include direct or indirect observations, which can include
      measurements or the output of instruments.
  - content: Conformity assessment schemes or contracts can specify inspection as
      examination only.
  - content: Additional information on the concepts of testing and inspection is given
      in A.3.4 [ISO/IEC 17000:2020, Annex A].
  sources:
