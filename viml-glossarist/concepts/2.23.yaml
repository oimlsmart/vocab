data:
  dates:
  - date: '2022-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: manufacturer's declaration of conformity of {{measuring instruments,0.10}}
      to legal metrological requirements for {{initial verification,2.12}}; the declaration
      is permitted on condition that the manufacturer has a quality management system
      implemented and approved by a competent body
  examples: []
  id: 2.23-eng
  notes:
  - content: The {{national responsible body,1.04}} shall have in place a means for
      periodically validating the implementation of a manufacturer's quality management
      system.
  - content: The quality management program for {{measuring instruments,0.10}} shall
      be in accordance with legal metrological requirements for {{initial verification,2.12}}
      according to national laws or regulations for {{legal metrological control,2.01}}.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: initial verification of measuring instruments utilizing the manufacturer's
      quality management system
  language_code: eng
  entry_status: valid
