data:
  dates:
  - date: '2022-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: déclaration de conformité d'{{instruments de mesure,0.10}} aux exigences
      de métrologie légale applicables à la {{vérification primitive,2.12}} établie
      par le fabricant, la déclaration étant subordonnée à la mise en place d'un système
      de management de la qualité par le fabricant, approuvé par un organisme compétent
  examples: []
  id: 2.23-fra
  notes:
  - content: L'{{organisme national responsable,1.04}} doit avoir établi les moyens
      de valider périodiquement la mise en œuvre du système de management de la qualité
      du fabricant.
  - content: Le programme de management de la qualité des {{instruments de mesure,0.10}}
      doit être conforme aux exigences métrologiques légales applicables à la {{vérification
      primitive,2.12}}, conformément aux lois et règlements du {{contrôle de métrologie
      légale,2.01}}.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: vérification primitive d'instruments de mesure par recours au système
      de management de la qualité du fabricant
  - type: expression
    normative_status: admitted
    designation: vérification primitive par assurance de la qualité
  language_code: fra
  entry_status: valid
date_accepted: '2022-01-01T00:00:00+00:00'
