data:
  dates:
  - date: '2022-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: operation that, under specified conditions, in a first step, establishes
      a relation between the quantity values with measurement uncertainties provided
      by measurement standards and corresponding {{indications,0.03}} with associated
      measurement uncertainties and, in a second step, uses this information to establish
      a relation for obtaining a measurement result from an {{indication,0.03}}
  examples: []
  id: 0.14-eng
  notes:
  - content: A calibration may be expressed by a statement, calibration function,
      calibration diagram, calibration curve, or calibration table. In some cases,
      it may consist of an additive or multiplicative correction of the indication
      with associated measurement uncertainty.
  - content: Calibration should not be confused with {{adjustment of a measuring system,0.15}},
      often mistakenly called “self-calibration”, nor with verification of calibration.
  - content: Often, the first step alone in the above definition is perceived as being
      calibration.
  sources:
  - origin:
      ref:
        source: OIML V2-200:2012
      locality:
        type: clause
        reference_from: '2.39'
    type: authoritative
  terms:
  - type: expression
    normative_status: preferred
    designation: calibration
  language_code: eng
  entry_status: valid
