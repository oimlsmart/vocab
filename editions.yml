      description:
        eng: "Superseded by the 2022 edition. 135 terms across 8 sections covering basic concepts, legal metrology activities, documents and marks, instrument classification, construction and operation, software in legal metrology, and conformity assessment."
        fra: "Remplacée par l'édition 2022. 135 termes répartis en 8 sections couvrant les concepts de base, les activités de métrologie légale, les documents et marques, la classification des instruments, la construction et le fonctionnement, les logiciels en métrologie légale et l'évaluation de la conformité."

