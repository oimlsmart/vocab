        fra: "VIML (1968)"
      description:
        eng: "First edition, French only. 210 terms across 9 sections covering metrology, legal metrology, activities, documents and marks, quantities and units, measurements, measuring instruments and standards, instrument construction, and errors. OCR-derived dataset containing typographical errors."
        fra: "Première édition, en français uniquement. 210 termes répartis en 9 sections couvrant la métrologie, la métrologie légale, les activités, les documents et marques, les grandeurs et unités, les mesurages, les instruments de mesure et les étalons, la construction des instruments, et les erreurs. Jeu de données issu d'une OCR contenant des erreurs typographiques."

