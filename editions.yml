# Single source of truth for VIML editions.
#
# Every scraper, builder, and deployment config reads from this file.
# The supersedes chain: 2022 → 2013 → 2000 → 1968
#
# URN resolution:
#   urn:oiml:pub:v:1:2022                     → viml-2022 dataset
#   urn:oiml:pub:v:1:2022:concept:0.01        → concept 0.01 in viml-2022
#   urn:oiml:pub:v:1:2013:concept:2.05        → concept 2.05 in viml-2013

schema_version: "1"

editions:
  - id: viml-2022
    ref: "OIML V 1:2022"
    year: 2022
    urn_prefix: "urn:oiml:pub:v:1:2022"
    dataset_path: datasets/viml-2022
    languages: [eng, fra]
    status: current
    supersedes: viml-2013
    concept_count: 135
    sections:
      "0": "Basic terms"
      "1": "Metrology and its legal aspects"
      "2": "Legal metrology activities"
      "3": "Documents and marks within legal metrology"
      "4": "Classification of measuring instruments"
      "5": "Construction and operation of measuring instruments"
      "6": "Software in legal metrology"
      "A": "Terms relating to conformity assessment"
    sections_fra:
      "0": "Termes fondamentaux"
      "1": "Métrologie et ses aspects légaux"
      "2": "Activités de métrologie légale"
      "3": "Documents et marques en métrologie légale"
      "4": "Classification des instruments de mesure"
      "5": "Construction et fonctionnement des instruments de mesure"
      "6": "Logiciel en métrologie légale"
      "A": "Termes relatifs à l'évaluation de la conformité"
    source:
      format: website
      url: http://viml.oiml.info
      scraper: scripts/scrape_viml.rb
    deploy:
      color: "#004996"
      title: "VIML — International Vocabulary of Legal Metrology"
      title_fra: "VIML — Vocabulaire international de métrologie légale"

