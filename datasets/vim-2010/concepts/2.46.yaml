data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: comparabilité de résultats de mesure, pour des grandeurs d'une nature
      donnée, qui sont métrologiquement traçables à une même référence EXEMPLE Des
      résultats de mesure pour les distances entre la Terre et la Lune et entre Paris
      et Londres sont métrologiquement comparables s'ils sont métrologiquement traçables
      à la même unité de mesure, par exemple le mètre.
  examples: []
  id: 2.46-fra
  language_code: fra
  notes:
  - content: Voir la note 1 de 2.41, traçabilité métrologique.
  - content: La comparabilité métrologique ne nécessite pas que les valeurs mesurées
      et les incertitudes de mesure associées soient du même ordre de grandeur. _________________________________________________________________________________________________________________________________________________________________________________________________________________________
  terms:
  - type: expression
    normative_status: preferred
    designation: comparabilité métrologique, f
