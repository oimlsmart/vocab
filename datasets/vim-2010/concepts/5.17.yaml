  examples:
  - content: a) Valeurs des constantes physiques fondamentales, évaluées et recommandées
      régulièrement par le CODATA de l’ICSU. b) Valeurs des masses atomiques relatives
      des éléments, appelées aussi valeurs des poids atomiques, évaluées tous les
      deux ans par l’IUPAC-CIAAW, approuvées par l’Assemblée générale de l’IUPAC et
      publiées dans Pure Appl. Chem.
