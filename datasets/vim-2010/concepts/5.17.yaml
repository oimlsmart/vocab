  definition:
  - content: reference data issued by a recognized authority
  examples:
  - content: a) Values of the fundamental physical constants, as regularly evaluated
      and recommended by CODATA of ICSU. b) Relative atomic mass values, also called
      atomic weight values, of the elements, as evaluated every two years by IUPAC-CIAAW,
      approved by the IUPAC General Assembly, and published in Pure Appl. Chem..
