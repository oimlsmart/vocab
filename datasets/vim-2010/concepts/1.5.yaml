  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: grandeur définie, dans un système de grandeurs, en fonction des grandeurs
      de base de ce système
  examples:
  - content: Dans un système de grandeurs ayant pour grandeurs de base la longueur
      et la masse, la masse volumique est une grandeur dérivée définie comme le quotient
      d'une masse par un volume (longueur au cube).
  id: 1.5-fra
  language_code: fra
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: grandeur dérivée, f
