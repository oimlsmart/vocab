data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: ensemble de valeurs attribuées à un mesurande, complété par toute autre
      information pertinente disponible
  examples: []
  id: 2.9-fra
  language_code: fra
  notes:
  - content: Un résultat de mesure contient généralement des informations pertinentes
      sur l'ensemble de valeurs, certaines pouvant être plus représentatives du mesurande
      que d'autres. Cela peut s'exprimer sous la forme d'une fonction de densité de
      probabilité.
  - content: Le résultat de mesure est généralement exprimé par une valeur mesurée
      unique et une incertitude de mesure. Si l'on considère l'incertitude de mesure
      comme négligeable dans un certain but, le résultat de mesure peut être exprimé
      par une seule valeur mesurée. Dans de nombreux domaines, c'est la manière la
      plus usuelle d'exprimer un résultat de mesure.
  - content: Dans la littérature traditionnelle et dans l'édition précédente du VIM,
      le résultat de mesure était défini comme une valeur attribuée à un mesurande
      et pouvait se référer à une indication, un résultat brut ou un résultat corrigé,
      selon le contexte.
  terms:
  - type: expression
    normative_status: preferred
    designation: résultat de mesure
    grammar_info:
    - gender: m
  - type: expression
    normative_status: admitted
    designation: résultat d'un mesurage
    grammar_info:
    - gender: m
