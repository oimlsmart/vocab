data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: set of quantity values being attributed to a measurand together with
      any other available relevant information
  examples: []
  id: 2.9-eng
  language_code: eng
  notes:
  - content: A measurement result generally contains “relevant information” about
      the set of quantity values, such that some may be more representative of the
      measurand than others. This may be expressed in the form of a probability density
      function (PDF).
  - content: A measurement result is generally expressed as a single measured quantity
      value and a measurement uncertainty. If the measurement uncertainty is considered
      to be negligible for some purpose, the measurement result may be expressed as
      a single measured quantity value. In many fields, this is the common way of
      expressing a measurement result.
  - content: In the traditional literature and in the previous edition of the VIM,
      measurement result was defined as a value attributed to a measurand and explained
      to mean an indication, or an uncorrected result, or a corrected result, according
      to the context.
  terms:
  - type: expression
    normative_status: preferred
    designation: measurement result
  - type: expression
    normative_status: admitted
    designation: result of measurement
