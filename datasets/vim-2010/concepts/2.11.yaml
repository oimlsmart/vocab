data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: quantity value consistent with the definition of a quantity
  examples: []
  id: 2.11-eng
  language_code: eng
  notes:
  - content: In the Error Approach to describing measurement, a true quantity value
      is considered unique and, in practice, unknowable. The Uncertainty Approach
      is to recognize that, owing to the inherently incomplete amount of detail in
      the definition of a quantity, there is not a single true quantity value but
      rather a set of true quantity values consistent with the definition. However,
      this set of values is, in principle and in practice, unknowable. Other approaches
      dispense altogether with the concept of true quantity value and rely on the
      concept of metrological compatibility of measurement results for assessing their
      validity.
  - content: In the special case of a fundamental constant, the quantity is considered
      to have a single true quantity value.
  - content: When the definitional uncertainty associated with the measurand is considered
      to be negligible compared to the other components of the measurement uncertainty,
      the measurand may be considered to have an “essentially unique” true quantity
      value. This is the approach taken by the GUM and associated documents, where
      the word “true” is considered to be redundant.
  terms:
  - type: expression
    normative_status: preferred
    designation: true quantity value
  - type: expression
    normative_status: admitted
    designation: true value of a quantity
  - type: expression
    normative_status: admitted
    designation: true value
