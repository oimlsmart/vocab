data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: valeur vraie d'une grandeur, f valeur d'une grandeur compatible avec
      la définition de la grandeur
  examples: []
  id: 2.11-fra
  language_code: fra
  notes:
  - content: Dans l'approche « erreur » de description des mesurages, la valeur vraie
      est considérée comme unique et, en pratique, impossible à connaître. L'approche
      « incertitude » consiste à reconnaître que, par suite de la quantité intrinsèquement
      incomplète de détails dans la définition d'une grandeur, il n'y a pas une seule
      valeur vraie mais plutôt un ensemble de valeurs vraies compatibles avec la définition.
      Toutefois, cet ensemble de valeurs est, en principe et en pratique, impossible
      à connaître. D'autres approches évitent complètement le concept de valeur vraie
      et évaluent la validité des résultats de mesure à l'aide du concept de compatibilité
      de mesure.
  - content: Dans le cas particulier des constantes fondamentales, on considère la
      grandeur comme ayant une seule valeur vraie.
  - content: Lorsque l'incertitude définitionnelle associée au mesurande est considérée
      comme négligeable par rapport aux autres composantes de l'incertitude de mesure,
      on peut considérer que le mesurande a une valeur vraie par essence unique. C'est
      l'approche adoptée dans le GUM, où le mot « vraie » est considéré comme redondant.
  terms:
  - type: expression
    normative_status: preferred
    designation: valeur vraie, f
date_accepted: '2010-01-01T00:00:00+00:00'
