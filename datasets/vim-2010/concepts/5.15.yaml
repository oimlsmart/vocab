data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: propriété d'un matériau de référence, exprimée par l'étroitesse de l'accord
      entre, d'une part, la relation entre les résultats de mesure obtenus pour une
      grandeur déterminée de ce matériau en utilisant deux procédures de mesure données
      et, d'autre part, la relation entre les résultats de mesure pour d'autres matériaux
      spécifiés
  examples: []
  id: 5.15-fra
  language_code: fra
  notes:
  - content: Le matériau de référence en question est généralement un étalon et les
      autres matériaux spécifiés sont généralement des spécimens courants.
  - content: Les procédures de mesure mentionnées dans la définition sont celle qui
      précède et celle qui suit le matériau de référence utilisé comme étalon dans
      une hiérarchie d'étalonnage (voir l'ISO 17511).
  - content: Il convient de vérifier régulièrement la stabilité des matériaux de référence
      commutables.
  terms:
  - type: expression
    normative_status: preferred
    designation: commutabilité d'un matériau de référence, f
date_accepted: '2010-01-01T00:00:00+00:00'
entry_status: valid
id: dbdcbec5-6307-4615-92d1-97a9c3e3f023
