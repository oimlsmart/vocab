  definition:
  - content: étalon reconnu par les signataires d'un accord international pour une
      utilisation mondiale EXEMPLES a) Le prototype international du kilogramme. b)
      Gonadotrophine chorionique, 4e étalon international de l'Organisation mondiale
      de la santé (OMS), 1999, 75/589, 650 unités internationales par ampoule. c)
      Eau océanique moyenne normalisée de Vienne (VSMOW2), distribuée par l'Agence
      internationale pour l’énergie atomique (AIEA) pour des mesurages de rapports
      molaires différentiels relatifs d’isotopes stables.
