data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: ensemble d'un nombre et d'une référence constituant l’expression quantitative
      d’une grandeur
  examples:
  - content: a) Longueur d'une tige donnée b) Masse d'un corps donné c) Courbure d'un
      arc donné d) Température Celsius d'un spécimen donné e) Impédance électrique
      d'un élément de circuit donné à une fréquence f) g) h) i) j) donnée, où j est
      l'unité imaginaire Indice de réfraction d'un spécimen donné de verre Dureté
      C de Rockwell d'un spécimen donné Fraction massique de cadmium dans un spécimen
      donné de cuivre Molalité de Pb2+ dans un spécimen donné d'eau Concentration
      arbitraire en quantité de matière de lutropine dans un spécimen donné de plasma
      sanguin humain en utilisant l’étalon international 80/552 de l’OMS 5,34 m ou
      534 cm 0,152 kg ou 152 g 112 m−1 −5 ºC (7 + 3j) Ω 1,32 43,5 HRC 3 µg/kg ou 3
      × 10−9 1,76 µmol/kg 5,0 UI/l, où « UI » signifie « unité internationale de l’OMS
      »
  - content: Force agissant sur une particule donnée, par exemple en coordonnées cartésiennes
      (Fx ; Fy ; Fz) = (31,5 ; 43,2 ; 17,0) N.
  id: 1.19-fra
  language_code: fra
  notes:
  - content: Selon le type de référence, la valeur d'une grandeur est  soit le produit
      d'un nombre et d'une unité de mesure (voir les exemples a, b, c, d, e, h et
      i) ; l'unité un est généralement omise pour les grandeurs sans dimension (voir
      f et h) ;  soit un nombre et la référence à une procédure de mesure (voir g)
      ;  soit un nombre et un matériau de référence (voir j).
  - content: Le nombre peut être complexe (voir l'exemple e).
  - content: La valeur d'une grandeur peut être représentée de plus d'une façon (voir
      a, b et h).
  - content: Dans le cas de grandeurs vectorielles ou tensorielles, chaque composante
      a une valeur.
  terms:
  - type: expression
    normative_status: preferred
    designation: valeur d'une grandeur, f
  - type: expression
    normative_status: admitted
    designation: valeur, f
date_accepted: '2010-01-01T00:00:00+00:00'
