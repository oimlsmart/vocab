data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: propriété d'un résultat de mesure selon laquelle ce résultat peut être
      relié à une référence par l'intermédiaire d'une chaîne ininterrompue et documentée
      d'étalonnages dont chacun contribue à l'incertitude de mesure
  examples: []
  id: 2.41-fra
  language_code: fra
  notes:
  - content: La référence mentionnée dans la définition peut être une définition d'une
      unité de mesure sous la forme de sa réalisation pratique, une procédure de mesure,
      qui indique l'unité de mesure dans la cas d'une grandeur autre qu'une grandeur
      ordinale, ou un étalon.
  - content: La traçabilité métrologique nécessite l'existence d'une hiérarchie d'étalonnage.
  - content: La spécification de la référence doit comprendre la date où cette référence
      a été utilisée dans l'établissement d'une hiérarchie d'étalonnage, ainsi que
      d'autres informations métrologiques pertinentes concernant la référence, telles
      que la date où a été effectué le premier étalonnage de la hiérarchie.
  - content: Pour des mesurages comportant plus d'une seule grandeur d'entrée dans
      le modèle de mesure, chaque valeur d'entrée devrait être elle-même métrologiquement
      traçable et la hiérarchie d'étalonnage peut prendre la forme d'une structure
      ramifiée ou d'un réseau. Il convient que l'effort consacré à établir la traçabilité
      métrologique de chaque valeur d'entrée soit proportionné à sa contribution relative
      au résultat de mesure.
  - content: La traçabilité métrologique d'un résultat de mesure n'assure pas l'adéquation
      de l'incertitude de mesure à un but donné ou l'absence d'erreurs humaines.
  - content: Une comparaison entre deux étalons peut être considérée comme un étalonnage
      si elle sert à vérifier et, si nécessaire, à corriger la valeur et l'incertitude
      attribuées à l'un des étalons.
  - content: L'ILAC considère que les éléments nécessaires pour confirmer la traçabilité
      métrologique sont une chaîne de traçabilité métrologique ininterrompue à un
      étalon international ou un étalon national, une incertitude de mesure documentée,
      une procédure de mesure documentée, une compétence technique reconnue, la traçabilité
      métrologique au SI et des intervalles entre étalonnages (voir ILAC P-10:2002).
  - content: Le terme abrégé « traçabilité » est quelquefois employé pour désigner
      la traçabilité métrologique, ainsi que d'autres concepts tels que la traçabilité
      d'un spécimen, d'un document, d'un instrument ou d'un matériau, où intervient
      l'historique (la trace) d'une entité. Il est donc préférable d'utiliser le terme
      complet « traçabilité métrologique » s'il y a risque de confusion.
  terms:
  - type: expression
    normative_status: preferred
    designation: traçabilité métrologique, f
