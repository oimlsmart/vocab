data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: processus consistant à obtenir expérimentalement une ou plusieurs valeurs
      que l'on peut raisonnablement attribuer à une grandeur
  examples: []
  id: 2.1-fra
  language_code: fra
  notes:
  - content: Les mesurages ne s'appliquent pas aux propriétés qualitatives.
  - content: Un mesurage implique la comparaison de grandeurs ou le comptage d'entités.
  - content: Un mesurage suppose une description de la grandeur compatible avec l'usage
      prévu d'un résultat de mesure, une procédure de mesure et un système de mesure
      étalonné fonctionnant selon la procédure de mesure spécifiée, incluant les conditions
      de mesure.
  terms:
  - type: expression
    normative_status: preferred
    designation: mesurage, m
  - type: expression
    normative_status: admitted
    designation: mesure, f
date_accepted: '2010-01-01T00:00:00+00:00'
