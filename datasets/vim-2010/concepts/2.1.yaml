data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: process of experimentally obtaining one or more quantity values that
      can reasonably be attributed to a quantity
  examples: []
  id: 2.1-eng
  language_code: eng
  notes:
  - content: Measurement does not apply to nominal properties.
  - content: Measurement implies comparison of quantities or counting of entities.
  - content: Measurement presupposes a description of the quantity commensurate with
      the intended use of a measurement result, a measurement procedure, and a calibrated
      measuring system operating according to the specified measurement procedure,
      including the measurement conditions.
  terms:
  - type: expression
    normative_status: preferred
    designation: measurement
