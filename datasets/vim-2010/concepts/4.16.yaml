    type: accepted
  definition:
  - content: largest change in a value of a quantity being measured that causes no
      detectable change in the corresponding indication Note Discrimination threshold
      may depend on, e.g., noise (internal or external) or friction. It can also depend
      on the value of the quantity being measured and how the change is applied.
  examples: []
  id: 4.16-eng
  language_code: eng
  notes: []
