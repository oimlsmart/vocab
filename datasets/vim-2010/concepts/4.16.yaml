    type: accepted
  definition:
  - content: variation la plus grande de la valeur d'une grandeur mesurée qui ne produit
      aucune variation détectable de l'indication correspondante Note Le seuil de
      discrimination peut dépendre, par exemple, du bruit (interne ou externe) ou
      du frottement. Il peut aussi dépendre de la valeur de la grandeur mesurée et
      de la manière dont la variation est appliquée.
