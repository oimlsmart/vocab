data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: quantity for which all the exponents of the factors corresponding to
      the base quantities in its quantity dimension are zero
  examples:
  - content: Plane angle, solid angle, refractive index, relative permeability, mass
      fraction, friction factor, Mach number.
  - content: Number of turns in a coil, number of molecules in a given sample, degeneracy
      of the energy levels of a quantum system.
  id: 1.8-eng
  language_code: eng
  notes:
  - content: The term “dimensionless quantity” is commonly used and is kept here for
      historical reasons. It stems from the fact that all exponents are zero in the
      symbolic representation of the dimension for such quantities. The term “quantity
      of dimension one” reflects the convention in which the symbolic representation
      of the dimension for such quantities is the symbol 1 (see ISO 31-0:1992, subclause
      2.2.6).
  - content: The measurement units and values of quantities of dimension one are numbers,
      but such quantities convey more information than a number.
  - content: Some quantities of dimension one are defined as the ratios of two quantities
      of the same kind.
  - content: Numbers of entities are quantities of dimension one.
  terms:
  - type: expression
    normative_status: preferred
    designation: quantity of dimension one
  - type: expression
    normative_status: admitted
    designation: dimensionless quantity
date_accepted: '2010-01-01T00:00:00+00:00'
