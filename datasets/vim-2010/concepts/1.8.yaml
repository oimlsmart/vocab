data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: grandeur de dimension un, f grandeur pour laquelle tous les exposants
      des facteurs correspondant aux grandeur de base dans sa dimension sont nuls
  examples: []
  id: 1.8-fra
  language_code: fra
  notes:
  - content: Le terme « grandeur sans dimension » est d'usage courant en français.
      Il provient du fait que tous les exposants sont nuls dans la représentation
      symbolique de la dimension de telles grandeurs. Le terme « grandeur de dimension
      un » reflète la convention selon laquelle la représentation symbolique de la
      dimension de telles grandeurs est le symbole 1 (voir l'ISO 31-0:1992, paragraphe
      2.2.6).
  - content: Les unités de mesure et les valeurs des grandeurs sans dimension sont
      des nombres, mais ces grandeurs portent plus d'information qu'un nombre.
  - content: Certaines grandeurs sans dimension sont définies comme des rapports de
      deux grandeurs de même nature. EXEMPLES Angle plan, angle solide, indice de
      réfraction, perméabilité relative, fraction massique, facteur de frottement,
      nombre de Mach.
  - content: Les nombres d'entités sont des grandeurs sans dimension. EXEMPLES Nombre
      de tours dans une bobine, nombre de molécules dans un spécimen donné, dégénérescence
      des niveaux d'énergie d'un système quantique.
  terms:
  - type: expression
    normative_status: preferred
    designation: grandeur sans dimension, f
date_accepted: '2010-01-01T00:00:00+00:00'
