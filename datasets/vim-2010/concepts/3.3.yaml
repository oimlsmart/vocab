  definition:
  - content: measuring instrument providing an output signal carrying information
      about the value of the quantity being measured
  examples:
  - content: a) Voltmeter, b) micrometer, c) thermometer, d) electronic balance.
  id: 3.3-eng
  language_code: eng
  notes:
  - content: An indicating measuring instrument may provide a record of its indication.
  - content: An output signal may be presented in visual or acoustic form. It may
      also be transmitted to one or more other devices.
