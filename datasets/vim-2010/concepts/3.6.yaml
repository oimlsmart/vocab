data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: measuring instrument reproducing or supplying, in a permanent manner
      during its use, quantities of one or more given kinds, each with an assigned
      quantity value
  examples:
  - content: a) Standard weight, b) volume measure (supplying one or several quantity
      values, with or without a quantity-value scale), c) standard electric resistor,
      d) line scale (ruler), e) gauge block, f) standard signal generator, g) certified
      reference material.
  id: 3.6-eng
  language_code: eng
  notes:
  - content: The indication of a material measure is its assigned quantity value.
  - content: A material measure can be a measurement standard.
  terms:
  - type: expression
    normative_status: preferred
    designation: material measure
