data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: instrument de mesure qui reproduit ou fournit, d'une manière permanente
      pendant son emploi, des grandeurs d'une ou plusieurs natures, chacune avec une
      valeur assignée
  examples:
  - content: a) Masse marquée, b) mesure de capacité (fournissant une ou plusieurs
      valeurs, avec ou sans échelle de valeurs), c) résistance électrique étalon,
      d) règle graduée, e) cale étalon, f) générateur de signaux étalons, g) matériau
      de référence certifié.
  id: 3.6-fra
  language_code: fra
  notes:
  - content: L'indication d'une mesure matérialisée est sa valeur assignée.
  - content: Une mesure matérialisée peut être un étalon.
  terms:
  - type: expression
    normative_status: preferred
    designation: mesure matérialisée
    grammar_info:
    - gender: f
date_accepted: '2010-01-01T00:00:00+00:00'
entry_status: valid
