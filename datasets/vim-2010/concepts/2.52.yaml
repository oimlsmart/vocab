data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: quantity that, in a direct measurement, does not affect the quantity
      that is actually measured, but affects the relation between the indication and
      the measurement result
  examples:
  - content: a) Frequency in the direct measurement with an ammeter of the constant
      amplitude of an alternating current. b) Amount-of-substance concentration of
      bilirubin in a direct measurement of haemoglobin amount-ofsubstance concentration
      in human blood plasma. c) Temperature of a micrometer used for measurement of
      length of a rod, but not the temperature of the rod itself, which can enter
      into the definition of the measurand. d) Background pressure in the ion source
      of a mass spectrometer during a measurement of amount-ofsubstance fraction.
  id: 2.52-eng
  language_code: eng
  notes:
  - content: An indirect measurement involves a combination of direct measurements,
      each of which may be affected by influence quantities.
  - content: In the GUM, the concept ‘influence quantity’ is defined as in the 2nd
      edition of the VIM, covering not only the quantities affecting the measuring
      system, as in the definition above, but also those quantities that affect the
      quantities actually measured. Also, in the GUM this concept is not restricted
      to direct measurements. 2.53 (3.15) (3.16) correction compensation for an estimated
      systematic effect
  - content: See GUM, 3.2.3 for explanation of ‘systematic effect’.
  - content: The compensation can take different forms, such as an addend or a factor,
      or can be deduced from a table.
  terms:
  - type: expression
    normative_status: preferred
    designation: influence quantity
date_accepted: '2010-01-01T00:00:00+00:00'
