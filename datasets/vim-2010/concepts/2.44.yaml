data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: fourniture de preuves tangibles qu'une entité donnée satisfait à des
      exigences spécifiées
  examples:
  - content: a) Confirmation qu'un matériau de référence donné est bien, comme déclaré,
      homogène pour la valeur et la procédure de mesure concernées jusqu'à des prises
      de mesure de masse 10 mg. b) Confirmation que des propriétés relatives aux performances
      ou des exigences légales sont satisfaites par un système de mesure. c) Confirmation
      qu'une incertitude cible peut être atteinte.
  id: 2.44-fra
  language_code: fra
  notes:
  - content: S'il y a lieu, il convient de prendre en compte l'incertitude de mesure.
  - content: L'entité peut être, par exemple, un processus, une procédure de mesure,
      un matériau, un composé ou un système de mesure.
  - content: Les exigences spécifiées peuvent être, par exemple, les spécifications
      d'un fabricant.
  - content: La vérification en métrologie légale, comme définie dans le VIML[1],
      et plus généralement en évaluation de la conformité, comporte l'examen et le
      marquage et/ou la délivrance d'un certificat de vérification pour un système
      de mesure.
  - content: Il convient de ne pas confondre la vérification avec l'étalonnage. Toute
      vérification n'est pas une validation.
  - content: En chimie, la vérification de l'identité d'une entité, ou celle d'une
      activité, nécessite une description de la structure ou des propriétés de cette
      entité ou activité.
  terms:
  - type: expression
    normative_status: preferred
    designation: vérification
    grammar_info:
    - gender: f
date_accepted: '2010-01-01T00:00:00+00:00'
