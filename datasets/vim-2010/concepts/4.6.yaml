data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: valeur arrondie ou approximative d'une grandeur caractéristique d'un
      instrument de mesure ou d'un système de mesure, qui sert de guide pour son utilisation
      appropriée
  examples:
  - content: a) La valeur 100 Ω marquée sur une résistance étalon. b) La valeur 1000
      ml marquée sur une fiole jaugée à un trait. c) La valeur 0,1 mol/l de la concentration
      en quantité de matière d'une solution d'acide chlorhydrique, HCl. d) La valeur
      20 °C d'une température Celsius maximale de stockage. Note En anglais, il convient
      de ne pas utiliser « nominal quantity value » et « nominal value » pour la valeur
      d’une propriété qualitative (en anglais « nominal property value »).
  id: 4.6-fra
  language_code: fra
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: valeur nominale, f
date_accepted: '2010-01-01T00:00:00+00:00'
entry_status: valid
id: 4a5da497-2c2f-4480-9823-b60dce86e9b9
