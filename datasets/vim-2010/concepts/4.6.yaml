data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: rounded or approximate value of a characterizing quantity of a measuring
      instrument or measuring system that provides guidance for its appropriate use
  examples:
  - content: a) 100 Ω as the nominal quantity value marked on a standard resistor.
      b) 1000 ml as the nominal quantity value marked on a single-mark volumetric
      flask. c) mol/l as the nominal quantity value for amount-of-substance concentration
      of a solution of hydrogen chloride, HCl. d) 20 °C as a maximum Celsius temperature
      for storage. Note Nominal quantity value” and “nominal value” should not be
      used for ‘nominal property value’, see 1.29, Note 2.
  id: 4.6-eng
  language_code: eng
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: nominal quantity value
  - type: expression
    normative_status: admitted
    designation: nominal value
date_accepted: '2010-01-01T00:00:00+00:00'
entry_status: valid
id: c19d86d2-33b5-44cd-9680-7e5ed34ef6f0
