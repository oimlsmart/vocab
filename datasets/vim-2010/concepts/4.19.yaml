    type: accepted
  definition:
  - content: propriété d'un instrument de mesure selon laquelle celui-ci conserve
      ses propriétés métrologiques constantes au cours du temps Note La stabilité
      d'un instrument de mesure peut être exprimée quantitativement de plusieurs façons.
      EXEMPLES a) Par la durée d'un intervalle de temps au cours duquel une propriété
      métrologique évolue d'une quantité donnée. b) Par la variation d'une propriété
      au cours d'un intervalle de temps déterminé.
  examples: []
  id: 4.19-fra
  language_code: fra
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: stabilité, f
  - type: expression
    normative_status: admitted
    designation: constance, f
