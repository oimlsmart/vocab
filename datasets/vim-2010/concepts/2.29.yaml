    type: accepted
  definition:
  - content: evaluation of a component of measurement uncertainty determined by means
      other than a Type A evaluation of measurement uncertainty
  examples:
  - content: Evaluation based on information  associated with authoritative published
      quantity values,  associated with the quantity value of a certified reference
      material,  obtained from a calibration certificate,  about drift,  obtained
      from the accuracy class of a verified measuring instrument,  obtained from
      limits deduced through personal experience. Note See also GUM, 2.3.3.
  id: 2.29-eng
  language_code: eng
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Type B evaluation of measurement uncertainty
  - type: expression
    normative_status: admitted
    designation: Type B evaluation
