data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: évaluation d'une composante de l'incertitude de mesure par d'autres moyens
      qu'une évaluation de type A de l'incertitude
  examples:
  - content: Évaluation fondée sur des informations  associées à des valeurs publiées
      faisant autorité,  associés à la valeur d'un matériau de référence certifié,
       obtenues à partir d'un certificat d'étalonnage,  concernant la dérive, 
      obtenues à partir de la classe d'exactitude d'un instrument de mesure vérifié,
       obtenues à partir de limites déduites de l'expérience personnelle
  id: 2.29-fra
  language_code: fra
  notes:
  - content: Note Voir aussi le GUM, 2.3.3.
  terms:
  - type: expression
    normative_status: preferred
    designation: évaluation de type B de l'incertitude
    grammar_info:
    - gender: f
  - type: expression
    normative_status: admitted
    designation: évaluation de type B
    grammar_info:
    - gender: f
