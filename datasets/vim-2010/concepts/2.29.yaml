  definition:
  - content: évaluation d'une composante de l'incertitude de mesure par d'autres moyens
      qu'une évaluation de type A de l'incertitude EXEMPLES Évaluation fondée sur
      des informations  associées à des valeurs publiées faisant autorité,  associés
      à la valeur d'un matériau de référence certifié,  obtenues à partir d'un certificat
      d'étalonnage,  concernant la dérive,  obtenues à partir de la classe d'exactitude
      d'un instrument de mesure vérifié,  obtenues à partir de limites déduites de
      l'expérience personnelle. Note Voir aussi le GUM, 2.3.3.
