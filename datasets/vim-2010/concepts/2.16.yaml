data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: différence entre la valeur mesurée d’une grandeur et une valeur de référence
  examples: []
  id: 2.16-fra
  language_code: fra
  notes:
  - content: Le concept d'erreur peut être utilisé a) lorsqu'il existe une valeur
      de référence unique à laquelle se rapporter, ce qui a lieu si on effectue un
      étalonnage au moyen d'un étalon dont la valeur mesurée a une incertitude de
      mesure négligeable ou si on prend une valeur conventionnelle, l'erreur étant
      alors connue ; b) si on suppose le mesurande représenté par une valeur vraie
      unique ou un ensemble de valeurs vraies d'étendue négligeable, l'erreur étant
      alors inconnue.
  - content: Il convient de ne pas confondre l'erreur de mesure avec une erreur de
      production ou une erreur humaine.
  terms:
  - type: expression
    normative_status: preferred
    designation: erreur de mesure, f
  - type: expression
    normative_status: admitted
    designation: erreur, f
date_accepted: '2010-01-01T00:00:00+00:00'
