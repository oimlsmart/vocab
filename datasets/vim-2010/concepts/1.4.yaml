data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: quantity in a conventionally chosen subset of a given system of quantities,
      where no subset quantity can be expressed in terms of the others
  examples:
  - content: The set of base quantities in the International System of Quantities
      (ISQ) is given in 1.6.
  id: 1.4-eng
  language_code: eng
  notes:
  - content: The subset mentioned in the definition is termed the “set of base quantities”.
  - content: Base quantities are referred to as being mutually independent since a
      base quantity cannot be expressed as a product of powers of the other base quantities.
  - content: '''Number of entities'' can be regarded as a base quantity in any system
      of quantities.'
  terms:
  - type: expression
    normative_status: preferred
    designation: base quantity
date_accepted: '2010-01-01T00:00:00+00:00'
