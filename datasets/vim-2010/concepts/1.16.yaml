data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: système d'unités fondé sur le Système international de grandeurs, comportant
      les noms et symboles des unités, une série de préfixes avec leurs noms et symboles,
      ainsi que des règles pour leur emploi, adopté par la Conférence générale des
      poids et mesures (CGPM)
  examples: []
  id: 1.16-fra
  language_code: fra
  notes:
  - content: Le SI est fondé sur les sept grandeurs de base de l’ISQ. Les noms et
      les symboles des unités de base sont donnés dans le tableau suivant. Grandeur
      de base Nom longueur masse temps courant électrique température thermodynamique
      quantité de matière intensité lumineuse Unité de base Nom Symbole mètre m kilogramme
      kg seconde s ampère A kelvin K mole mol candela cd
  - content: Les unités de base et les unités dérivées cohérentes du SI forment un
      ensemble cohérent, appelé « ensemble des unités SI cohérentes ».
  - content: Pour une description et une explication complètes du Système international
      d’unités, voir la dernière édition de la brochure du SI publiée par le Bureau
      international des poids et mesures (BIPM) et disponible sur le site internet
      du BIPM.
  - content: En algèbre des grandeurs, la grandeur « nombre d’entités » est souvent
      considérée comme une grandeur de base, avec l’unité de base un, symbole 1.
  - content: 'Les préfixes SI pour les multiples et sous-multiples des unités sont
      : Facteur Nom yotta zetta exa péta téra giga méga kilo hecto déca 10–1 10–2
      10–3 10–6 10–9 10–12 10–15 10–18 10–21 10–24 déci centi milli micro nano pico
      femto atto zepto yocto Préfixe Symbole Y Z E P T G M k h da d c m μ n p f a
      z y'
  terms:
  - type: expression
    normative_status: preferred
    designation: Système international d'unités, m
  - type: expression
    normative_status: admitted
    designation: SI, m
date_accepted: '2010-01-01T00:00:00+00:00'
