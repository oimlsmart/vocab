data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: system of units based on the International System of Quantities, their
      names and symbols, including a series of prefixes and their names and symbols,
      together with rules for their use, adopted by the General Conference on Weights
      and Measures (CGPM)
  examples: []
  id: 1.16-eng
  language_code: eng
  notes:
  - content: The SI is founded on the seven base quantities of the ISQ and the names
      and symbols of the corresponding base units that are contained in the following
      table. Base quantity Name length mass time electric current thermodynamic temperature
      amount of substance luminous intensity Base unit Name Symbol metre m kilogram
      kg second s ampere A kelvin K mole mol candela cd
  - content: The base units and the coherent derived units of the SI form a coherent
      set, designated the “set of coherent SI units”.
  - content: For a full description and explanation of the International System of
      Units, see the current edition of the SI brochure published by the Bureau International
      des Poids et Mesures (BIPM) and available on the BIPM web site.
  - content: In quantity calculus, the quantity ‘number of entities’ is often considered
      to be a base quantity, with the base unit one, symbol 1.
  - content: 'The SI prefixes for multiples of units and submultiples of units are:
      Factor Prefix Name yotta zetta exa peta tera giga mega kilo hecto deca Symbol
      Y Z E P T G M k h da 10–1 10–2 10–3 10–6 10–9 10–12 10–15 10–18 10–21 10–24
      deci centi milli micro nano pico femto atto zepto yocto d c m μ n p f a z y'
  terms:
  - type: expression
    normative_status: preferred
    designation: International System of Units
  - type: expression
    normative_status: admitted
    designation: SI
date_accepted: '2010-01-01T00:00:00+00:00'
entry_status: valid
