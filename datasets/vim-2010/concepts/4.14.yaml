  definition:
  - content: plus petite variation de la grandeur mesurée qui produit une variation
      perceptible de l'indication correspondante Note La résolution peut dépendre,
      par exemple, du bruit (interne ou externe) ou du frottement. Elle peut aussi
      dépendre de la valeur de la grandeur mesurée.
