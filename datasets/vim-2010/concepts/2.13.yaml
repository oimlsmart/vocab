data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: étroitesse de l'accord entre une valeur mesurée et une valeur vraie d'un
      mesurande
  examples: []
  id: 2.13-fra
  language_code: fra
  notes:
  - content: L'exactitude de mesure n'est pas une grandeur et ne s'exprime pas numériquement.
      Un mesurage est quelquefois dit plus exact s'il fournit une plus petite erreur
      de mesure.
  - content: Il convient de ne pas utiliser le terme « exactitude de mesure » pour
      la justesse de mesure et le terme « fidélité de mesure » pour « l'exactitude
      de mesure ». Celle-ci est toutefois liée aux concepts de justesse et de fidélité.
  - content: L'exactitude de mesure est quelquefois interprétée comme l'étroitesse
      de l'accord entre les valeurs mesurées qui sont attribuées au mesurande.
  terms:
  - type: expression
    normative_status: preferred
    designation: exactitude de mesure, f
  - type: expression
    normative_status: admitted
    designation: exactitude, f
date_accepted: '2010-01-01T00:00:00+00:00'
