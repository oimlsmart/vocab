  definition:
  - content: ensemble de règles et opérations mathématiques appliquées aux grandeurs
      autres que les grandeurs ordinales Note En algèbre des grandeurs, les équations
      aux grandeurs sont préférées aux équations aux valeurs numériques car les premières,
      contrairement aux secondes, sont indépendantes du choix des unités de mesure
      (voir l'ISO 31-0:1992, paragraphe 2.2.2).
