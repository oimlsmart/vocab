    type: accepted
  definition:
  - content: set of mathematical rules and operations applied to quantities other
      than ordinal quantities Note In quantity calculus, quantity equations are preferred
      to numerical value equations because quantity equations are independent of the
      choice of measurement units, whereas numerical value equations are not (see
      ISO 31-0:1992, subclause 2.2.2).
  examples: []
  id: 1.21-eng
  language_code: eng
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: quantity calculus
