data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: phenomenon serving as the basis of a measurement
  examples:
  - content: a) Thermoelectric effect applied to the measurement of temperature. b)
      Energy absorption applied to the measurement of amount-of-substance concentration.
      c) Lowering of the concentration of glucose in blood in a fasting rabbit applied
      to the measurement of insulin concentration in a preparation. Note The phenomenon
      can be of a physical, chemical, or biological nature.
  id: 2.4-eng
  language_code: eng
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: measurement principle
  - type: expression
    normative_status: admitted
    designation: principle of measurement
