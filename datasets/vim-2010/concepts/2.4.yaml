    type: accepted
  definition:
  - content: phénomène servant de base à un mesurage
  examples:
  - content: a) Effet thermoélectrique appliqué au mesurage de la température. b)
      Absorption d'énergie appliquée au mesurage de la concentration en quantité de
      matière. c) Diminution de la concentration de glucose dans le sang d'un lapin
      à jeun, appliquée au mesurage de la concentration d'insuline dans une préparation.
      Note Le phénomène peut être de nature physique, chimique ou biologique.
