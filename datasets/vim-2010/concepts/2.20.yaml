data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: condition de mesurage dans un ensemble de conditions qui comprennent
      la même procédure de mesure, les mêmes opérateurs, le même système de mesure,
      les mêmes conditions de fonctionnement et le même lieu, ainsi que des mesurages
      répétés sur le même objet ou des objets similaires pendant une courte période
      de temps
  examples: []
  id: 2.20-fra
  language_code: fra
  notes:
  - content: Une condition de mesurage n'est une condition de répétabilité que par
      rapport à un ensemble donné de conditions de répétabilité.
  - content: En chimie, on utilise quelquefois le terme « condition de fidélité intra-série
      » pour désigner ce concept.
  terms:
  - type: expression
    normative_status: preferred
    designation: condition de répétabilité
    grammar_info:
    - gender: f
