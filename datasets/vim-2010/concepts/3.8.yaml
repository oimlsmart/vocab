    type: accepted
  definition:
  - content: element of a measuring system that is directly affected by a phenomenon,
      body, or substance carrying a quantity to be measured
  examples:
  - content: a) Sensing coil of a platinum resistance thermometer, b) rotor of a turbine
      flow meter, c) Bourdon tube of a pressure gauge, d) float of a level-measuring
      instrument, e) photocell of a spectrometer, f) thermotropic liquid crystal which
      changes colour as a function of temperature. Note In some fields the term "detector"
      is used for this concept.
  id: 3.8-eng
  language_code: eng
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: sensor
