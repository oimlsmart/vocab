data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: élément d'un système de mesure qui est directement soumis à l'action
      du phénomène, du corps ou de la substance portant la grandeur à mesurer EXEMPLES
      a) Bobine sensible d'un thermomètre à résistance de platine, b) rotor d'un débitmètre
      à turbine, c) tube de Bourdon d'un manomètre, d) flotteur d'un appareil de mesure
      de niveau, e) récepteur photoélectrique d'un spectrophotomètre, f) cristal liquide
      thermotrope dont la couleur change en fonction de la température. Note Dans
      certains domaines, le terme « détecteur » est employé pour ce concept.
  examples: []
