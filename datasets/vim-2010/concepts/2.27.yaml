data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: composante de l'incertitude de mesure qui résulte de la quantité finie
      de détails dans la définition d'un mesurande
  examples: []
  id: 2.27-fra
  language_code: fra
  notes:
  - content: L'incertitude définitionnelle est l'incertitude minimale que l'on peut
      obtenir en pratique par tout mesurage d'un mesurande donné.
  - content: Toute modification des détails descriptifs conduit à une autre incertitude
      définitionnelle.
  - content: Dans le GUM:1995, D.3.4, et dans la CEI 60359, le concept d'incertitude
      définitionnelle est appelé « incertitude intrinsèque ».
  terms:
  - type: expression
    normative_status: preferred
    designation: incertitude définitionnelle, f
date_accepted: '2010-01-01T00:00:00+00:00'
entry_status: valid
