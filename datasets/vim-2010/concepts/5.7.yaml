  definition:
  - content: étalon qui est utilisé couramment pour étalonner ou contrôler des instruments
      de mesure ou des systèmes de mesure
  examples: []
  id: 5.7-fra
  language_code: fra
  notes:
  - content: Un étalon de travail est habituellement étalonné par rapport à un étalon
      de référence.
  - content: Un étalon de travail servant à la vérification est aussi désigné comme
      « étalon de vérification » ou « étalon de contrôle ».
