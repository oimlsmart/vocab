data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: relation d'égalité entre des unités de base, des unités dérivées cohérentes
      ou d'autres unités de mesure
  examples:
  - content: a) Pour les grandeurs données dans l’exemple a) de 1.22, [Q1] = [Q2]
      [Q3] où [Q1], [Q2] et [Q3] représentent respectivement les unités de Q1, Q2
      et Q3, pourvu que ces unités soient dans un système cohérent d'unités. b) J
      := kg m2/s2, où J, kg, m et s sont respectivement les symboles du joule, du
      kilogramme, du mètre et de la seconde. (Le symbole := signifie « est par définition
      égal à », comme indiqué dans les séries ISO 80000 et CEI 80000). c) 1 km/h =
      (1/3,6) m/s.
  id: 1.23-fra
  language_code: fra
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: équation aux unités, f
