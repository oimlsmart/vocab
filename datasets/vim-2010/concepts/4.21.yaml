    type: accepted
  definition:
  - content: variation continue ou incrémentale dans le temps d'une indication, due
      à des variations des propriétés métrologiques d'un instrument de mesure Note
      La dérive instrumentale n'est liée ni à une variation de la grandeur mesurée,
      ni à une variation d'une grandeur d'influence identifiée. _________________________________________________________________________________________________________________________________________________________________________________________________________________________
