    type: accepted
  definition:
  - content: continuous or incremental change over time in indication, due to changes
      in metrological properties of a measuring instrument. Note Instrumental drift
      is related neither to a change in a quantity being measured nor to a change
      of any recognized influence quantity.
  examples: []
  id: 4.21-eng
  language_code: eng
  notes: []
