    type: accepted
  definition:
  - content: formulation d'une incertitude de mesure et des composantes de cette incertitude,
      ainsi que de leur calcul et de leur combinaison Note Un bilan d'incertitude
      devrait comprendre le modèle de mesure, les estimations et incertitudes associées
      aux grandeurs qui interviennent dans ce modèle, les covariances, le type des
      fonctions de densité de probabilité utilisées, les degrés de liberté, le type
      d'évaluation de l'incertitude, ainsi que tout facteur d'élargissement.
  examples: []
  id: 2.33-fra
  language_code: fra
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: bilan d'incertitude
