data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: condition de fonctionnement extrême qu'un instrument de mesure ou un
      système de mesure doit pouvoir supporter sans dommage et sans dégradation de
      propriétés métrologiques spécifiées, lorsqu'il est ensuite utilisé dans ses
      conditions assignées de fonctionnement
  examples: []
  id: 4.10-fra
  language_code: fra
  notes:
  - content: Les conditions limites de fonctionnement peuvent être différentes pour
      le stockage, le transport et le fonctionnement.
  - content: Les conditions limites de fonctionnement peuvent comprendre des valeurs
      limites pour la grandeur mesurée et pour les grandeurs d'influence.
  terms:
  - type: expression
    normative_status: preferred
    designation: condition limite de fonctionnement
    grammar_info:
    - gender: f
  - type: expression
    normative_status: admitted
    designation: condition limite
    grammar_info:
    - gender: f
