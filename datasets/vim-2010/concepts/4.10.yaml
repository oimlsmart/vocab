data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: extreme operating condition that a measuring instrument or measuring
      system is required to withstand without damage, and without degradation of specified
      metrological properties, when it is subsequently operated under its rated operating
      conditions
  examples: []
  id: 4.10-eng
  language_code: eng
  notes:
  - content: Limiting conditions for storage, transport or operation can differ.
  - content: Limiting conditions can include limiting values of a quantity being measured
      and of any influence quantity.
  terms:
  - type: expression
    normative_status: preferred
    designation: limiting operating condition
