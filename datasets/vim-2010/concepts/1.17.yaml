    type: accepted
  definition:
  - content: unité de mesure obtenue en multipliant une unité de mesure donnée par
      un entier supérieur à un EXEMPLES a) Le kilomètre est un multiple décimal du
      mètre. b) L'heure est un multiple non décimal de la seconde.
  examples: []
  id: 1.17-fra
  language_code: fra
  notes:
  - content: Les préfixes SI pour les multiples décimaux des unités de base et des
      unités dérivées du SI sont donnés à la note 5 de 1.16.
  - content: 'Les préfixes SI représentent strictement des puissances de 10 et il
      convient de ne pas les utiliser pour des puissances de 2. Par exemple, il convient
      de ne pas utiliser 1 kilobit pour représenter 1 024 bits (210 bits), qui est
      1 kibibit. Les préfixes pour les multiples binaires sont : Facteur (210)8 (210)7
      (210)6 (210)5 (210)4 (210)3 (210)2 (210)1 Préfixe Nom Symbole yobi Yi zébi Zi
      exbi Ei pébi Pi tébi Ti gibi Gi mébi Mi kibi Ki Source: CEI 80000-13.'
  terms:
  - type: expression
    normative_status: preferred
    designation: multiple d'une unité, m
