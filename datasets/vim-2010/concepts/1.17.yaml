data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: measurement unit obtained by multiplying a given measurement unit by
      an integer greater than one
  examples:
  - content: a) The kilometre is a decimal multiple of the metre. b) The hour is a
      non-decimal multiple of the second.
  id: 1.17-eng
  language_code: eng
  notes:
  - content: SI prefixes for decimal multiples of SI base units and SI derived units
      are given in note 5 of 1.16.
  - content: 'SI prefixes refer strictly to powers of 10, and should not be used for
      powers of 2. For example, 1 kilobit should not be used to represent 1024 bits
      (210 bits), which is a kibbibit. Prefixes for binary multiples are: Factor (210)8
      (210)7 (210)6 (210)5 (210)4 (210)3 (210)2 (210)1 Prefix Name yobi zebi exbi
      pebi tebi gibi mebi kibit Symbol Yi Zi Ei Pi Ti Gi Mi Ki Source: IEC 80000-13.'
  terms:
  - type: expression
    normative_status: preferred
    designation: multiple of a unit
date_accepted: '2010-01-01T00:00:00+00:00'
