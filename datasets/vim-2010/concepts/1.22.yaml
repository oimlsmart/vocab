data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: relation d'égalité entre des grandeurs d'un système de grandeurs donné,
      indépendante des unités de mesure
  examples:
  - content: a) Q1 = ζ Q2 Q3, où Q1, Q2 et Q3 représentent différentes grandeurs et
      où ζ est un facteur numérique. b) T = (1/2) mv2, où T est l'énergie cinétique
      et v la vitesse d'une particule spécifiée de masse m. c) n = I t / F où n est
      la quantité de matière d’un composé univalent, I est le courant électrique et
      t la durée de l’électrolyse, F est la constante de Faraday.
  id: 1.22-fra
  language_code: fra
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: équation aux grandeurs
    grammar_info:
    - gender: f
