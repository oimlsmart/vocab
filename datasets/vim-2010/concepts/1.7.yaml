data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: expression of the dependence of a quantity on the base quantities of
      a system of quantities as a product of powers of factors corresponding to the
      base quantities, omitting any numerical factor
  examples:
  - content: a) In the ISQ, the quantity dimension of force is denoted by dim F =
      LMT–2. b) c) In the same system of quantities, dim ϱB = ML–3 is the quantity
      dimension of mass concentration of component B, and ML–3 is also the quantity
      dimension of mass density, ϱ, (volumic mass). The period T of a pendulum of
      length l at a place with the local acceleration of free fall g is T 2π l g
      or T  C(g) l where C(g)  2π g Hence, dim C(g) = L–1/2T.
  id: 1.7-eng
  language_code: eng
  notes:
  - content: A power of a factor is the factor raised to an exponent. Each factor
      is the dimension of a base quantity.
  - content: The conventional symbolic representation of the dimension of a base quantity
      is a single upper case letter in roman (upright) sans-serif type. The conventional
      symbolic representation of the dimension of a derived quantity is the product
      of powers of the dimensions of the base quantities according to the definition
      of the derived quantity. The dimension of a quantity Q is denoted by dim Q.
  - content: In deriving the dimension of a quantity, no account is taken of its scalar,
      vector, or tensor character.
  - content: In a given system of quantities, – quantities of the same kind have the
      same quantity dimension, – quantities of different quantity dimensions are always
      of different kinds, and – quantities having the same quantity dimension are
      not necessarily of the same kind.
  - content: 'Symbols representing the dimensions of the base quantities in the ISQ:
      Symbol for dimension Base quantity length mass time electric current thermodynamic
      temperature amount of substance luminous intensity L M T I Θ N J Thus, the dimension
      of a quantity Q is denoted by dim Q = LαMβTγIδΘεNζJη where the exponents, named
      dimensional exponents, are positive, negative, or zero.'
  terms:
  - type: expression
    normative_status: preferred
    designation: quantity dimension
  - type: expression
    normative_status: admitted
    designation: dimension of a quantity
  - type: expression
    normative_status: admitted
    designation: dimension
