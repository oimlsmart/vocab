data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: dimension d'une grandeur, f expression de la dépendance d'une grandeur
      par rapport aux grandeurs de base d'un système de grandeurs sous la forme d'un
      produit de puissances de facteurs correspondant aux grandeurs de base, en omettant
      tout facteur numérique
  examples:
  - content: a) Dans l'ISQ, la dimension de la force est notée dim F = LMT–2. b) Dans
      le même système de grandeurs, dim ρB = ML–3 est la dimension de la concentration
      en masse du constituant B et ML–3 est aussi la dimension de la masse volumique
      ρ. c) La période T d'un pendule de longueur l en un endroit où l'accélération
      locale de la pesanteur vaut g est T  2 l g ou T  C(g) l où C( g )  2 g
      Par conséquent, dim C(g) = L–1/2T.
  id: 1.7-fra
  language_code: fra
  notes:
  - content: Une puissance d'un facteur est le facteur muni d'un exposant. Chaque
      facteur exprime la dimension d'une grandeur de base.
  - content: Par convention, la représentation symbolique de la dimension d'une grandeur
      de base est une lettre majuscule unique en caractère romain (droit) sans empattement.
      Par convention, la représentation symbolique de la dimension d'une grandeur
      dérivée est le produit de puissances des dimensions des grandeurs de base conformément
      à la définition de la grandeur dérivée. La dimension de la grandeur Q est notée
      dim Q.
  - content: Pour établir la dimension d'une grandeur, on ne tient pas compte du caractère
      scalaire, vectoriel ou tensoriel.
  - content: Dans un système de grandeurs donné, – les grandeurs de même nature ont
      la même dimension, – des grandeurs de dimensions différentes sont toujours de
      nature différente, – des grandeurs ayant la même dimension ne sont pas nécessairement
      de même nature.
  - content: 'Dans l''ISQ, les symboles correspondant aux dimensions des grandeurs
      de base sont: Grandeur de base longueur masse temps courant électrique température
      thermodynamique quantité de matière intensité lumineuse Symbole de la dimension
      L M T I Θ N J La dimension d''une grandeur Q est donc notée dim Q = LαMβTγIδΘεNεJζ
      où les exposants, appelés exposants dimensionnels, sont positifs, négatifs ou
      nuls.'
  terms:
  - type: expression
    normative_status: preferred
    designation: dimension, f
