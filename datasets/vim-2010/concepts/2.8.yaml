data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: procédure opératoire primaire, m procédure de mesure de référence utilisée
      pour obtenir un résultat de mesure sans relation avec un étalon d'une grandeur
      de même nature EXEMPLE Le volume d'eau délivré par une pipette de 5 ml à 20
      °C est mesuré en pesant l'eau délivrée par la pipette dans un bécher, en prenant
      la différence entre la masse du bécher contenant l'eau et la masse du bécher
      initialement vide, puis en corrigeant la différence de masse pour la température
      réelle de l'eau par l'intermédiaire de la masse volumique.
  examples: []
  id: 2.8-fra
  language_code: fra
  notes:
  - content: Le Comité consultatif sur la quantité de matière – Métrologie en chimie
      (CCQM) utilise pour ce concept le terme « méthode de mesure primaire ».
  - content: Le CCQM a donné (5e réunion, 1999)[5] les définitions de deux concepts
      subordonnés, que l'on pourrait dénommer « procédure de mesure primaire directe
      » et « procédure primaire de mesure de rapports ».
  terms:
  - type: expression
    normative_status: preferred
    designation: procédure de mesure primaire, f
