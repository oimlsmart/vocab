  definition:
  - content: combined standard uncertainty standard measurement uncertainty that is
      obtained using the individual standard measurement uncertainties associated
      with the input quantities in a measurement model Note In case of correlations
      of input quantities in a measurement model, covariances must also be taken into
      account when calculating the combined standard measurement uncertainty; see
      also GUM, 2.3.4.
