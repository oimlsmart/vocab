data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: valeur conventionnelle d'une grandeur, m valeur attribuée à une grandeur
      par un accord pour un usage donné
  examples:
  - content: a) Valeur conventionnelle de l'accélération due à la pesanteur ou accélération
      normale de la pesanteur, gn = 9,806 65 m s2. b) Valeur conventionnelle de
      la constante de Josephson, KJ-90 = 483 597,9 GHz V −1. c) Valeur conventionnelle
      d’un étalon de masse donné, m = 100,003 47 g.
  id: 2.12-fra
  language_code: fra
  notes:
  - content: Le terme « valeur conventionnellement vraie » est quelquefois utilisé
      pour ce concept, mais son utilisation est déconseillée.
  - content: Une valeur conventionnelle est quelquefois une estimation d'une valeur
      vraie.
  - content: Une valeur conventionnelle est généralement considérée comme associée
      à une incertitude de mesure convenablement petite, qui peut être nulle.
  terms:
  - type: expression
    normative_status: preferred
    designation: valeur conventionnelle, m
date_accepted: '2010-01-01T00:00:00+00:00'
entry_status: valid
