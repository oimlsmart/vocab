data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: closeness of agreement between the average of an infinite number of replicate
      measured quantity values and a reference quantity value
  examples: []
  id: 2.14-eng
  language_code: eng
  notes:
  - content: Measurement trueness is not a quantity and thus cannot be expressed numerically,
      but measures for closeness of agreement are given in ISO 5725.
  - content: Measurement trueness is inversely related to systematic measurement error,
      but is not related to random measurement error.
  - content: Measurement accuracy” should not be used for ‘measurement trueness’.
  terms:
  - type: expression
    normative_status: preferred
    designation: measurement trueness
  - type: expression
    normative_status: admitted
    designation: trueness of measurement
  - type: expression
    normative_status: admitted
    designation: trueness
date_accepted: '2010-01-01T00:00:00+00:00'
