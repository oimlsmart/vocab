data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: étroitesse de l'accord entre la moyenne d'un nombre infini de valeurs
      mesurées répétées et une valeur de référence
  examples: []
  id: 2.14-fra
  language_code: fra
  notes:
  - content: La justesse de mesure n'est pas une grandeur et ne peut donc pas s'exprimer
      numériquement, mais l'ISO 5725 donne des caractéristiques pour l'étroitesse
      de l'accord.
  - content: La justesse de mesure varie en sens inverse de l'erreur systématique
      mais n'est pas liée à l'erreur aléatoire.
  - content: Il convient de ne pas utiliser « exactitude de mesure » pour la justesse
      de mesure.
  terms:
  - type: expression
    normative_status: preferred
    designation: justesse de mesure, f
  - type: expression
    normative_status: admitted
    designation: justesse, f
