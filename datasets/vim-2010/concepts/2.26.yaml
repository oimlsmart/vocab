data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: uncertainty of measurement uncertainty non-negative parameter characterizing
      the dispersion of the quantity values being attributed to a measurand, based
      on the information used
  examples: []
  id: 2.26-eng
  language_code: eng
  notes:
  - content: Measurement uncertainty includes components arising from systematic effects,
      such as components associated with corrections and the assigned quantity values
      of measurement standards, as well as the definitional uncertainty. Sometimes
      estimated systematic effects are not corrected for but, instead, associated
      measurement uncertainty components are incorporated.
  - content: The parameter may be, for example, a standard deviation called standard
      measurement uncertainty (or a specified multiple of it), or the half-width of
      an interval, having a stated coverage probability.
  - content: Measurement uncertainty comprises, in general, many components. Some
      of these may be evaluated by Type A evaluation of measurement uncertainty from
      the statistical distribution of the quantity values from series of measurements
      and can be characterized by standard deviations. The other components, which
      may be evaluated by Type B evaluation of measurement uncertainty, can also be
      characterized by standard deviations, evaluated from probability density functions
      based on experience or other information.
  - content: In general, for a given set of information, it is understood that the
      measurement uncertainty is associated with a stated quantity value attributed
      to the measurand. A modification of this value results in a modification of
      the associated uncertainty.
  terms:
  - type: expression
    normative_status: preferred
    designation: measurement uncertainty
date_accepted: '2010-01-01T00:00:00+00:00'
