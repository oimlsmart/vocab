data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: paramètre non négatif qui caractérise la dispersion des valeurs attribuées
      à un mesurande, à partir des informations utilisées
  examples: []
  id: 2.26-fra
  language_code: fra
  notes:
  - content: L'incertitude de mesure comprend des composantes provenant d'effets systématiques,
      telles que les composantes associées aux corrections et aux valeurs assignées
      des étalons, ainsi que l'incertitude définitionnelle. Parfois, on ne corrige
      pas des effets systématiques estimés, mais on insère plutôt des composantes
      associées de l'incertitude.
  - content: Le paramètre peut être, par exemple, un écart-type appelé incertitude-type
      (ou un de ses multiples) ou la demi-étendue d'un intervalle ayant une probabilité
      de couverture déterminée.
  - content: L'incertitude de mesure comprend en général de nombreuses composantes.
      Certaines peuvent être évaluées par une évaluation de type A de l'incertitude
      à partir de la distribution statistique des valeurs provenant de séries de mesurages
      et peuvent être caractérisées par des écarts-types. Les autres composantes,
      qui peuvent être évaluées par une évaluation de type B de l'incertitude, peuvent
      aussi être caractérisées par des écarts-types, évalués à partir de fonctions
      de densité de probabilité fondées sur l'expérience ou d'autres informations.
  - content: En général, pour des informations données, on sous-entend que l'incertitude
      de mesure est associée à une valeur déterminée attribuée au mesurande. Une modification
      de cette valeur entraîne une modification de l'incertitude associée.
  terms:
  - type: expression
    normative_status: preferred
    designation: incertitude de mesure
