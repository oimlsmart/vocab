data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: opération qui, dans des conditions spécifiées, établit en une première
      étape une relation entre les valeurs et les incertitudes de mesure associées
      qui sont fournies par des étalons et les indications correspondantes avec les
      incertitudes associées, puis utilise en une seconde étape cette information
      pour établir une relation permettant d'obtenir un résultat de mesure à partir
      d'une indication
  examples: []
  id: 2.39-fra
  language_code: fra
  notes:
  - content: Un étalonnage peut être exprimé sous la forme d'un énoncé, d'une fonction
      d'étalonnage, d'un diagramme d'étalonnage, d'une courbe d'étalonnage ou d'une
      table d'étalonnage. Dans certains cas, il peut consister en une correction additive
      ou multiplicative de l'indication avec une incertitude de mesure associée.
  - content: Il convient de ne pas confondre l'étalonnage avec l'ajustage d'un système
      de mesure, souvent appelé improprement « auto-étalonnage », ni avec la vérification
      de l'étalonnage.
  - content: La seule première étape dans la définition est souvent perçue comme étant
      l'étalonnage.
  terms:
  - type: expression
    normative_status: preferred
    designation: étalonnage, m
date_accepted: '2010-01-01T00:00:00+00:00'
