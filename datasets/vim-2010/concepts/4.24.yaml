data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: component of measurement uncertainty arising from a measuring instrument
      or measuring system in use
  examples: []
  id: 4.24-eng
  language_code: eng
  notes:
  - content: Instrumental measurement uncertainty is obtained through calibration
      of a measuring instrument or measuring system, except for a primary measurement
      standard for which other means are used.
  - content: Instrumental measurement uncertainty is used in a Type B evaluation of
      measurement uncertainty.
  - content: Information relevant to instrumental measurement uncertainty may be given
      in the instrument specifications.
  terms:
  - type: expression
    normative_status: preferred
    designation: instrumental measurement uncertainty
