data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: quantity intended to be measured
  examples:
  - content: a) The potential difference between the terminals of a battery may decrease
      when using a voltmeter with a significant internal conductance to perform the
      measurement. The opencircuit potential difference can be calculated from the
      internal resistances of the battery and the voltmeter. b) The length of a steel
      rod in equilibrium with the ambient Celsius temperature of 23 °C will be different
      from the length at the specified temperature of 20 °C, which is the measurand.
      In this case a correction is necessary.
  id: 2.3-eng
  language_code: eng
  notes:
  - content: The specification of a measurand requires knowledge of the kind of quantity,
      description of the state of the phenomenon, body, or substance carrying the
      quantity, including any relevant component, and the chemical entities involved.
  - content: In the 2nd edition of the VIM and in IEC 60050-300:2001, the measurand
      is defined as the 'particular quantity subject to measurement'.
  - content: The measurement, including the measuring system and the conditions under
      which the measurement is carried out, might change the phenomenon, body, or
      substance such that the quantity being measured may differ from the measurand
      as defined. In this case adequate correction is necessary.
  - content: 'In chemistry, “analyte”, or the name of a substance or compound, are
      terms sometimes used for ‘measurand’. This usage is erroneous because these
      terms do not refer to quantities. _________________________________________________________________________________________________________________________________________________________________________________________________________________________
      Chapitre 2 : Mesurages'
  terms:
  - type: expression
    normative_status: preferred
    designation: measurand
date_accepted: '2010-01-01T00:00:00+00:00'
