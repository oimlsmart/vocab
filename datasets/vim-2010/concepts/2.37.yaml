data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: probabilité que l'ensemble des valeurs vraies d'un mesurande soit contenu
      dans un intervalle élargi spécifié
  examples: []
  id: 2.37-fra
  language_code: fra
  notes:
  - content: La définition se réfère à l'approche « incertitude » présentée dans le
      GUM.
  - content: Il convient de ne pas confondre ce concept avec le concept statistique
      de niveau de confiance, bien que le terme « level of confidence » soit utilisé
      en anglais dans le GUM.
  terms:
  - type: expression
    normative_status: preferred
    designation: probabilité de couverture, f
