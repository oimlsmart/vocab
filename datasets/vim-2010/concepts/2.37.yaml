    type: accepted
  definition:
  - content: probability that the set of true quantity values of a measurand is contained
      within a specified coverage interval
  examples: []
  id: 2.37-eng
  language_code: eng
  notes:
  - content: This definition pertains to the Uncertainty Approach as presented in
      the GUM.
  - content: The coverage probability is also termed “level of confidence” in the
      GUM.
  terms:
  - type: expression
    normative_status: preferred
    designation: coverage probability
