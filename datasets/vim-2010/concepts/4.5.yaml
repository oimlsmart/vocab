  definition:
  - content: absolute value of the difference between the extreme quantity values
      of a nominal indication interval
  examples:
  - content: For a nominal indication interval of −10 V to +10 V, the range of the
      nominal indication interval is 20 V. Note Range of a nominal indication interval
      is sometimes termed “span of a nominal interval”.
