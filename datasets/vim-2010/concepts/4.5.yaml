  definition:
  - content: valeur absolue de la différence entre les valeurs extrêmes d'un intervalle
      nominal des indications EXEMPLE Pour un intervalle nominal des indications de
      –10 V à +10 V, l'étendue de mesure est 20 V. Note En anglais, l'étendue de mesure
      est quelquefois dénommée « span of a nominal interval ». En français, le terme
      « intervalle de mesure » est parfois improprement employé.
