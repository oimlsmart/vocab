  definition:
  - content: classe d'instruments de mesure ou de systèmes de mesure qui satisfont
      à certaines exigences métrologiques destinées à maintenir les erreurs de mesure
      ou les incertitudes instrumentales entre des limites spécifiées dans des conditions
      de fonctionnement spécifiées
  examples: []
  id: 4.25-fra
  language_code: fra
  notes:
  - content: Une classe d'exactitude est habituellement indiquée par un nombre ou
      un symbole adopté par convention.
  - content: Le concept de clase d'exactitude s'applique aux mesures matérialisées.
  terms:
  - type: expression
    normative_status: preferred
    designation: classe d'exactitude
