data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: class of measuring instruments or measuring systems that meet stated
      metrological requirements that are intended to keep measurement errors or instrumental
      measurement uncertainties within specified limits under specified operating
      conditions
  examples: []
  id: 4.25-eng
  language_code: eng
  notes:
  - content: An accuracy class is usually denoted by a number or symbol adopted by
      convention.
  - content: Accuracy class applies to material measures.
  terms:
  - type: expression
    normative_status: preferred
    designation: accuracy class
