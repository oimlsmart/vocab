    type: accepted
  definition:
  - content: suite d'éléments d'un système de mesure qui constitue un seul chemin
      du signal depuis le capteur jusqu'à l'élément de sortie
  examples:
  - content: a) Chaîne de mesure électroacoustique comprenant un microphone, un atténuateur,
      un filtre, un amplificateur et un voltmètre. b) Chaîne de mesure mécanique comprenant
      un tube de Bourdon, un système de levier, deux roues dentées et et un cadran
      mécanique.
  id: 3.10-fra
  language_code: fra
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: chaîne de mesure, f
