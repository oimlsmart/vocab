data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: quantity, defined by a conventional measurement procedure, for which
      a total ordering relation can be established, according to magnitude, with other
      quantities of the same kind, but for which no algebraic operations among those
      quantities exist
  examples:
  - content: a) Rockwell C hardness. b) Octane number for petroleum fuel. c) Earthquake
      strength on the Richter scale. d) Subjective level of abdominal pain on a scale
      from zero to five.
  id: 1.26-eng
  language_code: eng
  notes:
  - content: Ordinal quantities can enter into empirical relations only and have neither
      measurement units nor quantity dimensions. Differences and ratios of ordinal
      quantities have no physical meaning.
  - content: Ordinal quantities are arranged according to ordinal quantity-value scales
      (see 1.28).
  terms:
  - type: expression
    normative_status: preferred
    designation: ordinal quantity
date_accepted: '2010-01-01T00:00:00+00:00'
entry_status: valid
