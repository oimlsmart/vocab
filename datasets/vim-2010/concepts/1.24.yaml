  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: ratio of two measurement units for quantities of the same kind
  examples:
  - content: km/m = 1 000 and thus 1 km = 1 000 m. Note The measurement units may
      belong to different systems of units.
  - content: a) h/s = 3 600 and thus 1 h = 3 600 s. b) (km/h)/(m/s) = (1/3.6) and
      thus 1 km/h = (1/3.6) m/s.
  id: 1.24-eng
  language_code: eng
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: conversion factor between units
