data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: interval containing the set of true quantity values of a measurand with
      a stated probability, based on the information available
  examples: []
  id: 2.36-eng
  language_code: eng
  notes:
  - content: A coverage interval does not need to be centered on the chosen measured
      quantity value. See Evaluation of measurement data - Supplement 1 to the GUM[3].
  - content: A coverage interval should not be termed “confidence interval” to avoid
      confusion with the statistical concept (See GUM, 6.2.2).
  - content: A coverage interval can be derived from an expanded measurement uncertainty
      (See GUM, 2.3.5).
  terms:
  - type: expression
    normative_status: preferred
    designation: coverage interval
