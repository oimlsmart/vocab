  - content: ", where a third concept might be ‘off-system measurement unit’. The
      partitive relation (or part-whole relation) is also hierarchical and connects
      a comprehensive concept to two or more partitive concepts which fitted together
      constitute the parent concept. The diagrams show such relations as a rake or
      bracket, and a continued backline without a tooth means one or more further
      partitive concepts that are not discussed. A close-set double line indicates
      that several partitive concepts of a given type are involved and a broken line
      shows that such plurality is uncertain. For example, A parenthetic term indicates
      a concept that is not defined in the Vocabulary, but is taken as a primitive
      which is assumed to be generally understood. The associative relation (or pragmatic
      relation) is non-hierarchical and connects two concepts which are in some sort
      of thematic association. There are many subtypes of associative relation, but
      all are indicated by a double-headed arrow. For example, To avoid too complicated
      diagrams, they do not show all the possible associative relations. The diagrams
      will demonstrate that fully systematic derived terms have not been created,
      often because metrology is an old discipline with a vocabulary evolved by accretion
      rather than as a comprehensive de novo structure. Figure A.1  Concept diagram
