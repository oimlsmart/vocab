  definition:
  - content: quantity value used as a basis for comparison with values of quantities
      of the same kind
  examples: []
  id: 5.18-eng
  language_code: eng
  notes:
  - content: A reference quantity value can be a true quantity value of a measurand,
      in which case it is unknown, or a conventional quantity value, in which case
      it is known.
  - content: A reference quantity value with associated measurement uncertainty is
      usually provided with reference to a) a material, e.g. a certified reference
      material, b) a device, e.g. a stabilized laser, c) a reference measurement procedure,
      d) a comparison of measurement standards.
  terms:
  - type: expression
    normative_status: preferred
    designation: reference quantity value
  - type: expression
    normative_status: admitted
    designation: reference value
