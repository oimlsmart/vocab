data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: graphical expression of the relation between indication and corresponding
      measurement result
  examples: []
  id: 4.30-eng
  language_code: eng
  notes:
  - content: A calibration diagram is the strip of the plane defined by the axis of
      the indication and the axis of the measurement result, that represents the relation
      between an indication and a set of measured quantity values. A one-to-many relation
      is given, and the width of the strip for a given indication provides the instrumental
      measurement uncertainty.
  - content: Alternative expressions of the relation include a calibration curve and
      associated measurement uncertainty, a calibration table, or a set of functions.
  - content: This concept pertains to a calibration when the instrumental measurement
      uncertainty is large in comparison with the measurement uncertainties associated
      with the quantity values of measurement standards.
  terms:
  - type: expression
    normative_status: preferred
    designation: calibration diagram
date_accepted: '2010-01-01T00:00:00+00:00'
