data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: étalon établi par l'intermédiaire d'un étalonnage par rapport à un étalon
      primaire d'une grandeur de même nature
  examples: []
  id: 5.5-fra
  language_code: fra
  notes:
  - content: On peut obtenir directement la relation entre l'étalon primaire et l'étalon
      secondaire ou mettre en oeuvre un système de mesure intermédiaire étalonné par
      l'étalon primaire, qui assigne un résultat de mesure à l'étalon secondaire.
  - content: Un étalon dont la valeur est assignée par une procédure de mesure primaire
      de mesure de rapport est un étalon secondaire.
  terms:
  - type: expression
    normative_status: preferred
    designation: étalon secondaire, m
