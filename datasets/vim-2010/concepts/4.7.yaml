data:
  dates:
  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: set of values of quantities of the same kind that can be measured by
      a given measuring instrument or measuring system with specified instrumental
      measurement uncertainty, under defined conditions
  examples: []
  id: 4.7-eng
  language_code: eng
  notes:
  - content: In some fields the term is “measuring range” or “measurement range”.
  - content: The lower limit of a measuring interval should not be confused with detection
      limit.
  terms:
  - type: expression
    normative_status: preferred
    designation: measuring interval
  - type: expression
    normative_status: admitted
    designation: working interval
