  - date: '2010-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: device or substance that indicates the presence of a phenomenon, body,
      or substance when a threshold value of an associated quantity is exceeded
  examples:
  - content: a) Halogen leak detector, b) litmus paper.
  id: 3.9-eng
  language_code: eng
  notes:
  - content: In some fields the term “detector” is used for the concept of sensor.
  - content: In chemistry the term “indicator” is frequently used for this concept.
  terms:
  - type: expression
    normative_status: preferred
    designation: detector
