    type: accepted
  definition:
  - content: quantity value provided by a {{measuring instrument,0.10}} or a {{measuring
      system,0.12}}
  examples: []
  id: 0.03-eng
  notes:
  - content: An indication may be presented in visual or acoustic form or may be transferred
      to another device. An indication is often given by the position of a pointer
      on the display for analog outputs, a displayed or printed number for digital
      outputs, a code pattern for code outputs, or an assigned quantity value for
      material measures.
  - content: An indication and a corresponding value of the quantity being measured
      are not necessarily values of quantities of the same kind.
  sources:
