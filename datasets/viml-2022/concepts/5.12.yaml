    type: accepted
  definition:
  - content: difference between the {{0.04,error of indication}} and the {{0.06,intrinsic error}} of a measuring instrument
  examples: []
  id: 5.12-eng
  notes:
  - content: Principally, a fault is the result of an undesired change of data contained
      in or flowing through an electronic {{0.10,measuring instrument}}.
  - content: From the definition it follows that a “fault” is a numerical value which
      is expressed either in a unit of measurement or as a relative value, for instance
      as a percentage.
