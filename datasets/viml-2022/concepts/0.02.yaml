data:
  dates:
  - date: '2022-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: system of units, based on the International System of Quantities, their
      names and symbols, including a series of prefixes and their names and symbols,
      together with rules for their use, adopted by the General Conference on Weights
      and Measures (CGPM)1
  examples: []
  id: 0.02-eng
  notes:
  - content: 'The SI is founded on the seven base quantities and a set of seven defining
      constants. See: OIML V 2-200:2012, 1.16 and the SI Brochure published by the
      Bureau International des Poids et Mesures (BIPM) and available on the BIPM website
      [BIPM 2019 ].'
  - content: The base units and the coherent derived units of the SI form a coherent
      set, designated the “set of coherent SI units”.
  - content: For a full description and explanation of the International System of
      Units, see the current edition of the SI Brochure [BIPM 2019].
  - content: In quantity calculus, the quantity 'number of entities' is often considered
      to be a base quantity, with the base unit one, symbol 1.
  - content: The SI prefixes for multiples of units and submultiples of units are
      given in OIML V2-200:2012, 1.16.
  sources:
  - origin:
      ref:
        source: OIML V 2-200:2012
