  definition:
 - content: sufficiency of different {{conformity assessment,A.1}} results to provide
      the same level of assurance of conformity with regard to the same {{specified
      requirements,A.6}}
  examples: []
  id: A.32-eng
  notes:
 - content: The expression “conformity assessment result” signifies the output of
      any conformity assessment activity (e.g. a report or certificate) and can include
      a finding of nonconformity.
