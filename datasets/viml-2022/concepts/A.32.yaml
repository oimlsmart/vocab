  definition:
 - content: concordance suffisante entre différents résultats d'{{évaluation de la
      conformité,A.1}}  pour fournir le même niveau d'assurance de la conformité quant
      aux mêmes {{exigences spécifiées,A.6}}
  examples: []
  id: A.32-fra
  notes:
 - content: 'à l’article: L’expression « résultat d’évaluation de la conformité »
      signifie que le produit d’une activité d‘évaluation de la conformité (par exemple,
      un rapport ou un certificat) et peut comprendre un constat de non-conformité.'
  sources:
