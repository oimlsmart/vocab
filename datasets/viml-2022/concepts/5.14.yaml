data:
  dates:
  - date: '2022-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: '{{5.12,fault}} exceeding the applicable {{5.13,fault limit}} value'
  examples: []
  id: 5.14-eng
  notes:
  - content: 'For particular types of {{0.10,measuring instruments}} some {{5.12,faults}}
      exceeding the {{5.13,fault limit}} may not be considered a significant fault;
      the applicable Recommendation shall state when such exception applies. For example,
      the occurrence of one or some of the following faults may be acceptable:

      — faults arising from simultaneous and mutually independent causes originating
      in a measuring instrument or in its {{5.07,checking facilities}};

      — faults implying the impossibility to perform any measurement;

      — transitory faults being momentary variations in the {{0.03,indication}}, which
      cannot be interpreted, memorized or transmitted as a measurement result;

      — faults giving rise to variations in the measurement result that are serious
      enough to be noticed by all those interested in the measurement result; the
      applicable Recommendation may specify the nature of these variations.'
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: significant fault
  language_code: eng
  entry_status: valid
