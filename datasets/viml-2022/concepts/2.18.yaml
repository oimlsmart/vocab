data:
  dates:
  - date: '2022-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: inspection d'un lot homogène d'{{0.10,instruments de mesure}} basée sur
      les résultats de l'évaluation d'un nombre statistiquement approprié d'exemplaires
      pris au hasard dans un lot identifié
  examples: []
  id: 2.18-fra
  notes:
  - content: Les conditions dans lesquelles les instruments concernés ont été utilisés
      (par exemple,la qualité de l'eau pour des compteurs d'eau) peuvent être considérées
      au titre des paramètres caractérisant l'homogénéité du lot.
  - content: 'ISO 3534-2 donne la définition suivante: «4.1.6 contrôle par échantillonnage
      - contrôle des individus sélectionnés dans le groupe considéré»'
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: inspection par échantillonnage
  language_code: fra
  entry_status: valid
date_accepted: '2022-01-01T00:00:00+00:00'
