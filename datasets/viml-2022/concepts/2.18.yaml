data:
  dates:
  - date: '2022-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: inspection of a homogeneous batch of {{0.10,measuring instruments}} based
      on the results of evaluation of a statistically appropriate number of specimens
      selected at random from an identified lot
  examples: []
  id: 2.18-eng
  notes:
  - content: The conditions under which the respective instruments have been used
      (e.g. water quality for water meters) may be amongst the parameters determining
      the homogeneity of the batch.
  - content: 'ISO 3534-2 gives the following definition: “4.1.6 sampling inspection
      - inspection of selected items in the group under consideration”'
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: inspection by sampling
  language_code: eng
  entry_status: valid
