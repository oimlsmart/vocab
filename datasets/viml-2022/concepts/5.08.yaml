  - content: instrument de pesage utilisé pour déterminer la valeur conventionnelle
      de la masse des charges d'essai
  examples: []
  id: 5.08-fra
  notes:
  - content: 'Les instruments de contrôle utilisés pour les essais peuvent être

      — séparés de l''instrument à essayer, ou

