data:
  dates:
  - date: '2022-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: détermination d'une ou de plusieurs caractéristiques d'un objet de l'{{évaluation
      de la conformité,A.1}}, selon une {{procédure,A.7}}
  examples: []
  id: A.10-fra
  notes:
  - content: 'à l’article: La procédure peut être destinée à contrôler les variables
      dans le cadre d’essais pour contribuer à l’exactitude ou à la fiabilité des
      résultats.'
  - content: 'à l’article: Les résultats d’essais peuvent être exprimés sous la forme
      d’unités spécifiées ou par le biais d’une comparaison objective avec les données
      de référence convenues.'
  - content: 'à l’article: Les données de sortie d’essais peuvent inclure des commentaires
      (par exemple, des avis et des interprétations) sur les résultats de l’essai
      et le respect des exigences spécifiées.'
  - content: 'à l’article: Des informations supplémentaires sur les concepts d’essai
      et d’inspection sont données en A.3.4 [ISO/CEI 17000:2020, Annexe A].'
