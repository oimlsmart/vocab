data:
  dates:
  - date: '2022-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: determination of one or more characteristics of an object of {{conformity
      assessment,A.1}}, according to a {{procedure,A.7}}
  examples: []
  id: A.10-eng
  notes:
  - content: The procedure can be intended to control variables within testing as
      a contribution to the accuracy or reliability of the results.
  - content: The results of testing can be expressed in terms of specified units or
      objective comparison with agreed references.
  - content: The output of testing can include comments (e.g. opinions and interpretations)
      about the test results and fulfilment of specified requirements.
  - content: Additional information on the concepts of testing and inspection is given
      in A.3.4 [ISO/IEC 17000:2020, Annex A].
