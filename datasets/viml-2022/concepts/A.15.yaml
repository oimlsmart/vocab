    type: accepted
  definition:
  - content: issue of a statement, based on a decision, that fulfillment of {{specified
      requirements,A.6}} has been demonstrated
  examples: []
  id: A.15-eng
  notes:
  - content: The resulting statement, referred to in this document as a “statement
      of conformity”, is intended to convey the assurance that the specified requirements
      have been fulfilled. Such an assurance does not, of itself, provide contractual
      or other legal guarantees.
  - content: First-party attestation and third-party attestation are distinguished
      by the terms declaration, certification and accreditation, but there is no corresponding
      term applicable to second-party attestation.
  sources:
  - origin:
      ref:
        source: ISO/IEC 17000:2020
