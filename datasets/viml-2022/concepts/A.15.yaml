    type: accepted
  definition:
  - content: délivrance  d'une affirmation basée sur une décision indiquant que le
      respect des  {{exigences spécifiées,A.6}} a été démontré
  examples: []
  id: A.15-fra
  notes:
  - content: 'à l’article: L’affirmation qui en résulte, désignée dans le présent
      document sous le nom de « affirmation de conformité », est destinée à donner
      l’assurance que les exigences spécifiées ont été respectées. Une telle assurance
      ne constitue pas en soi une garantie contractuelle ou autre garantie légale.'
  - content: 'à l’article: L’attestation par première partie et l’attestation par
      tierce partie se distinguent par les termes déclaration, certification et accréditation,
      mais aucun terme correspondant n’est applicable à l’attestation par seconde
      partie.'
