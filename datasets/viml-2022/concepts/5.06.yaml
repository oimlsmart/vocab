data:
  dates:
  - date: '2022-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: dispositif destiné à accomplir une fonction particulière directement
      impliquée dans l'élaboration, la transmission ou l'affichage de résultats de
      mesurage
  examples: []
  id: 5.06-fra
  notes:
  - content: Un dispositif complémentaire peut ou non être soumis au {{contrôle métrologique
      légal,2.01}}, compte tenu de sa fonction dans le {{système de mesure,0.12}}
      ou des réglementations nationales.
  - content: 'Les principaux dispositifs complémentaires sont :

      — dispositif de remise à zéro ;

      — dispositif indicateur répétiteur ;

      — dispositif d''impression ;

      — dispositif de mémorisation ;

      — dispositif indicateur de prix ;

      — dispositif totalisateur ;

      — dispositif de prédétermination ;

      — dispositif de libre-service.'
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: dispositif complémentaire
  language_code: fra
  entry_status: valid
