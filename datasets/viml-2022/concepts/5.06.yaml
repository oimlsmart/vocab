data:
  dates:
  - date: '2022-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: device intended to perform a particular function, directly involved in
      elaborating, transmitting or displaying measurement results
  examples: []
  id: 5.06-eng
  notes:
  - content: An ancillary device may or may not be subject to {{legal metrological
      control,2.01}} according to its function in the {{measuring system,0.12}} or
      to national regulations.
  - content: 'Main ancillary devices are:

      — zero setting device;

      — repeating indicating device;

      — printing device;

      — memory device;

      — price indicating device;

      — totalizing indicating device;

      — pre-setting device;

      — self-service device.'
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: ancillary device
  language_code: eng
  entry_status: valid
