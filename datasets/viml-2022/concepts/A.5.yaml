  definition:
  - content: set of rules and procedures that describes the objects of conformity
      assessment, identifies the specified requirements and provides the methodology
      for performing conformity assessment
  examples: []
  id: A.5-eng
  notes:
  - content: A conformity assessment scheme can be managed within a conformity assessment
      system.
  - content: A conformity assessment scheme can be operated at an international, regional,
      national subnational, or industry sector level.
  - content: A scheme can cover all part of the conformity assessment functions explained
      in Annex A [ISO/IEC 17000:2020].
