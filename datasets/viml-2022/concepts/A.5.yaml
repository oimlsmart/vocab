  definition:
  - content: ensemble de règles et procédures qui décrit les objets de l'{{évaluation
      de la conformité,A.4}}, identifie les exigences spécifiées et fournit la méthodologie
      pour la réalisation de l’évaluation de la conformité
  examples: []
  id: A.5-fra
  notes:
  - content: 'à l’article: Un système particulier d’évaluation de la conformité peut
      être géré au sein d’un système d’évaluation de la conformité.'
  - content: 'à l’article: Un système particulier d’évaluation de la conformité peut
      être mis en œuvre à un niveau international, régional, national, infranational
      ou sectoriel.'
  - content: 'à l’article: Un système particulier peut couvrir tout ou partie des
      fonctions d’évaluation de la conformité expliquées à l’Annexe A [ISO/CEI 17000:2020].'
