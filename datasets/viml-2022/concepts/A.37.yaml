  definition:
  - content: arrangement selon lequel plus de deux  parties reconnaissent ou acceptent
      les résultats de l'{{évaluation de la conformité,A.1}} des autres parties
  examples: []
  id: A.37-fra
  notes:
  - content: 'à l’article: L’expression « résultat d’évaluation de la conformité »
      désigne le produit d’une activité d’évaluation de la conformité (par exemple,
      un rapport ou un certificat) et peut comprendre un constat de non-conformité.'
