  definition:
  - content: arrangement whereby more than two parties recognize or accept each other's
      {{conformity assessment,A.1}} results
  examples: []
  id: A.37-eng
  notes:
  - content: The expression “conformity assessment result” signifies the output of
      any conformity assessment activity (e.g. a report or certificate) and can include
      a finding of nonconformity.
