data:
  dates:
  - date: '2022-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: pratique et processus consistant à appliquer à la {{métrologie,0.01}}
      une structure législative et réglementaire, et à la faire exécuter (voir 0.01)
  examples: []
  id: 1.01-fra
  notes:
  - content: Le champ de la métrologie légale peut différer d'un pays à l'autre.
  - content: 'La métrologie légale comprend

      — l''établissement des exigences légales,

      — le contrôle/l''{{évaluation de la conformité,A.1}} des produits réglementés,

      — la surveillance des produits réglementés et des activités réglementés, et

      — la définition de l''infrastructure nécessaire pour assurer la traçabilité
      des mesurages et {{instruments de mesure,0.10}} réglementés aux étalons {{SI,0.02}}
      ou nationaux.'
  - content: Il existe également des réglementations en dehors du champ de la métrologie
      légale concernant l'exactitude et la pertinence des méthodes de mesurage.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: métrologie légale
  language_code: fra
  entry_status: valid
