data:
  dates:
  - date: '2022-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: practice and process of applying statutory and regulatory structure and
      enforcement to {{metrology,0.01}}
  examples: []
  id: 1.01-eng
  notes:
  - content: The scope of legal metrology may be different from country to country.
  - content: 'Legal metrology includes

      — setting up legal requirements,

      — control / {{conformity assessment,A.1}} of regulated products and regulated
      activities,

      — supervision of regulated products and of regulated activities, and

      — providing the necessary infrastructure for the traceability of regulated measurements
      and {{measuring instruments,0.10}} to {{SI,0.02}} or national standards.'
  - content: There are also regulations outside the area of legal metrology pertaining
      to the accuracy and correctness of measurement methods.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: legal metrology
  language_code: eng
  entry_status: valid
