    type: accepted
  definition:
  - content: vérification d'un {{instrument de mesure,0.10}} qui suit une vérification
      précédente
  examples: []
  id: 2.13-fra
  notes:
  - content: 'Exemples de vérifications ultérieures :

      — vérification périodique obligatoire ;

      — vérification après réparation ;

      — vérification volontaire.'
  - content: La vérification ultérieure d'un {{instrument de mesure,0.10}} peut être
      effectuée avant l'expiration de la période de validité d'une vérification précédente,
      soit à la demande de l'utilisateur (propriétaire), soit quand sa vérification
      est déclarée comme n'étant plus valable.
