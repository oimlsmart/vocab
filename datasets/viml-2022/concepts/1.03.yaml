data:
  dates:
  - date: '2022-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: réglementation technique du domaine de la {{métrologie légale,1.01}}
  examples: []
  id: 1.03-fra
  notes:
  - content: Si applicable, ces réglementations doivent être compatibles avec les
      Recommandations internationales de l'OIML et recourir à leurs exigences.
  - content: |-
      Généralement, le champ de la {{métrologie légale,1.01}} comprend
      — la protection des intérêts des personnes et des sociétés,
      — la protection des intérêts nationaux,
      — la protection de la santé publique et de la sécurité, notamment en rapport avec l'environnement et les services médicaux, et
      — le respect des exigences relatives au commerce et aux transactions.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: réglementation de métrologie légale
  language_code: fra
  entry_status: valid
