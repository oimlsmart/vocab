  - date: '2022-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: technical regulation in the field of {{legal metrology,1.01}}
  examples: []
  id: 1.03-eng
  notes:
  - content: These regulations shall, when applicable, be compatible with the International
      Recommendations of the OIML and make use of their requirements.
  - content: |-
      The scope of {{legal metrology,1.01}} generally includes
      — protection of the interests of individuals and enterprises,
      — protection of national interests,
      — protection of public health and safety, including in relation to the environment and medical services, and
      — meeting the requirements for commerce and trade.
