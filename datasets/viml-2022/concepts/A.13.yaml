  definition:
  - content: assessment of a body against {{specified requirements,A.6}} by representatives
      of other bodies in, or candidates for, an {{agreement group,A.24}}
  examples: []
  id: A.13-eng
  notes:
  - content: “Candidates” are included for the situation where a new group is being
      formed, at which time there would be no bodies in the group.
  - content: The term “peer assessment” is sometimes referred to as “peer evaluation”.
