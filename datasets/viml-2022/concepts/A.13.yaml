data:
  dates:
  - date: '2022-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: évaluation d'un organisme, par rapport à des {{exigences spécifiées,A.6}},
      par des représentants d'autres organismes faisant partie d'un groupe d'accord,
      ou ayant posé leurs candidatures pour ce {{groupe d'accord,A.24}}
  examples: []
  id: A.13-fra
  notes:
  - content: 'à l’article: « Ayant posé leurs candidatures » est inclus lorsqu’un
      nouveau groupe se forme et qu’il n’existe pas d’organismes au sein du groupe.'
  - content: 'à l’article: Le terme « évaluation par des pairs » est parfois désigné
      sous le terme « appréciation par des pairs ».'
  sources:
