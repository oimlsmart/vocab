data:
  dates:
  - date: '2022-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: manufacturer's declaration of conformity of {{0.10,measuring instruments}}
      to legal metrological requirements for {{2.12,initial verification}}; the declaration
      is permitted on condition that the manufacturer has a quality management system
      implemented and approved by a competent body
  examples: []
  id: 2.23-eng
  notes:
  - content: The {{1.04,national responsible body}} shall have in place a means for
      periodically validating the implementation of a manufacturer's quality management
      system.
  - content: The quality management program for {{0.10,measuring instruments}} shall
      be in accordance with legal metrological requirements for {{2.12,initial verification}}
      according to national laws or regulations for {{2.01,legal metrological control}}.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: initial verification of measuring instruments utilizing the manufacturer's
      quality management system
  language_code: eng
  entry_status: valid
date_accepted: '2022-01-01T00:00:00+00:00'
