data:
  dates:
  - date: '2022-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: déclaration de conformité d'{{0.10,instruments de mesure}} aux exigences
      de métrologie légale applicables à la {{2.12,vérification primitive}} établie
      par le fabricant, la déclaration étant subordonnée à la mise en place d'un système
      de management de la qualité par le fabricant, approuvé par un organisme compétent
  examples: []
  id: 2.23-fra
  notes:
  - content: L'{{1.04,organisme national responsable}} doit avoir établi les moyens
      de valider périodiquement la mise en œuvre du système de management de la qualité
      du fabricant.
  - content: Le programme de management de la qualité des {{0.10,instruments de mesure}}
      doit être conforme aux exigences métrologiques légales applicables à la {{2.12,vérification primitive}}, conformément aux lois et règlements du {{2.01,contrôle de métrologie légale}}.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: vérification primitive d'instruments de mesure par recours au système
      de management de la qualité du fabricant
  - type: expression
    normative_status: admitted
    designation: vérification primitive par assurance de la qualité
  language_code: fra
  entry_status: valid
date_accepted: '2022-01-01T00:00:00+00:00'
