data:
  dates:
  - date: '2022-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: valeur extrême de l'erreur de mesure, par rapport à une valeur de référence
      connue, qui est tolérée par les spécifications ou règlements pour un mesurage,
      un {{instrument de mesure,0.10}} ou un système de mesure donné
  examples: []
  id: 0.05-fra
  notes:
  - content: Les termes « erreurs maximales tolérées » ou « limites d'erreur » sont
      généralement utilisés lorsqu'il y a deux valeurs extrêmes.
  - content: Il convient de ne pas utiliser le terme  « tolérance » pour désigner
      l'erreur maximale tolérée.
  - content: L'expression « erreur maximale tolérée » est couramment représentée sous
      une forme abrégée « MPE » ou « mpe ».
