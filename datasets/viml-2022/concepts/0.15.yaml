data:
  dates:
  - date: '2022-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: set of operations carried out on a {{measuring system,0.12}} so that
      it provides prescribed {{indications,0.03}} corresponding to given values of
      a quantity to be measured
  examples: []
  id: 0.15-eng
  notes:
  - content: Types of adjustment of a measuring system include zero adjustment of
      a measuring system, offset adjustment, and span adjustment (sometimes called
      gain adjustment).
  - content: Adjustment of a measuring system should not be confused with {{calibration,0.14}},
      which is a prerequisite for adjustment.
  - content: After an adjustment of a measuring system, the measuring system must
      usually be recalibrated.
  sources:
