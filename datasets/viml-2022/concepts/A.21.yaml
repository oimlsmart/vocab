    type: accepted
  definition:
  - content: temporary restriction of the statement of conformity by the body that
      issued the statement, for all or part of the specified scope of  {{attestation,A.15}}
  examples: []
  id: A.21-eng
  notes:
  - content: "EXAMPLE 1:\tThe issuing body suspends the statement of conformity because\
      \ the specified requirements are no longer fulfilled.\nEXAMPLE 2:\tThe client\
      \ of the issuing body voluntarily requests suspension of the statement of conformity.\n\
      EXAMPLE 3:\tThe issuing body suspends the statement of conformity because it\
      \ temporarily ceases to perform that type of conformity assessment activity."
  sources:
  - origin:
      ref:
        source: ISO/IEC 17000:2020
      locality:
        type: clause
        reference_from: '8.2'
    type: authoritative
