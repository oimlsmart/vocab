    type: accepted
  definition:
  - content: restriction temporaire de l’affirmation de conformité par l’organisme
      ayant délivré l’affirmation, pour une partie ou l’ensemble de la portée  d'{{attestation,A.15}}
      spécifiée
  examples: []
  id: A.21-fra
  notes:
  - content: "EXAMPLE 1: \t L’organisme qui délivre l’affirmation de conformité la\
      \ suspend, car les exigences spécifiées ne sont plus respectées.\nEXAMPLE 2:\
      \ \t Le client de l’organisme qui délivre l’affirmation de conformité demande\
      \ volontairement sa suspension.\nEXAMPLE 3: \t L’organisme qui délivre l’affirmation\
      \ de conformité suspend cette dernière, car il cesse temporairement de réaliser\
      \ ce type d’activité d’évaluation de la conformité."
