data:
  dates:
  - date: '2022-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: demonstration that {{specified requirements,A.6}} are fulfilled
  examples: []
  id: A.1-eng
  notes:
  - content: The process of conformity assessment as described in the functional approach
      in Annex A [ISO/IEC 17000:2020] can have a negative outcome, i.e. demonstrating
      that the specified requirements are not fulfilled.
  - content: Conformity assessment includes activities defined elsewhere in this document,
      such as but not limited to testing, inspection, validation, verification, certification,
      and accreditation.
  - content: Conformity assessment is explained in Annex A [ISO/IEC 17000:2020] as
      a series of functions. Activities contributing to any of these functions can
      be described as conformity assessment activities.
  - content: This document does not include a definition of “conformity”. “Conformity”
      does not feature in the definition of “conformity assessment”. Nor does this
      document address the concept of compliance.
