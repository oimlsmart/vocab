data:
  dates:
  - date: '2022-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: démonstration que des {{exigences spécifiées,A.6}} sont respectées
  examples: []
  id: A.1-fra
  notes:
  - content: 'à l’article: Le processus d’évaluation de la conformité tel que décrit
      dans l’approche fonctionnelle de l’Annexe A [ISO/CEI 17000 :2020] peut aboutir
      à un résultat négatif, c’est-à-dire en démontrant que les exigences spécifiées
      ne sont pas respectées.'
  - content: 'à l’article: L’évaluation de la conformité inclut des activités définies
      ailleurs dans le présent document, telles que, sans pour autant s’y limiter
      essai, inspection, validation, vérification, certification, et accréditation.'
  - content: 'à l’article: L’évaluation de la conformité est expliquée à l’Annexe
      A [ISO/CEI 17000 :2020] par une suite de fonctions. Les activités contribuant
      à l’une de ces fonctions peuvent être décrites comme étant des activités d’évaluation
      de la conformité.'
  - content: 'à l’article: Le présent document n’inclut pas de définition pour le
      terme « conformité ». Le terme « conformité » ne figure pas dans la définition
      du terme « évaluation de la conformité ». Le présent document n’aborde pas non
      plus le concept de « compliance ».'
