data:
  dates:
  - date: '2022-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: actes légaux et réglementaires pris pour application de ces lois, qui
      donnent la structure légale à la {{0.01,métrologie}}
  examples: []
  id: 1.02-fra
  notes:
  - content: 'Les actes légaux et la réglementation induite définissent, en particulier,
      les {{1.06,unités de mesure légales}} et prescrivent

      — les exigences relatives aux caractéristiques des {{0.10,instruments de mesure}},

      — l''exactitude de mesurage, lorsqu''elle est définie par voie légale,

      — un système de {{2.02,contrôle légal des instruments de mesure}}, et

      — la {{2.03,surveillance métrologique}}.'
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: loi de métrologie
  language_code: fra
