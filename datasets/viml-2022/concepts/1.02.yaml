  dates:
  - date: '2022-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: actes légaux et réglementaires pris pour application de ces lois, qui
      donnent la structure légale à la {{métrologie,0.01}}
  examples: []
  id: 1.02-fra
  notes:
  - content: 'Les actes légaux et la réglementation induite définissent, en particulier,
      les {{unités de mesure légales,1.06}} et prescrivent

      — les exigences relatives aux caractéristiques des {{instruments de mesure,0.10}},

      — l''exactitude de mesurage, lorsqu''elle est définie par voie légale,

      — un système de {{contrôle légal des instruments de mesure,2.02}}, et

      — la {{surveillance métrologique,2.03}}.'
  sources: []
