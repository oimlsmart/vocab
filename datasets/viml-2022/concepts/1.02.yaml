    type: accepted
  definition:
  - content: legal acts and secondary legislation that provide the statutory structure
      to {{metrology,0.01}}
  examples: []
  id: 1.02-eng
  notes:
  - content: 'Legal acts and secondary legislation in particular specify the {{legal
      units of measurement,1.06}}, prescribe

      — requirements with respect to the properties of {{measuring instruments,0.10}},

      — accuracy of measurement in cases specified by law,

      — a system of {{legal control of measuring instruments,2.02}}, and

      — {{metrological supervision,2.03}}.'
  sources: []
