  - date: '2022-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: legal acts and secondary legislation that provide the statutory structure
      to {{0.01,metrology}}
  examples: []
  id: 1.02-eng
  notes:
  - content: 'Legal acts and secondary legislation in particular specify the {{1.06,legal units of measurement}}, prescribe

      — requirements with respect to the properties of {{0.10,measuring instruments}},

      — accuracy of measurement in cases specified by law,

      — a system of {{2.02,legal control of measuring instruments}}, and

      — {{2.03,metrological supervision}}.'
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: law on metrology
  language_code: eng
  entry_status: valid
