    type: accepted
  definition:
  - content: the whole of {{1.01,legal metrology}} activities
  examples: []
  id: 2.01-eng
  notes:
  - content: 'Legal metrological control includes

      — {{2.02,legal control of measuring instruments}},

      — {{2.03,metrological supervision}},

      — all the operations for the purpose of examining and demonstrating, e.g. to
      testify in a court of law, the condition of a {{0.10,measuring instrument}}
      and to determine its metrological properties, amongst others by reference to
      the relevant statutory requirements.'
