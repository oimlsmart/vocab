data:
  dates:
  - date: '2022-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: ensemble des activités de {{1.01,métrologie légale}}
  examples: []
  id: 2.01-fra
  notes:
  - content: 'Le contrôle de métrologie légale inclut

      — le {{2.02,contrôle légal des instruments de mesure}},

      — la {{2.03,surveillance métrologique}},

      — l''ensemble des opérations consistant à examiner et établir, par exemple dans
      le cadre d''une expertise devant une cour de justice, l''état d''un {{0.10,instrument de mesure}}, et à déterminer ses caractéristiques métrologiques, notamment
      au regard des exigences métrologiques applicables.'
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: contrôle de métrologie légale
