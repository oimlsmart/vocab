data:
  dates:
  - date: '2022-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: décision de portée légale annulant une {{approbation de type,2.05}}
  examples: []
  id: 2.08-fra
  notes:
  - content: 'Le retrait est justifié dans les cas suivants :

      — modification du type ;

      — modification de ses parties essentielles ;

      — circonstances qui affectent la {{durabilité,5.15}} et/ou la fiabilité métrologique
      ;

      — effets altérant les performances métrologiques de l''instrument exigées par
      la loi et révélés seulement après que l''{{approbation de type,2.05}} officielle
      a été accordée.'
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: retrait d'une approbation de type
