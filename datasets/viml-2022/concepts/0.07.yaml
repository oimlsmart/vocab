data:
  dates:
  - date: '2022-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: quantity that, in a direct measurement, does not affect the quantity
      that is actually measured, but affects the relation between the {{indication,0.03}}
      and the measurement result
  examples:
  - content: Frequency in the direct measurement with an ammeter of the constant amplitude
      of an alternating current.
  - content: Amount-of-substance concentration of bilirubin in a direct measurement
      of hemoglobin amount-of-substance concentration in human blood plasma.
  - content: Temperature of a micrometer used for measurement of length of a rod,
      but not the temperature of the rod itself, which can enter into the definition
      of the measurand.
  - content: Background pressure in the ion source of a mass spectrometer during a
      measurement of amount-of-substance fraction.
  id: 0.07-eng
  notes:
  - content: An indirect measurement involves a combination of direct measurements,
      each of which may be affected by influence quantities.
  - content: |-
      In the GUM2, the concept 'influence quantity' is defined as in the 2nd edition of the VIM, covering not only the quantities affecting the measuring system, as in the definition above, but also those quantities that affect the quantities actually measured. Also, in the GUM this concept is not restricted to direct measurements.
      2Guide to the expression of uncertainty in measurement, see OIML publication G 1-100.
  - content: |-
      In the GUM2, the concept 'influence quantity' is defined as in the 2nd edition of the VIM, covering not only the quantities affecting the measuring system, as in the definition above, but also those quantities that affect the quantities actually measured. Also, in the GUM this concept is not restricted to direct measurements.
      2Guide to the expression of uncertainty in measurement, see OIML publication G 1-100.
