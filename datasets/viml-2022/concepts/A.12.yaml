data:
  dates:
  - date: '2022-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: processus permettant d’obtenir des informations pertinentes sur un objet
      de l’évaluation de la conformité et de l’évaluer objectivement pour déterminer
      dans quelle mesure les  {{exigences spécifiées,A.6}} sont respectées
  examples: []
  id: A.12-fra
  notes:
  - content: 'à l’article: Les exigences spécifiées sont définies avant la réalisation
      d’un audit de manière à obtenir des informations pertinentes.'
  - content: 'à l’article: Les systèmes de management, les processus, les produits
      et les services sont des exemples d’objets d’audit.'
  - content: 'à l’article: À des fins d’accréditation, le processus d’audit est appelé
      « évaluation ».'
  sources:
