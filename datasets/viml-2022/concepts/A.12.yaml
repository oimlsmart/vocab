  dates:
  - date: '2022-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: process for obtaining relevant information about an object of conformity
      assessment and evaluating it objectively to determine the extent to which {{specified
      requirements,A.6}} are fulfilled
  examples: []
  id: A.12-eng
  notes:
  - content: The specified requirements are defined prior to performing an audit so
      that the relevant information can be obtained.
  - content: Examples of objects for an audit are management systems, processes, products
      and services.
  - content: For accreditation purposes, the audit process is called “assessment”.
  sources:
