  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: '*incertitude-type* obtenue en utilisant les incertitudes-types individuelles
      associées aux *grandeurs d''entrée dans un modèle de mesure*'
  examples: []
  id: 2.31-fra
  language_code: fra
  notes:
  - content: Lorsqu'il existe des corrélations entre les grandeurs d'entrée dans
      un modèle de mesure, il faut aussi prendre en compte des covariances dans le
      calcul de l'incertitude-type composée; voir aussi le GUM, 2.3.4.
  terms:
  - type: expression
    normative_status: preferred
    designation: incertitude-type composée
