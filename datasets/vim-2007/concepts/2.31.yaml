data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: '*standard measurement uncertainty* that is obtained using the individual
      *standard measurement uncertainties* associated with the *input quantities in a measurement model*'
  examples: []
  id: 2.31-eng
  language_code: eng
  notes:
  - content: In case of correlations of input quantities in a measurement model,
      covariances must also be taken into account when calculating the combined
      standard measurement uncertainty; see also GUM, 2.3.4.
  terms:
  - type: expression
    normative_status: preferred
    designation: combined standard measurement uncertainty
  - type: expression
    normative_status: admitted
    designation: combined standard measurement uncertainty
