  definition:
  - content: incertitude-type obtenue en utilisant les incertitudes-types individuelles
      associées aux grandeurs d'entrée dans un modèle de mesure Note Lorsqu'il existe
      des corrélations entre les grandeurs d'entrée dans un modèle de mesure, il faut
      aussi prendre en compte des covariances dans le calcul de l'incertitude-type
      composée; voir aussi le GUM, 2.3.4.
