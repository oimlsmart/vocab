    type: accepted
  definition:
  - content: quantity, in a system of quantities, defined in terms of the base quantities
      of that system
  examples:
  - content: In a system of quantities having the base quantities length and mass,
      mass density is a derived quantity defined as the quotient of mass and volume
      (length to the third power).
  id: 1.5-eng
  language_code: eng
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: derived quantity
