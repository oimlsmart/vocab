  definition:
  - content: unité de mesure d'une grandeur dérivée EXEMPLES Le mètre par seconde,
      symbole m/s, et le centimètre par seconde, symbole cm/s sont des unités dérivées
      de vitesse dans le SI. Le kilomètre par heure, symbole km/h, est une unité de
      vitesse en dehors du SI mais dont l'usage est accepté avec le SI. Le nœud, égal
      à un mille marin par heure, est une unité de vitesse en dehors du SI.
