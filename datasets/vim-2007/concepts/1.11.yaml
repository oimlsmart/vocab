data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: unité de mesure d'une grandeur dérivée
  examples:
  - content: Le mètre par seconde, symbole m/s, et le centimètre par seconde, symbole
      cm/s sont des unités dérivées de vitesse dans le SI. Le kilomètre par heure,
      symbole km/h, est une unité de vitesse en dehors du SI mais dont l'usage est
      accepté avec le SI. Le nœud, égal à un mille marin par heure, est une unité
      de vitesse en dehors du SI.
  id: 1.11-fra
  language_code: fra
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: unité dérivée, f
