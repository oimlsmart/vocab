data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: measurement unit for a derived quantity
  examples:
  - content: The metre per second, symbol m/s, and the centimetre per second, symbol
      cm/s, are derived units of speed in the SI. The kilometre per hour, symbol km/h,
      is a measurement unit of speed outside the SI but accepted for use with the
      SI. The knot, equal to one nautical mile per hour, is a measurement unit of
      speed outside the SI.
  id: 1.11-eng
  language_code: eng
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: derived unit
date_accepted: '2007-01-01T00:00:00+00:00'
entry_status: valid
