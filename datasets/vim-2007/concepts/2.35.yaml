data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: product of a combined standard measurement uncertainty and a factor larger
      than the number one
  examples: []
  id: 2.35-eng
  language_code: eng
  notes:
  - content: The factor depends upon the type of probability distribution of the output
      quantity in a measurement model and on the selected coverage probability.
  - content: The term “factor” in this definition refers to a coverage factor.
  - content: Expanded measurement uncertainty is termed “overall uncertainty” in paragraph
      5 of Recommendation INC-1 (1980) (see GUM) and simply “uncertainty” in IEC documents.
  terms:
  - type: expression
    normative_status: preferred
    designation: expanded measurement uncertainty
  - type: expression
    normative_status: admitted
    designation: expanded uncertainty
date_accepted: '2007-01-01T00:00:00+00:00'
