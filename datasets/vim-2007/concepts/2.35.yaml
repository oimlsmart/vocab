data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: produit d'une incertitude-type composée et d'un facteur supérieur au
      nombre un
  examples: []
  id: 2.35-fra
  language_code: fra
  notes:
  - content: Le facteur dépend du type de la loi de probabilité de la grandeur de
      sortie dans un modèle de mesure et de la probabilité de couverture choisie.
  - content: Le facteur qui intervient dans la définition est un facteur d'élargissement.
  - content: L'incertitude élargie est appelée « incertitude globale » au paragraphe
      5 de la Recommandation INC 1 (1980) (voir le GUM) et simplement « incertitude
      » dans les documents de la CEI.
  terms:
  - type: expression
    normative_status: preferred
    designation: incertitude élargie, f
