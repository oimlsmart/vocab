data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: conventional value of a quantity conventional value quantity value attributed
      by agreement to a quantity for a given purpose
  examples:
  - content: a) Standard acceleration of free fall (formerly called “standard acceleration
      due to gravity”), gn = 9.806 65 m s2. b) Conventional quantity value of the
      Josephson constant, KJ-90 = 483 597.9 GHz V −1 . c) Conventional quantity value
      of a given mass standard, m = 100.003 47 g.
  id: 2.12-eng
  language_code: eng
  notes:
  - content: The term “conventional true quantity value” is sometimes used for this
      concept, but its use is discouraged.
  - content: Sometimes a conventional quantity value is an estimate of a true quantity
      value.
  - content: A conventional quantity value is generally accepted as being associated
      with a suitably small measurement uncertainty, which might be zero.
  terms:
  - type: expression
    normative_status: preferred
    designation: conventional quantity value
date_accepted: '2007-01-01T00:00:00+00:00'
entry_status: valid
