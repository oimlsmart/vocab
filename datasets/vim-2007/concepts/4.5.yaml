    type: accepted
  definition:
  - content: absolute value of the difference between the extreme *quantity values*
      of a *nominal indication interval*
  examples:
  - content: For a nominal indication interval of stem:[-10 "unitsml(V)"] to stem:[+10 "unitsml(V)"], the range of the
      nominal indication interval is stem:[20 "unitsml(V)"]
  id: 4.5-eng
  language_code: eng
  notes:
  - content: Range of a nominal indication interval is sometimes termed "span
      of a nominal interval".
  terms:
  - type: expression
    normative_status: preferred
    designation: range of a nominal indication interval
