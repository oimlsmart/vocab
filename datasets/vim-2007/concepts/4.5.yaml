    type: accepted
  definition:
  - content: valeur absolue de la différence entre les valeurs extrêmes d'un intervalle
      nominal des indications
  examples:
  - content: Pour un intervalle nominal des indications de –10 V à +10 V, l'étendue
      de mesure est 20 V. Note En anglais, l'étendue de mesure est quelquefois dénommée
      « span of a nominal interval ». En français, le terme « intervalle de mesure
      » est parfois improprement employé.
  id: 4.5-fra
  language_code: fra
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: étendue de mesure, f
  - type: expression
    normative_status: admitted
    designation: étendue nominale, f
