    type: accepted
  definition:
  - content: valeur absolue de la différence entre les valeurs extrêmes d'un *intervalle
      nominal des indications*
  examples:
  - content: Pour un intervalle nominal des indications de stem:[-10 "unitsml(V)"] à stem:[+10 "unitsml(V)"], l'étendue
      de mesure est stem:[20 "unitsml(V)"]
  id: 4.5-fra
  language_code: fra
  notes:
  - content: En anglais, l'étendue de mesure est quelquefois dénommée « span
      of a nominal interval ». En français, le terme « intervalle de mesure » est
      parfois improprement employé.
