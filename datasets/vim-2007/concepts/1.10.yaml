data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: measurement unit that is adopted by convention for a base quantity
  examples:
  - content: In the SI, the metre is the base unit of length. In the CGS systems the
      centimetre is the base unit of length.
  - content: Rainfall, when defined as areic volume (volume per area), has the metre
      as a coherent derived unit in the SI.
  id: 1.10-eng
  language_code: eng
  notes:
  - content: In each coherent system of units there is only one base unit for each
      base quantity.
  - content: A base unit may also serve for a derived quantity of the same quantity
      dimension.
  - content: For number of entities, the number one, symbol 1, can be regarded as
      a base unit in any system of units.
  terms:
  - type: expression
    normative_status: preferred
    designation: base unit
date_accepted: '2007-01-01T00:00:00+00:00'
entry_status: valid
id: a882625c-8c0d-4919-b2f6-9e1bf05ed71f
