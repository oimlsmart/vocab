data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: unité de mesure adoptée par convention pour une grandeur de base
  examples: []
  id: 1.10-fra
  language_code: fra
  notes:
  - content: Dans chaque système cohérent d'unités, il y a une seule unité de base
      pour chaque grandeur de base. EXEMPLE Dans le SI, le mètre est l'unité de base
      de longueur. Dans les systèmes CGS, le centimètre est l'unité de base de longueur.
  - content: Une unité de base peut aussi servir pour une grandeur dérivée de même
      dimension. EXEMPLE La hauteur de pluie, définie comme un volume surfacique (volume
      par aire) a le mètre comme unité dérivée cohérente dans le SI.
  - content: Pour un nombre d’entités, on peut considérer le nombre un, de symbole
      1, comme une unité de base dans tout système d’unités.
  terms:
  - type: expression
    normative_status: preferred
    designation: unité de base, f
date_accepted: '2007-01-01T00:00:00+00:00'
entry_status: valid
id: 8d101e8c-ab7d-4d63-a02b-161d46a4a630
