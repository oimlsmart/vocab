data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: valeur extrême de l'erreur de mesure, par rapport à une valeur de référence
      connue, qui est tolérée par les spécifications ou règlements pour un mesurage,
      un instrument de mesure ou un système de mesure donné
  examples: []
  id: 4.26-fra
  language_code: fra
  notes:
  - content: Les termes « erreurs maximales tolérées » et « limites d'erreur » sont
      généralement utilisés lorsqu'il y a deux valeurs extrêmes.
  - content: Il convient de ne pas utiliser le terme « tolérance » pour désigner l'erreur
      maximale tolérée. _________________________________________________________________________________________________________________________________________________________________________________________________________________________
  terms:
  - type: expression
    normative_status: preferred
    designation: erreur maximale tolérée, f
  - type: expression
    normative_status: admitted
    designation: limite d’erreur, f
date_accepted: '2007-01-01T00:00:00+00:00'
entry_status: valid
