data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: extreme value of measurement error, with respect to a known reference
      quantity value, permitted by specifications or regulations for a given measurement,
      measuring instrument, or measuring system
  examples: []
  id: 4.26-eng
  language_code: eng
  notes:
  - content: Usually the term “maximum permissible errors” or “limits of error” are
      used, where there are two extreme values.
  - content: The term “tolerance” should not be used to designate ‘maximum permissible
      error’.
  terms:
  - type: expression
    normative_status: preferred
    designation: maximum permissible measurement error
  - type: expression
    normative_status: admitted
    designation: maximum permissible error
  - type: expression
    normative_status: admitted
    designation: limit of error
date_accepted: '2007-01-01T00:00:00+00:00'
entry_status: valid
