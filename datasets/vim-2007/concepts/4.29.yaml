data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: measurement uncertainty where the specified measured quantity value is
      zero
  examples: []
  id: 4.29-eng
  language_code: eng
  notes:
  - content: Null measurement uncertainty is associated with a null or near zero indication
      and covers an interval where one does not know whether the measurand is too
      small to be detected or the indication of the measuring instrument is due only
      to noise.
  - content: The concept of 'null measurement uncertainty' also applies when a difference
      is obtained between measurement of a sample and a blank.
  terms:
  - type: expression
    normative_status: preferred
    designation: null measurement uncertainty
