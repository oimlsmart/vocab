data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: element of a *measuring system* that is directly affected by a phenomenon,
      body, or substance carrying a *quantity* to be measured
  examples:
  - content: Sensing coil of a platinum resistance thermometer
  - content: rotor of a turbine flow meter
  - content: Bourdon tube of a pressure gauge
  - content: float of a level-measuring instrument
  - content: photocell of a spectrometer
  - content: thermotropic liquid crystal which changes colour as a function of temperature
  id: 3.8-eng
  language_code: eng
  notes:
  - content: In some fields the term "detector" is used for this concept.
  terms:
  - type: expression
    normative_status: preferred
    designation: sensor
date_accepted: '2007-01-01T00:00:00+00:00'
