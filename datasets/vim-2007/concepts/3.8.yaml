data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: élément d'un *système de mesure* qui est directement soumis à l'action
      du phénomène, du corps ou de la substance portant la *grandeur* à mesurer
  examples:
  - content: Bobine sensible d'un thermomètre à résistance de platine
  - content: rotor d'un débitmètre à turbine
  - content: tube de Bourdon d'un manomètre
  - content: flotteur d'un appareil de mesure de niveau
  - content: récepteur photoélectrique d'un spectrophotomètre
  - content: cristal liquide thermotrope dont la couleur change en fonction de la température
  id: 3.8-fra
  language_code: fra
  notes:
  - content: Dans certains domaines, le terme « détecteur » est employé pour
      ce concept.
  terms:
  - type: expression
    normative_status: preferred
    designation: capteur
    grammar_info:
    - gender: m
