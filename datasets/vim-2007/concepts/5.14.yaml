data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: matériau de référence, accompagné d'une documentation délivrée par un
      organisme faisant autorité et fournissant une ou plusieurs valeurs de propriétés
      spécifiées avec les incertitudes et les traçabilités associées, en utilisant
      des procédures valables
  examples:
  - content: sérum humain dont la valeur assignée à la concentration de cholestérol
      et l'incertitude de mesure associée sont indiquées dans un certificat et qui
      sert d'étalon dans un étalonnage ou de matériau de contrôle de la justesse de
      mesure
  id: 5.14-fra
  language_code: fra
  notes:
  - content: La documentation mentionnée est délivrée sous la forme d'un « certificat
      » (voir le Guide ISO 31:1992).
  - content: Des procédures pour la production et la certification de matériaux de
      référence certifiés sont données, par exemple, dans les Guides ISO 34 et 35.
  - content: Dans la définition, le terme « incertitude » peut désigner soit une incertitude
      de mesure, soit l’incertitude associée à la valeur d’une propriété qualitative,
      telle que l’identité ou la séquence. Le terme « traçabilité » peut désigner
      soit la traçabilité métrologique de la valeur d’une grandeur, soit la traçabilité
      de la valeur d’une propriété qualitative.
  - content: Les valeurs de grandeurs spécifiées des matériaux de référence certifiés
      exigent une traçabilité métrologique avec une incertitude de mesure associée
      (voir Accred Qual Assur:2006[7]).
  - content: La définition de l'ISO/REMCO est analogue (Accred Qual Assur:2006[7]),
      mais utilise « métrologique » à la fois pour une grandeur et pour une propriété
      qualitative.
  terms:
  - type: expression
    normative_status: preferred
    designation: matériau de référence certifié, m
  - type: expression
    normative_status: admitted
    designation: MRC
