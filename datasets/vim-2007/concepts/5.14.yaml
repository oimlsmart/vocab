data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: reference material, accompanied by documentation issued by an authoritative
      body and providing one or more specified property values with associated uncertainties
      and traceabilities, using valid procedures
  examples:
  - content: Human serum with assigned quantity value for the concentration of cholesterol
      and associated measurement uncertainty stated in an accompanying certificate,
      used as a calibrator or measurement trueness control material.
  id: 5.14-eng
  language_code: eng
  notes:
  - content: ‘Documentation’ is given in the form of a ‘certificate’, see ISO Guide
      31:2000.
  - content: Procedures for the production and certification of certified reference
      materials are given, e.g., in ISO Guides 34 and 35.
  - content: In this definition, “uncertainty” covers both ‘measurement uncertainty’
      and ‘uncertainty associated with the value of a nominal property’, such as for
      identity and sequence. “Traceability” covers both ‘metrological traceability
      of a quantity value’ and ‘traceability of a nominal property value’.
  - content: Specified quantity values of certified reference materials require metrological
      traceability with associated measurement uncertainty (Accred Qual Assur:2006[7]).
  - content: ISO/REMCO has an analogous definition (Accred Qual Assur:2006[7]) but
      uses the modifiers ‘metrological’ and ‘metrologically’ to refer to both quantity
      and nominal property.
  terms:
  - type: expression
    normative_status: preferred
    designation: certified reference material
  - type: expression
    normative_status: admitted
    designation: CRM
date_accepted: '2007-01-01T00:00:00+00:00'
