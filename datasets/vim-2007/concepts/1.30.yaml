data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: property of a phenomenon , body, or substance, where the property has
      no magnitude
  examples:
  - content: a) Sex of a human being. b) Color of a paint sample. c) Color of a spot
      test in chemistry. d) ISO two-letter country code. e) Sequence of amino acids
      in a polypeptide.
  id: 1.30-eng
  language_code: eng
  notes:
  - content: A nominal property has a value, which can be expressed in words, by alpha-numerical
      codes, or by other means.
  - content: "'Nominal property value' is not to be confused with nominal quantity
      value. _________________________________________________________________________________________________________________________________________________________________________________________________________________________"
  terms:
  - type: expression
    normative_status: preferred
    designation: nominal property
