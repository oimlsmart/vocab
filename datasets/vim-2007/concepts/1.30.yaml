data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: propriété d'un phénomène, d'un corps ou d'une substance, que l'on ne
      peut pas exprimer quantitativement
  examples:
  - content: a) Sexe d'une personne. b) Couleur d'un spécimen de peinture. c) Couleur
      d’un spot test en chimie. d) Code de pays ISO à deux lettres. e) Séquence d’acides
      aminés dans un polypeptide.
  id: 1.30-fra
  language_code: fra
  notes:
  - content: Une propriété qualitative a une valeur, qui peut être exprimée par des
      mots, par des codes alphanumériques ou par d'autres moyens.
  - content: La valeur d'une propriété qualitative ne doit pas être confondue avec
      la valeur nominale d'une grandeur.
  terms:
  - type: expression
    normative_status: preferred
    designation: propriété qualitative, f
  - type: expression
    normative_status: admitted
    designation: attribut, m
