data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: metrological comparability comparability of measurement results, for
      quantities of a given kind, that are metrologically traceable to the same reference
  examples:
  - content: Measurement results, for the distances between Earth and Moon, and between
      Paris and London, are metrologically comparable when they are both metrologically
      traceable to the same measurement unit, for instance the metre.
  id: 2.46-eng
  language_code: eng
  notes:
  - content: See Note 1 to 2.41 metrological traceability.
  - content: Metrological comparability of measurement results does not necessitate
      that the measured quantity values and associated measurement uncertainties compared
      be of the same order of magnitude.
  terms:
  - type: expression
    normative_status: preferred
    designation: metrological comparability of measurement results
date_accepted: '2007-01-01T00:00:00+00:00'
