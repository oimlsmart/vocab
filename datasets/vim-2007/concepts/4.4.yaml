    type: accepted
  definition:
  - content: set of quantity values, bounded by rounded or approximate extreme indications,
      obtainable with a particular setting of the controls of a measuring instrument
      or measuring system and used to designate that setting
  examples:
  - content: ", “100 V to 200 V”."
  id: 4.4-eng
  language_code: eng
  notes:
  - content: A nominal indication interval is usually stated as its smallest and greatest
      quantity values, for
  - content: 'In some fields the term is “nominal range”. _________________________________________________________________________________________________________________________________________________________________________________________________________________________
      Chapitre 4 : Propriétés des dispositifs de mesure'
  terms:
  - type: expression
    normative_status: preferred
    designation: nominal indication interval
  - type: expression
    normative_status: admitted
    designation: nominal interval
