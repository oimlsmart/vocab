data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: ensemble des valeurs comprises entre deux indications extrêmes arrondies
      ou approximatives, que l'on obtient pour une position particulière des commandes
      d'un instrument de mesure ou d'un système de mesure et qui sert à désigner cette
      position
  examples: []
  id: 4.4-fra
  language_code: fra
  notes:
  - content: Un intervalle nominal des indications est généralement exprimé en donnant
      la plus petite et la plus grande valeur, par exemple « 100 V à 200 V ».
  - content: Dans certains domaines, le terme anglais est « nominal range ».
  terms:
  - type: expression
    normative_status: preferred
    designation: intervalle nominal des indications, m
  - type: expression
    normative_status: admitted
    designation: intervalle nominal, m
  - type: expression
    normative_status: admitted
    designation: calibre, m
