data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: '*valeur d''une grandeur* servant de base de comparaison pour les valeurs
      de *grandeurs* de même *nature*'
  id: 5.18-fra
  language_code: fra
  notes:
  - content: La valeur de référence peut être une *valeur vraie* d'un *mesurande*, et
      est alors inconnue, ou une *valeur conventionnelle*, et est alors connue.
  - content: |
      Une valeur de référence associée à son *incertitude de mesure* se rapporte généralement à :

      . un matériau, par exemple un *matériau de référence certifié*,
      . un dispositif, par exemple un laser stabilisé,
      . une *procédure de mesure de référence*,
      . une comparaison d'*étalons*.
  terms:
  - type: expression
    normative_status: preferred
    designation: valeur de référence
    grammar_info:
    - gender: f
date_accepted: '2007-01-01T00:00:00+00:00'
