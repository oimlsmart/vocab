  notes:
  - content: La valeur de référence peut être une valeur vraie d'un mesurande, et
      est alors inconnue, ou une valeur conventionnelle, et est alors connue.
  - content: 'Une valeur de référence associée à son incertitude de mesure se rapporte
      généralement à : a) un matériau, par exemple un matériau de référence certifié,
      b) un dispositif, par exemple un laser stabilisé, c) une procédure de mesure
      de référence, d) une comparaison d''étalons.'
