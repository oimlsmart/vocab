  definition:
  - content: ensemble de grandeurs associé à un ensemble de relations non contradictoires
      entre ces grandeurs Note Les grandeurs ordinales, telles que la dureté C de
      Rockwell, ne sont généralement pas considérées comme faisant partie d'un système
      de grandeurs, parce qu'elles ne sont reliées à d'autres grandeurs que par des
      relations empiriques.
