data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: formulation d'une incertitude de mesure et des composantes de cette incertitude,
      ainsi que de leur calcul et de leur combinaison
  examples: []
  id: 2.33-fra
  language_code: fra
  notes:
  - content: Un bilan d'incertitude devrait comprendre le *modèle de mesure*,
      les estimations et incertitudes associées aux *grandeurs* qui interviennent
      dans ce modèle, les covariances, le type des fonctions de densité de probabilité
      utilisées, les degrés de liberté, le type d'évaluation de l'incertitude, ainsi que
      tout *facteur d'élargissement*.
  terms:
  - type: expression
    normative_status: preferred
    designation: bilan d'incertitude
    grammar_info:
    - gender: m
