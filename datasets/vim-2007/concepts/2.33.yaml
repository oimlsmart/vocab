  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: statement of a *measurement uncertainty*, of the components of that measurement
      uncertainty, and of their calculation and combination
  examples: []
  id: 2.33-eng
  language_code: eng
  notes:
  - content: An uncertainty budget should include the *measurement model*, estimates,
      and measurement uncertainties associated with the *quantities* in the measurement model,
      covariances, type of applied probability density functions, degrees of freedom,
      type of evaluation of measurement uncertainty, and any *coverage factor*.
  terms:
  - type: expression
    normative_status: preferred
    designation: uncertainty budget
