data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: valeur d'une grandeur représentant un résultat de mesure
  examples: []
  id: 2.10-fra
  language_code: fra
  notes:
  - content: Pour un mesurage impliquant des indications répétées, chacune peut être
      utilisée pour fournir une valeur mesurée correspondante. Cet ensemble de valeurs
      mesurées individuelles peut ensuite être utilisé pour calculer une valeur mesurée
      résultante, telle qu'une moyenne ou une médiane, en général avec une incertitude
      de mesure associée qui décroît.
  - content: Lorsque l'étendue des valeurs vraies considérées comme représentant le
      mesurande est petite par rapport à l'incertitude de mesure, on peut considérer
      une valeur mesurée comme une estimation d'une valeur vraie par essence unique,
      souvent sous la forme d'une moyenne ou d'une médiane de valeurs mesurées individuelles
      obtenues par des mesurages répétés.
  - content: Lorsque l'étendue des valeurs vraies considérées comme représentant le
      mesurande n'est pas petite par rapport à l'incertitude de mesure, une valeur
      mesurée est souvent une estimation d'une moyenne ou d'une médiane de l'ensemble
      des valeurs vraies.
  - content: Dans le GUM, les termes « résultat de mesure » et « estimation de la
      valeur du mesurande », ou simplement « estimation du mesurande », sont utilisés
      au sens de « valeur mesurée ».
  terms:
  - type: expression
    normative_status: preferred
    designation: valeur mesurée, f
date_accepted: '2007-01-01T00:00:00+00:00'
entry_status: valid
