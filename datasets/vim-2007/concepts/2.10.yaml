data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: measured value of a quantity measured value quantity value representing
      a measurement result
  examples: []
  id: 2.10-eng
  language_code: eng
  notes:
  - content: For a measurement involving replicate indications, each indication can
      be used to provide a corresponding measured quantity value. This set of individual
      measured quantity values can be used to calculate a resulting measured quantity
      value, such as an average or median, usually with a decreased associated measurement
      uncertainty.
  - content: When the range of the true quantity values believed to represent the
      measurand is small compared with the measurement uncertainty, a measured quantity
      value can be considered to be an estimate of an essentially unique true quantity
      value and is often an average or median of individual measured quantity values
      obtained through replicate measurements.
  - content: In the case where the range of the true quantity values believed to represent
      the measurand is not small compared with the measurement uncertainty, a measured
      value is often an estimate of an average or median of the set of true quantity
      values.
  - content: In the GUM, the terms “result of measurement” and “estimate of the value
      of the measurand” or just “estimate of the measurand” are used for ‘measured
      quantity value’.
  terms:
  - type: expression
    normative_status: preferred
    designation: measured quantity value
date_accepted: '2007-01-01T00:00:00+00:00'
