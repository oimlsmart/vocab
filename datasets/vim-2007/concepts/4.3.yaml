data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: ensemble des *valeurs* comprises entre les deux *indications* extrêmes
  examples: []
  id: 4.3-fra
  language_code: fra
  notes:
  - content: Un intervalle des indications est généralement exprimé en donnant la
      plus petite et la plus grande valeur, par exemple « stem:[99 "unitsml(V)"] à stem:[201 "unitsml(V)"] ».
  - content: Dans certains domaines, le terme anglais est « range of indications ».
      En français, le terme « étendue des indications » est parfois employé.
  terms:
  - type: expression
    normative_status: preferred
    designation: intervalle des indications
    grammar_info:
    - gender: m
date_accepted: '2007-01-01T00:00:00+00:00'
