data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: set of *quantity values* bounded by extreme possible *indications*
  examples: []
  id: 4.3-eng
  language_code: eng
  notes:
  - content: An indication interval is usually stated in terms of its smallest and
      greatest quantity values, for example, "stem:[99 "unitsml(V)"] to stem:[201 "unitsml(V)"]".
  - content: In some fields the term is "range of indications".
  terms:
  - type: expression
    normative_status: preferred
    designation: indication interval
date_accepted: '2007-01-01T00:00:00+00:00'
entry_status: valid
