  definition:
  - content: instrument de mesure qui fournit un signal de sortie porteur d'informations
      sur la valeur de la grandeur mesurée
  examples:
  - content: a) Voltmètre, b) micromètre à vis, c) thermomètre, d) balance électronique.
  id: 3.3-fra
  language_code: fra
  notes:
  - content: Un appareil de mesure indicateur peut fournir un enregistrement de son
      indication.
  - content: Un signal de sortie peut être présenté sous forme visuelle ou acoustique.
      Il peut aussi être transmis à un ou plusieurs autres dispositifs.
