data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: mathematical relation between *base units*, *coherent derived units* or other *measurement units*
  examples:
  - content: For the quantities in example a) of item 1.22, stem:[[Q_1\] = [Q_2\] [Q_3\]] where
      stem:[[Q_1\]], stem:[[Q_2\]], and stem:[[Q_3\]] denote the measurement units of stem:[Q_1], stem:[Q_2], and stem:[Q_3], respectively, provided that these measurement units are in a coherent system of units.
  - content: stem:["unitsml(J)" := "unitsml(kg m^2/s^2)"], where stem:["unitsml(J)"],
      stem:["unitsml(kg)"], stem:["unitsml(m)"], and stem:["unitsml(s)"] are the symbols
      for the joule, kilogram, metre, and second, respectively. (The symbol := denotes "is by definition
      equal to" as given in the ISO 80000 and IEC 80000 series).
  - content: stem:[1 "unitsml(km/h)" = (1/3.6) "unitsml(m/s)"].
  id: 1.23-eng
  language_code: eng
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: unit equation
date_accepted: '2007-01-01T00:00:00+00:00'
entry_status: valid
