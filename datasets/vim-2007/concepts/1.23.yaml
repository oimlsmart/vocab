data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: relation d'égalité entre des *unités de base*, des *unités dérivées cohérentes*
      ou d'autres *unités de mesure*
  examples:
  - content: Pour les *grandeurs* données dans l'exemple a) de 1.22, stem:[[Q_1\] = [Q_2\] [Q_3\]] où
      stem:[[Q_1\]], stem:[[Q_2\]] et stem:[[Q_3\]] représentent respectivement les unités de stem:[Q_1],
      stem:[Q_2] et stem:[Q_3], pourvu que ces unités soient dans un *système cohérent d'unités*.
  - content: stem:["unitsml(J)" := "unitsml(kg m^2/s^2)"], où stem:["unitsml(J)"], stem:["unitsml(kg)"],
      stem:["unitsml(m)"] et stem:["unitsml(s)"] sont respectivement les symboles du joule, du kilogramme,
      du mètre et de la seconde. (Le symbole := signifie « est par définition égal à », comme indiqué dans
      les séries ISO 80000 et CEI 80000).
  - content: stem:[1 "unitsml(km/h)" = (1/3.6) "unitsml(m/s)"].
  id: 1.23-fra
  language_code: fra
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: équation aux unités
    grammar_info:
    - gender: f
date_accepted: '2007-01-01T00:00:00+00:00'
