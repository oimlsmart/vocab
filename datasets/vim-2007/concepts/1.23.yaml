data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: mathematical relation between base units, coherent derived units or other
      measurement units
  examples:
  - content: a) For the quantities in example a) of item 1.22, [Q1] = [Q2] [Q3] where
      [Q1], [Q2], and [Q3] denote the measurement units of Q1, Q2, and Q3, respectively,
      provided that these measurement units are in a coherent system of units. b)
      J := kg m2/s2, where J, kg, m, and s are the symbols for the joule, kilogram,
      metre, and second, respectively. (The symbol := denotes “is by definition equal
      to” as given in the ISO 80000 and IEC 80000 series). c) 1 km/h = (1/3.6) m/s.
  id: 1.23-eng
  language_code: eng
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: unit equation
