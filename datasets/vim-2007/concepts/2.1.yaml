data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: processus consistant à obtenir expérimentalement une ou plusieurs *valeurs*
      que l'on peut raisonnablement attribuer à une *grandeur*
  examples: []
  id: 2.1-fra
  language_code: fra
  notes:
  - content: Les mesurages ne s'appliquent pas aux *propriétés qualitatives*.
  - content: Un mesurage implique la comparaison de grandeurs, y compris le comptage
      d'entités.
  - content: Un mesurage suppose une description de la grandeur compatible avec l'usage
      prévu d'un *résultat de mesure*, une *procédure de mesure* et un *système de mesure*
      étalonné fonctionnant selon une procédure de mesure spécifiée, incluant les
      conditions de mesure.
  terms:
  - type: expression
    normative_status: preferred
    designation: mesurage
    grammar_info:
    - gender: m
  - type: expression
    normative_status: admitted
    designation: mesure
    grammar_info:
    - gender: f
date_accepted: '2007-01-01T00:00:00+00:00'
entry_status: valid
