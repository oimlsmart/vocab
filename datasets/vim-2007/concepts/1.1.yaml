data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: property of a phenomenon, body, or substance, where the property has
      a magnitude that can be expressed as a number and a reference
  examples:
  - content: “Plasma (Blood)Sodium ion; amount-of-substance concentration equal to
      143 mmol/l in a given person at a given time”.
  id: 1.1-eng
  language_code: eng
  notes:
  - content: The generic concept ‘quantity’ can be divided into several levels of
      specific concepts, as shown in the following table. The left hand side of the
      table shows specific concepts under ‘quantity’. These are generic concepts for
      the individual quantities in the right hand column. length, l energy, E radius,
      r radius of circle A, rA or r(A) wavelength, λ wavelength of the sodium D radiation,
      λD or λ(D; Na) kinetic energy, T kinetic energy of particle i in a given system,
      Ti heat, Q heat of vaporization of sample i of water, Qi electric charge, Q
      electric charge of the proton, e electric resistance, R electric resistance
      of resistor i in a given circuit, Ri amount-of-substance concentration of entity
      B, cB amount-of-substance concentration of ethanol in wine sample i, ci(C2H5OH)
      number concentration of entity B, CB number concentration of erythrocytes in
      blood sample i, C(Erys; Bi) Rockwell C hardness (150 kg load), HRC(150 kg) Rockwell
      C hardness of steel sample i, HRCi(150 kg)
  - content: A reference can be a measurement unit, a measurement procedure, a reference
      material, or a combination of such.
  - content: Symbols for quantities are given in the ISO 80000 and IEC 80000 series
      Quantities and units. The symbols for quantities are written in italics. A given
      symbol can indicate different quantities.
  - content: The preferred IUPAC-IFCC format for designations of quantities in laboratory
      medicine is “System—Component; quantity”.
  - content: A quantity as defined here is a scalar. However, a vector or a tensor
      the components of which are quantities is also considered to be a quantity.
  - content: The concept ’quantity’ may be generically divided into, e.g. ‘physical
      quantity’, ‘chemical quantity’, and ‘biological quantity’, or base quantity
      and derived quantity.
  terms:
  - type: expression
    normative_status: preferred
    designation: quantity
date_accepted: '2007-01-01T00:00:00+00:00'
entry_status: valid
