data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: propriété d'un phénomène, d'un corps ou d'une substance, que l'on peut
      exprimer quantitativement sous forme d'un nombre et d'une référence
  examples:
  - content: "« Plasma(Sang)—Ion sodium; concentration en quantité de matière égale
      à 143 mmol/l chez une personne donnée à un instant donné »."
  id: 1.1-fra
  language_code: fra
  notes:
  - content: |
        Le concept générique de grandeur peut être subdivisé en plusieurs niveaux
        de concepts spécifiques, comme indiqué dans le tableau suivant. La moitié gauche
        du tableau présente des concepts spécifiques du concept de grandeur. Ce sont
        des concepts génériques pour les grandeurs individuelles de la moitié droite.

        [cols="1,1,3", options="noheader,unnumbered"]
        |===
        .2+| longueur, stem:[l] | rayon, stem:[r] | rayon du cercle stem:[A], stem:[r_A] ou stem:[r(A)]
        | longueur d'onde, stem:[lambda] | longueur d'onde de la radiation stem:[D] du sodium, stem:[lambda_D] ou stem:[lambda(D; N_a)]
        .2+| énergie, stem:[E] | énergie cinétique, stem:[T] | énergie cinétique de la particule stem:[i] dans un système donné, stem:[T_i]
        | chaleur, stem:[Q] | chaleur de vaporisation du spécimen stem:[i] d'eau, stem:[Q_i]
        2+| charge électrique, stem:[Q] | charge électrique du proton, stem:[e]
        2+| résistance électrique, stem:[R] | résistance électrique de la résistance stem:[i] dans un circuit donné, stem:[R_i]
        2+| concentration en quantité de matière du constituant stem:[B], stem:[c_B] | concentration en quantité de matière d'éthanol dans le spécimen stem:[i] de vin, stem:[c_i(C_2H_5OH)]
        | nombre volumique du constituant stem:[B], stem:[C_B] | nombre volumique d'érythrocytes dans le spécimen stem:[i] de sang, stem:[C("Erys"; B_i)]
        | dureté C de Rockwell (charge de stem:[150 "unitsml(kg)"]), stem:["HRC"(150 "unitsml(kg)")] | dureté C de Rockwell du spécimen stem:[i] d'acier, stem:["HRC"_i(150 "unitsml(kg)")]
        |===
  - content: La référence peut être une *unité de mesure*, une *procédure de mesure*,
      un *matériau de référence*, ou une de leur combinaisons.
  - content: Les séries ISO 80000 et CEI 80000 Grandeurs et unités donnent des symboles
      de grandeurs. Les symboles de grandeurs sont écrits en italique. Un symbole
      donné peut noter des grandeurs différentes.
  - content: Le format préféré par l'IUPAC-IFCC pour la désignation des grandeurs
      dans les laboratoires de biologie médicale est « Système — Constituant ; grandeur
      ».
  - content: Une grandeur telle que définie ici est une grandeur scalaire. Cependant,
      un vecteur ou un tenseur dont les composantes sont des grandeurs est aussi considéré
      comme une grandeur.
  - content: Le concept de « grandeur » peut être subdivisé génériquement, par exemple,
      « grandeur physique », « grandeur chimique » et « grandeur biologique », ou
      *grandeur de base* et *grandeur dérivée*.
  terms:
  - type: expression
    normative_status: preferred
    designation: grandeur
    grammar_info:
    - gender: f
date_accepted: '2007-01-01T00:00:00+00:00'
