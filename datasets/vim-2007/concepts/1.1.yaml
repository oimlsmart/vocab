data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: property of a phenomenon, body, or substance, where the property has
      a magnitude that can be expressed as a number and a reference
  examples:
  - content: '"Plasma (Blood)Sodium ion; amount-of-substance concentration equal
      to 143 mmol/l in a given person at a given time".'
  id: 1.1-eng
  language_code: eng
  notes:
  - content: |
        The generic concept 'quantity' can be divided into several levels of
        specific concepts, as shown in the following table. The left hand side of the
        table shows specific concepts under 'quantity'. These are generic concepts for
        the individual quantities in the right hand column.

        [cols="1,1,3", options="noheader,unnumbered"]
        |===
        .2+| length, stem:[l] | radius, stem:[r] | radius of circle stem:[A], stem:[r_A] or stem:[r(A)]
        | wavelength, stem:[lambda] | wavelength of the sodium stem:[D] radiation, stem:[lambda_D] or stem:[lambda(D; N_a)]
        .2+| energy, stem:[E] | kinetic energy, stem:[T] | kinetic energy of particle stem:[i] in a given system, stem:[T_i]
        | heat, stem:[Q] | heat of vaporization of sample stem:[i] of water, stem:[Q_i]
        2+| electric charge, stem:[Q] | electric charge of the proton, stem:[e]
        2+| electric resistance, stem:[R] | electric resistance of resistor stem:[i] in a given circuit, stem:[R_i]
        2+| amount-of-substance concentration of entity stem:[B], stem:[c_B] | amount-of-substance concentration of ethanol in wine sample stem:[i], stem:[c_i(C_2H_5OH)]
        | number concentration of entity stem:[B, C_B] | number concentration of erythrocytes in blood sample stem:[i], stem:[C("Erys"; B_i)]
        | Rockwell C hardness (stem:[150 "unitsml(kg)"] load), stem:["HRC"(150 "unitsml(kg)")] | Rockwell C hardness of steel sample stem:[i], stem:["HRC"_i(150 "unitsml(kg)")]
        |===

  - content: A reference can be a *measurement unit*, a *measurement procedure*, a *reference
      material*, or a combination of such.
  - content: Symbols for quantities are given in the ISO 80000 and IEC 80000 series
      Quantities and units. The symbols for quantities are written in italics. A given
      symbol can indicate different quantities.
  - content: The preferred IUPAC-IFCC format for designations of quantities in laboratory
      medicine is "System—Component; quantity".
  - content: A quantity as defined here is a scalar. However, a vector or a tensor
      the components of which are quantities is also considered to be a quantity.
  - content: The concept 'quantity' may be generically divided into, e.g. 'physical
      quantity', 'chemical quantity', and 'biological quantity', or *base quantity*
      and *derived quantity*.
  terms:
  - type: expression
    normative_status: preferred
    designation: quantity
date_accepted: '2007-01-01T00:00:00+00:00'
