  definition:
  - content: compatibilité métrologique, f propriété d'un ensemble de résultats de
      mesure correspondant à un mesurande spécifié, telle que la valeur absolue de
      la différence des valeurs mesurées pour toute paire de résultats de mesure est
      plus petite qu'un certain multiple choisi de l'incertitude-type de cette différence
  examples:
  - content: ', l''incertitude de mesure évaluée est trop petite), soit la grandeur
      mesurée a changé d''un mesurage à l''autre.'
  id: 2.47-fra
  language_code: fra
  notes:
  - content: La compatibilité de mesure remplace le concept traditionnel « rester
      dans l'erreur », puisqu'elle exprime selon quel critère décider si deux résultats
      de mesure se rapportent ou non au même mesurande. Si, dans un ensemble de mesurages
      d'un mesurande que l'on pense rester constant, un résultat de mesure n'est pas
      compatible avec les autres, soit le mesurage n'est pas correct (par
  - content: La corrélation entre les mesurages influence la compatibilité de mesure.
      Si les mesurages sont entièrement décorrélés, l’incertitude-type de leur différence
      est égale à la moyenne quadratique de leurs incertitudes-types (racine carrée
      de la somme des carrés), tandis qu’elle est plus petite pour une covariance
      positive ou plus grande pour une covariance négative.
  terms:
  - type: expression
    normative_status: preferred
    designation: compatibilité de mesure, f
