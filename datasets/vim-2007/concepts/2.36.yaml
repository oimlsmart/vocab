data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: intervalle contenant l'ensemble des valeurs vraies d'un mesurande avec
      une probabilité déterminée, fondés sur l'information disponible
  examples: []
  id: 2.36-fra
  language_code: fra
  notes:
  - content: Un intervalle élargi n'est pas nécessairement centré sur la valeur mesurée
      choisie. Voir Évaluation des données de mesure, Supplément 1 au GUM[3].
  - content: Il convient de ne pas appeler « intervalle de confiance » un intervalle
      élargi pour éviter des confusions avec le concept statistique (voir le GUM,
      6.2.2).
  - content: Un intervalle élargi peut se déduire d'une incertitude élargie (voir
      le GUM, 2.3.5).
  terms:
  - type: expression
    normative_status: preferred
    designation: intervalle élargi, m
