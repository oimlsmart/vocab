data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: number in the expression of a *quantity value*, other than any number serving as the reference
  id: 1.20-eng
  language_code: eng
  notes:
  - content: For *quantities of dimension one*, the reference is a *measurement unit*
      which is a number and this is not considered as a part of the numerical quantity
      value.
    examples:
    - content: In an amount-of-substance fraction equal to stem:[3 "unitsml(mmol/mol)"], the numerical
        quantity value is 3 and the unit is stem:["unitsml(mmol/mol)"]. The unit stem:["unitsml(mmol/mol)"]
        is numerically equal to 0.001, but this number 0.001 is not part of the numerical quantity
        value, which remains 3.
  - content: For *quantities* that have a measurement unit (i.e. those other than *ordinal
      quantities*), the numerical value stem:[{Q}] of a quantity stem:[Q] is frequently
      denoted stem:[{Q} = Q//[Q\]], where stem:[[Q\]] denotes the measurement unit.
    examples:
    - content: For a quantity value of stem:[5.7 "unitsml(kg)"], the numerical quantity value is stem:[{m} = (5.7 "unitsml(kg)"//"unitsml(kg)") = 5.7]. The same quantity value can be expressed as stem:[5700 "unitsml(g)"] in which case the numerical quantity value stem:[{m} = (5700 "unitsml(g)"//"unitsml(g)") = 5700].
  terms:
  - type: expression
    normative_status: preferred
    designation: numerical quantity value
  - type: expression
    normative_status: admitted
    designation: numerical value of a quantity
  - type: expression
    normative_status: admitted
    designation: numerical value
