data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: nombre dans l'expression de la *valeur d'une grandeur*, autre qu'un nombre utilisé comme référence
  id: 1.20-fra
  language_code: fra
  notes:
  - content: Pour les *grandeurs sans dimension*, la référence est une *unité de mesure*
      qui est un nombre, et ce nombre n'est pas considéré comme faisant partie de
      la valeur numérique.
    examples:
    - content: Pour une fraction molaire égale à stem:[3 "unitsml(mmol/mol)"], la valeur numérique est
        3 et l'unité est stem:["unitsml(mmol/mol)"]. L'unité stem:["unitsml(mmol/mol)"]
        est numériquement égale à 0,001, mais ce nombre 0,001 ne fait pas partie de la valeur numérique qui reste 3.
  - content: Pour les *grandeurs* qui ont une unité de mesure (c'est-à-dire autres que
      les *grandeurs ordinales*), la valeur numérique {Q} d'une grandeur stem:[Q] est fréquemment
      notée stem:[{Q} = Q//[Q\]], où stem:[[Q\]] est le symbole de l'unité de mesure.
    examples:
    - content: Pour une valeur de stem:[5.7 "unitsml(kg)"], la valeur numérique est stem:[{m} = (5.7 "unitsml(kg)"//"unitsml(kg)") = 5.7]. La même valeur peut être exprimée comme stem:[5700 "unitsml(g)"] et la valeur numérique est alors stem:[{m} = (5700 "unitsml(g)"//"unitsml(g)") = 5700].
  terms:
  - type: expression
    normative_status: preferred
    designation: valeur numérique
    grammar_info:
    - gender: f
  - type: expression
    normative_status: admitted
    designation: valeur numérique d'une grandeur
    grammar_info:
    - gender: f
