data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: provision of objective evidence that a given item fulfils specified requirements
  examples:
  - content: a) Confirmation that a given reference material as claimed is homogeneous
      for the quantity value and measurement procedure concerned, down to a measurement
      portion having a mass of 10 mg. b) Confirmation that performance properties
      or legal requirements of a measuring system are achieved. c) Confirmation that
      a target measurement uncertainty can be met.
  id: 2.44-eng
  language_code: eng
  notes:
  - content: When applicable, measurement uncertainty should be taken into consideration.
  - content: The item may be, e.g., a process, measurement procedure, material, compound,
      or measuring system.
  - content: The specified requirements may be, e.g., that a manufacturer’s specifications
      are met.
  - content: Verification in legal metrology, as defined in the VIML[1], and in conformity
      assessment in general, pertains to the examination and marking and/or issuing
      of a verification certificate for a measuring system.
  - content: Verification should not be confused with calibration. Not any verification
      is a validation.
  - content: In chemistry, verification of identity of entity involved, or of activity,
      requires a description of the structure or properties of that entity or activity.
  terms:
  - type: expression
    normative_status: preferred
    designation: verification
date_accepted: '2007-01-01T00:00:00+00:00'
