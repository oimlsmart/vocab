data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: grandeur que l'on veut mesurer
  examples:
  - content: a) La différence de potentiel entre les bornes d'une batterie peut diminuer
      lorsqu'on la mesure en employant un voltmètre ayant une conductance interne
      importante. La différence de potentiel en circuit ouvert peut alors être calculée
      à partir des résistances internes de la batterie et du voltmètre. b) La longueur
      d'une tige en équilibre avec la température ambiante de 23 °C sera différente
      de la longueur à la température spécifiée de 20 °C, qui est le mesurande. Dans
      ce cas, une correction est nécessaire.
  id: 2.3-fra
  language_code: fra
  notes:
  - content: La spécification d'un mesurande nécessite la connaissance de la nature
      de grandeur et la description de l'état du phénomène, du corps ou de la substance
      dont la grandeur est une propriété, incluant tout constituant pertinent et les
      entités chimiques en jeu.
  - content: Dans la 2ème édition du VIM et dans la CEI 60050-300:2001, le mesurande
      est défini comme la « grandeur soumise à mesurage ».
  - content: Il se peut que le mesurage, incluant le système de mesure et les conditions
      sous lesquelles le mesurage est effectué, modifie le phénomène, le corps ou
      la substance de sorte que la grandeur mesurée peut différer du mesurande. Dans
      ce cas, une correction appropriée est nécessaire.
  - content: En chimie, l'expression « substance à analyser », ou le nom d'une substance
      ou d'un composé, sont quelquefois utilisés à la place de « mesurande ». Cet
      usage est erroné puisque ces termes ne désignent pas des grandeurs.
  terms:
  - type: expression
    normative_status: preferred
    designation: mesurande, m
date_accepted: '2007-01-01T00:00:00+00:00'
entry_status: valid
id: be1b2ab0-ab1f-4a1f-b1af-70eb4f3d1ba4
