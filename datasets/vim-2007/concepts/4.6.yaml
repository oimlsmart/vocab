data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "*valeur* arrondie ou approximative d'une *grandeur* caractéristique d'un
      *instrument de mesure* ou d'un *système de mesure*, qui sert de guide pour son utilisation
      appropriée"
  examples:
  - content: La valeur stem:[100 "unitsml(Ohm)"] marquée sur une résistance étalon.
  - content: La valeur stem:[1000 "unitsml(ml)"] marquée sur une fiole jaugée à un trait.
  - content: La valeur stem:[0.1 "unitsml(mol/l)"] de la concentration en quantité de matière d'une solution d'acide chlorhydrique, HCl.
  - content: La valeur stem:[-20 "unitsml(degC)"] d'une température Celsius maximale de stockage
  id: 4.6-fra
  language_code: fra
  notes:
  - content: En anglais, il convient de ne pas confondre les termes « nominal
      quantity value » et « nominal value » avec la valeur d'une propriété qualitative
      (en anglais « nominal property value »).
  terms:
  - type: expression
    normative_status: preferred
    designation: valeur nominale
    grammar_info:
    - gender: f
date_accepted: '2007-01-01T00:00:00+00:00'
entry_status: valid
