data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: rounded or approximate *value* of a characterizing *quantity* of a *measuring
      instrument* or *measuring system* that provides guidance for its appropriate use
  examples:
  - content: stem:[100 "unitsml(Ohm)"] as the nominal quantity value marked on a standard resistor.
  - content: stem:[1000 "unitsml(ml)"] as the nominal quantity value marked on a single-mark volumetric flask.
  - content: stem:[0.1 "unitsml(mol/l)"] as the nominal quantity value for amount-of-substance concentration of a solution of hydrogen chloride, HCl.
  - content: stem:[-20 "unitsml(degC)"] as a maximum Celsius temperature for storage
  id: 4.6-eng
  language_code: eng
  notes:
  - content: '"Nominal quantity value" and "nominal value" are not to be confused
      with "nominal property value", see 1.29, Note 2.'
  terms:
  - type: expression
    normative_status: preferred
    designation: nominal quantity value
  - type: expression
    normative_status: admitted
    designation: nominal value
date_accepted: '2007-01-01T00:00:00+00:00'
entry_status: valid
