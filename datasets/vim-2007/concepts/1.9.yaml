data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: real scalar quantity, defined and adopted by convention, with which any
      other quantity of the same kind can be compared to express the ratio of the
      two quantities as a number
  examples: []
  id: 1.9-eng
  language_code: eng
  notes:
  - content: Measurement units are designated by conventionally assigned names and
      symbols.
  - content: Measurement units of quantities of the same quantity dimension may be
      designated by the same name and symbol even when the quantities are not of the
      same kind. For example joule per kelvin and J/K are respectively the name and
      symbol of both a measurement unit of heat capacity and a measurement unit of
      entropy, which are generally not considered to be quantities of the same kind.
      However, in some cases special measurement unit names are restricted to be used
      with quantities of specific kind only. For example, the measurement unit 'second
      to the power minus one' (1/s) is called hertz (Hz) when used for frequencies
      and becquerel (Bq) when used for activities of radionuclides.
  - content: Measurement units of quantities of dimension one are numbers. In some
      cases these measurement units are given special names, e.g. radian, steradian,
      and decibel, or are expressed by quotients such as millimole per mole equal
      to 10-3 and microgram per kilogram equal to 10-9.
  - content: For a given quantity, the short term “unit” is often combined with the
      quantity name, such as “mass unit” or “unit of mass”.
  terms:
  - type: expression
    normative_status: preferred
    designation: measurement unit
  - type: expression
    normative_status: admitted
    designation: unit of measurement
  - type: expression
    normative_status: admitted
    designation: unit
