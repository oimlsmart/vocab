data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: '*étalon* établi à l''aide d''une *procédure de mesure primaire* ou créé comme
      objet choisi par convention'
  examples:
  - content: Étalon primaire de concentration en quantité de matière préparé en
      dissolvant une quantité de matière connue d'une substance chimique dans un volume
      connu de solution.
  - content: Étalon primaire de pression fondé sur des *mesurages* séparés de
      force et d'aire.
  - content: Étalon primaire pour les *mesurages* du rapport molaire d'isotopes,
      préparé en mélangeant des quantités de matière connues d'isotopes spécifiés.
  - content: Étalon primaire de température thermodynamique constitué d'une cellule
      à point triple de l'eau.
  - content: Le prototype international du kilogramme en tant qu'objet choisi
      par convention.
  id: 5.4-fra
  language_code: fra
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: étalon primaire
    grammar_info:
    - gender: m
