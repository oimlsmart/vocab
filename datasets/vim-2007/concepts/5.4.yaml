data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: measurement standard established using a primary reference measurement
      procedure, or created as an artifact, chosen by convention
  examples:
  - content: a) Primary measurement standard of amount-of-substance concentration
      prepared by dissolving a known amount of substance of a chemical component to
      a known volume of solution. b) Primary measurement standard for pressure based
      on separate measurements of force and area. c) Primary measurement standard
      for isotope amount-of-substance ratio measurements, prepared by mixing known
      amount-of-substances of specified isotopes. d) Triple-point-of-water cell as
      a primary measurement standard of thermodynamic temperature. e) The international
      prototype of the kilogram as an artifact, chosen by convention.
  id: 5.4-eng
  language_code: eng
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: primary measurement standard
  - type: expression
    normative_status: admitted
    designation: primary standard
