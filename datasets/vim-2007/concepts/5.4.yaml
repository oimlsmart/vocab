data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: étalon établi à l'aide d'une procédure de mesure primaire ou créé comme
      objet choisi par convention
  examples:
  - content: a) Étalon primaire de concentration en quantité de matière préparé en
      dissolvant une quantité de matière connue d'une substance chimique dans un volume
      connu de solution. b) Étalon primaire de pression fondé sur des mesurages séparés
      de force et d'aire. c) Étalon primaire pour les mesurages du rapport molaire
      d'isotopes, préparé en mélangeant des quantités de matière connues d'isotopes
      spécifiés. d) Étalon primaire de température thermodynamique constitué d'une
      cellule à point triple de l'eau. e) Le prototype international du kilogramme
      en tant qu'objet choisi par convention.
  id: 5.4-fra
  language_code: fra
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: étalon primaire, m
date_accepted: '2007-01-01T00:00:00+00:00'
entry_status: valid
