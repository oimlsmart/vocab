data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: ensemble des valeurs de grandeurs d'une même nature, qu'un instrument
      de mesure ou un système de mesure donné peut mesurer avec une incertitude instrumentale
      spécifiée, dans des conditions déterminées
  examples: []
  id: 4.7-fra
  language_code: fra
  notes:
  - content: Dans certains domaines, le terme anglais est « measuring range » ou «
      measurement range ». En français, le terme « étendue de mesure » est parfois
      improprement employé.
  - content: Il convient de ne pas confondre la limite inférieure d’un intervalle
      de mesure avec la limite de détection.
  terms:
  - type: expression
    normative_status: preferred
    designation: intervalle de mesure, m
