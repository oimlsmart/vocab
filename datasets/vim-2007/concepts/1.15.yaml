data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: measurement unit that does not belong to a given system of units
  examples:
  - content: a) The electronvolt (about 1.602 18 × 10-19 J) is an off-system measurement
      unit of energy with respect to the SI. b) Day, hour, minute are off-system measurement
      units of time with respect to the SI.
  id: 1.15-eng
  language_code: eng
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: off-system measurement unit
  - type: expression
    normative_status: admitted
    designation: off-system unit
