data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: composante de l'incertitude de mesure qui provient de l'instrument de
      mesure ou du système de mesure utilisé
  examples: []
  id: 4.24-fra
  language_code: fra
  notes:
  - content: L'incertitude instrumentale est obtenue par étalonnage de l'instrument
      de mesure ou du système de mesure, sauf pour un étalon primaire, pour lequel
      on utilise d'autres moyens.
  - content: L'incertitude instrumentale est utilisée dans une évaluation de type
      B de l'incertitude.
  - content: Les informations relatives à l'incertitude instrumentale peuvent être
      données dans les spécifications de l'instrument.
  terms:
  - type: expression
    normative_status: preferred
    designation: incertitude instrumentale, f
date_accepted: '2007-01-01T00:00:00+00:00'
entry_status: valid
