data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: valeur fournie par un instrument de mesure ou un système de mesure
  examples: []
  id: 4.1-fra
  language_code: fra
  notes:
  - content: Une indication peut être présentée sous forme visuelle ou acoustique
      ou peut être transférée à un autre dispositif. Elle est souvent donnée par la
      position d'un pointeur sur un affichage pour les sorties analogiques, par un
      nombre affiché ou imprimé pour les sorties numériques, par une configuration
      codée pour les sorties codées, par la valeur assignée pour les mesures matérialisées.
  - content: Une indication et la valeur de la grandeur mesurée correspondante ne
      sont pas nécessairement des valeurs de grandeurs de même nature.
  terms:
  - type: expression
    normative_status: preferred
    designation: indication, f
