  - content: measurement standard that is used routinely to calibrate or verify measuring
      instruments or measuring systems
  examples: []
  id: 5.7-eng
  language_code: eng
  notes:
  - content: A working measurement standard is usually calibrated with respect to
      a reference measurement standard.
  - content: In relation to verification, the terms “check standard” or “control standard”
      are also sometimes used.
