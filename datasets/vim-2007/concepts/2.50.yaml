data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: quantity that must be measured, or a quantity, the value of which can
      be otherwise obtained, in order to calculate a measured quantity value of a
      measurand
  examples:
  - content: When the length of a steel rod at a specified temperature is the measurand,
      actual temperature, the length at that actual temperature, and the linear thermal
      expansion coefficient of the rod are input quantities in a measurement model.
  id: 2.50-eng
  language_code: eng
  notes:
  - content: An input quantity in a measurement model often is an output quantity
      of a measuring system.
  - content: Indications, corrections, and influence quantities can be input quantities
      in a measurement model.
  terms:
  - type: expression
    normative_status: preferred
    designation: input quantity in a measurement model
  - type: expression
    normative_status: admitted
    designation: input quantity
date_accepted: '2007-01-01T00:00:00+00:00'
entry_status: valid
