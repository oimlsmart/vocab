data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: succession d'étalons et d'étalonnages qui est utilisée pour relier un
      résultat de mesure à une référence
  examples: []
  id: 2.42-fra
  language_code: fra
  notes:
  - content: Une chaîne de traçabilité métrologique est définie par l'intermédiaire
      d'une hiérarchie d'étalonnage.
  - content: La chaîne de traçabilité métrologique est utilisée pour établir la traçabilité
      métrologique du résultat de mesure.
  - content: Une comparaison entre deux étalons peut être considérée comme un étalonnage
      si elle sert à vérifier et, si nécessaire, à corriger la valeur et l'incertitude
      de mesure attribuées à l'un des étalons.
  terms:
  - type: expression
    normative_status: preferred
    designation: chaîne de traçabilité métrologique, f
  - type: expression
    normative_status: admitted
    designation: chaîne de traçabilité, f
date_accepted: '2007-01-01T00:00:00+00:00'
entry_status: valid
