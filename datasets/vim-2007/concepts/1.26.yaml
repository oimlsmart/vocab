data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "*grandeur* définie par une *procédure de mesure* adoptée par convention,
      qui peut être classée avec d'autres grandeurs de même *nature* selon l'ordre croissant
      ou décroissant de leurs expressions quantitatives, mais pour laquelle aucune
      relation algébrique entre ces grandeurs n'existe"
  examples:
  - content: Dureté C de Rockwell.
  - content: Indice d'octane pour les carburants.
  - content: Magnitude d'un séisme sur l'échelle de Richter.
  - content: Niveau subjectif de douleur abdominale sur une échelle de zéro à cinq.
  id: 1.26-fra
  language_code: fra
  notes:
  - content: Les grandeurs ordinales ne peuvent prendre part qu'à des relations empiriques
      et n'ont ni *unités de mesure*, ni *dimensions*. Les différences et les rapports
      de grandeurs ordinales n'ont pas de signification.
  - content: Les grandeurs ordinales sont classées selon des *échelles ordinales* (voir 1.28).
  terms:
  - type: expression
    normative_status: preferred
    designation: grandeur ordinale
    grammar_info:
    - gender: f
  - type: expression
    normative_status: admitted
    designation: grandeur repérable
    grammar_info:
    - gender: f
date_accepted: '2007-01-01T00:00:00+00:00'
entry_status: valid
