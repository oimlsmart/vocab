data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: aspect commun à des grandeurs mutuellement comparables
  examples:
  - content: a) Les grandeurs diamètre, circonférence et longueur d'onde sont généralement
      considérées comme des grandeurs de même nature, à savoir la nature de la longueur.
      b) Les grandeurs chaleur, énergie cinétique et énergie potentielle sont généralement
      considérées comme des grandeurs de même nature, à savoir la nature de l’énergie.
  - content: On ne considère pas, par convention, les grandeurs moment d'une force
      et énergie comme étant de même nature, bien que ces grandeurs aient la même
      dimension. Il en est de même pour la capacité thermique et l'entropie, ainsi
      que pour un nombre d'entités, la perméabilité relative et la fraction massique.
  id: 1.2-fra
  language_code: fra
  notes:
  - content: La répartition des grandeurs selon leur nature est dans une certaine
      mesure arbitraire.
  - content: Les grandeurs de même nature dans un système de grandeurs donné ont la
      même dimension. Cependant des grandeurs de même dimension ne sont pas nécessairement
      de même nature.
  - content: En français, le terme « nature » n’est employé que dans des expressions
      telles que « grandeurs de même nature » (en anglais « quantities of the same
      kind »). En anglais, les termes désignant les grandeurs de la moitié gauche
      du tableau en 1.1, note 1, sont souvent employés pour désigner les « natures
      » correspondantes.
  terms:
  - type: expression
    normative_status: preferred
    designation: nature de grandeur, f
  - type: expression
    normative_status: admitted
    designation: nature, f
date_accepted: '2007-01-01T00:00:00+00:00'
