data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: aspect common to mutually comparable quantities
  examples:
  - content: a) The quantities diameter, circumference, and wavelength are generally
      considered to be quantities of the same kind, namely, of the kind of quantity
      called length. b) The quantities heat, kinetic energy, and potential energy,
      are generally considered to be quantities of the same kind, namely, of the kind
      of quantity called energy.
  - content: The quantities moment of force and energy are, by convention, not regarded
      as being of the same kind, although they have the same dimension. Similarly
      for heat capacity and entropy, as well as for number of entities, relative permeability,
      and mass fraction.
  id: 1.2-eng
  language_code: eng
  notes:
  - content: The division of the concept of ‘quantity’ according to ‘kind of quantity’
      is to some extent arbitrary.
  - content: Quantities of the same kind within a given system of quantities have
      the same quantity dimension. However, quantities of the same dimension are not
      necessarily of the same kind.
  - content: In English, the terms for quantities in the left half of the table in
      1.1, Note 1, are often used for the corresponding 'kinds of quantity'. In French,
      the term “nature” is only used in expressions such as “grandeurs de même nature”
      (in English, “quantities of the same kind”).
  terms:
  - type: expression
    normative_status: preferred
    designation: kind of quantity
  - type: expression
    normative_status: admitted
    designation: kind
date_accepted: '2007-01-01T00:00:00+00:00'
