data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: series of elements of a measuring system constituting a single path of
      the signal from a sensor to an output element
  examples:
  - content: a) Electro-acoustic measuring chain comprising a microphone, attenuator,
      filter, amplifier, and voltmeter. b) Mechanical measuring chain comprising a
      Bourdon tube, system of levers, two gears, and a mechanical dial.
  id: 3.10-eng
  language_code: eng
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: measuring chain
