data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: ensemble d'opérations réalisées sur un système de mesure pour qu'il fournisse
      des indications prescrites correspondant à des valeurs données des grandeurs
      à mesurer
  examples: []
  id: 3.11-fra
  language_code: fra
  notes:
  - content: Divers types d'ajustage d'un système de mesure sont le réglage de zéro,
      le réglage de décalage, le réglage d'étendue (appelé aussi réglage de gain).
  - content: Il convient de ne pas confondre l'ajustage d'un système de mesure avec
      son étalonnage, qui est un préalable à l'ajustage.
  - content: Après un ajustage d'un système de mesure, le système doit généralement
      être réétalonné.
  terms:
  - type: expression
    normative_status: preferred
    designation: ajustage d'un système de mesure, m
  - type: expression
    normative_status: admitted
    designation: ajustage, m
date_accepted: '2007-01-01T00:00:00+00:00'
