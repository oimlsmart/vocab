  - content: measurement standard recognized by signatories to an international agreement
      and intended to serve worldwide
  examples:
  - content: a) The international prototype of the kilogram. b) Chorionic gonadotropin,
      World Health Organization (WHO) 4th International Standard 1999, 75/589, 650
      International Units per ampoule. c) VSMOW2 (Vienna Standard Mean Ocean Water)
      distributed by the International Atomic Energy Agency (IAEA) for differential
      stable isotope amount-of-substance ratio measurements.
