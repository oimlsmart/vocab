data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: matériau suffisamment homogène et stable en ce qui concerne des propriétés
      spécifiées, qui a été préparé pour être adapté à son utilisation prévue pour
      un mesurage ou pour l'examen de propriétés qualitatives
  examples:
  - content: (de matériaux de référence supports de grandeurs) a) Eau de pureté déterminée,
      dont la viscosité dynamique est utilisée pour l'étalonnage de viscosimètres.
      b) Sérum humain sans valeur assignée à la concentration de cholestérol intrinsèque,
      utilisé seulement pour le contrôle de la fidélité de mesure. c) Tissu de poisson
      contenant une fraction massique déterminée de dioxine, utilisé comme étalon
      dans un étalonnage.
  - content: (de matériaux de référence supports de propriétés qualitatives) d) Nuancier
      de couleurs indiquant une ou plusieurs couleurs spécifiées. e) ADN contenant
      une séquence spécifiée de nucléotides. f) Urine contenant de la 19-androstènedione.
  - content: a) Substance dont le point triple est connu dans une cellule triple point.
      b) Verre de densité optique connue dans un support de filtre de transmission.
      c) Sphères à granulométrie uniforme montées sur une lame de microscope.
  id: 5.13-fra
  language_code: fra
  notes:
  - content: L'examen d'une propriété qualitative comprend l'attribution d'une valeur
      et de l'incertitude associée à un autre matériau. Cette incertitude n'est pas
      une incertitude de mesure.
  - content: Des matériaux de référence avec ou sans valeurs assignées peuvent servir
      à contrôler la fidélité de mesure, tandis que seuls des matériaux à valeurs
      assignées peuvent servir à l’étalonnage ou au contrôle de la justesse de mesure.
  - content: Les matériaux de référence comprennent des matériaux caractérisés par
      des grandeurs et des matériaux caractérisés par des propriétés qualitatives.
  - content: Un matériau de référence est quelquefois incorporé dans un dispositif
      fabriqué spécialement.
  - content: Certains matériaux de référence ont des valeurs assignées qui sont métrologiquement
      traçables à une unité de mesure en dehors d’un système d'unités. Ces matériaux
      comprennent des vaccins auxquels des unités internationales (UI) ont été assignées
      par l'Organisation mondiale de la santé.
  - content: Dans un mesurage donné, un matériau de référence donné ne peut être utilisé
      que pour l’étalonnage ou pour l’assurance de la qualité.
  - content: Il convient d'inclure dans les spécifications d'un matériau de référence
      sa traçabilité, qui indique son origine et son traitement (Accred Qual Assur:2006[7]).
  - content: La définition de l'ISO/REMCO est analogue (Accred Qual Assur:2006[7]),
      mais utilise le terme « processus de mesure » pour signifier « examen » (ISO
      15189:2007, 3.4) qui couvre à la fois un mesurage de la grandeur et l'examen
      d'une propriété qualitative.
  terms:
  - type: expression
    normative_status: preferred
    designation: matériau de référence, m
  - type: expression
    normative_status: admitted
    designation: MR
