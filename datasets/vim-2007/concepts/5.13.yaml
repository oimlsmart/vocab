data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: material, sufficiently homogeneous and stable with reference to specified
      properties, which has been established to be fit for its intended use in measurement
      or in examination of nominal properties
  examples:
  - content: (of reference materials embodying quantities) a) Water of stated purity,
      the dynamic viscosity of which is used to calibrate viscometers. b) Human serum
      without an assigned quantity value for the amount-of-substance concentration
      of the inherent cholesterol, used only as a measurement precision control material.
      c) Fish tissue containing a stated mass fraction of a dioxin, used as a calibrator.
  - content: (of reference materials embodying nominal properties) d) Color chart
      indicating one or more specified colors. e) DNA compound containing a specified
      nucleotide sequence. f) Urine containing 19-androstenedione.
  - content: a) Substance of known triple-point in a triple-point cell. b) Glass of
      known optical density in a transmission filter holder. c) Spheres of uniform
      size mounted on a microscope slide.
  id: 5.13-eng
  language_code: eng
  notes:
  - content: Examination of a nominal property provides a nominal property value and
      associated uncertainty. This uncertainty is not a measurement uncertainty.
  - content: Reference materials with or without assigned quantity values can be used
      for measurement precision control whereas only reference materials with assigned
      quantity values can be used for calibration or measurement trueness control.
  - content: ‘Reference material’ comprises materials embodying quantities as well
      as nominal properties.
  - content: A reference material is sometimes incorporated into a specially fabricated
      device.
  - content: Some reference materials have assigned quantity values that are metrologically
      traceable to a measurement unit outside a system of units. Such materials include
      vaccines to which International Units (IU) have been assigned by the World Health
      Organization.
  - content: In a given measurement, a given reference material can only be used for
      either calibration or quality assurance.
  - content: The specifications of a reference material should include its material
      traceability, indicating its origin and processing (Accred Qual Assur:2006[7]).
  - content: ISO/REMCO has an analogous definition (Accred Qual Assur:2006[7]) but
      uses the term “measurement process” to mean 'examination' (ISO 15189:2007, 3.4),
      which covers both measurement of a quantity and examination of a nominal property.
  terms:
  - type: expression
    normative_status: preferred
    designation: reference material
  - type: expression
    normative_status: admitted
    designation: RM
date_accepted: '2007-01-01T00:00:00+00:00'
