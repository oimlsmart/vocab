data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: condition of measurement, out of a set of conditions that includes the
      same measurement procedure, same operators, same measuring system, same operating
      conditions and same location, and replicate measurements on the same or similar
      objects over a short period of time
  examples: []
  id: 2.20-eng
  language_code: eng
  notes:
  - content: A condition of measurement is a repeatability condition only with respect
      to a specified set of repeatability conditions.
  - content: In chemistry, the term “intra-serial precision condition of measurement”
      is sometimes used to designate this concept.
  terms:
  - type: expression
    normative_status: preferred
    designation: repeatability condition of measurement
  - type: expression
    normative_status: admitted
    designation: repeatability condition
date_accepted: '2007-01-01T00:00:00+00:00'
