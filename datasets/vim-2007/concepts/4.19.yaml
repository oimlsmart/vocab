data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: property of a measuring instrument, whereby its metrological properties
      remain constant in time Note Stability may be quantified in several ways.
  examples:
  - content: a) In terms of the duration of a time interval over which a metrological
      property changes by a stated amount. b) In terms of the change of a property
      over a stated time interval.
  id: 4.19-eng
  language_code: eng
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: stability of a measuring instrument
  - type: expression
    normative_status: admitted
    designation: stability
