  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: measurement standard established through calibration with respect to
      a primary measurement standard for a quantity of the same kind
  examples: []
  id: 5.5-eng
  language_code: eng
  notes:
  - content: Calibration may be obtained directly between a primary measurement standard
      and a secondary measurement standard, or involve an intermediate measuring system
      calibrated by the primary measurement standard and assigning a measurement result
      to the secondary measurement standard.
  - content: A measurement standard having its quantity value assigned by a ratio
      primary reference measurement procedure is a secondary measurement standard.
      _________________________________________________________________________________________________________________________________________________________________________________________________________________________
  terms:
  - type: expression
    normative_status: preferred
    designation: secondary measurement standard
  - type: expression
    normative_status: admitted
    designation: secondary standard
