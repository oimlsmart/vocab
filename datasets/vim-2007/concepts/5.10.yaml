data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: measurement standard based on an inherent and reproducible property of
      a phenomenon or substance
  examples:
  - content: a) Triple-point-of-water cell as an intrinsic measurement standard of
      thermodynamic temperature. b) Intrinsic measurement standard of electric potential
      difference based on the Josephson effect. c) Intrinsic measurement standard
      of electric resistance based on the quantum Hall effect. d) Sample of copper
      as an intrinsic measurement standard of electric conductivity.
  id: 5.10-eng
  language_code: eng
  notes:
  - content: 'A quantity value of an intrinsic measurement standard is assigned by
      consensus and does not need to be established by relating it to another measurement
      standard of the same type. Its measurement uncertainty is determined by considering
      two components: the first associated with its consensus quantity value and the
      second associated with its construction, implementation, and maintenance.'
  - content: An intrinsic measurement standard usually consists of a system produced
      according to the requirements of a consensus procedure and subject to periodic
      verification. The consensus procedure may contain provisions for application
      of corrections necessitated by the implementation.
  - content: Intrinsic measurement standards that are based on quantum phenomena usually
      have outstanding stability.
  - content: The adjective “intrinsic” does not mean that such a measurement standard
      may be implemented and used without special care or that such a measurement
      standard is immune to internal and external influences.
  terms:
  - type: expression
    normative_status: preferred
    designation: intrinsic measurement standard
  - type: expression
    normative_status: admitted
    designation: intrinsic standard
date_accepted: '2007-01-01T00:00:00+00:00'
