data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: composante de l'erreur de mesure qui, dans des mesurages répétés, demeure
      constante ou varie de façon prévisible
  examples: []
  id: 2.17-fra
  language_code: fra
  notes:
  - content: La valeur de référence pour une erreur systématique est une valeur vraie,
      une valeur mesurée d’un étalon dont l'incertitude de mesure est négligeable,
      ou une valeur conventionnelle.
  - content: L'erreur systématique et ses causes peuvent être connues ou inconnues.
      On peut appliquer une correction pour compenser une erreur systématique connue.
  - content: L'erreur systématique est égale à la différence entre l'erreur de mesure
      et l'erreur aléatoire.
  terms:
  - type: expression
    normative_status: preferred
    designation: erreur systématique, f
