data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: systematic error of measurement systematic error component of measurement
      error that in replicate measurements remains constant or varies in a predictable
      manner
  examples: []
  id: 2.17-eng
  language_code: eng
  notes:
  - content: A reference quantity value for a systematic measurement error is a true
      quantity value, or a measured quantity value of a measurement standard of negligible
      measurement uncertainty, or a conventional quantity value.
  - content: Systematic measurement error, and its causes, can be known or unknown.
      A correction can be applied to compensate for a known systematic measurement
      error.
  - content: Systematic measurement error equals measurement error minus random measurement
      error.
  terms:
  - type: expression
    normative_status: preferred
    designation: systematic measurement error
