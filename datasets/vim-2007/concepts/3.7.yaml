  definition:
  - content: device, used in *measurement*, that provides an output *quantity* having
      a specified relation to the input quantity
  examples:
  - content: Thermocouple,
  - content: electric current transformer,
  - content: strain gauge,
  - content: pH electrode,
  - content: Bourdon tube,
  - content: bimetallic strip.
