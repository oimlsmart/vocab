data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: mathematical relation between quantities in a given system of quantities,
      independent of measurement units
  examples:
  - content: a) Q1 = ζ Q2 Q3 where Q1, Q2, and Q3 denote different quantities, and
      where ζ is a numerical factor. b) T = (1/2) mv2, where T is the kinetic energy
      and v the speed of a specified particle of mass m. c) n = I t / F where n is
      the amount of substance of a univalent component, I is the electric current
      and t the duration of the electrolysis, and where F is the Faraday constant.
  id: 1.22-eng
  language_code: eng
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: quantity equation
