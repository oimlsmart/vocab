data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: relation d'égalité entre des *grandeurs* d'un *système de grandeurs* donné,
      indépendante des *unités de mesure*
  examples:
  - content: stem:[Q_1 = zeta Q_2 Q_3], où stem:[Q_1], stem:[Q_2] et stem:[Q_3] représentent différentes grandeurs et
      où stem:[zeta] est un facteur numérique.
  - content: stem:[T = (1/2) mv^2], où stem:[T] est l'énergie cinétique et stem:[v] la vitesse
        d'une particule spécifiée de masse stem:[m].
  - content: stem:[n = I t // F] où stem:[n] est la quantité de matière d'un composé univalent,
        stem:[I] est le courant électrique et stem:[t] la durée de l'électrolyse, stem:[F]
        est la constante de Faraday.
  id: 1.22-fra
  language_code: fra
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: équation aux grandeurs
    grammar_info:
    - gender: f
