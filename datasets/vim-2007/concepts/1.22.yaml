data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: mathematical relation between *quantities* in a given *system of quantities*,
      independent of *measurement units*
  examples:
  - content: stem:[Q_1 = zeta Q_2 Q_3] where stem:[Q_1], stem:[Q_2], and stem:[Q_3] denote different quantities, and
      where stem:[zeta] is a numerical factor.
  - content: stem:[T = (1//2) mv^2], where stem:[T] is the kinetic energy and stem:[v]
      the speed of a specified particle of mass stem:[m].
  - content: stem:[n = I t // F] where stem:[n] is the amount of substance of a univalent component,
      stem:[I] is the electric current and stem:[t] the duration of the electrolysis, and where
      stem:[F] is the Faraday constant.
  id: 1.22-eng
  language_code: eng
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: quantity equation
date_accepted: '2007-01-01T00:00:00+00:00'
entry_status: valid
