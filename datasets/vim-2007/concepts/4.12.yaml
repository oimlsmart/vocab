    type: accepted
  definition:
  - content: quotient de la variation d'une indication d'un système de mesure par
      la variation correspondante de la valeur de la grandeur mesurée
  examples: []
  id: 4.12-fra
  language_code: fra
  notes:
  - content: La sensibilité peut dépendre de la valeur de la grandeur mesurée.
  - content: La variation de la valeur de la grandeur mesurée doit être grande par
      rapport à la résolution.
  terms:
  - type: expression
    normative_status: preferred
    designation: sensibilité, f
