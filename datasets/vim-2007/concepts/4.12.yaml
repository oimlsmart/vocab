  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: quotient of the change in an indication of a measuring system and the
      corresponding change in a value of a quantity being measured
  examples: []
  id: 4.12-eng
  language_code: eng
  notes:
  - content: The sensitivity of a measuring system can depend on the value of the
      quantity being measured.
  - content: The change considered in a value of a quantity being measured must be
      large compared with the resolution.
  terms:
  - type: expression
    normative_status: preferred
    designation: sensitivity of a measuring system
  - type: expression
    normative_status: admitted
    designation: sensitivity
