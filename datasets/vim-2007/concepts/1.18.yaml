    type: accepted
  definition:
  - content: measurement unit obtained by dividing a given measurement unit by an
      integer greater than one
  examples:
  - content: a) The millimetre is a decimal submultiple of the metre. b) For plane
      angle, the second is a non-decimal submultiple of the minute. Note SI prefixes
      for decimal submultiples of SI base units and SI derived units are given in
      note 5 of 1.16. _________________________________________________________________________________________________________________________________________________________________________________________________________________________
