    type: accepted
  definition:
  - content: ensemble d'un ou plusieurs instruments de mesure et souvent d'autres
      dispositifs, comprenant si nécessaire réactifs et alimentations, assemblés et
      adaptés pour fournir des informations destinées à obtenir des valeurs mesurées
      dans des intervalles spécifiés pour des grandeurs de natures spécifiées Note
      Un système de mesure peut consister en un seul instrument de mesure.
