    type: accepted
  definition:
  - content: set of one or more measuring instruments and often other devices, including
      any reagent and supply, assembled and adapted to give information used to generate
      measured quantity values within specified intervals for quantities of specified
      kinds Note A measuring system may consist of only one measuring instrument.
