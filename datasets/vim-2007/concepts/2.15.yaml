data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: étroitesse de l'accord entre les indications ou les valeurs mesurées
      obtenues par des mesurages répétés du même objet ou d'objets similaires dans
      des conditions spécifiées
  examples: []
  id: 2.15-fra
  language_code: fra
  notes:
  - content: La fidélité est en général exprimée numériquement par des caractéristiques
      telles que l'écart-type, la variance ou le coefficient de variation dans les
      conditions spécifiées.
  - content: Les conditions spécifiées peuvent être, par exemple, des conditions de
      répétabilité, des conditions de fidélité intermédiaire ou des conditions de
      reproductibilité (voir l'ISO 5725-3:1994).
  - content: La fidélité sert à définir la répétabilité de mesure, la fidélité intermédiaire
      de mesure et la reproductibilité de mesure.
  - content: Le terme « fidélité de mesure » est quelquefois utilisé improprement
      pour désigner l’exactitude de mesure.
  terms:
  - type: expression
    normative_status: preferred
    designation: fidélité de mesure, f
  - type: expression
    normative_status: admitted
    designation: fidélité, f
date_accepted: '2007-01-01T00:00:00+00:00'
