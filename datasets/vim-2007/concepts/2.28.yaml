  definition:
  - content: évaluation d'une composante de l'incertitude de mesure par une analyse
      statistique des valeurs mesurées obtenues dans des conditions définies de mesurage
  examples: []
  id: 2.28-fra
  language_code: fra
  notes:
  - content: Pour divers types de conditions de mesurage, voir condition de répétabilité,
      condition de fidélité intermédiaire et condition de reproductibilité.
  - content: Voir par exemple le GUM:1995 pour des informations sur l'analyse statistique.
  - content: Voir aussi le GUM, 2.3.2., l’ISO 5725, l’ISO 13526, l’ISO/TS 21748, l’ISO/TS
      21749.
