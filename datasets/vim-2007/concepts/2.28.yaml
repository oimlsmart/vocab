data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: evaluation of a component of measurement uncertainty by a statistical
      analysis of measured quantity values obtained under defined measurement conditions
  examples: []
  id: 2.28-eng
  language_code: eng
  notes:
  - content: For various types of measurement conditions, see repeatability condition
      of measurement, intermediate precision condition of measurement, and reproducibility
      condition of measurement.
  - content: For information about statistical analysis, see e.g. the GUM:1995.
  - content: See also GUM, 2.3.2, ISO 5725, ISO 13526, ISO/TS 21748, ISO/TS 21749.
  terms:
  - type: expression
    normative_status: preferred
    designation: Type A evaluation of measurement uncertainty
  - type: expression
    normative_status: admitted
    designation: Type A evaluation
