    type: accepted
  definition:
  - content: dispositif ou substance qui indique la présence d'un phénomène, d'un
      corps ou d'une substance lorsqu'une valeur de seuil d'une grandeur associée
      est dépassée
  examples:
  - content: a) Détecteur de fuite à halogène, b) papier au tournesol.
  id: 3.9-fra
  language_code: fra
  notes:
  - content: Dans certains domaines, le terme « détecteur » est employé pour le concept
      de capteur.
  - content: En chimie, le terme « indicateur » est souvent employé pour ce concept.
  terms:
  - type: expression
    normative_status: preferred
    designation: détecteur, m
