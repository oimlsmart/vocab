data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: intermediate precision condition condition of measurement, out of a set
      of conditions that includes the same measurement procedure, same location, and
      replicate measurements on the same or similar objects over an extended period
      of time, but may include other conditions involving changes
  examples: []
  id: 2.22-eng
  language_code: eng
  notes:
  - content: The changes can include new calibrations, calibrators, operators, and
      measuring systems.
  - content: A specification for the conditions should contain the conditions changed
      and unchanged, to the extent practical.
  - content: In chemistry, the term “inter-serial precision condition of measurement”
      is sometimes used to designate this concept.
  terms:
  - type: expression
    normative_status: preferred
    designation: intermediate precision condition of measurement
date_accepted: '2007-01-01T00:00:00+00:00'
