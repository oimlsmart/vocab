  definition:
  - content: rapport de deux unités de mesure correspondant à des grandeurs de même
      nature
  examples:
  - content: km/m = 1 000 et par conséquent 1 km = 1 000 m. Note Les unités de mesure
      peuvent appartenir à des systèmes d’unités différents.
  - content: a) h/s = 3 600 et par conséquent 1 h = 3 600 s. b) (km/h)/(m/s) = (1/3,6)
      et par conséquent 1 km/h = (1/3,6) m/s.
