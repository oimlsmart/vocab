  definition:
  - content: ratio of two measurement units for quantities of the same kind
  examples:
  - content: km/m = 1 000 and thus 1 km = 1 000 m. Note The measurement units may
      belong to different systems of units.
  - content: a) h/s = 3 600 and thus 1 h = 3 600 s. b) (km/h)/(m/s) = (1/3.6) and
      thus 1 km/h = (1/3.6) m/s. _________________________________________________________________________________________________________________________________________________________________________________________________________________________
