data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: rapport de deux *unités de mesure* correspondant à des *grandeurs* de même *nature*
  examples:
  - content: stem:["unitsml(km/m)" = 1000] et par conséquent stem:[1 "unitsml(km)" = 1000 "unitsml(m)"]
  - content: stem:["unitsml(h/s)" = 3600] et par conséquent stem:[1 "unitsml(h)" = 3600 "unitsml(s)"]
  - content: stem:[("unitsml(km/h)")/("unitsml(m/s)") = (1/3.6)] et par conséquent stem:[1 "unitsml(km/h)" = (1/3.6) "unitsml(m/s)"]
  id: 1.24-fra
  language_code: fra
  notes:
  - content: Les unités de mesure peuvent appartenir à des *systèmes d'unités* différents.
    examples:
    - content: stem:["unitsml(h/s)" = 3600] et par conséquent stem:[1 "unitsml(h)" = 3600 "unitsml(s)"].
    - content: stem:[("unitsml(km/h)")/("unitsml(m/s)") = (1/3.6)] et par conséquent stem:[1 "unitsml(km/h)" = (1/3.6) "unitsml(m/s)"].
  terms:
  - type: expression
    normative_status: preferred
    designation: facteur de conversion entre unités
    grammar_info:
    - gender: m
date_accepted: '2007-01-01T00:00:00+00:00'
