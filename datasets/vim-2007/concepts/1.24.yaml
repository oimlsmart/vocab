data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: ratio of two *measurement units* for *quantities* of the same *kind*
  examples:
  - content: stem:["unitsml(km/m)" = 1000] and thus stem:[1 "unitsml(km)" = 1000 "unitsml(m)"]
  id: 1.24-eng
  language_code: eng
  notes:
  - content: The measurement units may belong to different *systems of units*.
    examples:
    - content: stem:["unitsml(h/s)" = 3600] and thus stem:[1 "unitsml(h)" = 3600 "unitsml(s)"].
    - content: stem:[("unitsml(km/h)")/("unitsml(m/s)") = (1/3.6)] and thus stem:[1 "unitsml(km/h)" = (1/3.6) "unitsml(m/s)"].
  terms:
  - type: expression
    normative_status: preferred
    designation: conversion factor between units
date_accepted: '2007-01-01T00:00:00+00:00'
entry_status: valid
