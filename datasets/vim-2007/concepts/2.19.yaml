data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: composante de l'erreur de mesure qui, dans des mesurages répétés, varie
      de façon imprévisible
  examples: []
  id: 2.19-fra
  language_code: fra
  notes:
  - content: La valeur de référence pour une erreur aléatoire est la moyenne qui résulterait
      d'un nombre infini de mesurages répétés du même mesurande.
  - content: Les erreurs aléatoires d'un ensemble de mesurages répétés forment une
      distribution qui peut être résumée par son espérance mathématique, généralement
      supposée nulle, et par sa variance.
  - content: L'erreur aléatoire est égale à la différence entre l'erreur de mesure
      et l'erreur systématique. _________________________________________________________________________________________________________________________________________________________________________________________________________________________
  terms:
  - type: expression
    normative_status: preferred
    designation: erreur aléatoire, f
