  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: random error of measurement random error component of measurement error
      that in replicate measurements varies in an unpredictable manner
  examples: []
  id: 2.19-eng
  language_code: eng
  notes:
  - content: A reference quantity value for a random measurement error is the average
      that would ensue from an infinite number of replicate measurements of the same
      measurand.
  - content: Random measurement errors of a set of replicate measurements form a distribution
      that can be summarized by its expectation, which is generally assumed to be
      zero, and its variance.
  - content: Random measurement error equals measurement error minus systematic measurement
      error. _________________________________________________________________________________________________________________________________________________________________________________________________________________________
  terms:
  - type: expression
    normative_status: preferred
    designation: random measurement error
