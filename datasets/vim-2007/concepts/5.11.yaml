    type: accepted
  definition:
  - content: maintenance of a *measurement standard* set of operations necessary to
      preserve the metrological properties of a measurement standard within stated
      limits
  examples: []
  id: 5.11-eng
  language_code: eng
  notes:
  - content: Conservation commonly includes periodic *verification* of predefined
      metrological properties or *calibration*, storage under suitable conditions, and
      specified care in use.
  terms:
  - type: expression
    normative_status: preferred
    designation: conservation of a measurement standard
