  definition:
  - content: ensemble des opérations nécessaires à la préservation
      des propriétés métrologiques d'un étalon dans des limites déterminées
  examples: []
  id: 5.11-fra
  language_code: fra
  notes:
  - content: La conservation comprend habituellement une *vérification* périodique de propriétés
      métrologiques choisies ou un *étalonnage*, un stockage dans des conditions appropriées
      et des précautions particulières lors de l'utilisation.
