  definition:
  - content: maintenance d'un étalon, f ensemble des opérations nécessaires à la préservation
      des propriétés métrologiques d'un étalon dans des limites déterminées Note La
      conservation comprend habituellement une vérification périodique de propriétés
      métrologiques choisies ou un étalonnage, un stockage dans des conditions appropriées
      et des précautions particulières lors de l'utilisation. _________________________________________________________________________________________________________________________________________________________________________________________________________________________
