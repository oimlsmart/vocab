  definition:
  - content: maintenance of a measurement standard set of operations necessary to
      preserve the metrological properties of a measurement standard within stated
      limits Note Conservation commonly includes periodic verification of predefined
      metrological properties or calibration, storage under suitable conditions, and
      specified care in use. _________________________________________________________________________________________________________________________________________________________________________________________________________________________
