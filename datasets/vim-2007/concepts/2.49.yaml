data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: function of *quantities*, the value of which, when calculated using known
      *quantity values* for the *input quantities in a measurement model*, is a *measured
      quantity value* of the *output quantity in the measurement model*
  examples: []
  id: 2.49-eng
  language_code: eng
  notes:
  - content: If a *measurement model* stem:[h(Y, X_1, ..., X_n) = 0] can explicitly be written
      as stem:[Y = f (X_1, ..., X_n)], where stem:[Y] is the output quantity in the measurement model,
      the function stem:[f] is the measurement function. More generally, stem:[f] may symbolize
      an algorithm, yielding for input quantity values stem:[x_1, ..., x_n] a corresponding
      unique output quantity value stem:[y = f (x_1, ..., x_n)].
  - content: A measurement function is also used to calculate the *measurement uncertainty*
      associated with the measured quantity value of stem:[Y].
  terms:
  - type: expression
    normative_status: preferred
    designation: measurement function
date_accepted: '2007-01-01T00:00:00+00:00'
