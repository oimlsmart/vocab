data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: fonction de *grandeurs*, dont la valeur, lorsqu'elle est calculée en utilisant
      des *valeurs* connues pour les *grandeurs d'entrée dans le modèle de mesure*, est
      une *valeur mesurée* de la *grandeur de sortie dans le modèle de mesure*
  examples: []
  id: 2.49-fra
  language_code: fra
  notes:
  - content: Si un *modèle de mesure* stem:[h(Y, X_1, ..., X_n) = 0] peut être écrit explicitement
      sous la forme stem:[Y = f (X_1, ..., X_n)], où stem:[Y] est la grandeur de sortie dans le modèle
      de mesure, la fonction stem:[f] est la fonction de mesure. Plus généralement, stem:[f] peut
      symboliser un algorithme qui fournit, pour les valeurs d'entrée stem:[x_1, ..., x_n],
      une valeur de sortie unique correspondante stem:[y = f (x_1, ..., x_n)].
  - content: On utilise aussi une fonction de mesure pour calculer l'*incertitude de
      mesure* associée à la valeur mesurée de stem:[Y].
  terms:
  - type: expression
    normative_status: preferred
    designation: fonction de mesure
    grammar_info:
    - gender: f
date_accepted: '2007-01-01T00:00:00+00:00'
