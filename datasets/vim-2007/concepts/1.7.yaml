data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: expression de la dépendance d'une *grandeur*
      par rapport aux grandeurs de base d'un système de grandeurs sous la forme d'un
      produit de puissances de facteurs correspondant aux grandeurs de base, en omettant
      tout facteur numérique
  examples:
  - content: Dans l'*ISQ*, la dimension de la force est notée stem:[dim F = "LMT"^-2].
  - content: Dans le même système de grandeurs, stem:[dim rho_B = "ML"^-3] est la dimension
        de la concentration en masse du constituant B et stem:["ML"^-3] est aussi la dimension
        de la masse volumique stem:[rho].
  - content: |
        La période stem:[T] d'un pendule de longueur stem:[l] en un endroit où l'accélération
        locale de la pesanteur vaut stem:[g] est

        [stem%unnumbered]
        ++++
        T = 2pi sqrt(l/g) quad "ou" quad T = C(g) sqrt(l) quad "où" quad C(g) = {2pi}/sqrt(g)
        ++++

        Par conséquent, stem:[dim C(g) = L^{-1//2}T].
  id: 1.7-fra
  language_code: fra
  notes:
  - content: Une puissance d'un facteur est le facteur muni d'un exposant. Chaque
      facteur exprime la dimension d'une grandeur de base.
  - content: Par convention, la représentation symbolique de la dimension d'une grandeur
      de base est une lettre majuscule unique en caractère romain (droit) sans empattement.
      Par convention, la représentation symbolique de la dimension d'une *grandeur
      dérivée* est le produit de puissances des dimensions des grandeurs de base conformément
      à la définition de la grandeur dérivée. La dimension de la grandeur stem:[Q] est notée
      stem:[dim Q].
  - content: Pour établir la dimension d'une grandeur, on ne tient pas compte du caractère
      scalaire, vectoriel ou tensoriel.
  - content: |
        Dans un système de grandeurs donné,

        - les grandeurs de même *nature* ont la même dimension,
        - des grandeurs de dimensions différentes sont toujours de nature différente,
        - des grandeurs ayant la même dimension ne sont pas nécessairement de même nature.
  - content: |
        Dans l'ISQ, les symboles correspondant aux dimensions des grandeurs de base sont:

        [cols="1,1", options="header,unnumbered"]
        |===
        | Grandeur de base            | Symbole de la dimension

        | longueur                    | stem:[L]
        | masse                       | stem:[M]
        | temps                       | stem:[T]
        | courant électrique          | stem:[I]
        | température thermodynamique | stem:[Theta]
        | quantité de matière         | stem:[N]
        | intensité lumineuse         | stem:[J]
        |===

        La dimension d'une grandeur stem:[Q] est donc notée
        stem:[dim Q = L^{alpha} M^{beta} T^{gamma} I^{delta} Theta^{epsilon} N^{epsilon} J^{zeta}]
        où les exposants, appelés exposants dimensionnels, sont positifs, négatifs ou nuls.
  terms:
  - type: expression
    normative_status: preferred
    designation: dimension
    grammar_info:
    - gender: f
  - type: expression
    normative_status: admitted
    designation: dimension d'une grandeur
    grammar_info:
    - gender: f
