data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: expression of the dependence of a *quantity* on the *base quantities* of
      a *system of quantities* as a product of powers of factors corresponding to the
      base quantities, omitting any numerical factor
  examples:
  - content: In the *ISQ*, the quantity dimension of force is denoted by stem:[dim F = "LMT"^-2].
  - content: In the same system of quantities, stem:[dim rho_B = "ML"^-3] is the quantity dimension of mass concentration of component stem:[B], and stem:["ML"-3] is also the quantity dimension of mass density, stem:[rho], (volumic mass).
  - content: |
        The period stem:[T] of a pendulum of length stem:[l] at a place with the local acceleration of free fall stem:[g] is

        [stem%unnumbered]
        ++++
        T = 2pi sqrt(l/g) quad "or" quad T = C(g) sqrt(l) quad "where" quad C(g) = sqrt(2pi/g)
        ++++

        Hence, stem:[dim C(g) = "L"^(-1//2) "T"].
  id: 1.7-eng
  language_code: eng
  notes:
  - content: A power of a factor is the factor raised to an exponent. Each factor
      is the dimension of a base quantity.
  - content: The conventional symbolic representation of the dimension of a base quantity
      is a single upper case letter in roman (upright) sans-serif type. The conventional
      symbolic representation of the dimension of a *derived quantity* is the product
      of powers of the dimensions of the base quantities according to the definition
      of the derived quantity. The dimension of a quantity stem:[Q] is denoted by stem:[dim Q].
  - content: In deriving the dimension of a quantity, no account is taken of its scalar,
      vector, or tensor character.
  - content: |
        In a given system of quantities,
        - quantities of the same *kind* have the same quantity dimension,
        - quantities of different quantity dimensions are always of different kinds, and
        - quantities having the same quantity dimension are not necessarily of the same kind.
  - content: |
        Symbols representing the dimensions of the base quantities in the ISQ:

        [cols="1,1", options="header,unnumbered"]
        |===
        | Base quantity             | Symbol for dimension

        | length                    | stem:[L]
        | mass                      | stem:[M]
        | time                      | stem:[T]
        | electric current          | stem:[I]
        | thermodynamic temperature | stem:[Theta]
        | amount of substance       | stem:[N]
        | luminous intensity        | stem:[J]
        |===

        Thus, the dimension of a quantity stem:[Q] is denoted by stem:[dim Q = "L"^{alpha} "M"^{beta} "T"^{gamma} "I"^{delta} "Theta"^{epsilon} "N"^{zeta} "J"^{eta}] where the exponents, named dimensional exponents, are positive, negative, or zero.
  terms:
  - type: expression
    normative_status: preferred
    designation: quantity dimension
  - type: expression
    normative_status: admitted
    designation: dimension of a quantity
  - type: expression
    normative_status: admitted
    designation: dimension
date_accepted: '2007-01-01T00:00:00+00:00'
