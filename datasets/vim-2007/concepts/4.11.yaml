    type: accepted
  definition:
  - content: condition de fonctionnement prescrite pour évaluer les performances d'un
      instrument de mesure ou d'un système de mesure ou pour comparer des résultats
      de mesure
  examples: []
  id: 4.11-fra
  language_code: fra
  notes:
  - content: Les conditions de fonctionnement de référence spécifient des intervalles
      de valeurs du mesurande et des grandeurs d'influence.
  - content: Dans la CEI 60050-300, n° 311-06-02, le terme « condition de référence
      » désigne une condition de fonctionnement dans laquelle l’incertitude instrumentale
      spécifiée est la plus petite possible.
