data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: operating condition prescribed for evaluating the performance of a measuring
      instrument or measuring system or for comparison of measurement results
  examples: []
  id: 4.11-eng
  language_code: eng
  notes:
  - content: Reference operating conditions specify intervals of values of the measurand
      and of the influence quantities.
  - content: In IEC 60050-300, item 311-06-02, the term “reference condition” refers
      to an operating condition under which the specified instrumental measurement
      uncertainty is the smallest possible.
  terms:
  - type: expression
    normative_status: preferred
    designation: reference operating condition
  - type: expression
    normative_status: admitted
    designation: reference condition
