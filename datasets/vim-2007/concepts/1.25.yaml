data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: relation d'égalité entre des valeurs numériques, fondée sur une équation
      aux grandeurs donnée et des unités de mesure spécifiées
  examples:
  - content: Pour les grandeurs données dans l'exemple a) de 1.22, stem:[{Q_1} = zeta {Q_2} {Q_3}],
      où stem:[{Q_1}], stem:[{Q_2}] et stem:[{Q_3}] représentent respectivement les valeurs numériques
      de stem:[Q_1], stem:[Q_2] et stem:[Q_3] lorsqu'elles sont exprimées en unités de base ou en unités
      dérivées cohérentes ou les deux.
  - content: Pour l'équation de l'énergie cinétique d'une particule, stem:[T = (1//2) mv^2],
      si stem:[m = 2 "unitsml(kg)"] et stem:[v = 3 "unitsml(m/s)"], alors stem:[{T} = (1//2) xx 2 xx 3^2]
      est une équation aux valeurs numériques donnant la valeur numérique 9 pour stem:[T] en joules.
  id: 1.25-fra
  language_code: fra
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: équation aux valeurs numériques
    grammar_info:
    - gender: f
