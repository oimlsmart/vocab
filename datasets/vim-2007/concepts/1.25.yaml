data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: numerical quantity value equation mathematical relation between numerical
      quantity values, based on a given quantity equation and specified measurement
      units
  examples:
  - content: a) For the quantities in example a) in item 1.22, {Q1} = ζ {Q2} {Q3}
      where {Q1}, {Q2}, and {Q3} denote the numerical values of Q1, Q2, and Q3, respectively,
      provided that they are expressed in either base units or coherent derived units
      or both. b) In the quantity equation for kinetic energy of a particle, T = (1/2)
      mv2, if m = 2 kg and v = 3 m/s, then {T} = (1/2) × 2 × 32 is a numerical value
      equation giving the numerical value 9 of T in joules.
  id: 1.25-eng
  language_code: eng
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: numerical value equation
