data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: mathematical relation between *numerical quantity values*, based on a given
      *quantity equation* and *specified measurement units*
  examples:
  - content: For the *quantities* in example a) in item 1.22, stem:[{Q1} = zeta {Q2} {Q3}]
      where stem:[{Q1}], stem:[{Q2}], and stem:[{Q3}] denote the numerical values of stem:[Q_1],
      stem:[Q_2], and stem:[Q_3], respectively, provided that they are expressed in either
      *base units* or *coherent derived units* or both.
  - content: In the quantity equation for kinetic energy of a particle, stem:[T = (1//2) mv^2],
      if stem:["unitsml(m)" = 2 "unitsml(kg)"] and stem:[v = 3 "unitsml(m/s)"], then
      stem:[{T} = (1/2) xx 2 xx 3^2] is a numerical value equation giving the numerical value 9
      of stem:[T] in joules.
  id: 1.25-eng
  language_code: eng
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: numerical value equation
  - type: expression
    normative_status: admitted
    designation: numerical quantity value equation
date_accepted: '2007-01-01T00:00:00+00:00'
entry_status: valid
