data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: system of units, based on a given system of quantities, in which the
      measurement unit for each derived quantity is a coherent derived unit
  examples:
  - content: Set of coherent SI units and relations between them.
  id: 1.14-eng
  language_code: eng
  notes:
  - content: A system of units can be coherent only with respect to a system of quantities
      and the adopted base units.
  - content: For a coherent system of units, numerical value equations have the same
      form, including numerical factors, as the corresponding quantity equations.
  terms:
  - type: expression
    normative_status: preferred
    designation: coherent system of units
