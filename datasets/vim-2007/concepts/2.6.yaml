data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: description détaillée d'un *mesurage* conformément à un ou plusieurs *principes
      de mesure* et à une méthode de mesure donnée, fondée sur un *modèle de mesure*
      et incluant tout calcul destiné à obtenir un *résultat de mesure*
  examples: []
  id: 2.6-fra
  language_code: fra
  notes:
  - content: Une procédure de mesure est habituellement documentée avec assez de détails
      pour permettre à un opérateur d'effectuer un mesurage.
  - content: Une procédure de mesure peut inclure une assertion concernant une *incertitude cible*.
  - content: Une procédure de mesure est quelquefois appelée en anglais _standard operating
      procedure_, abrégé en SOP. Le terme « mode opératoire de mesure » était employé
      en français dans la deuxième édition du VIM.
  terms:
  - type: expression
    normative_status: preferred
    designation: procédure de mesure
    grammar_info:
    - gender: f
  - type: expression
    normative_status: admitted
    designation: procédure opératoire
    grammar_info:
    - gender: f
date_accepted: '2007-01-01T00:00:00+00:00'
