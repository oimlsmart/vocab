data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: detailed description of a measurement according to one or more measurement
      principles and to a given measurement method, based on a measurement model and
      including any calculation to obtain a measurement result
  examples: []
  id: 2.6-eng
  language_code: eng
  notes:
  - content: A measurement procedure is usually documented in sufficient detail to
      enable an operator to perform a measurement.
  - content: A measurement procedure can include a statement concerning a target measurement
      uncertainty.
  - content: A measurement procedure is sometimes called a standard operating procedure,
      abbreviated SOP.
  terms:
  - type: expression
    normative_status: preferred
    designation: measurement procedure
