data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: ensemble d'un nombre et d'une référence constituant l'expression quantitative
      d'une grandeur
  examples:
  - content: Longueur d'une tige donnée stem:[5.34 "unitsml(m)"] ou stem:[534 "unitsml(cm)"]
  - content: Masse d'un corps donné stem:[0,152 "unitsml(kg)"] ou stem:[152 "unitsml(g)"]
  - content: Courbure d'un arc donné stem:[112 "unitsml(m^-1)"]
  - content: Température Celsius d'un spécimen donné stem:[-5 "unitsml(degC)"]
  - content: Impédance électrique d'un élément de circuit donné à une fréquence donnée, où j est l'unité imaginaire stem:[(7 + 3j) "unitsml(Ohm)"]
  - content: Indice de réfraction d'un spécimen donné de verre stem:[1.32]
  - content: Dureté C de Rockwell d'un spécimen donné (charge de stem:[150 "unitsml(kg)"]) stem:[43.5"HRC"(150 "unitsml(kg)")]
  - content: Fraction massique de cadmium dans un spécimen donné de cuivre stem:[3 "unitsml(ug/kg)"] ou stem:[3 xx 10^{-9}]
  - content: Molalité de Pb2+ dans un spécimen donné d'eau stem:[1.76 "unitsml(umol/kg)"]
  - content: Concentration arbitraire en quantité de matière de lutropine dans un spécimen donné de plasma (étalon international 80/552 de l'OMS) stem:[5,0] UI/l
  id: 1.19-fra
  language_code: fra
  notes:
  - content: |
      Selon le type de référence, la valeur d'une grandeur est

      * soit le produit d'un nombre et d'une *unité de mesure* (voir les exemples a, b, c, d, e, h et
      i) ; l'unité un est généralement omise pour les *grandeurs sans dimension* (voir f et h) ;
      * soit un nombre et la référence à une *procédure de mesure* (voir g) ;
      * soit un nombre et un *matériau de référence* (voir j).
  - content: Le nombre peut être complexe (voir l'exemple e).
  - content: La valeur d'une grandeur peut être représentée de plus d'une façon (voir
      a, b et h).
  - content: Dans le cas de grandeurs vectorielles ou tensorielles, chaque composante
      a une valeur.
    examples:
    - content: Force agissant sur une particule donnée, par exemple en coordonnées cartésiennes
        stem:[(F_x ; F_y ; F_z) = (-31,5 ; 43,2 ; 17,0) "unitsml(N)"]
  terms:
  - type: expression
    normative_status: preferred
    designation: valeur d'une grandeur
    grammar_info:
    - gender: f
  - type: expression
    normative_status: admitted
    designation: valeur
    grammar_info:
    - gender: f
date_accepted: '2007-01-01T00:00:00+00:00'
