data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: number and reference together expressing magnitude of a quantity
  examples:
  - content: length of a given rod stem:[5.34 "unitsml(m)"] or stem:[534 "unitsml(cm)"]
  - content: mass of a given body stem:[0.152 "unitsml(kg)"] or stem:[152 "unitsml(g)"]
  - content: curvature of a given arc stem:[112 "unitsml(m^-1)"]
  - content: Celsius temperature of a given sample stem:[-5 "unitsml(degC)"]
  - content: electric impedance of a given circuit element at a given frequency, where j is the imaginary unit stem:[(7 + 3j) "unitsml(Ohm)"]
  - content: refractive index of a given sample of glass stem:[1.32]
  - content: Rockwell C hardness of a given sample (stem:[150 "unitsml(kg)"] load) 43.5HRC(stem:[150 "unitsml(kg)"])
  - content: mass fraction of cadmium in a given sample of copper stem:[3 "unitsml(ug/kg)"] or stem:[3 xx 10^{-9}]
  - content: molality of Pb2+ in a given sample of water stem:[1.76 "unitsml(umol/kg)"]
  - content: arbitrary amount-of-substance concentration of lutropin in a given sample of plasma (WHO International Standard 80/552) 5.0 (International Unit/l)
  id: 1.19-eng
  language_code: eng
  notes:
  - content: |
      According to the type of reference, a quantity value is either

      * a product of a number and a *measurement unit* (see a), b), c), d), e), h) and i)); the
      measurement unit one is generally not indicated for *quantities of dimension one* (see f), and h)),
      or
      * a number and a reference to a *measurement procedure* (see g)), or
      * a number and a *reference material* (see j).
  - content: The number can be complex (see e)).
  - content: A quantity value can be presented in more than one way (see examples a), b), and h)).
  - content: In the case of vector or tensor quantities, each component has a quantity value.
    examples:
    - content: Force acting on a given particle, e.g. in Cartesian components stem:[(F_x; F_y; F_z) = (-31.5; 43.2; 17.0) "unitsml(N)"].
  terms:
  - type: expression
    normative_status: preferred
    designation: quantity value
  - type: expression
    normative_status: admitted
    designation: value of a quantity
  - type: expression
    normative_status: admitted
    designation: value
date_accepted: '2007-01-01T00:00:00+00:00'
