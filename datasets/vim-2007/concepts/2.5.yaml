  - content: 'generic description of a logical organization of operations used in
      a measurement Note Measurement methods may be qualified in various ways such
      as: • substitution measurement method, • differential measurement method, and
      • null measurement method; or • direct measurement method, and • indirect measurement
      method. See IEC 60050-300:2001.'
