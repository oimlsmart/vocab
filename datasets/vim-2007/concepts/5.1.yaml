data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: réalisation de la définition d'une grandeur donnée, avec une valeur déterminée
      et une incertitude de mesure associée, utilisée comme référence EXEMPLES a)
      Étalon de masse de 1 kg avec une incertitude-type associée de 3 µg. b) Résistance
      étalon de 100 Ω avec une incertitude-type associée de 1 µΩ c) Étalon de fréquence
      à césium avec une incertitude type associée de 2 × 1015. d) Électrode de référence
      à hydrogène avec une valeur associée de 7,072 et une incertitude type associée
      de 0,006. e) Série de solutions de référence de cortisol dans du sérum humain,
      dont chaque solution a une valeur certifiée avec une incertitude de mesure.
      f) Matériau de référence fournissant des valeurs avec les incertitudes de mesure
      associées pour la concentration en masse de dix protéines différentes.
  examples: []
  id: 5.1-fra
  language_code: fra
  notes:
  - content: La « réalisation de la définition d'une grandeur donnée » peut être fournie
      par un système de mesure, une mesure matérialisée ou un matériau de référence.
  - content: Un étalon sert souvent de référence dans l'obtention de valeurs mesurées
      et d'incertitudes de mesure associées pour d'autres grandeurs de même nature,
      établissant ainsi une traçabilité métrologique par l'intermédiaire de l'étalonnage
      d'autres étalons, instruments de mesure ou systèmes de mesure.
  - content: Le terme « réalisation » est employé ici dans son sens le plus général.
      Il désigne trois procédures de réalisation. La première, la réalisation stricto
      sensu, est la réalisation physique de l'unité à partir de sa définition. La
      deuxième, appelée « reproduction », consiste, non pas à réaliser l'unité à partie
      de sa définition, mais à construire un étalon hautement reproductible fondé
      sur un phénomène physique, par exemple l'emploi de lasers stabilisés en fréquence
      pour construire un étalon du mètre, l'emploi de l'effet Josephson pour le volt
      ou de l'effet Hall quantique pour l'ohm. La troisième procédure consiste à adopter
      une mesure matérialisée comme étalon. C'est le cas de l'étalon de 1 kg.
  - content: L'incertitude-type associée à un étalon est toujours une composante de
      l'incertitude-type composée (voir GUM, 2.3.4) dans un résultat de mesure obtenu
      en utilisant l'étalon. Cette composante est souvent petite par rapport à d'autres
      composantes de l'incertitude-type composée.
  - content: La valeur de la grandeur et l'incertitude de mesure doivent être déterminées
      au moment où l'étalon est utilisé.
  - content: Plusieurs grandeurs de même nature ou de natures différentes peuvent
      être réalisées à l'aide d'un seul dispositif, appelé aussi étalon.
  - content: Le mot « embodiment » est quelquefois utilisé en anglais à la place de
      « realization ».
  - content: 'Dans la science et la technologie, le mot anglais « standard » est utilisé
      avec au moins deux significations différentes : celle de spécification, recommandation
      technique ou autre document normatif, et celle d''étalon (en anglais « measurement
      standard »). Seule la deuxième signification relève du présent Vocabulaire.'
  - content: Le terme « étalon » est parfois utilisé pour désigner d'autres outils
      métrologiques, par exemple un étalon logiciel (voir l'ISO 5436-2). _________________________________________________________________________________________________________________________________________________________________________________________________________________________
  terms:
  - type: expression
    normative_status: preferred
    designation: étalon, m
