data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "*unité de mesure* obtenue en multipliant une unité de mesure donnée par
      un entier supérieur à un"
  examples:
  - content: Le kilomètre est un multiple décimal du mètre.
  - content: L'heure est un multiple non décimal de la seconde.
  id: 1.17-fra
  language_code: fra
  notes:
  - content: Les préfixes *SI* pour les multiples décimaux des *unités de base* et des
      *unités dérivées* du SI sont donnés à la note 5 de 1.16.
  - content: |
      Les préfixes SI représentent strictement des puissances de 10 et il
      convient de ne pas les utiliser pour des puissances de 2. Par exemple, il convient
      de ne pas utiliser 1 kilobit pour représenter stem:[1024] bits (stem:[2^{10}] bits), qui est
      1 kibibit.

      Les préfixes pour les multiples binaires sont:

      [cols="3", options="header,unnumbered",headerrows=2]
      |===
      .2+| Facteur 2+| Préfixe | Nom | Symbole
      | stem:[(2^{10})^8] | yobi | stem:["unitsml(Yi-)"]
      | stem:[(2^{10})^7] | zébi | stem:["unitsml(Zi-)"]
      | stem:[(2^{10})^6] | exbi | stem:["unitsml(Ei-)"]
      | stem:[(2^{10})^5] | pébi | stem:["unitsml(Pi-)"]
      | stem:[(2^{10})^4] | tébi | stem:["unitsml(Ti-)"]
      | stem:[(2^{10})^3] | gibi | stem:["unitsml(Gi-)"]
      | stem:[(2^{10})^2] | mébi | stem:["unitsml(Mi-)"]
      | stem:[(2^{10})^1] | kibi | stem:["unitsml(Ki-)"]
      |===

      _Source_: CEI 80000-13.
  terms:
  - type: expression
    normative_status: preferred
    designation: multiple d'une unité
