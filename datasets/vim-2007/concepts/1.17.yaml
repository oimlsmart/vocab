data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: '*measurement unit* obtained by multiplying a given measurement unit by
      an integer greater than one'
  examples:
  - content: The kilometre is a decimal multiple of the metre.
  - content: The hour is a non-decimal multiple of the second.
  id: 1.17-eng
  language_code: eng
  notes:
  - content: '*SI* prefixes for decimal multiples of SI *base units* and SI *derived units*
      are given in note 5 of 1.16.'
  - content: |
      SI prefixes refer strictly to powers of 10, and should not be used for
      powers of 2. For example, 1 kilobit should not be used to represent 1024 bits
      (stem:[2^{10} "unitsml(bits)"]), which is a kibbibit.

      Prefixes for binary multiples are:

      [cols="3", options="header,unnumbered",headerrows=2]
      |===
      .2+| Factor 2+| Prefix | Name | Symbol
      | stem:[(2^{10})^8] | yobi | stem:["unitsml(Yi-)"]
      | stem:[(2^{10})^7] | zebi | stem:["unitsml(Zi-)"]
      | stem:[(2^{10})^6] | exbi | stem:["unitsml(Ei-)"]
      | stem:[(2^{10})^5] | pebi | stem:["unitsml(Pi-)"]
      | stem:[(2^{10})^4] | tebi | stem:["unitsml(Ti-)"]
      | stem:[(2^{10})^3] | gibi | stem:["unitsml(Gi-)"]
      | stem:[(2^{10})^2] | mebi | stem:["unitsml(Mi-)"]
      | stem:[(2^{10})^1] | kibi | stem:["unitsml(Ki-)"]
      |===

      _Source_: IEC 80000-13.
  terms:
  - type: expression
    normative_status: preferred
    designation: multiple of a unit
date_accepted: '2007-01-01T00:00:00+00:00'
entry_status: valid
