data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: '*system of units* based on the *International System of Quantities*, their
      names and symbols, including a series of prefixes and their names and symbols,
      together with rules for their use, adopted by the General Conference on Weights
      and Measures (CGPM)'
  examples: []
  id: 1.16-eng
  language_code: eng
  notes:
  - content: |
        The SI is founded on the seven *base quantities* of the *ISQ* and the names
        and symbols of the corresponding *base units* that are contained in the following
        table.

        [cols="3", options="header,unnumbered",headerrows=2]
        |===
        | Base quantity 2+| Base unit
        | Name                      | Name     | Symbol
        | length                    | metre    | stem:["unitsml(m)"]
        | mass                      | kilogram | stem:["unitsml(kg)"]
        | time                      | second   | stem:["unitsml(s)"]
        | electric current          | ampere   | stem:["unitsml(A)"]
        | thermodynamic temperature | kelvin   | stem:["unitsml(K)"]
        | amount of substance       | mole     | stem:["unitsml(mol)"]
        | luminous intensity        | candela  | stem:["unitsml(cd)"]
        |===


  - content: The base units and the *coherent derived units* of the SI form a coherent
      set, designated the "set of coherent SI units".
  - content: For a full description and explanation of the International System of
      Units, see the current edition of the SI brochure published by the Bureau International
      des Poids et Mesures (BIPM) and available on the BIPM web site.
  - content: In *quantity calculus*, the quantity 'number of entities' is often considered
      to be a base quantity, with the base unit one, symbol 1.
  - content: |
        The SI prefixes for *multiples of units* and *submultiples of units* are:

        [cols="3", options="header,unnumbered",headerrows=2]
        |===
        .2+| Factor 2+| Prefix | Name | Symbol
        | stem:[10^{24}]  | yotta | stem:["unitsml(Y-)"]
        | stem:[10^{21}]  | zetta | stem:["unitsml(Z-)"]
        | stem:[10^{18}]  | exa   | stem:["unitsml(E-)"]
        | stem:[10^{15}]  | peta  | stem:["unitsml(P-)"]
        | stem:[10^{12}]  | tera  | stem:["unitsml(T-)"]
        | stem:[10^{9}]   | giga  | stem:["unitsml(G-)"]
        | stem:[10^{6}]   | mega  | stem:["unitsml(M-)"]
        | stem:[10^{3}]   | kilo  | stem:["unitsml(k-)"]
        | stem:[10^{2}]   | hecto | stem:["unitsml(h-)"]
        | stem:[10^{1}]   | deca  | stem:["unitsml(da-)"]
        | stem:[10^{-1}]  | deci  | stem:["unitsml(d-)"]
        | stem:[10^{-2}]  | centi | stem:["unitsml(c-)"]
        | stem:[10^{-3}]  | milli | stem:["unitsml(m-)"]
        | stem:[10^{-6}]  | micro | stem:["unitsml(u-)"]
        | stem:[10^{-9}]  | nano  | stem:["unitsml(n-)"]
        | stem:[10^{-12}] | pico  | stem:["unitsml(p-)"]
        | stem:[10^{-15}] | femto | stem:["unitsml(f-)"]
        | stem:[10^{-18}] | atto  | stem:["unitsml(a-)"]
        | stem:[10^{-21}] | zepto | stem:["unitsml(z-)"]
        | stem:[10^{-24}] | yocto | stem:["unitsml(y-)"]
        |===
    normative_status: preferred
    designation: International System of Units
  - type: expression
    normative_status: admitted
    designation: SI
date_accepted: '2007-01-01T00:00:00+00:00'
