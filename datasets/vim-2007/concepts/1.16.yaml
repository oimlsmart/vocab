data:
  dates:
  - date: '2007-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "*système d'unités* fondé sur le *Système international de grandeurs*, comportant
      les noms et symboles des unités, une série de préfixes avec leurs noms et symboles,
      ainsi que des règles pour leur emploi, adopté par la Conférence générale des
      poids et mesures (CGPM)"
  examples: []
  id: 1.16-fra
  language_code: fra
  notes:
  - content: Le SI est fondé sur les sept *grandeurs de base* de l'ISQ. Les noms et
      les symboles des unités de base sont donnés dans le tableau suivant.

      [cols="3", options="header,unnumbered",headerrows=2]
      |===
      | Grandeur de base 2+| Unité de base
      | Nom                         | Nom        | Symbole
      | longueur                    | mètre      | stem:["unitsml(m)"]
      | masse                       | kilogramme | stem:["unitsml(kg)"]
      | temps                       | seconde    | stem:["unitsml(s)"]
      | courant électrique          | ampère     | stem:["unitsml(A)"]
      | température thermodynamique | kelvin     | stem:["unitsml(K)"]
      | quantité de matière         | mole       | stem:["unitsml(mol)"]
      | intensité lumineuse         | candela    | stem:["unitsml(cd)"]
      |===

  - content: Les unités de base et les *unités dérivées cohérentes* du SI forment un
      ensemble cohérent, appelé « ensemble des unités SI cohérentes ».
  - content: Pour une description et une explication complètes du Système international
      d'unités, voir la dernière édition de la brochure du SI publiée par le Bureau
      international des poids et mesures (BIPM) et disponible sur le site internet
      du BIPM.
  - content: En *algèbre des grandeurs*, la grandeur « nombre d'entités » est souvent
      considérée comme une grandeur de base, avec l'unité de base un, symbole 1.
  - content: |
        Les préfixes SI pour les multiples et sous-multiples des unités sont :

        [cols="3", options="header,unnumbered",headerrows=2]
        |===
        | Facteur 2+| Préfixe | Nom | Symbole
        | stem:[10^{24}]  | yotta | stem:["unitsml(Y-)"]
        | stem:[10^{21}]  | zetta | stem:["unitsml(Z-)"]
        | stem:[10^{18}]  | exa   | stem:["unitsml(E-)"]
        | stem:[10^{15}]  | péta  | stem:["unitsml(P-)"]
        | stem:[10^{12}]  | téra  | stem:["unitsml(T-)"]
        | stem:[10^{9}]   | giga  | stem:["unitsml(G-)"]
        | stem:[10^{6}]   | méga  | stem:["unitsml(M-)"]
        | stem:[10^{3}]   | kilo  | stem:["unitsml(k-)"]
        | stem:[10^{2}]   | hecto | stem:["unitsml(h-)"]
        | stem:[10^{1}]   | déca  | stem:["unitsml(da-)"]
        | stem:[10^{-1}]  | déci  | stem:["unitsml(d-)"]
        | stem:[10^{-2}]  | centi | stem:["unitsml(c-)"]
        | stem:[10^{-3}]  | milli | stem:["unitsml(m-)"]
        | stem:[10^{-6}]  | micro | stem:["unitsml(u-)"]
        | stem:[10^{-9}]  | nano  | stem:["unitsml(n-)"]
        | stem:[10^{-12}] | pico  | stem:["unitsml(p-)"]
        | stem:[10^{-15}] | femto | stem:["unitsml(f-)"]
        | stem:[10^{-18}] | atto  | stem:["unitsml(a-)"]
        | stem:[10^{-21}] | zepto | stem:["unitsml(z-)"]
        | stem:[10^{-24}] | yocto | stem:["unitsml(y-)"]
        |===
