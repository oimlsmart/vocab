data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Appareil mesureur qui détermine la valeur d'une grandeur en faisant la
      somme de valeurs mesurées partielles. Si un appareil mesureur totalisateur sert
      à distribuer des quantités de matière ou d'énergie qui sont constantes pendant
      une même série d'opérations, et qui sont toujours multiples d'une quantité définie,
      il est appelé « distributeur discontinu ».
  examples:
  - content: distributeur discontinu de carburant à une ou deux capacités mesureuses.
  id: 6.1.2.4-fra
  notes:
  - content: Le dispositif indicateur d'un appareil mesureur totalisateur peut comporter
      un organe permettant de le remettre au zéro (7.7.).
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Appareil mesureur totalisateur
