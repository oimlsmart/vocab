data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Équation dans laquelle les symboles littéraux représentent des valeurs
      numériques correspondant aux unités de mesure utilisées.
  examples:
  - content: 1. $ v_{m / s}=\frac{\pi}{60} d_{m} \omega_{t / m} $ est une équation
      entre valeurs numériques pour la vitesse linéaire $ v $ d'un point situé sur
      un cercle de diamètre $ d $ tournant autour de son centre avec la vitesse angulaire
      $ \omega $ valable pour les unités suivantes $ v $ en mètre par seconde, $ d
      $ en mètre, $ \omega $ en tour par minute.
  - content: 2. On peut présenter l'équation cl-dessus aussi sous la forme $ \{v\}
      = \frac{\pi}{60} \{d\} \{w\} $ ou { $v$ } est la valeur numérique de $v$ pour
      l'unité m/s { $d$ } est la valeur numérique de $d$ pour l'unité m { $ \omega
      $ } est la valeur numérique de $ \omega $ pour l'unité t/min
  id: 4.4.1-fra
  notes:
  - content: 1. L'équation entre valeurs numériques, pour les unités d'un système
      cohérent d'unités de mesure, peut être considérée aussi comme une équation entre
      grandeurs.
  - content: 2. Pour éllminor des malentendus, il serait désirable d'utiliser dans
      les équations entre valeurs numériques des symboles différents de ceux utilisés
      dans les équations entre grandeurs.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Équation entre valeurs numériques
