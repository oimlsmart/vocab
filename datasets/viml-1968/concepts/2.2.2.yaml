data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Approbation, pour une durée limitée, d'un modèle d'instrument de mesurage
      afin de permettre des essais approfondis de longue durée sur un assez grand
      nombre d'instruments conformes à ce modèle, mis en service dans les conditions
      usuelles d'emploi.
  examples: []
  id: 2.2.2-fra
  notes:
  - content: La décision d'approbation peut éventuellement fixer lo nombre d'instruments
      dont la construction est autorisée, les lleux d'installation, les accessoires
      de vérification dont ces instruments doivent être munis.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Approbation d'un modèle à titre provisoire
