data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Qualité qui caractérise l'aptitude d'un instrument de mesurage à donner,
      pour une même valeur de la grandeur mesurée, des indications concordant entre
      elles, les erreurs systématiques des valeurs variables n'étant pas prises en
      considération.
  examples: []
  id: 9.6-fra
  notes:
  - content: D'après cette définition, la fidélité caractérise l'aptitude d'un instrument
      à donner des indications qui ne sont pas entachées d'erreurs fortuites.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Fidélité d'un instrument de mesurage
