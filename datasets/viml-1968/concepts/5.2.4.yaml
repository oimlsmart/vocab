data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Méthode de mesurage basée sur les mesurages des grandeurs de base entrant
      dans la définition de la grandeur.
  examples:
  - content: mesurage de la pression à l'alde d'un manomètre à piston basé sur la
      définition de la pression comme étant le rapport entre la force et la surface
      sur laquelle cette force agit,
  - content: mesurage de l'accélération de la pesanteur basé sur le chemin parcouru
      pendant un certain temps par un corps qui tombe en chute libre,
  - content: 'mesurage de la pression à l''aide d''un manomètre à tube en U avec lequel
      la pression se déduit tout d''abord de mesurages de masse volumique, d''accélération
      de la pesanteur et de longueur, ramenés à leur tour à des mesurages de grandeurs
      de base : longueur, masse, temps.'
  id: 5.2.4-fra
  notes:
  - content: Cette méthode est parfois appelée « méthode de mesurage absolu ».
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Méthode de mesurage fondamental
