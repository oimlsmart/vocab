    type: accepted
  definition:
  - content: Unité de mesure d'une grandeur dérivée.
  examples:
  - content: 'Dans le Système International d''Unités (SI) :'
  - content: m . s⁻¹ = unité de vitesse linéaire,
  - content: 1 Wb = 1 m² . kg . s⁻² . A⁻¹ = unité de flux magnétique, mais cette unité
      peut aussi être exprimée par deux autres unités dérivées C. Ω par exemple.
  id: 4.6.4-fra
  notes:
  - content: 'Pour quelques unités dérivées, il existe des noms et des symboles spéciaux,
      par exemple : newton (N), joule (J), volt (V), comme unités SI de force, d''énergie,
      de potentiel électrique'
  - content: Souvent il sera avantageux de ne pas exprimer les unités dérivées au
      moyen des unités de base mals au moyen d'autres unités dérivées.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Unité de mesure dérivée
