data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Méthode de mesurage par comparaison où toute la valeur de la grandeur
      à mesurer est comparée à une valeur connue de la même grandeur reproduite par
      une mesure matérielisée qui entre directement dans le mesurage.
  examples:
  - content: mesurage d'une longueur à l'aide d'une règle graduée, mesurage du volume
      d'un liquide au moyen d'une mesure matériallisée de capacité, mesurage d'une
      masse au moyen d'une balance équilibrant la masse à mesurer du corps considéré
      par la masse correspondante d'une somme de poids marqués.
  id: 5.2.5.1-fra
