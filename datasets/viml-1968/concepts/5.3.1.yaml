data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Facteur par lequel on doit multiplier l'indication de l'instrument pour
      obtenir le résultat du mesurage.
  examples: []
  id: 5.3.1-fra
  notes:
  - content: La constante d'un instrument qui indique directement la valeur de la
      grandeur mesurée est égale à 1.
  - content: Lorsque l'échelle d'un instrument n'indique pas une unité déterminée
      ou bien si elle indique des unités de mesure autres que celle relative à la
      grandeur mesurée, la constante est un nombre concret, lorsque l'échelle est
      exprimée en unités de la grandeur mesurée, la constante est un nombre abstrait.
  - content: Les instruments à étendues multiples mais à échelle unique ont plusieurs
      constantes qui correspondent, par exemple, aux différentes positions d'un commutateur.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Constante d'un instrument de mesurage
