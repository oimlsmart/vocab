data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Réalisation définitive d'un instrument de mesurage dont tous les éléments
      influant sur les qualités métrologiques sont convenablement définis.
  examples: []
  id: 7.1.2.1-fra
  notes:
  - content: Les instruments d'un même modèle doivent être conformes entre eux en
      ce qui concerne l'exécution (dimension, construction, matériaux, technologie)
      dans les limites de tolérances fixées.
  - content: Cependant, des instruments d'un même modèle peuvent avoir des étendues
      de mesurage différentes.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Modèle d'un instrument de mesurage
