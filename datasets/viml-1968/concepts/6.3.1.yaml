data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Ensemble d'installations de mesurage destinées à exécuter les mesurages
      de grandeurs d'une ou plusieurs espèces.
  examples:
  - content: 'L''équipement de mesurage d''un bureau de vérification comprend : des
      étalons de longueur, de capacité, de masse — des instruments de pesage — des
      socles supports — des réservoirs d''eau, etc...'
  id: 6.3.1-fra
  notes:
  - content: Alors qu'une « installation de mesurage » est constituée par les moyens
      nécessaires à un mesurage défini,
  - content: "« l'équipement de mesurage » est un ensemble d'instruments ou d'installations
      qui permettent d'effectuer des mesurages divers."
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Équipement de mesurage
