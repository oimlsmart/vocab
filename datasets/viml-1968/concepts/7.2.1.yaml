  definition:
  - content: Représentation simplifiée des éléments essentiels et de leurs liaisons
      fonctionnelles d'un instrument de mesurage ou d'une installation de mesurage.
  examples:
  - content: Schéma de principe du thermomètre thermoélectrique correspondant au schéma
      de structure présenté au point 7.2.
  - content: '1 : thermocouple,'
  - content: '2 : fils de junction,'
  - content: '5 : ressort spirale du millivoltmètre,'
  - content: '3 : cadre du galvanomètre,'
  - content: '6 : aigulle,'
  - content: '4 : aimant constant du millivoltmètre,'
  - content: "$\\alpha$ : anglo de la rotation de l'aigulle."
