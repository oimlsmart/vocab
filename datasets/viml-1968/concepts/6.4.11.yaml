  definition:
  - content: 'Ancienne dénomination des Étalons internationaux ou nationaux de longueur
      et de masse dans le Système métrique décimal d''unités de mesure : Prototype
      international du mètre — Prototype international du kilogramme.'
  examples: []
  id: 6.4.11-fra
  notes:
  - content: Le terme « prototype », dans le sens ci-dessus, a uniquement une valeur
      historique et ne devrait pas être utilisé dans les documents officiels concernant
      les étalons contemporains.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Prototype international / national
