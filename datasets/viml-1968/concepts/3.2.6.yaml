  definition:
  - content: Ensemble des marques dont la destruction ou la détérioration suggère
      que certains des organes composant un instrument de mesurage ont pu être enlevés,
      déplacés, modifiés ou altérés. Ces marques sont aussi appelées marques de scellement.
