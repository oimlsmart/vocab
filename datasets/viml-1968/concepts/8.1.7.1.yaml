data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: 'Indice caractérisant la dispersion des résultats obtenus dans une série
      de n mesurages de la même valeur d''une grandeur mesurée, donné par la formule
      : $$ s = \sqrt {\frac {\sum_ {i = 1} ^ {n} \left(x _ {i} - \bar {x}\right) ^
      {3}}{n - 1}} $$ $x$ étant le $i^{\mathrm{ome}}$ résultat de mesurage $(i = 1,
      2, 3, \dots n)$ et $\bar{x}$ la moyenne arithmétique des $n$ résultats considérés.'
  examples: []
  id: 8.1.7.1-fra
  notes:
  - content: 1. La valeur s calculée d'après cette définition est en fait une estimation
      de l'écart moyen quadratique apparent car, d'une part on calcule s d'après des
      données expérimentales et d'autre part les différences $(x_i - \overline{x})$
      représentent les erreurs absolues apparentes.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Écart moyen quadratique d'un seul mesurage dans une série de mesurages
