data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Résultat d'un mesurage avant corrections (8.1.1.1) et avant la détermination
      de l'incertitude de mesurage (8.1.8.3 ou 8.1.8.4).
  examples:
  - content: '1. On a mesuré à l''aide d''un pied à coulisse le diamètre d''un cylindre
      ; l''indication lue sur l''instrument : 14,7 mm représente le résultat brut
      du mesurage.'
  - content: '2. Si dans une série de 10 mesurages du même cylindre on a obtenu en
      mm les valeurs : 14,9 ; 14,6 ; 14,8 ; 14,6 ; 14,9 ; 14,7 ; 14,7 ; 14,8 ; 14,9
      ; 14,8, le résultat brut de cette série de mesurages sera : $$ d = \frac {1
      4 , 9 + 1 4 , 6 + \dots + 1 4 , 8}{1 0} = 1 4, 7 7 \mathrm {m m} \approx 1 4,
      8 \mathrm {m m} $$'
  id: 5.4.1-fra
  notes:
  - content: Lors d'une série de mesurages d'une même grandeur, le résultat brut du
      mesurage est la moyenne arithmétique des résultats bruts des mesurages particuliers.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Résultat brut d'un mesurage
