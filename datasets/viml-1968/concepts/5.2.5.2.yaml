    type: accepted
  definition:
  - content: Méthode de mesurage par comparaison, basée sur la comparaison de la grandeur
      à mesurer à une grandeur de même espèce de valeur connue peu différente de celle
      de la grandeur à mesurer, et le mesurage de la différence des valeurs de ces
      deux grandeurs.
  examples:
  - content: comparaison de deux longueurs au moyen d'un comparateur,
  - content: comparaison de deux tensions électriques au moyen d'un voltmètre différentiel.
