    type: accepted
  definition:
  - content: Discordance entre le résultat du mesurage (5.4.) et la valeur de la grandeur
      mesurée.
  examples: []
  id: 8.1-fra
  notes:
  - content: '1. La valeur de la grandeur mesurée est une valeur de comparaison égale
      suivant les cas à : la valeur vraie de la grandeur (généralement inconnue),
      la valeur conventionnellement vrale, la moyenne arithmétique des résultats d''une
      série de mesurages.'
  - content: 2. La discordance peut être exprime comme la différence entre ces deux
      valeurs (8.1.5 — Erreur absolue) ou bien comme le quotient de cette différence
      par la valeur de la grandeur mesurée (8.1.6 — Erreur relative).
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Erreur de mesurage
