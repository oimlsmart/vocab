  definition:
  - content: Ensemble d'opérations ayant pour but l'apposition sur un instrument de
      mesurage de marques constatant que cet instrument répond aux prescriptions sur
      la vérification. Certaines de ces marques peuvent protéger certains éléments
      de l'instrument qui ont une influence sur ses propriétés métrologiques contre
      des modifications ou altéra-tions effectuées après la vérification.
