  definition:
  - content: Partie de la métrologie qui traite des problèmes communs à toutes les
      questions métrologiques, indépendamment de la grandeur mesurée.
  examples:
  - content: Les problèmes généraux théoriques et pratiques sur les unités de mesure
      (la structure d'un système d'unités, le changement des unités de mesure dans
      les formules par ex.), les problèmes des erreurs de mesure, les problèmes des
      qualités métrologiques des instruments de mesure valables pour n'importe quelle
      grandeur.
