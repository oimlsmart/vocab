data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: La plus petite variation de la grandeur mesurée qui provoque une variation
      perceptible de l'indication de l'instrument de mesurage (pour un opérateur moyen
      et dans les conditions déterminées d'emploi de l'instrument).
  examples:
  - content: Si une charge de 80 mg ne provoque pas la déplacement de l'alguille d'une
      balance, et si l'on constate qu'une charge de 90 mg provoque un déplacement,
      le seuil de mobillté est 90 mg.
  id: 9.8.3-fra
  notes: []
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Seuil de mobilité
