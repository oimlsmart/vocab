data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Élément d'un dispositif indicateur portant la ou les échelles.
  examples: []
  id: 7.5-fra
  notes:
  - content: 1. Le cadran peut être plan, cylindrique ou tronconique,
  - content: s'il est cylindrique ou tronconique, on l'appelle « tambour gradué »,
  - content: dans certains instruments optiques, le cadran plan circulaire est souvent
      appelé « limbe ».
  - content: 2. Dans les dispositifs indicateurs numériques, les rouleaux ou disques
      chiffrés remplissent la fonction d'échelle.
  - content: 3. L'échelle peut être matériellement tracée ou projetée optiquement.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Cadran
  - type: expression
    normative_status: admitted
    designation: Limbe
  - type: expression
    normative_status: admitted
    designation: Tambour gradué
