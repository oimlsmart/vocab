  definition:
  - content: Élément d'un dispositif indicateur portant la ou les échelles.
  examples: []
  id: 7.5-fra
  notes:
  - content: Le cadran peut être plan, cylindrique ou tronconique, s'il est cylindrique
      ou tronconique, on l'appelle « tambour gradué », dans certains instruments optiques,
      le cadran plan circulaire est souvent appelé « limbe ».
  - content: Dans les dispositifs indicateurs numériques, les rouleaux ou disques
      chiffrés remplissent la fonction d'échelle.
  - content: L'échelle peut être matériellement tracée ou projetée optiquement.
  sources: []
