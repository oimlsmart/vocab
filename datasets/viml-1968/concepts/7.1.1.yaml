  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Catégorie d'instruments de mesurage fondés sur le même principe de mesurage
      (5.1.1) Les différentes réalisations pratiques mettant en ceuvre un même principe
      constituent des variantes du système fondé sur ce principe.
  examples: []
  id: 7.1.1-fra
  notes:
  - content: '1. Le système de l''instrument de mesurage fixe le principe de mesurage
      appliqué, sans entrer dans les moyens de réalisation : par exemple, le thermomètre
      thermoélectrique dans lequel la force thermoélectrique est déterminée soit à
      l''aide d''un millivoltmètre, soit à l''aide d''un compensateur électrique,
      est un instrument du système thermoélectrique. Les deux réalisations possibles
      indiquées ci-dessus constituent deux variantes de ce système. De même, les balances
      à bras égaux et les bascules décimales, qui appartiennent au système des instruments
      de pesage à leviers, correspondent à deux variantes de ce système.'
  - content: '2. L''adjonction de dispositifs supplémentaires qui influent sur les
      propriétés métrologiques de l''instrument : dispositifs de téléindication, d''enregistrement,
      de conservation et de reproduction des valeurs mesurées ne change pas le système
      de l''instrument de mesurage mais fixe une de ses variantes.'
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Système d'un instrument de mesurage
