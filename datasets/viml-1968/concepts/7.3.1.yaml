  definition:
  - content: Élément d'un appareil mesureur servant à la prise d'informations relatives
      à la grandeur à mesurer.
  examples:
  - content: thermocouple d'un thermomètre, organe déprimogène d'un débitmètre,
  - content: tube Bourdon d'un manomètre, flotteur d'un apparcil mesureur de niveau.
