  definition:
  - content: Document certifiant que la vérification d'un instrument de mesurage a
      été effectuée.
  examples: []
  id: 3.3.1-fra
  notes:
  - content: Dans le certificat de vérification peuvent être rappolées les prescriptions
      et les instructions fixant les conditions de cette vérification. Peuvent aussi
      y être indiqués les résultats obtenus et la durée de validité du document ainsi
      établi.
