data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Méthode de mesurage par comparaison directe dans laquelle la valeur de
      la grandeur mesurée est d'abord équilibrée par une première valeur connue A
      de la même grandeur, puis la valeur de la grandeur mesurée est mise à la place
      de cette valeur connue et de nouveau équilibrée par une autre valeur connue
      B. Si la position de l'organe indiquant l'équilibre est la même dans les deux
      cas, la valeur de la grandeur mesurée est égale à $ \sqrt{A.B}. $
  examples:
  - content: Détermination d'une masse, au moyen d'une balance et de poids marqués,
      par la méthode de " double pesée de Gauss ".
