data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Erreur qui, lors de plusieurs mesurages, effectués dans les mêmes conditions,
      de la même valeur d'une certaine grandeur reste constante en valeur absolue
      et en signe ou qui varie selon une loi définie quand les conditions changent.
  examples:
  - content: 'erreurs systématiques constantes :'
  - content: erreur qul résultat du pesage à l'alde d'un poids dont la masse est supposée
      égale à sa masse nominale de 1 kg tandis que sa masse vraie conventionnelle
      est de 1,010 kg,
  - content: erreur qui résultat du fait que l'on se sert, à une température amblante
      de $ 2 0^{\circ} \mathrm{C} $ , d'une règle callbrée à $ 0^{\circ} \mathrm{C}
      $ sans Introduire de correction convenable,
  - content: erreur qui résultat de ce que, dans le circuit d'un thermomètre thermoélectrique,
      se produit des forces thermoélectriques parasites.
  - content: 'Erreur systématique variable :'
  - content: erreur d'indication d'un instrument de mesurage occasionné, lors de plusieurs
      mesurages consécutifs de la même valeur, par une variation systématique de la
      température.
  id: 8.1.1-fra
  notes:
  - content: 1. Les causes des erreurs systématiques peuvent être connues ou inconnues.
  - content: 2. Une erreur systématique, que l'on peut déterminer par le calcul ou
      par l'expérience doit être éliminé par une correction appropriée.
  - content: 3. Les erreurs systématiques que l'on ne peut pas déterminer, mais dont
      la valeur est supposée suffisamment petite par rapport à l'imprécision du mesurage,
      sont traitées comme des erreurs fortultes dans le calcul de l'incertitude de
      mesurage.
  - content: 4. Les erreurs systématiques que l'on ne peut pas déterminer, mais dont
      la valeur est supposée suffisamment grande par rapport à l'imprécision du mesurage,
      dolvent être évaluées approximativement et prises en considération dans le calcul
      de l'imprécision du mesurage.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Erreur systématique
