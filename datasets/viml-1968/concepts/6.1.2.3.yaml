data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Apparcil mesureur intégrateur qui indique progressivement les valeurs
      de la grandeur mesuree accumulées pendant un certain temps.
  examples:
  - content: Un intégrimètre, qui additionne les valeurs successives des aires partlelles
      d'un graphique lorsqu'on suit par le traçoir la courbe qui délimite cette aire,
      représente un compteur continu. Cependant, le planimètre à contournement qui
      donne la valeur de l'aire d'une courbe fermée, après avoir entouré totalement
      cette courbe, est un intégrateur mais pas un compteur.
  id: 6.1.2.3-fra
  notes:
  - content: Dans le dispositif indicateur d'un compteur continu, le premier élément
      mobile (disque, rouleau chiffré, etc) quil a la plus petite valeur d'échelon
      se déplace ordinairement de façon continue au cours du mesurage.
  - content: 'Cependant, cette continulté de mouvement n''existe pas toujours pour
      les dispositifs indicateurs de certains autres appareils mesureurs intégrateurs.
      Exemples : compteur de chaleur à fonctionnement cyclique — moulinet hydrométrique
      dont le dispositif indicateur est entrainé par des impulsions discontinues.'
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Compteur
