    type: accepted
  definition:
  - content: Qualité qui caractérise l'aptitude d'un instrument de mesurage à donner
      des indications égales à la valeur vraie de la grandeur mesurée, les erreurs
      de fidélité n'étant pas prises en considération.
  examples: []
  id: 9.5-fra
  notes:
  - content: D'après cette définition, la justesse caractérise l'aptitude d'un instrument
      à donner des indications qui ne solent pas entachées d'erreurs systématiques.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Justesse d'un instrument de mesurage
