  definition:
  - content: Unité de mesure qui n'appartient pas au système d'unités de mesure envisagé.
  examples:
  - content: La calorie, égale à 4,1868 joules, est une unité hors-système de la quantité
      de chaleur (travall) dans les systèmes d'unités de mesure basés sur le mètre,
      le kilogramme et la seconde.
