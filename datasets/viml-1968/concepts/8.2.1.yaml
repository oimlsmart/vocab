data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Différence $v_{\mathrm{n}}$ — $v_{\mathrm{e}}$ entre la valeur nominale
      $v_{\mathrm{n}}$ et la valeur conventionnelle vrale $v_{\mathrm{e}}$ reproduite
      par la mesure matérielisée.
  examples:
  - content: 'Dans l''exemple relatif au point 8.2.5 : $ e_{i} = v_{n} - v_{c} = 1\,000\,\mathrm{ml}
      - 1\,005\,\mathrm{ml} = -5\,\mathrm{ml} $ la dénomination est done trop petite
      par rapport à la valeur vraie de la mesure.'
  id: 8.2.1-fra
  notes:
  - content: Voir 5.3. remarque 1.
  - content: Si aucune confusion n'est à cralindre, on utilise l'expression simplifiée
      • erreur d'une mesure matériallisée •
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Erreur d'une mesure matérialisée
