data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Dénomination des grandeurs qui, dans un système de grandeurs, sont admises
      comme étant indépendantes les unes des autres et au moyen desquelles les grandeurs
      qui en dérivent dans ce système peuvent être exprimées par des équations de
      définition.
  examples:
  - content: 'Dans le domaine des grandeurs mécaniques, on accepte généralement comme
      grandeurs de base: la longueur, la masse et le temps et on y ajoute en plus
      la température pour le domaine des grandeurs thermiques.'
  id: 4.3.1-fra
  notes:
  - content: Cette définition ne préjuge pas le nombre des grandeurs que l'on peut
      admettre comme indépendantes. Elle ne répond pas non plus à la question de savoir
      si l'on peut admettre une grandeur donnée comme grandeur de base lorsque certaines
      autres grandeurs ont déjà été choisies comme telles car, si on a déjà accepté
      par exemple les grandeurs de base longueur et temps, il n'est plus possible
      d'accepter la vitesse linéaire comme grandeur independante.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Grandeur de base
