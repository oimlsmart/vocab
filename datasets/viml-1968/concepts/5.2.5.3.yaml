    type: accepted
  definition:
  - content: Méthode de mesurage par comparaison dans laquelle la valeur de la grandeur
      mesurée est déterminée par la déviation d'un dispositif indicateur.
  examples:
  - content: mesurage de la pression au moyen d'un manomètre à aiguille,
  - content: mesurage d'une tension électrique au moyen d'un voltmètre à spot lumineux,
  - content: mesurage d'une masse au moyen d'une balance à équilibre automatique.
