data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Instrument qui sert à transformer, suivant une loi déterminée, la grandeur
      mesurée (ou bien une grandeur déjà transformée de la grandeur mesurée) en une
      autre grandeur ou en une autre valeur de la même grandeur, avec une précision
      spécifiée et qui constitue un ensemble pouvant être utilisé séparément.
  examples:
  - content: thermocouple (avec tube protecteur, tête et autres éléments supplémentaires),
      transformateur de mesure, shunt interchangeable pour un ampèremètre.
  id: 6.1.7-fra
  notes:
  - content: On utilise aussi la dénomination « traducteur ».
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Transducteur de mesurage
