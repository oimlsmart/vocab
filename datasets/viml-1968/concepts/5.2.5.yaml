data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Méthode de mesurage basée sur la comparaison de la valeur d'une grandeur
      à mesurer à une valeur connue de la même grandeur ou à une valeur connue d'une
      autre grandeur fonction de la grandeur à mesurer.
  examples: []
  id: 5.2.5-fra
  notes:
  - content: Un mesurage par comparaison est donc, d'après la définition, aussi bien
      le mesurage du volume d'un liquide au moyen d'une mesure matérielisée de capacité
      que le mesurage d'une pression au moyen d'un manomètre à ressort dans lequel
      la pression se transforme en une déformation d'un élément elastique.
  - content: Cependant, on considère parfois que c'est seulement dans le cas où la
      comparaison s'effectue entre deux grandeurs de même nature que la méthode est
      dite « par comparaison ».
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Méthode de mesurage par comparaison
