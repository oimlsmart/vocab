    type: accepted
  definition:
  - content: 'Échelle numérique dont le premier chiffre à droite, c''est-à-dire celui
      qui appartient à l''échelle qui a la plus petite valeur d''échelon, se déplace
      d''une manière continue et permet la lecture à une fraction de l''intervalle
      entre deux nombres consécutifs. Généralement, l''interpolation d''une indication
      semi-numérique s''effectue au moyen d''une échelle supplémentaire à traits.
      Exemple : Indication du compteur 27832,4'
