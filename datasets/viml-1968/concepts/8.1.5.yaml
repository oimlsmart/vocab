  definition:
  - content: 'Différence algébrique entre le résultat du mesurage et la valeur de
      comparaison : erreur absolue = résultat du mesurage — valeur de comparaison.
      Cette valeur de comparaison peut être la valeur vraie, (4.2.1.) la valeur conventionnellement
      vraie (4.2.1.1.), ou la moyenne arithmétique des résultats d''une série de mesurages.'
