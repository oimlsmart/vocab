  definition:
  - content: Ensemble des organes d'un appareil mesureur destinés à indiquer les résultats
      de mesurage.
  examples:
  - content: Dans les appareils mesureurs munis d'un dispositif indicateur simple,
      ce dispositif se compose généralement d'une échelle et d'un index ; dans les
      compteurs, le dispositif indicateur (ou blon une partie de celui-ci) est généralement
      constitué par un totalisateur.
