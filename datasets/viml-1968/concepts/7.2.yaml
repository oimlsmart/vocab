data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Présentation symbolique de la chaîne de mesurage de l'instrument avec
      indication des grandeurs transformées dans cet instrument.
  examples:
  - content: 'Schéma de structure du thermomètre thermoélectrique (thermocouple).
      $T$ : température, 1 : thermocouple, $E$ : force électromotrice — $I$ : intensité
      du courant, II : élément transducteur E, M : couple de rotation, III : système
      magnéto-électrique du millivoltmètre $\alpha$ : angle de la rotation de l''alguille,
      IV : ressort spirale du millivoltmètre'
  id: 7.2-fra
  notes:
  - content: Les éléments transducteurs sont en général représentés sous forme de
      rectangles. A côté des lignes de laison sont placés les symboles des grandeurs
      qui sortent de l'un des éléments transducteurs et entrent dans le solvant.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Schéma de structure
