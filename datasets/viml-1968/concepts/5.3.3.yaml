data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Valeur totale de la grandeur reproduite par la mesure matérialisée et
      qui est indiquée sur cette mesure.
  examples:
  - content: Dans une éprouvette graduée de capacité totale 100 cm$^3$, le volume
      délimité par le trait de 100 cm$^3$ représente la valeur nominale totale de
      l'éprouvette.
  id: 5.3.3-fra
  notes:
  - content: Voir point 5.3 romarque 1.
  - content: Co terme s'applique aux mesures matériallisées à plusieurs valeurs distinctes
      ainsi qu'aux mesures matériallisées graduées (6.1.1 exemples b et c de la remarque
      4).
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Valeur nominale totale d'une mesure matérialisée
