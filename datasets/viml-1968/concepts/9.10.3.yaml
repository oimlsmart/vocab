  definition:
  - content: Valeurs extrêmes de l'erreur de précision (en plus et en moins) tolérées
      par les règlements.
  examples: []
  id: 9.10.3-fra
  notes:
  - content: L'instrument est dit • précis • (dans les limites tolérées) lorsque les
      erreurs maximales tolérées de précision ne sont pas dépassées.
  - content: L'expression « erreur maximale tolérée » sans définition plus détaillée,
      désigne l'erreur maximale tolérée de précision.
