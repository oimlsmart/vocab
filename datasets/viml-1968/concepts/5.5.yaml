data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Étroitesse de l'accord entre les résultats de mesurages successifs d'une
      même grandeur effectués avec la même méthode, par le même observateur, avec
      les mêmes instruments de mesurage, dans le même laboratoire, et à des intervalles
      de temps assez courts.
  examples: []
  id: 5.5-fra
  notes:
  - content: 'Le plus souvent, on estime la répétabillité des mesurages sur la base
      de l''incertitude de mesurage (8.1.8.3 et 8.1.8.4) : plus l''incertitude est
      petite, plus la répétabillité est rigoureuse.'
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Répétabilité des mesurages
