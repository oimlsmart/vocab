  definition:
  - content: Ensemble de moyens techniques destinés à exécuter une certaine tâche
      déterminée de mesurage et comprenant tous les instruments de mesurage et les
      dispositifs auxiliaires, réunis suivant un schéma défini, nécessaires pour appliquer
      une méthode donnée.
  examples:
  - content: installation pour mesurer la résistivité des matériaux électrotechniques,
  - content: installation de mesurage du volume des hydrocarbures par compteur continu.
