data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Ensemble qui comprend un groupe donné de grandeurs de base et de grandeurs
      dérivées correspondantes et qui embrasse tous les domaines de la science ou
      bien l'un de ses domaines seulement.
  examples:
  - content: 'système de grandeurs de la mécanique : $l, m, l$'
  - content: 'système de grandeurs de la mécanique et de l''électricité : $l, m, t,
      I$'
  id: 4.3-fra
  notes:
  - content: 1. Comme dénomination abrégée d'un système de grandeurs défini, on utilise
      les symboles de l'ensemble de ses grandeurs de base.
  - content: 2. A chaque système de grandeurs on peut rattacher un nombre quelconque
      de systèmes d'unités.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Système de grandeurs
