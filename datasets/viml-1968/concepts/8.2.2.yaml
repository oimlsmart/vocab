data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Différence $v_{1} - v_{0}$ entre la valeur indiquée par l'appareil mesureur
      $v_{i}$ et la valeur conventionnellement vraie de la grandeur mesuree $v_{c}$.
  examples:
  - content: L'indication d'un ampèremètre est $v_{i} = 40 \mathrm{~A}$ ; si la valeur
      conventionnellement vrale de l'intensité du courant mesuré est $v_{c} = 41 \mathrm{~A}$
      ; l'erreur d'indication de l'ampèremètre est $e_{i} = 40 \mathrm{~A} - 41 \mathrm{~A}
      = -1 \mathrm{~A}$.
  id: 8.2.2-fra
  notes:
  - content: Si aucune confusion n'est à craindre, on peut utiliser l'expression simplifiée
      « erreur d'un appareil mesureur ».
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Erreur d'un appareil mesureur
