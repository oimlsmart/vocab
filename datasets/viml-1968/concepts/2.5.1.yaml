  definition:
  - content: Ensemble d'opérations ayant pour but d'examiner et de certifier, par
      un organisme compétent, en général à des fins de témoignage, l'état dans lequel
      se trouve un instrument de mesurage et de déterminer ses qualités métrologiques
      du moment, entre autres, par rapport aux exigences des règlements qui le concernent.
