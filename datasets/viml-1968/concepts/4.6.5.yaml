data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Unité de mesure qui s'exprime au moyen des unités de base par une formule
      dont le coefficient numérique est égal à 1.
  examples:
  - content: 'Le newton est l''unité dérivée cohérente de la force dans le Système
      International (SI) : $ 1 \mathrm{~N}=1 \mathrm{~m}. \mathrm{kg}. $ $ s^{-2}
      $'
  id: 4.6.5-fra
  notes:
  - content: 1. L'expression « unité de mesure cohérente » est une abréviation d'une
      dénomination plus précise « unité de mesure dans un système cohérent » car,
      pour une unité isolée, la notion de cohérence n'a évidemment pas de sens.
  - content: 2. Cette notion s'applique seulement aux unités de mesure dérivées.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Unité de mesure cohérente
