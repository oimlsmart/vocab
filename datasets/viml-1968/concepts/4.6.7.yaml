    type: accepted
  definition:
  - content: Unité de mesure qui est un multiple [sous multiple] de l'unité et qui
      est formée selon le principe d'échelonnement admis pour l'unité correspondante.
  examples:
  - content: L'une des unités multiples décimales du mètre est le kilomètre (km) et
      l'une des unités sous-multiples décimales est le millimètre (mm). Une des unités
      multiples non décimales de la seconde est l'heure.
