    type: accepted
  definition:
  - content: Variation relative des indications de l'appareil mesureur ou des valeurs
      vraies de la mesure materialisée lorsque sa température varie de $ 1 \mathrm{~
      o C}. $
  examples:
  - content: Si le coefficient de température d'un manomètre à ressort (dont la température
      de référence est 20 $ ^{\circ} \mathrm{C} $) est par exemple 8 . $ 1 0^{-4}
      \mathrm{~ o C}^{-1} $ et si l'instrument est utilisé à la température 30 $ ^{\circ}
      \mathrm{C} $, son indication est affectée d'une erreur (dans ce cas en plus)
      de 0,8 %.
  id: 8.2.6.2.1-fra
