data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: 'Mode de reproduction de l''unité de mesure susceptible de remplacer
      un étalon primaire par : soit des valeurs fixes de certaines propriétés des
      corps, soit des constantes physiques.'
  examples:
  - content: méthode étalon de reproduction du mètre en longueurs d'ondes lumineuses,
  - content: méthode étalon de reproduction de l'échelle thermométrique à l'aide de
      six points fixes,
  - content: méthode étalon de reproduction de l'unité de temps et des fréquences
      basée sur l'observation astronomique,
  - content: méthode étalon de reproduction de l'unité de masse volumique d'un liquide.
  id: 6.4.1-fra
