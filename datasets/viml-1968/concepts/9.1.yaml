data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Conditions qui doivent être respectées pour employer correctement l'instrument
      de mesurage, compte tenu de sa conception, de sa réalisation et de sa destination.
  examples: []
  id: 9.1-fra
  notes:
  - content: '1. Les conditions usuelles d''emploi peuvent se rapporter entre autres:
      à l''espece et à l''état de la matière mesurée, aux valeurs de la grandeur mesurée,
      aux valeurs des grandeurs d''influence, aux conditions d''observation des indications
      etc...'
  - content: 2. Lorsque ces conditions sont indiquées sur l'instrument ou dans un
      mode d'emploi de celui-ci, elles sont appelées « conditions nominales ».
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Conditions usuelles d'emploi
