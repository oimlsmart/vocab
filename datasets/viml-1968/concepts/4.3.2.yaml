data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Grandeur définie dans un système de grandeurs comme étant une fonction
      des grandeurs de base de ce système.
  examples:
  - content: La force $F$, défunie dans le système de grandeurs $l, m, t$ par l'équation
      $F = m \cdot \frac{\mathrm{d}^2 l}{\mathrm{d} t^2}$
  - content: L'intensité du champ magnétique $H$ à une distance $r$ d'un conducteur
      rectiligne parcouru par un courant $I$, dans le système rationalisé des grandeurs
      $l, m, t, I$, définie par l'équation $H = I / 2 \pi r$.
