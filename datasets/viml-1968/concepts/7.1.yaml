  definition:
  - content: 'Ensemble d''instruments de mesurage servant à mesurer la même grandeur
      ou présentant certains traits caractéristiques communs. Examples : ensemble
      des instruments de pesage, ensemble de poids, ensemble des instruments mesurours
      de volumes de liquides autres que l''eau, ensemble des instruments de mesurages
      météorologiques.'
