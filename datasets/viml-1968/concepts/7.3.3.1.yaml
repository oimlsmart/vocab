data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Partie fixe ou mobile du dispositif indicateur (aiguille, spot lumineux,
      surface d'un liquide, plume d'enregistrement, pointe etc...) dont la position
      par rapport aux repères permet de déterminer le résultat du mesurage.
  examples:
  - content: une balance à bras égaux est munie d'une échelle fixe devant laquelle
      se déplace une aiguille qui forme l'index ;
  - content: dans un compteur watthcuremètre à rouleaux, les fenêtres du dispositif
      indicateur constituent les index fixes
  - content: au travers desquels apparaissent les chiffres des échelles mobiles.
