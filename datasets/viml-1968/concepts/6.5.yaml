  definition:
  - content: Schéma qui représente la hiérarchie des instruments de mesurage servant
      à mesurer une grandeur détorminée suivant la succession et la précision des
      opérations de transmission de l'unité de mesure de cette grandeur.
  examples:
  - content: Le schéma ci-dessous représente un exemple d'articulation des étalons
      de référence et des étalons de travail de différents ordres de précision.
