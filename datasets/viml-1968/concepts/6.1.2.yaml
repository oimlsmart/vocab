data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Instrument de mesurage qui sert à transformer la grandeur mesurée, ou
      l'une des autres grandeurs liées avec celle-ci, en une indication ou une information
      équivalente.
  examples:
  - content: pled à coulisse — ampèremètre — manomètre — thermomètre — pendule — interféromètre
      — compteur d'eau — balance.
  id: 6.1.2-fra
  notes:
  - content: '1. L''apparell mesureur (parfois appelé apparell de mesure) peut :'
  - content: 'soit indiquer directement la valeur de la grandeur mesurée : « appareil
      à lecture directe » (par exemple : ampèremètre, manomètre à ressort...),'
  - content: 'soit indiquer uniquement que la valeur de la grandeur mesurée est égale
      à une valeur connue de cette même grandeur : « appareil de comparaison • (par
      exemple : balance à fléau simple, galvanomètre de zéro...),'
  - content: 'solt enfin permettre de mesurer une petite différence entre la valeur
      de la grandeur mesurée et une valeur connue de cette même grandeur : « apparell
      différentiel » (par exemple : indicateur optique d''un comparateur pour mesurer
      des longueurs...),'
  - content: 2. La plupart des appareils mesureurs comportent une chaîne de mesurage
      (7.3.1) dans laquelle se produit la transformation de la grandeur mesurée en
      une grandeur perceptible par un observateur (longueur, angle, son, contraste
      lumineux...).
  - content: '3. L''apparoi mesureur peut comporter des éléments servant à des fonctions
      additionnelles ou accessoires (par exemple : régulation automatique, signalisation,
      dosage, trilage, émission de signaux codés...)'
  - content: '4. Pour les appareils mesureurs destinés à mesurer certaines grandeurs
      définies on utilise, au lieu de la dénomination générale « appareil mesureur
      », des dénominations spéciales :'
  - content: 'les unes font apparaître le nom des grandeurs mesurées ou le nom des
      unités de mesure employées (par exemple : manomètre, thermomètre, plantmètre,
      voltmètre),'
  - content: 'd''autres rappellent le principe de mesurage utilisé (par exemple :
      comparateur) ou l''usage auquel l''apparec est dostlné (par exemple : dosimètre),'
  - content: 'd''autres utilisent le nom de l''inventeur ou du constructeur (par exemple
      : balance Roberval ou Béranger, tube de Pitot , Venturi, compteur de Geiger-Muller),'
  - content: 'd''autres enfin reprennent la désignation commerciale choisie par le
      fabricant (par exemple : rotamétre).'
  sources: []
