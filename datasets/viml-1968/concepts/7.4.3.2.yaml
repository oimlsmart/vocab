  definition:
  - content: Valeur de la grandeur mesurée correspondant à l'échelon.
  examples: []
  id: 7.4.3.2-fra
  notes:
  - content: 1. La valeur de l'échelon est exprimée avec la même unité de mesure que
      l'indication donnée par l'instrument de mesurage.
  - content: 2. Dans les instruments à étendues multiples, la plus petite des valeurs
      d'échelon des diverses échelles représente la • valeur de l'échelon • de l'instrument.
  sources: []
