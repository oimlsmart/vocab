data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Appareil mesureur qui détermine la valeur d'une grandeur au moyen d'une
      intégration.
  examples:
  - content: compteur de volume des liquides ou des gaz, compteur d'énergie électrique,
      planimètre, intégrimètre, machine planimétrique, appareil de pesage continu
      sur un transporteur.
  id: 6.1.2.2-fra
  notes:
  - content: 1. On assimile à une intégration l'addition de valeurs partelles suffisamment
      petites.
  - content: 2. Le dispositif indicateur d'un appareil mesureur intégrateur peut comporter
      un organe permettant de le remettre à zéro.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Appareil mesureur intégrateur
