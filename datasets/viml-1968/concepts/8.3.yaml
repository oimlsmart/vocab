    type: accepted
  definition:
  - content: Valeurs extrêmes de l'erreur tolérée (en plus et en moins) par les règlements
      sur les diverses vérifications pour un instrument de mesurage.
  examples: []
  id: 8.3-fra
  notes:
  - content: Dans la terminologie relative aux mesurages, il y a lieu, dans le même
      esprit que celui de la définition ci-dessus, d'éviter l'emploi du terme • tolérance
      .
  - content: L'arrou maximale tolérée peut être exprimée en valeur absolue ou en valeur
      relative.
  - content: Pour les différentes sortes d'erreurs maximales tolérées, voir chapitre
      9.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Erreurs maximales tolérées lors de la vérification
