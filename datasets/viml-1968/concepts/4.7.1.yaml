data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Système d'unités de mesure composé d'un ensemble d'unités de base et
      d'unités dérivées cohérentes.
  examples:
  - content: 'Les unités suivantes : m, kg, s, $ m^{2}, m^{3}, $ $ \mathrm{H z}=\mathrm{s}^{-1},
      $ $ m.\mathrm{s}^{-1}, $ $ m.\mathrm{s}^{-2}, $ $ m^{-3}.\mathrm{k g}, $ $ N=m.\mathrm{k
      g}.\mathrm{s}^{-2}, $ $ m^{-1}.\mathrm{k g}.\mathrm{s}^{-2}, $ $ J=m^{2}.\mathrm{k
      g}.\mathrm{s}^{-2}, $ $ W=m^{2}.\mathrm{k g}.\mathrm{s}^{-3} $ représentent
      un ensemble cohérent d''unités de mesure de la mécanique appartenant au Système
      International d''Unités (SI).'
  id: 4.7.1-fra
  notes:
  - content: Dans le cas d'unités appartenant à un système cohérent, les équations
      entre valeurs numériques ont la forme des équations entre grandeurs.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Système cohérent d'unités de mesure
