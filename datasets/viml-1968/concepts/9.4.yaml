data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: 'La sensibilité d''un instrument de mesurage, pour une valeur donnée
      de la grandeur mesurée, s''exprime par le quotient de l''accroissement de la
      variable observée par l''accroissement correspondant de la grandeur mesurée
      : $$ k = \frac {\mathrm {d} l}{\mathrm {d} G} $$'
  examples: []
  id: 9.4-fra
  notes:
  - content: Dans les instruments les plus courants, où l'accroissement de la variable
      observée se traduit par le déplacement relatif d'un index et d'une échelle,
      la sensibilité s'exprime conventionnellement par le quotient de ce déplacement
      $dl$ le long de la base de l'échelle par l'accroissement $dG$ de la grandeur
      mesurée qui l'a provoqué. Cette valeur peut être constante ou variable le long
      de l'échelle.
  - content: En pratique, on peut prendre comme valeur de la sensibilité des instruments
      de mesurage à échelle le quotient de la longueur de l'échelon par la valeur
      de celui-ci.
  - content: Dans le cas où le numérateur et le dénominateur sont des grandeurs de
      la même espèce, la sensibilité s'appello rapport de transmission.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Sensibilité d'un instrument de mesurage
