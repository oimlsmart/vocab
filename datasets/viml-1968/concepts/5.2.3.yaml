    type: accepted
  definition:
  - content: Méthode de mesurage consistant à déterminer les valeurs d'un certain
      nombre de grandeurs à mesurer d'après les résultats de mesurages directs ou
      indirects de diverses combinaisons de ces valeurs et en résolvant le système
      d'équations correspondantes.
  examples:
  - content: mesurages de la masse de chacun des poids particuliers d'une série de
      poids, quand la masse de l'un d'eux est connue et quand sont connus les résultats
      des comparalsons entre elles des masses des différentes combinalsons possibles
      des poids.
  id: 5.2.3-fra
