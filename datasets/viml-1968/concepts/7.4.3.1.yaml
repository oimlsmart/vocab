  definition:
  - content: Longueur rectiligne ou curviligne mesurée le long de la base de l'échelle
      et comprise entre les axes de deux repères consécutifs.
  examples: []
  id: 7.4.3.1-fra
  notes:
  - content: Dans les instruments à étendues multiples, la plus petite des longueurs
      d'échelon des diverses échelles représente « la longueur de l'échelon de l'instrument
      ».
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Longueur de l'échelon
