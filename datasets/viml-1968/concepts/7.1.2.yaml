data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Dispositif reproduisant les formes et le mode de fonctionnement d'un
      instrument de mesurage utilisant un système déterminé et destiné à l'étude de
      ses propriétés métrologiques.
  examples: []
  id: 7.1.2-fra
  notes:
  - content: 1. La conformité de l'instrument définitif au modèle provisoire est obligatoire
      dans la mesure où il est nécessaire de conserver les propriétés métrologiques
      exigées du système de l'instrument envisagé.
  - content: 2. Les dimensions des divers éléments du modèle provisoire pourront ne
      pas être exactement conformes aux dimensions des éléments qui leur correspondent
      dans l'exécution définitive.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Modèle provisoire d'un instrument de mesurage
