  definition:
  - content: Grandeur qui ne fait pas l'objet du mesurage mais qui influe sur la valeur
      de la grandeur à mesurer ou sur les indications de l'instrument mesureur ou
      sur la valeur de la mesure matérielisée reproduisant la grandeur.
  examples: []
  id: 4.1.2-fra
  notes:
  - content: La grandeur d'influence peut provenir de l'ambiance ou de l'instrument
      de mesurage lui-même.
  sources: []
