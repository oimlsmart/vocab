    type: accepted
  definition:
  - content: 'Méthode de mesurage par laquelle la valeur d''une grandeur à mesurer
      est obtenue directement sans qu''il soit nécessaire d''exécuter des calculs
      supplémentaires basés sur une dépendance fonctionnelle de la grandeur à mesurer
      par rapport à d''autres grandeurs réellement mesurées. Remarques : 1. On considère
      que la valeur mesurée est obtenue directement même lorsque l''échelle d''un
      instrument de mesure comporte des valeurs conventionnelles qui sont rellées
      aux valeurs correspondantes de la grandeur mesurée à l''alde d''un tableau ou
      d''un graphique. 2. La méthode de mesurage reste directe même s''il est nécessaire
      d''exécuter des mesurages supplémentaires pour déterminer les valeurs des grandeurs
      d''influence (4.1.2) en vue d''effectuer les corrections correspondantes. Examples
      : mesurage ; d''une masse sur une balance à cadran ou sur une balance à bras
      égaux, d''une longueur à l''alde d''une règle à traits ou d''une règle à bouts.'
