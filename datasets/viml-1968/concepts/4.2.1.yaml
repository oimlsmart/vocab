data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Valeur qui caractérise une grandeur parfaitement définie dans les conditions
      qui existent au moment où cette valeur est examinée.
  examples:
  - content: La longueur vraie d'une règle en métal est la longueur qui est déterminée
      par la distance entre les deux plans des extrémités de la règle, supposés parfaitement
      parallèles et perpendiculaires à l'axe de colle-ci, lorsque toutes les grandeurs
      d'influence ainsi que les conditions opératoires sont parfaitement définies.
  id: 4.2.1-fra
  notes:
  - content: La valeur vraie d'une grandeur est une notion idéale et en général elle
      ne peut pas être connue. On peut cependant dire que la valeur vraie du Kilogramme
      étalon prototype international déposé au Bureau International des Poids et Mesures
      est, par définition et dans des conditions déterminées, de 1 kg.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Valeur vraie d'une grandeur
