    type: accepted
  definition:
  - content: Erreur due à l'utilisation d'une méthode de mesurage qui est incorrecte
      compte tenu de la nature des instruments de mesurage utilisés.
  examples:
  - content: Mesurage d'une force à l'aide d'un dynamomètre à ressort pour lequel
      on a supposé une relation linéaire entre la déformation et la force, alors qu'en
      réalité la fonction qui lie ces deux grandeurs n'est pas linéaire.
