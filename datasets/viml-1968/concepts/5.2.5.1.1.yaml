data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Méthode de mesurage par comparaison directe dans laquelle la valeur d'une
      grandeur à mesurer est remplacée par une valeur connue de la même grandeur,
      choisie de telle manière que les effets provoqués sur le dispositif indicateur
      par ces deux valeurs soient les mêmes.
  examples:
  - content: Détermination d'une masse, au moyen d'une balance et de poïds marqués,
      par la méthode de substitution de Borda.
