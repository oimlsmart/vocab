    type: accepted
  definition:
  - content: Zone comprise entre les repères correspondant à la valeur minimale et
      la valeur maximale de l'échelle.
  examples: []
  id: 7.4.2.1-fra
  notes:
  - content: '1. Cortains instruments de mesurage peuvent avoir plusieurs étendues
      partielles d''échelle, exemple : thermomètres à liquide avec élargissements
      locaux du tube capillaire.'
  - content: 2. Dans les compteurs, l'étendue du dispositif indicateur remplace l'étendue
      de l'échelle.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Étendue de l'échelle
