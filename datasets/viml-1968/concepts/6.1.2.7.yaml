data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Appareil mesureur qui inscrit sur un support d'enregistrement les indications
      ou informations qu'il donne pour les mesurages effectués d'une ou de plusieurs
      grandeurs. L'enregistrement peut être effectué sous forme d'un diagramme (continu
      ou discontinu) ou par impression de valeurs numériques.
  examples: []
  id: 6.1.2.7-fra
  notes:
  - content: 1. Lorsque l' « appareil mesureur enregistreur » envisagé ne peut pas
      être confondu avec un simple « dispositif enregistreur », il est permis de le
      désigner par le terme « enregistreur ».
  - content: '2. Les appareils mesureurs enregistreurs de certaines grandeurs particulières
      sont désignés par les expressions obtenues soit en ajoutant le mot enregistreur
      au nom de l''appareil mesureur correspondant (ex. : voltmètre enregistreur,
      manomètre enregistreur), soit en ajoutant le suffixe « graphe » à une dénomination
      caractérisant la grandeur mesurée (ex. thermographe, barographe).'
  - content: 3. L'enregistrement s'effectue généralement en fonction d'une autre grandeur
      (dans la plupart des cas en fonction du temps), mais il peut aussi simplement
      consister à noter les valeurs successives de la grandeur mesurée.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Appareil mesureur enregistreur
