  definition:
  - content: Nombre de mesurages par unités de temps au-dessus [au-dessous] duquel
      les résultats de mesurage obtenus avec l'instrument sont susceptibles d'être
      entachés d'une erreur supérieure à l'erreur maximale tolérée.
  examples: []
  id: 9.2.8-fra
  notes:
  - content: Cette notion s'applique aux instruments de mesurage répétiteurs à fonctionnement
      discontinu (par ex. doseuses volumétrlques ou pondérales, peseuses).
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Cadence de mesurage maximale
  - type: expression
    normative_status: admitted
    designation: Cadence de mesurage minimale
