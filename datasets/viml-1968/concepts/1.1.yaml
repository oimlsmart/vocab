data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Organisme national ayant pour but de résoudre les problèmes de métrologie
      légale dans un pays donné.
  examples: []
  id: 1.1-fra
  notes:
  - content: 'Les principales fonctions d''un Service national de métrologie légale
      consistent en général à : assurer la conservation des étalons nationaux et garantir
      leur précision par leur comparaison aux étalons internationaux, garautir et
      s''il y a lieu donner aux étalons secondaires une précision convenable à leur
      emploi dans les pays par comparaison aux étalons nationaux; — effectuer des
      travaux scientifiques et techniques dans tous les domaines de la métrologie
      et des méthodes de mesurage, prendre part aux travaux des autres organismes
      nationaux intéressés à la métrologie; — élaborer les projets de lois se rapportant
      à la métrologie légale et promulger la réglementation correspondante; - réglementer
      et conseller, surveiller et contrôler la fabrication et la réparation des instruments
      de mosurage ; — contrôler l''utilisation de ces instruments et des opérations
      de mesurage lorsque cette utilisation et ces opérations sont convertes par la
      garantie publique; — éventuellement, détecter les fraudes de mesurage ou de
      débit de marchandises et déférer leurs auteurs en justice; — coordonner l''activité
      des Autorités de surveillance métrologique qui, bien que ne lui étant pas organiquement
      assujetties, collaborent avec lui pour assurer le respect de la réglementation
      de métrologie légale; — organisor l''enseignement de la métrologie légale ;
      - représenter le pays dans les Instances internationales du métrologie légale.'
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Service national de métrologie légale
