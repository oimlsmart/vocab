data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Partie de l'erreur du mesurage indirect d'une grandeur qui résultat de
      l'erreur commise sur une grandeur composante.
  examples:
  - content: 'Dans les exemples du 8.1.4 les expressions : $$ \frac {\partial F}{\partial
      X _ {1}} \Delta X _ {1}, \frac {\partial F}{\partial X _ {2}} \Delta X _ {2},
      \dots \frac {\partial F}{\partial X _ {m}} \Delta X _ {m} $$ on $$ \frac {\partial
      F}{\partial X _ {1}} s _ {1}, \frac {\partial F}{\partial X _ {2}} s _ {2},
      \dots \frac {\partial F}{\partial X _ {m}} s _ {m} $$ représentent les erreurs
      systématiques partielles ou les écarts moyens quadratiques partiels du mesurage
      direct des grandcurs $ X_{1}, X_{2} \dots X_{m}. $'
  id: 8.1.4.1-fra
