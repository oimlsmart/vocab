    type: accepted
  definition:
  - content: Étalon destiné soit à contrôler l'invariabilité de l'étalon primaire,
      soit à remplacer cet étalon s'il est endommagé ou s'il a disparu.
  examples: []
  id: 6.4.5-fra
  notes:
  - content: L'étalon-témoin n'est, en pratique, jamais utilisé dans les travaux métrologiques
      courants, même pour la vérification des autres étalons, par exemple.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Étalon-témoin
