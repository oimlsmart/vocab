data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Transducteur de mesurage (6.1.7) qui, étant une partie d'un appareil
      mesureur ou d'une installation de mesurage, ne constitue cependant pas un ensemble
      pouvant être utilisé séparément.
  examples: []
  id: 7.3.2-fra
  notes:
  - content: 1. Le système d'éléments transducteurs qui composent le thermomètre thermoélectrique
      est représenté on 7.2.
  - content: 2. Les divers éléments transducteurs ne sont pas toujours délimités matériellement
      (par ex, dans le thermomètre thermoélectrique, l'élément transducteur $E \rightarrow
      I$ n'est pas matériellement distinct de l'élément transducteur $T \rightarrow
      E$).
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Élément transducteur d'un appareil mesureur
