data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Équation dans laquelle les symboles littéraux représentent des grandeurs.
  examples:
  - content: "$l = v.l$ — équation entre grandeurs du chemin $l$ parcouru dans un
      temps $t$ par un mobile animé d'un mouvement uniforme avec la vitesse $v,$"
  - content: "$S = \\frac{b.h}{2}$ — équation entre grandeurs de l'aire $S$ d'un triangle
      dont un côté est $b$ et la hauteur correspondante $h$."
  id: 4.4-fra
  notes:
  - content: L'équation entre grandeurs est valable indépendamment des unités de mesure
      et ne nécessite pas l'utilisation d'unités déterminées à l'avance.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Équation entre grandeurs
