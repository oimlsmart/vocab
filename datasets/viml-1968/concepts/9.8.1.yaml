    type: accepted
  definition:
  - content: Variation de la grandeur mesurée qui ne provoque pas de variation décelable
      de l'indication (pour un opérateur moyen et dans des conditions déterminées
      d'emploi de l'instrument).
  examples:
  - content: Si l'aiguille d'un instrument de pesage ne se déplace pas, après que
      l'on alt place lógèrement une masse de 50 mg sur le plateau, l'erreur de mobilité
      est de 50 mg.
