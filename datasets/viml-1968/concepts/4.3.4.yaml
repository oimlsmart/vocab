data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Grandeur qui ne depend d'aucune des grandeurs de base du système donné
      de grandeurs.
  examples:
  - content: Dans le système de grandeurs $l, m, l$, l'angle, qui s'exprime par $L^{\circ}
      M^{\circ} T^{a}$, est une grandeur sans dimension.
  id: 4.3.4-fra
  notes:
  - content: Une grandeur sans dimension s'exprime par le produit des pulsances zéro
      des grandeurs de base du système; elle diffère pourtant d'un nombre pur car
      elle a le caractère et les qualités d'une grandeur.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Grandeur sans dimension
