    type: accepted
  definition:
  - content: Qualité qui caractérise l'aptitude d'un instrument de mesurage à donner
      des indications proches de la valeur vraie de la grandeur mesurée.
  examples: []
  id: 9.10-fra
  notes:
  - content: La précision est la qualité globale de l'instrument du point do vue des
      erreurs. La précision est d'autant plus grande que les indications sont plus
      proches de la valeur vraie.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Précision d'un instrument de mesurage
