  definition:
  - content: Différence $ \nu_{\mathrm{c}} $ — $ \nu_{\mathrm{n}} $ entre la valeur
      conventionnellement vraie $ \nu_{\mathrm{a}} $ reproduite par la mesure materialisée
      et la valeur nominale $ \nu_{\mathrm{n}} $ de cette mesure.
  examples:
  - content: Une mesure de capacité contient $v_{0} = 1005 \mathrm{ml}$ et sa dénomination
      est « 1 litre », soit $v_{n} = 1000 \mathrm{ml}$,
  - content: l'erreur de calibrage de cette mesure est égale à ; $e = 1005 \mathrm{ml}
      - 1000 \mathrm{ml} = -5 \mathrm{ml}$,
  - content: la valeur vraie de la mesure étant trop grande par rapport à sa dénomination.
  id: 8.2.5-fra
  notes: []
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Erreur de calibrage d'une mesure matérialisée
