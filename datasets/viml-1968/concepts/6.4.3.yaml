data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Groupe d'instruments de mesurage de même modèle et de mêmes caractéristiques
      métrologiques associés pour remplir, en commun, par leur moyen, le rôle d'etalon.
      La valeur de l'etalon collectif est la moyenne arithmétique pondérée des valeurs
      fournies par les divers instruments.
  examples:
  - content: étalon collectif de dureté composé par un groupe de blocs de dureté;
  - content: étalon collectif de pression matérielisé par un groupe de manomètres
      à piston,
  - content: éton collectif d'intensité luminouse constitue par un certain nombre
      de lamps à incandescence.
