  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Moyenne arithmétique d'une série de résultats de mesurages calculée après
      avoir pris en considération le poids de chacun des résultats particuliers.
  examples:
  - content: 'Les résultats de trois mesurages d''une même grandeur sont : 10,4 ;
      10,6 ; 10,1 mm. Si on attribue au premier mesurage un degré de conflance exprimé
      par le poids 1, au 2° le poids 2 et au 3° le poids 1 : $$ \mathrm {l a m o y
      e n e p o n d e r r e e} = \frac {1 0 , 4 \times 1 + 1 0 , 6 \times 2 + 1 0
      , 1 \times 1}{4} \mathrm {m m} = 1 0, 4 2 \mathrm {m m}. $$'
  id: 5.4.4-fra
  notes: []
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Moyenne pondérée
