data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Quotient de l'erreur absolue par la valeur de comparaison utilisée pour
      le calcul de cette erreur absolue. Cette valeur de comparaison peut être la
      valeur vraie, la valeur conventionnellement vraie, ou la moyenne arithmétique
      d'une série de mesurages.
  examples:
  - content: 'On a déterminé la valeur conventjonnellement vraie d''une longueur $l
      = 15,20$ mm et on a trouvé comme résultat du mesurage $l = 15,07$ mm et l''erreur
      absolue véritable $e = (15,07 - 15,20)$ mm = -0,13 mm. L''erreur relative est
      : $$ \varepsilon = \frac {e}{1} = - \frac {0 . 1 3}{1 5 , 2} = - 0. 0 0 8 6
      = - 0. 8 6 \% $$'
  id: 8.1.6-fra
  notes: []
  sources: []
