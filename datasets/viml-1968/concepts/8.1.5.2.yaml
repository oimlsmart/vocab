data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Valeur de l'erreur, abstraction faite de son signe.
  examples:
  - content: Si l'erreur maximale tolérée d'un instrument de mesurage est égale à
      ± 0,2 mm, la valeur absolue de cette erreur est | ± 0,2 | mm = 0,2 mm. Dans
      l'exemple cité ci-dessus la valeur absolue de l'erreur est aussl $ \mid \pm
      0, 2 \mid \mathrm{mm}=0, 2 \mathrm{mm}. $
  id: 8.1.5.2-fra
  notes:
  - content: Il faut faire une distinction entre le terme « erreur absolue » et le
      terme « valeur absolue de l'erreur »; dans ce dernier cas, le qualificatif «
      absolue » se rapporte seulement au signe.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Valeur absolue de l'erreur
