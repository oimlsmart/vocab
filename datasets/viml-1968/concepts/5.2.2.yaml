    type: accepted
  definition:
  - content: 'Méthode de mesurage dans laquelle la valeur d''une grandeur est obtenue
      à partir de mesurages effectués par des méthodes de mesurage direct d''autres
      grandeurs liées à la grandeur à mesurer par une relation connue. Exemples :
      mesurage de la masse volumique d''un corps en se basant sur les mesurages de
      sa masse et de ses dimensions géométriques, mesurage do la résistivité d''un
      conducteur en se basant sur les mesurages de sa résistance, de sa longueur et
      de la surface de sa section.'
