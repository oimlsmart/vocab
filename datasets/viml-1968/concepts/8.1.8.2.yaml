data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Erreurs extrêmes (en plus et en moins) dont la probabilité de ne pas
      être dépassées par l'erreur sur la moyenne arithmétique d'une série de mesurages
      a une valeur P telle que l'on peut estimer que la différence 1 - P est négligeable.
  examples: []
  id: 8.1.8.2-fra
  notes:
  - content: On calcul en général les erreurs limites de la moyenne arithmétique d'une
      série de mesurages de la même façon que celles relatives à un seul mesurage
      mais en utilisant l'écart moyen quadratique $s_r$.
  - content: Pour un petit nombre de mesurages, on se sert des valeurs t calculées
      selon la distribution de Student.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Erreurs limites de la moyenne arithmétique d'une série de mesurages
