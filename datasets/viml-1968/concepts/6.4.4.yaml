  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Étalon, relatif à une grandeur déterminée, qui présente les plus haute
      qualités métrologiques dans un domaine déterminé.
  examples: []
  id: 6.4.4-fra
  notes:
  - content: 1. La qualité d'étalon primaire est valable aussi bien pour les unités
      de base que pour les unités dérivées.
  - content: 2. L'étalon primaire n'est jamais utilisé directement pour des mesurages
      en dehors de sa comparaison avec les étalons témoins et avec des étalons de
      référence.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Étalon primaire
