data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Erreur commise par l'observateur pendant le processus de mesurage.
  examples:
  - content: a) Lors d'un mesurage d'une intensité lumineuse ou d'une température
      de luminance, effectué à l'alde d'un photomètre à contraste ou d'un pyromètre
      optique à filament disparaisant ; erreur due à une égallisation incorrecte de
      l'éclairement de deux zones.
  - content: 'b) Lors d''un mesurage effectué à l''aide d''un pont électrique à courant
      alternatif : erreur due à un réglage incorrect du minimum de l''intensité du
      son dans le récepteur téléphonique.'
  - content: Dans ces deux exemples, l'erreur de lecture de l'indication des appareils
      de mesure utilisés no représente qu'une petite fraction de l'erreur totale d'observation.
  id: 8.5-fra
  notes: []
  sources: []
