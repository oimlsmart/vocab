data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Suite d'éléments transducteurs et d'organes de liaison d'un instrument
      de mesurage placés entre le capteur, premier élément de la chaîne, et le dispositif
      indicateur qui en est le dernier élément.
  examples:
  - content: 'Le thermomètre thermoélectrique, avec un millivoltmètre comme organe
      indicateur, peut être présenté comme une suite d''éléments transducteurs suivants
      :'
  - content: thermocouple, transformant la température $T$ en une force électromotrice
      $E$ fonction de $T$;
  - content: élément transducteur sous forme d'un circuit électrique fermé ou sous
      l'influence de la force électromotrice $E$ se produit le courant $I$ fonction
      de $E$;
  - content: système magnétoélectrique d'un millivoltmètre transformant le courant
      $I$ en couple de rotation $M$ fonction de $I$ ;
  - content: ressort transformant le couple de rotation $M$ en angle $\alpha$ fonction
      de $M$.
  id: 7.3-fra
  notes: []
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Chaîne de mesurage
