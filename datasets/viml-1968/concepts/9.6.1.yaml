data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Phénomène présenté par un instrument de mesurage qui donne, dans une
      série de mesurages d'une même valeur de la grandeur mesurée, des indications
      différentes.
  examples: []
  id: 9.6.1-fra
  notes:
  - content: 1. La « dispersion des indications » pent être exprimée quantitativement
      par l'écart moyen quadratique (8.2.4) ou par l'étendue de dispersion des indications
      .
  - content: 2. A ce terme se rapporte aussi la remarque 3 relative au terme 8.2.4.
  - content: '3. Il est nécessaire d''indiquer les conditions dans lesquelles on effectue
      la série de mesurages en question : si ces mesurages dolvent se succéder directement
      l''un après l''autre ; si, entre chacun d''eux, il dolt y avoir un certain intervalle
      de temps ; s''ils doivent être exécutés par le même observateur ou par des observateurs
      différents etc...'
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Dispersion des indications
