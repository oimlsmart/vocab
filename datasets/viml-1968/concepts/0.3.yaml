  definition:
  - content: Partie de la Métrologie qui traite des mesurages pour des applications
      définies.
  examples: []
  id: 0.3-fra
  notes:
  - content: Par opposition à la métrologie générale, la métrologie appliquée concerne
      les mesurages d'une certaine grandeur ou blen les mesurages des grandeurs faisant
      partie d'un certain domaine, selon les exemples donnés au point 0.1, remarque
      3.
  sources: []
