  definition:
  - content: Différence des indications d'un instrument de mesurage lorsqu'on atteint
      la même valeur de la grandeur mesurée soit en croissant, soit en décroissant.
  examples: []
  id: 9.7.1-fra
  notes:
  - content: Dans certains cas, on détermine l'erreur de réversibilité par la différence
      des valeurs de la grandeur mesurée correspondant chacune à une même indication
      obtenue soit en croissant, soit en décroissant.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Erreur de réversibilité
