  definition:
  - content: Intervalle entre deux repères successifs quelconques de l'échelle.
  examples: []
  id: 7.4.3-fra
  notes:
  - content: 1. Dans les échelles à tralts, l'échelon est l'intervalle entre les axes
      de deux tralts successifs.
  - content: 2. Dans une échelle numérique, l'échelon est l'intervalle entre deux
      nombres consécutifs.
  sources: []
