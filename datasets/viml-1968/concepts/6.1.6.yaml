data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Instrument qui sert à mesurer les grandeurs d'influence ou bien les grandeurs
      qui caractérisent les qualités métrologiques d'un instrument de mesurage pendant
      son emploi ou son examen.
  examples:
  - content: thermomètre mesurant la température du gaz ou de l'amblance pendant le
      mesurage du débit d'un gaz, manomètre différentiel mesurant la perte de charge
      dans un compteur d'eau, niveau à bulle pour vérifier l'horizontalité d'une balance,
      « poids d'erreurs » pour la vérification des balances, chronomètre pour contrôler
      le débit d'un compteur d'hydrocarbures.
  id: 6.1.6-fra
  notes: []
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Instrument de mesurage auxiliaire
