data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Expression qui représente une grandeur d'un système comme un produit
      de puissances des grandeurs de base de ce système, avec un coefficient numérique
      égal à 1.
  examples:
  - content: "$ \\mathrm{L M T}^{-2}=\\mathrm{dimenslon de la force dans le système
      des grandeurs} t,m,t. $ $1.3^{1/2} \\mathrm{M}^{1/2} \\mathrm{T}^{-2} \\mu^{1/2}
      =$ dimension de la tension électrique dans le système de grandeurs $l, m, l,
      \\mu$ $ \\mathrm{L}^{2} \\mathrm{M T}^{-3} \\mathrm{I}^{-1}= $ dimension de
      la même tension électrique dans le système de grandeurs $ l, m, l, I. $"
  id: 4.3.3-fra
  notes:
  - content: Les exposants dans la dimension d'une grandeur sont appelés * exposants
      de dimensions * .
  - content: Pour faire la distinction entre le symbole d'une grandeur et le symbole
      de sa dimension, on utilise dans l'impression les caractères italliques pour
      le premier cas et les romains (capitales) pour le deuxième.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Dimension d'une grandeur
