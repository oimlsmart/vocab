    type: accepted
  definition:
  - content: Erreur d'un instrument de mesurage provenant du fait que les valeurs
      des grandeurs d'influence sont différentes de celles qui correspondent aux conditions
      de référence.
  examples: []
  id: 8.2.6.1-fra
  notes:
  - content: Chacune des grandeurs d'influence (4.1.2), lorsque sa valeur s'écarte
      de sa valeur de référence (9.1.1) ou de son domalne de référence (9.1.2), provoque
      sa propre erreur complémentaire.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Erreur complémentaire d'un instrument de mesurage
