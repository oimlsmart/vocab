  definition:
  - content: Imprécision qui s'exprime par l'ensemble des erreurs globales limites
      du mesurage comprenant toutes les erreurs systématiques ainsi que les erreurs
      fortuites limites.
  examples: []
  id: 8.1.9-fra
  notes:
  - content: Toutes les erreurs systématiques étant corrigées, l'imprécision est égale
      à l'incertitude de mesurage.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Imprécision de mesurage
