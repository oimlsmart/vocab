data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: 'Indice caractérisant la dispersion de la moyenne arithmétique d''une
      série de mesurages indépendants de la même valeur d''une grandeur mesurée, donné
      par la formule : $$ s _ {r} = \frac {s}{\sqrt {n}} $$ ou $s$ est une estimation
      de l''écart moyen quadratique d''un seul mesurage d''une série et $n$ le nombre
      de mesurages de la série.'
  examples: []
  id: 8.1.7.2-fra
  notes:
  - content: L'augmentation du nombre des mesurages permet de diminuer l'importance
      des erreurs fortultes, en acceptant comme le résultat d'une série de mesurages
      une moyenne des résultats particuliers.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Écart moyen quadratique de la moyenne arithmétique d'une série de
      mesurages
