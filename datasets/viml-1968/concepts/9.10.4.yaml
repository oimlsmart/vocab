  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Caractéristique des instruments de mesurage qui sont soumis aux mêmes
      conditions de précision.
  examples: []
  id: 9.10.4-fra
  notes:
  - content: 'Le plus souvent le signe indicatif de la classe de précision indique
      l''erreur maximale tolérée de précision exprimée en pour cent de la plus grande
      indication que peut donner l''instrument (par ex. l''expression « ampère-métro
      de la classe 0,2 » signifie que l''erreur limite de précision de l''instrument
      considéré ne dépasse pas 0,2 % de son indication la plus grande), ou bien il
      constitue simplement un numéro d''ordre de classe, ce qui no donne pas directement
      une indication de la précision (par ex. cales-étalons de la classe de précision
      0). L''expression • dé précision • est souvent omise et on dit: ampèremètre
      de classe 0,2 — cales-étalons de classe 0.'
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Classe de précision
