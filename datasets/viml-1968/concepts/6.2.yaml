data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: 'Dispositif qui n''étant pas par lui-même un instrument de mesurage sert
      : soit à maintenir les grandeurs mesurées ou les grandeurs d''influence à des
      valeurs convenables, soit à faciliter l''exécution des opérations de mesurage,
      soit encore à changer la sensibilité ou l''étendue de mesurage d''un instrument.'
  examples:
  - content: amplificateur, loupe à lire les indications, thermostat pour vérifier
      les thermomètres, pompe d'allimentation, dégazeur, limiteur de déblt d'une installation
      de mesurage avec compteur de liquides.
  id: 6.2-fra
  notes:
  - content: Le dispositif auxillaire peut être un élément organique de l'instrument
      ou bien un élément séparé.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Dispositif auxiliaire de mesurage
