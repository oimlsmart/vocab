data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Partie ou ensemble d'un dispositif indicateur totalisant les indications
      d'un appareil mesureur.
  examples: []
  id: 7.7-fra
  notes:
  - content: 1. L'augmentation des indications d'un totalisateur peut se faire d'une
      façon continue ou discontinue, indépendamment de la continuité ou discontinuité
      de fonctionnement de l'apparell mesureur.
  - content: 2. Il existe des totalisateurs qui enregistrent toutes les indications
      successives de l'appareil lors de l'ensemble do ses mesurages et qui ne peuvent
      être remis à volonté à zéro et des totalisateurs dits partiels qui n'enregistrent
      que les indications de l'appareil pour un certain mesurage (ou un certain nombre
      de mesurages) et qui peuvent être remis à zéro enfin de ces mesurages.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Totalisateur
