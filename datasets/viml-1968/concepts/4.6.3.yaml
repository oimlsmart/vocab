  definition:
  - content: Unité de mesure d'une des grandeurs de base.
  examples:
  - content: 'Le métre est l''unité de base de la grandeur de base « longueur » dans
      le Système International d''Unités. Du mettre (conjointement avec d''autres
      unités de mesure de base) découlent les unités dérivées de ce système : unités
      de vitesse, de force, de potentiel électrique...'
  id: 4.6.3-fra
  notes:
  - content: Des unités de mesure de base découlent les unités de mesure dérivées
      d'un système d'unités de mesure.
