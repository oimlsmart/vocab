data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: 'Instrument de mesurage reproduisant d''une façon permanente, pendant
      l''emploi, une ou plusieurs valeurs connues d''une grandeur donnée. Examples
      : polds mesure de capacité (à une ou plusieurs valeurs, avec ou sans échelle)
      règle (à une ou plusieurs valeurs, avec ou sans échelle) résistance électrique
      condensateur bobine d''induction cale-étalon calibre à mâchoire de contrôle
      des diamètres de cylindres. Un manomètre à tube en U, un thermomètre à llquide,
      un pled à coulisse, un distributeur de carburant à récipients mesureurs ne constituent
      pas des mosures matériallisées bien que certains de ces instruments puissent
      comporter une telle mesure dans leur ensemble de mesurage.'
  examples: []
  id: 6.1.1-fra
  notes:
  - content: 'La mesure matérialliséo sert à des opérations de mesurage avec ou sans
      l''aide d''un autre instrument de mesurage. Certalnes mesures reproduisent seulement
      une valeur d''une grandeur et, pour effectuer avec celles-ci un mesurage, il
      est nécessaire d''employer, en outre, d''autres instruments de mesurage (par
      exemple : les poids ne permettent le mesurage d''une masse qu''avec l''aide
      d''une balance). Les mesures de ce premier genre s''appellent « mesures matériallises
      non-autosuffisantes ». Les autres mesures matériallisées ont les deux fonctions
      en même temps, c''est-à-dire reproduisent la valeur de la grandeur et permettent
      d''effectuer le mesurage sans l''aide d''autres instruments de mesurage (exemples
      : règles, mesures matériallisées de capacité). Les mesures de ce deuxième genre
      s''appellent « mesures matériallisées auto-suffisantes ».'
  - content: 'Le trait caractéristique de la mesure matériallisée est qu''elle ne
      possède en général pas d''index. Dans certains cas, cet index peut appartenir
      à l''instrument qui, conjointement avec cette mesure, sert au mesurage (par
      exemple : la balance conjointement avec le poids), ou bien il peut être formé
      par le corps mesuré même (par exemple : le ménisque formé par le liquide dans
      le col d''une mesure de capacité à col gradué).'
  - content: Un autre trait caractéristique d'une mesure matérielisée est qu'elle
      ne comprend en général aucun élément mobile pendant le mesurage.
  - content: |-
      Une mesure matérialisée peut reproduire une seule valeur de la grandeur (mesure matériallisée à une valeur) ou bien plusieurs valeurs distinctes (mesure matérialisée à plusieurs valeurs distinctes) ou enfin peut permettre de reproduire les valeurs de cette grandeur dans une étendue continue (mesures matérialisées graduées). Les mesures matériallisées à plusieurs valeurs distinctes ne permettent pas, par voie d'interpolation, d'indiquer les valeurs contenues entre les repères. Exemples pour la remarque 4 : a) mesures matériallisées à une valeur : cale-étalon:

      * résistances électriques à une scule valeur ; b) mesure matérielisée à plusieurs valeurs distinctes : calibre à 2 valeurs correspondant aux longueurs limites d'une dimension ; c) mesures matériallisées graduées : règle graduée

      * pl petite graduée.
  - content: Les mesures matérielisées peuvent reproduire les valeurs des grandeurs
      qu'elles concernent avec des précisions diverses mais qu'il doivent être toujours
      connues.
