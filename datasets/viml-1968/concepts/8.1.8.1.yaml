data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Erreurs extrêmes (en plus et en moins) dont la probabilité de ne pas
      être dépassées par l'erreur sur un mesurage quelconque d'une série a une valeur
      P telle que l'on peut estimer que la différence 1 — P est négligeable.
  examples: []
  id: 8.1.8.1-fra
  notes:
  - content: 'On calcule en général les erreurs limites d''un seul mesurage comme
      le produit de l''écart moyen quadratique d''un seul mesurage d''une série par
      un nombre $t$ (entier ou fractionnaire); on a alors : $e_1 = + ts$ et $e_2 =
      - ts$ où $s$ est défini selon 8.1.7.1 et le nombre $t$ est fixé en fonction
      de la probabilité $P$ de ne pas dépasser les valeurs $e_1$ ou $e_2$. Dans le
      cas de la lol de la distribution normale des erreurs et pour un suffisamment
      grand nombre de mesurages, on pose souvent $l = 3$, ce qui correspond à la probabilité
      $P = 99,73 \%$ do ne pas dépasser dans la série de mesurages les valeurs $e_1
      = 3s$ et $e_2 = -3s$; pour $ P = 95\% $ , on a $ t = 1,96 $ et pour $ P = 99\%
      $ , on a $ t = 2,58 $ ...'
  - content: La définition ci-dessus des erreurs limites suppose que l'on a corrigé
      le résultat des erreurs systématiques ; ces erreurs limites contlendront cependant
      encore les « résidus » de ces erreurs systématiques.
  - content: La probabilité P correspond au terme statistique « niveau de confiance
      », et les erreurs limites au terme limites de confiance ».
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Erreurs limites d'un seul mesurage d'une série
