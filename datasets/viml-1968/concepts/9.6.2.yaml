  definition:
  - content: 'Mesure de la dispersion des indications d''un instrument de mesurage
      exprimée par la différence entre la plus grande $v_{i\max}$ et la plus petite
      $v_{i\min}$ des indications qui, dans une série de mesurages, correspondent
      à une même valeur de la grandeur mesurée : $$ W = v _ {i \max } - v _ {i \min
      } $$'
