  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Ensemble de mouvements consécutifs des organes mobiles d'un appareil
      mesureur à la fin desquels tous les organes, sauf le dispositif indicateur,
      reprennent pour la première fois la position qu'ils avaient à l'instant initial.
  examples: []
  id: 7.8-fra
  notes:
  - content: 1. Cette notion s'applique aux instruments à fonctionnement dit « continu
      ».
  - content: 2. Le volume cyclique d'un compteur volumétrique est le volume mesuré
      au cours d'un cycle de fonctionnement de ce compteur.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Cycle de fonctionnement d'un appareil mesureur
