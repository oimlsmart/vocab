  definition:
  - content: Erreur globale d'un instrument de mesurage, dans les conditions déterminées
      d'emploi, et comprenant l'erreur de justesse ainsi que l'erreur de fidélité.
  examples: []
  id: 9.10.1-fra
  notes:
  - content: L'erreur de précision est la différence entre la valeur nominale d'une
      mesure matériallisée ou l'indication d'un appareil mesureur et la valeur conventlonnellement
      vraie de la grandeur mesure.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Erreur de précision
