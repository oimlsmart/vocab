data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: 'a) pour les instruments de mesurage autres que les compteurs : valeur
      de la partie de la grandeur mesurée qui excède la portée maximale de l''instrument,
      b) pour les compteurs : valeur de la partie de la charge qui excède la charge
      maximale du compteur.'
  examples: []
  id: 9.2.7-fra
  notes:
  - content: 1. Pour la limite de la valeur tolérée de la surcharge, on utilise la
      dénomination surcharge maximale tolérée.
  - content: 2. On distingue les surcharges de « faible durée » et de « longue durée
      ».
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Surcharge d'un instrument de mesurage
