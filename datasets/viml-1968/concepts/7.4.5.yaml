    type: accepted
  definition:
  - content: 'Échelle dont les repères apparaissent de façon discontinue et sont constitués
      par des chiffres alignés indiquant directement la valeur numérique de la grandeur
      mesurée. L''échelle numérique est à indication discontinue. Remarques : L''ensemble
      des chiffres constituent une échelle numérique peut être placé sur une ou plusieurs
      surfaces planes (ou non) sur lesquelles les chiffres à lire apparaissent brusquement.
      Exemple : échelle numérique composée de quatre séries de chiffres placés sur
      des rouleaux : les chiffros à lire apparaissent dans la fenêtre.'
