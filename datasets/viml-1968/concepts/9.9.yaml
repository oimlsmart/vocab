data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Temps qui s'écóule après une variation brusque de la grandeur à mesurer
      jusqu'à ce que l'instrument de mesurage donne une indication qui ne diffère
      pas de l'indication définitive relative à la nouvelle valeur de la grandeur
      d'une quantité supérieure à une valeur donnée.
  examples: []
  id: 9.9-fra
  notes:
  - content: 'Pour déterminer le temps de réponse, il faut fixer pour chaque catégorie
      d''instruments :'
  - content: a) la valeur initiale à partir de laquelle doit être effectué le changement
      de la grandeur mesurée,
  - content: b) la valeur de ce changement,
  - content: c) la différence entre l'indication définitive et l'indication à la fin
      de la période acceptée comme temps de réponse.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Temps de réponse d'un instrument de mesurage
