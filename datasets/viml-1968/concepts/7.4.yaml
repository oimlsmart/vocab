  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Ensemble ordonné de repères portés par le dispositif indicateur de l'instrument
      de mesurage.
  examples: []
  id: 7.4-fra
  notes:
  - content: 1. Les repères de l'échelle peuvent être chiffrés ou non, la chiffraison
      peut être abstraite ou correspondre aux unités de mesure utilisées.
  - content: 2. Certains instruments, dits à étendues multiples, peuvent avoir soit
      plusieurs échelles, soit une seule échelle à chiffraison changeante ou à commutateur
      de multiplication.
  - content: 'Exemple : échelle graduée et chiffrée.'
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Échelle
