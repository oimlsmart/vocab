  definition:
  - content: Qualité qui caractérise l'aptitude d'un instrument de mesurage à donner
      la même indication lorsqu'on atteint une même valeur de la grandeur mesurée,
      que cette valeur ait été atteinte par variation croissante continue ou décroissante
      continue de la grandeur.
