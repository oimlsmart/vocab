data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: 'Équation dans laquelle les symboles littéraux représentent des unités
      de mesure. Cette équation a pour objet : soit de définir les unités de mesure
      des grandeurs dérivées, dans un certain système d''unités de mesure, à partir
      des unités des grandeurs de base ou des unités d''autres grandeurs dérivées
      de ce système, soit d''établir la relation entre l''unité de mesure d''une grandeur
      et ses multiples ou sous-multiples, soit de donner l''équivalence entre les
      unités de mesure d''une même grandeur dans des systèmes différents d''unités.'
  examples:
  - content: "$$ 1 \\mathrm {c m} = 0, 0 1 \\mathrm {m}; \\quad 1 \\mathrm {m} ^ {2}
      = 1 \\mathrm {m}, 1 \\mathrm {m}; \\quad 1 \\mathrm {W} = 1 \\mathrm {V}, 1
      \\mathrm {A}; \\quad 1 \\mathrm {m} / \\mathrm {s} = \\frac {1 \\mathrm {m}}{1
      \\mathrm {s}}; $$ $$ 1 k p = 1 k g \\cdot 9, 8 0 6 6 5 m / s ^ {2} = 9, 8 0
      6 6 5 N. $$ Généralement : l'équation entre unités de mesure de l'unité $[x_{n+1}]$
      exprimée par les unités $[x_1][x_2]\\dots[x_n]$ est la suivante : $$ [ x _ {n}
      + 1 ] = \\mathrm {K} [ x _ {1} ] ^ {\\alpha_ {1}} [ x _ {2} ] ^ {\\alpha_ {2}}
      \\dots [ x _ {n} ] ^ {\\alpha_ {n}} $$ ou $ \\alpha_{1}, \\alpha_{2} \\dots
      \\alpha_{n} $ et K sont des valeurs numériques."
  id: 4.4.2-fra
