data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Attribut d'un phénomène ou d'un corps qui est susceptible d'être distinguée
      qualitativement et déterminée quantitativement.
  examples:
  - content: 'a) grandours dans un sens général : longueur, temps, masse, température,
      dureté, résistance électrique b) grandeurs, dans un sens déterminé : longueur
      d''une tige, résistance électrique d''un fil'
  id: 4.1-fra
  notes:
  - content: Lo terme « grandeur » signifie aussl bien une grandeur avec la sens général
      qu'une grandeur déterminée.
  - content: Si aucune confusion n'est à craindre, on peut omettre l'expression mesurable.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Grandeur mesurable
