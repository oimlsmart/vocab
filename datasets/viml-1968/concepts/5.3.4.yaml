  definition:
  - content: Valeur de la grandeur partielle reproduite par la mesure matérialisée
      et indiquée sur cette mesure.
  examples:
  - content: Dans une éprouvette graduée de 100 cm$^3$, chaque volume délimité par
      un trait quelconque, autre que le trait 100, représente un volume nominal partiel
      de l'éprouvette.
