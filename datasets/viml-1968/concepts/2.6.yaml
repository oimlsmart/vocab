  definition:
  - content: |-
      Opération de contrôle que l'on exerce sur la fabrication, la mise en
      service et la réparation des instruments de mesurage ou encore sur leur
      utilisation pour s'assurer qu'ils sont utilisés correctement et
      loyalement.

      Elle s'étend aussi au contrôle de la justesse des quantités indiquées sur
      les produits préparés à l'avance.
