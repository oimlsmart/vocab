    type: accepted
  definition:
  - content: 'Système cohérent d''unités de mesure fondé sur les six unités de base
      suivantes : le mètre, unité de longueur le kilogramme, unité de masse la seconde,
      unité de temps l''ampère, unité d''intensité du courant électrique le kelvin,
      unité de température thermodynamique la candela, unité d''intensité lumineuse
      adopté et recommandé par la Conférence Générale des Poids et Mesures.'
