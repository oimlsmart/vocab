data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Valeur approchée de la valeur vraie d'une grandeur telle que, pour la
      fin à laquelle cette valeur est employée, la différence entre ces deux valeurs
      peut être négligée.
  examples:
  - content: lorsque un compteur d'énergie électrique, dont les erreurs maximales
      tolérées sont égales à $ \pm 2\% $ , est vérifié à l'alde d'un compteur-étalon
      dont l'orreur d'indication ne dépasse pas $ \pm 1\% $ , le compteur-étalon indiquera
      des valeurs conventionnellement vrales de l'énergie électrique pour les buts
      de la vérification ;
  - content: lorsque à son tour le compteur-étalon sera lui-même vérifié à l'aide
      d'un wattmètre-étalon et d'un chronomètre,
  - content: les valeurs obtenues représentront aussi des valeurs conventionnellement
      vraies pour les buts de cette autre vérification.
  id: 4.2.1.1-fra
  notes:
  - content: On détermine généralement la valeur conventionnelle vraie de la grandeur
      au moyen de méthodes et à l'alde d'instruments d'une précision convenable pour
      chaque cas particulier.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Valeur conventionnellement vraie d'une grandeur
