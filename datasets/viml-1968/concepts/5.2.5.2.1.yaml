data:
  dates:
  - date: '1968-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: Méthode de mesurage différentiel où la différence entre la valeur de
      la grandeur à mesurer et la valeur connue de la même grandeur qui lui est comparée
      est amenée à zéro.
  examples:
  - content: détermination d'une masse lorsque la position finale d'équilibre de la
      balance est la même que la position initiale, détermination d'une tension électrique
      au moyen d'un compensateur, mesurage d'une résistance électrique avec un pont
      de Wheatstone et un indicateur de zéro.
  id: 5.2.5.2.1-fra
  notes:
  - content: La grandeur à mesurer peut être remplacée par une grandeur d'une autre
      espèce qui, ello, est comparée à une grandeur de la même espèce.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: Méthode de mesurage par coïncidence
