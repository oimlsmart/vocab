    type: accepted
  definition:
  - content: control exercised in respect of the manufacture, import, installation,
      use, maintenance and repair of measuring instruments, performed in order to
      check that they are used correctly as regards the observance of metrology laws
      and regulations
  examples: []
  id: 2.3-eng
  notes:
  - content: Metrological supervision includes checking the correctness of quantities
      indicated on and contained in pre-packages.
