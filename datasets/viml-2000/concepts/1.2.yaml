data:
  dates:
  - date: '2000-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: partie de la métrologie se rapportant aux activités qui résultent d’exigences
      réglementaires et qui s’appliquent aux mesurages, aux unités de mesure, aux
      instruments de mesure et aux méthodes de mesure et sont effectuées par des orga-nismes
      compétents
  examples: []
  id: 1.2-fra
  notes:
  - content: L’étendue de la métrologie légale peut différer d’un pays à l’autre.
  - content: Les organismes compétents responsables des activités de métrologie légale
      ou d’une partie de ces activités sont généralement appelés services de métrologie
      légale.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: métrologie légale
