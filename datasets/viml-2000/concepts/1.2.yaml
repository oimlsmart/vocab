data:
  dates:
  - date: '2000-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: part of metrology relating to activities which result from statutory
      requirements and concern measurement, units of measurement, measuring instruments
      and methods of measurement and which are performed by competent bodies
  examples: []
  id: 1.2-eng
  notes:
  - content: The scope of legal metrology may be different from country to country.
      The competent bodies responsible for legal metrology activities or part of these
      activities are usually called legal metrology services.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: legal metrology
language_code: eng
