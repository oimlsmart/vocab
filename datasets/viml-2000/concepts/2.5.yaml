data:
  dates:
  - date: '2000-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: examen et essai systématiques des performances d’un ou de plusieurs exemplaires
      d’un type (modèle) identifié d’instrument de mesure par rapport à des exigences
      documentées et dont le résultat est contenu dans un rapport d’évaluation afin
      de déterminer si le type peut être approuvé
  examples: []
  id: 2.5-fra
  notes:
  - content: “Modèle” est utilisé en métrologie légale avec la même signification
      que “type”; dans les entrées ci-après, seul “type” est utilisé.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: évaluation de type (modèle)
