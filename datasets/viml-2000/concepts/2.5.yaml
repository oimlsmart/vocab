data:
  dates:
  - date: '2000-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: systematic examination and testing of the performance of one or more
      specimens of an identified type (pattern) of measuring instruments against documented
      requirements, the results of which are contained in the evaluation report, in
      order to determine whether the type may be approved
  examples: []
  id: 2.5-eng
  notes:
  - content: “Pattern” is used in legal metrology with the same meaning as “type”;
      in the entries below, only “type” is used.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: type evaluation
  - type: expression
    normative_status: admitted
    designation: type (pattern) evaluation
