data:
  dates:
  - date: '2000-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: 'examination of a measuring instrument to ascertain all or some of the
      following: - verification mark and/or certificate is valid, - no sealing marks
      are damaged, - after verification the instrument suffered no obvious modification,
      - its errors do not exceed the maximum permissible in-service errors'
  examples: []
  id: 2.21-eng
  notes:
  - content: Inspection of a measuring instrument may be done only after verification.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: inspection of a measuring instrument
