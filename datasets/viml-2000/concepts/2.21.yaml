data:
  dates:
  - date: '2000-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: 'examen d’un instrument de mesure visant à s’assurer d’un ou plusieurs
      des éléments suivants: - la marque de vérification et/ou le certificat est valide,
      - aucune marque de scellement n’a été endommagée, - après vérification, l’instrument
      n’a pas subi de modifica-tions évidentes, - ses erreurs ne dépassent pas les
      erreurs maximales tolérées en service'
  examples: []
  id: 2.21-fra
  notes:
  - content: L’inspection d’un instrument de mesure ne peut être effectuée qu’après
      la vérification.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: inspection d’un instrument de mesure
