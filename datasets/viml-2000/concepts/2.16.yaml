data:
  dates:
  - date: '2000-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: 'toute vérification d’un instrument de mesure qui suit une vérification
      précédente, y compris: - la vérification périodique obligatoire, - la vérification
      après réparation'
  examples: []
  id: 2.16-fra
  notes:
  - content: La vérification ultérieure d’un instrument de mesure peut être effectuée
      avant l’expiration de la période de validité de la vérification précédente soit
      à la demande de l’utilisateur (propriétaire) soit quand sa vérification est
      déclarée comme n’étant plus valable.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: vérification ultérieure
