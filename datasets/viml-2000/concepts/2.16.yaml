data:
  dates:
  - date: '2000-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: 'any verification of a measuring instrument after a previous verification
      and including: - mandatory periodic verification, - verification after repair'
  examples: []
  id: 2.16-eng
  notes:
  - content: Subsequent verification of a measuring instrument may be carried out
      before expiry of the period of validity of a previous verification either at
      the request of the user (owner) or when its verification is declared to be no
      longer valid.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: subsequent verification
