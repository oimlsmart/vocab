data:
  dates:
  - date: '2000-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: essai et évaluation d’instruments de mesure visant à s’assurer qu’un
      instrument individuel, un lot d’instruments ou une production en série d’instruments
      satisfont ou non à toutes les exigences réglementaires applicables au type d’instrument
  examples: []
  id: 2.11-fra
  notes:
  - content: 'L’évaluation de conformité ne concerne pas seulement les exigences métrologiques
      mais aussi des exigences relatives à: la sécurité, la compatibilité électromagnétique,
      l’identification des logiciels, la facilité d’utilisation, le marquage, etc.'
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: évaluation de conformité d’un instrument de mesure
