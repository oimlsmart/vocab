  definition:
  - content: testing and evaluation of measuring instruments to ascertain whether
      or not a single instrument, an instrument lot or a production series of instruments
      comply with all statutory requirements applicable to this instrument type
  examples: []
  id: 2.11-eng
  notes:
  - content: 'Conformity assessment does not only concern metrological requirements
      but also requirements relating to: safety, EMC, software identification, ease
      of use, marking, etc.'
  sources: []
