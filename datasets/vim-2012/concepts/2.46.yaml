data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: comparabilité de {{2.9,résultats de mesure}}, pour des {{1.1,grandeurs}}
      d'une {{1.2,nature}} donnée, qui sont métrologiquement traçables à une même
      référence
  examples:
  - content: Des résultats de mesure pour les distances entre la Terre et la Lune
      et entre Paris et Londres sont métrologiquement comparables s'ils sont métrologiquement
      traçables à la même {{1.9,unité de mesure}}, par exemple le mètre.
  id: 2.46-fra
  language_code: fra
  notes:
  - content: Voir la Note 1 de 2.41, {{2.41,traçabilité métrologique}}.
  - content: La comparabilité métrologique ne nécessite pas que les {{2.10,valeurs mesurées}}
      et les {{2.26,incertitudes de mesure}} associées soient du même ordre de grandeur.
  terms:
  - type: expression
    normative_status: preferred
    designation: comparabilité métrologique
date_accepted: '2012-01-01T00:00:00+00:00'
