data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: comparability of {{2.9,measurement results}}, for {{1.1,quantities}}
      of a given {{1.2,kind}}, that are metrologically traceable to the same reference
  examples:
  - content: Measurement results, for the distances between the Earth and the Moon,
      and between Paris and London, are metrologically comparable when they are both
      metrologically traceable to the same {{1.9,measurement unit}}, for instance
      the metre.
  id: 2.46-eng
  language_code: eng
  notes:
  - content: See Note 1 to 2.41 {{2.41,metrological traceability}}.
  - content: Metrological comparability of measurement results does not necessitate
      that the {{2.10,measured quantity values}} and associated {{2.26,measurement uncertainties}}
      compared be of the same order of magnitude.
  terms:
  - type: expression
    normative_status: preferred
    designation: metrological comparability of measurement results
  - type: expression
    normative_status: admitted
    designation: metrological comparability
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
