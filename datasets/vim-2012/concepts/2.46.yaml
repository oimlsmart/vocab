data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: comparability of {{measurement results,2.9}}, for {{quantities,1.1}}
      of a given {{kind,1.2}}, that are metrologically traceable to the same reference
  examples:
  - content: Measurement results, for the distances between the Earth and the Moon,
      and between Paris and London, are metrologically comparable when they are both
      metrologically traceable to the same {{measurement unit,1.9}}, for instance
      the metre.
  id: 2.46-eng
  language_code: eng
  notes:
  - content: See Note 1 to 2.41 {{metrological traceability,2.41}}.
  - content: Metrological comparability of measurement results does not necessitate
      that the {{measured quantity values,2.10}} and associated {{measurement uncertainties,2.26}}
      compared be of the same order of magnitude.
  terms:
  - type: expression
    normative_status: preferred
    designation: metrological comparability of measurement results
  - type: expression
    normative_status: admitted
    designation: metrological comparability
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
