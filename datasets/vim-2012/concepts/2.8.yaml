data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{2.7,procédure de mesure de référence}} utilisée pour obtenir un {{2.9,résultat de mesure}} sans relation avec un {{5.1,étalon}} d'une {{1.1,grandeur}}
      de même {{1.2,nature}}"
  examples:
  - content: Le volume d'eau délivré par une pipette de 5 ml à 20 °C est mesuré en
      pesant l'eau délivrée par la pipette dans un bécher, en prenant la différence
      entre la masse du bécher contenant l'eau et la masse du bécher initialement
      vide, puis en corrigeant la différence de masse pour la température réelle de
      l'eau par l'intermédiaire de la masse volumique.
  id: 2.8-fra
  language_code: fra
  notes:
  - content: Le Comité consultatif pour la quantité de matière – Métrologie en chimie
      (CCQM) utilise pour ce concept le terme «méthode de mesure primaire».
  - content: Le CCQM a donné (5e réunion, 1999) [43] les définitions de deux concepts
      subordonnés, que l'on pourrait dénommer «procédure de mesure primaire directe»
      et «procédure primaire de mesure de rapports».
  terms:
  - type: expression
    normative_status: preferred
    designation: procédure de mesure primaire
  - type: expression
    normative_status: admitted
    designation: procédure opératoire primaire
    grammar_info:
    - gender: f
  annotations:
  - content: ANNOTATION (pour la Note 1) (informative) [9 juin 2016] Les termes «méthode
      primaire», «méthode primaire de mesure» et «méthode de mesure primaire» sont
      généralement utilisés pour une méthode servant à obtenir un résultat de mesure
      sans relation avec un étalon d'une grandeur de même nature.
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
