data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: propriété d'un {{3.1,instrument de mesure}} selon laquelle celui-ci conserve
      ses propriétés métrologiques constantes au cours du temps
  examples:
  - content: Par la durée d'un intervalle de temps au cours duquel une propriété métrologique
      évolue d'une quantité donnée.
  - content: Par la variation d'une propriété au cours d'un intervalle de temps déterminé.
  id: 4.19-fra
  language_code: fra
  notes:
  - content: La stabilité d'un instrument de mesure peut être exprimée quantitativement
      de plusieurs façons.
  terms:
  - type: expression
    normative_status: preferred
    designation: stabilité
  - type: expression
    normative_status: admitted
    designation: constance
