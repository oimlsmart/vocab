data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: extreme value of {{2.16,measurement error}}, with respect to a known {{5.18,reference quantity value}}, permitted by specifications or regulations for a given {{2.1,measurement}}, {{3.1,measuring instrument}}, or {{3.2,measuring system}}
  examples: []
  id: 4.26-eng
  language_code: eng
  notes:
  - content: Usually, the term “maximum permissible errors” or “limits of error” is used where there are two extreme values.
  - content: The term “tolerance” should not be used to designate 'maximum permissible error'.
  terms:
  - type: expression
    normative_status: preferred
    designation: maximum permissible measurement error
  - type: expression
    normative_status: admitted
    designation: maximum permissible error
  - type: expression
    normative_status: admitted
    designation: limit of error
  annotations:
  - content: 'Here "reference quantity value" can be replaced by "reference value" without ambiguity: "extreme value of measurement error, with respect to a known reference value, permitted by specifications or regulations for a given measurement, measuring instrument, or measuring system".'
date_accepted: '2012-01-01T00:00:00+00:00'
