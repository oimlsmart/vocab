data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: valeur extrême de l'{{erreur de mesure,2.16}}, par rapport à une {{valeur
      de référence,5.18}} connue, qui est tolérée par les spécifications ou règlements
      pour un {{mesurage,2.1}}, un {{instrument de mesure,3.1}} ou un {{système de
      mesure,3.2}} donné
  examples: []
  id: 4.26-fra
  language_code: fra
  notes:
  - content: Les termes «erreurs maximales tolérées» ou «limites d'erreur» sont généralement
      utilisés lorsqu'il y a deux valeurs extrêmes.
  - content: Il convient de ne pas utiliser le terme «tolérance» pour désigner l'erreur
      maximale tolérée.
  terms:
  - type: expression
    normative_status: preferred
    designation: erreur maximale tolérée
  - type: expression
    normative_status: admitted
    designation: limite d'erreur, f
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
id: 756ff767-4c13-469a-a498-4cdf582f644f
