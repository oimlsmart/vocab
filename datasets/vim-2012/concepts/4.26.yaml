data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: valeur extrême de l'{{2.16,erreur de mesure}}, par rapport à une {{5.18,valeur de référence}} connue, qui est tolérée par les spécifications ou règlements pour un {{2.1,mesurage}}, un {{3.1,instrument de mesure}} ou un {{3.2,système de mesure}} donné
  examples: []
  id: 4.26-fra
  language_code: fra
  notes:
  - content: Les termes «erreurs maximales tolérées» ou «limites d'erreur» sont généralement utilisés lorsqu'il y a deux valeurs extrêmes.
  - content: Il convient de ne pas utiliser le terme «tolérance» pour désigner l'erreur maximale tolérée.
  terms:
  - type: expression
    normative_status: preferred
    designation: erreur maximale tolérée
  - type: expression
    normative_status: admitted
    designation: limite d'erreur
    grammar_info:
    - gender: f
