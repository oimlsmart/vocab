data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{1.9,unité de mesure}} d'une {{1.5,grandeur dérivée}}"
  examples:
  - content: Le mètre par seconde, symbole m/s, et le centimètre par seconde, symbole
      cm/s, sont des unités dérivées de vitesse dans le {{1.16,SI}}. Le kilomètre
      par heure, symbole km/h, est une unité de vitesse en dehors du SI mais dont
      l'usage est accepté avec le SI. Le noeud, égal à un mille marin par heure, est
      une unité de vitesse en dehors du SI.
  id: 1.11-fra
  language_code: fra
  notes: []
