  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{1.9,measurement unit}} for a {{1.5,derived quantity}}"
  examples:
  - content: The metre per second, symbol m/s, and the centimetre per second, symbol
      cm/s, are derived units of speed in the {{1.16,SI}}. The kilometre per hour,
      symbol km/h, is a measurement unit of speed outside the SI but accepted for
      use with the SI. The knot, equal to one nautical mile per hour, is a measurement
      unit of speed outside the SI.
  id: 1.11-eng
  language_code: eng
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: derived unit
