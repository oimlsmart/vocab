data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: '{{5.1,étalon}} qui est utilisé couramment pour étalonner ou contrôler
      des {{3.1,instruments de mesure}} ou des {{3.2,systèmes de mesure}}'
  examples: []
  id: 5.7-fra
  language_code: fra
  notes:
  - content: Un étalon de travail est habituellement étalonné par rapport à un {{5.6,étalon de référence}}.
  - content: Un étalon de travail servant à la {{2.44,vérification}} est aussi désigné
      comme «étalon de vérification» ou «étalon de contrôle».
  terms:
  - type: expression
    normative_status: preferred
    designation: étalon de travail
