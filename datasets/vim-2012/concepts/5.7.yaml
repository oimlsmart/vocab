data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: '{{5.1,measurement standard}} that is used routinely to calibrate or
      verify {{3.1,measuring instruments}} or {{3.2,measuring systems}}'
  examples: []
  id: 5.7-eng
  language_code: eng
  notes:
  - content: A working measurement standard is usually calibrated with respect to
      a {{5.6,reference measurement standard}}.
  - content: In relation to {{2.44,verification}}, the terms “check standard” or “control
      standard” are also sometimes used.
  terms:
  - type: expression
    normative_status: preferred
    designation: working measurement standard
  - type: expression
    normative_status: admitted
    designation: working standard
date_accepted: '2012-01-01T00:00:00+00:00'
