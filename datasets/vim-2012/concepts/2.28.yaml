  - content: évaluation d'une composante de l'{{incertitude de mesure,2.26}} par une
      analyse statistique des {{valeurs mesurées,2.10}} obtenues dans des conditions
      définies de {{mesurage,2.1}}
  examples: []
  id: 2.28-fra
  language_code: fra
  notes:
