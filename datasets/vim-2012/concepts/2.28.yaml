      {{condition de fidélité intermédiaire,2.22}} et {{condition de reproductibilité,2.24}}.
  - content: Voir par exemple le Guide ISO/CEI 98-3 pour des informations sur l'analyse
      statistique.
  - content: Voir aussi le Guide ISO/CEI 98-3:2008, 2.3.2, l'ISO 5725, l'ISO 13528,
      l'ISO/TS 21748 et l'ISO 21749.
  terms:
  - type: expression
    normative_status: preferred
    designation: évaluation de type A de l'incertitude
  - type: expression
