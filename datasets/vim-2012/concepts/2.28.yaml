data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: evaluation of a component of {{measurement uncertainty,2.26}} by a statistical
      analysis of {{measured quantity values,2.10}} obtained under defined {{measurement,2.1}}
      conditions
  examples: []
  id: 2.28-eng
  language_code: eng
  notes:
  - content: For various types of measurement conditions, see {{repeatability condition
      of measurement,2.20}}, {{intermediate precision condition of measurement,2.22}},
      and {{reproducibility condition of measurement,2.24}}.
  - content: For information about statistical analysis, see e.g. ISO/IEC Guide 98-3.
  - content: See also ISO/IEC Guide 98-3:2008, 2.3.2, ISO 5725, ISO 13528, ISO/TS
      21748, ISO 21749.
  terms:
  - type: expression
    normative_status: preferred
    designation: Type A evaluation of measurement uncertainty
  - type: expression
    normative_status: admitted
    designation: Type A evaluation
  annotations:
  - content: 'Here "measured quantity values" can be replaced with "measured values"
      without ambiguity: "evaluation of a component of uncertainty by a statistical
      analysis of measured values obtained under defined measurement conditions".'
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
