  definition:
  - content: évaluation d'une composante de l'{{2.26,incertitude de mesure}} par une
      analyse statistique des {{2.10,valeurs mesurées}} obtenues dans des conditions
      définies de {{2.1,mesurage}}
  examples: []
  id: 2.28-fra
  language_code: fra
  notes:
  - content: Pour divers types de conditions de mesurage, voir {{2.20,condition de répétabilité}},
      {{2.22,condition de fidélité intermédiaire}} et {{2.24,condition de reproductibilité}}.
  - content: Voir par exemple le Guide ISO/CEI 98-3 pour des informations sur l'analyse
      statistique.
  - content: Voir aussi le Guide ISO/CEI 98-3:2008, 2.3.2, l'ISO 5725, l'ISO 13528,
      l'ISO/TS 21748 et l'ISO 21749.
  terms:
  - type: expression
    normative_status: preferred
    designation: évaluation de type A de l'incertitude
  - type: expression
    normative_status: admitted
    designation: évaluation de type A
