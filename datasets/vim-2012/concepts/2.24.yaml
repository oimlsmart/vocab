  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: condition of {{measurement,2.1}}, out of a set of conditions that includes
      different locations, operators, {{measuring systems,3.2}}, and replicate measurements
      on the same or similar objects
  examples: []
  id: 2.24-eng
  language_code: eng
  notes:
  - content: The different measuring systems may use different {{measurement procedures,2.6}}.
  - content: A specification should give the conditions changed and unchanged, to
      the extent practical.
  terms:
  - type: expression
    normative_status: preferred
    designation: reproducibility condition of measurement
  - type: expression
    normative_status: admitted
    designation: reproducibility condition
