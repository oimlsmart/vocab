data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{5.1,measurement standard}} based on an inherent and reproducible property
      of a phenomenon or substance"
  examples:
  - content: Triple-point-of-water cell as an intrinsic measurement standard of thermodynamic
      temperature.
  - content: Intrinsic measurement standard of electric potential difference based
      on the Josephson effect.
  - content: Intrinsic measurement standard of electric resistance based on the quantum
      Hall effect.
  - content: Sample of copper as an intrinsic measurement standard of electric conductivity.
  id: 5.10-eng
  language_code: eng
  notes:
  - content: 'A {{1.19,quantity value}} of an intrinsic measurement standard is assigned
      by consensus and does not need to be established by relating it to another measurement
      standard of the same type. Its {{2.26,measurement uncertainty}} is determined
      by considering two components: the first associated with its consensus quantity
      value and the second associated with its construction, implementation, and maintenance.'
  - content: An intrinsic measurement standard usually consists of a system produced
      according to the requirements of a consensus procedure and subject to periodic
      {{2.44,verification}}. The consensus procedure may contain provisions for the
      application of {{2.53,corrections}} necessitated by the implementation.
  - content: Intrinsic measurement standards that are based on quantum phenomena usually
      have outstanding {{4.19,stability}}.
  - content: The adjective “intrinsic” does not mean that such a measurement standard
      may be implemented and used without special care or that such a measurement
      standard is immune to internal and external influences.
  terms:
  - type: expression
    normative_status: preferred
    designation: intrinsic measurement standard
  - type: expression
    normative_status: admitted
    designation: intrinsic standard
date_accepted: '2012-01-01T00:00:00+00:00'
