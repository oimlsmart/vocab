data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{5.1,étalon}} fondé sur une propriété intrinsèque et reproductible
      d'un phénomène ou d'une substance"
  examples:
  - content: Étalon intrinsèque de température thermodynamique constitué d'une cellule
      à point triple de l'eau.
  - content: Étalon intrinsèque de différence de potentiel électrique fondé sur l'effet
      Josephson.
  - content: Étalon intrinsèque de résistance électrique fondé sur l'effet Hall quantique.
  - content: Étalon intrinsèque de conductivité électrique constitué d'un spécimen
      de cuivre.
  id: 5.10-fra
  language_code: fra
  notes:
  - content: La {{1.19,valeur}} d'un étalon intrinsèque est assignée par consensus
      et n'a pas besoin d'être établie en le reliant à un autre étalon de même type.
      Son {{2.26,incertitude de mesure}} est déterminée en prenant en compte deux
      composantes, l'une associée à la valeur de consensus et l'autre associée à la
      construction, la mise en oeuvre et la maintenance.
  - content: Un étalon intrinsèque consiste généralement en un système fabriqué conformément
      aux exigences d'une procédure de consensus et il est soumis à une {{2.44,vérification}}
      périodique. La procédure de consensus peut comprendre des dispositions pour
      appliquer les {{2.53,corrections}} nécessaires à la mise en oeuvre.
  - content: Les étalons intrinsèques fondés sur des phénomènes quantiques ont généralement
      une {{4.19,stabilité}} exceptionnelle.
  - content: L'adjectif «intrinsèque» ne signifie pas que l'étalon peut être mis en
      oeuvre et utilisé sans précautions particulières ou qu'il est protégé d'influences
      internes et externes.
  terms:
  - type: expression
    normative_status: preferred
    designation: étalon intrinsèque
date_accepted: '2012-01-01T00:00:00+00:00'
