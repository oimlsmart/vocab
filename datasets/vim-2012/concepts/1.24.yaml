data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: ratio of two {{measurement units,1.9}} for {{quantities,1.1}} of the
      same {{kind,1.2}}
  examples:
  - content: km/m = 1 000 and thus 1 km = 1 000 m.
  - content: h/s = 3 600 and thus 1 h = 3 600 s.
  - content: (km/h)/(m/s) = (1/3.6) and thus 1 km/h = (1/3.6) m/s.
  id: 1.24-eng
  language_code: eng
  notes:
  - content: The measurement units may belong to different {{systems of units,1.13}}.
  terms:
  - type: expression
    normative_status: preferred
    designation: conversion factor between units
