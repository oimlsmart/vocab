data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{1.11,derived unit}} that, for a given {{1.3,system of quantities}}
      and for a chosen set of {{1.10,base units}}, is a product of powers of base
      units with no other proportionality factor than one"
  examples:
  - content: If the metre, the second, and the mole are base units, the metre per
      second is the coherent derived unit of velocity when velocity is defined by
      the {{1.22,quantity equation}}v = dr/dt, and the mole per cubic metre is the
      coherent derived unit of amount-of-substance concentration when amount-of-substance
      concentration is defined by the quantity equation c= n/V. The kilometre per
      hour and the knot, given as examples of derived units in 1.11, are not coherent
      derived units in such a system of quantities.
  - content: The centimetre per second is the coherent derived unit of speed in a
      CGS {{1.13,system of units}} but is not a coherent derived unit in the {{1.16,SI}}.
  id: 1.12-eng
  language_code: eng
  notes:
  - content: A power of a base unit is the base unit raised to an exponent.
  - content: Coherence can be determined only with respect to a particular system
      of quantities and a given set of base units.
  - content: A derived unit can be coherent with respect to one system of quantities
      but not to another.
  - content: The coherent derived unit for every derived {{1.8,quantity of dimension one}}
      in a given system of units is the number one, symbol 1. The name and symbol
      of the {{1.9,measurement unit}} one are generally not indicated.
  terms:
  - type: expression
    normative_status: preferred
    designation: coherent derived unit
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
