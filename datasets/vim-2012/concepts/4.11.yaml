  definition:
  - content: operating condition prescribed for evaluating the performance of a {{3.1,measuring instrument}} or {{3.2,measuring system}} or for comparison of {{2.9,measurement results}}
  examples: []
  id: 4.11-eng
  language_code: eng
  notes:
  - content: Reference operating conditions specify intervals of {{1.19,values}} of the {{2.3,measurand}} and of the {{2.52,influence quantities}}.
  - content: In IEC 60050-300, item 311-06-02, the term “reference condition” refers to an operating condition under which the specified {{4.24,instrumental measurement uncertainty}} is the smallest possible.
