data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: operating condition prescribed for evaluating the performance of a {{measuring
      instrument,3.1}} or {{measuring system,3.2}} or for comparison of {{measurement
      results,2.9}}
  examples: []
  id: 4.11-eng
  language_code: eng
  notes:
  - content: Reference operating conditions specify intervals of {{values,1.19}} of
      the {{measurand,2.3}} and of the {{influence quantities,2.52}}.
  - content: In IEC 60050-300, item 311-06-02, the term “reference condition” refers
      to an operating condition under which the specified {{instrumental measurement
      uncertainty,4.24}} is the smallest possible.
  terms:
  - type: expression
    normative_status: preferred
    designation: reference operating condition
  - type: expression
    normative_status: admitted
    designation: reference condition
