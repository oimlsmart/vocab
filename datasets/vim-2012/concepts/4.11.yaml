  definition:
  - content: condition de fonctionnement prescrite pour évaluer les performances d'un
      {{instrument de mesure,3.1}} ou d'un {{système de mesure,3.2}} ou pour comparer
      des {{résultats de mesure,2.9}}
  examples: []
  id: 4.11-fra
  language_code: fra
  notes:
  - content: Les conditions de fonctionnement de référence spécifient des intervalles
      de {{valeurs,1.19}} du {{mesurande,2.3}} et des {{grandeurs d'influence,2.52}}.
  - content: Dans la CEI 60050-300, no 311-06-02, le terme «condition de référence»
      désigne une condition de fonctionnement dans laquelle l'{{incertitude instrumentale,4.24}}
      spécifiée est la plus petite possible.
  terms:
  - type: expression
    normative_status: preferred
    designation: condition de fonctionnement de référence
