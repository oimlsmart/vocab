data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: operation that, under specified conditions, in a first step, establishes
      a relation between the {{quantity values,1.19}} with {{measurement uncertainties,2.26}}
      provided by {{measurement standards,5.1}} and corresponding {{indications,4.1}}
      with associated measurement uncertainties and, in a second step, uses this information
      to establish a relation for obtaining a {{measurement result,2.9}} from an indication
  examples: []
  id: 2.39-eng
  language_code: eng
  notes:
  - content: A calibration may be expressed by a statement, calibration function,
      {{calibration diagram,4.30}}, {{calibration curve,4.31}}, or calibration table.
      In some cases, it may consist of an additive or multiplicative {{correction,2.53}}
      of the indication with associated measurement uncertainty.
  - content: Calibration should not be confused with {{adjustment of a measuring system,3.11}},
      often mistakenly called “self-calibration”, nor with {{verification,2.44}} of
      calibration.
  - content: Often, the first step alone in the above definition is perceived as being
      calibration.
  - content: '[Annotation] The VIM3 definition of calibration extends the previous
      (VIM2) one-step definition. For practical reasons a second operational step
      is introduced in order to facilitate assigning a measured value and measurement
      uncertainty to an item being measured by the calibrated measuring instrument.
      In the past this second step was usually considered to occur after the calibration.
      Both steps together facilitate in a practical way the demonstration of metrological
      traceability of measurement results (measured values and associated measurement
      uncertainty) obtained when using the measuring instrument after it has been
      calibrated.'
  - content: '[Annotation] Calibration should not be confused with verification or
      adjustment. Calibration is a prerequisite for verification, which provides confirmation
      that specified requirements (often maximum permissible errors) are met. Calibration
      is also a prerequisite for adjustment, which is the set of operations carried
      out on a measuring system such that the system provides prescribed indications
      corresponding to given values of quantities to be measured, typically obtained
      from measurement standards.'
  terms:
  - type: expression
    normative_status: preferred
    designation: calibration
date_accepted: '2012-01-01T00:00:00+00:00'
