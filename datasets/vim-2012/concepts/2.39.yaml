data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: operation that, under specified conditions, in a first step, establishes
      a relation between the {{1.19,quantity values}} with {{2.26,measurement uncertainties}}
      provided by {{5.1,measurement standards}} and corresponding {{4.1,indications}}
      with associated measurement uncertainties and, in a second step, uses this information
      to establish a relation for obtaining a {{2.9,measurement result}} from an indication
  examples: []
  id: 2.39-eng
  language_code: eng
  notes:
  - content: A calibration may be expressed by a statement, calibration function,
      {{4.30,calibration diagram}}, {{4.31,calibration curve}}, or calibration table.
      In some cases, it may consist of an additive or multiplicative {{2.53,correction}}
      of the indication with associated measurement uncertainty.
  - content: Calibration should not be confused with {{3.11,adjustment of a measuring system}},
      often mistakenly called “self-calibration”, nor with {{2.44,verification}} of
      calibration.
  - content: Often, the first step alone in the above definition is perceived as being
      calibration.
  terms:
  - type: expression
    normative_status: preferred
    designation: calibration
  annotations:
  - content: The VIM3 definition of calibration extends the previous (VIM2) one-step
      definition. For practical reasons a second operational step is introduced in
      order to facilitate assigning a measured value and measurement uncertainty to
      an item being measured by the calibrated measuring instrument. In the past this
      second step was usually considered to occur after the calibration. Both steps
      together facilitate in a practical way the demonstration of metrological traceability
      of measurement results (measured values and associated measurement uncertainty)
      obtained when using the measuring instrument after it has been calibrated.
  - content: Calibration should not be confused with verification or adjustment. Calibration
      is a prerequisite for verification, which provides confirmation that specified
      requirements (often maximum permissible errors) are met. Calibration is also
      a prerequisite for adjustment, which is the set of operations carried out on
      a measuring system such that the system provides prescribed indications corresponding
      to given values of quantities to be measured, typically obtained from measurement
      standards.
date_accepted: '2012-01-01T00:00:00+00:00'
