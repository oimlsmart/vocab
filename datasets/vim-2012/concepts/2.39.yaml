data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: opération qui, dans des conditions spécifiées, établit en une première
      étape une relation entre les {{valeurs,1.19}} et les {{incertitudes de mesure,2.26}}
      associées qui sont fournies par des {{étalons,5.1}} et les {{indications,4.1}}
      correspondantes avec les incertitudes associées, puis utilise en une seconde
      étape cette information pour établir une relation permettant d'obtenir un {{résultat
      de mesure,2.9}} à partir d'une indication
  examples: []
  id: 2.39-fra
  language_code: fra
  notes:
  - content: Un étalonnage peut être exprimé sous la forme d'un énoncé, d'une fonction
      d'étalonnage, d'un {{diagramme d'étalonnage,4.30}}, d'une {{courbe d'étalonnage,4.31}}
      ou d'une table d'étalonnage. Dans certains cas, il peut consister en une {{correction,2.53}}
      additive ou multiplicative de l'indication avec une incertitude de mesure associée.
  - content: Il convient de ne pas confondre l'étalonnage avec l'{{ajustage d'un système
      de mesure,3.11}}, souvent appelé improprement «auto-étalonnage», ni avec la
      {{vérification,2.44}} de l'étalonnage.
  - content: La seule première étape dans la définition est souvent perçue comme étant
      l'étalonnage.
  - content: '[Annotation] La définition de l''étalonnage dans le VIM3 étend la définition
      précédente comportant une seule étape (VIM2). Pour des raisons pratiques, une
      deuxième étape opérationnelle est introduite pour faciliter l''attribution d''une
      valeur mesurée et d''une incertitude de mesure à une entité mesurée par un instrument
      de mesure étalonné. Cette deuxième étape était généralement considérée dans
      le passé comme effectuée après l''étalonnage. L''ensemble des deux étapes facilite
      en pratique la preuve de la traçabilité métrologique des résultats de mesure
      (valeur mesurée et incertitude de mesure associée) obtenus en utilisant l''instrument
      de mesure après son étalonnage.'
  - content: '[Annotation] Il convient de ne pas confondre l''étalonnage avec la vérification
      ou l''ajustage. L''étalonnage est un préalable à la vérification, qui fournit
      une confirmation que des exigences spécifiées (souvent les erreurs maximales
      admissibles) sont satisfaites. L''étalonnage est aussi un préalable à l''ajustage,
      qui est l''ensemble des opérations réalisées sur un système de mesure pour qu''il
      fournisse des indications prescrites correspondant à des valeurs données des
      grandeurs à mesurer, habituellement à partir d''étalons de mesure.'
  terms:
  - type: expression
    normative_status: preferred
    designation: étalonnage
date_accepted: '2012-01-01T00:00:00+00:00'
