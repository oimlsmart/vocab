data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{system of units,1.13}}, based on the {{International System of Quantities,1.6}},
      their names and symbols, including a series of prefixes and their names and
      symbols, together with rules for their use, adopted by the General Conference
      on Weights and Measures (CGPM)"
  examples: []
  id: 1.16-eng
  language_code: eng
  notes:
  - content: |-
      The SI is founded on the seven {{base quantities,1.4}} of the {{ISQ,1.6}} and the names and symbols of the corresponding {{base units,1.10}} that are contained in the following table.

      |===
      | lengthlongueur | metremètre
      | massmasse | kilogramkilogramme
      | timetemps | secondseconde
      | electric currentcourant électrique | ampereampère
      | thermodynamic temperaturetempérature thermodynamique | kelvinkelvin
      | amount of substancequantité de matière | molemole
      | luminous intensityintensité lumineuse | candelacandela
      |===
  - content: The base units and the {{coherent derived units,1.12}} of the SI form
      a coherent set, designated the “set of coherent SI units”.
  - content: For a full description and explanation of the International System of
      Units, see the current edition of the SI brochure published by the Bureau International
      des Poids et Mesures (BIPM) and available on the BIPM website.
  - content: In {{quantity calculus,1.21}}, the quantity 'number of entities' is often
      considered to be a base quantity, with the base unit one, symbol 1.
  - content: |-
      The SI prefixes for {{multiples of units,1.17}} and {{submultiples of units,1.18}} are:

      |===
      | 1024 | yottayotta
      | 1021 | zettazetta
      | 1018 | exaexa
      | 1015 | petapéta
      | 1012 | teratéra
      | 109 | gigagiga
      | 106 | megaméga
      | 103 | kilokilo
      | 102 | hectohecto
      | 101 | decadéca
      | 10-1 | decidéci
      | 10-2 | centicenti
      | 10-3 | millimilli
      | 10-6 | micromicro
      | 10-9 | nanonano
      | 10-12 | picopico
      | 10-15 | femtofemto
      | 10-18 | attoatto
      | 10-21 | zeptozepto
      | 10-24 | yoctoyocto
      |===
  terms:
  - type: expression
    normative_status: preferred
    designation: International System of Units
  - type: expression
    normative_status: admitted
    designation: SI
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
