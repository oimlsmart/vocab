data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{système d'unités,1.13}}, fondé sur le {{Système international de grandeurs,1.6}},
      comportant les noms et symboles des unités, une série de préfixes avec leurs
      noms et symboles, ainsi que des règles pour leur emploi, adopté par la Conférence
      générale des poids et mesures (CGPM)"
  examples: []
  id: 1.16-fra
  language_code: fra
  notes:
  - content: |-
      Le SI est fondé sur les sept {{grandeurs de base,1.4}} de l'{{ISQ,1.6}}. Les noms et les symboles des {{unités de base,1.10}} sont donnés dans le tableau suivant.

      |===
      | lengthlongueur | metremètre
      | massmasse | kilogramkilogramme
      | timetemps | secondseconde
      | electric currentcourant électrique | ampereampère
      | thermodynamic temperaturetempérature thermodynamique | kelvinkelvin
      | amount of substancequantité de matière | molemole
      | luminous intensityintensité lumineuse | candelacandela
      |===
  - content: Les unités de base et les {{unités dérivées cohérentes,1.12}} du SI forment
      un ensemble cohérent, appelé «ensemble des unités SI cohérentes».
  - content: Pour une description et une explication complètes du Système international
      d'unités, voir la dernière édition de la brochure du SI publiée par le Bureau
      international des poids et mesures (BIPM) et disponible sur le site internet
      du BIPM.
  - content: En {{algèbre des grandeurs,1.21}}, la grandeur «nombre d'entités» est
      souvent considérée comme une grandeur de base, avec l'unité de base un, symbole
      1.
  - content: |-
      Les préfixes SI pour les {{multiples des unités,1.17}} et {{sous-multiples des unités,1.18}} sont:

      |===
      | 1024 | yottayotta
      | 1021 | zettazetta
      | 1018 | exaexa
      | 1015 | petapéta
      | 1012 | teratéra
      | 109 | gigagiga
      | 106 | megaméga
      | 103 | kilokilo
      | 102 | hectohecto
      | 101 | decadéca
      | 10-1 | decidéci
      | 10-2 | centicenti
      | 10-3 | millimilli
      | 10-6 | micromicro
      | 10-9 | nanonano
      | 10-12 | picopico
      | 10-15 | femtofemto
      | 10-18 | attoatto
      | 10-21 | zeptozepto
      | 10-24 | yoctoyocto
      |===
  terms:
  - type: expression
    normative_status: preferred
    designation: Système international d'unités
  - type: expression
    normative_status: admitted
    designation: SI
    grammar_info:
    - gender: m
