data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{1.13,system of units}}, based on the {{1.6,International System of Quantities}}, their names and symbols, including a series of prefixes and their names and symbols, together with rules for their use, adopted by the General Conference on Weights and Measures (CGPM)"
  examples: []
  id: 1.16-eng
  language_code: eng
  notes:
  - content: |-
      The SI is founded on the seven {{1.4,base quantities}} of the {{1.6,ISQ}} and the names and symbols of the corresponding {{1.10,base units}} that are contained in the following table.

      |===
      | lengthlongueur | metremètre
      | massmasse | kilogramkilogramme
      | timetemps | secondseconde
      | electric currentcourant électrique | ampereampère
      | thermodynamic temperaturetempérature thermodynamique | kelvinkelvin
      | amount of substancequantité de matière | molemole
      | luminous intensityintensité lumineuse | candelacandela
      |===
  - content: The base units and the {{1.12,coherent derived units}} of the SI form a coherent set, designated the “set of coherent SI units”.
  - content: For a full description and explanation of the International System of Units, see the current edition of the SI brochure published by the Bureau International des Poids et Mesures (BIPM) and available on the BIPM website.
  - content: In {{1.21,quantity calculus}}, the quantity 'number of entities' is often considered to be a base quantity, with the base unit one, symbol 1.
  - content: |-
      The SI prefixes for {{1.17,multiples of units}} and {{1.18,submultiples of units}} are:

      |===
      | 1024 | yottayotta
      | 1021 | zettazetta
      | 1018 | exaexa
      | 1015 | petapéta
      | 1012 | teratéra
      | 109 | gigagiga
      | 106 | megaméga
      | 103 | kilokilo
      | 102 | hectohecto
      | 101 | decadéca
      | 10-1 | decidéci
      | 10-2 | centicenti
      | 10-3 | millimilli
      | 10-6 | micromicro
      | 10-9 | nanonano
      | 10-12 | picopico
      | 10-15 | femtofemto
      | 10-18 | attoatto
      | 10-21 | zeptozepto
      | 10-24 | yoctoyocto
      |===
  terms:
  - type: expression
    normative_status: preferred
    designation: International System of Units
  - type: abbreviation
    normative_status: admitted
    designation: SI
    related:
    - type: abbreviated_form_for
      target: International System of Units
