data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{1.13,système d'unités}}, fondé sur le {{1.6,Système international de grandeurs}}, comportant les noms et symboles des unités, une série de préfixes avec leurs noms et symboles, ainsi que des règles pour leur emploi, adopté par la Conférence générale des poids et mesures (CGPM)"
  examples: []
  id: 1.16-fra
  language_code: fra
  notes:
  - content: |-
      Le SI est fondé sur les sept {{1.4,grandeurs de base}} de l'{{1.6,ISQ}}. Les noms et les symboles des {{1.10,unités de base}} sont donnés dans le tableau suivant.

      |===
      | lengthlongueur | metremètre
      | massmasse | kilogramkilogramme
      | timetemps | secondseconde
      | electric currentcourant électrique | ampereampère
      | thermodynamic temperaturetempérature thermodynamique | kelvinkelvin
      | amount of substancequantité de matière | molemole
      | luminous intensityintensité lumineuse | candelacandela
      |===
  - content: Les unités de base et les {{1.12,unités dérivées cohérentes}} du SI forment un ensemble cohérent, appelé «ensemble des unités SI cohérentes».
  - content: Pour une description et une explication complètes du Système international d'unités, voir la dernière édition de la brochure du SI publiée par le Bureau international des poids et mesures (BIPM) et disponible sur le site internet du BIPM.
  - content: En {{1.21,algèbre des grandeurs}}, la grandeur «nombre d'entités» est souvent considérée comme une grandeur de base, avec l'unité de base un, symbole 1.
  - content: |-
      Les préfixes SI pour les {{1.17,multiples des unités}} et {{1.18,sous-multiples des unités}} sont:

      |===
      | 1024 | yottayotta
      | 1021 | zettazetta
      | 1018 | exaexa
      | 1015 | petapéta
      | 1012 | teratéra
      | 109 | gigagiga
      | 106 | megaméga
      | 103 | kilokilo
      | 102 | hectohecto
      | 101 | decadéca
      | 10-1 | decidéci
      | 10-2 | centicenti
      | 10-3 | millimilli
      | 10-6 | micromicro
      | 10-9 | nanonano
      | 10-12 | picopico
      | 10-15 | femtofemto
      | 10-18 | attoatto
      | 10-21 | zeptozepto
      | 10-24 | yoctoyocto
      |===
