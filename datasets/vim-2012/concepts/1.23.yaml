data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: mathematical relation between {{1.10,base units}}, {{1.12,coherent derived units}} or other {{1.9,measurement units}}
  examples:
  - content: For the {{1.1,quantities}} in Example 1 of item 1.22, [Q1] = [Q2] [Q3]
      where [Q1], [Q2], and [Q3] denote the measurement units of Q1, Q2, and Q3, respectively,
      provided that these measurement units are in a {{1.14,coherent system of units}}.
  - content: J := kg m2/s2, where J, kg, m, and s are the symbols for the joule, kilogram,
      metre, and second, respectively. (The symbol := denotes “is by definition equal
      to” as given in the ISO 80000 and IEC 80000 series.)
  - content: 1 km/h = (1/3.6) m/s.
  id: 1.23-eng
  language_code: eng
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: unit equation
