  examples:
  - content: Pour les {{1.1,grandeurs}} données dans l'
  - content: de 1.22, [Q1] = [Q2] [Q3] où [Q1], [Q2] et [Q3] représentent respectivement
      les unités de Q1, Q2 et Q3, pourvu que ces unités soient dans un {{1.14,système cohérent d'unités}}.
  - content: J := kg m2/s2, où J, kg, m et s sont respectivement les symboles du joule,
      du kilogramme, du mètre et de la seconde. (Le symbole := signifie «est par définition
      égal à», comme indiqué dans les séries ISO 80000 et CEI 80000.)
  - content: 1 km/h = (1/3,6) m/s.
