data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: '{{quantity value,1.19}} provided by a {{measuring instrument,3.1}} or
      a {{measuring system,3.2}}'
  examples: []
  id: 4.1-eng
  language_code: eng
  notes:
  - content: An indication may be presented in visual or acoustic form or may be transferred
      to another device. An indication is often given by the position of a pointer
      on the display for analogue outputs, a displayed or printed number for digital
      outputs, a code pattern for code outputs, or an assigned quantity value for
      {{material measures,3.6}}.
  - content: An indication and a corresponding value of the {{quantity,1.1}} being
      measured are not necessarily values of quantities of the same {{kind,1.2}}.
  - content: '[Annotation] Indication is sometimes understood as a quantity, which
      has a value, rather than as a value of a quantity.'
  terms:
  - type: expression
    normative_status: preferred
    designation: indication
date_accepted: '2012-01-01T00:00:00+00:00'
