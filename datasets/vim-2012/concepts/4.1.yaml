data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{1.19,valeur}} fournie par un {{3.1,instrument de mesure}} ou un {{3.2,système de mesure}}"
  examples: []
  id: 4.1-fra
  language_code: fra
  notes:
  - content: Une indication peut être présentée sous forme visuelle ou acoustique ou peut être transférée à un autre dispositif. Elle est souvent donnée par la position d'un pointeur sur un affichage pour les sorties analogiques, par un nombre affiché ou imprimé pour les sorties numériques, par une configuration codée pour les sorties codées, ou par la valeur assignée pour les {{3.6,mesures matérialisées}}.
  - content: Une indication et la valeur de la {{1.1,grandeur}} mesurée correspondante ne sont pas nécessairement des valeurs de grandeurs de même {{1.2,nature}}.
  terms:
  - type: expression
    normative_status: preferred
    designation: indication
  annotations:
  - content: Une indication est quelquefois considérée comme une grandeur ayant une valeur plutôt que comme une valeur d'une grandeur.
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
id: 897c2e38-95ae-469f-9a49-f282f9b1ee05
