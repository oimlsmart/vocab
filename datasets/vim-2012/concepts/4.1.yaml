data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{1.19,quantity value}} provided by a {{3.1,measuring instrument}} or a {{3.2,measuring system}}"
  examples: []
  id: 4.1-eng
  language_code: eng
  notes:
  - content: An indication may be presented in visual or acoustic form or may be transferred to another device. An indication is often given by the position of a pointer on the display for analogue outputs, a displayed or printed number for digital outputs, a code pattern for code outputs, or an assigned quantity value for {{3.6,material measures}}.
  - content: An indication and a corresponding value of the {{1.1,quantity}} being measured are not necessarily values of quantities of the same {{1.2,kind}}.
  terms:
  - type: expression
    normative_status: preferred
    designation: indication
  annotations:
  - content: Indication is sometimes understood as a quantity, which has a value, rather than as a value of a quantity.
date_accepted: '2012-01-01T00:00:00+00:00'
