data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{unité de mesure,1.9}} obtenue en multipliant une unité de mesure donnée
      par un entier supérieur à un"
  examples:
  - content: EXEMPLE 1 Le kilomètre est un multiple décimal du mètre.
  - content: EXEMPLE 2 L'heure est un multiple non décimal de la seconde.
  id: 1.17-fra
  language_code: fra
  notes:
  - content: Les préfixes SI pour les multiples décimaux des {{unités de base,1.10}}
      et des {{unités dérivées,1.11}} du {{SI,1.16}} sont donnés à la Note 5 de 1.16.
  - content: |-
      Les préfixes SI représentent strictement des puissances de 10 et il convient de ne pas les utiliser pour des puissances de 2. Par exemple, il convient de ne pas utiliser 1 kilobit pour représenter 1 024 bits (210 bits), qui est 1 kibibit.
      Les préfixes pour les multiples binaires sont:

      |===
      | (210)8 | yobi yobi
      | (210)7 | zebi zébi
      | (210)6 | exbi exbi
      | (210)5 | pebi pébi
      | (210)4 | tebi tébi
      | (210)3 | gibi gibi
      | (210)2 | mebi mébi
      | (210)1 | kibi kibi
      |===
      Source: CEI 80000-13.
  terms:
  - type: expression
    normative_status: preferred
    designation: multiple d'une unité
date_accepted: '2012-01-01T00:00:00+00:00'
