data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{measurement unit,1.9}} obtained by multiplying a given measurement
      unit by an integer greater than one"
  examples:
  - content: The kilometre is a decimal multiple of the metre.
  - content: The hour is a non-decimal multiple of the second.
  id: 1.17-eng
  language_code: eng
  notes:
  - content: SI prefixes for decimal multiples of SI {{base units,1.10}} and SI {{derived
      units,1.11}} are given in Note 5 of 1.16.
  - content: |-
      SI prefixes refer strictly to powers of 10, and should not be used for powers of 2. For example, 1 kilobit should not be used to represent 1 024 bits (210 bits), which is 1 kibibit.
      Prefixes for binary multiples are:

      |===
      | (210)8 | yobi yobi
      | (210)7 | zebi zébi
      | (210)6 | exbi exbi
      | (210)5 | pebi pébi
      | (210)4 | tebi tébi
      | (210)3 | gibi gibi
      | (210)2 | mebi mébi
      | (210)1 | kibi kibi
      |===
      Source: IEC 80000-13.
  terms:
  - type: expression
    normative_status: preferred
    designation: multiple of a unit
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
