data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: component of {{measurement error,2.16}} that in replicate {{measurements,2.1}}
      varies in an unpredictable manner
  examples: []
  id: 2.19-eng
  language_code: eng
  notes:
  - content: A {{reference quantity value,5.18}} for a random measurement error is
      the average that would ensue from an infinite number of replicate measurements
      of the same {{measurand,2.3}}.
  - content: Random measurement errors of a set of replicate measurements form a distribution
      that can be summarized by its expectation, which is generally assumed to be
      zero, and its variance.
  - content: Random measurement error equals measurement error minus {{systematic
      measurement error,2.17}}.
  terms:
  - type: expression
    normative_status: preferred
    designation: random measurement error
  - type: expression
    normative_status: admitted
    designation: random error of measurement
  - type: expression
    normative_status: admitted
    designation: random error
date_accepted: '2012-01-01T00:00:00+00:00'
