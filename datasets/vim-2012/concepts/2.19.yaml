data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: composante de l'{{2.16,erreur de mesure}} qui, dans des {{2.1,mesurages}}
      répétés, varie de façon imprévisible
  examples: []
  id: 2.19-fra
  language_code: fra
  notes:
  - content: La {{5.18,valeur de référence}} pour une erreur aléatoire est la moyenne
      qui résulterait d'un nombre infini de mesurages répétés du même {{2.3,mesurande}}.
  - content: Les erreurs aléatoires d'un ensemble de mesurages répétés forment une
      distribution qui peut être résumée par son espérance mathématique, généralement
      supposée nulle, et par sa variance.
  - content: L'erreur aléatoire est égale à la différence entre l'erreur de mesure
      et l'{{2.17,erreur systématique}}.
  terms:
  - type: expression
    normative_status: preferred
    designation: erreur aléatoire
date_accepted: '2012-01-01T00:00:00+00:00'
