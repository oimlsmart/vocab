data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: '{{grandeur,1.1}} d''un sous-ensemble choisi par convention dans un {{système
      de grandeurs,1.3}} donné de façon à ce qu''aucune grandeur du sous-ensemble
      ne puisse être exprimée en fonction des autres'
  examples: []
  id: 1.4-fra
  language_code: fra
  notes:
  - content: 'Le sous-ensemble mentionné dans la définition est appelé l''ensemble
      des grandeurs de base.

      EXEMPLE L''ensemble des grandeurs de base du {{Système international de grandeurs,1.6}}
      (ISQ) est donné en 1.6.'
  - content: Les grandeurs de base sont considérées comme mutuellement indépendantes
      puisqu'une grandeur de base ne peut être exprimée par un produit de puissances
      des autres grandeurs de base.
  - content: On peut considérer la grandeur «nombre d'entités» comme une grandeur
      de base dans tout système de grandeurs.
  terms:
  - type: expression
    normative_status: preferred
    designation: grandeur de base
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
id: 1b41e72d-697b-44cb-ab3f-e2fef9d781e9
