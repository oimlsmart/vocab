data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{quantity,1.1}}, defined by a conventional {{measurement procedure,2.6}},
      for which a total ordering relation can be established, according to magnitude,
      with other quantities of the same {{kind,1.2}}, but for which no algebraic operations
      among those quantities exist"
  examples:
  - content: Rockwell C hardness.
  - content: Octane number for petroleum fuel.
  - content: Earthquake strength on the Richter scale.
  - content: Subjective level of abdominal pain on a scale from zero to five.
  id: 1.26-eng
  language_code: eng
  notes:
  - content: Ordinal quantities can enter into empirical relations only and have neither
      {{measurement units,1.9}} nor {{quantity dimensions,1.7}}. Differences and ratios
      of ordinal quantities have no physical meaning.
  - content: Ordinal quantities are arranged according to {{ordinal quantity-value
      scales,1.28}} (see 1.28).
  terms:
  - type: expression
    normative_status: preferred
    designation: ordinal quantity
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
