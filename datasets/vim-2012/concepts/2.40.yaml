data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: suite d'{{2.39,étalonnages}} depuis une référence jusqu'au {{3.2,système de mesure}} final, dans laquelle le résultat de chaque étalonnage dépend
      de celui de l'étalonnage précédent
  examples: []
  id: 2.40-fra
  language_code: fra
  notes:
  - content: L'{{2.26,incertitude de mesure}} augmente nécessairement le long de la
      suite d'étalonnages.
  - content: Les éléments d'une hiérarchie d'étalonnage sont des {{5.1,étalons}} ainsi
      que des systèmes de mesure utilisés conformément à des {{2.6,procédures de mesure}}.
  - content: La référence mentionnée dans la définition peut être une définition d'une
      {{1.9,unité de mesure}} sous la forme de sa réalisation pratique, une procédure
      de mesure ou un étalon.
  - content: Une comparaison entre deux étalons peut être considérée comme un étalonnage
      si elle sert à vérifier et, si nécessaire, à corriger la {{1.19,valeur}} et
      l'incertitude attribuées à l'un des étalons.
  terms:
  - type: expression
    normative_status: preferred
    designation: hiérarchie d'étalonnage
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
