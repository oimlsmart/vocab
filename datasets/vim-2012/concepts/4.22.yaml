data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: difference in {{4.1,indication}} for a given {{2.10,measured quantity value}},
      or in {{1.19,quantity values}} supplied by a {{3.6,material measure}}, when
      an {{2.52,influence quantity}} assumes successively two different quantity values
  examples: []
  id: 4.22-eng
  language_code: eng
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: variation due to an influence quantity
  annotations:
  - content: 'Here "measured quantity value" can be replaced by "measured value" and
      "quantity values" can be replaced by "values" in both instances without ambiguity:
      "difference in indication for a given measured value, or in values supplied
      by a material measure, when an influence quantity assumes successively two different
      values".'
