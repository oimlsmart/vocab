data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: rounded or approximate {{1.19,value}} of a characterizing {{1.1,quantity}}
      of a {{3.1,measuring instrument}} or {{3.2,measuring system}} that provides
      guidance for its appropriate use
  examples:
  - content: 100 Ω as the nominal quantity value marked on a standard resistor.
  - content: 1 000 ml as the nominal quantity value marked on a single-mark volumetric
      flask.
  - content: 0.1 mol/l as the nominal quantity value for amount-of-substance concentration
      of a solution of hydrogen chloride, HCl.
  - content: "–20 °C as a maximum Celsius temperature for storage."
  id: 4.6-eng
  language_code: eng
  notes:
  - content: "“Nominal quantity value” and “nominal value” should not be used for
      'nominal property value' (see 1.30, Note 2)."
  terms:
  - type: expression
    normative_status: preferred
    designation: nominal quantity value
  - type: expression
    normative_status: admitted
    designation: nominal value
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
id: 7d1b61f4-5ec6-4b87-8681-a60bc40c1969
