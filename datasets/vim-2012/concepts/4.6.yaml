data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{1.19,valeur}} arrondie ou approximative d'une {{1.1,grandeur}} caractéristique
      d'un {{3.1,instrument de mesure}} ou d'un {{3.2,système de mesure}}, qui sert
      de guide pour son utilisation appropriée"
  examples:
  - content: La valeur 100 Ω marquée sur une résistance étalon.
  - content: La valeur 1 000 ml marquée sur une fiole jaugée à un trait.
  - content: La valeur 0,1 mol/l de la concentration en quantité de matière d'une
      solution d'acide chlorhydrique, HCl.
  - content: La valeur –20 °C d'une température Celsius maximale de stockage.
  id: 4.6-fra
  language_code: fra
  notes:
  - content: En anglais, il convient de ne pas utilizer «nominal quantity value» et
      «nominal value» pour la valeur d'une {{1.30,propriété qualitative}} (en anglais
      «nominal property value»).
  terms:
  - type: expression
    normative_status: preferred
    designation: valeur nominale
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
