data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: matériau suffisamment homogène et stable en ce qui concerne des propriétés
      spécifiées, qui a été préparé pour être adapté à son utilisation prévue pour
      un {{mesurage,2.1}} ou pour l'examen de {{propriétés qualitatives,1.30}}
  examples:
  - content: |-
      EXEMPLE 1 Exemples de matériaux de référence supports de grandeurs:
      a) eau de pureté déterminée, dont la viscosité dynamique est utilisée pour l'étalonnage de viscosimètres;
      b) sérum humain sans valeur assignée à la concentration de cholestérol intrinsèque, utilisé seulement pour le contrôle de la fidélité de mesure;
      c) tissu de poisson contenant une fraction massique déterminée de dioxine, utilisé comme {{étalon,5.1}} dans un étalonnage.
  - content: |-
      EXEMPLE 2 Exemples de matériaux de référence supports de propriétés qualitatives:
      a) nuancier de couleurs indiquant une ou plusieurs couleurs spécifiées;
      b) ADN contenant une séquence spécifiée de nucléotides;
      c) urine contenant de la 19-androstènedione.
  - content: EXEMPLE 1 Substance dont le point triple est connu dans une cellule triple
      point.
  - content: EXEMPLE 2 Verre de densité optique connue dans un support de filtre de
      transmission.
  - content: EXEMPLE 3 Sphères à granulométrie uniforme montées sur une lame de microscope.
  id: 5.13-fra
  language_code: fra
  notes:
  - content: L'examen d'une propriété qualitative comprend l'attribution d'une valeur
      et de l'incertitude associée à un autre matériau. Cette incertitude n'est pas
      une {{incertitude de mesure,2.26}}.
  - content: Des matériaux de référence avec ou sans {{valeurs,1.19}} assignées peuvent
      servir à contrôler la {{fidélité de mesure,2.15}}, tandis que seuls des matériaux
      à valeurs assignées peuvent servir à l'{{étalonnage,2.39}} ou au contrôle de
      la {{justesse de mesure,2.14}}.
  - content: Les matériaux de référence comprennent des matériaux caractérisés par
      des {{grandeurs,1.1}} et des matériaux caractérisés par des propriétés qualitatives.
  - content: Un matériau de référence est quelquefois incorporé dans un dispositif
      fabriqué spécialement.
  - content: Certains matériaux de référence ont des valeurs assignées qui sont métrologiquement
      traçables à une {{unité de mesure,1.9}} en dehors d'un {{système d'unités,1.13}}.
      Ces matériaux comprennent des vaccins auxquels des unités internationales (UI)
      ont été assignées par l'Organisation mondiale de la santé.
  - content: Dans un {{mesurage,2.1}} donné, un matériau de référence donné ne peut
      être utilisé que pour l'étalonnage ou pour l'assurance de la qualité.
  - content: Il convient d'inclure dans les spécifications d'un matériau de référence
      sa traçabilité, qui indique son origine et son traitement (Accred. Qual. Assur.:2006)
      [45].
  - content: La définition de l'ISO/REMCO [45] est analogue, mais utilise le terme
      «processus de mesure» pour signifier «examen» (ISO 15189:2007, 3.4) qui couvre
      à la fois un mesurage de la grandeur et l'examen d'une propriété qualitative.
  terms:
  - type: expression
    normative_status: preferred
    designation: matériau de référence
  - type: expression
    normative_status: admitted
    designation: MR
