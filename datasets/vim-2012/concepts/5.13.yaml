data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: material, sufficiently homogeneous and stable with reference to specified
      properties, which has been established to be fit for its intended use in {{measurement,2.1}}
      or in examination of {{nominal properties,1.30}}
  examples:
  - content: |-
      Examples of reference materials embodying quantities:
      a) water of stated purity, the dynamic viscosity of which is used to calibrate viscometers;
      b) human serum without an assigned quantity value for the amount-of-substance concentration of the inherent cholesterol, used only as a measurement precision control material;
      c) fish tissue containing a stated mass fraction of a dioxin, used as a {{calibrator,5.12}}.
  - content: |-
      Examples of reference materials embodying nominal properties:
      a) colour chart indicating one or more specified colours;
      b) DNA compound containing a specified nucleotide sequence;
      c) urine containing 19-androstenedione.
  - content: Substance of known triple-point in a triple-point cell.
  - content: Glass of known optical density in a transmission filter holder.
  - content: Spheres of uniform size mounted on a microscope slide.
  id: 5.13-eng
  language_code: eng
  notes:
  - content: Examination of a nominal property provides a nominal property value and
      associated uncertainty. This uncertainty is not a {{measurement uncertainty,2.26}}.
  - content: Reference materials with or without assigned {{quantity values,1.19}}
      can be used for {{measurement precision,2.15}} control whereas only reference
      materials with assigned quantity values can be used for {{calibration,2.39}}
      or {{measurement trueness,2.14}} control.
  - content: "'Reference material' comprises materials embodying {{quantities,1.1}}
      as well as nominal properties."
  - content: A reference material is sometimes incorporated into a specially fabricated
      device.
  - content: Some reference materials have assigned quantity values that are metrologically
      traceable to a {{measurement unit,1.9}} outside a {{system of units,1.13}}.
      Such materials include vaccines to which International Units (IU) have been
      assigned by the World Health Organization.
  - content: In a given {{measurement,2.1}}, a given reference material can only be
      used for either calibration or quality assurance.
  - content: The specifications of a reference material should include its material
      traceability, indicating its origin and processing (Accred. Qual. Assur.:2006)
      [45].
  - content: ISO/REMCO has an analogous definition [45] but uses the term “measurement
      process” to mean 'examination' (ISO 15189:2007, 3.4), which covers both measurement
      of a quantity and examination of a nominal property.
  terms:
  - type: expression
    normative_status: preferred
    designation: reference material
  - type: expression
    normative_status: admitted
    designation: RM
date_accepted: '2012-01-01T00:00:00+00:00'
