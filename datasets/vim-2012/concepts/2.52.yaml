data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{quantity,1.1}} that, in a direct {{measurement,2.1}}, does not affect
      the quantity that is actually measured, but affects the relation between the
      {{indication,4.1}} and the {{measurement result,2.9}}"
  examples:
  - content: Frequency in the direct measurement with an ammeter of the constant amplitude
      of an alternating current.
  - content: Amount-of-substance concentration of bilirubin in a direct measurement
      of haemoglobin amount-of-substance concentration in human blood plasma.
  - content: Temperature of a micrometer used for measuring the length of a rod, but
      not the temperature of the rod itself which can enter into the definition of
      the {{measurand,2.3}}.
  - content: Background pressure in the ion source of a mass spectrometer during a
      measurement of amount-of-substance fraction.
  id: 2.52-eng
  language_code: eng
  notes:
  - content: An indirect measurement involves a combination of direct measurements,
      each of which may be affected by influence quantities.
  - content: In the GUM, the concept 'influence quantity' is defined as in the second
      edition of the VIM, covering not only the quantities affecting the {{measuring
      system,3.2}}, as in the definition above, but also those quantities that affect
      the quantities actually measured. Also, in the GUM this concept is not restricted
      to direct measurements.
  terms:
  - type: expression
    normative_status: preferred
    designation: influence quantity
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
