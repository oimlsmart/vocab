data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{grandeur,1.1}} qui, lors d'un {{mesurage,2.1}} direct, n'a pas d'effet
      sur la grandeur effectivement mesurée, mais a un effet sur la relation entre
      l'{{indication,4.1}} et le {{résultat de mesure,2.9}}"
  examples:
  - content: EXEMPLE 1 Fréquence lors du mesurage direct de l'amplitude constante
      d'un courant alternatif au moyen d'un ampèremètre.
  - content: EXEMPLE 2 Concentration en quantité de matière de bilirubine lors du
      mesurage direct de la concentration en quantité de matière d'hémoglobine dans
      le plasma sanguin humain.
  - content: EXEMPLE 3 Température d'un micromètre lors du mesurage de la longueur
      d'une tige, mais pas la température de la tige elle-même qui peut entrer dans
      la définition du {{mesurande,2.3}}.
  - content: EXEMPLE 4 Pression ambiante dans la source d'ions d'un spectromètre de
      masse lors du mesurage d'une fraction molaire.
  id: 2.52-fra
  language_code: fra
  notes:
  - content: Un mesurage indirect implique une combinaison de mesurages directs, sur
      chacun desquels des grandeurs d'influence peuvent avoir un effet.
  - content: Dans le GUM, le concept «grandeur d'influence » est défini comme dans
      la deuxième édition du VIM, de façon à comprendre non seulement les grandeurs
      qui ont un effet sur le {{système de mesure,3.2}}, comme dans la définition
      ci-dessus, mais aussi celles qui ont un effet sur les grandeurs effectivement
      mesurées. En outre, le concept n'y est pas limité aux mesurages directs.
  terms:
  - type: expression
    normative_status: preferred
    designation: grandeur d'influence
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
id: 2f3a1bea-2b2f-4473-aea9-5524c1cbee31
