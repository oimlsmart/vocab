data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{quantity value,1.19}} attributed by agreement to a {{quantity,1.1}}
      for a given purpose"
  examples:
  - content: Standard acceleration of free fall (formerly called “standard acceleration
      due to gravity”), gn = 9.806 65 ms−2.
  - content: Conventional quantity value of the Josephson constant, KJ-90 = 483 597.9
      GHz V−1.
  - content: Conventional quantity value of a given mass standard, m = 100.003 47
      g.
  id: 2.12-eng
  language_code: eng
  notes:
  - content: The term “conventional true quantity value” is sometimes used for this
      concept, but its use is discouraged.
  - content: Sometimes a conventional quantity value is an estimate of a {{true quantity
      value,2.11}}.
  - content: A conventional quantity value is generally accepted as being associated
      with a suitably small {{measurement uncertainty,2.26}}, which might be zero.
  - content: '[Annotation] Here "quantity value" can be replaced with "value" without
      ambiguity: "value attributed by agreement to a quantity for a given purpose".'
  terms:
  - type: expression
    normative_status: preferred
    designation: conventional quantity value
  - type: expression
    normative_status: admitted
    designation: conventional value of a quantity
  - type: expression
    normative_status: admitted
    designation: conventional value
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
