data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: suite d'éléments d'un {{3.2,système de mesure}} qui constitue un seul
      chemin du signal depuis le {{3.8,capteur}} jusqu'à l'élément de sortie
  examples:
  - content: Chaîne de mesure électroacoustique comprenant un microphone, un atténuateur,
      un filtre, un amplificateur et un voltmètre.
  - content: Chaîne de mesure mécanique comprenant un tube de Bourdon, un système
      de leviers, deux roues dentées et un cadran mécanique.
  id: 3.10-fra
  language_code: fra
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: chaîne de mesure
