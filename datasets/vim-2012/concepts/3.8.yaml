data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: élément d'un {{système de mesure,3.2}} qui est directement soumis à l'action
      du phénomène, du corps ou de la substance portant la {{grandeur,1.1}} à mesurer
  examples: []
  id: 3.8-fra
  language_code: fra
  notes:
  - content: EXEMPLES Bobine sensible d'un thermomètre à résistance de platine, rotor
      d'un débitmètre à turbine, tube de Bourdon d'un manomètre, flotteur d'un appareil
      de mesure de niveau, récepteur photoélectrique d'un spectrophotomètre, cristal
      liquide thermotrope dont la couleur change en fonction de la température.
  - content: Dans certains domaines, le terme «détecteur» est employé pour ce concept.
  terms:
  - type: expression
    normative_status: preferred
    designation: capteur
