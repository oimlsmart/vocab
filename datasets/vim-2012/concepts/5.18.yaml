data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{1.19,valeur d'une grandeur}} servant de base de comparaison pour les
      valeurs de {{1.1,grandeurs}} de même {{1.2,nature}}"
  examples: []
  id: 5.18-fra
  language_code: fra
  notes:
  - content: La valeur de référence peut être une {{2.11,valeur vraie}} d'un {{2.3,mesurande}},
      et est alors inconnue, ou une {{2.12,valeur conventionnelle}}, et est alors
      connue.
  - content: |-
      Une valeur de référence associée à son {{2.26,incertitude de mesure}} se rapporte généralement à
      a) un matériau, par exemple un {{5.14,matériau de référence certifié}},
      b) un dispositif, par exemple un laser stabilisé,
      c) une {{2.7,procédure de mesure de référence}},
      d) une comparaison d'{{5.1,étalons}}.
  terms:
  - type: expression
    normative_status: preferred
    designation: valeur de référence
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
