---
data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{1.19,quantity value}} used as a basis for comparison with values of
      {{1.1,quantities}} of the same {{1.2,kind}}"
  examples: []
  id: 5.18-eng
  language_code: eng
  notes:
  - content: A reference quantity value can be a {{2.11,true quantity value}} of a
      {{2.3,measurand}}, in which case it is unknown, or a {{2.12,conventional quantity value}}, in which case it is known.
  - content: |-
      A reference quantity value with associated {{2.26,measurement uncertainty}} is usually provided with reference to
      a) material, e.g. a {{5.14,certified reference material}},
      b) a device, e.g. a stabilized laser,
      c) a {{2.7,reference measurement procedure}},
      d) a comparison of {{5.1,measurement standards}}.
  terms:
  - type: expression
    normative_status: preferred
    designation: reference quantity value
  - type: expression
    normative_status: admitted
    designation: reference value
  annotations:
  - content: 'Here "quantity value" can be replaced by "value" without ambiguity:
      "value used as a basis for comparison with values of quantities of the same
      kind".'
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
id: bb5b15e7-7712-468a-9965-a5a1a2c46959
