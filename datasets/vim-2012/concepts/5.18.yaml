data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{quantity value,1.19}} used as a basis for comparison with values of
      {{quantities,1.1}} of the same {{kind,1.2}}"
  examples: []
  id: 5.18-eng
  language_code: eng
  notes:
  - content: A reference quantity value can be a {{true quantity value,2.11}} of a
      {{measurand,2.3}}, in which case it is unknown, or a {{conventional quantity
      value,2.12}}, in which case it is known.
  - content: |-
      A reference quantity value with associated {{measurement uncertainty,2.26}} is usually provided with reference to
      a) material, e.g. a {{certified reference material,5.14}},
      b) a device, e.g. a stabilized laser,
      c) a {{reference measurement procedure,2.7}},
      d) a comparison of {{measurement standards,5.1}}.
  terms:
  - type: expression
    normative_status: preferred
    designation: reference quantity value
  - type: expression
    normative_status: admitted
    designation: reference value
  annotations:
  - content: 'Here "quantity value" can be replaced by "value" without ambiguity:
      "value used as a basis for comparison with values of quantities of the same
      kind".'
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
id: bb5b15e7-7712-468a-9965-a5a1a2c46959
