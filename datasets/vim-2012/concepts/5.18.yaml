data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{valeur d'une grandeur,1.19}} servant de base de comparaison pour les
      valeurs de {{grandeurs,1.1}} de même {{nature,1.2}}"
  examples: []
  id: 5.18-fra
  language_code: fra
  notes:
  - content: La valeur de référence peut être une {{valeur vraie,2.11}} d'un {{mesurande,2.3}},
      et est alors inconnue, ou une {{valeur conventionnelle,2.12}}, et est alors
      connue.
  - content: |-
      Une valeur de référence associée à son {{incertitude de mesure,2.26}} se rapporte généralement à
      a) un matériau, par exemple un {{matériau de référence certifié,5.14}},
      b) un dispositif, par exemple un laser stabilisé,
      c) une {{procédure de mesure de référence,2.7}},
      d) une comparaison d'{{étalons,5.1}}.
  terms:
  - type: expression
    normative_status: preferred
    designation: valeur de référence
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
