  - content: Gonadotrophine chorionique, 4e étalon international de l'Organisation
      mondiale de la santé (OMS), 1999, 75/589, 650 unités internationales par ampoule.
  - content: |-
      Eau océanique moyenne normalisée de Vienne (VSMOW2), distribuée par l'Agence internationale pour l'énergie atomique (AIEA) pour des {{2.1,mesurages}} de rapports molaires différentiels
       relatif d'isotopes stables.
