data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: component of {{2.26,measurement uncertainty}} arising from a {{3.1,measuring instrument}} or {{3.2,measuring system}} in use
  examples: []
  id: 4.24-eng
  language_code: eng
  notes:
  - content: Instrumental measurement uncertainty is obtained through {{2.39,calibration}}
      of a measuring instrument or measuring system, except for a {{5.4,primary measurement standard}} for which other means are used.
  - content: Instrumental measurement uncertainty is used in a {{2.29,Type B evaluation of measurement uncertainty}}.
  - content: Information relevant to instrumental measurement uncertainty may be given
      in the instrument specifications.
  terms:
  - type: expression
    normative_status: preferred
    designation: instrumental measurement uncertainty
date_accepted: '2012-01-01T00:00:00+00:00'
