data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: composante de l'{{2.26,incertitude de mesure}} qui provient de l'{{3.1,instrument de mesure}} ou du {{3.2,système de mesure}} utilisé
  examples: []
  id: 4.24-fra
  language_code: fra
  notes:
  - content: L'incertitude instrumentale est obtenue par {{2.39,étalonnage}} de l'instrument
      de mesure ou du système de mesure, sauf pour un {{5.4,étalon primaire}}, pour
      lequel on utilise d'autres moyens.
  - content: L'incertitude instrumentale est utilisée dans une {{2.29,évaluation de type B de l'incertitude}}.
  - content: Les informations relatives à l'incertitude instrumentale peuvent être
      données dans les spécifications de l'instrument.
  terms:
  - type: expression
    normative_status: preferred
    designation: incertitude instrumentale
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
id: 4746be5f-9d8b-4577-b56d-655b48273c0d
