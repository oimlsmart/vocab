data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{1.9,measurement unit}} that is adopted by convention for a {{1.4,base quantity}}"
  examples:
  - content: In the {{1.16,SI}}, the metre is the base unit of length. In the CGS
      systems, the centimetre is the base unit of length.
  - content: Rainfall, when defined as areic volume (volume per area), has the metre
      as a {{1.12,coherent derived unit}} in the SI.
  id: 1.10-eng
  language_code: eng
  notes:
  - content: In each {{1.14,coherent system of units}}, there is only one base unit
      for each base quantity.
  - content: A base unit may also serve for a {{1.5,derived quantity}} of the same
      {{1.7,quantity dimension}}.
  - content: For number of entities, the number one, symbol 1, can be regarded as
      a base unit in any {{1.13,system of units}}.
  terms:
  - type: expression
    normative_status: preferred
    designation: base unit
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
id: 190040d7-16ab-4ef5-ac20-17c336ca02d7
