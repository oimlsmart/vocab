data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{1.9,unité de mesure}} adoptée par convention pour une {{1.4,grandeur de base}}"
  examples:
  - content: Dans le {{1.16,SI}}, le mètre est l'unité de base de longueur. Dans les
      systèmes CGS, le centimètre est l'unité de base de longueur.
  - content: La hauteur de pluie, définie comme un volume surfacique (volume par aire)
      a le mètre comme {{1.12,unité dérivée cohérente}} dans le SI.
  id: 1.10-fra
  language_code: fra
  notes:
  - content: Dans chaque {{1.14,système cohérent d'unités}}, il y a une seule unité
      de base pour chaque grandeur de base
  - content: Une unité de base peut aussi servir pour une {{1.5,grandeur dérivée}}
      de même {{1.7,dimension}}
  - content: Pour un nombre d'entités, on peut considérer le nombre un, de symbole
      1, comme une unité de base dans tout {{1.13,système d'unités}}.
  terms:
  - type: expression
    normative_status: preferred
    designation: unité de base
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
id: 6ec71c9a-9202-4ff9-b905-cef18a06708b
