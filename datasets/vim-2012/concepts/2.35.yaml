data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: product of a {{2.31,combined standard measurement uncertainty}} and a
      factor larger than the number one
  examples: []
  id: 2.35-eng
  language_code: eng
  notes:
  - content: The factor depends upon the type of probability distribution of the {{2.51,output quantity in a measurement model}} and on the selected {{2.37,coverage probability}}.
  - content: The term “factor” in this definition refers to a {{2.38,coverage factor}}.
  - content: Expanded measurement uncertainty is termed “overall uncertainty” in paragraph
      5 of Recommendation INC-1 (1980) (see the GUM) and simply “uncertainty” in IEC
      documents.
  terms:
  - type: expression
    normative_status: preferred
    designation: expanded measurement uncertainty
  - type: expression
    normative_status: admitted
    designation: expanded uncertainty
  annotations:
  - content: 'Here "combined standard measurement uncertainty" can be replaced with
      "combined standard uncertainty" without ambiguity: "product of a combined standard
      uncertainty and a factor larger than the number one".'
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
