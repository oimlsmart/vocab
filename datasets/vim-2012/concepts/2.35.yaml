data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: produit d'une {{2.31,incertitude-type composée}} et d'un facteur supérieur
      au nombre un
  examples: []
  id: 2.35-fra
  language_code: fra
  notes:
  - content: Le facteur dépend du type de la loi de probabilité de la {{2.51,grandeur de sortie dans un modèle de mesure}} et de la {{2.37,probabilité de couverture}}
      choisie.
  - content: Le facteur qui intervient dans la définition est un {{2.38,facteur d'élargissement}}.
  - content: L'incertitude élargie est appelée «incertitude globale» au paragraphe
      5 de la Recommandation INC-1 (1980) (voir le GUM) et simplement «incertitude»
      dans les documents de la CEI.
  terms:
  - type: expression
    normative_status: preferred
    designation: incertitude élargie
date_accepted: '2012-01-01T00:00:00+00:00'
