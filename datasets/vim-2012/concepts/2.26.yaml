data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: non-negative parameter characterizing the dispersion of the {{quantity
      values,1.19}} being attributed to a {{measurand,2.3}}, based on the information
      used
  examples: []
  id: 2.26-eng
  language_code: eng
  notes:
  - content: Measurement uncertainty includes components arising from systematic effects,
      such as components associated with {{corrections,2.53}} and the assigned quantity
      values of {{measurement standards,5.1}}, as well as the {{definitional uncertainty,2.27}}.
      Sometimes estimated systematic effects are not corrected for but, instead, associated
      measurement uncertainty components are incorporated.
  - content: The parameter may be, for example, a standard deviation called {{standard
      measurement uncertainty,2.30}} (or a specified multiple of it), or the half-width
      of an interval, having a stated {{coverage probability,2.37}}.
  - content: Measurement uncertainty comprises, in general, many components. Some
      of these may be evaluated by {{Type A evaluation of measurement uncertainty,2.28}}
      from the statistical distribution of the quantity values from series of {{measurements,2.1}}
      and can be characterized by standard deviations. The other components, which
      may be evaluated by {{Type B evaluation of measurement uncertainty,2.29}}, can
      also be characterized by standard deviations, evaluated from probability density
      functions based on experience or other information.
  - content: In general, for a given set of information, it is understood that the
      measurement uncertainty is associated with a stated quantity value attributed
      to the measurand. A modification of this value results in a modification of
      the associated uncertainty.
  terms:
  - type: expression
    normative_status: preferred
    designation: measurement uncertainty
  - type: expression
    normative_status: admitted
    designation: uncertainty of measurement
  - type: expression
    normative_status: admitted
    designation: uncertainty
  annotations:
  - content: Measurement uncertainty is part of a measurement result, which is an
      outcome of a measurement. "non-negative" means "zero or positive". The "information
      used" in the definition is the information obtained from performing the measurement.
  - content: A simplified equivalent wording of the definition is "non-negative parameter
      characterizing the dispersion of the values being attributed to a measurand,
      based on the information used."
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
