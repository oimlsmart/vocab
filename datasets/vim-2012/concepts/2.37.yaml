data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: probability that the set of {{2.11,true quantity values}} of a {{2.3,measurand}}
      is contained within a specified {{2.36,coverage interval}}
  examples: []
  id: 2.37-eng
  language_code: eng
  notes:
  - content: This definition pertains to the Uncertainty Approach as presented in
      the GUM.
  - content: The coverage probability is also termed “level of confidence” in the
      GUM.
  terms:
  - type: expression
    normative_status: preferred
    designation: coverage probability
  annotations:
  - content: 'Here "true quantity values" can be replaced with "true values" without
      ambiguity: "probability that the set of true values of a measurand is contained
      within a specified coverage interval".'
date_accepted: '2012-01-01T00:00:00+00:00'
