data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: probabilité que l'ensemble des {{2.11,valeurs vraies}} d'un {{2.3,mesurande}}
      soit contenu dans un {{2.36,intervalle élargi}} spécifié
  examples: []
  id: 2.37-fra
  language_code: fra
  notes:
  - content: La définition se réfère à l'approche «incertitude» présentée dans le
      GUM.
  - content: Il convient de ne pas confondre ce concept avec le concept statistique
      de niveau de confiance, bien que le terme «level of confidence» soit utilisé
      en anglais dans le GUM.
  terms:
  - type: expression
    normative_status: preferred
    designation: probabilité de couverture
