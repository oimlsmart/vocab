data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: interval containing the set of {{true quantity values,2.11}} of a {{measurand,2.3}}
      with a stated probability, based on the information available
  examples: []
  id: 2.36-eng
  language_code: eng
  notes:
  - content: A coverage interval does not need to be centred on the chosen {{measured
      quantity value,2.10}} (see ISO/IEC Guide 98-3:2008/Suppl.1).
  - content: A coverage interval should not be termed “confidence interval” to avoid
      confusion with the statistical concept (see ISO/IEC Guide 98-3:2008, 6.2.2).
  - content: A coverage interval can be derived from an {{expanded measurement uncertainty,2.35}}
      (see ISO/IEC Guide 98-3:2008, 2.3.5).
  - content: '[Annotation] Here "true quantity values" can be replaced with "true
      values" without ambiguity: "interval containing the set of true values of a
      measurand with a stated probability, based on the information available".'
  terms:
  - type: expression
    normative_status: preferred
    designation: coverage interval
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
