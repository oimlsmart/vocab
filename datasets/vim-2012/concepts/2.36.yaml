data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: intervalle contenant l'ensemble des {{2.11,valeurs vraies}} d'un {{2.3,mesurande}}
      avec une probabilité déterminée, fondé sur l'information disponible
  examples: []
  id: 2.36-fra
  language_code: fra
  notes:
  - content: Un intervalle élargi n'est pas nécessairement centré sur la {{2.10,valeur mesurée}} choisie (voir le Guide ISO/CEI 98-3:2008/Suppl.1).
  - content: Il convient de ne pas appeler «intervalle de confiance» un intervalle
      élargi pour éviter des confusions avec le concept statistique (voir le Guide
      ISO/CEI 98-3:2008, 6.2.2).
  - content: Un intervalle élargi peut se déduire d'une {{2.35,incertitude élargie}}
      (voir le Guide ISO/CEI 98-3:2008, 2.3.5).
  terms:
  - type: expression
    normative_status: preferred
    designation: intervalle élargi
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
