data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: interval containing the set of {{2.11,true quantity values}} of a {{2.3,measurand}}
      with a stated probability, based on the information available
  examples: []
  id: 2.36-eng
  language_code: eng
  notes:
  - content: A coverage interval does not need to be centred on the chosen {{2.10,measured quantity value}} (see ISO/IEC Guide 98-3:2008/Suppl.1).
  - content: A coverage interval should not be termed “confidence interval” to avoid
      confusion with the statistical concept (see ISO/IEC Guide 98-3:2008, 6.2.2).
  - content: A coverage interval can be derived from an {{2.35,expanded measurement uncertainty}}
      (see ISO/IEC Guide 98-3:2008, 2.3.5).
  terms:
  - type: expression
    normative_status: preferred
    designation: coverage interval
  annotations:
  - content: 'Here "true quantity values" can be replaced with "true values" without
      ambiguity: "interval containing the set of true values of a measurand with a
      stated probability, based on the information available".'
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
