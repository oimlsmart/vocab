data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{instrument de mesure,3.1}} qui reproduit ou fournit, d'une manière
      permanente pendant son emploi, des {{grandeurs,1.1}} d'une ou plusieurs {{natures,1.2}},
      chacune avec une {{valeur,1.19}} assignée"
  examples:
  - content: Masse marquée, mesure de capacité (fournissant une ou plusieurs valeurs,
      avec ou sans {{échelle de valeurs,1.27}}), résistance électrique étalon, règle
      graduée, cale étalon, générateur de signaux étalons, {{matériau de référence
      certifié,5.14}}.
  id: 3.6-fra
  language_code: fra
  notes:
  - content: L'{{indication,4.1}} d'une mesure matérialisée est sa valeur assignée.
  - content: Une mesure matérialisée peut être un {{étalon,5.1}}.
  terms:
  - type: expression
    normative_status: preferred
    designation: mesure matérialisée
date_accepted: '2012-01-01T00:00:00+00:00'
