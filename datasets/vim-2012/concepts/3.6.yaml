data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{measuring instrument,3.1}} reproducing or supplying, in a permanent
      manner during its use, {{quantities,1.1}} of one or more given {{kinds,1.2}},
      each with an assigned {{quantity value,1.19}}"
  examples:
  - content: Standard weight, volume measure (supplying one or several quantity values,
      with or without a {{quantity-value scale,1.27}}), standard electric resistor,
      line scale (ruler), gauge block, standard signal generator, {{certified reference
      material,5.14}}.
  id: 3.6-eng
  language_code: eng
  notes:
  - content: The {{indication,4.1}} of a material measure is its assigned quantity
      value.
  - content: A material measure can be a {{measurement standard,5.1}}.
  terms:
  - type: expression
    normative_status: preferred
    designation: material measure
  annotations:
  - content: 'Here "quantity value" can be replaced with "value" without ambiguity:
      "measuring instrument reproducing or supplying, in a permanent manner during
      its use, quantities of one or more given kinds, each with an assigned value."'
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
