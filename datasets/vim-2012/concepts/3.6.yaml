data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{3.1,instrument de mesure}} qui reproduit ou fournit, d'une manière
      permanente pendant son emploi, des {{1.1,grandeurs}} d'une ou plusieurs {{1.2,natures}},
      chacune avec une {{1.19,valeur}} assignée"
  examples:
  - content: Masse marquée, mesure de capacité (fournissant une ou plusieurs valeurs,
      avec ou sans {{1.27,échelle de valeurs}}), résistance électrique étalon, règle
      graduée, cale étalon, générateur de signaux étalons, {{5.14,matériau de référence certifié}}.
  id: 3.6-fra
  language_code: fra
  notes:
  - content: L'{{4.1,indication}} d'une mesure matérialisée est sa valeur assignée.
  - content: Une mesure matérialisée peut être un {{5.1,étalon}}.
  terms:
  - type: expression
    normative_status: preferred
    designation: mesure matérialisée
date_accepted: '2012-01-01T00:00:00+00:00'
