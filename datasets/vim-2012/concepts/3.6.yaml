data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{3.1,measuring instrument}} reproducing or supplying, in a permanent
      manner during its use, {{1.1,quantities}} of one or more given {{1.2,kinds}},
      each with an assigned {{1.19,quantity value}}"
  examples:
  - content: Standard weight, volume measure (supplying one or several quantity values,
      with or without a {{1.27,quantity-value scale}}), standard electric resistor,
      line scale (ruler), gauge block, standard signal generator, {{5.14,certified reference material}}.
  id: 3.6-eng
  language_code: eng
  notes:
  - content: The {{4.1,indication}} of a material measure is its assigned quantity
      value.
  - content: A material measure can be a {{5.1,measurement standard}}.
  terms:
  - type: expression
    normative_status: preferred
    designation: material measure
  annotations:
  - content: 'Here "quantity value" can be replaced with "value" without ambiguity:
      "measuring instrument reproducing or supplying, in a permanent manner during
      its use, quantities of one or more given kinds, each with an assigned value."'
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
