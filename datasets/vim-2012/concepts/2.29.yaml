data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: évaluation d'une composante de l'{{2.26,incertitude de mesure}} par d'autres
      moyens qu'une {{2.28,évaluation de type A de l'incertitude}}
  examples:
  - content: |-
      Évaluation fondée sur des informations
      - associées à des {{1.19,valeurs}} publiées faisant autorité,
      - associées à la valeur d'un {{5.14,matériau de référence certifié}},
      - obtenues à partir d'un certificat d'{{2.39,étalonnage}},
      - concernant la dérive,
      - obtenues à partir de la {{4.25,classe d'exactitude}} d'un {{3.1,instrument de mesure}} vérifié,
      - obtenues à partir de limites déduites de l'expérience personnelle.
  id: 2.29-fra
  language_code: fra
  notes:
  - content: Voir aussi le Guide ISO/CEI 98-3:2008, 2.3.3.
  terms:
  - type: expression
    normative_status: preferred
    designation: évaluation de type B de l'incertitude
  - type: expression
    normative_status: admitted
    designation: évaluation de type B
    grammar_info:
    - gender: f
