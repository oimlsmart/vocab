data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: evaluation of a component of {{2.26,measurement uncertainty}} determined
      by means other than a {{2.28,Type A evaluation of measurement uncertainty}}
  examples:
  - content: |-
      Evaluation based on information
      - associated with authoritative published {{1.19,quantity values}},
      - associated with the quantity value of a {{5.14,certified reference material}},
      - obtained from a {{2.39,calibration}} certificate,
      - about drift,
      - obtained from the {{4.25,accuracy class}} of a verified {{3.1,measuring instrument}},
      - obtained from limits deduced through personal experience.
  id: 2.29-eng
  language_code: eng
  notes:
  - content: See also ISO/IEC Guide 98-3:2008, 2.3.3.
  terms:
  - type: expression
    normative_status: preferred
    designation: Type B evaluation of measurement uncertainty
  - type: expression
    normative_status: admitted
    designation: Type B evaluation
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
