data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: phenomenon serving as a basis of a {{2.1,measurement}}
  examples:
  - content: Thermoelectric effect applied to the measurement of temperature.
  - content: Energy absorption applied to the measurement of amount-of-substance concentration.
  - content: Lowering of the concentration of glucose in blood in a fasting rabbit
      applied to the measurement of insulin concentration in a preparation.
  id: 2.4-eng
  language_code: eng
  notes:
  - content: The phenomenon can be of a physical, chemical, or biological nature.
  terms:
  - type: expression
    normative_status: preferred
    designation: measurement principle
  - type: expression
    normative_status: admitted
    designation: principle of measurement
