    type: accepted
  definition:
  - content: phénomène servant de base à un {{2.1,mesurage}}
  examples:
  - content: Effet thermoélectrique appliqué au mesurage de la température.
  - content: Absorption d'énergie appliquée au mesurage de la concentration en quantité
      de matière.
  - content: Diminution de la concentration de glucose dans le sang d'un lapin à jeun,
      appliquée au mesurage de la concentration d'insuline dans une préparation.
  id: 2.4-fra
  language_code: fra
  notes:
  - content: Le phénomène peut être de nature physique, chimique ou biologique
