data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: property of a {{5.13,reference material}}, demonstrated by the closeness
      of agreement between the relation among the {{2.9,measurement results}} for
      a stated {{1.1,quantity}} in this material, obtained according to two given
      {{2.6,measurement procedures}}, and the relation obtained among the measurement
      results for other specified materials
  examples: []
  id: 5.15-eng
  language_code: eng
  notes:
  - content: The reference material in question is usually a {{5.12,calibrator}} and
      the other specified materials are usually routine samples.
  - content: The measurement procedures referred to in the definition are the one
      preceding and the one following the reference material (calibrator) in question
      in a {{2.40,calibration hierarchy}} (see ISO 17511).
  - content: The stability of commutable reference materials should be monitored regularly.
  terms:
  - type: expression
    normative_status: preferred
    designation: commutability of a reference material
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
