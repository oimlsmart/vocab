data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: propriété d'un {{5.13,matériau de référence}}, exprimée par l'étroitesse
      de l'accord entre, d'une part, la relation entre les {{2.9,résultats de mesure}}
      obtenus pour une {{1.1,grandeur}} déterminée de ce matériau en utilisant deux
      {{2.6,procédures de mesure}} données et, d'autre part, la relation entre les
      résultats de mesure pour d'autres matériaux spécifiés
  examples: []
  id: 5.15-fra
  language_code: fra
  notes:
  - content: Le matériau de référence en question est généralement un {{5.1,étalon}}
      et les autres matériaux spécifiés sont généralement des spécimens courants.
  - content: Les procédures de mesure mentionnées dans la définition sont celle qui
      précède et celle qui suit le matériau de référence utilisé comme étalon dans
      une {{2.40,hiérarchie d'étalonnage}} (voir l'ISO 17511).
  - content: Il convient de vérifier régulièrement la stabilité des matériaux de référence
      commutables.
  terms:
  - type: expression
    normative_status: preferred
    designation: commutabilité d'un matériau de référence
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
