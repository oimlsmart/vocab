data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{measurement standard,5.1}} established using a {{primary reference
      measurement procedure,2.8}}, or created as an artifact, chosen by convention"
  examples:
  - content: Primary measurement standard of amount-of-substance concentration prepared
      by dissolving a known amount of substance of a chemical component to a known
      volume of solution.
  - content: Primary measurement standard for pressure based on separate {{measurements,2.1}}
      of force and area.
  - content: Primary measurement standard for isotope amount-of-substance ratio measurements,
      prepared by mixing known amount-of-substances of specified isotopes.
  - content: Triple-point-of-water cell as a primary measurement standard of thermodynamic
      temperature.
  - content: The international prototype of the kilogram as an artifact, chosen by
      convention.
  id: 5.4-eng
  language_code: eng
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: primary measurement standard
  - type: expression
    normative_status: admitted
    designation: primary standard
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
