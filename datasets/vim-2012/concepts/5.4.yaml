data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{étalon,5.1}} établi à l'aide d'une {{procédure de mesure primaire,2.8}}
      ou créé comme objet choisi par convention"
  examples:
  - content: Étalon primaire de concentration en quantité de matière préparé en dissolvant
      une quantité de matière connue d'une substance chimique dans un volume connu
      de solution.
  - content: Étalon primaire de pression fondé sur des {{mesurages,2.1}} séparés de
      force et d'aire.
  - content: Étalon primaire pour les mesurages du rapport molaire d'isotopes, préparé
      en mélangeant des quantités de matière connues d'isotopes spécifiés.
  - content: Étalon primaire de température thermodynamique constitué d'une cellule
      à point triple de l'eau.
  - content: Le prototype international du kilogramme en tant qu'objet choisi par
      convention.
  id: 5.4-fra
  language_code: fra
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: étalon primaire
date_accepted: '2012-01-01T00:00:00+00:00'
