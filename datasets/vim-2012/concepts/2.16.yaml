data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{2.10,measured quantity value}} minus a {{5.18,reference quantity value}}"
  examples: []
  id: 2.16-eng
  language_code: eng
  notes:
  - content: The concept of 'measurement error' can be used both a) when there is
      a single reference quantity value to refer to, which occurs if a {{2.39,calibration}}
      is made by means of a {{5.1,measurement standard}} with a {{2.10,measured quantity value}} having a negligible {{2.26,measurement uncertainty}} or if a {{2.12,conventional quantity value}} is given, in which case the measurement error is known,
      and b) if a {{2.3,measurand}} is supposed to be represented by a unique {{2.11,true quantity value}} or a set of true quantity values of negligible range,
      in which case the measurement error is not known.
  - content: Measurement error should not be confused with production error or mistake.
  terms:
  - type: expression
    normative_status: preferred
    designation: measurement error
  - type: expression
    normative_status: admitted
    designation: error of measurement
  - type: expression
    normative_status: admitted
    designation: error
  annotations:
  - content: Measurement error is sometimes understood as a quantity, which has a
      value, rather than as a value of a quantity.
  - content: ANNOTATION (for Note 1) (informative) [5 June 2014] The concept of 'measurement
      error' can be used either for a) or for b), but not for both a) and b) simultaneously.
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
