data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: différence entre la {{2.10,valeur mesurée}} d'une {{1.1,grandeur}} et
      une {{5.18,valeur de référence}}
  examples: []
  id: 2.16-fra
  language_code: fra
  notes:
  - content: Le concept d'erreur peut être utilisé a) lorsqu'il existe une valeur
      de référence unique à laquelle se rapporter, ce qui a lieu si on effectue un
      {{2.39,étalonnage}} au moyen d'un {{5.1,étalon}} dont la {{2.10,valeur mesurée}}
      a une {{2.26,incertitude de mesure}} négligeable ou si on prend une {{2.12,valeur conventionnelle}}, l'erreur étant alors connue, b) si on suppose le {{2.3,mesurande}}
      représenté par une {{2.11,valeur vraie}} unique ou un ensemble de valeurs vraies
      d'étendue négligeable, l'erreur étant alors inconnue.
  - content: Il convient de ne pas confondre l'erreur de mesure avec une erreur de
      production ou une erreur humaine.
  terms:
  - type: expression
    normative_status: preferred
    designation: erreur de mesure
  - type: expression
    normative_status: admitted
    designation: erreur
    grammar_info:
    - gender: f
  annotations:
  - content: Une erreur de mesure est quelquefois considérée comme une grandeur ayant
      une valeur plutôt que comme une valeur d'une grandeur.
  - content: ANNOTATION (pour la Note 1) (informative) [5 juin 2014] Le concept d'erreur
      de mesure peut être utilisé dans le cas a) ou dans le cas b), mais pas dans
      les deux cas à la fois.
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
