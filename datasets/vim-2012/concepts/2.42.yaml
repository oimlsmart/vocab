data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: succession d'{{5.1,étalons}} et d'{{2.39,étalonnages}} qui est utilisée
      pour relier un {{2.9,résultat de mesure}} à une référence
  examples: []
  id: 2.42-fra
  language_code: fra
  notes:
  - content: Une chaîne de traçabilité métrologique est définie par l'intermédiaire
      d'une {{2.40,hiérarchie d'étalonnage}}.
  - content: La chaîne de traçabilité métrologique est utilisée pour établir la {{2.41,traçabilité métrologique}} du résultat de mesure.
  - content: Une comparaison entre deux étalons peut être considérée comme un étalonnage
      si elle sert à vérifier et, si nécessaire, à corriger la {{1.19,valeur}} et
      l'{{2.26,incertitude de mesure}} attribuées à l'un des étalons.
  terms:
  - type: expression
    normative_status: preferred
    designation: chaîne de traçabilité métrologique
  - type: expression
    normative_status: admitted
    designation: chaîne de traçabilité
    grammar_info:
    - gender: f
