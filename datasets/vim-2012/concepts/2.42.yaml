data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: sequence of {{5.1,measurement standards}} and {{2.39,calibrations}} that
      is used to relate a {{2.9,measurement result}} to a reference
  examples: []
  id: 2.42-eng
  language_code: eng
  notes:
  - content: A metrological traceability chain is defined through a {{2.40,calibration hierarchy}}.
  - content: A metrological traceability chain is used to establish {{2.41,metrological traceability}} of a measurement result.
  - content: A comparison between two measurement standards may be viewed as a calibration
      if the comparison is used to check and, if necessary, correct the {{1.19,quantity value}} and {{2.26,measurement uncertainty}} attributed to one of the measurement
      standards.
  terms:
  - type: expression
    normative_status: preferred
    designation: metrological traceability chain
  - type: expression
    normative_status: admitted
    designation: traceability chain
date_accepted: '2012-01-01T00:00:00+00:00'
