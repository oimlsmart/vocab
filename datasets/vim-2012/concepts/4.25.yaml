data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: class of {{3.1,measuring instruments}} or {{3.2,measuring systems}} that
      meet stated metrological requirements that are intended to keep {{2.16,measurement errors}} or {{4.24,instrumental measurement uncertainties}} within specified
      limits under specified operating conditions
  examples: []
  id: 4.25-eng
  language_code: eng
  notes:
  - content: An accuracy class is usually denoted by a number or symbol adopted by
      convention.
  - content: Accuracy class applies to {{3.6,material measures}}.
  terms:
  - type: expression
    normative_status: preferred
    designation: accuracy class
