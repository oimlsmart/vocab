data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: classe d'{{3.1,instruments de mesure}} ou de {{3.2,systèmes de mesure}}
      qui satisfont à certaines exigences métrologiques destinées à maintenir les
      {{2.16,erreurs de mesure}} ou les {{4.24,incertitudes instrumentales}} entre
      des limites spécifiées dans des conditions de fonctionnement spécifiées
  examples: []
  id: 4.25-fra
  language_code: fra
  notes:
  - content: Une classe d'exactitude est habituellement indiquée par un nombre ou
      un symbole adopté par convention.
  - content: Le concept de classe d'exactitude s'applique aux {{3.6,mesures matérialisées}}.
  terms:
  - type: expression
    normative_status: preferred
    designation: classe d'exactitude
