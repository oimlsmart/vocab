  definition:
  - content: relation d'égalité entre des {{1.20,valeurs numériques}}, fondée sur
      une {{1.22,équation aux grandeurs}} donnée et des {{1.9,unités de mesure}} spécifiées
  examples:
  - content: Pour les {{1.1,grandeurs}} données dans l'
  - content: de 1.22, {Q1} = ζ {Q2} {Q3}, où {Q1}, {Q2} et {Q3} représentent respectivement
      les valeurs numériques de Q1, Q2 et Q3 lorsqu'elles sont exprimées en {{1.10,unités de base}} ou en {{1.12,unités dérivées cohérentes}} ou les deux.
  - content: Pour l'équation de l'énergie cinétique d'une particule, T= (1/2) mv2,
      si m= 2 kg et v= 3 m/s, alors {T} = (1/2) ·2 · 32 est une équation aux valeurs
      numériques donnant la valeur numérique 9 pour Ten joules.
  id: 1.25-fra
  language_code: fra
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: équation aux valeurs numériques
