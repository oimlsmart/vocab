data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: mathematical relation between {{1.20,numerical quantity values}}, based
      on a given {{1.22,quantity equation}} and specified {{1.9,measurement units}}
  examples:
  - content: For the {{1.1,quantities}} in Example 1 in item 1.22, {Q1} = ζ{Q2} {Q3}
      where {Q1}, {Q2}, and {Q3} denote the numerical values of Q1, Q2, and Q3, respectively,
      provided that they are expressed in either {{1.10,base units}} or {{1.12,coherent derived units}} or both.
  - content: In the quantity equation for kinetic energy of a particle, T= (1/2) mv2,
      if m= 2 kg and v= 3 m/s, then {T} = (1/2) ·2 ·32 is a numerical value equation
      giving the numerical value 9 of Tin joules.
  id: 1.25-eng
  language_code: eng
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: numerical value equation
  - type: expression
    normative_status: admitted
    designation: numerical quantity value equation
  annotations:
  - content: 'Here "numerical quantity value" can be replaced with "numerical value"
      in the definition without ambiguity: "mathematical relation between numerical
      values, based on a given quantity equation and specified measurement units".'
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
id: 817d438a-8a2b-43a6-9c0e-ca1332b74663
