    type: accepted
  definition:
  - content: ensemble de {{1.1,grandeurs}} associé à un ensemble de relations non
      contradictoires entre ces grandeurs
  examples: []
  id: 1.3-fra
  language_code: fra
  notes:
  - content: Les {{1.26,grandeurs ordinales}}, telles que la dureté C de Rockwell,
      ne sont généralement pas considérées comme faisant partie d'un système de grandeurs,
      parce qu'elles ne sont reliées à d'autres grandeurs que par des relations empiriques.
  terms:
  - type: expression
    normative_status: preferred
    designation: système de grandeurs
