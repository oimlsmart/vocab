    type: accepted
  definition:
  - content: set of {{1.1,quantities}} together with a set of noncontradictory equations
      relating those quantities
  examples: []
  id: 1.3-eng
  language_code: eng
  notes:
  - content: '{{1.26,Ordinal quantities}}, such as Rockwell C hardness, are usually
      not considered to be part of a system of quantities because they are related
      to other quantities through empirical relations only.'
  terms:
  - type: expression
    normative_status: preferred
    designation: system of quantities
