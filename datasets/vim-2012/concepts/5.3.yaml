  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{5.1,measurement standard}} recognized by national authority to serve
      in a state or economy as the basis for assigning {{1.19,quantity values}} to
      other measurement standards for the {{1.2,kind of quantity}} concerned"
  examples: []
  id: 5.3-eng
  language_code: eng
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: national measurement standard
  - type: expression
    normative_status: admitted
    designation: national standard
  annotations:
  - content: 'Here "quantity values" can be replaced by "values", and "kind of quantity"
      can be replaced by "kind", without ambiguity: "measurement standard recognized
      by national authority to serve in a state or economy as the basis for assigning
      values to other measurement standards for the kind concerned".'
