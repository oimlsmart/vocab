data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: provision of objective evidence that a given item fulfils specified requirements
  examples:
  - content: Confirmation that a given {{5.13,reference material}} as claimed is homogeneous
      for the {{1.19,quantity value}} and {{2.6,measurement procedure}} concerned,
      down to a measurement portion having a mass of 10 mg.
  - content: Confirmation that performance properties or legal requirements of a {{3.2,measuring system}} are achieved.
  - content: Confirmation that a {{2.34,target measurement uncertainty}} can be met.
  id: 2.44-eng
  language_code: eng
  notes:
  - content: When applicable, {{2.26,measurement uncertainty}} should be taken into
      consideration.
  - content: The item may be, e.g. a process, measurement procedure, material, compound,
      or measuring system.
  - content: The specified requirements may be, e.g. that a manufacturer's specifications
      are met.
  - content: Verification in legal metrology, as defined in VIML [53], and in conformity
      assessment in general, pertains to the examination and marking and/or issuing
      of a verification certificate for a measuring system.
  - content: Verification should not be confused with {{2.39,calibration}}. Not every
      verification is a {{2.45,validation}}.
  - content: In chemistry, verification of the identity of the entity involved, or
      of activity, requires a description of the structure or properties of that entity
      or activity.
  terms:
  - type: expression
    normative_status: preferred
    designation: verification
  annotations:
  - content: ANNOTATION (for Example 1) (informative) [5 June 2014] By "measurement
      portion" here is meant amount of material, of proper size, for measurement of
      any quantity of interest, removed from the reference material.
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
