data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: fourniture de preuves tangibles qu'une entité donnée satisfait à des
      exigences spécifiées
  examples:
  - content: Confirmation qu'un {{5.13,matériau de référence}} donné est bien, comme
      déclaré, homogène pour la {{1.19,valeur}} et la {{2.6,procédure de mesure}}
      concernées jusqu'à des prises de mesure de masse 10 mg.
  - content: Confirmation que des propriétés relatives aux performances ou des exigences
      légales sont satisfaites par un {{3.2,système de mesure}}.
  - content: Confirmation qu'une {{2.34,incertitude cible}} peut être atteinte.
  id: 2.44-fra
  language_code: fra
  notes:
  - content: S'il y a lieu, il convient de prendre en compte l'{{2.26,incertitude de mesure}}.
  - content: L'entité peut être, par exemple, un processus, une procédure de mesure,
      un matériau, un composé ou un système de mesure.
  - content: Les exigences spécifiées peuvent être, par exemple, les spécifications
      d'un fabricant.
  - content: La vérification en métrologie légale, comme définie dans le VIML [53],
      et plus généralement en évaluation de la conformité, comporte l'examen et le
      marquage et/ou la délivrance d'un certificat de vérification pour un système
      de mesure.
  - content: Il convient de ne pas confondre la vérification avec l'{{2.39,étalonnage}}.
      Toute vérification n'est pas une {{2.45,validation}}.
  - content: En chimie, la vérification de l'identité d'une entité, ou celle d'une
      activité, nécessite une description de la structure ou des propriétés de cette
      entité ou activité.
  terms:
  - type: expression
    normative_status: preferred
    designation: vérification
  annotations:
  - content: ANNOTATION (pour l'Exemple 1) (informative) [5 juin 2014] Une «prise
      de mesure» signifie ici un prélèvement de taille appropriée effectué sur le
      matériau de référence en vue de mesurer toute grandeur présentant de l'intérêt.
date_accepted: '2012-01-01T00:00:00+00:00'
