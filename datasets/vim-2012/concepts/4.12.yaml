data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: quotient de la variation d'une {{4.1,indication}} d'un {{3.2,système de mesure}}
      par la variation correspondante de la {{1.19,valeur}} de la {{1.1,grandeur}}
      mesurée
  examples: []
  id: 4.12-fra
  language_code: fra
  notes:
  - content: La sensibilité peut dépendre de la valeur de la grandeur mesurée.
  - content: La variation de la valeur de la grandeur mesurée doit être grande par
      rapport à la {{4.14,résolution}}.
  terms:
  - type: expression
    normative_status: preferred
    designation: sensibilité
