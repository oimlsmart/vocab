data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: quotient of the change in an {{4.1,indication}} of a {{3.2,measuring system}}
      and the corresponding change in a {{1.19,value}} of a {{1.1,quantity}} being
      measured
  examples: []
  id: 4.12-eng
  language_code: eng
  notes:
  - content: Sensitivity of a measuring system can depend on the value of the quantity
      being measured.
  - content: The change considered in a value of a quantity being measured must be
      large compared with the {{4.14,resolution}}.
  terms:
  - type: expression
    normative_status: preferred
    designation: sensitivity of a measuring system
  - type: expression
    normative_status: admitted
    designation: sensitivity
