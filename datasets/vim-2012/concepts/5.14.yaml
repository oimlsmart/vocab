data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{5.13,reference material}}, accompanied by documentation issued by
      an authoritative body and providing one or more specified property values with
      associated uncertainties and traceabilities, using valid procedures"
  examples:
  - content: Human serum with assigned {{1.19,quantity value}} for the concentration
      of cholesterol and associated {{2.26,measurement uncertainty}} stated in an
      accompanying certificate, used as a {{5.12,calibrator}} or {{2.14,measurement trueness}}
      control material.
  id: 5.14-eng
  language_code: eng
  notes:
  - content: "'Documentation' is given in the form of a 'certificate' (see ISO Guide
      31:2000)."
  - content: Procedures for the production and certification of certified reference
      materials are given, e.g. in ISO Guide 34 and ISO Guide 35.
  - content: In this definition, “uncertainty” covers both 'measurement uncertainty'
      and 'uncertainty associated with the value of a {{1.30,nominal property}}',
      such as for identity and sequence. “Traceability” covers both '{{2.41,metrological traceability}} of a quantity value' and 'traceability of a nominal property
      value'.
  - content: Specified quantity values of certified reference materials require metrological
      traceability with associated measurement uncertainty (Accred. Qual. Assur.:2006)
      [45].
  - content: ISO/REMCO has an analogous definition (Accred. Qual. Assur.:2006) [45]
      but uses the modifiers “metrological” and “metrologically” to refer to both
      quantity and nominal property.
  terms:
  - type: expression
    normative_status: preferred
    designation: certified reference material
  - type: abbreviation
    normative_status: admitted
    designation: CRM
    related:
    - type: abbreviated_form_for
      target: certified reference material
date_accepted: '2012-01-01T00:00:00+00:00'
