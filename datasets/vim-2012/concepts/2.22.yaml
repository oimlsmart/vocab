data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: condition of {{measurement,2.1}}, out of a set of conditions that includes
      the same {{measurement procedure,2.6}}, same location, and replicate measurements
      on the same or similar objects over an extended period of time, but may include
      other conditions involving changes
  examples: []
  id: 2.22-eng
  language_code: eng
  notes:
  - content: The changes can include new {{calibrations,2.39}}, {{calibrators,5.12}},
      operators, and {{measuring systems,3.2}}.
  - content: A specification for the conditions should contain the conditions changed
      and unchanged, to the extent practical.
  - content: In chemistry, the term “inter-serial precision condition of measurement”
      is sometimes used to designate this concept.
  terms:
  - type: expression
    normative_status: preferred
    designation: intermediate precision condition of measurement
  - type: expression
    normative_status: admitted
    designation: intermediate precision condition
date_accepted: '2012-01-01T00:00:00+00:00'
