---
data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: donnée liée à une propriété d'un phénomène, d'un corps ou d'une substance,
      ou à un système de constituants de composition ou de structure connue, obtenue
      à partir d'une source identifiée, évaluée de façon critique et vérifiée en exactitude
  examples:
  - content: Données de référence relatives à la solubilité de composés chimiques,
      publiées par l'UICPA.
  id: 5.16-fra
  language_code: fra
  notes:
  - content: Dans la définition, le terme «exactitude» peut désigner soit une {{2.13,exactitude de mesure}}, soit l'«exactitude de la valeur d'une propriété qualitative».
  - content: En anglais, «data» est une forme plurielle dont le singulier est «datum».
      «Data» est couramment utilisé au sens singulier à la place de «datum».
  terms:
  - type: expression
    normative_status: preferred
    designation: donnée de référence
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
id: f01ff512-0be6-4346-950a-29ddc3bd3c1e
