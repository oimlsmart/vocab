---
data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{2.6,measurement procedure}} accepted as providing {{2.9,measurement results}}
      fit for their intended use in assessing {{2.14,measurement trueness}} of {{2.10,measured quantity values}} obtained from other measurement procedures for {{1.1,quantities}}
      of the same {{1.2,kind}}, in {{2.39,calibration}}, or in characterizing {{5.13,reference materials}}"
  examples: []
  id: 2.7-eng
  language_code: eng
  notes:
  - content: Reference measurement procedures are often used in calibration and in
      assigning values to reference materials.
  terms:
  - type: expression
    normative_status: preferred
    designation: reference measurement procedure
  annotations:
  - content: "The definition systematically uses preferred terms and so is long and
      complex. A shorter definition, coupled with a Note, might be sufficient: \n\"measurement
      procedure used in the process of providing results for assessing trueness of
      values obtained from other measurement procedures for quantities of the same
      kind\""
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
