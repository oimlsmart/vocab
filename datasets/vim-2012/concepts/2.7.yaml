data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{2.6,procédure de mesure}} considérée comme fournissant des {{2.9,résultats de mesure}} adaptés à leur usage prévu pour l'évaluation de la {{2.14,justesse}}
      de {{2.10,valeurs mesurées}} obtenues à partir d'autres procédures de mesure
      pour des {{1.1,grandeurs}} de la même {{1.2,nature}}, pour un {{2.39,étalonnage}}
      ou pour la caractérisation de {{5.13,matériaux de référence}}"
  examples: []
  id: 2.7-fra
  language_code: fra
  notes:
  - content: Des procédures de mesure de référence sont souvent utilisées dans les
      étalonnages et pour assigner des valeurs aux matériaux de référence.
  terms:
  - type: expression
    normative_status: preferred
    designation: procédure de mesure de référence
  - type: expression
    normative_status: admitted
    designation: procédure opératoire de référence
    grammar_info:
    - gender: f
  annotations:
  - content: |-
      La définition est longue et complexe (et utilise systématiquement en anglais les termes privilégiés). Une définition plus courte, associée à une note, pourrait suffire :
      «procédure de mesure utilisée pour fournir des résultats destinés à évaluer la justesse des valeurs obtenues à partir d'autres procédures de mesure pour des grandeurs de même nature»
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
id: 23f5d9e7-40ea-4d75-8c87-ac3c2cd17d44
