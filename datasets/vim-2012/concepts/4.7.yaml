data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: set of {{1.19,values}} of {{1.1,quantities}} of the same {{1.2,kind}}
      that can be measured by a given {{3.1,measuring instrument}} or {{3.2,measuring system}} with specified {{4.24,instrumental measurement uncertainty}}, under
      defined conditions
  examples: []
  id: 4.7-eng
  language_code: eng
  notes:
  - content: In some fields, the term is “measuring range” or “measurement range”.
  - content: The lower limit of a measuring interval should not be confused with {{4.18,detection limit}}.
  terms:
  - type: expression
    normative_status: preferred
    designation: measuring interval
  - type: expression
    normative_status: admitted
    designation: working interval
