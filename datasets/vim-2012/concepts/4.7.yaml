data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: ensemble des {{1.19,valeurs}} de {{1.1,grandeurs}} d'une même {{1.2,nature}}
      qu'un {{3.1,instrument de mesure}} ou un {{3.2,système de mesure}} donné peut
      mesurer avec une {{4.24,incertitude instrumentale}} spécifiée, dans des conditions
      déterminées
  examples: []
  id: 4.7-fra
  language_code: fra
  notes:
  - content: Dans certains domaines, le terme anglais est «measuring range» ou «measurement
      range». En français, le terme «étendue de mesure» est parfois improprement employé.
  - content: Il convient de ne pas confondre la limite inférieure d'un intervalle
      de mesure avec la {{4.18,limite de détection}}.
  terms:
  - type: expression
    normative_status: preferred
    designation: intervalle de mesure
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
