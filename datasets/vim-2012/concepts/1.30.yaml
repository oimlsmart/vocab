data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: propriété d'un phénomène, d'un corps ou d'une substance, que l'on ne
      peut pas exprimer quantitativement
  examples:
  - content: Sexe d'une personne.
  - content: Couleur d'un spécimen de peinture.
  - content: Couleur d'un spot test en chimie.
  - content: Code de pays ISO à deux lettres.
  - content: Séquence d'acides aminés dans un polypeptide.
  id: 1.30-fra
  language_code: fra
  notes:
  - content: Une propriété qualitative a une valeur, qui peut être exprimée par des
      mots, par des codes alphanumériques ou par d'autres moyens.
  - content: La valeur d'une propriété qualitative ne doit pas être confondue avec
      la {{valeur nominale,4.6}} d'une grandeur.
  - content: "[Annotation] Les propriétés qualitatives se distinguent des grandeurs,
      qui sont des propriétés que l'on peut exprimer quantitativement et classer dans
      un ordre croissant ou décroissant."
  - content: "[Annotation] ANNOTATION (pour les Exemples 2 et 3) (informative) [3
      décembre 2013] La couleur d'un spécimen de peinture est parfois considérée comme
      une propriété qualitative, mais une couleur pure peut être caractérisée par
      la longueur d'onde d'une onde électromagnétique, qui est une grandeur mesurable."
  terms:
  - type: expression
    normative_status: preferred
    designation: propriété qualitative
  - type: expression
    normative_status: admitted
    designation: attribut, m
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
