    type: accepted
  definition:
  - content: set of mathematical rules and operations applied to {{1.1,quantities}}
      other than {{1.26,ordinal quantities}}
  examples: []
  id: 1.21-eng
  language_code: eng
  notes:
  - content: In quantity calculus, {{1.22,quantity equations}} are preferred to {{1.25,numerical value equations}} because quantity equations are independent of the choice
      of {{1.9,measurement units}}, whereas numerical value equations are not (see
      ISO 31-0:1992, 2.2.2).
  terms:
  - type: expression
    normative_status: preferred
    designation: quantity calculus
date_accepted: '2012-01-01T00:00:00+00:00'
