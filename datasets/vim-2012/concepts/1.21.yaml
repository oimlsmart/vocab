    type: accepted
  definition:
  - content: ensemble de règles et opérations mathématiques appliquées aux {{1.1,grandeurs}}
      autres que les {{1.26,grandeurs ordinales}}
  examples: []
  id: 1.21-fra
  language_code: fra
  notes:
  - content: En algèbre des grandeurs, les {{1.22,équations aux grandeurs}} sont préférées
      aux {{1.25,équations aux valeurs numériques}} car les premières, contrairement
      aux secondes, sont indépendantes du choix des {{1.9,unités de mesure}} (voir
      l'ISO 31-0:1992, 2.2.2).
  terms:
  - type: expression
    normative_status: preferred
    designation: algèbre des grandeurs
