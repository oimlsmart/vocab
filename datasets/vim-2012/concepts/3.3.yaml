data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{3.1,measuring instrument}} providing an output signal carrying information
      about the {{1.19,value}} of the {{1.1,quantity}} being measured"
  examples:
  - content: Voltmeter, micrometer, thermometer, electronic balance.
  id: 3.3-eng
  language_code: eng
  notes:
  - content: An indicating measuring instrument may provide a record of its {{4.1,indication}}.
  - content: An output signal may be presented in visual or acoustic form. It may
      also be transmitted to one or more other devices.
  terms:
  - type: expression
    normative_status: preferred
    designation: indicating measuring instrument
date_accepted: '2012-01-01T00:00:00+00:00'
