data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: '{{measuring instrument,3.1}} providing an output signal carrying information
      about the {{value,1.19}} of the {{quantity,1.1}} being measured'
  examples:
  - content: Voltmeter, micrometer, thermometer, electronic balance.
  id: 3.3-eng
  language_code: eng
  notes:
  - content: An indicating measuring instrument may provide a record of its {{indication,4.1}}.
  - content: An output signal may be presented in visual or acoustic form. It may
      also be transmitted to one or more other devices.
  terms:
  - type: expression
    normative_status: preferred
    designation: indicating measuring instrument
