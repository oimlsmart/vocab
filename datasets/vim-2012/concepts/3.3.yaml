    type: accepted
  definition:
  - content: "{{3.1,instrument de mesure}} qui fournit un signal de sortie porteur
      d'informations sur la {{1.19,valeur}} de la {{1.1,grandeur}} mesurée"
  examples:
  - content: Voltmètre, micromètre à vis, thermomètre, balance électronique.
  id: 3.3-fra
  language_code: fra
  notes:
  - content: Un appareil de mesure indicateur peut fournir un enregistrement de son
      {{4.1,indication}}.
  - content: Un signal de sortie peut être présenté sous forme visuelle ou acoustique.
      Il peut aussi être transmis à un ou plusieurs autres dispositifs.
  terms:
  - type: expression
    normative_status: preferred
    designation: appareil de mesure indicateur
  - type: expression
    normative_status: admitted
    designation: appareil indicateur
