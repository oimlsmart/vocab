data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: ensemble d'opérations réalisées sur un {{3.2,système de mesure}} pour
      qu'il fournisse des {{4.1,indications}} prescrites correspondant à des {{1.19,valeurs}}
      données des {{1.1,grandeurs}} à mesurer
  examples: []
  id: 3.11-fra
  language_code: fra
  notes:
  - content: Divers types d'ajustage d'un système de mesure sont le {{3.12,réglage de zéro}},
      le réglage de décalage, le réglage d'étendue (appelé aussi réglage de gain).
  - content: Il convient de ne pas confondre l'ajustage d'un système de mesure avec
      son {{2.39,étalonnage}}, qui est un préalable à l'ajustage.
  - content: Après un ajustage d'un système de mesure, le système demande généralement
      à être réétalonné.
  terms:
  - type: expression
    normative_status: preferred
    designation: ajustage d'un système de mesure
  - type: expression
    normative_status: admitted
    designation: ajustage
    grammar_info:
    - gender: m
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
