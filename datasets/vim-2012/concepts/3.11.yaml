data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: set of operations carried out on a {{3.2,measuring system}} so that it
      provides prescribed {{4.1,indications}} corresponding to given {{1.19,values}}
      of a {{1.1,quantity}} to be measured
  examples: []
  id: 3.11-eng
  language_code: eng
  notes:
  - content: Types of adjustment of a measuring system include {{3.12,zero adjustment of a measuring system}}, offset adjustment, and span adjustment (sometimes
      called gain adjustment).
  - content: Adjustment of a measuring system should not be confused with {{2.39,calibration}},
      which is a prerequisite for adjustment.
  - content: After an adjustment of a measuring system, the measuring system must
      usually be recalibrated.
  terms:
  - type: expression
    normative_status: preferred
    designation: adjustment of a measuring system
  - type: expression
    normative_status: admitted
    designation: adjustment
date_accepted: '2012-01-01T00:00:00+00:00'
