data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: closeness of agreement between {{4.1,indications}} or {{2.10,measured quantity values}} obtained by replicate {{2.1,measurements}} on the same or similar
      objects under specified conditions
  examples: []
  id: 2.15-eng
  language_code: eng
  notes:
  - content: Measurement precision is usually expressed numerically by measures of
      imprecision, such as standard deviation, variance, or coefficient of variation
      under the specified conditions of measurement.
  - content: The 'specified conditions' can be, for example, {{2.20,repeatability conditions of measurement}}, {{2.22,intermediate precision conditions of measurement}},
      or {{2.24,reproducibility conditions of measurement}} (see ISO 5725-1:1994).
  - content: Measurement precision is used to define {{2.21,measurement repeatability}},
      {{2.23,intermediate measurement precision}}, and {{2.25,measurement reproducibility}}.
  - content: Sometimes “measurement precision” is erroneously used to mean {{2.13,measurement accuracy}}.
  terms:
  - type: expression
    normative_status: preferred
    designation: measurement precision
  - type: expression
    normative_status: admitted
    designation: precision
  annotations:
  - content: 'Here "quantity value" can be replaced with "value" without ambiguity:
      "closeness of agreement between indications or measured values obtained by replicate
      measurements on the same or similar objects under specified conditions".'
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
