data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: étroitesse de l'accord entre les {{4.1,indications}} ou les {{2.10,valeurs mesurées}} obtenues par des {{2.1,mesurages}} répétés du même objet ou
      d'objets similaires dans des conditions spécifiées
  examples: []
  id: 2.15-fra
  language_code: fra
  notes:
  - content: La fidélité est en général exprimée numériquement par des caractéristiques
      telles que l'écart-type, la variance ou le coefficient de variation dans les
      conditions spécifiées.
  - content: Les conditions spécifiées peuvent être, par exemple, des {{2.20,conditions de répétabilité}}, des {{2.22,conditions de fidélité intermédiaire}} ou
      des {{2.24,conditions de reproductibilité}} (voir l'ISO 5725-1:1994).
  - content: La fidélité sert à définir la {{2.21,répétabilité de mesure}}, la {{2.23,fidélité intermédiaire de mesure}} et la {{2.25,reproductibilité de mesure}}.
  - content: Le terme «fidélité de mesure» est quelquefois utilisé improprement pour
      désigner l'{{2.13,exactitude de mesure}}.
  terms:
  - type: expression
    normative_status: preferred
    designation: fidélité de mesure
  - type: expression
    normative_status: admitted
    designation: fidélité
    grammar_info:
    - gender: f
date_accepted: '2012-01-01T00:00:00+00:00'
