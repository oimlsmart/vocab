---
data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{1.1,quantity}} that must be measured, or a quantity, the {{1.19,value}}
      of which can be otherwise obtained, in order to calculate a {{2.10,measured quantity value}} of a {{2.3,measurand}}"
  examples:
  - content: When the length of a steel rod at a specified temperature is the measurand,
      the actual temperature, the length at that actual temperature, and the linear
      thermal expansion coefficient of the rod are input quantities in a measurement
      model.
  id: 2.50-eng
  language_code: eng
  notes:
  - content: An input quantity in a measurement model is often an output quantity
      of a {{3.2,measuring system}}.
  - content: "{{4.1,Indications}}, {{2.53,corrections}} and {{2.52,influence quantities}}
      can be input quantities in a measurement model."
  terms:
  - type: expression
    normative_status: preferred
    designation: input quantity in a measurement model
  - type: expression
    normative_status: admitted
    designation: input quantity
  annotations:
  - content: 'Here "measured quantity value" can be replaced by "measured value" without
      ambiguity: "quantity that must be measured, or a quantity, the value of which
      can be otherwise obtained, in order to calculate a measured value of a measurand".'
date_accepted: '2012-01-01T00:00:00+00:00'
