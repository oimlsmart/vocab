data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{1.1,grandeur}} qui doit être mesurée, ou grandeur dont la {{1.19,valeur}}
      peut être obtenue autrement, pour calculer une {{2.10,valeur mesurée}} d'un
      {{2.3,mesurande}}"
  examples:
  - content: Lorsque le mesurande est la longueur d'une tige d'acier à une température
      spécifiée, la température réelle, la longueur à la température réelle et le
      coefficient de dilatation thermique linéique de la tige sont des grandeurs d'entrée
      dans un modèle de mesure.
  id: 2.50-fra
  language_code: fra
  notes:
  - content: Une grandeur d'entrée dans un modèle de mesure est souvent une grandeur
      de sortie d'un {{3.2,système de mesure}}.
  - content: Les {{4.1,indications}}, les {{2.53,corrections}} et les {{2.52,grandeurs d'influence}} sont des grandeurs d'entrée dans un modèle de mesure.
  terms:
  - type: expression
    normative_status: preferred
    designation: grandeur d'entrée dans un modèle de mesure
  - type: expression
    normative_status: admitted
    designation: grandeur d'entrée
    grammar_info:
    - gender: f
date_accepted: '2012-01-01T00:00:00+00:00'
