data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: formulation d'une {{2.26,incertitude de mesure}} et des composantes de
      cette incertitude, ainsi que de leur calcul et de leur combinaison
  examples: []
  id: 2.33-fra
  language_code: fra
  notes:
  - content: Un bilan d'incertitude devrait comprendre le {{2.48,modèle de mesure}},
      les estimations et incertitudes associées aux {{1.1,grandeurs}} qui interviennent
      dans ce modèle, les covariances, le type des fonctions de densité de probabilité
      utilisées, les degrés de liberté, le type d'évaluation de l'incertitude, ainsi
      que tout {{2.38,facteur d'élargissement}}.
  terms:
  - type: expression
    normative_status: preferred
    designation: bilan d'incertitude
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
