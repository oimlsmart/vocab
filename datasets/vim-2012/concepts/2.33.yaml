data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: statement of a {{2.26,measurement uncertainty}}, of the components of
      that measurement uncertainty, and of their calculation and combination
  examples: []
  id: 2.33-eng
  language_code: eng
  notes:
  - content: An uncertainty budget should include the {{2.48,measurement model}},
      estimates and measurement uncertainties associated with the {{1.1,quantities}}
      in the measurement model, covariances, type of applied probability density functions,
      degrees of freedom, type of evaluation of measurement uncertainty, and any {{2.38,coverage factor}}.
  terms:
  - type: expression
    normative_status: preferred
    designation: uncertainty budget
date_accepted: '2012-01-01T00:00:00+00:00'
