data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: property of a {{measuring system,3.2}}, used with a specified {{measurement
      procedure,2.6}}, whereby it provides measured {{quantity values,1.19}} for one
      or more {{measurands,2.3}} such that the values of each measurand are independent
      of other measurands or other {{quantities,1.1}} in the phenomenon, body, or
      substance being investigated
  examples:
  - content: Capability of a measuring system including a mass spectrometer to measure
      the ion current ratio generated by two specified compounds without disturbance
      by other specified sources of electric current.
  - content: Capability of a measuring system to measure the power of a signal component
      at a given frequency without being disturbed by signal components or other signals
      at other frequencies.
  - content: Capability of a receiver to discriminate between a wanted signal and
      unwanted signals, often having frequencies slightly different from the frequency
      of the wanted signal.
  - content: Capability of a measuring system for ionizing radiation to respond to
      a given radiation to be measured in the presence of concomitant radiation.
  - content: Capability of a measuring system to measure the amount-of-substance concentration
      of creatininium in blood plasma by a Jaffé procedure without being influenced
      by the glucose, urate, ketone, and protein concentrations.
  - content: Capability of a mass spectrometer to measure the amount-of-substance
      abundance of the 28Si isotope and of the 30Si isotope in silicon from a geological
      deposit without influence between the two, or from the 29Si isotope.
  id: 4.13-eng
  language_code: eng
  notes:
  - content: In physics, there is often only one measurand; the other quantities are
      of the same {{kind,1.2}} as the measurand, and they are input quantities to
      the measuring system.
  - content: In chemistry, the measured quantities often involve different components
      in the system undergoing measurement and these quantities are not necessarily
      of the same kind.
  - content: In chemistry, selectivity of a measuring system is usually obtained for
      quantities with selected components in concentrations within stated intervals.
  - content: Selectivity as used in physics (see Note 1) is a concept close to specificity
      as it is sometimes used in chemistry.
  terms:
  - type: expression
    normative_status: preferred
    designation: selectivity of a measuring system
  - type: expression
    normative_status: admitted
    designation: selectivity
  annotations:
  - content: 'Here "quantity values" can be replaced by "values" without ambiguity:
      "property of a measuring system, used with a specified measurement procedure,
      whereby it provides measured values for one or more measurands such that the
      values of each measurand are independent of other measurands or other quantities
      in the phenomenon, body, or substance being investigated".'
date_accepted: '2012-01-01T00:00:00+00:00'
