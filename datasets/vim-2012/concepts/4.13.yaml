data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: propriété d'un {{système de mesure,3.2}}, utilisant une {{procédure de
      mesure,2.6}} spécifiée, selon laquelle le système fournit des {{valeurs mesurées,2.10}}
      pour un ou plusieurs {{mesurandes,2.3}}, telles que les valeurs de chaque mesurande
      sont indépendantes des autres mesurandes ou d'autres {{grandeurs,1.1}} dans
      le phénomène, le corps ou la substance en cours d'examen
  examples:
  - content: Aptitude d'un système de mesure comprenant un spectromètre de masse à
      mesurer le rapport des courants ioniques produits par deux composés spécifiés
      sans dépendre d'autres sources spécifiées de courant électrique.
  - content: Aptitude d'un système de mesure à mesurer la puissance d'une composante
      d'un signal à une fréquence donnée sans perturbation par des composantes du
      signal ou par d'autres signaux à d'autres fréquences.
  - content: Aptitude d'un récepteur à discerner un signal désiré de signaux non désirés,
      qui ont souvent des fréquences légèrement différentes de la fréquence du signal
      désiré.
  - content: Aptitude d'un système de mesure de rayonnement ionisant à répondre à
      un rayonnement particulier à mesurer en présence d'un rayonnement concomitant.
  - content: Aptitude d'un système de mesure à mesurer la concentration en quantité
      de matière de créatinine dans le plasma sanguin par une procédure de Jaffé sans
      être influencé par les concentrations de glucose, d'urate, de cétone et de protéines.
  - content: Aptitude d'un spectromètre de masse à mesurer les abondances en quantité
      de matière de l'isotope 28Si et de l'isotope 30Si dans du silicium provenant
      d'un dépôt géologique sans influence entre eux ou par l'isotope 29Si.
  id: 4.13-fra
  language_code: fra
  notes:
  - content: En physique, il y a souvent un seul mesurande; les autres grandeurs sont
      de même {{nature,1.2}} que le mesurande et sont appliquées à l'entrée du système
      de mesure.
  - content: En chimie, les grandeurs mesurées impliquent souvent différents constituants
      dans le système en cours de mesurage et ces grandeurs ne sont pas nécessairement
      de même nature.
  - content: En chimie, la sélectivité d'un système de mesure est généralement obtenue
      pour des grandeurs associées à des constituants sélectionnés dont les concentrations
      sont dans des intervalles déterminés.
  - content: Le concept de sélectivité en physique (voir Note 1) est voisin de celui
      de spécificité, tel qu'il est quelquefois utilisé en chimie.
  terms:
  - type: expression
    normative_status: preferred
    designation: sélectivité
date_accepted: '2012-01-01T00:00:00+00:00'
