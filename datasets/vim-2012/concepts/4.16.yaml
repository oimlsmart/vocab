  definition:
  - content: largest change in a {{value,1.19}} of a {{quantity,1.1}} being measured
      that causes no detectable change in the corresponding {{indication,4.1}}
  examples: []
  id: 4.16-eng
  language_code: eng
  notes:
  - content: Discrimination threshold may depend on, e.g. noise (internal or external)
      or friction. It can also depend on the value of the quantity being measured
      and how the change is applied.
