    type: accepted
  definition:
  - content: expression of the relation between {{4.1,indication}} and corresponding
      {{2.10,measured quantity value}}
  examples: []
  id: 4.31-eng
  language_code: eng
  notes:
  - content: A calibration curve expresses a one-to-one relation that does not supply
      a {{2.9,measurement result}} as it bears no information about the {{2.26,measurement uncertainty}}.
  terms:
  - type: expression
    normative_status: preferred
    designation: calibration curve
  annotations:
  - content: 'Here "measured quantity value" can be replaced by "measured value" without
      ambiguity: "expression of the relation between indication and corresponding
      measured value".'
