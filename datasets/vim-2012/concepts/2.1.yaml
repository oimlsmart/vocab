data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: processus consistant à obtenir expérimentalement une ou plusieurs {{1.19,valeurs}}
      que l'on peut raisonnablement attribuer à une {{1.1,grandeur}}
  examples: []
  id: 2.1-fra
  language_code: fra
  notes:
  - content: Les mesurages ne s'appliquent pas aux {{1.30,propriétés qualitatives}}.
  - content: Un mesurage implique la comparaison de grandeurs ou le comptage d'entités.
  - content: Un mesurage suppose une description de la grandeur compatible avec l'usage
      prévu d'un {{2.9,résultat de mesure}}, une {{2.6,procédure de mesure}} et un
      {{3.2,système de mesure}} étalonné fonctionnant selon la procédure de mesure
      spécifiée, incluant les conditions de mesure.
  terms:
  - type: expression
    normative_status: preferred
    designation: mesurage
  - type: expression
    normative_status: admitted
    designation: mesure
    grammar_info:
    - gender: f
  annotations:
  - content: L'expression «obtenir expérimentalement» dans la définition doit être
      interprétée dans un sens étendu de façon à inclure non seulement une comparaison
      physique directe, mais aussi des modèles et calculs fondés sur des considérations
      théoriques.
  - content: ANNOTATION (pour la Note 3) (informative) [3 décembre 2013] Le but de
      cette note est d'expliquer ce qui est nécessaire pour effectuer un mesurage.
      Il faut d'abord spécifier une incertitude cible et choisir ensuite une procédure
      et un système de mesure appropriés pour effectuer le mesurage de façon à ne
      pas dépasser l'incertitude cible.
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
