data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{1.9,measurement unit}} obtained by dividing a given measurement unit
      by an integer greater than one"
  examples:
  - content: The millimetre is a decimal submultiple of the metre.
  - content: For a plane angle, the second is a nondecimal submultiple of the minute.
  id: 1.18-eng
  language_code: eng
  notes:
  - content: SI prefixes for decimal submultiples of SI {{1.10,base units}} and SI
      {{1.11,derived units}} are given in Note 5 of 1.16.
  terms:
  - type: expression
    normative_status: preferred
    designation: submultiple of a unit
