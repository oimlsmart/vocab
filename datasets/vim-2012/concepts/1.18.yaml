data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{1.9,unité de mesure}} obtenue en divisant une unité de mesure donnée
      par un entier supérieur à un"
  examples:
  - content: Le millimètre est un sous-multiple décimal du mètre.
  - content: Pour l'angle plan, la seconde est un sous-multiple non décimal de la
      minute.
  id: 1.18-fra
  language_code: fra
  notes:
  - content: Les préfixes SI pour les sous-multiples décimaux des {{1.10,unités de base}}
      et des {{1.11,unités dérivées}} du SI sont donnés à la Note 5 de 1.16.
  terms:
  - type: expression
    normative_status: preferred
    designation: sous-multiple d'une unité
