---
data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: function of {{1.1,quantities}}, the value of which, when calculated using
      known {{1.19,quantity values}} for the {{2.50,input quantities in a measurement model}},
      is a {{2.10,measured quantity value}} of the {{2.51,output quantity in the measurement model}}
  examples: []
  id: 2.49-eng
  language_code: eng
  notes:
  - content: If a {{2.48,measurement model}}h(Y, X1, …, Xn) = 0 can explicitly be
      written as Y = f (X1, …, Xn), where Y is the output quantity in the measurement
      model, the function f is the measurement function. More generally, f may symbolize
      an algorithm, yielding for input quantity values x1, …, xn a corresponding unique
      output quantity value y = f (x1, …, xn).
  - content: A measurement function is also used to calculate the {{2.26,measurement uncertainty}}
      associated with the measured quantity value of Y.
  terms:
  - type: expression
    normative_status: preferred
    designation: measurement function
  annotations:
  - content: 'Here "quantity value(s)" can be replaced by "value(s)" without ambiguity:
      "function of quantities, the value of which, when calculated using known values
      for the input quantities in a measurement model, is a measured value of the
      output quantity in the measurement model".'
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
