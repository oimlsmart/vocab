data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: fonction de {{1.1,grandeurs}}, dont la valeur, lorsqu'elle est calculée
      en utilisant des {{1.19,valeurs}} connues pour les {{2.50,grandeurs d'entrée dans le modèle de mesure}}, est une {{2.10,valeur mesurée}} de la {{2.51,grandeur de sortie dans le modèle de mesure}}
  examples: []
  id: 2.49-fra
  language_code: fra
  notes:
  - content: Si un {{2.48,modèle de mesure}}h(Y, X1, …, Xn) = 0 peut être écrit explicitement
      sous la forme Y = f (X1, …, Xn), où Y est la grandeur de sortie dans le modèle
      de mesure, la fonction f est la fonction de mesure. Plus généralement, f peut
      symboliser un algorithme qui fournit, pour les valeurs d'entrée x1, …, xn, une
      valeur de sortie unique correspondante y = f (x1, …, xn).
  - content: On utilise aussi une fonction de mesure pour calculer l'{{2.26,incertitude de mesure}} associée à la valeur mesurée de Y.
  terms:
  - type: expression
    normative_status: preferred
    designation: fonction de mesure
date_accepted: '2012-01-01T00:00:00+00:00'
