data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: composante de l'{{2.26,incertitude de mesure}} qui résulte de la quantité
      finie de détails dans la définition d'un {{2.3,mesurande}}
  examples: []
  id: 2.27-fra
  language_code: fra
  notes:
  - content: L'incertitude définitionnelle est l'incertitude minimale que l'on peut
      obtenir en pratique par tout {{2.1,mesurage}} d'un mesurande donné.
  - content: Toute modification des détails descriptifs conduit à une autre incertitude
      définitionnelle.
  - content: Dans le Guide ISO/CEI 98-3:2008, D.3.4, et dans la CEI 60359, le concept
      d'incertitude définitionnelle est appelé «incertitude intrinsèque».
  terms:
  - type: expression
    normative_status: preferred
    designation: incertitude définitionnelle
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
id: c34ebb5a-1caf-4f19-9ea7-86a96a70d37b
