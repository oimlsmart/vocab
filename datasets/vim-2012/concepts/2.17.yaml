data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: component of {{2.16,measurement error}} that in replicate {{2.1,measurements}}
      remains constant or varies in a predictable manner
  examples: []
  id: 2.17-eng
  language_code: eng
  notes:
  - content: A {{5.18,reference quantity value}} for a systematic measurement error
      is a {{2.11,true quantity value}}, or a {{2.10,measured quantity value}} of
      a {{5.1,measurement standard}} of negligible {{2.26,measurement uncertainty}},
      or a {{2.12,conventional quantity value}}.
  - content: Systematic measurement error, and its causes, can be known or unknown.
      A {{2.53,correction}} can be applied to compensate for a known systematic measurement
      error.
  - content: Systematic measurement error equals measurement error minus {{2.19,random measurement error}}.
  terms:
  - type: expression
    normative_status: preferred
    designation: systematic measurement error
  - type: expression
    normative_status: admitted
    designation: systematic error of measurement
  - type: expression
    normative_status: admitted
    designation: systematic error
date_accepted: '2012-01-01T00:00:00+00:00'
