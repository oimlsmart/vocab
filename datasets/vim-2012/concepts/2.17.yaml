data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: composante de l'{{2.16,erreur de mesure}} qui, dans des {{2.1,mesurages}}
      répétés, demeure constante ou varie de façon prévisible
  examples: []
  id: 2.17-fra
  language_code: fra
  notes:
  - content: La {{5.18,valeur de référence}} pour une erreur systématique est une
      {{2.11,valeur vraie}}, une {{2.10,valeur mesurée}} d'un {{5.1,étalon}} dont
      l'{{2.26,incertitude de mesure}} est négligeable, ou une {{2.12,valeur conventionnelle}}.
  - content: L'erreur systématique et ses causes peuvent être connues ou inconnues.
      On peut appliquer une {{2.53,correction}} pour compenser une erreur systématique
      connue.
  - content: L'erreur systématique est égale à la différence entre l'erreur de mesure
      et l'{{2.19,erreur aléatoire}}.
  terms:
  - type: expression
    normative_status: preferred
    designation: erreur systématique
date_accepted: '2012-01-01T00:00:00+00:00'
