    type: accepted
  definition:
  - content: relation d'égalité entre des {{1.1,grandeurs}} d'un {{1.3,système de grandeurs}}
      donné, indépendante des {{1.9,unités de mesure}}
  examples:
  - content: Q1 = ζQ2 Q3, où Q1, Q2 et Q3 représentent différentes grandeurs et où
      ζ est un facteur numérique.
  - content: T = (1/2) mv2, où Test l'énergie cinétique et vla vitesse d'une particule
      spécifiée de masse m.
  - content: n= It/F, où nest la quantité de matière d'un composé univalent, Iest
      le courant électrique et tla durée de l'électrolyse, et où Fest la constante
      de Faraday.
  id: 1.22-fra
  language_code: fra
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: équation aux grandeurs
