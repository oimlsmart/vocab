data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: '{{5.1,étalon}} établi par l''intermédiaire d''un {{2.39,étalonnage}}
      par rapport à un {{5.4,étalon primaire}} d''une {{1.1,grandeur}} de même {{1.2,nature}}'
  examples: []
  id: 5.5-fra
  language_code: fra
  notes:
  - content: On peut obtenir directement la relation entre l'étalon primaire et l'étalon
      secondaire ou mettre en oeuvre un {{3.2,système de mesure}} intermédiaire étalonné
      par l'étalon primaire, qui assigne un {{2.9,résultat de mesure}} à l'étalon
      secondaire.
  - content: Un étalon dont la {{1.19,valeur}} est assignée par une {{2.8,procédure de mesure primaire}} de mesure de rapport est un étalon secondaire.
  terms:
  - type: expression
    normative_status: preferred
    designation: étalon secondaire
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
