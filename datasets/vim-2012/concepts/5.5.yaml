data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: '{{5.1,measurement standard}} established through {{2.39,calibration}}
      with respect to a {{5.4,primary measurement standard}} for a {{1.1,quantity}}
      of the same {{1.2,kind}}'
  examples: []
  id: 5.5-eng
  language_code: eng
  notes:
  - content: Calibration may be obtained directly between a primary measurement standard
      and a secondary measurement standard, or involve an intermediate {{3.2,measuring system}} calibrated by the primary measurement standard and assigning a
      {{2.9,measurement result}} to the secondary measurement standard.
  - content: A measurement standard having its {{1.19,quantity value}} assigned by
      a ratio {{2.8,primary reference measurement procedure}} is a secondary measurement
      standard.
  terms:
  - type: expression
    normative_status: preferred
    designation: secondary measurement standard
  - type: expression
    normative_status: admitted
    designation: secondary standard
date_accepted: '2012-01-01T00:00:00+00:00'
