data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: ordered set of {{quantity values,1.19}} of {{quantities,1.1}} of a given
      {{kind of quantity,1.2}} used in ranking, according to magnitude, quantities
      of that kind
  examples:
  - content: Celsius temperature scale.
  - content: Time scale.
  - content: Rockwell C hardness scale.
  id: 1.27-eng
  language_code: eng
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: quantity-value scale
  - type: expression
    normative_status: admitted
    designation: measurement scale
  annotations:
  - content: 'Here "quantity values" can be replaced with "values", and "kind of quantity"
      can be replaced with "kind", without ambiguity: "ordered set of values of quantities
      of a given kind used in ranking, according to magnitude, quantities of that
      kind".'
