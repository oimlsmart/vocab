data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: absolute value of the difference between the extreme {{quantity values,1.19}}
      of a {{nominal indication interval,4.4}}
  examples:
  - content: For a nominal indication interval of −10 V to +10 V, the range of the
      nominal indication interval is 20 V.
  id: 4.5-eng
  language_code: eng
  notes:
  - content: Range of a nominal indication interval is sometimes termed “span of a
      nominal interval”.
  - content: '[Annotation] Here "quantity values" can be replaced by "values" without
      ambiguity: "absolute value of the difference between the extreme values of a
      nominal indication interval".'
  terms:
  - type: expression
    normative_status: preferred
    designation: range of a nominal indication interval
