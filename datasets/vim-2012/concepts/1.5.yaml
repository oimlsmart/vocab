    type: accepted
  definition:
  - content: "{{1.1,grandeur}} définie, dans un {{1.3,système de grandeurs}}, en fonction
      des {{1.4,grandeurs de base}} de ce système"
  examples:
  - content: Dans un système de grandeurs ayant pour grandeurs de base la longueur
      et la masse, la masse volumique est une grandeur dérivée définie comme le quotient
      d'une masse par un volume (longueur au cube).
