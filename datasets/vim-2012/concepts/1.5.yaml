  definition:
  - content: "{{1.1,quantity}}, in a {{1.3,system of quantities}}, defined in terms
      of the {{1.4,base quantities}} of that system"
  examples:
  - content: In a system of quantities having the base quantities length and mass,
      mass density is a derived quantity defined as the quotient of mass and volume
      (length to the third power).
