    type: accepted
  definition:
  - content: mathematical relation among all {{1.1,quantities}} known to be involved
      in a {{2.1,measurement}}
  examples: []
  id: 2.48-eng
  language_code: eng
  notes:
  - content: A general form of a measurement model is the equation h(Y, X1, …, Xn)
      = 0, where Y, the {{2.51,output quantity in the measurement model}}, is the
      {{2.3,measurand}}, the {{1.19,quantity value}} of which is to be inferred from
      information about {{2.50,input quantities in the measurement model}}X1, …, Xn.
  - content: In more complex cases where there are two or more output quantities in
      a measurement model, the measurement model consists of more than one equation.
  terms:
  - type: expression
    normative_status: preferred
    designation: measurement model
  - type: expression
    normative_status: admitted
    designation: model of measurement
  - type: expression
    normative_status: admitted
    designation: model
