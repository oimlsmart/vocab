    type: accepted
  definition:
  - content: relation mathématique entre toutes les {{1.1,grandeurs}} qui interviennent
      dans un {{2.1,mesurage}}
  examples: []
  id: 2.48-fra
  language_code: fra
  notes:
  - content: Une forme générale d'un modèle de mesure est l'équation h(Y, X1, …, Xn)
      = 0 , où Y, la {{2.51,grandeur de sortie dans le modèle de mesure}}, est le
      {{2.3,mesurande}}, dont la {{1.19,valeur}} doit être déduite de l'information
      sur les {{2.50,grandeurs d'entrée dans le modèle de mesure}}X1, …, Xn.
  - content: Dans les cas plus complexes où il y a deux grandeurs de sortie ou plus,
      le modèle de mesure comprend plus d'une seule équation.
  terms:
  - type: expression
    normative_status: preferred
    designation: modèle de mesure
  - type: expression
    normative_status: admitted
    designation: modèle
