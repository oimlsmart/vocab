data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{1.13,system of units}}, based on a given {{1.3,system of quantities}},
      in which the {{1.9,measurement unit}} for each {{1.5,derived quantity}} is a
      {{1.12,coherent derived unit}}"
  examples:
  - content: Set of coherent SI units and relations between them.
  id: 1.14-eng
  language_code: eng
  notes:
  - content: A system of units can be coherent only with respect to a system of quantities
      and the adopted {{1.10,base units}}.
  - content: For a coherent system of units, {{1.25,numerical value equations}} have
      the same form, including numerical factors, as the corresponding {{1.22,quantity equations}}.
  terms:
  - type: expression
    normative_status: preferred
    designation: coherent system of units
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
id: f16af179-cf4b-4cae-896e-4e4fe02829b9
