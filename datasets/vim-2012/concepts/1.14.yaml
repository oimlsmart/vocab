data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{1.13,système d'unités}}, fondé sur un {{1.3,système de grandeurs}}
      donné, dans lequel l'{{1.9,unité de mesure}} de chaque {{1.5,grandeur dérivée}}
      est une {{1.12,unité dérivée cohérente}}"
  examples:
  - content: L'ensemble des unités SI cohérentes et les relations entre elles.
  id: 1.14-fra
  language_code: fra
  notes:
  - content: Un système d'unités ne peut être cohérent que par rapport à un système
      de grandeurs et aux {{1.10,unités de base}} adoptées.
  - content: Pour un système cohérent d'unités, les {{1.25,équations aux valeurs numériques}}
      ont la même forme, y compris les facteurs numériques, que les {{1.22,équations aux grandeurs}} correspondantes.
  terms:
  - type: expression
    normative_status: preferred
    designation: système cohérent d'unités
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
id: 510b9b82-b55a-49b2-92b1-661e7cf8cd72
