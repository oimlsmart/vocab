data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: property of a {{measurement result,2.9}} whereby the result can be related
      to a reference through a documented unbroken chain of {{calibrations,2.39}},
      each contributing to the {{measurement uncertainty,2.26}}
  examples: []
  id: 2.41-eng
  language_code: eng
  notes:
  - content: For this definition, a 'reference' can be a definition of a {{measurement
      unit,1.9}} through its practical realization, or a {{measurement procedure,2.6}}
      including the measurement unit for a non-{{ordinal quantity,1.26}}, or a {{measurement
      standard,5.1}}.
  - content: Metrological traceability requires an established {{calibration hierarchy,2.40}}.
  - content: Specification of the reference must include the time at which this reference
      was used in establishing the calibration hierarchy, along with any other relevant
      metrological information about the reference, such as when the first calibration
      in the calibration hierarchy was performed.
  - content: For {{measurements,2.1}} with more than one {{input quantity in the measurement
      model,2.50}}, each of the input {{quantity values,1.19}} should itself be metrologically
      traceable and the calibration hierarchy involved may form a branched structure
      or a network. The effort involved in establishing metrological traceability
      for each input quantity value should be commensurate with its relative contribution
      to the measurement result.
  - content: Metrological traceability of a measurement result does not ensure that
      the measurement uncertainty is adequate for a given purpose or that there is
      an absence of mistakes.
  - content: A comparison between two measurement standards may be viewed as a calibration
      if the comparison is used to check and, if necessary, correct the quantity value
      and measurement uncertainty attributed to one of the measurement standards.
  - content: The ILAC considers the elements for confirming metrological traceability
      to be an unbroken {{metrological traceability chain,2.42}} to an {{international
      measurement standard,5.2}} or a {{national measurement standard,5.3}}, a documented
      measurement uncertainty, a documented measurement procedure, accredited technical
      competence, metrological traceability to the {{SI,1.16}}, and calibration intervals
      (see ILAC P-10:2002).
  - content: The abbreviated term “traceability” is sometimes used to mean 'metrological
      traceability' as well as other concepts, such as 'sample traceability' or 'document
      traceability' or 'instrument traceability' or 'material traceability', where
      the history (“trace”) of an item is meant. Therefore, the full term of “metrological
      traceability” is preferred if there is any risk of confusion.
  terms:
  - type: expression
    normative_status: preferred
    designation: metrological traceability
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
