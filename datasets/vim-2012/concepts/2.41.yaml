data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: propriété d'un {{résultat de mesure,2.9}} selon laquelle ce résultat
      peut être relié à une référence par l'intermédiaire d'une chaîne ininterrompue
      et documentée d'{{étalonnages,2.39}} dont chacun contribue à l'{{incertitude
      de mesure,2.26}}
  examples: []
  id: 2.41-fra
  language_code: fra
  notes:
  - content: La référence mentionnée dans la définition peut être une définition d'une
      {{unité de mesure,1.9}} sous la forme de sa réalisation pratique, une {{procédure
      de mesure,2.6}}, qui indique l'unité de mesure dans la cas d'une grandeur autre
      qu'une {{grandeur ordinale,1.26}}, ou un {{étalon,5.1}}.
  - content: La traçabilité métrologique nécessite l'existence d'une {{hiérarchie
      d'étalonnage,2.40}}.
  - content: La spécification de la référence doit comprendre la date où cette référence
      a été utilisée dans l'établissement d'une hiérarchie d'étalonnage, ainsi que
      d'autres informations métrologiques pertinentes concernant la référence, telles
      que la date où a été effectué le premier étalonnage de la hiérarchie.
  - content: Pour des {{mesurages,2.1}} comportant plus d'une seule {{grandeur d'entrée
      dans le modèle de mesure,2.50}}, chaque {{valeur,1.19}} d'entrée devrait être
      elle-même métrologiquement traçable et la hiérarchie d'étalonnage peut prendre
      la forme d'une structure ramifiée ou d'un réseau. Il convient que l'effort consacré
      à établir la traçabilité métrologique de chaque valeur d'entrée soit proportionné
      à sa contribution relative au résultat de mesure.
  - content: La traçabilité métrologique d'un résultat de mesure n'assure pas l'adéquation
      de l'incertitude de mesure à un but donné ou l'absence d'erreurs humaines.
  - content: Une comparaison entre deux étalons peut être considérée comme un étalonnage
      si elle sert à vérifier et, si nécessaire, à corriger la valeur et l'incertitude
      attribuées à l'un des étalons.
  - content: L'ILAC considère que les éléments nécessaires pour confirmer la traçabilité
      métrologique sont une {{chaîne de traçabilité métrologique,2.42}} ininterrompue
      à un {{étalon international,5.2}} ou un {{étalon national,5.3}}, une incertitude
      de mesure documentée, une procédure de mesure documentée, une compétence technique
      reconnue, la traçabilité métrologique au {{SI,1.16}} et des intervalles entre
      étalonnages (voir ILAC P-10:2002).
  - content: Le terme abrégé «traçabilité» est quelquefois employé pour désigner la
      traçabilité métrologique, ainsi que d'autres concepts tels que la traçabilité
      d'un spécimen, d'un document, d'un instrument ou d'un matériau, où intervient
      l'historique (la trace) d'une entité. Il est donc préférable d'utiliser le terme
      complet «traçabilité métrologique » s'il y a risque de confusion.
  terms:
  - type: expression
    normative_status: preferred
    designation: traçabilité métrologique
date_accepted: '2012-01-01T00:00:00+00:00'
