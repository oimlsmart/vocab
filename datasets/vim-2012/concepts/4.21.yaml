  definition:
  - content: continuous or incremental change over time in {{4.1,indication}}, due
      to changes in metrological properties of a {{3.1,measuring instrument}}
  examples: []
  id: 4.21-eng
  language_code: eng
  notes:
  - content: Instrumental drift is related neither to a change in a {{1.1,quantity}}
      being measured nor to a change of any recognized {{2.52,influence quantity}}.
