  definition:
  - content: variation continue ou incrémentale dans le temps d'une {{4.1,indication}},
      due à des variations des propriétés métrologiques d'un {{3.1,instrument de mesure}}
  examples: []
  id: 4.21-fra
  language_code: fra
  notes:
