  definition:
  - content: smallest change in a {{1.1,quantity}} being measured that causes a perceptible
      change in the corresponding {{4.1,indication}}
  examples: []
  id: 4.14-eng
  language_code: eng
  notes:
  - content: Resolution can depend on, for example, noise (internal or external) or
      friction. It may also depend on the {{1.19,value}} of a quantity being measured.
