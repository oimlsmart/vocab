    type: accepted
  definition:
  - content: plus petite variation de la {{1.1,grandeur}} mesurée qui produit une
      variation perceptible de l'{{4.1,indication}} correspondante
  examples: []
  id: 4.14-fra
  language_code: fra
  notes:
  - content: La résolution peut dépendre, par exemple, du bruit (interne ou externe)
      ou du frottement. Elle peut aussi dépendre de la {{1.19,valeur}} de la grandeur
      mesurée.
  terms:
  - type: expression
    normative_status: preferred
    designation: résolution
