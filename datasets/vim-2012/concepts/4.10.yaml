data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: condition de fonctionnement extrême qu'un {{3.1,instrument de mesure}}
      ou un {{3.2,système de mesure}} doit pouvoir supporter sans dommage et sans
      dégradation de propriétés métrologiques spécifiées, lorsqu'il est ensuite utilisé
      dans ses {{4.9,conditions assignées de fonctionnement}}
  examples: []
  id: 4.10-fra
  language_code: fra
  notes:
  - content: Les conditions limites de fonctionnement peuvent être différentes pour
      le stockage, le transport et le fonctionnement.
  - content: Les conditions limites de fonctionnement peuvent comprendre des {{1.19,valeurs}}
      limites pour la {{1.1,grandeur}} mesurée et pour les {{2.52,grandeurs d'influence}}.
  terms:
  - type: expression
    normative_status: preferred
    designation: condition limite de fonctionnement
  - type: expression
    normative_status: admitted
    designation: condition limite
    grammar_info:
    - gender: f
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
