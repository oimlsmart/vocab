data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: extreme operating condition that a {{3.1,measuring instrument}} or {{3.2,measuring system}} is required to withstand without damage, and without degradation
      of specified metrological properties, when it is subsequently operated under
      its {{4.9,rated operating conditions}}
  examples: []
  id: 4.10-eng
  language_code: eng
  notes:
  - content: Limiting conditions for storage, transport or operation can differ.
  - content: Limiting conditions can include limiting {{1.19,values}} of a {{1.1,quantity}}
      being measured and of any {{2.52,influence quantity}}.
  terms:
  - type: expression
    normative_status: preferred
    designation: limiting operating condition
