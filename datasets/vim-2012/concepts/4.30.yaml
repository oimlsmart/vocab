data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: expression graphique de la relation entre une {{indication,4.1}} et le
      {{résultat de mesure,2.9}} correspondant
  examples: []
  id: 4.30-fra
  language_code: fra
  notes:
  - content: Un diagramme d'étalonnage est la bande du plan défini par l'axe des indications
      et l'axe des résultats de mesure, qui représente la relation entre une indication
      et un ensemble de {{valeurs mesurées,2.10}}. Il correspond à une relation multivoque;
      la largeur de la bande pour une indication donnée fournit l'{{incertitude instrumentale,4.24}}.
  - content: D'autres expressions de la relation consistent en une {{courbe d'étalonnage,4.31}}
      avec les {{incertitudes de mesure,2.26}} associées, en une table d'étalonnage
      ou en un ensemble de fonctions.
  - content: Le concept est relatif à un {{étalonnage,2.39}} quand l'incertitude instrumentale
      est grande par rapport aux incertitudes de mesure associées aux {{valeurs,1.19}}
      des {{étalons,5.1}}.
  terms:
  - type: expression
    normative_status: preferred
    designation: diagramme d'étalonnage
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
