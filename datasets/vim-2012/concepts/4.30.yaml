---
data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: graphical expression of the relation between {{4.1,indication}} and corresponding
      {{2.9,measurement result}}
  examples: []
  id: 4.30-eng
  language_code: eng
  notes:
  - content: A calibration diagram is the strip of the plane defined by the axis of
      the indication and the axis of measurement result, that represents the relation
      between an indication and a set of {{2.10,measured quantity values}}. A one-to-many
      relation is given, and the width of the strip for a given indication provides
      the {{4.24,instrumental measurement uncertainty}}.
  - content: Alternative expressions of the relation include a {{4.31,calibration curve}}
      and associated {{2.26,measurement uncertainty}}, a calibration table, or a set
      of functions.
  - content: This concept pertains to a {{2.39,calibration}} when the instrumental
      measurement uncertainty is large in comparison with the measurement uncertainties
      associated with the {{1.19,quantity values}} of {{5.1,measurement standards}}.
  terms:
  - type: expression
    normative_status: preferred
    designation: calibration diagram
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
