data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: expression graphique de la relation entre une {{4.1,indication}} et le
      {{2.9,résultat de mesure}} correspondant
  examples: []
  id: 4.30-fra
  language_code: fra
  notes:
  - content: Un diagramme d'étalonnage est la bande du plan défini par l'axe des indications
      et l'axe des résultats de mesure, qui représente la relation entre une indication
      et un ensemble de {{2.10,valeurs mesurées}}. Il correspond à une relation multivoque;
      la largeur de la bande pour une indication donnée fournit l'{{4.24,incertitude instrumentale}}.
  - content: D'autres expressions de la relation consistent en une {{4.31,courbe d'étalonnage}}
      avec les {{2.26,incertitudes de mesure}} associées, en une table d'étalonnage
      ou en un ensemble de fonctions.
  - content: Le concept est relatif à un {{2.39,étalonnage}} quand l'incertitude instrumentale
      est grande par rapport aux incertitudes de mesure associées aux {{1.19,valeurs}}
      des {{5.1,étalons}}.
  terms:
  - type: expression
    normative_status: preferred
    designation: diagramme d'étalonnage
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
