data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: graphical expression of the relation between {{indication,4.1}} and corresponding
      {{measurement result,2.9}}
  examples: []
  id: 4.30-eng
  language_code: eng
  notes:
  - content: A calibration diagram is the strip of the plane defined by the axis of
      the indication and the axis of measurement result, that represents the relation
      between an indication and a set of {{measured quantity values,2.10}}. A one-to-many
      relation is given, and the width of the strip for a given indication provides
      the {{instrumental measurement uncertainty,4.24}}.
  - content: Alternative expressions of the relation include a {{calibration curve,4.31}}
      and associated {{measurement uncertainty,2.26}}, a calibration table, or a set
      of functions.
  - content: This concept pertains to a {{calibration,2.39}} when the instrumental
      measurement uncertainty is large in comparison with the measurement uncertainties
      associated with the {{quantity values,1.19}} of {{measurement standards,5.1}}.
  terms:
  - type: expression
    normative_status: preferred
    designation: calibration diagram
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
