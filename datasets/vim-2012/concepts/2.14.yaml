---
data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: closeness of agreement between the average of an infinite number of replicate
      {{2.10,measured quantity values}} and a {{5.18,reference quantity value}}
  examples: []
  id: 2.14-eng
  language_code: eng
  notes:
  - content: Measurement trueness is not a {{1.1,quantity}} and thus cannot be expressed
      numerically, but measures for closeness of agreement are given in ISO 5725.
  - content: Measurement trueness is inversely related to {{2.17,systematic measurement error}}, but is not related to {{2.19,random measurement error}}.
  - content: "“Measurement accuracy” should not be used for 'measurement trueness'."
  terms:
  - type: expression
    normative_status: preferred
    designation: measurement trueness
  - type: expression
    normative_status: admitted
    designation: trueness of measurement
  - type: expression
    normative_status: admitted
    designation: trueness
  annotations:
  - content: 'Here "quantity value" can be replaced with "value" without ambiguity:
      "closeness of agreement between the average of an infinite number of replicate
      measured values and a reference value".'
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
