data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: device or substance that indicates the presence of a phenomenon, body,
      or substance when a threshold {{value,1.19}} of an associated {{quantity,1.1}}
      is exceeded
  examples:
  - content: Halogen leak detector, litmus paper.
  id: 3.9-eng
  language_code: eng
  notes:
  - content: In some fields, the term “detector” is used for the concept of {{sensor,3.8}}.
  - content: In chemistry, the term “indicator” is frequently used for this concept.
  terms:
  - type: expression
    normative_status: preferred
    designation: detector
