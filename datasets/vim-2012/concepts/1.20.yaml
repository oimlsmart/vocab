data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: nombre dans l'expression de la {{1.19,valeur d'une grandeur}}, autre
      qu'un nombre utilisé comme référence
  examples:
  - content: Pour une fraction molaire égale à 3 mmol/mol, la valeur numérique est
      3 et l'unité est mmol/mol. L'unité mmol/mol est numériquement égale à 0,001,
      mais ce nombre 0,001 ne fait pas partie de la valeur numérique qui reste 3.
  - content: Pour une valeur de 5,7 kg, la valeur numérique est {m} = (5,7 kg)/kg
      = 5,7. La même valeur peut être exprimée comme 5 700 g et la valeur numérique
      est alors {m} = (5 700 g)/g = 5 700.
  id: 1.20-fra
  language_code: fra
  notes:
  - content: Pour les {{1.8,grandeurs sans dimension}}, la référence est une {{1.9,unité de mesure}} qui est un nombre, et ce nombre n'est pas considéré comme faisant
      partie de la valeur numérique
  - content: Pour les {{1.1,grandeurs}} qui ont une unité de mesure (c'est-à-dire
      autres que les {{1.26,grandeurs ordinales}}), la valeur numérique {Q} d'une
      grandeur Qest fréquemment notée {Q} = Q/[Q], où [Q] est le symbole de l'unité
      de mesure
  terms:
  - type: expression
    normative_status: preferred
    designation: valeur numérique
  - type: expression
    normative_status: admitted
    designation: valeur numérique d'une grandeur
    grammar_info:
    - gender: f
date_accepted: '2012-01-01T00:00:00+00:00'
