data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: number in the expression of a {{1.19,quantity value}}, other than any
      number serving as the reference
  examples:
  - content: In an amount-of-substance fraction equal to 3 mmol/mol, the numerical
      quantity value is 3 and the unit is mmol/mol. The unit mmol/mol is numerically
      equal to 0.001, but this number 0.001 is not part of the numerical quantity
      value, which remains 3.
  - content: For a quantity value of 5.7 kg, the numerical quantity value is {m} =
      (5.7 kg)/kg = 5.7. The same quantity value can be expressed as 5 700 g in which
      case the numerical quantity value {m} = (5 700 g)/g = 5 700.
  id: 1.20-eng
  language_code: eng
  notes:
  - content: For {{1.8,quantities of dimension one}}, the reference is a {{1.9,measurement unit}} which is a number and this is not considered as a part of the numerical
      quantity value.
  - content: For {{1.1,quantities}} that have a measurement unit (i.e. those other
      than {{1.26,ordinal quantities}}), the numerical value {Q} of a quantity Qis
      frequently denoted {Q} = Q/[Q], where [Q] denotes the measurement unit.
  terms:
  - type: expression
    normative_status: preferred
    designation: numerical quantity value
  - type: expression
    normative_status: admitted
    designation: numerical value of a quantity
  - type: expression
    normative_status: admitted
    designation: numerical value
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
