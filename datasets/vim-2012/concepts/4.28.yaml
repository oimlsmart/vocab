data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{4.27,datum measurement error}} where the specified {{2.10,measured quantity value}} is zero"
  examples: []
  id: 4.28-eng
  language_code: eng
  notes:
  - content: Zero error should not be confused with absence of {{2.16,measurement error}}.
  terms:
  - type: expression
    normative_status: preferred
    designation: zero error
  annotations:
  - content: 'Here "datum measurement error" can be replaced by "datum error" and
      "measured quantity value" can be replaced by "measured value" without ambiguity:
      "datum error where the specified measured value is zero".'
