data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: expression de la dépendance d'une {{grandeur,1.1}} par rapport aux {{grandeurs
      de base,1.4}} d'un {{système de grandeurs,1.3}} sous la forme d'un produit de
      puissances de facteurs correspondant aux grandeurs de base, en omettant tout
      facteur numérique
  examples: []
  id: 1.7-fra
  language_code: fra
  notes:
  - content: 'EXEMPLE 1 Dans l''{{ISQ,1.6}}, la dimension de la force est notée dim
      F= LMT–2.

      EXEMPLE 2 Dans le même système de grandeurs, dim ρB = ML–3 est la dimension
      de la concentration en masse du constituant B, et ML–3 est aussi la dimension
      de la masse volumique ρ.

      EXEMPLE 3 La période Td''un pendule de longueur len un endroit où l''accélération
      locale de la pesanteur vaut gest

      ou

      où

      Par conséquent, dim C(g) = L–1/2 T.'
  - content: Une puissance d'un facteur est le facteur muni d'un exposant. Chaque
      facteur exprime la dimension d'une grandeur de base.
  - content: Par convention, la représentation symbolique de la dimension d'une grandeur
      de base est une lettre majuscule unique en caractère romain (droit) sans empattement.
      Par convention, la représentation symbolique de la dimension d'une {{grandeur
      dérivée,1.5}} est le produit de puissances des dimensions des grandeurs de base
      conformément à la définition de la grandeur dérivée. La dimension de la grandeur
      Qest notée dim Q.
  - content: Pour établir la dimension d'une grandeur, on ne tient pas compte du caractère
      scalaire, vectoriel ou tensoriel.
  - content: 'Dans un système de grandeurs donné,

      - les grandeurs de même {{nature,1.2}} ont la même dimension,

      - des grandeurs de dimensions différentes sont toujours de nature différente,

      - des grandeurs ayant la même dimension ne sont pas nécessairement de même nature.'
  - content: 'Dans l''ISQ, les symboles correspondant aux dimensions des grandeurs
      de base sont:


      |===

      | lengthlongueur

      | massmasse

      | timetemps

      | electric currentcourant électrique

      | thermodynamic temperaturetempérature thermodynamique

      | amount of substancequantité de matière

      | luminous intensityintensité lumineuse

      |===

      La dimension d''une grandeur Qest donc notée dim Q = LαMβTγIδΘεNζJη où les exposants,
      appelés exposants dimensionnels, sont positifs, négatifs ou nuls.'
