data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: expression of the dependence of a {{quantity,1.1}} on the {{base quantities,1.4}}
      of a {{system of quantities,1.3}} as a product of powers of factors corresponding
      to the base quantities, omitting any numerical factor
  examples:
  - content: In the {{ISQ,1.6}}, the quantity dimension of force is denoted by dim
      F= LMT–2.
  - content: In the same system of quantities, dim ρB = ML–3 is the quantity dimension
      of mass concentration of component B, and ML–3 is also the quantity dimension
      of mass density, ρ (volumic mass).
  - content: 'The period Tof a pendulum of length lat a place with the local acceleration
      of free fall gis

      or

      where

      Hence dim C(g) = L–1/2 T.'
  id: 1.7-eng
  language_code: eng
  notes:
  - content: A power of a factor is the factor raised to an exponent. Each factor
      is the dimension of a base quantity.
  - content: The conventional symbolic representation of the dimension of a base quantity
      is a single upper case letter in roman (upright) sans-serif type. The conventional
      symbolic representation of the dimension of a {{derived quantity,1.5}} is the
      product of powers of the dimensions of the base quantities according to the
      definition of the derived quantity. The dimension of a quantity Qis denoted
      by dim Q.
  - content: In deriving the dimension of a quantity, no account is taken of its scalar,
      vector, or tensor character.
  - content: 'In a given system of quantities,

      - quantities of the same {{kind,1.2}} have the same quantity dimension,

      - quantities of different quantity dimensions are always of different kinds,
      and

      - quantities having the same quantity dimension are not necessarily of the same
      kind.'
  - content: 'Symbols representing the dimensions of the base quantities in the ISQ
      are:


      |===

      | lengthlongueur

      | massmasse

      | timetemps

      | electric currentcourant électrique

      | thermodynamic temperaturetempérature thermodynamique

      | amount of substancequantité de matière

      | luminous intensityintensité lumineuse

      |===

      Thus, the dimension of a quantity Qis denoted by dim Q = LαMβTγIδΘεNζJη where
      the exponents, named dimensional exponents, are positive, negative, or zero.'
  terms:
  - type: expression
    normative_status: preferred
    designation: quantity dimension
  - type: expression
    normative_status: admitted
    designation: dimension of a quantity
  - type: expression
    normative_status: admitted
    designation: dimension
