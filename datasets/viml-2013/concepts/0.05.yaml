    type: accepted
  definition:
  - content: maximum permissible error limit of error extreme value of measurement
      error, with respect to a known reference quantity value, permitted by specifications
      or regulations for a given measurement, measuring instrument, or measuring system
  examples: []
  id: 0.05-eng
  notes:
  - content: Usually the term “maximum permissible errors” or “limits of error” are
      used, where there are two extreme values.
  - content: The term “tolerance” should not be used to designate ‘maximum permissible
      error’. [OIML V2-200:2012, 4.26]
  - content: Usually the term “maximum permissible error” is abbreviated to “MPE”,
      or “mpe”.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: maximum permissible measurement error
