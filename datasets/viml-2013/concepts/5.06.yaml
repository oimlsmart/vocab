  definition:
  - content: ADVANCE \D 5.60 dispositif destiné à accomplir une fonction particulière
      directement impliquée dans l'élaboration, la transmission ou l'affichage de
      résultats de mesurage
  examples: []
  id: 5.06-fra
  notes:
  - content: 1 Un dispositif complémentaire peut ou non être soumis au contrôle métrologique
      légal, compte tenu de sa fonction dans le système de mesure ou des réglementations
      nationales.
  - content: '2 Les principaux dispositifs complémen­taires sont : dispositif de remise
      à zéro ; dispositif indicateur répétiteur ; dispositif d''impression ; dispositif
      de mémorisation ; dispositif indicateur de prix ; dispositif totalisateur ;
      dispositif de prédétermination ; dispositif de libre‑service.'
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: dispositif complémentaire
