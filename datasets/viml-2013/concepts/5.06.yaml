  definition:
  - content: device device intended to perform a particular function, directly involved
      in elaborating, transmitting or displaying measurement results
  examples: []
  id: 5.06-eng
  notes:
  - content: An ancillary device may or may not be subject to legal metrological control
      according to its function in the measuring system or to national regulations.
  - content: 'Main ancillary devices are: • zero setting device; • repeating indicating
      device; • printing device; • memory device; • price indicating device; • totalizing
      indicating device; • pre-setting device; • self-service device.'
