  definition:
  - content: designation governmental authorization of a conformity assessment body
      to perform specified assessment activities [ISO/IEC 17000:2004, 7.2] A.30 désignation
      nomination par une instance gouvernementale d'un organisme d'évaluation de la
      conformité pour réaliser des activités d'évaluation de la conformité spécifiées
      [ISO/CEI 17000:2004, 7.2] A.31 designating authority body established within
      government or empowered by government to designate conformity assessment bodies,
      suspend or withdraw their designation or remove their suspension from designation
      [ISO/IEC 17000:2004, 7.3] A.31 autorité de désignation organisme établi au sein
      du gouvernement, ou habilité par celui-ci, chargé de désigner les organismes
      d'évaluation de la conformité de suspendre, de retirer ou de réattribuer leur
      désignation [ISO/CEI 17000:2004, 7.3] A.32 equivalence equivalence of conformity
      assessment results sufficiency of different conformity assessment results to
      provide the same level of assurance of conformity with regard to the same specified
      requirements [ISO/IEC 17000:2004, 7.4] A.32 équivalence équivalence de résultats
      d'évaluation de la conformité relation entre différents résultats d'évaluation
      de la conformité suffisante pour fournir le même niveau d'assurance de la conformité
      quant aux mêmes exigences spécifiées [ISO/CEI 17000:2004, 7.4] A.33 recognition
      recognition of conformity assessment results acknowledgement of the validity
      of a conformity assessment result provided by another person or body [ISO/IEC
      17000:2004, 7.5] A.33 reconnaissance reconnaissance de résultats d'évaluation
      de la conformité reconnaissance de la validité d'un résultat d'évaluation de
      la conformité fourni par une autre personne ou par un autre organisme [ISO/CEI
      17000:2004, 7.5] A.34 acceptance acceptance of conformity assessment use of
      a conformity assessment result provided by another person or body [ISO/IEC 17000:2004,
      7.6] A.34 acceptation acceptation de résultats d'évaluation de la conformité
      utilisation d'un résultat d'évaluation de la conformité fourni par une autre
      personne ou par un autre organisme [ISO/CEI 17000:2004, 7.6] A.35 unilateral
      arrangement arrangement whereby one party recognizes or accepts the conformity
      assessment results of another party [ISO/IEC 17000:2004, 7.5] A.35 arrangement
      unilatéral arrangement selon lequel une partie reconnaît ou accepte les résultats
      de l'évaluation de la conformité obtenus par une autre partie [ISO/CEI 17000:2004,
      7.5] A.36 bilateral arrangement arrangement whereby two parties recognize or
      accept each other's conformity assessment results [ISO/IEC 17000:2004, 7.8]
      A.36 arrangement bilatéral arrangement selon lequel chacune des parties reconnaît
      ou accepte les résultats de l'évaluation de la conformité obtenus par l'une
      et par l'autre [ISO/CEI 17000:2004, 7.8] A.37 multilateral arrangement arrangement
      whereby more than two parties recognize or accept one another's conformity assessment
      results [ISO/IEC 17000:2004, 7.9] A.37 arrangement multilatéral arrangement
      selon lequel chacune des parties reconnaît ou accepte les résultats de l'évaluation
      de la conformité obtenus par les unes et par les autres [ISO/CEI 17000:2004,
      7.9] Alphabetical index A acceptance A.34 acceptance of conformity assessment
      A.34 accreditation A.19 accreditation body A.3 agreement group A.24 ancillary
      device
