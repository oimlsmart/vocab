data:
  dates:
  - date: '2013-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: processus systématique, indépendant et documenté, permettant d'obtenir
      des enregistrements, des énoncés de faits ou d'autres informations pertinentes,
      et de les évaluer de manière objective pour déterminer dans quelle mesure les
      exigences spécifiées sont respectées
  examples: []
  id: A.12-fra
  notes:
  - content: Alors que le terme « audit » s'applique aux systèmes de management, «
      évaluation » s'applique aux organismes d'évaluation de la conformité et s'utilise
      aussi d'une façon plus générale. [ISO/CEI 17000:2004, 4.4]
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: audit
