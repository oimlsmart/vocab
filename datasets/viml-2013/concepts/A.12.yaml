    type: accepted
  definition:
  - content: systematic, independent, documented process for obtaining records, statements
      of fact or other relevant information and assessing them objectively to determine
      the extent to which specified requirements are fulfilled
  examples: []
  id: A.12-eng
  notes:
  - content: Whilst “audit” applies to management systems, “assessment” applies to
      conformity assessment bodies as well as more generally. [ISO/IEC 17000:2004,
      4.4]
