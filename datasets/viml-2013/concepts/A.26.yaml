  definition:
  - content: relationship between two parties where both have the same rights and
      obligations towards each other
  examples: []
  id: A.26-eng
  notes:
  - content: Reciprocity can exist within a multilateral arrangement comprising a
      network of bilateral reciprocal relationships.
  - content: Although rights and obligations are the same, opportunities emanating
      from them can differ; this can lead to unequal relationships between parties
      [ISO/IEC 17000:2004, 7.11]
