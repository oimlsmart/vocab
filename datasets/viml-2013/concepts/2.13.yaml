  definition:
  - content: verification verification of a measuring instrument after a previous
      verification
  examples: []
  id: 2.13-eng
  notes:
  - content: Subsequent verification includes • mandatory periodic verification, •
      verification after repair, and • voluntary verification.
  - content: Subsequent verification of a measuring instrument may be carried out
      before expiry of the period of validity of a previous verification either at
      the request of the user (owner) or when its verification is declared to be no
      longer valid.
