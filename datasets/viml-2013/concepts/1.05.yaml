  definition:
  - content: entité légale désignée par la loi ou le gouvernement pour assurer la
      responsabilité d’activités spécifiées de métrologie légale
  examples: []
  id: 1.05-fra
  notes:
  - content: L’entité légale peut être un organisme d’état central ou local, ou un
      organisme n’appartenant pas à l’état désigné par l’état.
  - content: La responsabilité peut comprendre l’approbation de type, par exemple.
  sources: []
