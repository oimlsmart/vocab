  definition:
  - content: legal decision taken by a party, either voluntarily or based on a bi-
      or multilateral arrangement whereby a verification certificate issued and/or
      a verification mark applied by another party is recognized as complying with
      relevant requirements, without issuing a new verification certificate and/or
      affixing a new verification mark
