  definition:
  - content: réciprocité relation entre deux parties où les deux ont les mêmes droits
      et obligations l'une vers l'autre
  examples: []
  id: 7.11-eng
  notes:
  - content: La réciprocité peut exister au sein d'un arrangement multilatéral comprenant
      un réseau de relations bilatérales réciproques.
  - content: Bien que les droits et les obligations soient les mêmes, les possibilités
      offertes peuvent être différentes; il peut en découler des relations inégales
      entre les parties. [ISO/CEI 17000:2004,
