data:
  dates:
  - date: '2013-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: démonstration que des exigences spécifiées relatives à un produit, processus,
      système, personne ou organisme sont respectées
  examples: []
  id: A.1-fra
  notes:
  - content: Le domaine de l'évaluation de la conformité comprend des activités définies
      ailleurs dans la norme ISO/IEC 17000 telles que les essais, l'inspection et
      la certification, de même que l'accréditation des organismes d'évaluation de
      la conformité.
  - content: L'expression « objet de l'évaluation de la conformité » ou « objet »
      est utilisée dans la norme ISO/IEC 17000 pour désigner le matériau, le produit,
      l'installation, le processus, le système, la personne ou l'organisme particulier
      auquel l'évaluation de la conformité est appliquée. Le service est couvert par
      la définition de produit. [ISO/IEC 17000:2004, 2.1]
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: évaluation de la conformité
