  definition:
  - content: demonstration that specified requirements relating to a product, process,
      system, person or body are fulfilled
  examples: []
  id: A.1-eng
  notes:
  - content: The subject field of conformity assessment includes activities defined
      in ISO/IEC 17000, such as testing, inspection and certification, as well as
      the accreditation of conformity assessment bodies.
  - content: The expression “object of conformity assessment” or “object” is used
      in ISO/IEC 17000 to encompass any particular material, product, installation,
      process, system, person or body to which conformity assessment is applied. A
      service is covered by the definition of a product. [ISO/IEC 17000:2004, 2.1]
