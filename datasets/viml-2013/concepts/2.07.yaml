  definition:
  - content: legal decision taken by a party either voluntarily or based on a bi-
      or multilateral arrangement whereby a type that was approved by another party
      is recognized as complying with the relevant statutory requirements, without
      issuing a new type approval certificate
  examples: []
  id: 2.07-eng
