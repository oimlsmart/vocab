  definition:
  - content: d’une approbation de type décision légale prise par une partie, volontairement
      ou sur la base d’un accord bi- ou multilatéral, selon laquelle un type préalablement
      approuvé par une autre partie est reconnu comme satisfaisant aux exigences réglementaires
      applicables, sans délivrance d’un nouveau certificat d’approbation de type
