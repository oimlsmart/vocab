data:
  dates:
  - date: '2013-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: grandeur qui, lors d'un mesurage direct, n'a pas d'effet sur la grandeur
      effectivement mesurée, mais a un effet sur la relation entre l'indication et
      le résultat de mesure Exemple 1 Fréquence lors du mesurage direct de l'amplitude
      constante d'un courant alternatif au moyen d'un ampèremètre. Exemple 2 Concentration
      en quantité de matière de bilirubine lors du mesurage direct de la concentration
      en quantité de matière d'hémoglobine dans le plasma sanguin humain. Exemple
      3 Température d'un micromètre lors du mesurage de la longueur d'une tige, mais
      pas la température de la tige elle-même qui peut entrer dans la définition du
      mesurande. Exemple 4 Pression ambiante dans la source d'ions d'un spectromètre
      de masse lors du mesurage d'une fraction molaire.
  examples: []
  id: 0.07-fra
  notes:
  - content: Un mesurage indirect implique une combinaison de mesurages directs, sur
      chacun desquels des grandeurs d'influence peuvent avoir un effet.
  - content: Dans le GUM 1 , le concept « grandeur d'influence » est défini comme
      dans la deuxième édition du VIM, de façon à comprendre non seulement les grandeurs
      qui ont un effet sur le système de mesure, comme dans la définition ci-dessus,
      mais aussi celles qui ont un effet sur les grandeurs effectivement mesurées.
      En outre, le concept n'y est pas limité aux mesurages directs. [OIML V2-200:2012,
      2.52]
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: grandeur d'influence
