  definition:
  - content: decision of legal relevance canceling a type approval
  examples: []
  id: 2.08-eng
  notes:
  - content: The withdrawal is justified in case of alterations of the type, modification
      of its vital parts, circumstances that affect metrological durability and/ or
      reliability, effects altering the metrological performance of the instrument
      required by law and coming to light only after the official type approval was
      granted.
