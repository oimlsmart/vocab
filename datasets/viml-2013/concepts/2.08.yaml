    type: accepted
  definition:
  - content: d’une approbation de type décision de portée légale annulant une approbation
      de type
  examples: []
  id: 2.08-fra
  notes:
  - content: 'Le retrait est justifié dans les cas suivants : modification du type
      ; modification de ses parties essentielles ; circonstances qui affectent la
      durabilité et/ou la fiabilité métrologique ; effets altérant les performances
      métrologiques de l’instrument exigées par la loi et révélés seulement après
      que l’approbation de type officielle a été accordée.'
  sources: []
