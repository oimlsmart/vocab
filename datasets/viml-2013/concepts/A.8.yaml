data:
  dates:
  - date: '2013-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: système de certification de produit appliqué à des produits auxquels
      s'appliquent les mêmes exigences spécifiées, règles spécifiques et procédures
  examples: []
  id: A.8-fra
  notes:
  - content: 1 Adapté d’ISO/IEC 17000:2004, définition 2.8.
  - content: 2 Un « système de certification » est un « système d’évaluation de la
      conformité » selon ISO/IEC 17000:2004, définition 2.7.
  - content: Les règles, procédures et le management utilisés pour procéder à la certification
      de produits, de procédés ou de services sont spécifiées par le système particulier
      de certification.
  - content: ISO/IEC 17067, en combinaison avec ISO/IEC Guide 28 et ISO/IEC Guide
      53 constituent des guides généraux pour la mise en place de systèmes particuliers.
      [ISO/IEC 17065 :2013, 3.9]
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: système particulier de certification
language_code: fra
entry_status: valid
