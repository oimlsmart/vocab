    type: accepted
  definition:
  - content: certification system related to specified products , to which the same
      specified requirements, specific rules and procedures apply
  examples: []
  id: A.8-eng
  notes:
  - content: 1 Adapted from ISO/IEC 17000:2004, definition 2.8.
  - content: 2 A “certification system” is a “conformity assessment system”, which
      is defined in ISO/IEC 17000:2004, definition 2.7.
  - content: 3 The rules, procedures and management for implementing product, process
      and service certification are stipulated by the certification scheme.
  - content: 4 General guidance for the development of schemes is given in ISO/IEC
      17067, in combination with ISO/IEC Guide 28 and ISO/IEC Guide 53. [ISO/IEC 17065:2013,
      3.9]
  sources: []
