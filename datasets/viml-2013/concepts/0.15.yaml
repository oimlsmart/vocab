data:
  dates:
  - date: '2013-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: ajustage ensemble d'opérations réalisées sur un système de mesure pour
      qu'il fournisse des indications prescrites correspondant à des valeurs données
      des grandeurs à mesurer
  examples: []
  id: 0.15-fra
  notes:
  - content: Divers types d'ajustage d'un système de mesure sont le réglage de zéro,
      le réglage de décalage, le réglage d'étendue (appelé aussi réglage de gain).
  - content: Il convient de ne pas confondre l'ajustage d'un système de mesure avec
      son étalonnage, qui est un pré­alable à l'ajustage.
  - content: Après un ajustage d'un système de mesure, le système demande généralement
      à être réétalonné. [OIML V2-200:2012, 3.11] 1. Metrology and its legal aspects
      1. Aspects légaux de la métrologie
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: ajustage d'un système de mesure
language_code: fra
entry_status: valid
