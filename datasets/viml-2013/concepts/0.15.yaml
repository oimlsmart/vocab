data:
  dates:
  - date: '2013-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: adjustment set of operations carried out on a measuring system so that
      it provides prescribed indications corresponding to given values of a quantity
      to be measured
  examples: []
  id: 0.15-eng
  notes:
  - content: Types of adjustment of a measuring system include zero adjustment of
      a measuring system , offset adjustment, and span adjustment (sometimes called
      gain adjustment).
  - content: Adjustment of a measuring system should not be confused with calibration
      , which is a prerequisite for adjustment.
  - content: After an adjustment of a measuring system, the measuring system must
      usually be recalibrated. [OIML V2-200:2012, 3.11]
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: adjustment of a measuring system
