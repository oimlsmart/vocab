  definition:
  - content: technical regulation in the field of legal metrology
  examples: []
  id: 1.03-eng
  notes:
  - content: These regulations shall, when applicable, be compatible with the International
      Recommendations of the OIML and make use of their requirements.
  - content: The scope of legal metrology generally includes protection of the interests
      of individuals and enterprises, protection of national interests, protection
      of public health and safety, including in relation to the environment and medical
      services, and meeting the requirements for commerce and trade.
