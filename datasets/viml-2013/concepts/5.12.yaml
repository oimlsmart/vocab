  definition:
  - content: différence entre l'erreur d'indication et l'erreur intrinsèque d'un instrument
      de mesure
  examples: []
  id: 5.12-fra
  notes:
  - content: Principalement, une faute est le résultat d’une modification non désirée
      des données contenues dans ou transitant par un instrument de mesure électronique.
  - content: Il découle de la définition qu’une “faute” est une valeur numérique exprimée,
      soit en unité de mesure, soit en valeur relative, par exemple sous forme d’un
      pourcentage.
