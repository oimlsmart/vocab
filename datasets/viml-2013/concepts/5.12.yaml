  - date: '2013-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: difference between the error of indication and the intrinsic error of
      a measuring instrument
  examples: []
  id: 5.12-eng
  notes:
  - content: Principally, a fault is the result of an undesired change of data contained
      in or flowing through an electronic measuring instrument.
  - content: From the definition it follows that a “fault” is a numerical value which
      is expressed either in a unit of measurement or as a relative value, for instance
      as a percentage.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: fault
