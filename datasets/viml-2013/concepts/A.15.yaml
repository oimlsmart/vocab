    type: accepted
  definition:
  - content: issue of a statement, based on a decision following review, that fulfillment
      of specified requirements has been demonstrated
  examples: []
  id: A.15-eng
  notes:
  - content: The resulting statement, referred to in ISO/IEC 17000 as a “statement
      of conformity”, conveys the assurance that the specified requirements have been
      fulfilled. Such an assurance does not, of itself, afford contractual or other
      legal guarantees.
  - content: 'First-party and third-party attestation activities are distinguished
      by the terms: declaration, certification and accreditation. For second-party
      attestation, no special term is available. [ISO/IEC 17000:2004, 5.2]'
  sources: []
