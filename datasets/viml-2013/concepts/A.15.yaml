data:
  dates:
  - date: '2013-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: fourniture d'une affirmation, basée sur une décision qui fait suite à
      la revue, démontrant que des exigences spécifiées sont respectées
  examples: []
  id: A.15-fra
  notes:
  - content: L'affirmation qui en résulte, désignée dans la Norme internationale ISO/CEI
      17000 sous le nom de « déclaration de conformité », donne l'assurance que les
      exigences spécifiées ont été respectées. Une telle assurance ne procure, en
      soi, aucune garantie contractuelle, juridique ou autre.
  - content: 'Les activités d''attestation de la conformité par première et tierce
      partie se distinguent par les termes : déclaration, certification et accréditation.
      Pour l''attestation de la conformité par seconde partie, aucun terme particulier
      n''est disponible. [ISO/CEI 17000:2004, 5.2]'
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: attestation
language_code: fra
