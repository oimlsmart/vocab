  definition:
  - content: erreur de durabilité plus grande que la valeur spécifiée dans la Recommandation
      applicable
  examples: []
  id: 5.17-fra
  notes:
  - content: 'Des erreurs de durabilité plus grandes que la valeur spécifiée, peuvent
      cependant ne pas être considérées comme significatives ; l a Recommandation
      applicable doit indiquer lorsque de telles exceptions s’appliquent. Par exemple,
      l’apparition d’une ou plusieurs des erreurs suivantes peut être acceptable :
      l’indication ne peut être interprétée, mise en mémoire ou transmise comme un
      résultat de mesure ; l’indication rend impossible l''accomplisse­ment de toute
      mesure ; l’indication est si évidemment fausse qu’elle est fatalement identifiée
      par tous ceux intéressés par le résultat du mesurage ; ou une erreur de durabilité
      ne peut être détectée et mise en évidence à cause d’une panne du système de
      protection de durabilité concerné.'
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: erreur de durabilité significative
