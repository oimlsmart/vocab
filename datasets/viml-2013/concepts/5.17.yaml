data:
  dates:
  - date: '2013-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: durability error exceeding the value specified in the applicable Recommendation
  examples: []
  id: 5.17-eng
  notes:
  - content: 'Some durability errors exceeding the value specified may still be considered
      not significant . The applicable Recommendation shall state when such exception
      applies. For example the occurrence of one or some of the following errors may
      be acceptable: the indication cannot be interpreted, memorized or transmitted
      as a measurement result; the indication implies the impossibility to perform
      any measurement; the indication is so obviously wrong that it is bound to be
      noticed by all those interested in the result of the measurement; or a durability
      error cannot be detected and acted upon due to a breakdown of the appropriate
      durability protection facility.'
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: significant durability error
