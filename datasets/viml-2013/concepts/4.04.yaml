  definition:
  - content: 'partie identifiable d’un instrument de mesure ou d’une famille d’instruments
      de mesure ayant une ou plusieurs fonctions spécifiques et qui peut être évaluée
      séparément, en application des exigences de performances métrologiques et techniques
      fixées dans la Recommandation applicable Exemple Les modules typiques d’un instrument
      de pesage sont : le module de pesage, la cellule de pesage, l’indicateur, le
      dispositif analogique ou numérique d’élaboration des données, le terminal ou
      l’afficheur principal.'
