  definition:
  - content: 'identifiable part of a measuring instrument or of a family of measuring
      instruments that performs a specific function or functions and that can be separately
      evaluated according to prescribed metrological and technical performance requirements
      as specified in the relevant Recommendation Example Typical modules of a weighing
      instrument are: weighing module, load cell, indicator, analog or digital data
      processing device, terminal, primary display.'
