data:
  dates:
  - date: '2013-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: défaut plus grand que le défaut limite applicable
  examples: []
  id: 5.14-fra
  notes:
  - content: 'Pour des types d’instruments de mesure donnés, des défauts plus grands
      que le défaut limite peuvent ne pas être considérés comme significatifs ; la
      Recommandation applicable doit indiquer lorsque de telles exceptions s’appliquent.
      Par exemple, l’apparition d’un ou plusieurs des défauts suivants peut être acceptable
      : défauts provenant de causes simultanées et mutuellement indépendantes (par
      exemple champs électromagnétiques et décharges) dans un instrument ou dans ses
      systèmes de contrôle ; défauts rendant impossible l''accomplisse­ment de toute
      mesure ; défauts transitoires provenant de variations momentanées de l''indication,
      qui ne peuvent être interprétées, mises en mémoire ou transmises comme un résultat
      de mesure ; défauts provoquant des variations du résultat de mesurage suffisamment
      importantes pour être identifiées par tous ceux intéressés par le résultat du
      mesurage ; la Recommandation applicable peut spécifier la nature de ces variations.'
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: défaut significatif
