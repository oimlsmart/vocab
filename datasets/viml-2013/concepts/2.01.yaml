  definition:
  - content: the whole of legal metrology activities
  examples: []
  id: 2.01-eng
  notes:
  - content: Legal metrological control includes legal control of measuring instruments,
      metrological supervision, all the operations for the purpose of examining and
      demonstrating, e.g. to testify in a court of law, the condition of a measuring
      instrument and to determine its metrological properties, amongst others by reference
      to the relevant statutory requirements.
  sources: []
