    type: accepted
  definition:
  - content: ensemble des activités de métrologie légale
  examples: []
  id: 2.01-fra
  notes:
  - content: Le contrôle de métrologie légale inclut le contrôle légal des instruments
      de mesure, la surveillance métrologique, l’ensemble des opérations consistant
      à examiner et établir, par exemple dans le cadre d’une expertise devant une
      cour de justice, l’état d’un instrument de mesure, et à déterminer ses caractéristiques
      métrolo­giques, notamment au regard des exigences métrologiques applicables.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: contrôle de métrologie légale
