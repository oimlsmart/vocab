    type: accepted
  definition:
  - content: legal acts and secondary legislation that provide the statutory structure
      to metrology
  examples: []
  id: 1.02-eng
  notes:
  - content: Legal acts and secondary legislation in particular specify the legal
      units of measurement, prescribe requirements with respect to the properties
      of measuring instruments, accuracy of measurement in cases specified by law,
      a system of legal control of measuring instruments, and metrological supervision.
  sources: []
