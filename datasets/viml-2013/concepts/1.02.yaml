data:
  dates:
  - date: '2013-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: actes légaux et réglementaires pris pour application de ces lois, qui
      donnent la structure légale à la métrologie
  examples: []
  id: 1.02-fra
  notes:
  - content: Les actes légaux et la réglementation induite définissent, en particulier,
      les unités de mesure légales et prescrivent les exigences relatives aux caractéristiques
      des instruments de mesure, l’exactitude de mesurage, lorsqu’elle est définie
      par voie légale, un système de contrôle légal des instru­ments de mesure, et
      la surveillance métrologique.
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: loi de métrologie
