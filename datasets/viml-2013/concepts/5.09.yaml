    type: accepted
  definition:
  - content: instrument for the measurement of a quantity, other than the measurand,
      the value of which is used to correct or convert a measurement result
  examples: []
  id: 5.09-eng
  notes:
  - content: Typically, an associated measuring instrument is connected to a device
      ( correction device, conversion device, calculator) that is part of a measuring
      instrument and that changes (corrects, converts) the measurement result to obtain
      a value for the measurand under specified conditions.
  sources: []
