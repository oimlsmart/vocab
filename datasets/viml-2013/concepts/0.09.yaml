  - date: '2013-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: condition de référence condition de fonctionnement prescrite pour évaluer
      les performances d'un instrument de mesure ou d'un système de mesure ou pour
      comparer des résultats de mesure
  examples: []
  id: 0.09-fra
  notes:
  - content: 1 Les conditions de fonctionnement de référence spécifient des intervalles
      de valeurs du mesurande et des grandeurs d'influence.
  - content: 2 Dans la CEI 60050-300, no 311-06-02, le terme « condition de référence
      » désigne une condition de fonctionnement dans laquelle l'incertitude instrumentale
      spécifiée est la plus petite possible. [OIML V2-200:2012, 4.11]
  sources: []
  terms:
  - type: expression
    normative_status: preferred
    designation: condition de fonctionnement de référence
