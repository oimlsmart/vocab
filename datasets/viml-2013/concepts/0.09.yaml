  definition:
  - content: reference condition operating condition prescribed for evaluating the
      performance of a measuring instrument or measuring system or for comparison
      of measurement results
  examples: []
  id: 0.09-eng
  notes:
  - content: 1 Reference operating conditions specify intervals of values of the measurand
      and of the influence quantities.
  - content: In IEC 60050-300, item 311-06-02, the term “reference condition” refers
      to an operating condition under which the specified instrumental measurement
      uncertainty is the smallest possible. [OIML V2-200:2012, 4.11]
  sources: []
