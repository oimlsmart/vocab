  dates:
  - date: '2022-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: relationship between two parties, where both have the same rights and
      obligations towards each other
  examples: []
  id: A.26-eng
  notes:
  - content: Reciprocity can exist within a multilateral arrangement, comprising a
      network of bilateral reciprocal relationships.
  - content: Although the rights and obligations of the parties are the same, opportunities
      emanating from them can differ. This can lead to unequal relationships between
      parties.
