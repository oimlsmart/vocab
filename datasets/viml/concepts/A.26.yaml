  definition:
  - content: relation entre deux parties dans laquelle chacune a les mêmes droits
      et obligations l'une envers l'autre
  examples: []
  id: A.26-fra
  notes:
  - content: 'à l’article: La réciprocité peut exister au sein d’un arrangement multilatéral,
      comprenant un réseau de relations bilatérales réciproques.'
  - content: 'à l’article: Bien que les droits et les obligations des parties soient
      les mêmes, les possibilités qu’elles offrent peuvent être différentes. Il peut
      en découler des relations inégales entre les parties.'
