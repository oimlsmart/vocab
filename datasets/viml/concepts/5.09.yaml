  definition:
  - content: instrument utilisé pour mesurer une grandeur autre que le mesurande,
      dont la valeur est utilisée pour corriger ou convertir un résultat de mesure
  examples: []
  id: 5.09-fra
  notes:
  - content: En général, un instrument de mesure associé est relié à un dispositif
      (dispositif de correction, dispositif de conversion, calculateur), faisant partie
      de l'{{instrument de mesure,0.10}}, permettant de modifier (corriger, convertir)
      le résultat de mesure afin d'obtenir une valeur du mesurande dans des conditions
      spécifiées.
  sources: []
