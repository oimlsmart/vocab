data:
  dates:
  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: for particular quantities of a given kind, an ordered set of values,
      continuous or discrete, defined by convention as a reference for arranging quantities
      of that kind in order of magnitude
  examples:
  - content: the Mohs hardness scale;
  - content: the pH scale in chemistry;
  - content: the scale of octane numbers for petroleum fuel.
  id: 1.22-eng
  language_code: eng
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: conventional reference scale
  - type: expression
    normative_status: admitted
    designation: reference-value scale
