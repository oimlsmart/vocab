    type: accepted
  definition:
  - content: pour des grandeurs particulières d'une nature donnée, ensemble de repères
      ordonnés, continu ou discret, défini par convention comme référence pour classer
      en ordre croissant ou décroissant les grandeurs de cette nature
  examples:
  - content: l'échelle de dureté de Mohs;
  - content: l'échelle de pH en chimie;
  - content: l'échelle des indices d'octane pour les carburants.
