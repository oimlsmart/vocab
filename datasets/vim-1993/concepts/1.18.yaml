  definition:
  - content: valeur (d'une grandeur), f expression quantitative d'une grandeur particu-lière,
      généralement sous la forme d'une unité de mesure multipliée par un nombre
  examples:
  - content: 'length of a rod: mass of a body: amount of substance length of a rod:
      mass of a body: amount of substance 5,34 m  or 534 cm; 0,152 kg or 152 g; EXEMPLES
      longueur d''une tige· masse d''un corps: quantité de matière longueur d''une
      tige· masse d''un corps: quantité de matière 5,34 m  ou 534 cm; 0,152 kg ou
      152 g; of a sample of water (H20): 0,012 mol or 12 mmol NOTES The value of a
      quantity may be posIt1ve, negatIve or zero. The value of a quantity may be expressed
      in more than one way. The values of quantities of dimension one are generally
      expressed as pure numbers. A quantity that cannot be expressed as a unit of
      measurement  multiplied  by  a  number  may  be expressed by reference to a
      conventional reference scale or to a measurement procedure or to both. The value
