data:
  dates:
  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: magnitude of a particular quantity generally expressed as a unit of measurement
      multiplied by a number
  examples:
  - content: 'length of a rod: stem:[5.34 "unitsml(m)"] or stem:[534 "unitsml(cm)"];'
  - content: 'mass of a body: stem:[0.152 "unitsml(kg)"] or stem:[152 "unitsml(g)"];'
  - content: 'amount of substance of a sample of water (H~2~O): stem:[0.012 "unitsml(mol)"] or stem:[12 "unitsml(mmol)"].'
  id: 1.18-eng
  language_code: eng
  notes:
  - content: The value of a quantity may be positive, negative or zero.
  - content: The value of a quantity may be expressed in more than one way.
  - content: The values of quantities of dimension one are generally expressed as pure numbers.
  - content: A quantity that cannot be expressed as a unit of measurement multiplied by a number
      may be expressed by reference to a conventional reference scale or to a
      measurement procedure or to both.
  terms:
  - type: expression
    normative_status: preferred
    designation: value (of a quantity)
date_accepted: '1993-01-01T00:00:00+00:00'
entry_status: valid
