data:
  dates:
  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: expression quantitative d'une grandeur particulière, généralement sous
      la forme d'une unité de mesure multipliée par un nombre
  examples:
  - content: 'longueur d''une tige: stem:[5.34 "unitsml(m)"] ou stem:[534 "unitsml(cm)"];'
  - content: 'masse d''un corps: stem:[0.152 "unitsml(kg)"] ou stem:[152 "unitsml(g)"];'
  - content: 'quantité de matière d''un échantillon d''eau (H~2~O):
      stem:[0.012 "unitsml(mol)"] ou stem:[12 "unitsml(mmol)"]'
  id: 1.18-fra
  language_code: fra
  notes:
  - content: La valeur d'une grandeur peut être positive, négative ou nulle.
  - content: La valeur d'une grandeur peut être exprimée de plus d'une façon.
  - content: Les valeurs des grandeurs de dimension un sont généralement exprimées sous la forme de nombres.
  - content: Certaines grandeurs, pour lesquelles on ne sait pas définir leur rapport à une
      unité, peuvent être exprimées par référence à une échelle de repérage ou à un
      procédé de mesure spécifié ou aux deux.
  terms:
  - type: expression
    normative_status: preferred
    designation: valeur (d'une grandeur)
    grammar_info:
    - gender: f
date_accepted: '1993-01-01T00:00:00+00:00'
