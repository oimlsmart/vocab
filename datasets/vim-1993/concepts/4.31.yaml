  definition:
  - content: ajustage utilisant uniquement les moyens mis à la disposition de l'utilisateur
      Sorne  of  the  terms  used  to  describe  the characteristics of a measuring
      instrument are equally applicable  to  a measuring  device,  a measuring transducer
      or a measuring system and by analogy may also be applied to a material measure
      or a reference material. The input signal to a measuring system may be called
      the stimulus; the output signal may be called the response. ln this chapter,
      the term "measurand" means the quantity that is applied to a measuring instrument.
