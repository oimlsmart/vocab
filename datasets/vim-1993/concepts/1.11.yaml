    type: accepted
  definition:
  - content: 'system of units of measurement in which all of the derived units are
      coherent EXAMPLE The  following  units  (expressed  by  their symbols) form
      part of the coherent system of units in mechanics within the International System
      of Units, SI: m; kg; s; m2; m3; Hz=s-1; m-s-1; m-s-2; kg-m-3; N=kg-m-s-2; Pa=kg-m-1.s-2;
      J=kg-m2-s-2; W=kg-m2,s-3.'
