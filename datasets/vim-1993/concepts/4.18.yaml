data:
  dates:
  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: pour une échelle donnée, longueur de la ligne lissée comprise entre le
      premier et le dernier repère et passant par les milieux de tous les repères
      les plus petits
  examples: []
  id: 4.18-fra
  language_code: fra
  notes:
  - content: La ligne peut être réelle ou imaginaire, courbe ou droite.
  - content: La longueur d'échelle est exprimée en unité de longueur, quelle que soit
      l'unité du mesurande ou l'unité marquée sur l'échelle.
  terms:
  - type: expression
    normative_status: preferred
    designation: longueur d'échelle
    grammar_info:
    - gender: f
