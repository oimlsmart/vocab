data:
  dates:
  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: for a given scale, length of the smooth line between the first and last
      scale marks and passing through the centres of all the shortest scale marks
  examples: []
  id: 4.18-eng
  language_code: eng
  notes:
  - content: The line may be real or imaginary, curved or straight.
  - content: Scale length is expressed in units of length, regardless of the units
      of the measurand or the units marked on the scale.
  terms:
  - type: expression
    normative_status: preferred
    designation: scale length
