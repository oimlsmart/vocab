    type: accepted
  definition:
  - content: particular  quantity,  defined  and  adopted  by convention, with which
      other quantities of the same kind are compared in order to express their magnitudes
      relative to that quantity
  examples: []
  id: 1.7-eng
  language_code: eng
  notes:
  - content: Units of measurement have  names and symbols. 2  Units of quantit1es
      of the same dimension may have the  same  names  and  symbols  even  when  the
      quantities are not of the same kind.
  terms:
  - type: expression
    normative_status: preferred
    designation: unit (of measurement)
