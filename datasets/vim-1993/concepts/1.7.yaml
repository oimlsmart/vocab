    type: accepted
  definition:
  - content: grandeur  particulière, définie et adoptée par convention, à laquelle
      on compare les autres grandeurs de même nature pour les exprimer quantitativement
      par rapport à cette grandeur
  examples: []
  id: 1.7-fra
  language_code: fra
  notes:
  - content: Des noms et des symboles sont attribués par convention aux unités de
      mesure. 2  Les unités de grandeurs   ont la même dimension peuvent avoir le
      même nom et le même symbole, même si ces grandeurs ne sont pas de même nature.
