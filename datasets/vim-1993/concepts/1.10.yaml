  definition:
 - content: derived unît of measurement that may be expressed as a product of powers
      of base units with the proportionality factor one
  examples: []
  id: 1.10-eng
  language_code: eng
  notes:
 - content: Coherency can be determined only with respect to the base units of a
      particular system. A unit may be coherent with respect to one system but not
      to another.
