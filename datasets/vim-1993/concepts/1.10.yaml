    type: accepted
  definition:
 - content: unité de mesure dérivée qui peut s'exprimer comme un produit de puissances
      des unités de base avec un facteur de proportionnalité égal à un
  examples: []
  id: 1.10-fra
  language_code: fra
  notes:
 - content: La cohérence ne peut être établie que par rapport aux unités de base
      d'un système donné. Une unité peut être cohérente dans un système et non dans
      un autre.
  terms:
  - type: expression
    normative_status: preferred
    designation: unité (de mesure) (dérivée) cohérente
