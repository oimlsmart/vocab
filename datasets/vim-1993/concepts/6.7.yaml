  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: standard that is used routinely to calibrate or check material measures,
      measuring instruments or reference materials
  examples: []
  id: 6.7-eng
  language_code: eng
  notes:
  - content: A working standard is usually calibrated against a reference standard.
  - content: A working standard used routinely to ensure that measurements are being
      carried out correctly is called a *check standard*.
  terms:
  - type: expression
    normative_status: preferred
    designation: working standard
