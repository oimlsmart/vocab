    type: accepted
  definition:
  - content: étalon qui est utilisé couramment pour étalonner ou contrôler des mesures
      matérialisées, des appareils de mesure ou des matériaux de référence
  examples: []
  id: 6.7-fra
  language_code: fra
  notes:
  - content: Un étalon de travail est habituellement étalonné par rapport à un étalon
      de référence.
  - content: Un étalon de travail utilisé couramment pour s'assurer que les mesures
      sont effectuées correctement est appelé *étalon de contrôle*.
  terms:
  - type: expression
    normative_status: preferred
    designation: étalon de travail
    grammar_info:
