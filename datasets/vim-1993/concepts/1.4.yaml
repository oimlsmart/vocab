    type: accepted
  definition:
  - content: grandeur définie, dans un système de grandeurs, comme fonction des grandeurs
      de base de ce système
  examples:
  - content: dans un système qui a pour grandeurs de base la longueur, la masse et
      le temps, la vitesse est une grandeur dérivée définie comme le quotient de la
      longueur par le temps.
