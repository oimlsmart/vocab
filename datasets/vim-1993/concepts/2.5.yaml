    type: accepted
  definition:
  - content: ensemble des opérations, décrites d'une manière spécifique, mises en
      œuvre lors de l'exécution de mesurages particuliers selon une méthode donnée
  examples: []
  id: 2.5-fra
  language_code: fra
  notes:
  - content: Le mode opératoire est habituellement décrit dans un document qui est
      quelquefois appelé lui-même «mode opératoire» (ou *méthode de mesure*) et qui
      donne assez de détails pour qu'un opérateur puisse effectuer un mesurage sans
      avoir besoin d'autres informations.
