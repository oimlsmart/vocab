  definition:
  - content: mode opératoire (de mesure), m ensemble  des  opérations,  décrites  d'une
      manière spécifique, mises en œuvre lors de l'exécution de mesurages particuliers
      selon une méthode donnée
  examples: []
  id: 2.5-eng
  language_code: eng
  notes:
  - content: Le mode opératoire est habituellement décrit dans un document qui est
      quelquefois appelé lui-même «mode opératoire» et qui donne assez de détails
      pour qu'un opérateur puisse effectuer un mesu-rage sans avoir besoin d'autres
      informations.
