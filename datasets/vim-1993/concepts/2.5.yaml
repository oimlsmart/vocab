    type: accepted
  definition:
  - content: set of operations, described specifically, used in the performance of
      particular measurements according to a given method
  examples: []
  id: 2.5-eng
  language_code: eng
  notes:
  - content: A measurement procedure is usually recorded in a document that is sometimes
      itself called a "measurement procedure" (or a *measurement method*) and is usually
      in sufficient detail to enable an operator to carry out a measurement without
      additional information.
  terms:
  - type: expression
    normative_status: preferred
    designation: measurement procedure
