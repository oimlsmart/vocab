data:
  dates:
  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
 - content: ensemble des opérations établissant, dans des conditions spécifiées, la relation entre les
      valeurs de la grandeur indiquées par un appareil de mesure ou un système de
      mesure, ou les valeurs représentées par une mesure matéria-lisée ou par un matériau
      de référence, et les valeurs correspondantes de la grandeur réali-sées par des
      étalons
  examples: []
  id: 6.11-fra
  language_code: fra
  notes:
 - content: Le résultat d'un étalonnage permet soit d'attribuer aux indications les
      valeurs correspondantes du mesurande, soit de déterminer les corrections à appliquer
      aux indications.
 - content: Un étalonnage peut aussi servir à déterminer d'autres propriétés métrologiques
      telles que les effets de grandeurs d'influence.
 - content: Le résultat d'un étalonnage peut être consigné dans un document parfois
      appelé certificat d'étalonnage ou rapport d'étalonnage.
  terms:
  - type: expression
    normative_status: preferred
    designation: étalonnage
    grammar_info:
    - gender: m
date_accepted: '1993-01-01T00:00:00+00:00'
entry_status: valid
