  definition:
  - content: étalonnage, m ensemble des opérations établissant, dans des conditions  spécifiées,  la  relation  entre  les
      valeurs de la grandeur indiquées par un appareil de mesure ou un système de
      mesure, ou les valeurs représentées par une mesure matéria-lisée ou par un matériau
      de référence, et les valeurs correspondantes de la grandeur réali-sées par des
      étalons
  examples: []
  id: 6.11-eng
  language_code: eng
  notes:
  - content: Le résultat d un étalonnage permet soit d'attribuer aux 1ndicat1ons les
      valeurs correspondantes du mesurande, soit de déterminer les corrections à appliquer
      aux indications. Un étalonnage peut aussi servir à déterminer d'autres propriétés
      metrolog1ques  telles que les effets de grandeurs d'influence. Le résultat d'un
      étalonnage peut être consigné dans un document parfois appelé certificat d'étalonnage
      ou rapport d'étalonnage. Le résultat d un étalonnage permet soit d'attribuer
