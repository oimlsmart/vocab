data:
  dates:
  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
 - content: set of operations that establish, under specified conditions, the relationship
      between values of quantities indioated by a measuring instrument or measuring
      system, or values represented by a material measure or a reference material,
      and the oorresponding values realized by standards
  examples: []
  id: 6.11-eng
  language_code: eng
  notes:
 - content: The result of a calibration permits either the assignment of values of
      measurands to the indications or the determination of corrections with respect
      to indications.
 - content: A calibration may also determine other metrological properties such as
      the effect of influence quantities.
 - content: The result of a calibration may be recorded in a document, sometimes
      called a calibration certificate or a calibration report.
  terms:
  - type: expression
    normative_status: preferred
    designation: calibration
date_accepted: '1993-01-01T00:00:00+00:00'
