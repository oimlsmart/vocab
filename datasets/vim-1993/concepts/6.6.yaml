  notes:
  - content: A working standard is usually calibrated against a reference standard.
      2 A working standard used routinely to ensure that measurements are being carried
      out correctly is called a check standard. 6.8 (6.10) transfer standard standard
      used as an intermediary to compare standards
  - content: The term transfer device should be used when the intermediary is not
      a standard. 6.9 (6.11) travelling standard standard, sometimes of special construction,
      intended for transport between different loca-tions EXAMPLE  a portable battery-operated
      caes1um frequen-cy standard. 6.10 (6.12) traceability property of the result
      of a measurement or the value of a standard whereby it can be related to stated  references,  usually  national  or  inter-national
      standards, through an unbroken chain of comparisons all having stated uncertainties
  - content: 6.7 (6.09) étalon de travail, m étalon qui est utilisé couramment pour
      étalonner ou contrôler des mesures matérialisées, des appareils  de  mesure  ou
      des  matériaux  de référence
  - content: Un étalon de travail est habituellement étalonné par rapport à un étalon
      de référence. 2 Un étalon de travail utilisé couramment pour s'assurer que les
      mesures sont effectuées correctement est appelé étalon de contrôle. 6.8 (6.10)
      étalon de transfert, m étalon  utilisé  comme  intermédiaire  pour comparer
      entre eux des étalons
  - content: Le terme dispositif de transfert doit être utilisé lorsque l'intermédiaire
      n'est pas un étalon. 6.9 (6.11) étalon voyageur, m étalon, parfois de construction
      spéciale, destiné au transport en des lieux différents EXEMPLE  étalon de fréquence
      à césium, portable, fonc-tionnant sur accumulateur. 6.10 (6.12) traçabilité,
      f propriété du résultat d'un mesurage ou d'un étalon tel qu'il puisse être relié
      à des références déterminées, généralement des étalons natio-naux ou internationaux,
      par l'intermédiaire d'une chaîne ininterrompue  de comparaisons  ayant toutes
      des incertitudes déterminées The concept is often traceable. by the adJective
