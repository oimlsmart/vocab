    type: accepted
  definition:
  - content: intervalle maximal à l'intérieur duquel on peut faire varier le signal
      d'entrée dans les deux sens sans provoquer de variation de la réponse d'un instrument
      de mesure
  examples: []
  id: 5.13-fra
  language_code: fra
  notes:
  - content: La zone morte peut dépendre de l'allure des variations. 2  La zone morte
      est parfois délibérément augmentée pour éviter les variations de réponse dues
      aux petites variations du signal d'entrée.
  terms:
  - type: expression
    normative_status: preferred
    designation: zone morte, f
