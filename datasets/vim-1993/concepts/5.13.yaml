    type: accepted
  definition:
  - content: maximum interval through which a stimulus may be changed in both directions
      without producing a change in response of a measuring instrument
  examples: []
  id: 5.13-eng
  language_code: eng
  notes:
  - content: The dead band may depend on the rate of change. 2  The dead band is sometimes
      deliberately made large to prevent change in the response for small changes
      in the stimulus.
  terms:
  - type: expression
    normative_status: preferred
    designation: dead band
