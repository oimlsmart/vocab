data:
  dates:
  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: valeur d'une grandeur fournie par un instrument de mesure
  examples: []
  id: 3.2-fra
  language_code: fra
  notes:
  - content: La valeur lue sur le dispositif d'affichage peut être appelée *indication
      directe*; elle doit être multipliée par la constante de l'instrument pour obtenir
      l'indication.
  - content: La grandeur peut être le mesurande, un signal de mesure ou une autre
      grandeur utilisée pour calculer la valeur du mesurande.
  - content: Pour une mesure matérialisée, l'indication est la valeur qui lui est
      assignée.
  terms:
  - type: expression
    normative_status: preferred
    designation: indication (d'un instrument de mesure)
    grammar_info:
    - gender: f
