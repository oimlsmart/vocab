data:
  dates:
  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: value of a quantity provided by a measuring instrument
  examples: []
  id: 3.2-eng
  language_code: eng
  notes:
  - content: The value read from the displaying device may be called the *direct indication*;
      it is multiplied by the instrument constant to give the indication.
  - content: The quantity may be the measurand, a measurement signal, or another quantity
      to be used in calculating the value of the measurand.
  - content: For a material measure, the indication is the value assigned to it.
  terms:
  - type: expression
    normative_status: preferred
    designation: indication (of a measuring instrument)
