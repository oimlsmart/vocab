  definition:
  - content: valeur ajoutée algébriquement au résultat brut d'un mesurage pour compenser
      une erreur systématique
  examples: []
  id: 3.15-fra
  language_code: fra
  notes:
  - content: La correction est egale à l'opposé de l'erreur systématique estimée.
  - content: Puisque l'erreur systématique ne peut pas être connue parfaitement, la
      compensation ne peut pas être complète.
