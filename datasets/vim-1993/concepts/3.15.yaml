  definition:
  - content: value added algebraically to the uncorrected result of a measurement
      to compensate for systematic error
  examples: []
  id: 3.15-eng
  language_code: eng
  notes:
  - content: The correction is equal to the negative of the estimated systematic error.
  - content: Since the systematic error cannot be known perfectly, the compensation
      cannot be complete.
  terms:
  - type: expression
    normative_status: preferred
    designation: correction
