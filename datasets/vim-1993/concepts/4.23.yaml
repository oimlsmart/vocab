  definition:
  - content: scale in which each scale spacing is related to the corresponding scale
      interval by a coefficient of proportionality that is constant throughout the
      scale
  examples: []
  id: 4.23-eng
  language_code: eng
  notes:
  - content: A linear scale having constant scale intervals is called a regular scale.
  terms:
  - type: expression
    normative_status: preferred
    designation: linear scale
