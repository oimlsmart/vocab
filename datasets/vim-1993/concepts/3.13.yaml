  definition:
  - content: erreur aléatoire, f résultat d'un mesurage moins la moyenne d'un nombre
      infini de mesurages du même mesu-rande, effectués dans les conditions de répéta-bilité
  examples: []
  id: 3.13-eng
  language_code: eng
  notes:
  - content: L'erreur aléatoire est égale à l'erreur moins l'erreur systématique.
      2  Comme on ne peut faire qu'un nombre fini de mesu-rages, il est seulement
      possible de déterminer une estimation de l'erreur aléatoire.
