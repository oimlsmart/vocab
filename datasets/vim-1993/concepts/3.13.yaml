  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: result of a measurement minus the mean that would result from an infinite
      number of measurements of the same measurand carried out under repeatability
      conditions
  examples: []
  id: 3.13-eng
  language_code: eng
  notes:
  - content: Random error is equal to error minus systematic error
  - content: Because only a finite number of measurements can be made, it is possible
      to determine only an estimate of random error.
  terms:
  - type: expression
    normative_status: preferred
    designation: random error
