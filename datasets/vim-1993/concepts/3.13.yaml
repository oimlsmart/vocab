  - content: résultat d'un mesurage moins la moyenne d'un nombre infini de mesurages
      du même mesu-rande, effectués dans les conditions de répéta-bilité
  examples: []
  id: 3.13-fra
  language_code: fra
  notes:
  - content: L'erreur aléatoire est égale à l'erreur moins l'erreur systématique.
