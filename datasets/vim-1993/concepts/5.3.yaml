data:
  dates:
  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: valeur arrondie ou approximative d'une carac-téristique d'un instrument
      de mesure qui sert de guide pour son utilisation
  examples:
  - content: la valeur stem:[100 "unitsml(Ohm)"] sur une résistance étalon;
  - content: la valeur stem:[1 "unitsml(L)"] marquée sur une fiole jaugée à un trait;
  - content: la valeur stem:[0.1 "unitsml(mol/L)"] de la concentration en quantité de
      matière d'une solution d'acide chlorhydrique, HCI;
  - content: la valeur stem:[25 "unitsml(degC)"] du point de consigne d'un bain thermostatique.
