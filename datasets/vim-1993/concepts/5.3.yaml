    type: accepted
  definition:
  - content: rounded or approximate value of a characteristic of a measuring instrument
      that provides a guide to its use
  examples:
  - content: stem:[100 "unitsml(Ohm)"] as the value marked on a standard resistor;
  - content: stem:[1 "unitsml(L)"] as the value marked on a single-mark volumetric flask;
  - content: stem:[0.1 "unitsml(mol/L)"] as the amount-of-substance concentration of a solution of hydrogen chloride, HCI;
  - content: stem:[25 "unitsml(degC)"] as the set point of a thermostatically controlled bath.
  id: 5.3-eng
  language_code: eng
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: nominal value
