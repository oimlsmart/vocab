data:
  dates:
  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: mesure matérialisée, appareil de mesure, matériau de référence ou système
      de mesure destiné à définir, réaliser, conserver ou reproduire une unité ou
      une ou plusieurs valeurs d'une grandeur pour servir de référence
  examples:
  - content: étalon de masse de stem:[1 "unitsml(kg)"]; 
  - content: résistance étalon de stem:[100 "unitsml(Ohm)"]; 
  - content: ampèremètre étalon;
  - content: étalon de fréquence à césium; électrode de référence à hydrogène; 
  - content: solution de référence de cortisol dans le sérum humain, de concentration certifiée.
  id: 6.1-fra
  language_code: fra
  notes:
  - content: Un ensemble de mesures matérialisées ou d'instruments de mesure semblables
      qui, utilisés conjointement, constituent un étalon, est appelé *étalon collectif*.
  - content: Un ensemble d'étalons de valeurs choisies qui, individuellement ou par
      combinaison, fournissent une série de valeurs de grandeurs de même nature est
      appelé *série d'étalons*.
  terms:
  - type: expression
    normative_status: preferred
    designation: étalon
    grammar_info:
    - gender: m
