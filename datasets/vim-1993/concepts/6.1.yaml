data:
  dates:
  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: material measure, measuring instrument, reference material or measuring
      system intended to define, realize, conserve or reproduce a unit or one or more
      values of a quantity to serve as a reference
  examples:
  - content: stem:[1 "unitsml(kg)"] mass standard; 
  - content: stem:[100 "unitsml(Ohm)"] standard resistor; 
  - content: standard ammeter; 
  - content: caesium frequency standard; 
  - content: standard hydrogen electrode; 
  - content: reference solution of cortisol in human serum having a certified concentration.

  id: 6.1-eng
  language_code: eng
  notes:
  - content: A set of similar material measures or measuring instruments that, through
      their combined use, constitutes a standard, is called a *collective standard*.
  - content: A set of standards of chosen values that, individually or in combination,
      provides a series of values of quantities of the same kind is called a *group
      standard*.
  terms:
  - type: expression
    normative_status: preferred
    designation: (measurement) standard
  - type: expression
    normative_status: admitted
    designation: etalon
date_accepted: '1993-01-01T00:00:00+00:00'
