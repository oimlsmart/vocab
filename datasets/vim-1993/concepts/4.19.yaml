data:
  dates:
  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: ensemble des valeurs limité par les indications extrêmes
  examples: []
  id: 4.19-fra
  language_code: fra
  notes:
  - content: Pour un affichage analogique, cet ensemble peut être appelé *étendue d'échelle*.
  - content: L'étendue des indications est exprimée en unité de l'affichage, quelle
      que soit l'unité du mesurande, et est normalement spécifiée par ses limites
      inférieure et supérieure, par exemple, stem:[100 "unitsml(degC)"] à stem:[200 "unitsml(degC)"].
  - content: Voir note de 5.2.
  terms:
  - type: expression
    normative_status: preferred
    designation: étendue des indications
    grammar_info:
    - gender: f
