  definition:
  - content: étendue des indications, f ensemble des valeurs limité par les indications
      extrêmes
  examples: []
  id: 4.19-eng
  language_code: eng
  notes:
  - content: Pour un affichage analogique, cet ensemble peut être appelé étendue d'échelle.
      2  L'étendue des indications est exprimée en unité de l'affichage, quelle que
      soit l'unité du mesurande, et est normalement spécifiée par ses limites inférieure
      et supérieure, par exemple, 100 °Cà 200 °C. 3 Voir note de 5.2.
