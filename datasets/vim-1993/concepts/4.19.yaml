    type: accepted
  definition:
  - content: set of values bounded by the extreme indications
  examples: []
  id: 4.19-eng
  language_code: eng
  notes:
  - content: For an analogue display this may be called the *scale range*.
  - content: The range of indications is expressed in the units marked on the display,
      regardless of the units of the measurand, and is normally stated in terms of
      its lower and upper limits, for example, stem:[100 "unitsml(degC)"] to stem:[200 "unitsml(degC)"].
  - content: See 5.2 Note.
  terms:
  - type: expression
    normative_status: preferred
    designation: range of indication
