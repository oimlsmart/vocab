  definition:
  - content: ability of a measuring instrument to maintain constant  its metrological  characteristics  with
      time
  examples: []
  id: 5.14-eng
  language_code: eng
  notes:
  - content: 'Where stability with respect to a quantity other than time is considered,
      this should be stated explicitly. 2  Stability may be quantified in several
      ways, for example: in terms of the time over which a metrological characteristic
      changes by a stated amount, or in terms of the change in a characteristic over
      a stated time.'
