    type: accepted
  definition:
  - content: 'aptitude d''un instrument de mesure à conserver ses caractéristiques
      métrologiques constantes au cours du temps :...orsque l''on considère la constance
      en fonction d''une grandeur autre que le temps, il est nécessaire de le mentionner
      explicitement. 2 La constance peut être exprimée quantitativement de plusieurs
      façons, par exemple: par la durée au cours de laquelle une caractéristique métrologique
      évolue d''une quantité donnée, ou par la variation d''une caractéristique au
      cours d''une durée donnée.'
  examples: []
  id: 5.14-fra
  language_code: fra
  notes: []
