    type: accepted
  definition:
  - content: 'constance, f aptitude d''un instrument de mesure à conserver ses caractéristiques
      métrologiques constantes au cours du temps :...orsque l''on considère la constance
      en fonction d''une grandeur autre que le temps, il est nécessaire de le mentionner
      explicitement. 2 La constance peut être exprimée quantitativement de plusieurs
      façons, par exemple: par la durée au cours de laquelle une caractéristique métrologique
      évolue d''une quantité donnée, ou par la variation d''une caractéristique au
      cours d''une durée donnée. ‌5.15 (5.17) transparency ability of a measuring
      instrument not to alter the measurand'
  examples:
  - content: a mass balance 1s transparent; a resistance thermometer that heats the
      medium whose temperature it is intended to measure is not transparent. a mass
      balance 1s transparent; a resistance thermometer that heats the medium whose
      temperature it is intended to measure is not transparent.
