data:
  dates:
  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: dispositif ou substance qui indique la présence d'un phénomène sans nécessairement
      fournir une valeur d'une grandeur associée
  examples:
  - content: détecteur de fuite à halogène; papier au tournesol
  id: 4.15-fra
  language_code: fra
  notes:
  - content: On peut n'avoir une indication que si la valeur de la grandeur atteint
      un seuil donné, parfois appelé seuil de détction du détecteur.
  - content: Dans certains domaines, le terme «détecteur» est utilisé pour le concept
      de «capteur».
  terms:
  - type: expression
    normative_status: preferred
    designation: détecteur
    grammar_info:
    - gender: m
