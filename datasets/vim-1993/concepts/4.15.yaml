  definition:
  - content: détecteur, m dispositif ou substance qui indique la présence d'un phénomène
      sans nécessairement fournir une valeur d'une grandeur associée EXEMPLES détecteur
      de fuite à halogène; papier au tournesol. NOTES détecteur de fuite à halogène;
      papier au tournesol. NOTES On peut n'avoir une indication que si la valeur de
      la  atteint un seuil donné, parfois appelé seuil de détection du détecteur.
      2  Dans certains domaines, le terme «détecteur)) est utilisé pour le concept
      de «capteur».
