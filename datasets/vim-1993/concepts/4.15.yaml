data:
  dates:
  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: device or substance that indicates the presence of a phenomenon without
      necessarily providing a value of an associated quantity
  examples:
  - content: halogen leak detector
  - content: litmus paper
  id: 4.15-eng
  language_code: eng
  notes:
  - content: An indication may be produced only when the value of the quantity reaches
      a threshold, sometimes called the detection limit of the detector.
  - content: In some fields the term "detector" is used for the concept of "sensor".
  terms:
  - type: expression
    normative_status: preferred
    designation: detector
date_accepted: '1993-01-01T00:00:00+00:00'
entry_status: valid
