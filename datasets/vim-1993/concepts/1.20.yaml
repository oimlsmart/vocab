data:
  dates:
  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: value attributed to a particular  quantity and accepted, sometimes by
      convention, as having an uncertainty appropriate for a given purpose
  examples:
  - content: 'at a given location, the value assigned to the quantity realized by
      a reference standard may be taken as a conventional true value; the CODATA (1986)
      recommended value for  the Avogadro constant, NA: 6,022 136 7 x 1023 mol·-1.
      at a given location, the value assigned to the quantity realized by a reference
      standard may be taken as a conventional true value; the CODATA (1986) recommended
      value for  the Avogadro constant, NA: 6,022 136 7 x 1023 mol·-1.'
  id: 1.20-eng
  language_code: eng
  notes:
  - content: '"Conventional  true  value"  Is  sometimes  called assigned  value,  best  estimate  of  the  value,
      conventional value or reference value. "Reference value", in this sense, shouid
      not be confused with "reference value" in the sense used in the NOTE to 5.7.
      2  Frequently, a number of results of measurements of a quantity is used to
      establish a conventional true value.'
  terms:
  - type: expression
    normative_status: preferred
    designation: conventional true value (of a quantity)
