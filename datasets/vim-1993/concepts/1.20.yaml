  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: 'valeur conventionnellement vraie (d''une grandeur), f valeur attribuée
      à une grandeur particulière et reconnue, parfois par convention, comme la représentant
      avec une incertitude appropriée pour un usage donné EXEMPLES en un lieu donné,
      la valeur attribuée à la grandeur réalisée par un étalon de référence peut être
      prise comme étant une valeur conventionnellement vraie; valeur recommandée par
      CODATA (1986) pour la constante d''Avogadro, NA: 6,022 136 7 x 7023 moI-1. en
      un lieu donné, la valeur attribuée à la grandeur réalisée par un étalon de référence
      peut être prise comme étant une valeur conventionnellement vraie; valeur recommandée
      par CODATA (1986) pour la constante d''Avogadro, NA: 6,022 136 7 x 7023 moI-1.'
  examples: []
  id: 1.20-eng
  language_code: eng
  notes:
  - content: La valeur conventionnellement vraie est quelquefois appelée valeur assignée,
      meilleure estimation de la valeur, valeur convenue ou valeur de référence; le
      terme "valeur de référence», dans ce sens, ne doit pas être confondu avec le
      même terme utilisé dans le sens de la note de 5.7. 2  On utilise souvent un
      grand nombre de résultats de mesures  a'une  grandeur  pour  établir  une  valeur
      conventionnellement vraie.
