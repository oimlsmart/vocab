data:
  dates:
  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: relationship  between  a  stimulus  and  the corresponding response,
      for defined conditions
  examples:
  - content: the e.m.f. (electromotive force) of a thermo-couple as a function of
      temperature.
  id: 5.9-eng
  language_code: eng
  notes:
  - content: The relationship may be expressed in the form of a mathematical equation,
      a numerical table, or a graph.
  - content: When the stimulus varies as a function of time, one form of the response
      characteristic is the transfer function (the Laplace transform of the response
      divided by that of the stimulus).
  terms:
  - type: expression
    normative_status: preferred
    designation: response characteristic
date_accepted: '1993-01-01T00:00:00+00:00'
