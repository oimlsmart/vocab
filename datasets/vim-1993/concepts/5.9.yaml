data:
  dates:
  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: relation entre un signal d'entrée et la réponse correspondante, dans
      des conditions définies
  examples: []
  id: 5.9-fra
  language_code: fra
  notes:
  - content: La relation peut s'exprimer sous la forme d'une équation mathématique,
      d'une table numérique ou d'un graphe.
  - content: Lorsque le signal d'entrée varie en fonction du temps, la fonction de
      transfert (quotient de la transformée de Laplace du signal de sortie par la
      transformée de Laplace du signal d'entrée) est une forme de la caractéristique
      de transfert.
  terms:
  - type: expression
    normative_status: preferred
    designation: caractéristique de transfert
    grammar_info:
    - gender: f
