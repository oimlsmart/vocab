  definition:
  - content: relationship  between  a  stimulus  and  the corresponding response,
      for defined conditions EXAMPLE  the e.m.f. (electromotive force) of a thermo-couple
      as a function of temperature.
  examples: []
  id: 5.9-eng
  language_code: eng
  notes:
  - content: The relationship may be expressed in the form of a mathematical equation,
      a numerical table, or a graph. 2 When the stimulus varies as a funct1on of time,
      one form of the response characteristic is the transfer function (the Laplace
      transform of the response divided by that of the stimulus).
  terms:
  - type: expression
    normative_status: preferred
    designation: response characteristic
