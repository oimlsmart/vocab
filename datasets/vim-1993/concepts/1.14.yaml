    type: accepted
  definition:
  - content: unité de mesure d'une grandeur dérivée dans un système donné de grandeurs
  examples: []
  id: 1.14-fra
  language_code: fra
  notes:
  - content: |
      Pour certaines unités dérivées, il existe des noms et des symboles spéciaux;
      par exemple, dans le SI:

      [cols="3",options="header,unnumbered",headerrows=2]
      |===
      .2+| Grandeur 2+| Unité SI dérivée | Nom | Symbole

      | force    | newton | stem:["unitsml(N)"]
      | énergie  | joule  | stem:["unitsml(J)"]
      | pression | pascal | stem:["unitsml(Pa)"]
      |===
  terms:
  - type: expression
    normative_status: preferred
    designation: unité (de mesure) dérivée
    grammar_info:
