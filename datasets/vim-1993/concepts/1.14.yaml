data:
  dates:
  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: unit of measurement of a derived quantity in a given system of quantities
  examples: []
  id: 1.14-eng
  language_code: eng
  notes:
  - content: |
      Some derived units have special names and symbols; for example, in
      the SI:

      [cols="3",options="header,unnumbered",headerrows=2]
      |===
      .2+| Quantity 2+| SI derived unit | Name | Symbol

      | force    | newton | stem:["unitsml(N)"]
      | energy   | joule  | stem:["unitsml(J)"]
      | pressure | pascal | stem:["unitsml(Pa)"]
      |===
  terms:
  - type: expression
    normative_status: preferred
    designation: derived unit (of measurement)
date_accepted: '1993-01-01T00:00:00+00:00'
entry_status: valid
