  definition:
  - content: result of a measurement minus a true value of the measurand
  examples: []
  id: 3.10-eng
  language_code: eng
  notes:
  - content: Since a true value cannot be determined, in practIce a conventional true
      value is used (see 1.19 and 1.20). 2  When it is necessary to distinguish "error"
      from "relative error", the former is sometimes  called absolute error of measurement.
      This should not be confused with absolute value of error, which is the modulus
      of the error.
