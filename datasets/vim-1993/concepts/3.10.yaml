data:
  dates:
  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
 - content: result of a measurement minus a true value of the measurand
  examples: []
  id: 3.10-eng
  language_code: eng
  notes:
 - content: Random error is equal to error minus systematic error.
 - content: Because only a finite number of measurements can be made, it is possible
      to determine only an estimate of random error.
 - content: Étant donné qu'une valeur vraie ne peut pas être déterminée, dans la
      pratique on utilise une valeur conventionnellement vraie (voir 1.19 et 1.20).
 - content: Lorsqu'il est nécessaire de faire la distinction entre «l'erreur» et
      «l'erreur relative», la première est parfois appelée «erreur absolue de mesure».
      Il ne faut pas la confondre avec la valeur absolue de l'erreur, qui est le module
      de l'erreur.
  terms:
  - type: expression
    normative_status: preferred
    designation: error (of measurement)
date_accepted: '1993-01-01T00:00:00+00:00'
entry_status: valid
