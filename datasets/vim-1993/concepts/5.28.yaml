    type: accepted
  definition:
  - content: rapport de l'erreur d'un instrument de mesure à une valeur spécifiée
      pour l'instrument
  examples: []
  id: 5.28-fra
  language_code: fra
  notes:
  - content: La valeur spécifiée est généralement appelée valeur conventionnelle et
      peut être, par exemple, l'intervalle de mesure ou la limite supérieure du calibre
      de l'instrument de mesure
  terms:
  - type: expression
    normative_status: preferred
    designation: erreur réduite conventionnelle (d'un instrument de mesure}, f
