    type: accepted
  definition:
  - content: error of a measuring instrument divided by a value specified for the
      instrument
  examples: []
  id: 5.28-eng
  language_code: eng
  notes:
  - content: The specified value is generally called the fiducial value, and may be,
      for example, the span or the upper limit of the nominal range of the measuring
      instrument.
  terms:
  - type: expression
    normative_status: preferred
    designation: fiducial error (of a measuring instrument)
