    type: accepted
  definition:
  - content: 'rapport de l''erreur d''un instrument de mesure à une valeur spécifiée
      pour l''instrument NOTE La valeur spécifiée est généralement appelée valeur
      conventionnelle et peut être, par exemple, l''intervalle de mesure ou la limite
      supérieure du calibre de l''instrument de mesure. ., 6  ETALONS ln  science
      and technology, the English word "standard" is used with two different meanings:
      as a widely adopted written technical standard, specification,  technical  recommendation  or
      similar document (in French "norme"} and also as  a  measurement  standard  (in  French
      "étalon"). This Vocabulary is concerned solely with  the  second  meaning  and  the  qualifier
      "measurement" is generally omitted for brevity.'
  examples: []
  id: 5.28-fra
  language_code: fra
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: erreur réduite conventionnelle (d'un instrument de mesure}, f
