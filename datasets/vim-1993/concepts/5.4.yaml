    type: accepted
  definition:
  - content: ensemble des valeurs du mesurande pour les-quelles l'erreur d'un instrument
      de mesure est supposée comprise entre des limites spécifiées
  examples: []
  id: 5.4-fra
  language_code: fra
  notes:
  - content: L'erreur est établie par référence à une valeur conven-tionnellement
      vraie. 2 Voir note de 5.2. 5.5 conditions assignées de fonctionnement, f conditions
      d'utilisation pour lesquelles les carac-téristiques métrologiques spécifiées
      d'un instru-ment de mesure  sont supposées  comprises entre des limites données
  - content: Les conditions assignées de fonctionnement spéci-fient généralement des
      valeurs assignées pour le mesurande et pour les grandeurs d'influence.
  terms:
  - type: expression
    normative_status: preferred
    designation: étendue de mesure, f
