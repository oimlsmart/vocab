data:
  dates:
  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
 - content: indication d'un instrument de mesure moins une valeur vraie de la grandeur
      d'entrée corres-pondante
  examples: []
  id: 5.20-fra
  language_code: fra
  notes:
 - content: Étant donné qu'une valeur vraie ne peut pas être déterminée, on utilise
      dans la pratique une valeur conventionnellement vraie (voir 1.19 et 1.20).
 - content: Ce concept s'applique principalement lorsqu'on compare l'instrument à
      un étalon de référence.
 - content: Pour une mesure matérialisée, l'indication est la valeur qui lui est
      assignée.
  terms:
  - type: expression
    normative_status: preferred
    designation: erreur (d'indication) d'un instrument de mesure
    grammar_info:
    - gender: f
