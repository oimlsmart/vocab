data:
  dates:
  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
 - content: indication of a measuring instrument minus a true value of the corresponding
      input quantity
  examples: []
  id: 5.20-eng
  language_code: eng
  notes:
 - content: Since a true value cannot be determined, in practice a conventional true
      value is used (see 1.19 and 1.20).
 - content: This concept applies mainly where the instrument is compared to a reference
      standard.
 - content: For a material measure, the indication is the value assigned to it.
  terms:
  - type: expression
    normative_status: preferred
    designation: error (of indication) of a measuring instrument
date_accepted: '1993-01-01T00:00:00+00:00'
