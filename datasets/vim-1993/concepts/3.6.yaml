data:
  dates:
  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: étroitesse de l'accord entre les résultats des mesurages  successifs
      du même mesurande, mesurages  effectués  dans  la  totalité  des mêmes conditions
      de mesure
  examples: []
  id: 3.6-fra
  language_code: fra
  notes:
  - content: Ces conditions sont appelées conditions de répétabilité.
  - content: 'Les conditions de répétabilité comprennent: même mode opératoire, même
      observateur, même instrument de mesure utilisé dans les mêmes conditions, même
      lieu, répétition durant une courte période de temps.'
  - content: La répétabilité peut s'exprimer quantitativement à l'aide des caractéristiques
      de dispersion des résultats.
  terms:
  - type: expression
    normative_status: preferred
    designation: répétabilité (des résultats de mesurage)
    grammar_info:
    - gender: f
date_accepted: '1993-01-01T00:00:00+00:00'
