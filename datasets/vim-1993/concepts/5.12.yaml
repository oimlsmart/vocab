    type: accepted
  definition:
  - content: smallest difference between indications of a displaying  device  that  can  be  meaningfully
      distinguished
  examples: []
  id: 5.12-eng
  language_code: eng
  notes:
  - content: For a digital displaying device, this is the change in the indication
      when the least significant digit changes by one step. 2 This concept applies
      also to a recording device.
  terms:
  - type: expression
    normative_status: preferred
    designation: resolution (of a displaying device)
