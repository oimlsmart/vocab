    type: accepted
  definition:
  - content: la plus petite différence d'indication d'un dispo-sitif afficheur qui
      peut être perçue de manière significative
  examples: []
  id: 5.12-fra
  language_code: fra
  notes:
  - content: Pour  un dispositif  afficheur  numérique,  différence d'indication qui
      correspond au changement d'une unité du chiffre le moins significatif. 2 Ce
      concept s'applique aussi à un dispositif enregistreur.
  terms:
  - type: expression
    normative_status: preferred
    designation: résolution (d'un dispositif afficheur)
