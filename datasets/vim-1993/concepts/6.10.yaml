data:
  dates:
  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: propriété du résultat d'un mesurage ou d'un étalon tel qu'il puisse être
      relié à des références déterminées, généralement des étalons natio-naux ou internationaux,
      par l'intermédiaire d'une chaîne ininterrompue  de comparaisons  ayant toutes
      des incertitudes déterminées The concept is often traceable. by the adJective
  examples: []
  id: 6.10-fra
  language_code: fra
  notes:
  - content: Ce concept est souvent exprimé par l'adjectif traçable.
  - content: La chaîne ininterrompue de comparaisons est appelée chaîne de raccordement
      aux étalons ou chaîne d'étalonnage.
  - content: La manière dont s'effectue la liaison aux étalons est appelée raccordement
      aux étalons.
  terms:
  - type: expression
    normative_status: preferred
    designation: traçabilité, f
date_accepted: '1993-01-01T00:00:00+00:00'
