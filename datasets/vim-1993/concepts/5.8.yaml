data:
  dates:
  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: coefficient by which the direct indication of a measuring instrument
      must be multiplied to give the indicated value of the measurand or of a quantity
      to be used to calculate the value of the measurand
  examples: []
  id: 5.8-eng
  language_code: eng
  notes:
  - content: Multirange measuring instruments with a single display have several instrument
      constants that correspond, for example, to different positions of a selector
      mechanism.
  - content: Where the instrument constant is the number one, it is generally not
      shown on the instrument.
  terms:
  - type: expression
    normative_status: preferred
    designation: instrument constant
