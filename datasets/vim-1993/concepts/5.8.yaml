data:
  dates:
  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: coefficient par lequel l'indication directe d'un instrument de mesure
      doit être multipliée pour obtenir la valeur indiquée du mesurande ou d'une grandeur
      à utiliser dans le calcul de la valeur du mesurande
  examples: []
  id: 5.8-fra
  language_code: fra
  notes:
  - content: Les instruments de mesure à calibres multiples et qui ne comportent qu'un
      seul affichage ont plusieurs constantes correspondant, par exemple, à différentes
      positions d'un mécanisme sélecteur.
  - content: Lorsque la constante est le nombre un, il n'est généralement pas indiqué
      sur l'instrument.
  terms:
  - type: expression
    normative_status: preferred
    designation: constante (d'un instrument)
    grammar_info:
    - gender: f
date_accepted: '1993-01-01T00:00:00+00:00'
