  definition:
  - content: expression  that  represents  a  quantity  of  a system of quantities
      as the product of powers of factors that represent the base quantities of the
      system
  examples:
  - content: in a system having base quantities length, mass and time, whose dimensions
      are denoted by L, M and T respectively, LMT-2 is the dimension of force; in
      the same system of quantities, ML-3 is the dimension of mass concentration as
      well as of mass density. in a system having base quantities length, mass and
