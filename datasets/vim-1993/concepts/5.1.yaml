data:
  dates:
  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: étendue d'échelle que l'on obtient pour une position donnée des commandes
      d'un instrument de mesure
  examples: []
  id: 5.1-fra
  language_code: fra
  notes:
  - content: Le calibre est normalement exprimé par ses limites inférieure et supérieure,
      par exemple, « stem:[100 "unitsml(degC)"] à 200 "unitsml(degC)" ». Lorsque la limite inférieure est zéro, le calibre
      est habituellement exprimé par la seule limite supérieure, par exemple un calibre
      de stem:[0 "unitsml(V)"] à stem:[100 "unitsml(V)"] est appelé « calibre de stem:[100 "unitsml(V)"] ».
  - content: Voir note de 5.2.
  terms:
  - type: expression
    normative_status: preferred
    designation: calibre
    grammar_info:
    - gender: m
