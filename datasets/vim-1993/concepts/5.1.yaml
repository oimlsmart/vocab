data:
  dates:
  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: range of indications obtainable with a particular setting of the controls
      of a measuring instrument
  examples: []
  id: 5.1-eng
  language_code: eng
  notes:
  - content: 'Nominal range is normally stated in terms of its lower and upper limits,
      for example, "stem:[100 "unitsml(degC)"] à stem:[200 "unitsml(degC)"] ".
      Where the lower limit is zero, the nominal range is commonly stated solely in
      terms of its upper limit: for example a nominal range of stem:[0 "unitsml(V)"] to stem:[100 "unitsml(V)"] is expressed
      as "stem:[100 "unitsml(V)"]".'
  - content: See 5.2 Note.
  terms:
  - type: expression
    normative_status: preferred
    designation: nominal range
