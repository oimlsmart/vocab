  definition:
  - content: conditions  extrêmes  qu'un  instrument  de mesure doit pouvoir supporter
      sans dommage et sans dégradation des caractéristiques métro-logiques spécifiées
      lorsqu'il est ensuite utilisé dans  ses  conditions  assignées  de  fonction-nement
  examples: []
  id: 5.6-fra
  language_code: fra
  notes:
  - content: Les conditions limites peuvent être différentes pour le stockage, le
      transport et le fonctionnement. 2  Les conditions limites peuvent comprendre
      des valeurs limites pour le mesurande et pour les grandeurs d'influence.
