  definition:
  - content: extreme conditions that a measuring instrument is required to withstand
      without damage, and without degradation  of  specified metrological characteristics
      when it is subsequently operated under its rated operating conditions
  examples: []
  id: 5.6-eng
  language_code: eng
  notes:
  - content: The limiting conditions for storage,  transport and operation may be
      different. 2  The limiting conditions may include limiting values of the measurand
      and of the influence quantities. 5.3 valeur nominale, f valeur arrondie ou approximative
      d'une carac-téristique d'un instrument de mesure qui sert de guide pour son
      utilisation EXEMPLES la valeur 100 Q  sur une résistance étalon; la valeur 1
      L marquée sur une fiole jaugée à un trait; la valeur 0,1 mcl/L de la concentration
      en quantité de matière d'une solution d'acide chlorhydrique, HCI; la valeur
      25 °C du point de consigne d'un bain thermo-statique. la valeur 100 Q  sur une
      résistance étalon; la valeur 1 L marquée sur une fiole jaugée à un trait; la
      valeur 0,1 mcl/L de la concentration en quantité de matière d'une solution d'acide
      chlorhydrique, HCI; la valeur 25 °C du point de consigne d'un bain thermo-statique.
