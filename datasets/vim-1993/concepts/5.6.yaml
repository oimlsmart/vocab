  definition:
  - content: extreme conditions that a measuring instrument is required to withstand
      without damage, and without degradation  of  specified metrological characteristics
      when it is subsequently operated under its rated operating conditions
  examples: []
  id: 5.6-eng
  language_code: eng
  notes:
  - content: The limiting conditions for storage, transport and operation may be different.
  - content: The limiting conditions may include limiting values of the measurand
      and of the influence quantities.
