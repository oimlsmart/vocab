data:
  dates:
  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: attribute of a phenomenon, body or substance that may be distinguished
      qualitatively and determined quantitatively
  id: 1.1-eng
  language_code: eng
  notes:
  - content: The term quantity may refer to a quantity in a general sense [see example
      a)] or to a particular quantity [see example b)].
    examples:
    - content: 'quantities in a general sense: length, time, mass, temperature, electrical
        resistance, amount-of-substance concentration'
    - content: 'particular quantities: length of a given rod; electrical resistance
        of a given specimen of wire; amount-of-substance concentration of ethanol
        in a given sample of wine'
  - content: Quantities that can be placed in order of magnitude relative to one another
      are called quantities of the same kind.
  - content: 'Quantities of the same kind may be grouped together into categories of
      quantities, for example: work, heat, energy; thickness, circumference, wavelength.'
  - content: Symbols for quantities are given in ISO 31.
  terms:
  - type: expression
    normative_status: preferred
    designation: quantity
  - type: expression
    normative_status: admitted
    designation: measurable
date_accepted: '1993-01-01T00:00:00+00:00'
entry_status: valid
