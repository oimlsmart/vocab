data:
  dates:
  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: attribut d'un phénomène, d'un corps ou d'une substance, qui est susceptible
      d'être distingué qualitativement et déterminé quantitativement
  id: 1.1-fra
  language_code: fra
  notes:
  - content: Le terme «grandeur» peut se rapporter à une grandeur dans un sens général
      [voir exemple a)] ou à une grandeur particulière [voir exemple b)].
    examples:
    - content: 'grandeurs dans un sens général: longueur, temps, masse, température,
        résistance électrique, concentration en quantité de matière'
    - content: 'grandeurs particulières: longueur d''une tige donnée; résistance électrique
        d''un échantillon donné de fil; concentration en quantité de matière d''éthanol
        dans un échantillon donné de vin'
  - content: Les grandeurs qui peuvent être classées les unes par rapport aux autres
      en ordre croissant (ou décroissant) sont appelées grandeurs de même nature.
  - content: 'Les grandeurs de même nature peuvent être groupées ensemble en catégories
      de grandeurs, par exemple: travail, chaleur, énergie; épaisseur, circonférence,
      longueur d''onde.'
  - content: Des symboles de grandeurs sont donnés dans l'ISO 31.
  terms:
  - type: expression
    normative_status: preferred
    designation: grandeur (mesurable)
    grammar_info:
    - gender: f
