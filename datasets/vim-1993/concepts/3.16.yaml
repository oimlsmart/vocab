    type: accepted
  definition:
 - content: numerical factor by which the uncorrected result of a measurement is
      multiplied to compensate for systematic error
  examples: []
  id: 3.16-eng
  language_code: eng
  notes:
 - content: Since the systematic error cannot be known perfectly, the compensation
      cannot be complete.
  terms:
  - type: expression
    normative_status: preferred
    designation: correction factor
