  definition:
  - content: facteur numérique par lequel on multiplie le résultat brut d'un mesurage
      pour compenser une erreur systématique NOTE Puisque l'erreur systématique ne
      peut pas être connue parfaitement, la compensation ne peut pas être complète.
      Many different terms are employed to describe the artefacts which are used in
      measurement. This  Vocabulary  defines  only  a  selection  of preferred  terms;  the  following  list  is  more
      complete and is arranged in an approximate order of increasing complexity. These
      terms are not mutually exclusive. element component part measuring transducer
      measuring device reference material material measure measuring instrument apparatus
      equipment measuring chain measuring system measuring installation
