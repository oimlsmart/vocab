data:
  dates:
  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: device intended to reproduce or supply, in a permanent manner during
      its use, one or more known values of a given quantity
  examples:
  - content: a weight;
  - content: a measure of volume (of one or several values, with or without a scale);
  - content: a standard electrical resistor;
  - content: a gauge block;
  - content: a standard signal generator;
  - content: a reference material.
  id: 4.2-eng
  language_code: eng
  notes:
  - content: The quantity concerned may be called the *supplied quantity*.
  terms:
  - type: expression
    normative_status: preferred
    designation: material measure
date_accepted: '1993-01-01T00:00:00+00:00'
