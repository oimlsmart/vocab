data:
  dates:
  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: dispositif destiné à reproduire ou à fournir, d'une façon permanente
      pendant son emploi, une ou plusieurs valeurs connues d'une grandeur donnée
  examples:
  - content: masse marquée;
  - content: mesure de capacité (à une ou plusieurs valeurs, avec ou sans échelle);
  - content: résistance électrique étalon;
  - content: cale étalon;
  - content: générateur de signaux étalon;
  - content: matériau de référence.

  id: 4.2-fra
  language_code: fra
  notes:
  - content: La grandeur concernée peut être appelée la *grandeur fournie*.
  terms:
  - type: expression
    normative_status: preferred
    designation: mesure matérialisée
    grammar_info:
    - gender: f
