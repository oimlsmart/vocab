data:
  dates:
  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
 - content: moyenne qui résulterait d'un nombre infini de mesurages du même mesurande, effectués
      dans les conditions de répétabilité, moins une valeur vraie du mesurande
  examples: []
  id: 3.14-fra
  language_code: fra
  notes:
 - content: L'erreur systématique est égale à l'erreur moins l'erreur aléatoire.
 - content: Comme la valeur vraie, l'erreur systématique et ses causes ne peuvent
      pas être connues complètement.
 - content: Pour un instrument de mesure, voir «erreur de justesse» (5.25).
  terms:
  - type: expression
    normative_status: preferred
    designation: erreur systématique
    grammar_info:
    - gender: f
