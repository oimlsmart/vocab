data:
  dates:
  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
 - content: mean that would result from an infinite number of measurements of the same measurand
      carried out under repeatability conditions minus a true value of the measurand
  examples: []
  id: 3.14-eng
  language_code: eng
  notes:
 - content: Systematic error is equal to error minus random error.
 - content: Like true value, systematic error and its causes cannot be completely
      known.
 - content: For a measuring instrument, see "bias" (5.25).
  terms:
  - type: expression
    normative_status: preferred
    designation: systematic error
date_accepted: '1993-01-01T00:00:00+00:00'
entry_status: valid
