  notes:
  - content: Ce terme peut inclure le dispositif à l'aide duquel la valeur fournie
      par une mesure mc1térialisée est affichée ou réglée. 2  Un  dispositif  d'affichage  analogique  fournit  un
      affichage analogique; un dispositif d'affichage numé-rique fournit un affichage
      numérique. 3 Une forme de présentation de l'affichage, soit au moyen d'un affichage
      numérique dans lequel le chiffre le moins significatif se déplace continûment,
      permet-tant ainsi l'interpolation, soit au moyen d'un affichage numérique complété
      par une echelle et un index, est appelé affichage semi-numérique. 4 (Applicable
      uniquement au texte anglais.)
