data:
  dates:
  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: part of a measuring instrument that displays an indication
  examples: []
  id: 4.12-eng
  language_code: eng
  notes:
  - content: This term may include the device by which the value supplied by a material
      measure is displayed or set.
  - content: An analogue displaying device provides an *analogue display*; a digital
      display device provides a *digital display*.
  - content: A form of presentation of the display either by means of a digital display
      in which the least significant digit moves continuously, thus permitting interpolation,
      or by means of a digital display supplemented by a scale and index, is called
      a *semidigital display*.
  - content: The English term *readout device* is used as a general descriptor of the
      means whereby the response of a measuring instrument is made available.
  terms:
  - type: expression
    normative_status: preferred
    designation: displaying device
  - type: expression
    normative_status: admitted
    designation: indicating device
date_accepted: '1993-01-01T00:00:00+00:00'
entry_status: valid
