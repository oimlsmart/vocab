data:
  dates:
  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: partie d'un appareil de mesure qui affiche une
      indication
  examples: []
  id: 4.12-fra
  language_code: fra
  notes:
  - content: Ce terme peut inclure le dispositif à l'aide duquel la valeur fournie
      par une mesure matérialisée est affichée ou réglée.
  - content: Un dispositif d'affichage analogique fournit un *affichage analogique*;
      un dispositif d'affichage numérique fournit un *affichage numérique*.
  - content: Une forme de présentation de l'affichage, soit au moyen d'un affichage
      numérique dans lequel le chiffre le moins significatif se déplace continuellement,
      permettant ainsi l'interpolation, soit au moyen d'un affichage numérique complété
      par une échelle et un index, est appelé *affichage semi-numérique*.
  - content: "(Applicable uniquement au texte anglais.)"
  terms:
  - type: expression
    normative_status: preferred
    designation: dispositif d'affichage
    grammar_info:
    - gender: m
  - type: expression
    normative_status: admitted
    designation: dispositif indicateur
    grammar_info:
    - gender: m
