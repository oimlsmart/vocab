data:
  dates:
  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: parameter, associated with the result of a measurement, that characterizes
      the dispersion of the values that could reasonably be attributed to the measurand
  examples: []
  id: 3.9-eng
  language_code: eng
  notes:
  - content: The parameter may be, for example, a standard deviation (or a given multiple
      of it), or the half-width of an interval having a stated level of confidence.
  - content: Uncertainty of measurement comprises, in general, many components. Some
      of these components may be evaluated from the statistical distribution of the
      results of series of measurements and can be characterized by experimental standard
      deviations. The other components, which can also be characterized by standard
      deviations, are evaluated from assumed probability distributions based on experience
      or other information.
  - content: It is understood that the result of the measurement is the best estimate
      of the value of the measurand, and that all components of uncertainty, including
      those arising from systematic effects, such as components associated with corrections
      and reference standards, contribute to the dispersion.
  - content: This definition is that of the "Guide to the expression of uncertainty
      in measurement" in which its rationale is detailed (see, in particular, 2.2.4
      and annex D [10]).
  terms:
  - type: expression
    normative_status: preferred
    designation: uncertainty of measurement
