data:
  dates:
  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: paramètre, associé au résultat d'un mesurage, qui caractérise la dispersion
      des valeurs qui pourraient raisonnablement être attribuées au mesurande
  examples: []
  id: 3.9-fra
  language_code: fra
  notes:
  - content: Le paramètre peut être, par exemple, un écart-type (ou un multiple de
      celui-ci) ou la demi-largeur d'un intervalle de niveau de confiance déterminé.
  - content: L'incertitude de mesure comprend, en général, plusieurs composantes.
      Certaines peuvent être évaluées à partir de la distribution statistique des
      résultats de séries de mesurages et peuvent être caractérisées par des écart-types
      expérimentaux. Les autres composantes, qui peuvent aussi être caractérisées
      par des écart-types, sont évaluées en admettant des distributions de probabilité,
      d'après l'expérience acquise ou d'après d'autres informations.
  - content: Il est entendu que le résultat du mesurage est la meilleure estimation
      de la valeur du mesurande, et que toutes les composantes de l'incertitude, y
      compris celles qui proviennent d'effets systématiques, telles que les composantes
      associées aux corrections et aux étalons de référence, contribuent à la dispersion.
  - content: Cette définition est celle du «Guide pour l'expression de l'incertitude
      de mesure» où ses bases sont exposées en détail (voir en particulier 2.2.4 et
      l'annexe D [10]).
  terms:
  - type: expression
    normative_status: preferred
    designation: incertitude de mesure
    grammar_info:
    - gender: f
