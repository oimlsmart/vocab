data:
  dates:
  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
 - content: matériau de référence, accompagné d'un certi-ficat, dont une (ou plusieurs)
      valeur(s) de la (des) propriété(s) est (sont) certifiée(s) par une procé-dure
      qui établit son raccordement à une réali-sation exacte de l'unité dans laquelle
      les valeurs de propriété sont exprimées et pour laquelle chaque valeur certifiée
      est accompagnée d'une incertitude à un niveau de confiance indiqué
  examples: []
  id: 6.14-fra
  language_code: fra
  notes:
 - content: La définition d'un «certificat de matériau de référence» est donnée en
      4.2*.
 - content: Les MRC sont en général préparés en lots dont les valeurs de propriété
      sont déterminées, dans les limites d'incertitude indiquées, par des mesurages
      sur des échantillons représentatifs du lot entier.
 - content: Les propriétés certifiées de matériaux de référence sont parfois commodément
      et fiablement réalisées lorsque le matériau est incorporé dans un dispositif
      fabriqué spécialement, par exemple une substance dont le point triple est connu
      dans une cellule triple point; un verre de densité optique connue dans un filtre
      de transmission; des sphères à granulométrie uniforme montées sur une lame de
      microscope. De tels dispositifs peuvent également être considérés comme des
      MRC.
 - content: Tous les MRC répondent à la définition «des étalons» donnée dans le «Vocabulaire
      international des termes fondamentaux et généraux de métrologie (VIM)».
 - content: Certains MR et MRC ont des propriétés qui, parce qu'elles ne peuvent
      être rapportées à une structure chimique établie, ou pour d'autres raisons,
      ne peuvent être déterminées par des méthodes de mesure physiques et chimiques
      exactement définies. De tels matériaux comprennent certains matériaux biologiques
      tels que des vaccins auxquels une unité internationale a été attribuée par l'Organisation
      mondiale de la santé.
 - content: Cette définition (y compris les notes) est extraite du Guide ISO 30:1992.
  terms:
  - type: expression
    normative_status: preferred
    designation: matériau de référence certifié (MRC)
    grammar_info:
    - gender: m
