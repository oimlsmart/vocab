data:
  dates:
  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
 - content: reference material, accompanied by a certificate, one or more of whose
      property values are certified  by  a  procedure  which  establishes traceability
      to an accurate realization of the unit in which the property values are expressed,
      and for which each certified value is accompanied by an uncertainty at a stated
      level of confidence
  examples: []
  id: 6.14-eng
  language_code: eng
  notes:
 - content: The definition of a "reference material certificate" is given in 4.2*.
 - content: CRMs are generally prepared in batches for which the property values
      are determined within stated uncertainty limits by measurements on samples representative
      of the whole batch.
 - content: The certified properties of certified reference materials are sometimes
      conveniently and reliably realized when the material is incorporated into a
      specially fabricated device, e.g. a substance of known triple-point into a triple-point
      cell, a glass of known optical density into a transmission filter, spheres of
      uniform particle size mounted on a microscope slide. Such devices may also be
      considered as CRMs.
 - content: All CRMs lie within the definition of "measurement standards" or "etalons"
      given in the "International Vocabulary of basic and general terms in metrology
      (VIM)".
 - content: Some RMs and CRMs have properties which, because they cannot be correlated
      with an established chemical structure or for other reasons, cannot be determined
      by exactly defined physical and chemical measurement methods. Such materials
      include certain biological materials such as vaccines to which an International
      unit has been assigned by the World Health Organization.
 - content: This definition, including the Notes, is taken from ISO Guide 30:1992.
  terms:
  - type: expression
    normative_status: preferred
    designation: certified reference material (CRM)
date_accepted: '1993-01-01T00:00:00+00:00'
