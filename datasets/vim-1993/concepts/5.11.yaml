    type: accepted
  definition:
  - content: "(seuil de) mobilité, m variation la plus grande du signal d'entrée qui
      ne provoque pas de variation  détectable  de la réponse d'un instrument de mesure,
      la variation du signal d'entrée étant lente et monotone"
  examples: []
  id: 5.11-eng
  language_code: eng
  notes:
  - content: Le seuil de mobilité peut dépendre, par exemple, du bruit (interne ou
      externe) ou du frottement; il peut aussi dépendre de la valeur du signal d'entrée.
