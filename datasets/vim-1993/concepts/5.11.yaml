  - content: largest change in a stimulus that produces no detectable  change  in  the  response  of  a
      measuring  instrument,  the  change  in  the stimulus taking place slowly and
      monotonically NOTE The discrimination threshold may depend on, for example,
      noise (internai or external) or friction. lt may also depend on the value of
      the stimulus.
