  definition:
  - content: quantity in the dimensional expression of which all the exponents of
      the dimensions of the base quantities reduce to zero
  examples:
  - content: linear strain, friction factor, Mach number, refractive index, mole fraction
      (amount-of-substance fraction), mass fraction.
