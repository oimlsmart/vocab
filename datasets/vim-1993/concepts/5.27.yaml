data:
  dates:
  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: aptitude d'un instrument de mesure à donner des indications très voisines
      lors de l'application répétée du même mesurande dans les mêmes conditions de
      mesure
  examples: []
  id: 5.27-fra
  language_code: fra
  notes:
  - content: "Ces conditions comprennent: réduction au minimum des variations dues
      à l'observateur, même mode opératoire de mesure, même observateur, même équipement
      de mesure, utilisé dans les mêmes conditions, même lieu, répétition durant une
      courte période de temps."
  - content: La répétabilité peut s'exprimer quantitativement à l'aide des caractéristiques
      de dispersion des indications.
  terms:
  - type: expression
    normative_status: preferred
    designation: fidélité (d'un instrument de mesure)
    grammar_info:
    - gender: f
date_accepted: '1993-01-01T00:00:00+00:00'
