data:
  dates:
  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: ability of a measuring instrument to provide closely similar indications
      for repeated appli-cations of the same measurand under the same conditions of
      measurement
  examples: []
  id: 5.27-eng
  language_code: eng
  notes:
  - content: 'These conditions include: reduction to a minimum of the variations due
      to the observer, the same measurement procedure, the same observer, the same
      measuring equipment, used under the same conditions, the same location, repetition
      over a short period of time.'
  - content: Repeatability may be expressed quantitatively in terms of the dispersion
      characteristics of the indications.
  terms:
  - type: expression
    normative_status: preferred
    designation: repeatability (of a measuring instrument)
date_accepted: '1993-01-01T00:00:00+00:00'
entry_status: valid
