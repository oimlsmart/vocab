data:
  dates:
  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: closeness of the agreement between the results of measurements of the
      same measurand carried out under changed conditions of measurement
  examples: []
  id: 3.7-eng
  language_code: eng
  notes:
  - content: A valid statement of reproducibility requires specification of the conditions
      changed.
  - content: 'The changed conditions may include: principle of measurement, method
      of measurement, observer, measuring instrument, reference standard, location,
      conditions of use, time.'
  - content: Reproducibility may be expressed quantitatively in terms of the dispersion
      characteristics of the results.
  - content: Results are here usually understood to be corrected results.
  terms:
  - type: expression
    normative_status: preferred
    designation: reproducibility (of results of measurements)
date_accepted: '1993-01-01T00:00:00+00:00'
