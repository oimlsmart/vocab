data:
  dates:
  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: measuring instrument that provides a record of the indication
  examples:
  - content: barograph; thermoluminescent dosimeter; recording spectrometer. barograph;
      thermoluminescent dosimeter; recording spectrometer.
  id: 4.7-eng
  language_code: eng
  notes:
  - content: The record (display) may be analogue (continuous or discontinuous line)
      or digital.
  - content: Values of more than one quantity may be recorded (displayed) simultaneously.
  - content: A recording instrument may also display an indication.
  terms:
  - type: expression
    normative_status: preferred
    designation: recording (measuring) instrument
