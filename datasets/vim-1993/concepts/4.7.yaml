  definition:
  - content: appareil de mesure qui fournit un enregis-trement de l'indication
  examples:
  - content: 'barographe: dosimètre thermoluminescent; spectromètre enregistreur.
      barographe: dosimètre thermoluminescent; spectromètre enregistreur.'
  id: 4.7-fra
  language_code: fra
  notes:
  - content: L'enregistrement (affichage) peut être analogique (ligne continue ou
      discontinue) ou numérique.
  - content: Les valeurs de plusieurs grandeurs peuvent être enregistrées (affichées)
      simultanément.
  - content: Un appareil enregistreur peut aussi afficher une indication.
