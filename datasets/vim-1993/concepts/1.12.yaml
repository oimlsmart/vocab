  - date: '1993-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: the coherent system of units adopted and recommended by the General Conference
      on Weights and Measures (CGPM)
  examples: []
  id: 1.12-eng
  language_code: eng
  notes:
  - content: |
      The SI is based at present on the following seven base units:

      [cols="3", options="header,unnumbered",headerrows=2]
      |===
      .2+| Quantity 2+| SI base unit | Name | Symbol

      | length                    | metre    | stem:["unitsml(m)"]
      | mass                      | kilogram | stem:["unitsml(kg)"]
      | time                      | second   | stem:["unitsml(s)"]
      | electric current          | ampere   | stem:["unitsml(A)"]
      | thermodynamic temperature | kelvin   | stem:["unitsml(K)"]
      | amount of substance       | mole     | stem:["unitsml(mol)"]
      | luminous intensity        | candela  | stem:["unitsml(cd)"]
      |===
  terms:
  - type: expression
    normative_status: preferred
    designation: International System of Units, SI
