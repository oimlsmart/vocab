  definition:
  - content: value attributed to a measurand, obtained by measurement
  examples: []
  id: 3.1-eng
  language_code: eng
  notes:
  - content: 'When a result is g1ven, it should be made clear whether it refers to:
      the indication the uncorrected result the corrected result and whether several
      values are averaged. 2  A complete statement of the result of a measurement
      includes information about the uncertainty of measure-ment. 3.2 indication (of
      a measuring instrument) value of a quantity provided by a measuring instrument'
  - content: The value read from the d1splaying device may be called the direct indication;
      it is multiplied by the instrument constant to give the 1ndicat1on. The quantity
      may be the measurand, a measurement signal, or another quantity to be used in
      calculating the value of the measurand. For a material measure, the indication
      is the value assigned to it.3.3uncorrected resultresult of a measurement before
      correction for systematic error3.4corrected resultresult of a measurement after
      correction for systematîc error3.1résultat d'un mesurage, mvaleur attribuée
      à un mesurande, obtenue par mesurageNOTESLorsqu'on donne un resultat, on indiquera
      clairement si l'on se réfère:à l'indicationau résultat brutau résultat corrigéet
      si cela comporte une moyenne obtenue à partir de plusieurs valeurs.2  Une expression
      complète du résultat d'un mesurage comprend des informations sur l'incertitude
      de mesure.3.2indication (d'un instrument de mesure), fvaleur d'une grandeur
      fournie par un instrument de mesureNOTESLa valeur lue sur le dispositif d'affichage
      peut être appelée indication directe; elle doit être multipliée par la constante
      de l'instrument pour obtenir l'indication.La grandeur peut étre  le mesurande,
      un signal de mesure ou une autre grandeur utilisée pour calculer la valeur du
      mesurande.Pour une mesure matérialisée, l'indication est la valeur qui lui est
      assignée.3.3résultat brut, mrésultat d'un mesurage avant correction  de l'erreur
      systématique3.4résultat corrigé, mrésultat d'un mesurage après correction de
      l'erreur systématiqueMetroiogy 1993                                                                   233.5accuracy
      of measurementcloseness of the agreement between the result of a measurement
      and a true value of the measurandNOTES"Accuracy" is a qualitative concept.2
      The term precision should not be used for "accuracy".3.6repeatability (of results
      of measurements)closeness  of  the  agreement  between  the results  of  successive  measurements  of  the
      same measurand carried out under the same conditions of measurementNOTESThese
      conditions are called repeatability conditions.Repeatability conditions include:the
      same measurement procedure the same observerthe same measuring instrument. used
      under the same conditionsthe same locationrepetition over a short period of
      time.Repeatability may be expressed quantitatively in terms of the dispersion
      characterist1cs of the results.3.7reproducibility (of results of measurements)closeness
      of the agreement between the results of  measurements  of  the  same  measurand
      carried out under changed conditions of measure-mentNOTESA valid statement of
      reproducibility requ1res specifi-cation of the conditions changed.The changed
      conditions may include principle of measurement method of measurement observermeasuring
      instrument reference standard locationconditions of use time.Reproducibility
      may be expressed quantitatively in terms of the dispersion characteristics of
      the results.Results are here usually understood ta be corrected results.3.5exactitude
      de mesure, fétroitesse de l'accord entre le résultat d'un mesurage et une valeur
      vraie du mesurandeNOTESLe concept d'«exactituden est qualitatif.2  Le terme
      «précision» ne doit pas être utilisé pour«exactitude».3.6répétabilité (des résultats
      de mesurage), fétroitesse de l'accord entre les résultats des mesurages  successifs
      du même mesurande, mesurages  effectués  dans  la  totalité  des mêmes conditions
      de mesureNOTESCes conditions sont appelées conditions de répéta-bilité.Les conditions
      de répétabilité comprennent:même mode opératoiremême observateurmême instrument
      de mesure utilisé dans les mêmes conditionsmême lieurépétition durant une courte
      période de temps.La repétabilité peut s'exprimer quantitativement à l'aide des
      caractéristiques de dispersion des résultats.3.7reproductibilité (des résultats
      de mesurage), fétroitesse de l'accord entre les résultats des me-surages du
      même mesurande, mesurages effec-tués en faisant varier les conditions de mesureNOTESPour
      qu'une expression de la reproductibilité soit valable, il est nécessaire de
      spécifier les conditions que l'on fait varier.Les conditions que l'on fait varier
      peuvent comprendre:principe de mesureméthode de mesureobservateurinstrument
      de mesureétalon de référencelieuconditions d'utilisationtemps.La reproductibilite
      peut s'exprimer quantitativement àl'aide des caractéristiques de dispersion
      des résultats.Les résultats considérés 1c1 sont habituellement les résultats
      corrigés.3.8experimental standard deviationi= 1n-1for a series of Il  measurements
      of the same measurand,  the quantity s  characterizing the dispersion  of  the
      results and given by the formula:,,,·--xi being the result  of  the ith  measurement
      and .r being the arithmetic mean of the n results consideredNOTESConsidering
      the series of 11 values as a sample of a distribution, .r is an unbiased estimate
      of the mean p,and s2 is an unbiased estimate of the variance a2, of that distribution.The
      expression .11.[;; is an estimate of the standard deviation of the distribution
      of .r and is called the experimental standard deviation of the mean."Experimental
      standard dev1ation of the mean" is sometImes incorrectly called standard error
      of the mean.3.9uncertainty of measurementparameter,  associated  w1th  the result  of  a
      measurement, that characterizes the dispersion of the values that could reasonably
      be attributed to the measurandNOTESThe parameter may be, for example, a standard
      deviation (or a given multiple of it), or the half-width of an interval having
      a stated level of confidenceUncertainty of measurement comprises, In general,
      many components. Sorne of these components may be evaluated from the statistical
      distribution of the results of senes of measurements and can be charac-terized
      by experimental standard deviat1ons. The other components,  which can also be  characterized  by
      standard  deviations,  are  evaluated  from  assumed probability distributions
      based on expenence or other information.lt Is understood that the result of
      the measurement is the best estimate of the value of the measurand, and that
      ail components of uncertainty, including those arising from systematic effects,
      such as components associated with corrections and reference standards, contribute
      to the dispersion.This definition Is that of the "Guide to the expression of
      uncertainty in measurement" in which its rationale is detailed (see, in particular,
      2.2.4 and annex D [1O]).3.8écart-type expérimental, m            i=1        Il
      -1pour une série de n mesurages du même mesurande, grandeur s caractérisant
      la disper-sion des résultats, donnée par la formule:s=xi étant le résultat du
      ième mesurage et x la moyenne arithmétique des n résultats consi-dérésNOTESEn
      considérant la série de 11 valeurs comme échantillon d'une distribution, x est
      un estimateur sans biais de lamoyenne fi, et s2 est un estimateur sans biais
      de la variance a2 de cette distribution.L'expression s!Fi est une estimation
      de l'écart-type de la distribution de .r et est appelée écart-type expérimental
      de la moyenne. L'écart-type expérimental de la moyenne est parfois appelé, à
      tort, erreur de la moyenne.3.9incertitude de mesure, fparamètre, associé au
      résultat d'un mesurage, qui caractérise la dispersion des valeurs qui pourraient
      raisonnablement être attribuées au mesurandeNOTESLe paramètre peut être, par
      exemple, un écart-type (ou un multiple de celui-ci) ou la demi-largeur d'un
      intervalle de niveau de confiance déterminé.L'incertitude de mesure comprend,
      en général, plu-sieurs composantes. Certaines peuvent être évaluées à partir
      de la distribution statistique des résultats de séries de mesurages et peuvent
      être caractérisées par des écart-types expérimentaux. Les autres compo-santes,
      qui peuvent aussi être caractérisées par des écart-types, sont évaluées en admettant
      des distri-butions de probabilité, d'après l'expérience acquise ou d'après d'autres
      informations.Il est entendu que le résultat du mesurage est la meilleure estimation
      de la valeur du mesurande, et que toutes les composantes de l'incertitude, y
      compris celles qui proviennent d'effets systématiques, telles que les composantes
      associées aux corrections et aux étalons de référence, contribuent à la dispersion.Cette
      définition est celle du «Guide pour l'expression de l'incertitude de mesure»
      où ses bases sont exposées en détail (voir en particulier 2.2.4 et l'annexe
      D [101).Metrology 1993                                                                 253.10error
      (of measurement)result of a measurement minus a true value of the measurandNOTESSince
      a true value cannot be determined, in practIce a conventional true value is
      used (see 1.19 and 1.20).2  When it is necessary to distinguish "error" from
      "relative error", the former is sometimes  called absolute error of measurement.
      This should not be confused with absolute value of error, which is the modulus
      of the error.3.11(-)deviationvalue minus its reference value3.12(3.11)relative
      errorerror of measurement divided by a true value of the measurandNOTE Since
      a true value cannot be determined, in practice a conventional true value is
      used (see 1.19 and 1.20).3.13(3.12)random errorresult of a measurement minus
      the mean that would  result  from  an  infinite  number  of measurements of
      the same measurand carried out under repeatability conditionsNOTESRandom error
      is equal to error minus systematic error.2 Because only a finite number of measurements
      can be made, it is possible to determine only an estimate of random error.3.10erreur
      (de mesure), frésultat d'un mesurage moins une valeur vraie du mesurandeNOTESÉtant
      donné qu·une valeur vraie ne peut pas être déterminée, dans la pratique on utilise
      une valeur conventionnellement vraie (voir 1.19 et 1.20).2 Lorsqu'il est nécessaire
      de faire ia distinction entre«l'erreur)) et «l'erreur relative», la première
      est parfois appelée «erreur absolue de mesure». Il ne faut pas la confondre
      avec la valeur absolue de l'erreur, qui est le module de l'erreur.3.11(-)écart,
      mvaleur moins sa valeur de référence3.12(3.11)erreur relative, frapport de l'erreur
      de mesure à une valeur vraie du mesurandeNOTE Étant donné qu'une valeur vraie
      ne peut pas être déterminée, dans la pratique on utilise une valeur conventionnellement
      vraie tvoIr 1.19 et 1.20).3.13(3.12)erreur aléatoire, frésultat d'un mesurage
      moins la moyenne d'un nombre infini de mesurages du même mesu-rande, effectués
      dans les conditions de répéta-bilitéNOTESL'erreur aléatoire est égale à l'erreur
      moins l'erreur systématique.2  Comme on ne peut faire qu'un nombre fini de mesu-rages,
      il est seulement possible de déterminer une estimation de l'erreur aléatoire.3.14(3.13)systematic
      errormean that would result from an infinite number of  measurements  of  the  same  measurand
      carried out under repeatability conditions minus a true value of the measurandNOTESSystematic
      error is equal to error minus random error.Like true value, systematic error
      and its causes cannot be completely known.For a measuring instrument, see "bias"
      (5.25).3.15(3.14)correctionvalue added algebraically to the uncorrected result
      of a measurement to compensate for systematic errorNOTESThe correction 1s equal
      to the negat1ve of the estimated systematic error.2  Since the systematic error
      cannot be known perfectly, the compensation cannot be complete.3.16(3.15)correction
      factornumerical factor by which the uncorrected result of a measurement is multiplied
      to compensate for systematic errorNOTE Since the systematic  error cannot  be
      known perfectly, the compensation cannot be complete.3.14(3.13)erreur systématique,
      fmoyenne qui résulterait d'un nombre infini de mesurages  du  même  mesurande,  effectués
      dans les conditions de répétabilité, moins une valeur vraie du mesurandeNOTESL'erreur
      systèmat1que est égale à l'erreur moins l'erreur aléatoire.Comme la valeur vraie,
      l'erreur systématique et ses causes ne peuvent pas être connues complètement.Pour
      un instrument de mesure, voir «erreur de justesse» (5.25).3.15(3.14)correction,
      fvaleur ajoutée algébriquement au résultat brut d'un mesurage  pour compenser  une
      erreur systématiqueNOTESLa  correction  est  égale  à  l'opposé  de  l'erreur
      systématique estimée.2  Puisque l'erreur systématique ne peut pas être connue
      parfaitement,  la compensation  ne peut  pas  être complète.3.16(3.15)facteur
      de correction, mfacteur numérique par lequel on multiplie le résultat brut d'un
      mesurage pour compenser une erreur systématiqueNOTE Puisque l'erreur systématique
      ne peut pas être connue parfaitement, la compensation ne peut pas être complète.
      à l'indication au résultat brut au résultat corrigé La grandeur peut étre  le
      mesurande, un signal de mesure ou une autre grandeur utilisée pour calculer
      la valeur du mesurande. Pour une mesure matérialisée, l'indication est la valeur
      qui lui est assignée. Repeatability conditions include:the same measurement
      procedure the same observerthe same measuring instrument. used under the same
