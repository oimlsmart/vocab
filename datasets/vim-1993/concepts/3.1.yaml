    type: accepted
  definition:
 - content: valeur attribuée à un mesurande, obtenue par mesurage
  examples: []
  id: 3.1-fra
  language_code: fra
  notes:
 - content: Lorsqu'on donne un résultat, on indiquera clairement si l'on se réfère:,
      à l'indication, au résultat brut, au résultat corrigé et si cela comporte une
      moyenne obtenue à partir de plusieurs valeurs.
 - content: Une expression complète du résultat d'un mesurage comprend des informations
      sur l'incertitude de mesure.
  terms:
  - type: expression
    normative_status: preferred
    designation: résultat d'un mesurage
