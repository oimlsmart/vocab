      Les conditions que l'on fait varier peuvent comprendre:principe de mesureméthode
      de mesureobservateurinstrument de mesureétalon de référencelieuconditions d'utilisationtemps.
      principe de mesure méthode de mesure observateur instrument de mesure étalon
      de référence lieu conditions d'utilisation temps. La reproductibilite peut s'exprimer
      quantitativement àl'aide des caractéristiques de dispersion des résultats. Les
      résultats considérés 1c1 sont habituellement les résultats corrigés. The expression
      .11.[;; is an estimate of the standard deviation of the distribution of .r and
      is called the experimental standard deviation of the mean. "Experimental standard
      dev1ation of the mean" is sometImes incorrectly called standard error of the
      mean. Uncertainty of measurement comprises, In general, many components. Sorne
      of these components may be evaluated from the statistical distribution of the
      results of senes of measurements and can be charac-terized by experimental standard
      deviat1ons. The other components,  which can also be  characterized  by standard  deviations,  are  evaluated  from  assumed
      probability distributions based on expenence or other information. lt Is understood
      that the result of the measurement is the best estimate of the value of the
      measurand, and that ail components of uncertainty, including those arising from
      systematic effects, such as components associated with corrections and reference
      standards, contribute to the dispersion. L'expression s!Fi est une estimation
      de l'écart-type de la distribution de .r et est appelée écart-type expérimental
