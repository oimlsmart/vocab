  definition:
  - content: 'i= 1 n-1 for a series of Il  measurements of the same measurand,  the
      quantity s  characterizing the dispersion  of  the results and given by the
      formula: ,,,·-- xi being the result  of  the ith  measurement and .r being the
      arithmetic mean of the n results considered'
  examples: []
  id: 3.8-eng
  language_code: eng
  notes:
  - content: Considering the series of n values as a sample of a distribution, x̄
      is an unbiased estimate of the mean μ, and s² is an unbiased estimate of the
      variance σ² of that distribution.
  - content: The expression s/√n is an estimate of the standard deviation of the distribution
      of x̄ and is called the experimental standard deviation of the mean.
  - content: '"Experimental standard deviation of the mean" is sometimes incorrectly
      called standard error of the mean.'
  terms:
  - type: expression
    normative_status: preferred
    designation: experimental standard deviation
