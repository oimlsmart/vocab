      s= xi étant le résultat du ième mesurage et x la moyenne arithmétique des n
      résultats consi-dérés"
  examples: []
  id: 3.8-fra
  language_code: fra
  notes:
  - content: En considérant la série de n valeurs comme échantillon d'une distribution,
      x̄ est un estimateur sans biais de la moyenne μ, et s² est un estimateur sans
      biais de la variance σ² de cette distribution.
  - content: L'expression s/√n est une estimation de l'écart-type de la distribution
      de x̄ et est appelée écart-type expérimental de la moyenne.
  - content: L'écart-type expérimental de la moyenne est parfois appelé, à tort, erreur
      de la moyenne.
