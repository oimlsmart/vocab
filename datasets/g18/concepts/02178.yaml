data:
  dates:
  - date: '2024-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: encryption of data by the sender (storing or transmitting program) and
      decryption by the receiver (reading program) with the purpose of hiding information
      from unauthorized persons. Electronic signing of data with the purpose of enabling
      the receiver or user of the data to verify the origin of the data, i.e. to prove
      their authenticity.
  examples: []
  id: 02178-eng
  notes:
  - content: For electronic signing a public key system is used in general, i.e. the
      algorithm needs a p of keys where only one has to be kept secret; the other
      may be public. The sender (the sending or storing program) generates a hash
      code (see 3.1.25) of the dat and encrypts it with his secret key. The resu is
      the signature. The receiver (the receiving reading program) decrypts the signature
      with the public key of the sender and compares the result with the actual hash
      code of the data. case of equality, the data are authenticated. The receiver
      may require a cryptographic certificate of the sender (see 3.1.10) to be of
      the authenticity of the public key.
  sources:
