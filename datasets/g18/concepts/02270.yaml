    type: accepted
  definition:
  - content: hose and/or pipework containing liquid products only during a transaction
      and usually being completely evacuated before the transaction is terminated.
      It is connected downstream of the transfer point (the transfer point is located
      upstream of the delivery hose or downstream of the receiving hose)
