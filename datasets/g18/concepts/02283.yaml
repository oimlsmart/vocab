  definition:
  - content: smallest volume of liquid for which the measurement is metrologically
      acceptable for the tank or individually for each of its compartments. It shall
      be specified only for measuring systems suitable for measuring partial volumes.
      Alternatively, the terms "minimum delivery" or "minimum receipt" may be used.
