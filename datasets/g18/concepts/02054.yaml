  - date: '2024-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: device which automatically converts the volume measured at metering conditions
      into a volume at base conditions or into a mass by taking into account the gas
      characteristics (i.e. pressure, temperature, composition, density) measured
      using associated measuring instruments or stored in a memory
  examples: []
  id: 02054-eng
  notes:
  - content: The quotient of the volume at base conditions or of the mass to the volume
      at metering conditions is referred to as the “conversion factor”.
