  definition:
  - content: part of the measuring device that provides an output signal, representing
      volume or mass, having a determined relationship to the input signal. The transducer
      can either be incorporated with the meter sensor or beexternal to the meter
      sensor. In the latter case, it can be approved either with the sensor or with
      the calculator.
