data:
  dates:
  - date: '2024-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: mechanical test in which an indenter of a specified size and shape (diamond
      spheroconical or a steel or tungsten-carbide ball) is forced into the surface
      of a test material
  examples: []
  id: 00379-eng
  notes:
  - content: Initially, a preliminary force F0 is applied to the indenter. The force
      on the indenter is increased in a specified manner by an additional force F1
      to achieve the total force F then the additional force F1 is removed and the
      force on the indenter is returned to the preliminary force F
  - content: 0. The depth of indentation is measured before and after application
      of the additional force F1, while maintaining the preliminary force F0 (see
      Annex A). A Rockwell hardness value for the test material is derived from the
      difference in the indentation depths (see Fig. 1).
  sources:
  - origin:
      ref:
        source: OIML R039:2006
      locality:
        type: clause
        reference_from: '2.1'
    type: authoritative
  terms:
  - type: expression
    normative_status: preferred
    designation: Rockwell (indentation) hardness test
  language_code: eng
  entry_status: valid
