  definition:
  - content: continuous or incremental change over time in the indication, due to
      changes in the metrological properties of a measuring instrument.
  examples: []
  id: 02150-eng
  notes:
  - content: 1. In this Recommendation, "drift" means a change in the indication which
      occurs during a stated period of time at a given concentration of SO2 in a sample
      to be analyzed.
  - content: 2. (VIM:2007, 4.21)
