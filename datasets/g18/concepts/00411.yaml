data:
  dates:
  - date: '2024-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: instrument intended to measure continuously, memorize and display the
      volume of water passing through the measurement transducer at metering conditions
  examples: []
  id: 00411-eng
  notes:
  - content: (1) A water meter includes at least a measurement transducer, a calculator
      (including adjustment or correction devices, i present) and an indicating device.
      These three devices may be in different housings. (2) A water meter may be a
      combination meter comprising one large meter, one small meter and a changeover
      device that, depending on the magnitude of the flowrate passing through the
      meter, automatically directs the flow through either the small or large meter
      or both. Meter reading is obtained from two independent totalizers or one totalizer,
      which adds up the values from both water meters.
  sources:
