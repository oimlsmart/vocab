    type: accepted
  definition:
  - content: communication, physical or not, between elements of a measuring system
      ensuring that information transferred from one of these elements to another
      may not be tampered with by the user, by external influences or by fault of
      the system
  examples: []
  id: 02062-eng
  notes:
  - content: This is accomplished by sealing devices and/or checking facilities.
  sources:
