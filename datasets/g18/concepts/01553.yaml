  definition:
  - content: 'sales transaction in which:  the measurement result serves as the basis
      for the price to pay, and  at least one of the parties involved in the transaction
      related to the measurement is a consumer or any other party requiring a similar
      level of protection, and  all the parties in the transaction accept the measurement
      result obtained at that time and place'
