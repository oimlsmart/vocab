  definition:
  - content: a part of an instrument that is usually manufactured as a separate unit
      and is capable of being independently tested
  examples: []
  id: 01701-eng
  notes:
  - content: In this Recommendation the term "device" is used for any means by which
      a specific function is performed irrespective of the physical realization, e.g.
      by a mechanism or a key initiating an operation; the device may be a small part
      or a major portion of a measuring instrument.
