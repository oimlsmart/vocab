  definition:
  - content: electronic device of an instrument that performs the analog-to- digital
      conversion of the output signal of the load cell, further processes the data,
      and supplies the weighing result in a digital format via a digital interface
      without displaying it. It may optionally have one or more keys (or mouse, touch-screen,
      etc.) tooperate the instrument
