  definition:
  - content: form of metrological supervision aimed at establishing that a measuring
      instrument in use in the field complies with the statutory requirements
  examples: []
  id: 00209-eng
  notes:
  - content: 'Note on the relation between market and field surveillance: Where a
      conformity assessment of a measuring instrument indicates that the findings
      can be directly related to the responsibilities of manufacturers or their representatives,
      the matter should be dealt with by market surveillance.'
