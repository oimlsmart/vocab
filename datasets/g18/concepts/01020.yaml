  - date: '2024-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: a device that automatically converts the volume measured at metering
      conditions into a volume at base conditions or into a mass, by taking account
      of the characteristics of the measured liquid (temperature, pressure, density,
      relative density, etc.) using associated measuring instruments, or associated
      values stored in a memory. The quotient of the volume at base conditions, or
      of the mass, to the volume at metering conditions is referred to as the "conversion
      factor"
