    type: accepted
  definition:
  - content: control exercised in respect of the manufacture, import, installation,
      maintenance and repair of measuring instruments and/or in respect of their use,
      performed in order to check that they are used correctly as regards the observance
      of metrology laws and regulations [VIML 2.3]
  examples: []
  id: 00178-eng
  notes:
  - content: Metrological supervision includes checking the correctness of the quantities
      indicated on and contained in prepackages.
