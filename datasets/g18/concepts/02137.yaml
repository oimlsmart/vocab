    type: accepted
  definition:
  - content: time between the instant at which power is applied to a gas analytical
      system and the instant at which the system is capable of complying with the
      metrological requirements
  examples: []
  id: 02137-eng
  notes:
  - content: For a gas analyzer this is the time between the instant at which power
      is applied to it and th instant at which the measurement result of the volume
      fraction, a CGM being supplied to the input, is within the permissible limits.
