  definition:
  - content: a temperature probe is the component of a thermometer of which (1) A
      body cavity may be the rectum, part is applied to a body cavity or tissue with
      which it establishes thermal equilibrium. It comprises a temperature sensor
      with associated parts including coverings, seals, inner leads, and connecting
      plug, where appropriate
  examples: []
  id: 01506-eng
  notes:
  - content: esophagus, or a surgically created cavity. (2) The part of the probe
      in contact with a body cavity is called the applied part.
