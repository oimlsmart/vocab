data:
  dates:
  - date: '2024-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: the capacity corresponding to any scale mark, is equal to the volume
      of water at the reference temperature, delivered by the pipette at this temperature
      when it is emptied as specified in the appendix, point A.3., after filling it
      to the scale mark
  examples: []
  id: 00391-eng
  notes:
  - content: The meniscus formed by the water in the pipette, must be so adjusted
      that the horizontal plane passing through the upper edge of the scale mark,
      is tangential to the lowest point of the meniscus, when viewed in this plane.
  sources:
  - origin:
      ref:
        source: OIML R040:1981
      locality:
        type: clause
        reference_from: '2.1'
    type: authoritative
  terms:
