  definition:
  - content: part of a fluid taken from a system and intended to provide information
      about the properties of the system
  examples: []
  id: 01851-eng
  notes:
  - content: 1. The sample solution contains as a component the analyte and is applied
      to the sensor of a measuring system and provides the output signal.
  - content: 2. In laboratory medicine the “system” usually is a subsystem of a patient
      such as blood or urine. [Adapted from [9], subclauses 4.114 and 4.4]
