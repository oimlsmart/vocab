  definition:
  - content: closeness of agreement between the results of successive measurements
      of the same sample carried out under the same conditions and within a relatively
      short period of time.
  examples: []
  id: 01753-eng
  notes:
  - content: The same conditions would include the same method of measurement, measuring
      instrument, operator, location, and ambient environmental conditions.
