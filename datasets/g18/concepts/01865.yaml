data:
  dates:
  - date: '2024-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: mean of the wavelength of two adjacent emission or absorption lines,
      the signals of which are practically still separated by the spectrophotometer,
      divided by the absolute wavelength difference of the two lines
  examples: []
  id: 01865-eng
  notes:
  - content: Two equally strong emission lines are considered as resolved, if the
      signal in the region between the two maxima of the lines is reduced to at least
      80 % of the line’s maxima. Two equally strong absorption lines are considered
      as resolved, if the extinction between the two maxima is reduced to at least
      90 % of the line’s maxima. [Adapted from [7], clause 4.5]
  sources:
  - origin:
      ref:
        source: OIML R135:2004
      locality:
        type: clause
        reference_from: '2.26'
    type: authoritative
  terms:
  - type: expression
    normative_status: preferred
    designation: resolution of a spectrophotometer; resolving power of a pectrophotometer
  language_code: eng
  entry_status: valid
