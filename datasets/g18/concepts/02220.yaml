  definition:
  - content: 'legally relevant parameter with a value that depends on the type Example:
      Considering a measuring system of of instrument only. Type-specific parameters
      are part of the legally relevant software'
  examples: []
  id: 02220-eng
  notes:
  - content: liquids other than water, the range of kinematic viscosity of a turbine
      is a type- specific parameter fixed by the type approval of the turbine. All
      the manufactured turbines of the same type have the same range of viscosity.
