  definition:
  - content: '• • • • • device for taring: without altering the weighing range for
      net loads (additive tare device); or reducing the weighing range for net loads
      (subtractive tare device). The tare device may function as: a nonautomatic device
      (load balanced by the operator or tare preset by the operator); a semi-automatic
      device (load balanced automatically following a single manual command); or an
      automatic device (load balanced automatically without the intervention of an
      operator)'
