data:
  dates:
  - date: '2024-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: 'device, other than the main indicating device, connected to a calculator,
      intended to perform a particular function, directly involved in elaborating,
      transmitting or displaying measurement results Main ancillary devices are: -
      repeating indicating device; - printing device; - memory device; - totalizing
      indicating device; - conversion device.'
  examples: []
  id: 02045-eng
  notes:
  - content: 1. An ancillary device may or may not be subject to legal metrology control
      according to its function in the measuring system or to national regulations.
  - content: 2. An ancillary device may be integrated into the calculator, into the
      meter, or constitutes peripheral equipment linked to the calculator by means
      of an interface.
  sources:
