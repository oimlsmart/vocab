  definition:
  - content: facility allowing the user to initiate an adjustment of the instrument
      without having the possibility of influencing its magnitude, whether or not
      the adjustment is automatically required
  examples: []
  id: 02340-eng
  notes:
  - content: For those instruments that require the values of the volume fractions
      of the reference gas to be entered manually, the facility is considered to be
      semi-automatic.
