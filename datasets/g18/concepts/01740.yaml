  definition:
  - content: piece of specially selected or specially developed PMMA material that
      exhibits characterizable ionizing radiation-induced changes in specific optical
      absorbance as a function of absorbed dose, individually encapsulated by the
      manufacturer in a hermetically sealed pouch. The change in specific absorbance
      may be related to absorbed dose in the surrounding material
