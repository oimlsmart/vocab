  definition:
  - content: '- G.3-1 report issued by a Testing Laboratory that includes the results
      of 1. Additional Test Reports are issued under additional tests and examinations,
      additional to those in the OIML Recommendation, accepted in the scope of a Declaration
      of Mutual Confidence (DoMC).'
  examples: []
  id: 02166-eng
  notes:
  - content: the Mutual Acceptance Arrangement (MAA).
  - content: 2. In the event that several Testing Laboratories are involved in the
      additional tests and examinations, each Testing Laboratory issues an Additional
      Test Report corresponding to those tests and examinations it performs.
