data:
  dates:
  - date: '2024-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: in the present publication, "Test Report" means a report comprised of
      the OIML Test Report (see 3.8) and, when applicable, a complementary Test Report
      containing test results for any agreed upon additional requirements
  examples: []
  id: 00100-eng
  notes:
  - content: "(1) The Test Report gives the results of the examinations and testing
      carried out during type evaluation on an identified sample or samples of a given
      type and a conclusion as to whether the sample(s) meet the specified requirements.
      (2) The Test Report constitutes the evaluation report referred to in 3."
  - content: 4. (3) The complementary Test Report may be validated by a letter from
      the OIML Issuing Authority.
  sources:
