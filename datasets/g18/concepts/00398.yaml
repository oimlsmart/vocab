data:
  dates:
  - date: '2024-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: the capacity « contained » in a standard graduated flask, corresponding
      to a scale mark (designated capacity « In »), is equal to the volume of water
      which the flask contains at the reference temperature, when filled to this scale
      mark
  examples: []
  id: 00398-eng
  notes:
  - content: The expression « filled to this scale mark », means that the meniscus
      formed by the water in the neck of the flask, is so adjusted that th horizontal
      plane passing through the upper edge of the scale mark, is tangential to the
      lowest point of the meniscus, when viewed in this plane.
  sources:
