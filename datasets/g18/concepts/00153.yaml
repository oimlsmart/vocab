  definition:
  - content: a location containing hazardous chemical wastes that can affect or have
      the potential to affect a larger surrounding area. This applies to any site
      of uncontrolled hazardous waste dumping, a licensed hazardous waste disposal
      facility, or a location of accidental hazardous or toxic chemical spills or
      fires
