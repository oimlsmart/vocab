  examples: []
  id: 01391-eng
  notes:
  - content: 1. Principally, a fault is the result of an undesired change of data
      contained in or flowing through an electronic instrument.
  - content: 2. From the definition it follows that in this Recommendation a “fault”
      is a numerical value.
