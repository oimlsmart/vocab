  definition:
  - content: '- - - - - device for setting the indication to zero when a load is on
      the load receptor: without altering the weighing range for net loads (additive
      tare device); or reducing the weighing range for net loads (subtractive tare
      device). Itmay function as: a non-automatic device (load balanced by operator);
      a semi-automatic device (load balanced automatically following a single manual
      command); an automatic device (load balanced automatically without the intervention
      of an operator)'
