data:
  dates:
  - date: '2024-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: concentration of an element that provides an output signal equivalent
      to three times the standard deviation of the mean of the output signal of a
      blank solution and is the minimum quantity measured before it can be concluded
      that an element has been detected
  examples: []
  id: 01524-eng
  notes:
  - content: In this Recommendation, this term refers to the determination of an element
      in a reference solution free of interfering elements. The baseline noise is
      established by measuring the output signal of several aliquots of the blank
      test solution.
