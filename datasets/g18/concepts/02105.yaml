    type: accepted
  definition:
  - content: optoelectronic instrument designed for non-contact (remote) observation,
      measurement and registration of the space/space- time distribution of the radiation
      temperature of objects, in the field of view of the instrument, by forming a
      time sequence of thermograms and by determining the temperature of the object
      surface on the basis of the known emittance and influence parameters (ambient
      temperature, atmospheric transmission, observation distance, etc.)
