    type: accepted
  definition:
  - content: difference between the radiance temperature values obtained across the
      surface of the tungsten ribbon in the field of view. The temperature inhomogeneity
      is characterized by a maximum variation in temperature values obtained as a
      result of measurements when observing along and across the ribbon within the
      marked area relative to the position determined by the index and the center
      of the ribbon after the field of view has been displaced within the specified
      limits
