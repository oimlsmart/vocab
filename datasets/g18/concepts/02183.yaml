data:
  dates:
  - date: '2024-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: device employing sub-assemblies and performing a specific function. An
      electronic device is usually manufactured as a separate unit and is capable
      of being tested independently
  examples: []
  id: 02183-eng
  notes:
  - content: 1. An electronic device may be a complete measuring instrument (e.g.
      counter scale, electricity meter) or a part of a measuring instrument (e.g.
      printer, indicator).
  - content: 2. An electronic device may be a module in the sense this term is used
      in OIML B 3 OIML Certificate System for Measuring Instruments.
  - content: 3. [OIML D 11:2004, 3.2]
  sources:
  - origin:
