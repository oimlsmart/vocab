  definition:
  - content: (-) In this Recommendation, the term “device” is
  examples: []
  id: 00762-eng
  notes:
  - content: applied to any part of a filling instrument which uses any means to perform
      one or more specific functions irrespective of the physical realization, e.g.
      by a mechanism or a key initiating an operation. The device may be a small part
      or a major portion of a filling instrument.
