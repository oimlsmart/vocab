data:
  dates:
  - date: '2024-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: systematic, independent and documented process for obtaining audit evidence
      and evaluating it objectively to determine the extent to which audit criteria
      are fulfilled [ISO 9000:2000, 3.9.1]
  examples: []
  id: 00177-eng
  notes:
  - content: 'Internal audits, sometimes called “first-party audits”, are conducted
      by, or on behalf of, th organization itself for internal purposes and can form
      the basis of an organization’s self- declaration of conformity. External audits
      include what are generally termed “second-” or “third-party audits”. Second-party
      audits are conducted by parties having an interest in the organization, such
      a customers, or by other persons on their behalf Third-party audits are conducted
      by external independent organizations. Such organizations provide certification
      or registration of conformity with requirements such as those of ISO 9001 and
      ISO 14001:'
  - content: '1'
  - content: '9'
  - content: '9'
  - content: 6. When quality and environmental management systems are audited together,
      this is termed a “combined audit”. When two or more auditing organizations cooperate
      to audit a single auditee jointly, t is termed “joint audit”.
