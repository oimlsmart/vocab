data:
  dates:
  - date: '2024-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: standard radiator (i.e. a reference radiator), whose angular dimensions
      are at least ten times larger than the instantaneous field of view of the thermographic
      instrument
  examples: []
  id: 02108-eng
  notes:
  - content: If the thermographic instrument has a large instantaneous field of view
      angle, an angular dimension of the standard reference radiator should be wide
      enough to cover the instantaneous field of view of the thermographic instrument.
  sources:
  - origin:
