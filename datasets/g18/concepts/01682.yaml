    type: accepted
  definition:
  - content: condition that exists in material under ionizing irradiation whereby
      the energies, number, and direction of secondary electrons induced by the radiation
      are uniform throughout the volume of interest. Thus, for such a volume, the
      sum of the energies of the secondary electrons entering is equal to the sum
      of the energies of the secondary electrons leaving that volume
