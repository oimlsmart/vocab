    type: accepted
  definition:
  - content: device connected to or incorporated in the meter for automatically correcting
      the volume at metering conditions, by taking into account the flowrate and/or
      the characteristics of the water to be measured (e.g. temperature and pressure)
      and the pre-established calibration curves. The characteristics of the water
      to be measured may either be measured using associated measuring instruments,
      or be stored in a memory in the instrument
