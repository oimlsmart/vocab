    type: accepted
  definition:
  - content: '- - - interface (hardware and/or software) which only allows the introduction
      of such data into the data processing device of an instrument, module or electronic
      component, which cannot: display data which are not clearly defined and which
      could be taken for a weighing result; falsify displayed, processed or stored
      weighing results or primary indications; or adjust the instrument or change
      any adjustment factor, except releasing an adjustment procedure with incorporated
      devices or, in the case of class I instruments with external adjustment weights
      as well'
