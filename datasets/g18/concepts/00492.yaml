  definition:
  - content: a device employing electronic sub-assemblies and performing a specific
      function. An electronic device is usually manufactured as a separate unit and
      is capable of being independently tested
  examples: []
  id: 00492-eng
  notes:
  - content: 'An electronic device, as defined above, may be a complete weighing instrument
      (for example: counter scale) or part of a weighing instrument (for example:
      printer, indicator).'
