    type: accepted
  definition:
  - content: (A series of tests and visual examinations carried out before the equipment/weight
      is put into service to determine whether a weight or weight set has been manufactured
      to replicate a given type and conforms to that type and to regulations, and
      that its metrological characteristics lie within the limits required for initial
      verification of copies of that type. If the weights or weight set pass all the
      tests and examinations, it is given legal character byits acceptance as evidenced
      by stamping and/or the issuing of acertificate of verification dapted from OIML
      D 20 Initial and subsequent verification of measuring instruments and processes
      (1988))
