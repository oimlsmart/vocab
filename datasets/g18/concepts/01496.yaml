  definition:
  - content: 'the smallest quantity of a sample component which yields a detector
      output signal that is three times greater than the short- term noise. Note:'
  examples: []
  id: '01496-eng'
  notes:
  - content: This term is also referred to as «minimum detectability» or «minimum
      detectable limit (MDL)» in references and manufacturer's literature. The detection
      limit is sometimes defined as the output signal equal to some other multiple
      (for example, two or ten) of th noise level and may depend somewhat on whether
      the gas chromatograph is being used for quantitative or qualitative analysis
