data:
  dates:
  - date: '2024-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: mass flow rate (for mass flow rate dependent detectors) or concentration
      (for concentration-dependent detectors) yielding a signal equal to three times
      the short-term noise level as determined on a statistical basis
  examples: []
  id: 01055-eng
  notes:
  - content: This term is also referred to as “minimum detectability”, or “minimum
      detectable limit (MDL)”, in some references and manufacturer's literature. It
      is sometimes defined as an output signal equal to some other multiple (two or
      ten) of the noise level and depends somewhat on whether the gas chromatograph
      is used for quantitative or qualitative analysis.
