  definition:
  - content: legally relevant parameter that depends on the individual taximeter.
      Such parameters comprise adjustment and configuration parameters. They are adjustable
      or selectable only in a service mode of the taximeter and may be classified
      as those that should be secured and those that may be accessed (settable parameters)
