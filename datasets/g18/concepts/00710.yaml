  definition:
  - content: 'for the purposes of type evaluation/pattern approval, a load cell The
      examples provided are not intended to be family consists of load cells that
      are of: li - the same material or combination of materials (for example, mild
      steel, stainless steel or aluminum); - the same design of the measurement technique
      (for example, strain gauges bonded to metal); - the same method of construction
      (for example, shape, sealing of strain gauges, mounting method, manufacturing
      method); - the same set of specifications (for example, output rating, input
      impedance, supply voltage, cable details); and - one or more load cell groups'
