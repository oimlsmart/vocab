  definition:
  - content: horizontal axis of the tank perpendicular to the longitudinal axis, when
      the tank is in its normal position. The vertical angle by which this axis is
      rotated is referred to as the roll angle. It is positive if the right part of
      the tank (in relation to the direction of travel) is lifted
