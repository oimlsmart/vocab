    type: accepted
  definition:
  - content: a formal recognition that a testing laboratory is competent to carry
      out specific tests or specific types of tests.
  examples: []
  id: 00133-eng
  notes:
  - content: The genetic term «accreditation» can cover the recognition of both the
      technical competence and the impartiality of a testing laboratory or only its
      technical competence. Accreditation is normally awarded following successful
      laboratory assessment and is followed by appropriate monitoring.
