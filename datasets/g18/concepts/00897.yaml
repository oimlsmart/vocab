  definition:
  - content: '[O force transducer which, after taking into account the effects of
      the acceleration of gravity and air buoyancy at the location of its use, measures
      mass by converting the measured quantity (mass) into another measured quantity
      (output) IML R 60: 2000, 2.1.2]'
  examples: []
  id: 00897-eng
  notes:
  - content: Load cells equipped with electronics including amplifier, analog-to-digital
      converter (ADC), and data processing device (optionally) are called digital
      load cells (see Figure 1).
