  definition:
  - content: 'element or device, other than ancillary, required to ensure correct
      measurement or intended to facilitate the measuring operations, or which could
      in any way affect the measurement. Examples of additional devices are: - filter;
      - flow conditioning device; - branch or by-pass line; - valves; - pressure reduction
      devices located upstream or downstream of the meter; - sampling systems; - piping.'
