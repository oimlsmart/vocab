    type: accepted
  definition:
  - content: 'device intended to perform a particular function, directly involved
      in elaborating, transmitting or displaying measurement results Main ancillary
      devices are: - zero setting device; - repeating indicating device; - printing
      device; - memory device; - price indicating device; - totalizing indicating
      device; - pre-setting device; - self-service device.'
  examples: []
  id: 01993-eng
  notes:
  - content: An ancillary device may or may not be subject to legal metrology control
      according to its function in the measuring system or to national regulations.
