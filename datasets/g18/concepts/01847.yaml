    type: accepted
  definition:
  - content: absorbance divided by the optical pathlength b and the amount of substance
      concentration c
  examples: []
  id: 01847-eng
  notes:
  - content: 1. The derived SI unit is the square metre per mole (1 m2/mol), but the
      litre per mole per mm (L/(mol × mm)) or litre per mole per cm (L/(mol × cm))
      is often used.
  - content: 2. The specific molar absorption coefficient ε slightly depends on the
      amount of substance concentration c.
