data:
  dates:
  - date: '2024-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: the capacity « delivered » by a standard graduated flask, corresponding
      to a scale mark (designated capacity « Ex »), is equal to the volume of water
      delivered by the flask at the reference temperature, when filled to this scale
      mark and then emptied (see method described in appendix A, point A.3.2.)
  examples: []
  id: 00399-eng
  notes:
  - content: The expression « filled to this scale mark », means that the meniscus
      formed by the water in the neck of the flask, is so adjusted that th horizontal
      plane passing through the upper edge of the scale mark, is tangential to the
      lowest point of the meniscus, when viewed in this plane.
  sources:
  - origin:
      ref:
        source: OIML R043:1981
      locality:
        type: clause
        reference_from: 2.1.2
    type: authoritative
  terms:
