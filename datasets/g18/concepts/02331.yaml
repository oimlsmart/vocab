  definition:
  - content: '(d (c (b (a fault greater than the maximum permissible error specified
      in Table 2 (see 6.2.2). The following faults are considered not to be significant,
      even when they exceed the value defined above: ) faults arising from simultaneous
      and mutually independent causes in the ALG itself or in its checking facilities;
      ) faults implying the impossibility to perform any measurement; ) transitory
      faults being momentary variations in the indication, which cannot be interpreted,
      memorized or transmitted as a measurement result; ) faults giving rise to variations
      in the measurement results so serious that they are bound to be noticed by all
      those interested inthe result of the measurement.'
