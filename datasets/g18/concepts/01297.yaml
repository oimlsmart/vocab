    type: accepted
  definition:
  - content: '• • • • A fault greater than d. The following are not considered to
      be significant faults: faults that result from simultaneous and mutually independent
      causes in the instrument or in its checking facility; faults that imply the
      impossibility of performing any measurement; transitory faults that are momentary
      variations in the indications which cannot be interpreted, memorized or transmitted
      as a measurement result; faults that are so serious that they will inevitably
      be noticed by those interested in the measurement.'
