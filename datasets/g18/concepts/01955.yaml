    type: accepted
  definition:
  - content: smallest difference between indications of an indicating device that
      can be meaningfully distinguished
  examples: []
  id: 01955-eng
  notes:
  - content: 1. For a digital device, this is the change in the indication when the
      least significant digit changes by one step. For an analogue device, this is
      half the difference between subsequent scale marks.
  - content: 2. (VIM:1993, 5.12)
