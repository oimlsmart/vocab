  definition:
  - content: instrument that operates with a non-stable equilibrium based measuring
      system during the mass determining process while the load transport system is
      in motion (e.g. where the load transport system is moving; checkweighers fitted
      with a load receptor on which the load slides; or vehicle mounted or incorporated
      catchweighers where the load receptor is in motion)
