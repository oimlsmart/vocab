  definition:
  - content: device intended to detect the presence of liquid in the pipework orthe
      tank and to check, before startup and after stopping, that all or part of the
      measuring system is either filled completely with liquid (full hose measuring
      systems) or completely empty ofliquid (empty hose measuring system)
  examples: []
  id: 02281-eng
  notes:
  - content: A liquid detector may also be used for high level detection.
