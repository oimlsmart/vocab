  definition:
  - content: 'parameter that describes the assessed roughness profile of a sample.
      The letter stem:[R] is indicative of the type of assessed profile, in this case
      stem:[R] for roughness profile. The assessed profile of a sample can be in terms
      of different profile types: a roughness profile or R-parameter, primary profile
      or P-parameter, a waviness profile or W-parameter'
