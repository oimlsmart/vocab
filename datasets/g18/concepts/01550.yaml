    type: accepted
  definition:
  - content: device connected to or incorporated in the meter for automatically correcting
      the measured quantity at the time of measurement, by taking into account the
      flowrate and/or the characteristics of the liquid to be measured (viscosity,
      temperature, pressure, etc.) and the pre-established calibration curves. The
      characteristics of the liquid shall either be measured using associated measuring
      devices, or stored in the memory of the instrument
