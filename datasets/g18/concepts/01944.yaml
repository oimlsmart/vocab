  - content: 'the weighted mean error (WME) is calculated as follows: where: • Qi/Qmax
      is a weighting factor; • ei is the error at the flowrate Qi; • at Qi > 0.9·Qmax
      a weighting factor of 0.4 shall be used instead of 1.'
