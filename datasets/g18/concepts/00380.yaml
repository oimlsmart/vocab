  definition:
  - content: number determined from a Rockwell hardness test, derived from the difference
      in the indentation depths before and after application of the additional force
      F1, while maintaining the preliminary test force F0. The difference in indentation
      depths is measured as h (see Fig. 1) in mm. The calculation is dependent on
      the specific combination of indenter type and the forces used
