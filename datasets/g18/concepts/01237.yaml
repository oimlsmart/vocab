    type: accepted
  definition:
  - content: 'for masses equal to or greater than the minimum measured quantity, a
      durability error greater than one-fifth of the absolute value of the maximum
      permissible error for the measured quantity. Durability errors are not considered
      as significant when: – the indication cannot be interpreted, memorized or transmitted
      as a measurement result, – the indication is such that it is impossible to perform
      any measurement'
