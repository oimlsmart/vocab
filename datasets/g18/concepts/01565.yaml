    type: accepted
  definition:
  - content: 'difference between the error (of indication) and the intrinsic error
      greater than the value specified in this Recommendation. Significant faults
      are only relevant to electronic measuring systems. The following are not considered
      to be significant faults:  transitory malfunctions resulting in momentary variations
      in the indication, which cannot be interpreted, memorized, or transmitted as
      a measurement result,  for interruptible measuring systems only, malfunctions
      implying the impossibility of performing further measurements'
