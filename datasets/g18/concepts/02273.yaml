  definition:
  - content: 'collecting line connected via diverting valves to the discharge pipes
      of the measuring compartments and allowing delivery from any one or several
      compartments via a common pipework. Acompartment connected to a built-in manifold
      has two possible outlets: its own outlet valve and its own diverting valve'
