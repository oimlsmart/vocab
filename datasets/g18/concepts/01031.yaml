    type: accepted
  definition:
  - content: an estimate characterizing the range of values within which the true
      value of an error lies, including components due to the standard and its use,
      and components due to the verified or calibrated instrument itself
  examples: []
  id: 01031-eng
  notes:
  - content: the components due to a meter verified or calibrated are notably linked
      to the resolution of its indicating device and to the periodic variation.
