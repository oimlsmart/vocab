data:
  dates:
  - date: '2024-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: measuring instrument that serves to determine the mass of an amount of
      material by using the action of gravity on this material. The instrument may
      also be used to determine other quantities, magnitudes, parameters or characteristics
      related to mass. According to its method of operation, a weighing instrument
      is classified as automatic or non-automatic
  examples: []
  id: 00539-eng
  notes:
  - content: In this Recommendation “mass” (or “weight value”) is preferably used
      in the sense o “conventional mass” or “conventional valu of the result of weighing
      in air” accordi OIML R 111 and OIML D 28, whereas “weight” is preferably used
      for an embodiment (= material measure) of mass t is regulated in regard to its
      physical an metrological characteristics.
