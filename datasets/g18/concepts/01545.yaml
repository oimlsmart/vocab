  - content: 'specified values of the conditions to which the measured quantity of
      liquid is converted (example: base temperature and base pressure of the liquid)'
  examples: []
  id: 01545-eng
  notes:
  - content: Metering and base conditions (which refer only to the volume of liquid
      to be measured or indicated) should not be confused with the "rated operating
