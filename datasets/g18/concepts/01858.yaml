  definition:
  - content: characteristic partial internal absorbance divided by the amount of substance
      concentration of the analyte. The Beer’s factor is constant for specified experimental
      conditions
  examples: []
  id: 01858-eng
  notes:
  - content: 1. The coherent SI unit is the cubic metre per mole (m3/mol) but often
      the litre per mole (l/mol, L/mol) is preferred.
  - content: 2. For conditions of validity see 2.9.
