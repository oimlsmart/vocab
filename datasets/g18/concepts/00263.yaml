  definition:
  - content: 'any verification of a measuring instrument which follows the initial
      verification: mandatory periodic verification, verification after repair, or
      verification made before the expiry of the period of validity of the periodical
      verification made either : at the request of the user, or because for some reason
      the stamp is no longer valid for the remainder of this period of validity [VML
      2.4.3]'
