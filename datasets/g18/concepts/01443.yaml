data:
  dates:
  - date: '2024-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: set of operations that establish, under specified conditions, the relationship
      between values of quantities indicated by a measuring instrument or measuring
      system, or values represented by a material measure or a reference material,
      and the corresponding values realized by standards
  examples: []
  id: 01443-eng
  notes:
  - content: '1: The result of a calibration permits either assignment of values of
      measurands to the indications or the determination of corrections with respect
      to indications. 2: A calibration may also determine other metrological properties
      such as the effect of influence quantities. 3: The result of a calibration may
      be recorded in a document, sometimes called calibration certificate or calibration
      report'
  sources:
  - origin:
