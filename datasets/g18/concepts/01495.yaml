    type: accepted
  definition:
  - content: 'a measure of the variation in the detector’s output signal when a sample
      component is not being detected. This can be classified into two types:  Short-term
      noise includes all observable random variations of the signal from the detector
      or other components having a frequency of about one or more cycles per minute.
       Drift is the average slope of the baseline signal measured over an extended
      time period, for example, one-half hour'
