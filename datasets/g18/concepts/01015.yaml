  definition:
  - content: a part of the meter that transforms the flow of the liquid to be measured
      into a signal(s) which is (are) sent to the calculator. It may either be autonomous
      or use an external power source
  examples: []
  id: 01015-eng
  notes:
  - content: For the purpose of this Recommendation, the measurement transducer includes
      the flow or volume sensor.
