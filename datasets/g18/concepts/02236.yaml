    type: accepted
  definition:
  - content: tank fittings, structure, piping and other equipment which affects the
      capacity of a tank. Deadwood is referred to as “positive deadwood” when the
      capacity of the fitting adds to the effective capacity of the tank, or “negative
      deadwood” when the volume of the fitting displaces liquid and reduces the effective
      capacity
