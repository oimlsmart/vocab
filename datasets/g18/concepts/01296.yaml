  - content: the difference between the error of indication and the intrinsic error
      of a weighing instrument
  examples: []
  id: '01296-eng'
  notes:
  - content: (1) Principally, a fault is the result of an undesired change of data
      contained in or flowing through an electronic instrument. (2) From the definition
      it follows that in this Recommendation a "fault" is a numerical value.
