data:
  dates:
  - date: '2024-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: '- - - durability error greater than e. (1) A durability error can be
      due to errors, occurring after a period of instrument use, are not considered
      to be significant durability errors, even when they exceed e, if they are clearly
      the result of the failure of a device/component, or of a disturbance and for
      which the indication: cannot be interpreted, memorized, or transmitted as a
      measurement result; implies the impossibility to perform any measurement; or
      is so obviously wrong that it is bound to be noticed by all those interested
      in the result of measurement.'
  examples: []
  id: 00984-eng
  notes:
  - content: mechanical wear and tear or due to drift and ageing of electronic parts.
      The concept of significant durability error applies only to electronic parts.
      (2) For a multi-interval instrument, the value of e is that appropriate to the
      partial weighin range.
  sources:
