  definition:
  - content: 'interface (hardware and/or software) which only allows the introduction
      of such data into the data processing device of an instrument, which cannot:
       display data which are not clearly defined and which could be taken as being
      a weighing result;  falsify displayed, processed or stored weighing results
      or primary indications; or  adjust the instrument or change any adjustment
      factor, except releasing an adjustment procedure with incorporated devices'
