  definition:
  - content: volume indicated (marked) on the tank or its compartment
  examples: []
  id: 02245-eng
  notes:
  - content: 1. The nominal capacity value usually corresponds to the volume of liquid
      which a tank or compartment contains at reference temperature when filled up
      to the maximum permissible level or volume mark.
  - content: 2. The nominal capacity value can be limited by safety regulations.
  sources:
