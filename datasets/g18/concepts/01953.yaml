  examples: []
  id: 01953-eng
  notes:
  - content: Operating and base conditions relate to the volume of gas to be measured
      or indicated only and should not be confused with “rated operating conditions”
      and “reference conditions” (VIM:1993, 5.05 and 5.07) which refer to influence
      quantities.
