  definition:
  - content: part of the weighing instrument that comprises all mechanical and electronic
      devices (i.e. load receptor, load-transmitting device, load cell, and analog
      data processing device or digital data processing device) but not having the
      means to display the weighing result. It may optionally have devices for further
      processing (digital) data and operating the instrument
