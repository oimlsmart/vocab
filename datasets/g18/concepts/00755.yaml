  definition:
  - content: measuring instrument that serves to determine the mass of a load byusing
      the action of gravity on that load. The weighing instrument may also be used
      to determine other mass-related quantities, magnitudes, parameters or characteristics.
      According toits method of operation, a weighing instrument is classified as
      automatic or non-automatic
