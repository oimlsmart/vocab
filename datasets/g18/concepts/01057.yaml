  definition:
  - content: 'Output signal per unit mass of the sample component of interest Peak
      area is independent of broadening effects in the carrier gas. It is expressed
      in either one of the two following ways: 3.13.1 With a concentration-dependent
      detector, the instrument sensitivity, S, (…) 3.13.2 With a mass flow rate dependent
      detector, the instrument sensitivity, S, (…)'
  examples: []
  id: 01057-eng
  notes:
  - content: caused by variables such as column temperature, eluent flow rate, and
      rate of sample injection. From this standpoint, therefore, the peak area is
      a more satisfactor analytical parameter than peak height. On the other hand,
      peak heights are more easily measured and, for narrow peaks, more accurately
      determined. Many modern chromatographic instruments are equipped with electronic
      integrators that provide preci measurements of relative peak areas.
