  definition:
  - content: intersection of the vertical measurement axis with the upper surface
      of the dipping datum plate, or with the bottom surface of the tank if a dipping
      datum plate is not provided. It constitutes the origin for the measurement of
      liquid levels (zero reference or dipping reference point)
