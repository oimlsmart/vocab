  definition:
  - content: 'an inadequate prepackage found to contain an actual quantity less than
      the nominal quantity minus twice the tolerable deficiency for a nominal quantity
      allowed in 4.2.3 is called a T2 error. T2 error: actual contents < (Qn - T2)'
