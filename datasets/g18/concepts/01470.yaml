  - date: '2024-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: series of tests and visual examinations, also carried out by an official
      of the legal metrology service (inspector), to ascertain whether the weights
      or weight set, having been in use for some time since the previous verification,
      continues to conform to, or again conforms to, regulations and maintains its
      metrological characteristics within the required limits. If the weights or weight
      set passes all tests and examinations, its legal character is either confirmed,
      or re-established by its acceptance as evidenced by stamping and/or the issuing
      of a certificate of verification. When sampling is used to verify a population
      of weights, all elements in the population will be deemed verified
