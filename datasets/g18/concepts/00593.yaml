  definition:
  - content: 'legally relevant parameter with a value that depends on the type ofinstrument
      only. Type-specific parameters are part of the legally relevant software. They
      are fixed at type approval of the instrument. Examples of type-specific parameters
      are: parameters used for mass calculation, stability analysis or price calculation
      and rounding, software identification'
