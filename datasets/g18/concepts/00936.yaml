  definition:
  - content: storage used for keeping measurement data ready after completion of the
      measurement for later legally relevant purposes (e.g. conclusion of a trading
      transaction at a later date, when the customer is not present for the determination
      of the amount, or for special applications identified and legislated by the
      state)
