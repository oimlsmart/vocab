data:
  dates:
  - date: '2024-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: amount of heat which would be released by the complete combustion in
      air of a specified quantity of gas, in such a way that the pressure at which
      the reaction takes place remains constant, and all the products of combustion
      are returned to the same specified temperature as that of the reactants, all
      of these products being in the gaseous state except for water formed by combustion,
      which is condensed to the liquid state at this specified temperature
  examples: []
  id: 02058-eng
  notes:
  - content: 1. In the following parts of this Recommendation, calorific value is
      used for gross calorific value.
  - content: 2. The condensation enthalpy and combustion enthalpy depend directly
      upon the temperature and pressure; consequently the energy at base conditions
      is considered.
  - content: 3. The calorific value should be determined on a mass or volumetric basis.
  - content: 4. (adapted from ISO 6976)
  sources:
  - origin:
      ref:
        source: OIML R140:2007
      locality:
        type: clause
        reference_from: T.1.15
    type: authoritative
  terms:
  - type: expression
    normative_status: preferred
    designation: (gross) calorific value
  language_code: eng
  entry_status: valid
