  definition:
  - content: 'part of the load measuring device that displays the value of a weighing
      result in units of mass and which may additionally display: The difference between
      the mass of a load and a reference value; and/or The value of the fill(s) and/or
      related quantities or parameters of a number of consecutive weighings'
