  definition:
  - content: 'part or device, other than an ancillary device, required to ensure Main
      additional devices are: correct measurement or intended to facilitate the measuring
      operations, or which could in any way affect the measurement'
  examples: []
  id: 01528-eng
  notes:
  - content:  gas elimination device,  gas indicator,  sight glass,  filter, 
      pump,  device used for the transfer point,  anti-swirl device,  branches
      or bypasses,  valves, hoses.
