  definition:
  - content: procedures for control exercised in respect of the manufacture, installation
      and repair of measuring instruments, or in respect of their use, to check that
      they are used correctly and honestly. It extends also to control of correctness
      of the quantities indicated on prepacked articles [VML 2.6].
