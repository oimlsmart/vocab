  dates:
  - date: '2024-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: series or group of weights, usually presented in a case so arranged to
      make possible any weighing of all loads between the mass of the weight with
      the smallest nominal value and the sum ofthe masses of all weights of the series
      with a progression in which the mass of the smallest nominal value weight constitutes
      the smallest step series. The weights have similar metrological characteristics
      and the same or different nominal values as defined in 4.3 of this Recommendation,
      and belong to the same accuracy class
