    type: accepted
  definition:
  - content: 'a pressure that does not vary, or that varies continuously at speeds
      not exceeding: 1 % of the upper limit of the measuring range per second, for
      pressure gauges and vacuum gauges, 1 % of the sum of the upper limits of the
      measuring ranges per second, for pressure-vacuum gauges, with the greatest pressure
      variation in one minute not exceeding 5 % of the above values'
