data:
  dates:
  - date: '2024-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: measuring instrument that serves to determine the mass of a body by using
      the action of gravity on this body. The instrument may also be used to determine
      other quantities, magnitudes, parameters or characteristics related to the determined
      mass. According to its method of operation, a weighing instrument is classified
      as an automatic weighing instrument or a non- automatic weighing instrument
  examples: []
  id: 00874-eng
  notes:
  - content: in this Recommendation “mass” (or “weight value”) is preferably used
      in the sense of “conventional mass” or “conventional value of the result of
      weighing in air” according to R 111 and D 28, whereas “weight” is preferably
      used for an embodiment (i.e. material measure) of mass that is regulated in
      regard to its physical and metrological characteristics.
  sources:
