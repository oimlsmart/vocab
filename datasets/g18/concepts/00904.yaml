    type: accepted
  definition:
  - content: '[ device employing electronic sub-assemblies and performing a specific
      function. Electronic devices are usually manufactured as separate units and
      are capable of being tested independently OIML D 11: 2004, 3.2]'
  examples: []
  id: 00904-eng
  notes:
  - content: An electronic device, as defined above, may be a complete instrument
      (e.g. an instrument for direct sales to the public), a module (e.g indicator,
      analog data processing device, weighing module) or a peripheral device (e.g.
      printer, secondary display).
