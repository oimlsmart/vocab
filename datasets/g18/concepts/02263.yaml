    type: accepted
  definition:
  - content: range between the minimum and maximum possible indications ofthe level
      sensor. The lower limit is type and system dependent and shall be significantly
      less than the liquid level corresponding tothe minimum measured quantity of
      the tank or compartment. The upper limit depends on the tank height and shall
      be above the maximum permissible filling height of the tank or compartment
