  definition:
  - content: part of the meter that receives the output signals from the measuring
      device(s) and, possibly, from associated measuring devices, processes them and,
      if appropriate, stores the results in memory until they are used. In addition,
      the calculator may be capable of communicating both ways with ancillary devices
