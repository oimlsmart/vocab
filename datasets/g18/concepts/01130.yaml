  definition:
  - content: there are two vertex powers of a lens, described in 3.7.1 and 3.7.2
  examples: []
  id: 01130-eng
  notes:
  - content: (1) The unit for expressing vertex power is the reciprocal metre (m-1).
      The name for this unit is the "dioptre", for which the symbol is D. (2) Conventionally
      the back vertex power, in dioptres, is specified as the "power" of a spectacle
      lens, although the front vertex powe is required for certain purposes (for example
      in the measurement of some multifocal lenses).
