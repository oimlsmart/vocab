  - date: '2024-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: 'for masses equal to or greater than the minimum measured quantity, a
      fault greater than one-fifth of the absolute value of the maximum permissible
      error for the measured quantity. The following are not considered as significant
      faults: – faults arising from simultaneous and mutually independent causes in
      the measuring instrument itself or in its checking facilities, – transitory
      faults being momentary variations in the indication, which cannot be interpreted,
      memorized or transmitted as a measurement result, – faults implying the impossibility
      to perform any measurement'
