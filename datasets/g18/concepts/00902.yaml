    type: accepted
  definition:
  - content: 'b) a) a digital display can be realized as a primary display or as a
      secondary display: primary display: Either incorporated in the indicator housing
      orin the terminal housing or realized as a display in a separate housing (i.e.
      terminal without keys), e.g. for use in combination with a weighing module.
      secondary display: Additional peripheral device (optional) which repeats the
      weighing result and any other primary indication, or provides further, non-metrological
      information'
  examples: []
  id: '00902-eng'
  notes:
  - content: The terms "primary display" and "secondary display" should not be confused
      with the terms "primary indication" and "secondary indication" (T.1.3.1 and
      T.1.3.2)
