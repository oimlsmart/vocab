    type: accepted
  definition:
  - content: half the sum of the maximum and minimum number of loads per fill that
      can be set by the operator or, in cases where the number ofloads per fill is
      not directly determined by the operator, either the mean of the actual number
      of loads per fill (if known) in a period of normal operation, or the optimum
      number of loads per fill, as may be specified by the manufacturer for the type
      of product which is to be weighed
