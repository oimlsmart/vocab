data:
  dates:
  - date: '2024-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: 'fault, the magnitude of which is greater than one tenth of the magnitude
      of the maximum permissible error for the relevant measurand However, whatever
      is the measured quantity: - faults greater than one tenth of the magnitude of
      the maximum permissible error corresponding to a quantity equal to one minute
      at Qmax are always considered as significant, - faults smaller than the relevant
      minimum specified quantity deviation are never considered as significant.'
  examples: []
  id: 02083-eng
  notes:
  - content: 1. For the principal measurands this concept applies only to the electronic
      parts of the measuring system (in general the calculator) but not to the meter
      as such. Meters shall be tested and assessed according to the specific applicable
      OIML International Recommendation(s).
  - content: 2. The significant fault for a calculator is calculated on the basis
      of the maximum permissible error applicable to the principal measurand and not
      on the basis of the maximum permissible error applicable to the calculator.
  - content: 3. When a device is used for measuring two or more principal measurands
      (a calculator for example), it has a significant fault for each measurand.
  sources:
  - origin:
      ref:
        source: OIML R140:2007
      locality:
        type: clause
        reference_from: T.2.17.1
    type: authoritative
  terms:
  - type: expression
    normative_status: preferred
    designation: 'significant fault (for the principal measurands: volumes, mass or
      energy)'
  language_code: eng
  entry_status: valid
