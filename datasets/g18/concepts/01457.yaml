  definition:
  - content: parameter that specifies a magnetic state of material bodies such asweights,
      in the absence of an external magnetic field (most generally, magnetization
      is a vector whose magnitude and direction are not necessarily constant within
      the material). The magnetization of a body generates an inhomogeneous magnetic
      field in space and thus may produce magnetic forces on other materials
