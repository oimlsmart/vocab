data:
  dates:
  - date: '2024-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: the mass of that amount of grain required to fill a specified receptacle
  examples: []
  id: 00304-eng
  notes:
  - content: 'This property depends not only on the intrinsic quality of the grain
      in question, but also on its moisture content, the capacity, shape and dimensions
      of the receptacle used to measure its volume, and the way in which the receptacle
      is filled. It is therefore determined : from the mass of grain in a specified
      condition which is required to MI a receptacle of 20 litres and of specified
      shape and dimensions, the receptacle being filled with the grain under specified
      conditions. The hectolitre mass is then obtained by dividing the mass of the
      grain in kilograms by the volume of the receptacle in hectolitres ; i is thus
      expressed in kilograms per hectolitre.'
  sources:
