  definition:
  - content: national organization or agency responsible for implementing laws or
      regulation regarding metrological control of measuring instruments
  examples: []
  id: 00163-eng
  notes:
  - content: The national service of legal metrology may fall under the jurisdiction
      of the national responsible body referred to in this Document; therefore, when
      delegated the responsibility, the national service of legal metrology should
      be substituted for the “national responsible body” throughout the text of this
      Document.
