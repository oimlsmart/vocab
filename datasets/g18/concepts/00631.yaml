    type: accepted
  definition:
  - content: numerical value, representing a weight value, that is introduced into
      the instrument. It is a predetermined tare value that is used for one or several
      weighings
  examples: []
  id: 00631-eng
  notes:
  - content: '(1) "Introduced" includes procedures such as: keying in, recalling from
      a data storage, or inserting via an interface. (2) "Predetermined" means that
      a tare value is determined once and is applied to other weighings without determining
      the individual tare values.'
