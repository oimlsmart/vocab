  definition:
  - content: commands may be a sequence of electrical (optical, electromagnetic, etc.)
      signals on input interfaces or codes in data transmission protocols. They can
      be generated by the software of the measuring instrument / electronic device
      / sub-assembly (software commands) or generated by the user through the user
      interface of the measuring instrument (user commands).
