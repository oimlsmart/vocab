  - date: '2024-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: 'The method of calculating instrument resolution is dependent on the
      instrument''s ion analyzer. Two common methods for determining the ratio of
      m to stem:[Delta]m (m/stem:[Delta]m) are: - m is the mass of a component comprising
      the first peak of a doublet, and stem:[Delta]m is the difference in the mass
      of the two peaks. The doublet shall be separated by a valley, the value of which
      shall not exceed 10 % of the value of the highest peak (m/stem:[Delta]m is constant
      (sector type)). - m is the mass of a sample component within a peak and stem:[Delta]m
      is the full width at half maximum (FWHM) of the peak (stem:[Delta]m is constant,
      (quadrupole type)). Thus m/stem:[Delta]m decreases as mass decreases. With this
      type of instrument unit resolution, one can separate each mass from the next
      integer mass, i.e. one can distinguish mass 50 from mass 51, and distinguish
      mass 1000 from mass 1001'
