data:
  dates:
  - date: '2024-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: fault, the magnitude of which is greater than half of the magnitude of
      the maximum permissible error for the relevant measurand. However a fault, the
      magnitude of which is smaller than 2 scale intervals of the associated measuring
      instrument is never considered as a significant fault
  examples: []
  id: 02084-eng
  notes:
  - content: for associated measuring instruments other than CVDDs this concept applies
      to the whole associated measuring instrument, or to the electronic part only,
      according to what is subject to the test.
  sources:
  - origin:
      ref:
