    type: accepted
  definition:
  - content: '• • [a fault, the magnitude of which is greater than one half of the
      maximum permissible error in the upper flowrate zone dapted from OIML D 11].
      The following are not considered to be significant faults: faults arising from
      simultaneous and mutually independent causes in the water meter itself or in
      its checking facilities; and transitory faults being momentary variations in
      the indication which cannot be interpreted, memorized or transmitted as a measurement
      result'
