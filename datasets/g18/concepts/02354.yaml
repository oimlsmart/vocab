data:
  dates:
  - date: '2024-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: fault which has a magnitude greater than the magnitude of the maximum
      permissible error on initial verification
  examples: []
  id: 02354-eng
  notes:
  - content: '1 The following faults are considered to be not significant: a) Fault
      arising from simultaneous and mutually independent causes in the instrument
      itself or in its checking facilities; b) Faults implying the impossibility to
      perform any measurement; c) Transitory faults being momentary variations in
      the indication, which cannot be interpreted, recorded or transmitted as a measurement
      result; and d) Faults giving rise to variations in the measurement results that
      are so large as to be noticed by all those interested in the measurement result.
      2 Adapted from OIML D 11:2004, 3.10.'
