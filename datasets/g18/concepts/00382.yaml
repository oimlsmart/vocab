data:
  dates:
  - date: '2024-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: 'device or assembly of devices used for determining the Rockwell hardness
      of primarily metallic materials by performing a Rockwell indentation hardness
      test. Rockwell hardness machines are grouped into two classes: - Rockwell standardizing
      machine: Rockwell hardness machine used primarily for the standardization of
      Rockwell hardness indenters and for the standardization of Rockwell hardness
      reference test blocks. The Rockwell standardizing machine may also be used for
      general testing purposes. The Rockwell standardizing machine differs from a
      Rockwell testing machine by having smaller maximum permissible errors on certain
      parameters, which are defined in section 4 of this Recommendation. Standardizing
      machines may also be referred to as calibration machines. - Rockwell testing
      machine: Rockwell hardness machine used for general testing purposes'
