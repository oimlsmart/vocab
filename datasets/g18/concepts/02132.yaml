  definition:
  - content: means allowing the user to adjust the gas analytical system without having
      the possibility of changing the input measurement signal, whether the automatic
      adjustment is required or not
  examples: []
  id: 02132-eng
  notes:
  - content: For those gas analytical systems that require the calibration gas mixture
      to be entered manually, the adjustment means are considered to be semi-automatic.
