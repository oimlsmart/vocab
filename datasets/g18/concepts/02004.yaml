data:
  dates:
  - date: '2024-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: operating mode of a self-service arrangement in which the supplier is
      present and controls the authorization for the delivery
  examples: []
  id: 02004-eng
  notes:
  - content: 1. In attended service mode, the settlement of the transaction takes
      place before the customer leaves the site of the delivery.
  - content: 2. A transaction is settled when the parties interested in the transaction
      have made their agreement known (explicitly or implicitly) as regards the amount
      of the transaction. This may be a payment, signing a credit card voucher, signing
      a delivery order, etc.
  - content: '3. The parties interested in a transaction may be the parties themselves
      or their representatives (for example: an employee in a filling station, or
      the driver of a truck).'
  - content: 4. In attended service mode the measurement operation ends at the moment
      settlement of the transaction takes place.
  sources:
