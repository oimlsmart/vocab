data:
  dates:
  - date: '2024-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: single item for presentation as such to a consumer, consisting of a product
      and the packing material into which it was put before being offered for sale
      and in which the quantity of product has a predetermined value, whether the
      packing material encloses the product completely or only partially, but in any
      case in such a way that the actual quantity of product cannot be altered without
      the packing material either being opened or undergoing a perceptible modification
