data:
  dates:
  - date: '2024-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: difference between a higher and lower wavelength value at which the value
      of an optical quantity is reduced to half of its maximum value between the two
      wavelengths
  examples: []
  id: 01860-eng
  notes:
  - content: 1. The coherent SI unit is the metre (m), but often the nanometre (nm)
      is used.
  - content: 2. The optical quantity can be e.g. radiant luminous flux, absorbance,
      etc.
  sources:
