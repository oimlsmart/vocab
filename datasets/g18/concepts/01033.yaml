    type: accepted
  definition:
  - content: 'a fault the magnitude of which is greater than 20 % of the maximum permissible
      error (mpe) for the measured quantity. The following are not considered to be
      significant faults: • faults arising from simultaneous and mutually independent
      causes in the measuring instrument itself or in its checking facility; • transitory
      faults being momentary variations in the indication, that cannot be interpreted,
      memorized, or transmitted as a measurement result; • faults implying the impossibility
      of performing any measurement.'
