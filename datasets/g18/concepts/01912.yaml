  definition:
  - content: 'R closeness of the agreement between the results of the difference 1.
      Repeatability conditions include: between the maximum (Amax) and minimum (Amin)
      successive area measurements carried out under the same conditions of measurement
      = Amax – Amin'
  examples: []
  id: 01912-eng
  notes:
  - content: • the same measurement procedure; • the same operator; • the same measuring
      instrument, used under the same conditions; • the same location; and • repetition
      over a short period of time. Repeatability may be expressed quantitatively in
      terms of the dispersion characteristics of th results.
