  definition:
  - content: set of operations required to ensure that an item of measuring and test
      equipment is in compliance with requirements for its intended use (see ISO 10012-1
      [11])
  examples: []
  id: 00169-eng
  notes:
  - content: (1) Metrological confirmation normally includes calibration, any necessary
      adjustment or repair and subsequent recalibration, as well as any required sealing
      and labeling. (2) In this Document, this term is referred to as “confirmation”.
