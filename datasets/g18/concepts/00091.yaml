data:
  dates:
  - date: '2024-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: certifying body or person in an OIML Member State, designated (1) A CIML
      Member may be responsible for by its CIML Member that issues OIML Certificates
      of Conformity according to the rules of the OIML Certificate System for Measuring
      Instruments
  examples: []
  id: 00091-eng
  notes:
  - content: an Issuing Authority. (2) A list of all Issuing Authorities in the various
      Member States is maintained by the BIML and is permanently available to Member
      States and other interested parties on the OIML web site and on request. (3)
      The Issuing Authority that issues OIML Certificates may or may not be the same
      organization as the national body that issues national type approval certificates
      and whose responsibilities are governed by national regulations.
  sources:
