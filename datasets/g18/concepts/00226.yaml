  definition:
  - content: 'part of an electronic device, employing electronic components OIML B
      3 [2] contains the following and having a recognizable function of its own.
      Examples: amplifiers, comparators, power converters'
  examples: []
  id: 00226-eng
  notes:
  - content: 'definition of a “module”: Identifiable part of measuring instrument
      or of a family of measuring instruments that performs a specific function or
      functions and that can be separately evaluated according to prescribed metrological
      and technical performance requirements in the relevant Recommendation.'
