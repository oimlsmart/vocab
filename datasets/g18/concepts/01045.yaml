  definition:
  - content: gas introduced in order to transport a sample for analytical purposes.
      In gas chromatography it is the gas which is passed continuously through the
      column and whose passage promotes the elution of the components of the sample.
      The carrier gas, together with the portions of the sample present in this phase,
      constitute the mobile phase
