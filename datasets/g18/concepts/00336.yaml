  definition:
  - content: (i Technique whereby sounds (known as Korotkoff sounds) are heard over
      an occluded artery as the occluding pressure is slowly released, the appearance
      of sounds coinciding with the systolic blood pressure and the disappearance
      of sounds with the diastolic blood pressure. In children under the age of 13,
      "k4" .e. 4th phase Korotkoff sound) may be appropriate.
