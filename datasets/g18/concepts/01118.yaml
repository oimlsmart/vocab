    type: accepted
  definition:
  - content: everything of the prepackage that is intended to be left over after Packing
      material is generally used to contain, use of the product, except for items
      naturally in the product. Use includes consumption or subjecting to a treatment
  examples: []
  id: 01118-eng
  notes:
  - content: protect, handle, deliver, preserve, transport, inform about and serve
      as an aid (e.g. food serving tray) while using the product it contains.
