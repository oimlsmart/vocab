    type: accepted
  definition:
  - content: the value, expressed in units of mass, of the difference between two
      consecutive indicated values, for general and partial totalization devices,
      with the instrument in a special mode for testing purposes. Where such a special
      mode is not available, the scale interval for testing is equal to the totalization
      scale interval
