  definition:
  - content: reference material, accompanied by a certificate, the spectral absorbance
      of which is certified by a procedure which establishes metrological traceability
      to a national or international standard of absorbance, and for which each certified
      quantity value is accompanied by a measurement uncertainty at a stated level
      of confidence
