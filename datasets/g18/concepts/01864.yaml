  definition:
  - content: catalytic activity of a component divided by the volume of the 1. The
      derived coherent SI unit is the mole per original system
  examples: []
  id: 01864-eng
  notes:
  - content: second per cubic metre (mol/(s × m3)), also called kat/m
  - content: 3. In laboratory medicine the mole per second per litre (mol/(s × L))
      is also frequently used.
  - content: 2. Throughout this Recommendation the “component” is an enzyme and the
      “original system” can be, e.g., the plasma of a blood sample. [ISO/DIS 18153,
      clause 3.3]
