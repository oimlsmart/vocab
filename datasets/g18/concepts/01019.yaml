    type: accepted
  definition:
  - content: a device connected to or incorporated in the meter for automatically
      correcting the volume in metering conditions, by taking account of the flowrate
      and/or the characteristics of the liquid to be measured (viscosity, temperature,
      pressure, etc.) and pre-established calibration curves. The characteristics
      of the liquid may either be measured using associated measuring instruments,
      or stored in a memory within the instrument
