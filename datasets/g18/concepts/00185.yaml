  - date: '2024-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: '(hereinafter referred to as “measuring instrument”): measuring instrument
      which conforms to prescribed requirements, in particular legal metrological
      requirements [VIML, 4.3]'
  examples: []
  id: 00185-eng
  notes:
  - content: 'for the purposes of this Document the following instruments may fall
      under legal control according to national regulations: measuring instruments,
      coin counting machines, medical measuring instruments, water dispensing machines,
      timing instruments in vehicle washes.'
