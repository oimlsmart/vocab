  definition:
  - content: part of the gas meter which receives the output signals from the measuring
      transducer(s) and, possibly, associated measuring instruments, transforms them
      and, if appropriate, stores the results in memory until they are used. In addition,
      the calculator may be capable of communicating both ways with ancillary devices
