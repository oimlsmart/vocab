    type: accepted
  definition:
  - content: '[ " ( identifiable group of weighing instruments or modules belonging
      to the same manufactured type that have the same design features and metrological
      principles for measurement (for example the same type of indicator, the same
      type of design of load cell and load transmitting device) but which may differ
      in some metrological and technical performance characteristics e.g. Max, Min,
      e, d, accuracy class, etc.). The concept of a family" primarily aims to reduce
      the testing required at type examination. It does not preclude the possibility
      of listing more than one family in one Certificate adapted from OIML B 3: 2003,
      2.3]'
