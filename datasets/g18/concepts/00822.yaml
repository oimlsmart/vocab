    type: accepted
  definition:
  - content: 'closeness of agreement among the results of successive measurements
      of the same measurand according to the following conditions: • repeated over
      a short period of time by the same observer; and • carried out at the same location
      under similar ambient conditions, using the same measuring instrument and test
      procedures'
