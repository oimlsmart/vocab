  definition:
  - content: 'interface which only allows the introduction of data into the data processing
      device of the taximeter, which cannot: - display data that are not clearly defined
      and which could be taken as being a measurement result; - falsify displayed,
      processed or stored measurement results or primary indications; -adjust the
      instrument or change any adjustment factor'
