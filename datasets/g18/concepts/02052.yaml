data:
  dates:
  - date: '2024-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: device connected to or incorporated in the meter/and or a calculator
      for automatically correcting the volume at metering conditions, by taking into
      account the flowrate and/or the characteristics of the gas to be measured (temperature,
      pressure, gas composition, etc.) and by also taking into account pre- established
      calibration curves
  examples: []
  id: 02052-eng
  notes:
  - content: The characteristics of the gas may either be measured using associated
      measuring instruments, or stored in a memory in the instrument.
  sources:
