  definition:
  - content: any difference in performance of the metering module arising between
      the calibration under ideal conditions and actual conditions of use. This difference
      may be caused by different flow conditions due to velocity profile, perturbations,
      or by different working regimes (pulsation, intermittent flow, alternating flow,
      vibrations, etc.)
