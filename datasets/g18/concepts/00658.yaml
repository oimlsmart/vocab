  definition:
  - content: 'Mean value of the error (of indication) for a number of consecutive
      automatic weighings of a load, or similar loads, passed over the load receptor,
      expressed mathematically as: n stem:[Sigma] xi x ] i ]1 n where: x = error of
      a load indication, x = mean of the errors, and n = number of weighings'
