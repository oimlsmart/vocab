  definition:
  - content: the specified conditions of temperature and pressure to which the measured
      volume is converted
  examples: []
  id: 01026-eng
  notes:
  - content: Although the term "reference conditions" is often used instead of "base
      conditions", metering and base conditions (that refer only to the volume of
      the liquid to be measured or indicated), should not be confused with the "rated
      operating conditions" and "reference conditions" that apply to influence quantities.
