  definition:
  - content: influence quantity having a value within the limits specified in this
      Recommendation, but outside the specified rated operating conditions of the
      gas meter
  examples: []
  id: 01969-eng
  notes:
  - content: 1. An influence quantity is a disturbance if for that influence quantity
      the rated operating conditions are not specified.
