  definition:
  - content: the sphere within which a particular government or a given agency of
      such a government has power to make or enforce law or regulation
  examples: []
  id: 00131-eng
  notes:
  - content: 'Examples: The spheres of legal authority of (1) a particular national
      government, (2) a particular provincial government, (3) the legal metrology
      agency of a particular country, and (4) the agency of a particular city government
      charged with enforcing pollution laws.'
