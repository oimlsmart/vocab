    type: accepted
  definition:
  - content: 'fault greater than 1 dt. The following are not considered to be significant
      faults: * faults arising from simultaneous and mutually independent causes in
      the instrument or in its checking facilities (T.3.11); * faults implying the
      impossibility to perform any weighing; * transitory faults, momentary variations
      in the indications which cannot be interpreted, memorized or transmitted as
      a weighing result; and * faults being so serious that they will inevitably be
      noticed by all those interested in the weighing result'
