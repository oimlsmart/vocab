  definition:
  - content: (-) In this Recommendation the term "device" is
  examples: []
  id: 00577-eng
  notes:
  - content: used for any means by which a specific function is performed irrespective
      of the physical realization, e.g. by a mechanism, a key or software initiating
      an operation. The device may be a small part or a major portion of an instrument.
