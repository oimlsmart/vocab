  definition:
  - content: smallest quantity of liquid for which the measurement is metrologically
      acceptable for that system or element. In measuring systems intended for delivery
      operations, this smallest quantity is referred to as the minimum delivery; in
      those intended for receiving operations, it is referred to as the minimum receipt
