    type: accepted
  definition:
  - content: '- G.3-1 any necessary specialized laboratory or laboratories designated
      by the Issuing Authority to carry out examination and testing of a sample or
      samples of a measuring instrument submitted for evaluation, with the Issuing
      Authority assuming responsibility for the evaluation report'
  examples: []
  id: 02163-eng
  notes:
  - content: 1. When used in connection with the MAA, a Testing Laboratory may be
      part of the organization containing the OIML Issuing Authority, or a subcontracting
      Testing Laboratory of the OIML Issuing Authority.
  - content: 2. A Testing Laboratory may be a subcontractor of an inspection body.
