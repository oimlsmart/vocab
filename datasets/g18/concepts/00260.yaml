data:
  dates:
  - date: '2024-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: the examination of one or more measuring instruments of the same pattern
      which are submitted by a manufacturer to the National Service of Legal Metrology;
      this examination includes the tests necessary for the approval of the pattern
      [VML 2.2].
  examples: []
  id: 00260-eng
  notes:
  - content: Pattern evaluation is not limited to the National Service of Legal Metrology
      or the metrological services of other government agencies, but may also be undertaken
      by any other officially authorized test centre as well as by manufacturers and
      users of measuring instruments. The purpose of pattern evaluation is not necessarily
      pattern approval, its purpose may also be, for example, assessment of suitability
      for use.
