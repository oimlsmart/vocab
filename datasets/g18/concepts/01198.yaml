    type: accepted
  definition:
  - content: the concentration of an element that provides a signal equivalent In
      this Recommendation, this term refers to to three times the standard deviation
      of the baseline noise as determined on a statistical basis. It is the minimum
      quantity measured before it can be concluded that an element has been detected
  examples: []
  id: 01198-eng
  notes:
  - content: the determination of an element in a reference solution free of interferents.
      The baseline noise is established by measuring the output signal of several
      aliquots of a blank test solution.
