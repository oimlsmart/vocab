  definition:
  - content: “r duration between the instant when an input quantity value of a measuring
      instrument or measuring system is subjected to an abrupt change between two
      specified constant quantity values and the instant when a corresponding indication
      settles within specified limits around its final steady value (referred to as
      esponse time” in this Recommendation)
