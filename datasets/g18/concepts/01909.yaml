    type: accepted
  definition:
  - content: 'Fault greater than 1 d. The following are not considered to be significant
      faults: • faults that result from simultaneous and mutually independent causes
      in the instrument or in its checking facility; • faults that make it impossible
      to perform any measuring; • transitory faults that are momentary variations
      in the indications which cannot be interpreted, memorized or transmitted as
      a measuring result; • faults that are so serious that they will inevitably be
      noticed by those interested in the measuring'
