    type: accepted
  definition:
  - content: 'fault greater than stem:[e]. The following are not considered to be
      significant faults, even when they exceed stem:[e]: - faults arising from simultaneous
      and mutually independent causes in the instrument; - faults implying the impossibility
      to perform any measurement; - faults being so serious that they are bound to
      be noticed by all those interested in the result of measurement; or - transitory
      faults, being momentary variations in the indication which cannot be interpreted,
      memorized or transmitted as a measurement result'
  examples: []
  id: '00982-eng'
  notes:
  - content: at appropriate to the partial weighing .
