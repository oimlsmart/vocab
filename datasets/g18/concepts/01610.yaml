  definition:
  - content: (D an influence quantity having a value within the limits specified inthe
      appropriate International Recommendation, but outside the specified rated operating
      conditions of the measuring instrument 11 clause T.12.2).
  examples: []
  id: 01610-eng
  notes:
  - content: An influence quantity is a disturbance if for that influence quantity
      the rated operating conditions are not specified.
