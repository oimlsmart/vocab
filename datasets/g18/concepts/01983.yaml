  definition:
  - content: 'for measuring container bottles and casks: contained volume of water
      at a reference temperature with an uncertainty appropriate for the given purpose.
      For capacity serving measures: delivered volume of water at a reference temperature
      with an uncertainty appropriate for the given purpose. This volume is measured
      after prior wetting of the interior of the vessel and draining for 30 seconds'
