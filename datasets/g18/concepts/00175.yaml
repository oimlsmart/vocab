  definition:
  - content: document specifying which procedures and associated resources shall be
      applied by whom and when to a specific project, product, process or contract
      [ISO 9000:2000, 3.7.5]
  examples: []
  id: 00175-eng
  notes:
  - content: (1) These procedures generally include those referring to quality management
      processes and to product realization processes. (2) A quality plan often makes
      reference to parts of the quality manual or to procedure documents. (3) A quality
      plan is generally one of the results of quality planning.
