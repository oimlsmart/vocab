  definition:
  - content: a measuring instrument which measures the length (L), width (W) and height
      (H) of a rectangular parallelepiped (a rectangular box), and in some cases determines
      the volume of that box. If the object is not of the form of a rectangular box,
      the smallest rectangular box which fully encloses the object is determined
