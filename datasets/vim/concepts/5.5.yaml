data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: '{{measurement standard,5.1}} established through {{calibration,2.39}}
      with respect to a {{primary measurement standard,5.4}} for a {{quantity,1.1}}
      of the same {{kind,1.2}}'
  examples: []
  id: 5.5-eng
  language_code: eng
  notes:
  - content: Calibration may be obtained directly between a primary measurement standard
      and a secondary measurement standard, or involve an intermediate {{measuring
      system,3.2}} calibrated by the primary measurement standard and assigning a
      {{measurement result,2.9}} to the secondary measurement standard.
  - content: A measurement standard having its {{quantity value,1.19}} assigned by
      a ratio {{primary reference measurement procedure,2.8}} is a secondary measurement
      standard.
  terms:
  - type: expression
    normative_status: preferred
    designation: secondary measurement standard
  - type: expression
    normative_status: admitted
    designation: secondary standard
date_accepted: '2012-01-01T00:00:00+00:00'
