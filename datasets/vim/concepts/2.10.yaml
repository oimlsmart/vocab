data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: '{{quantity value,1.19}} representing a {{measurement result,2.9}}'
  examples: []
  id: 2.10-eng
  language_code: eng
  notes:
  - content: For a {{measurement,2.1}} involving replicate {{indications,4.1}}, each
      indication can be used to provide a corresponding measured quantity value. This
      set of individual measured quantity values can be used to calculate a resulting
      measured quantity value, such as an average or median, usually with a decreased
      associated {{measurement uncertainty,2.26}}.
  - content: When the range of the {{true quantity values,2.11}} believed to represent
      the {{measurand,2.3}} is small compared with the measurement uncertainty, a
      measured quantity value can be considered to be an estimate of an essentially
      unique true quantity value and is often an average or median of individual measured
      quantity values obtained through replicate measurements.
  - content: In the case where the range of the true quantity values believed to represent
      the measurand is not small compared with the measurement uncertainty, a measured
      quantity value is often an estimate of an average or median of the set of true
      quantity values.
  - content: In the GUM, the terms “result of measurement” and “estimate of the value
      of the measurand” or just “estimate of the measurand” are used for 'measured
      quantity value'.
  - content: '[Annotation] The term "measured value" can be used instead of the full
      term "measured quantity value" only if there is no possibility for ambiguity
      or misinterpretation in the particular context. In particular, the term "measured
      value" is sometimes used for indication, and this is not what is meant by "measured
      quantity value".'
  terms:
  - type: expression
    normative_status: preferred
    designation: measured quantity value
  - type: expression
    normative_status: admitted
    designation: value of a measured quantity
  - type: expression
    normative_status: admitted
    designation: measured value
date_accepted: '2012-01-01T00:00:00+00:00'
