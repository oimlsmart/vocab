data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: duration between the instant when an input {{quantity value,1.19}} of
      a {{measuring instrument,3.1}} or {{measuring system,3.2}} is subjected to an
      abrupt change between two specified constant quantity values and the instant
      when a corresponding {{indication,4.1}} settles within specified limits around
      its final steady value
  examples: []
  id: 4.23-eng
  language_code: eng
  notes:
  - content: '[Annotation] Here "quantity value(s)" can be replaced by "value(s)"
      in both instances without ambiguity: "duration between the instant when an input
      value of a measuring instrument or measuring system is subjected to an abrupt
      change between two specified constant values and the instant when a corresponding
      indication settles within specified limits around its final steady value".'
  terms:
  - type: expression
    normative_status: preferred
    designation: step response time
