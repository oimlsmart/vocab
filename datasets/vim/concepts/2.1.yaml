data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: processus consistant à obtenir expérimentalement une ou plusieurs {{valeurs,1.19}}
      que l'on peut raisonnablement attribuer à une {{grandeur,1.1}}
  examples: []
  id: 2.1-fra
  language_code: fra
  notes:
  - content: Les mesurages ne s'appliquent pas aux {{propriétés qualitatives,1.30}}.
  - content: Un mesurage implique la comparaison de grandeurs ou le comptage d'entités.
  - content: Un mesurage suppose une description de la grandeur compatible avec l'usage
      prévu d'un {{résultat de mesure,2.9}}, une {{procédure de mesure,2.6}} et un
      {{système de mesure,3.2}} étalonné fonctionnant selon la procédure de mesure
      spécifiée, incluant les conditions de mesure.
  - content: '[Annotation] L''expression «obtenir expérimentalement» dans la définition
      doit être interprétée dans un sens étendu de façon à inclure non seulement une
      comparaison physique directe, mais aussi des modèles et calculs fondés sur des
      considérations théoriques.'
  - content: '[Annotation] ANNOTATION (pour la Note 3) (informative) [3 décembre 2013]
      Le but de cette note est d''expliquer ce qui est nécessaire pour effectuer un
      mesurage. Il faut d''abord spécifier une incertitude cible et choisir ensuite
      une procédure et un système de mesure appropriés pour effectuer le mesurage
      de façon à ne pas dépasser l''incertitude cible.'
  terms:
  - type: expression
    normative_status: preferred
    designation: mesurage
  - type: expression
    normative_status: admitted
    designation: mesure, f
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
