  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: '{{grandeur,1.1}} définie, dans un {{système de grandeurs,1.3}}, en fonction
      des {{grandeurs de base,1.4}} de ce système'
  examples: []
  id: 1.5-fra
  language_code: fra
  notes:
  - content: EXEMPLE Dans un système de grandeurs ayant pour grandeurs de base la
      longueur et la masse, la masse volumique est une grandeur dérivée définie comme
      le quotient d'une masse par un volume (longueur au cube).
  terms:
  - type: expression
    normative_status: preferred
    designation: grandeur dérivée
