data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: '{{valeur d''une grandeur,1.19}} compatible avec la définition de la
      {{grandeur,1.1}}'
  examples: []
  id: 2.11-fra
  language_code: fra
  notes:
  - content: Dans l'approche «erreur» de description des {{mesurages,2.1}}, la valeur
      vraie est considérée comme unique et, en pratique, impossible à connaître. L'approche
      «incertitude» consiste à reconnaître que, par suite de la quantité intrinsèquement
      incomplète de détails dans la définition d'une grandeur, il n'y a pas une seule
      valeur vraie mais plutôt un ensemble de valeurs vraies compatibles avec la définition.
      Toutefois, cet ensemble de valeurs est, en principe et en pratique, impossible
      à connaître. D'autres approches évitent complètement le concept de valeur vraie
      et évaluent la validité des {{résultats de mesure,2.9}} à l'aide du concept
      de {{compatibilité de mesure,2.47}}.
  - content: Dans le cas particulier des constantes fondamentales, on considère la
      grandeur comme ayant une seule valeur vraie.
  - content: Lorsque l'{{incertitude définitionnelle,2.27}} associée au {{mesurande,2.3}}
      est considérée comme négligeable par rapport aux autres composantes de l'{{incertitude
      de mesure,2.26}}, on peut considérer que le mesurande a une valeur vraie par
      essence unique. C'est l'approche adoptée dans le GUM, où le mot «vraie» est
      considéré comme redondant.
  - content: '[Annotation] ANNOTATION (pour la Note 1) (informative) [5 juin 2014]
      Deux des raisons pour lesquelles l''ensemble des valeurs vraies est impossible
      à connaître sont : 1) le modèle de mesure utilisé dans un mesurage peut être
      incorrect ; 2) une erreur a pu être commise en effectuant le mesurage.'
  terms:
  - type: expression
    normative_status: preferred
    designation: valeur vraie
  - type: expression
    normative_status: admitted
    designation: valeur vraie d'une grandeur, f
date_accepted: '2012-01-01T00:00:00+00:00'
