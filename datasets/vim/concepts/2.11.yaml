data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: '{{quantity value,1.19}} consistent with the definition of a {{quantity,1.1}}'
  examples: []
  id: 2.11-eng
  language_code: eng
  notes:
  - content: In the Error Approach to describing {{measurement,2.1}}, a true quantity
      value is considered unique and, in practice, unknowable. The Uncertainty Approach
      is to recognize that, owing to the inherently incomplete amount of detail in
      the definition of a quantity, there is not a single true quantity value but
      rather a set of true quantity values consistent with the definition. However,
      this set of values is, in principle and in practice, unknowable. Other approaches
      dispense altogether with the concept of true quantity value and rely on the
      concept of {{metrological compatibility of measurement results,2.47}} for assessing
      their validity.
  - content: In the special case of a fundamental constant, the quantity is considered
      to have a single true quantity value.
  - content: When the {{definitional uncertainty,2.27}} associated with the {{measurand,2.3}}
      is considered to be negligible compared to the other components of the {{measurement
      uncertainty,2.26}}, the measurand may be considered to have an “essentially
      unique” true quantity value. This is the approach taken by the GUM and associated
      documents, where the word “true” is considered to be redundant.
  - content: '[Annotation] Here "quantity value" can be replaced with "value" without
      ambiguity: "value consistent with the definition of a quantity".'
  - content: '[Annotation] ANNOTATION (for Note 1) (informative) [5 June 2014]:  Two
      reasons that the set of true values is unknowable are: 1) the measurement model
      used in a measurement may be incorrect, and 2) a mistake may be made in performing
      the measurement.'
  terms:
  - type: expression
    normative_status: preferred
    designation: true quantity value
  - type: expression
    normative_status: admitted
    designation: true value of a quantity
  - type: expression
    normative_status: admitted
    designation: true value
