data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{procédure de mesure,2.6}} considérée comme fournissant des {{résultats
      de mesure,2.9}} adaptés à leur usage prévu pour l'évaluation de la {{justesse,2.14}}
      de {{valeurs mesurées,2.10}} obtenues à partir d'autres procédures de mesure
      pour des {{grandeurs,1.1}} de la même {{nature,1.2}}, pour un {{étalonnage,2.39}}
      ou pour la caractérisation de {{matériaux de référence,5.13}}"
  examples: []
  id: 2.7-fra
  language_code: fra
  notes:
  - content: |-
      [Annotation] La définition est longue et complexe (et utilise systématiquement en anglais les termes privilégiés). Une définition plus courte, associée à une note, pourrait suffire :
      «procédure de mesure utilisée pour fournir des résultats destinés à évaluer la justesse des valeurs obtenues à partir d'autres procédures de mesure pour des grandeurs de même nature»
      NOTE 1  Des procédures de mesure de référence sont souvent utilisées dans les étalonnages et pour assigner des valeurs aux matériaux de référence.
  sources:
  - origin:
      ref:
        source: JCGM 200:2012
      locality:
        type: clause
        reference_from: '2.7'
    type: authoritative
  terms:
  - type: expression
    normative_status: preferred
    designation: procédure de mesure de référence
  - type: expression
    normative_status: admitted
    designation: procédure opératoire de référence, f
