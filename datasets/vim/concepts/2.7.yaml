data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{measurement procedure,2.6}} accepted as providing {{measurement results,2.9}}
      fit for their intended use in assessing {{measurement trueness,2.14}} of {{measured
      quantity values,2.10}} obtained from other measurement procedures for {{quantities,1.1}}
      of the same {{kind,1.2}}, in {{calibration,2.39}}, or in characterizing {{reference
      materials,5.13}}"
  examples: []
  id: 2.7-eng
  language_code: eng
  notes:
  - content: "[Annotation] The definition systematically uses preferred terms and
      so is long and complex. A shorter definition, coupled with a Note, might be
      sufficient: \n\"measurement procedure used in the process of providing results
      for assessing trueness of values obtained from other measurement procedures
      for quantities of the same kind\"\nNOTE 1 Reference measurement procedures are
      often used in calibration and in assigning values to reference materials."
  sources:
  - origin:
      ref:
        source: JCGM 200:2012
      locality:
        type: clause
        reference_from: '2.7'
    type: authoritative
  terms:
  - type: expression
    normative_status: preferred
    designation: reference measurement procedure
