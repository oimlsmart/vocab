    type: accepted
  definition:
  - content: difference in {{indication,4.1}} for a given {{measured quantity value,2.10}},
      or in {{quantity values,1.19}} supplied by a {{material measure,3.6}}, when
      an {{influence quantity,2.52}} assumes successively two different quantity values
  examples: []
  id: 4.22-eng
  language_code: eng
  notes:
  - content: '[Annotation] Here "measured quantity value" can be replaced by "measured
      value" and "quantity values" can be replaced by "values" in both instances without
      ambiguity: "difference in indication for a given measured value, or in values
      supplied by a material measure, when an influence quantity assumes successively
      two different values".'
  terms:
  - type: expression
    normative_status: preferred
    designation: variation due to an influence quantity
