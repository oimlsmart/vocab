data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: sequence of {{calibrations,2.39}} from a reference to the final {{measuring
      system,3.2}}, where the outcome of each calibration depends on the outcome of
      the previous calibration
  examples: []
  id: 2.40-eng
  language_code: eng
  notes:
  - content: '{{Measurement uncertainty,2.26}} necessarily increases along the sequence
      of calibrations.'
  - content: The elements of a calibration hierarchy are one or more {{measurement
      standards,5.1}} and measuring systems operated according to {{measurement procedures,2.6}}.
  - content: For this definition, the 'reference' can be a definition of a {{measurement
      unit,1.9}} through its practical realization, or a measurement procedure, or
      a measurement standard.
  - content: A comparison between two measurement standards may be viewed as a calibration
      if the comparison is used to check and, if necessary, correct the {{quantity
      value,1.19}} and measurement uncertainty attributed to one of the measurement
      standards.
  terms:
  - type: expression
    normative_status: preferred
    designation: calibration hierarchy
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
