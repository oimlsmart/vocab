data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: suite d'{{étalonnages,2.39}} depuis une référence jusqu'au {{système
      de mesure,3.2}} final, dans laquelle le résultat de chaque étalonnage dépend
      de celui de l'étalonnage précédent
  examples: []
  id: 2.40-fra
  language_code: fra
  notes:
  - content: L'{{incertitude de mesure,2.26}} augmente nécessairement le long de la
      suite d'étalonnages.
  - content: Les éléments d'une hiérarchie d'étalonnage sont des {{étalons,5.1}} ainsi
      que des systèmes de mesure utilisés conformément à des {{procédures de mesure,2.6}}.
  - content: La référence mentionnée dans la définition peut être une définition d'une
      {{unité de mesure,1.9}} sous la forme de sa réalisation pratique, une procédure
      de mesure ou un étalon.
  - content: Une comparaison entre deux étalons peut être considérée comme un étalonnage
      si elle sert à vérifier et, si nécessaire, à corriger la {{valeur,1.19}} et
      l'incertitude attribuées à l'un des étalons.
  terms:
  - type: expression
    normative_status: preferred
    designation: hiérarchie d'étalonnage
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
