data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: evaluation of a component of {{measurement uncertainty,2.26}} determined
      by means other than a {{Type A evaluation of measurement uncertainty,2.28}}
  examples:
  - content: 'Evaluation based on information

      - associated with authoritative published {{quantity values,1.19}},

      - associated with the quantity value of a {{certified reference material,5.14}},

      - obtained from a {{calibration,2.39}} certificate,

      - about drift,

      - obtained from the {{accuracy class,4.25}} of a verified {{measuring instrument,3.1}},

      - obtained from limits deduced through personal experience.'
  id: 2.29-eng
  language_code: eng
  notes:
  - content: See also ISO/IEC Guide 98-3:2008, 2.3.3.
  terms:
  - type: expression
    normative_status: preferred
    designation: Type B evaluation of measurement uncertainty
  - type: expression
    normative_status: admitted
    designation: Type B evaluation
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
