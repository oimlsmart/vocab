data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: évaluation d'une composante de l'{{incertitude de mesure,2.26}} par d'autres
      moyens qu'une {{évaluation de type A de l'incertitude,2.28}}
  examples: []
  id: 2.29-fra
  language_code: fra
  notes:
  - content: 'EXEMPLES Évaluation fondée sur des informations

      - associées à des {{valeurs,1.19}} publiées faisant autorité,

      - associées à la valeur d''un {{matériau de référence certifié,5.14}},

      - obtenues à partir d''un certificat d''{{étalonnage,2.39}},

      - concernant la dérive,

      - obtenues à partir de la {{classe d''exactitude,4.25}} d''un {{instrument de
      mesure,3.1}} vérifié,

      - obtenues à partir de limites déduites de l''expérience personnelle.'
  - content: Voir aussi le Guide ISO/CEI 98-3:2008, 2.3.3.
  terms:
  - type: expression
    normative_status: preferred
    designation: évaluation de type B de l'incertitude
  - type: expression
    normative_status: admitted
    designation: évaluation de type B, f
