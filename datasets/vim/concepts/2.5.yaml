data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: generic description of a logical organization of operations used in a
      {{measurement,2.1}}
  examples: []
  id: 2.5-eng
  language_code: eng
  notes:
  - content: 'Measurement methods may be qualified in various ways such as:

      - substitution measurement method,

      - differential measurement method, and

      - null measurement method;

      or

      - direct measurement method, and

      - indirect measurement method.

      See IEC 60050-300:2001.'
  - content: '[Annotation] The use of the terms "measurement method" and "measurement
      procedure" differs, for historical reasons, between different areas of metrology.
      In general, a measurement method delimits a broader category of operations than
      does a measurement procedure, which requires a detailed set of instructions.'
  - content: '[Annotation] The terms "primary method", "primary method of measurement",
      and "primary measurement method" are generally used for a method adopted to
      obtain a measurement result without relation to a measurement standard for a
      quantity of the same kind.'
  terms:
  - type: expression
    normative_status: preferred
    designation: measurement method
  - type: expression
    normative_status: admitted
    designation: method of measurement
date_accepted: '2012-01-01T00:00:00+00:00'
