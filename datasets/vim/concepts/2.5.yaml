data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: description générique de l'organisation logique des opérations mises
      en oeuvre dans un {{mesurage,2.1}}
  examples: []
  id: 2.5-fra
  language_code: fra
  notes:
  - content: 'Les méthodes de mesure peuvent être qualifiées de diverses façons telles
      que:

      - méthode de mesure par substitution,

      - méthode de mesure différentielle,

      - méthode de mesure par zéro;

      ou

      - méthode de mesure directe,

      - méthode de mesure indirecte.

      Voir la CEI 60050-300:2001.'
  - content: '[Annotation] L''emploi des termes «méthode de mesure» et «procédure
      de mesure» diffère, pour des raisons historiques, d''un domaine à l''autre de
      la métrologie. En général, une méthode de mesure recouvre une plus grande catégorie
      d''opérations qu''une procédure de mesure, qui nécessite un ensemble détaillé
      d''instructions.'
  - content: '[Annotation] Les termes «méthode primaire», «méthode primaire de mesure»
      et «méthode de mesure primaire» sont généralement utilisés pour une méthode
      servant à obtenir un résultat de mesure sans relation avec un étalon d''une
      grandeur de même nature.'
  terms:
  - type: expression
    normative_status: preferred
    designation: méthode de mesure
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
