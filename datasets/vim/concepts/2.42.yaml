    type: accepted
  definition:
  - content: sequence of {{measurement standards,5.1}} and {{calibrations,2.39}} that
      is used to relate a {{measurement result,2.9}} to a reference
  examples: []
  id: 2.42-eng
  language_code: eng
  notes:
  - content: A metrological traceability chain is defined through a {{calibration
      hierarchy,2.40}}.
  - content: A metrological traceability chain is used to establish {{metrological
      traceability,2.41}} of a measurement result.
  - content: A comparison between two measurement standards may be viewed as a calibration
      if the comparison is used to check and, if necessary, correct the {{quantity
      value,1.19}} and {{measurement uncertainty,2.26}} attributed to one of the measurement
      standards.
  terms:
  - type: expression
    normative_status: preferred
    designation: metrological traceability chain
  - type: expression
    normative_status: admitted
    designation: traceability chain
