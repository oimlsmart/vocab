data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{valeur mesurée,2.10}}, obtenue par une {{procédure de mesure,2.6}}
      donnée, pour laquelle la probabilité de déclarer faussement l'absence d'un constituant
      dans un matériau est β, étant donnée la probabilité α de déclarer faussement
      sa présence"
  examples: []
  id: 4.18-fra
  language_code: fra
  notes:
  - content: L'UICPA recommande des valeurs par défaut de α et β égales à 0,05.
  - content: "[Applicable uniquement au texte anglais]."
  - content: Le terme «sensibilité» est à proscrire au sens de limite de détection.
  terms:
  - type: expression
    normative_status: preferred
    designation: limite de détection
