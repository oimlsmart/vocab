data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: "{{measured quantity value,2.10}}, obtained by a given {{measurement
      procedure,2.6}}, for which the probability of falsely claiming the absence of
      a component in a material is β, given a probability α of falsely claiming its
      presence"
  examples: []
  id: 4.18-eng
  language_code: eng
  notes:
  - content: IUPAC recommends default values for α and β equal to 0.05.
  - content: The abbreviation LOD is sometimes used.
  - content: The term “sensitivity” is discouraged for 'detection limit'.
  - content: '[Annotation] Here "measured quantity value" can be replaced by "measured
      value" without ambiguity: "measured value, obtained by a given measurement procedure,
      for which the probability of falsely claiming the absence of a component in
      a material is β, given a probability α of falsely claiming its presence".'
  terms:
  - type: expression
    normative_status: preferred
    designation: detection limit
  - type: expression
    normative_status: admitted
    designation: limit of detection
