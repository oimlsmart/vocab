data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: provision of objective evidence that a given item fulfils specified requirements
  examples:
  - content: Confirmation that a given {{reference material,5.13}} as claimed is homogeneous
      for the {{quantity value,1.19}} and {{measurement procedure,2.6}} concerned,
      down to a measurement portion having a mass of 10 mg.
  - content: Confirmation that performance properties or legal requirements of a {{measuring
      system,3.2}} are achieved.
  - content: Confirmation that a {{target measurement uncertainty,2.34}} can be met.
  id: 2.44-eng
  language_code: eng
  notes:
  - content: When applicable, {{measurement uncertainty,2.26}} should be taken into
      consideration.
  - content: The item may be, e.g. a process, measurement procedure, material, compound,
      or measuring system.
  - content: The specified requirements may be, e.g. that a manufacturer's specifications
      are met.
  - content: Verification in legal metrology, as defined in VIML [53], and in conformity
      assessment in general, pertains to the examination and marking and/or issuing
      of a verification certificate for a measuring system.
  - content: Verification should not be confused with {{calibration,2.39}}. Not every
      verification is a {{validation,2.45}}.
  - content: In chemistry, verification of the identity of the entity involved, or
      of activity, requires a description of the structure or properties of that entity
      or activity.
  - content: '[Annotation] ANNOTATION (for Example 1) (informative) [5 June 2014]
      By "measurement portion" here is meant amount of material, of proper size, for
      measurement of any quantity of interest, removed from the reference material.'
  terms:
  - type: expression
    normative_status: preferred
    designation: verification
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
