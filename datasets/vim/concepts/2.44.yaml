data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: fourniture de preuves tangibles qu'une entité donnée satisfait à des
      exigences spécifiées
  examples: []
  id: 2.44-fra
  language_code: fra
  notes:
  - content: 'EXEMPLE 1 Confirmation qu''un {{matériau de référence,5.13}} donné est
      bien, comme déclaré, homogène pour la {{valeur,1.19}} et la {{procédure de mesure,2.6}}
      concernées jusqu''à des prises de mesure de masse 10 mg.

      EXEMPLE 2 Confirmation que des propriétés relatives aux performances ou des
      exigences légales sont satisfaites par un {{système de mesure,3.2}}.

      EXEMPLE 3 Confirmation qu''une {{incertitude cible,2.34}} peut être atteinte.'
  - content: S'il y a lieu, il convient de prendre en compte l'{{incertitude de mesure,2.26}}.
  - content: L'entité peut être, par exemple, un processus, une procédure de mesure,
      un matériau, un composé ou un système de mesure.
  - content: Les exigences spécifiées peuvent être, par exemple, les spécifications
      d'un fabricant.
  - content: La vérification en métrologie légale, comme définie dans le VIML [53],
      et plus généralement en évaluation de la conformité, comporte l'examen et le
      marquage et/ou la délivrance d'un certificat de vérification pour un système
      de mesure.
  - content: Il convient de ne pas confondre la vérification avec l'{{étalonnage,2.39}}.
      Toute vérification n'est pas une {{validation,2.45}}.
  - content: En chimie, la vérification de l'identité d'une entité, ou celle d'une
      activité, nécessite une description de la structure ou des propriétés de cette
      entité ou activité.
  - content: '[Annotation] ANNOTATION (pour l''Exemple 1) (informative) [5 juin 2014]
      Une «prise de mesure» signifie ici un prélèvement de taille appropriée effectué
      sur le matériau de référence en vue de mesurer toute grandeur présentant de
      l''intérêt.'
  terms:
  - type: expression
    normative_status: preferred
    designation: vérification
date_accepted: '2012-01-01T00:00:00+00:00'
