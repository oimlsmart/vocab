data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: mathematical relation between {{quantities,1.1}} in a given {{system
      of quantities,1.3}}, independent of {{measurement units,1.9}}
  examples:
  - content: Q1 = ζ Q2 Q3 where Q1, Q2 and Q3 denote different quantities, and where
      ζ is a numerical factor.
  - content: T= (1/2) mv2where Tis the kinetic energy and vthe speed of a specified
      particle of mass m.
  - content: n= It/Fwhere nis the amount of substance of a univalent component, Iis
      the electric current and tthe duration of the electrolysis, and where Fis the
      Faraday constant.
  id: 1.22-eng
  language_code: eng
  notes: []
  terms:
  - type: expression
    normative_status: preferred
    designation: quantity equation
