  definition:
  - content: relation d'égalité entre des {{grandeurs,1.1}} d'un {{système de grandeurs,1.3}}
      donné, indépendante des {{unités de mesure,1.9}}
  examples: []
  id: 1.22-fra
  language_code: fra
  notes:
  - content: 'EXEMPLE 1 Q1 = ζQ2 Q3, où Q1, Q2 et Q3 représentent différentes grandeurs
      et où ζ est un facteur numérique.

      EXEMPLE 2 T = (1/2) mv2, où Test l''énergie cinétique et vla vitesse d''une
      particule spécifiée de masse m.

      EXEMPLE 3 n= It/F, où nest la quantité de matière d''un composé univalent, Iest
      le courant électrique et tla durée de l''électrolyse, et où Fest la constante
      de Faraday.'
  terms:
  - type: expression
    normative_status: preferred
    designation: équation aux grandeurs
