data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: class of {{measuring instruments,3.1}} or {{measuring systems,3.2}} that
      meet stated metrological requirements that are intended to keep {{measurement
      errors,2.16}} or {{instrumental measurement uncertainties,4.24}} within specified
      limits under specified operating conditions
  examples: []
  id: 4.25-eng
  language_code: eng
  notes:
  - content: An accuracy class is usually denoted by a number or symbol adopted by
      convention.
  - content: Accuracy class applies to {{material measures,3.6}}.
  terms:
  - type: expression
    normative_status: preferred
    designation: accuracy class
