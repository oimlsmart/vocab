    type: accepted
  definition:
  - content: classe d'{{instruments de mesure,3.1}} ou de {{systèmes de mesure,3.2}}
      qui satisfont à certaines exigences métrologiques destinées à maintenir les
      {{erreurs de mesure,2.16}} ou les {{incertitudes instrumentales,4.24}} entre
      des limites spécifiées dans des conditions de fonctionnement spécifiées
  examples: []
  id: 4.25-fra
  language_code: fra
  notes:
  - content: Une classe d'exactitude est habituellement indiquée par un nombre ou
      un symbole adopté par convention.
  - content: Le concept de classe d'exactitude s'applique aux {{mesures matérialisées,3.6}}.
  terms:
  - type: expression
    normative_status: preferred
    designation: classe d'exactitude
