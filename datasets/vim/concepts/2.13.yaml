data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: closeness of agreement between a {{measured quantity value,2.10}} and
      a {{true quantity value,2.11}} of a {{measurand,2.3}}
  examples: []
  id: 2.13-eng
  language_code: eng
  notes:
  - content: The concept 'measurement accuracy' is not a {{quantity,1.1}} and is not
      given a {{numerical quantity value,1.20}}. A {{measurement,2.1}} is said to
      be more accurate when it offers a smaller {{measurement error,2.16}}.
  - content: The term “measurement accuracy” should not be used for {{measurement
      trueness,2.14}} and the term “measurement precision” should not be used for
      'measurement accuracy', which, however, is related to both these concepts.
  - content: "'Measurement accuracy' is sometimes understood as closeness of agreement
      between measured quantity values that are being attributed to the measurand."
  - content: '[Annotation] Here "quantity value" can be replaced with "value" without
      ambiguity: "closeness of agreement between a measured value and a true value
      of a measurand".'
  - content: '[Annotation] Historically, the term "measurement accuracy" has been
      used in related but slightly different ways. Sometimes a single measured value
      is considered to be accurate (as in the VIM3 definition), when the measurement
      error is assumed to be small. In other cases, a set of measured values is considered
      to be accurate when both the measurement trueness and the measurement precision
      are assumed to be good. Sometimes a measuring instrument or measuring system
      is considered to be accurate, in the sense that it provides accurate indications.
      Care must therefore be taken in explaining in which sense the term "measurement
      accuracy" is being used. In no case is there an established methodology for
      assigning a numerical value to measurement accuracy.'
  terms:
  - type: expression
    normative_status: preferred
    designation: measurement accuracy
  - type: expression
    normative_status: admitted
    designation: accuracy of measurement
  - type: expression
    normative_status: admitted
    designation: accuracy
