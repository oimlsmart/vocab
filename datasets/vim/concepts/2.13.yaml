data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: étroitesse de l'accord entre une {{valeur mesurée,2.10}} et une {{valeur
      vraie,2.11}} d'un {{mesurande,2.3}}
  examples: []
  id: 2.13-fra
  language_code: fra
  notes:
  - content: L'exactitude de mesure n'est pas une {{grandeur,1.1}} et ne s'exprime
      pas numériquement. Un {{mesurage,2.1}} est quelquefois dit plus exact s'il fournit
      une plus petite {{erreur de mesure,2.16}}.
  - content: Il convient de ne pas utiliser le terme «exactitude de mesure» pour la
      {{justesse de mesure,2.14}} et le terme «fidélité de mesure» pour l'exactitude
      de mesure. Celle-ci est toutefois liée aux concepts de justesse et de fidélité.
  - content: L'exactitude de mesure est quelquefois interprétée comme l'étroitesse
      de l'accord entre les valeurs mesurées qui sont attribuées au mesurande.
  - content: "[Annotation] Le terme «exactitude de mesure» a été utilisé historiquement
      dans des sens liés mais légèrement différents. Une seule valeur mesurée est
      quelquefois considérée comme exacte (comme dans le VIM3), lorsque l'erreur de
      mesure est supposée petite. Dans d'autres cas, un ensemble de valeurs mesurées
      est considéré comme exact lorsque la justesse de mesure et la fidélité de mesure
      sont toutes deux supposées bonnes. Un instrument de mesure ou un système de
      mesure est quelquefois considéré comme exact, en ce sens qu'il fournit des indications
      exactes. Il faut donc faire attention à expliquer en quel sens le terme «exactitude
      de mesure» est employé. Il n'existe en aucun cas de méthodologie établie pour
      attribuer une valeur numérique à l'exactitude de mesure."
  terms:
  - type: expression
    normative_status: preferred
    designation: exactitude de mesure
  - type: expression
    normative_status: admitted
    designation: exactitude, f
