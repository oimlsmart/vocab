  definition:
  - content: relation mathématique entre toutes les {{grandeurs,1.1}} qui interviennent
      dans un {{mesurage,2.1}}
  examples: []
  id: 2.48-fra
  language_code: fra
  notes:
  - content: Une forme générale d'un modèle de mesure est l'équation h(Y, X1, …, Xn)
      = 0 , où Y, la {{grandeur de sortie dans le modèle de mesure,2.51}}, est le
      {{mesurande,2.3}}, dont la {{valeur,1.19}} doit être déduite de l'information
      sur les {{grandeurs d'entrée dans le modèle de mesure,2.50}}X1, …, Xn.
  - content: Dans les cas plus complexes où il y a deux grandeurs de sortie ou plus,
      le modèle de mesure comprend plus d'une seule équation.
