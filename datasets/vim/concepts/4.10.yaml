data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: condition de fonctionnement extrême qu'un {{instrument de mesure,3.1}}
      ou un {{système de mesure,3.2}} doit pouvoir supporter sans dommage et sans
      dégradation de propriétés métrologiques spécifiées, lorsqu'il est ensuite utilisé
      dans ses {{conditions assignées de fonctionnement,4.9}}
  examples: []
  id: 4.10-fra
  language_code: fra
  notes:
  - content: Les conditions limites de fonctionnement peuvent être différentes pour
      le stockage, le transport et le fonctionnement.
  - content: Les conditions limites de fonctionnement peuvent comprendre des {{valeurs,1.19}}
      limites pour la {{grandeur,1.1}} mesurée et pour les {{grandeurs d'influence,2.52}}.
  terms:
  - type: expression
    normative_status: preferred
    designation: condition limite de fonctionnement
  - type: expression
    normative_status: admitted
    designation: condition limite, f
