data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: propriété d'un phénomène, d'un corps ou d'une substance, que l'on peut
      exprimer quantitativement sous forme d'un nombre et d'une référence
  examples: []
  id: 1.1-fra
  language_code: fra
  notes:
  - content: "Le concept générique de grandeur peut être subdivisé en plusieurs niveaux
      de concepts spécifiques, comme indiqué dans le tableau suivant. La moitié gauche
      du tableau présente des concepts spécifiques du concept de grandeur. Ce sont
      des concepts génériques pour les grandeurs individuelles de la moitié droite.\n\n|===\n|
      length, l longueur, l | radius, r rayon, r | radius of circle A, rA or r(A)
      rayon du cercle A, rA ou r(A)\n| wavelength, λ longueur d'onde, λ | wavelength
      of the sodium D radiation, λD or λ(D; Na) longueur d'onde de la radiation D
      du sodium, λD ou λ(D; Na) | \n| energy, E énergie, E | kinetic energy, T énergie
      cinétique, T | kinetic energy of particle i in a given system, Ti énergie cinétique
      de la particule i dans un système donné, Ti\n| heat, Q chaleur, Q | heat of
      vaporization of sample i of water, Qichaleur de vaporisation du spécimen i d'eau,
      Qi | \n| electric charge, Qcharge électrique, Q | electric charge of the proton,
      e charge électrique du proton, e | \n| electric resistance, R résistance électrique,
      R | electric resistance of resistor i in a given circuit, Ri résistance électrique
      de la résistance i dans un circuit donné, Ri | \n| amount-of-substance concentration
      of entity B, cBconcentration en quantité de matière du constituant B, cB | amount-of-substance
      concentration of ethanol in wine sample i, ci(C2H5OH) concentration en quantité
      de matière d'éthanol dans le spécimen i de vin, ci(C2H5OH) | \n| number concentration
      of entity B, CB nombre volumique du constituant B, CB | number concentration
      of erythrocytes in blood sample i, C(Erys; Bi) nombre volumique d'érythrocytes
      dans le spécimen i de sang, C(Erc; Sgi) | \n| Rockwell C hardness, HRC dureté
      C de Rockwell, HRC | Rockwell C hardness of steel sample i, HRCi dureté C de
      Rockwell du spécimen i d'acier, HRCi | \n|==="
  - content: La référence peut être une {{unité de mesure,1.9}}, une {{procédure de
      mesure,2.6}}, un {{matériau de référence,5.13}}, ou une de leurs combinaisons.
  - content: Les séries ISO 80000 et CEI 80000 Grandeurs et unités donnent des symboles
      de grandeurs. Les symboles de grandeurs sont écrits en italique. Un symbole
      donné peut noter des grandeurs différentes.
  - content: |-
      Le format préféré par l'UICPA-IFCC pour la désignation des grandeurs dans les laboratoires de biologie médicale est «Système—Constituant; nature-de-grandeur».
      EXEMPLE «Plasma (Sang)-Ion sodium; concentration en quantité de matière égale à 143 mmol/l chez une personne donnée à un instant donné».
  - content: Une grandeur telle que définie ici est une grandeur scalaire. Cependant,
      un vecteur ou un tenseur dont les composantes sont des grandeurs est aussi considéré
      comme une grandeur.
  - content: Le concept de grandeur peut être subdivisé génériquement, par exemple
      «grandeur physique», «grandeur chimique» et «grandeur biologique», ou {{grandeur
      de base,1.4}} et {{grandeur dérivée,1.5}}.
  terms:
  - type: expression
    normative_status: preferred
    designation: grandeur
date_accepted: '2012-01-01T00:00:00+00:00'
