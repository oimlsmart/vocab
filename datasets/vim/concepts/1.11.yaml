  - content: "{{unité de mesure,1.9}} d'une {{grandeur dérivée,1.5}}"
  examples: []
  id: 1.11-fra
  language_code: fra
  notes:
  - content: EXEMPLES Le mètre par seconde, symbole m/s, et le centimètre par seconde,
      symbole cm/s, sont des unités dérivées de vitesse dans le {{SI,1.16}}. Le kilomètre
      par heure, symbole km/h, est une unité de vitesse en dehors du SI mais dont
      l'usage est accepté avec le SI. Le noeud, égal à un mille marin par heure, est
      une unité de vitesse en dehors du SI.
