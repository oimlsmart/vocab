  definition:
  - content: "{{measurement unit,1.9}} for a {{derived quantity,1.5}}"
  examples:
  - content: The metre per second, symbol m/s, and the centimetre per second, symbol
      cm/s, are derived units of speed in the {{SI,1.16}}. The kilometre per hour,
      symbol km/h, is a measurement unit of speed outside the SI but accepted for
      use with the SI. The knot, equal to one nautical mile per hour, is a measurement
      unit of speed outside the SI.
