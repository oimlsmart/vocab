data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: ensemble des {{valeurs,1.19}} comprises entre les deux {{indications,4.1}}
      extrêmes
  examples: []
  id: 4.3-fra
  language_code: fra
  notes:
  - content: Un intervalle des indications est généralement exprimé en donnant la
      plus petite et la plus grande valeur, par exemple «99 V à 201 V».
  - content: Dans certains domaines, le terme anglais est «range of indications».
      En français, le terme «étendue des indications» est parfois employé.
  terms:
  - type: expression
    normative_status: preferred
    designation: intervalle des indications
date_accepted: '2012-01-01T00:00:00+00:00'
