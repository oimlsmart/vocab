data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: realization of the definition of a given {{quantity,1.1}}, with stated
      {{quantity value,1.19}} and associated {{measurement uncertainty,2.26}}, used
      as a reference
  examples:
  - content: 1 kg mass measurement standard with an associated {{standard measurement
      uncertainty,2.30}} of 3 µg.
  - content: 100 Ω measurement standard resistor with an associated standard measurement
      uncertainty of 1 µΩ.
  - content: Caesium frequency standard with a relative standard measurement uncertainty
      of 2 · 10–15.
  - content: Standard buffer solution with a pH of 7.072 with an associated standard
      measurement uncertainty of 0.006.
  - content: Set of reference solutions of cortisol in human serum having a certified
      quantity value with measurement uncertainty for each solution.
  - content: '{{Reference material,5.13}} providing quantity values with measurement
      uncertainties for the mass concentration of each of ten different proteins.'
  id: 5.1-eng
  language_code: eng
  notes:
  - content: A “realization of the definition of a given quantity” can be provided
      by a {{measuring system,3.2}}, a {{material measure,3.6}}, or a reference material.
  - content: A measurement standard is frequently used as a reference in establishing
      {{measured quantity values,2.10}} and associated measurement uncertainties for
      other quantities of the same {{kind,1.2}}, thereby establishing {{metrological
      traceability,2.41}} through {{calibration,2.39}} of other measurement standards,
      {{measuring instruments,3.1}}, or measuring systems.
  - content: The term “realization” is used here in the most general meaning. It denotes
      three procedures of “realization”. The first one consists in the physical realization
      of the {{measurement unit,1.9}} from its definition and is realization sensu
      stricto. The second, termed “reproduction”, consists not in realizing the measurement
      unit from its definition but in setting up a highly reproducible measurement
      standard based on a physical phenomenon, as it happens, e.g. in case of use
      of frequency-stabilized lasers to establish a measurement standard for the metre,
      of the Josephson effect for the volt or of the quantum Hall effect for the ohm.
      The third procedure consists in adopting a material measure as a measurement
      standard. It occurs in the case of the measurement standard of 1 kg.
  - content: A standard measurement uncertainty associated with a measurement standard
      is always a component of the {{combined standard measurement uncertainty,2.31}}
      (see ISO/IEC Guide 98-3:2008, 2.3.4) in a {{measurement result,2.9}} obtained
      using the measurement standard. Frequently, this component is small compared
      with other components of the combined standard measurement uncertainty.
  - content: Quantity value and measurement uncertainty must be determined at the
      time when the measurement standard is used.
  - content: Several quantities of the same kind or of different kinds may be realized
      in one device which is commonly also called a measurement standard.
  - content: The word “embodiment” is sometimes used in the English language instead
      of “realization”.
  - content: 'In science and technology, the English word “standard” is used with
      at least two different meanings: as a specification, technical recommendation,
      or similar normative document (in French “norme”) and as a measurement standard
      (in French “étalon”). This Vocabulary is concerned solely with the second meaning.'
  - content: The term “measurement standard” is sometimes used to denote other metrological
      tools, e.g. 'software measurement standard' (see ISO 5436-2).
  - content: '[Annotation] Here "quantity value" can be replaced by "value" without
      ambiguity: "realization of the definition of a given quantity, with stated value
      and associated measurement uncertainty, used as a reference".'
  terms:
  - type: expression
    normative_status: preferred
    designation: measurement standard
  - type: expression
    normative_status: admitted
    designation: etalon
date_accepted: '2012-01-01T00:00:00+00:00'
entry_status: valid
