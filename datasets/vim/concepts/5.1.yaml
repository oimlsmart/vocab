data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: réalisation de la définition d'une {{grandeur,1.1}} donnée, avec une
      {{valeur,1.19}} déterminée et une {{incertitude de mesure,2.26}} associée, utilisée
      comme référence
  examples: []
  id: 5.1-fra
  language_code: fra
  notes:
  - content: 'EXEMPLE 1 Étalon de masse de 1 kg avec une {{incertitude-type,2.30}}
      associée de 3 µg.

      EXEMPLE 2 Résistance étalon de 100 Ω avec une incertitude-type associée de 1
      µΩ.

      EXEMPLE 3 Étalon de fréquence à césium avec une incertitude-type associée de
      2 · 10–15.

      EXEMPLE 4 Solution tampon de référence ayant un pH de 7,072 avec une incertitude-type
      associée de 0,006.

       

      EXEMPLE 5 Série de solutions de référence de cortisol dans du sérum humain,
      dont chaque solution a une valeur certifiée avec une incertitude de mesure.

      EXEMPLE 6 {{Matériau de référence,5.13}} fournissant des valeurs avec les incertitudes
      de mesure associées pour la concentration en masse de dix protéines différentes.'
  - content: La «réalisation de la définition d'une grandeur donnée» peut être fournie
      par un {{système de mesure,3.2}}, une {{mesure matérialisée,3.6}} ou un matériau
      de référence.
  - content: Un étalon sert souvent de référence dans l'obtention de {{valeurs mesurées,2.10}}
      et d'incertitudes de mesure associées pour d'autres grandeurs de même {{nature,1.2}},
      établissant ainsi une {{traçabilité métrologique,2.41}} par l'intermédiaire
      de l'{{étalonnage,2.39}} d'autres étalons, {{instruments de mesure,3.1}} ou
      systèmes de mesure.
  - content: Le terme «réalisation» est employé ici dans son sens le plus général.
      Il désigne trois procédures de réalisation. La première, la réalisation stricto
      sensu, est la réalisation physique de l'{{unité de mesure,1.9}} à partir de
      sa définition. La deuxième, appelée «reproduction», consiste, non pas à réaliser
      l'unité à partir de sa définition, mais à construire un étalon hautement reproductible
      fondé sur un phénomène physique, par exemple l'emploi de lasers stabilisés en
      fréquence pour construire un étalon du mètre, l'emploi de l'effet Josephson
      pour le volt ou de l'effet Hall quantique pour l'ohm. La troisième procédure
      consiste à adopter une mesure matérialisée comme étalon. C'est le cas de l'étalon
      de 1 kg.
  - content: L'incertitude-type associée à un étalon est toujours une composante de
      l'{{incertitude-type composée,2.31}} (voir le Guide ISO/CEI 98-3:2008, 2.3.4)
      dans un {{résultat de mesure,2.9}} obtenu en utilisant l'étalon. Cette composante
      est souvent petite par rapport à d'autres composantes de l'incertitude-type
      composée.
  - content: La valeur de la grandeur et l'incertitude de mesure doivent être déterminées
      au moment où l'étalon est utilisé.
  - content: Plusieurs grandeurs de même nature ou de natures différentes peuvent
      être réalisées à l'aide d'un seul dispositif, appelé aussi étalon.
  - content: Le mot «embodiment» est quelquefois utilisé en anglais à la place de
      «realization».
  - content: 'Dans la science et la technologie, le mot anglais «standard» est utilisé
      avec au moins deux significations différentes: celle de spécification, recommandation
      technique ou autre document normatif, et celle d''étalon (en anglais «measurement
      standard»). Seule la deuxième signification relève du présent Vocabulaire.'
  - content: Le terme «étalon» est parfois utilisé pour désigner d'autres outils métrologiques,
      par exemple un étalon logiciel (voir l'ISO 5436-2).
  terms:
  - type: expression
    normative_status: preferred
    designation: étalon
date_accepted: '2012-01-01T00:00:00+00:00'
