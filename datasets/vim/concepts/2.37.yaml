  definition:
  - content: probabilité que l'ensemble des {{valeurs vraies,2.11}} d'un {{mesurande,2.3}}
      soit contenu dans un {{intervalle élargi,2.36}} spécifié
  examples: []
  id: 2.37-fra
  language_code: fra
  notes:
  - content: La définition se réfère à l'approche «incertitude» présentée dans le
      GUM.
  - content: Il convient de ne pas confondre ce concept avec le concept statistique
      de niveau de confiance, bien que le terme «level of confidence» soit utilisé
      en anglais dans le GUM.
