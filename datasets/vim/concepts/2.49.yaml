data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: function of {{quantities,1.1}}, the value of which, when calculated using
      known {{quantity values,1.19}} for the {{input quantities in a measurement model,2.50}},
      is a {{measured quantity value,2.10}} of the {{output quantity in the measurement
      model,2.51}}
  examples: []
  id: 2.49-eng
  language_code: eng
  notes:
  - content: If a {{measurement model,2.48}}h(Y, X1, …, Xn) = 0 can explicitly be
      written as Y = f (X1, …, Xn), where Y is the output quantity in the measurement
      model, the function f is the measurement function. More generally, f may symbolize
      an algorithm, yielding for input quantity values x1, …, xn a corresponding unique
      output quantity value y = f (x1, …, xn).
  - content: A measurement function is also used to calculate the {{measurement uncertainty,2.26}}
      associated with the measured quantity value of Y.
  - content: '[Annotation] Here "quantity value(s)" can be replaced by "value(s)"
      without ambiguity: "function of quantities, the value of which, when calculated
      using known values for the input quantities in a measurement model, is a measured
      value of the output quantity in the measurement model".'
  terms:
  - type: expression
    normative_status: preferred
    designation: measurement function
date_accepted: '2012-01-01T00:00:00+00:00'
