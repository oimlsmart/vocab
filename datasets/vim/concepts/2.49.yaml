data:
  dates:
  - date: '2012-01-01T00:00:00+00:00'
    type: accepted
  definition:
  - content: fonction de {{grandeurs,1.1}}, dont la valeur, lorsqu'elle est calculée
      en utilisant des {{valeurs,1.19}} connues pour les {{grandeurs d'entrée dans
      le modèle de mesure,2.50}}, est une {{valeur mesurée,2.10}} de la {{grandeur
      de sortie dans le modèle de mesure,2.51}}
  examples: []
  id: 2.49-fra
  language_code: fra
  notes:
  - content: Si un {{modèle de mesure,2.48}}h(Y, X1, …, Xn) = 0 peut être écrit explicitement
      sous la forme Y = f (X1, …, Xn), où Y est la grandeur de sortie dans le modèle
      de mesure, la fonction f est la fonction de mesure. Plus généralement, f peut
      symboliser un algorithme qui fournit, pour les valeurs d'entrée x1, …, xn, une
      valeur de sortie unique correspondante y = f (x1, …, xn).
  - content: On utilise aussi une fonction de mesure pour calculer l'{{incertitude
      de mesure,2.26}} associée à la valeur mesurée de Y.
  terms:
  - type: expression
    normative_status: preferred
    designation: fonction de mesure
date_accepted: '2012-01-01T00:00:00+00:00'
