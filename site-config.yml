id: viml
domain: metanorma.github.io/oiml-viml
uriBase: https://metanorma.github.io/oiml-viml
basePath: /oiml-viml/
title: OIML Vocabularies
subtitle: International Vocabularies of Metrology
description: Terminology from the International Vocabularies of Metrology published by OIML and JCGM

translations:
  fra:
    subtitle: Vocabulaires internationaux de métrologie
    description: Terminologie des Vocabulaires internationaux de métrologie publiés par l'OIML et le JCGM

uiLanguages:
  - code: eng
    label: English
  - code: fra
    label: Français

datasets:
  - id: viml
    uri: "urn:oiml:pub:v:1:2022"
    uriAliases:
      - "urn:oiml:pub:v:1:2022*"
    sourceRepo: https://github.com/metanorma/oiml-viml
    localPath: viml-glossarist
    ref: "OIML V 1:2022"
    title: "VIML — International Vocabulary of Legal Metrology"
    description: "Terminology definitions from the International Vocabulary of Legal Metrology (OIML V 1:2022)"
    translations:
      fra:
        title: "VIML — Vocabulaire international de métrologie légale"
        description: "Définitions de terminologie du Vocabulaire international de métrologie légale (OIML V 1:2022)"
    owner: OIML
    color: "#004996"
    tags: [metrology, legal, oiml, vocabulary]
    languages: [eng, fra]
    languageOrder: [eng, fra]

  - id: vim
    uri: "urn:jcgm:pub:200:2012"
    uriAliases:
      - "urn:jcgm:pub:200:2012*"
    sourceRepo: https://github.com/metanorma/oiml-viml
    localPath: vim-glossarist
    ref: "JCGM 200:2012"
    title: "VIM — International Vocabulary of Metrology"
    description: "Terminology definitions from the International Vocabulary of Metrology (JCGM 200:2012)"
    translations:
      fra:
        title: "VIM — Vocabulaire international de métrologie"
        description: "Définitions de terminologie du Vocabulaire international de métrologie (JCGM 200:2012)"
    owner: JCGM
    color: "#005A9C"
    tags: [metrology, jcgm, vocabulary]
    languages: [eng, fra]
    languageOrder: [eng, fra]

routing: []

branding:
  primaryColor: "#004996"
  darkColor: "#003366"
  fonts:
    header:
      family: "Source Serif 4"
      source: "google"
      weights: [400, 600]
    body:
      family: "Source Sans 3"
      source: "google"
      weights: [400, 500, 700]
  logo:
    path: /logos/oiml-logo.svg
    alt: OIML
    localPath: logos/oiml-logo.svg
    localLight: logos/oiml-logo-icon-light.svg
    localDark: logos/oiml-logo-icon-dark.svg
  ownerName: OIML
  ownerUrl: "https://www.oiml.org"

features:
  news: false
  stats: true
  graph: true
  about: true
  search: true
  poweredBy:
    title: "Glossarist"
    url: "https://glossarist.org"

pages:
  - type: about
    route: about
    title: About
    icon: info
    source: about.md
    translations:
      fra:
        title: À propos
        source: about-fra.md
  - type: about
    route: about-vim
    title: About VIM
    icon: info
    source: about-vim.md
    dataset: vim
    translations:
      fra:
        title: À propos du VIM
        source: about-vim-fra.md

defaults:
  language: eng

copyright: "OIML / JCGM"
